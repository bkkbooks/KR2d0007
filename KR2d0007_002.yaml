body:
  text: 東都事略卷二宋王稱撰本紀二建隆元年春正月乙巳詔改元大赦天下國號大宋己酉命官分告天地社稷遣中使乘傳齎詔諭天下丁巳祀周廟因詔有司以時朝拜祭享令有司議立宗廟己巳議立四廟鎮州言太原契丹軍皆遁二月乙亥尊帝母南陽郡太夫人杜氏曰皇太后以周宰相范質兼侍中王溥魏仁浦仍同中書門下平章事樞密使吳廷祚同中書門下二品己卯以吳越國王錢俶為天下兵馬大元帥三月壬戍有司上皇髙祖文安府君諡曰文獻皇帝廟號僖祖皇髙祖妣崔氏諡曰文懿皇后陵曰欽陵皇曾祖中丞府君諡曰惠元皇帝廟號順祖皇曾祖妣桑氏諡曰惠明皇后陵曰康陵皇祖驍衛府君諡曰簡恭皇帝廟號翼祖皇祖妣京兆郡夫人劉氏諡曰簡穆皇后陵曰定陵皇考武清府君諡曰昭武皇帝廟號宣祖陵曰安陵有司言國家受周禪周木德木生火當以火德王色尚赤臘用戌夏四月昭義軍節度使李筠叛命石守信髙懷德率師討之五月己亥朔日有食之癸卯石守信敗李筠於長平丙午周六廟成丁巳詔親征削奪李筠官爵吳廷祚為東京留守皇弟為大內都㸃檢己未發京師甲子石守信髙懷德破李筠三萬衆于澤州南六月辛巳皇帝命衛士攻拔澤州李筠伏誅乙酉北伐潞州丁亥筠子守節降澤潞平辛卯赦天下丁酉班師秋七月戊申皇帝至自澤潞八月戊辰朔入閣甲申立琅邪郡夫人王氏為皇后趙普樞密副使九月丙午冊四親廟戊申荆南髙保融卒淮南節度使李重進叛命王審琦李處耘宋廷渥率師討之削奪李重進官爵冬十月丁亥詔親征皇弟為大內都㸃檢吳廷祚為東京留守庚寅發京師丁未次揚州即日拔其城李重進伏誅揚州平十二月己巳班師丁亥皇帝至自揚州泉州留從效稱藩二年春浚五丈河上曰河渠之役蓋非獲已煩民奉已之事朕不為也夏四月癸巳朔日有食之庚申寬鹽麴法五月癸亥朔赦天下六月甲午皇太后杜氏崩秋七月壬申以皇弟為開封尹同平章事八月庚子江南國主李景卒冬十月丙午明憲皇后祔葬安陵三年春正月甲戌詔曰民生在勤所寶惟榖先王之明訓也朕奄宅中夏為之司牧眷乃億兆期臻富庶矧農桑之業為衣食之原今陽和在辰土膏脉起當播種之云始慮游墮之尚多茍力作之不勤則秋斂之何望諸州長吏等任居牧守職司勸課所宜敦率黎庶勉厲農功俾比屋之人服勞於南畝三時之務無失於西成極其藨蓘之勤用致茨粱之詠懋功信賞國典在焉二月甲午詔常參官每五日以次轉對三月丁亥詔曰王者設棺槨之品建封樹之制所以厚人倫而一風化也近代以來遵用夷法率多火葬甚愆典禮自今宜禁之乙巳追冊故會稽郡夫人賀氏為皇后夏五月大修宫闕六月癸巳吳廷祚罷冬十月辛丑趙普樞密使李處耘樞密副使朗州周行逢卒十一月癸亥詔曰古稱使於四方不辱君命可謂士矣自今使諸道敢有求託者置其罪荆南髙保勗卒十二月衡州張文表叛攻潭州周保權使來乞師是歲周鄭王出居于房州乾德元年春正月庚申慕容延釗李處耘率師討張文表二月獲張文表癸巳克潭州荆南髙繼沖歸朝得州三縣十七三月克嶽州戊寅克朗州慕容延釗盡平湖南之地得州十四監一縣六十六夏四月甲申曲赦荆湖復增修宫闕凡規為制度並上指授既成坐寢殿中令洞開諸門皆端直通豁謂左右曰此如我心小有斜曲人皆見之秋九月羣臣上尊號曰應天廣運仁聖文武皇帝丁卯李處耘貶冬十一月癸亥親享太廟甲子合祭天地于圜丘以宣祖配大赦天下改元十二月甲申皇后王氏崩閏月辛未改卜安陵二年春正月辛巳詔曰箕子之陳八政食為之首夷吾之述四民農居其一今土膏將起勾萌畢達平秩東作乃其時也諸州長吏等所宜敦率勸課俾民力耕謹視游墯勿令廢業厚生務本副豫意焉大雨雪震雹戊子范質王溥魏仁浦罷趙普同中書門下平章事李崇矩樞密使壬辰詔曰先代置賢良方正能直言極諌經學優深可為師法詳間吏理達於教化三科自今不限內外職官前資見任黃衣布衣並許詣闕進狀朕當親試焉己亥王仁贍樞密副使二月浚閔河夏四月乙卯葬宣祖皇帝昭憲皇后于安陵孝明孝惠二后祔乙丑薛居正吕餘慶並參知政事秋七月辛卯令翰林學士承㫖陶榖等四十三人各舉任藩鎮通判者各一人冬十月甲戌詔以王全斌崔彥進王仁贍劉光毅曹彬分路伐蜀十二月王全斌克興州與蜀軍戰于三泉敗之三年春正月劉光毅克夔州王全斌克利州己丑克劒州劉光毅克萬施開忠四州乘勝至遂州甲午王全斌之師至魏城蜀主孟昶降丙午赦蜀得州四十六縣二百四十二月癸卯命吕餘慶知成都府王全斌殺蜀降兵二萬人於是兩川盜賊羣起詔所在討之夏五月孟昶至京師戊子赦天下六月甲辰以孟昶為中書令封秦國公庚戍昶卒冬十一月契丹侵易州四年秋七月甲寅詔曰豐年之詠播于頌聲廣蓄之訓垂於載籍今三時不害百姓小康田里無愁歎之聲壠畝有遺滯之穗州縣長吏等職司牧養義當勸率俾及歲穰各務儲積或值凶歉不至匱乏古者倉廪實禮節興所宜禁民蒱博勿致游墯戒其崇儉免於靡榖申嚴條教稱朕意焉王全斌克雅州詔曰五代以來兵亂相繼國用不足庸調繁興朕厯試艱難周知疾苦省嗇用度未嘗加賦優恤灾沴率從蠲復所在長吏明加告諭自今百姓有能廣植桑棗墾闢荒田者只輸舊租禁將帥取軍中精卒為牙兵冬十一月癸丑寬鹽禁五年春正月辛丑王全斌崔彥進王仁贍並以在蜀貪殘殺戮貶二月壬戌沈倫樞密副使夏六月戊午朔日有食之秋七月己巳詔曰自夏以來水旱為沴深慮民庶至於流離宜令諸州長吏告民無轉徙被灾民蠲其賦開寶元年春二月立皇后宋氏夏六月癸亥詔曰人倫以孝慈為先家道以敦睦為美矧犬馬而有養豈父子之異居傷敗風化莫此為甚應百姓祖父母父母在者子孫無得别籍異財長吏其申戒之秋七月太原劉承鈞死八月戊辰羣臣上尊號曰應天廣運聖文神武明道至德仁孝皇帝九月太原劉繼恩為其臣侯霸榮所弒冬十月以諸鎮節度為環衛十一月癸卯合祭天地于圜丘大赦天下改元二年春正月戊午詔親征太原己未皇弟留守京師甲子發京師乙亥駐蹕潞州三月戊戌皇帝至太原決晉祠水灌城夏四月壬子何繼筠敗契丹于陽曲五月甲申壅汾水灌太原城閏月戊申太原南城陷水注城中劉繼元殺其宰相郭無為壬戌皇帝以暑雨班師六月癸巳皇帝至自太原秋九月大霖雨冬十月丁亥詔曰昔西漢求吏民之明經術者令與計偕縣次續食蓋優賢之道也國家歲開貢部敷求俊乂四方之士無逺弗届而經途遐阻資用或闕朕甚愍焉自今西川山南荆湖等道舉人往來給劵三年春正月辛酉詔諸道州府察民有孝悌彰聞德行純茂擅鄉曲之譽為士庶推服者以聞夏四月辛未朔日有食之庚子除河北鹽禁秋七月壬子詔曰吏貟穴多而求其治者斯難也奉祿鮮薄而責以廉者無謂也與其冗貟而重費不若省官而益奉諸道州縣官宜以户口為率差減其貟舊奉外月增給五千九月己亥命潘美尹崇珂伐嶺南壬子潘美克富州冬十月潘美克賀州十一月克昭桂二州十二月庚午克連州戊子克韶州四年春正月潘美克英雄二州二月丁亥克廣州擒劉鋹廣南平得州六十縣二百十四辛卯赦廣南三月乙巳詔曰百越之人久淪虐政其令嶺南諸州長吏察僞政有害於民者以聞當悉除之夏五月乙未皇帝御明德門受俘釋鋹罪以為右千牛衛大將軍封恩赦侯冬十月癸亥朔日有食之丙戌詔嶺南諸州劉鋹日煩苛賦斂並除之平民為兵者招誘復業十一月癸未合祭天地于圜丘始用繡衣鹵簿大赦天下五年春正月壬辰大雨雪禁民以鐵鑄佛像及浮圖二月庚寅劉熙古參知政事夏五月壬戌廢嶺南媚川都禁民採珠是月霖雨放後宫五十餘人秋九月丁巳朔日有食之癸酉李崇矩罷六年春二月周鄭王殂夏六月庚申劉熙古致仕秋八月甲辰趙普罷九月丁卯吕餘慶罷己巳皇弟封晉王薛居正沈倫並同中書門下平章事盧多遜參知政事楚昭輔樞密副使壬申詔晉王位宰相上冬十月甲申葬周恭帝于順陵七年春二月庚辰朔日有食之丙子日中有二黑子秋九月遣李穆使于江南召李煜入朝煜辭以疾命曹彬潘美征之冬十月克池州曹彬頓兵于采石磯十一月曹彬等用浮梁以濟師契丹來求通好八年夏四月庚午吳越國王錢俶克常州五月壬申錢俶加太師詔曰嶺表之俗疾不呼醫自皇化攸及始知方藥商人齎生藥度嶺者勿算秋七月辛未朔日有食之甲申詔錢俶歸國九月克潤州冬十月己亥李煜遣其臣徐鉉周惟簡來乞緩師壬寅遣歸其國命修西京宫闕十二月己亥曹彬克升州擒李煜江南平得州十九軍三縣一百八江南既平捷奏至上因泣下謂左右曰宇縣分割民受其弊思布聲教以撫養之攻城之際必有橫遭鋒刃此實何罪因讀尚書嘆曰堯舜之世四凶之罪止從投竄何近代法網之密邪辛丑赦江南九年春正月戊辰朔皇帝御明德門受俘以李煜為右千牛衛上將軍封違命侯庚辰詔以後月幸西京有事于南郊二月癸卯羣臣上尊號曰應天廣運一統太平聖文神武明道至德仁孝皇帝上以燕晉未平不許羣臣復以立極居尊為號乃許庚戌曹彬樞密使己未吳越國王錢俶來朝三月詔俶歸國壬申享太廟丙子發京師庚辰謁安陵賜河南府民今年田租之半復奉陵户一年辛巳皇帝至西京夏四月庚子合祭天地于南郊大赦天下都民垂白者相謂曰我輩少經亂離不圖今日復覩太平天子有泣下者辛亥皇帝至自西京曹翰克江州秋八月丙辰分兵五路以討太原有神降于岐冬十月癸丑皇帝崩於萬歲殿聖壽五十殯于殿之西階羣臣上尊諡曰英武聖文神德皇帝廟號太祖明年四月乙卯葬永昌陵大中祥符元年加上尊諡曰啓運立極英武聖文神德𤣥功大孝皇帝五年再加上尊諡曰啓運立極英武睿文神德聖功至明大孝皇帝臣稱曰烏呼自三代以上莫不得天下以正也堯舜傳之賢而禹傳之子湯武雖以仁易暴而湯有慙德孔子謂武未盡善則是湯武尚處聖人之不幸也太祖皇帝聰明齊聖由揖遜而有天下如堯與舜至於天祿之傳不歸之子而歸之弟則賢於禹逺矣況湯武乎烏呼得天下以仁棄天下如脫屣數千百載之間繼堯舜之正者唯太祖為不可及也已東都事略卷二
