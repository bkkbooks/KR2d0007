body:
  text: 東都事略卷四宋王稱撰本紀四眞宗膺符稽古成功讓德文明武定章聖元孝皇帝太宗第三子也母曰元德皇后李氏以開寶元年十二月生于開封第赤光照室幼而聦睿姿表竒異與諸王戲好作戰陳之狀自稱元帥太祖愛之謂之曰汝爲天子否對曰由天命耳太平興國八年拜同中書門下平章事封韓王端拱元年加侍中荆南淮南節度使封襄王淳化五年爲開封尹進封壽王至道元年八月立爲皇太子仍判府事三年三月癸巳太宗崩奉遺制即皇帝位于匶前夏四月乙未尊皇后曰皇太后大赦天下皇弟元份封雍王元傑兖王元偓彭城郡王元偁安定郡王元儼曹國公李至李沆並參知政事五月丁卯詔求直言極諫甲戍李昌齡貶丁亥立秦國夫人郭氏爲皇后六月戊戌皇叔廷美追復秦王辛丑詔天下勿得以祥瑞來獻甲辰皇兄元佐復封楚王乙巳追冊莒國夫人潘氏爲皇后錢若水罷秋八月己亥曹彬樞密使兼侍中趙鎔罷向敏中夏侯嶠並樞密副使李惟清罷冬十月乙酉葬神功聖德文武皇帝于永熈陵十二月丙申追尊帝母賢妃李氏爲皇后咸平元年春正月辛酉朔改元甲申有彗出營室北二月甲午詔曰昔之哲王樂聞已過博延讜論庸致時雍矧予沖人始嗣基業政化猶鬱星變遽彰敢忘責躬以荅垂譴其令有位極言無隱夏五月戊午朔日有食之冬十月丙戌朔日有食之戊子吕端罷張齊賢李沆並同中書門下平章事李至罷己丑温仲舒夏侯嶠罷向敏中參知政事楊礪宋湜並樞密副使二年春閏三月庚寅詔開言路夏六月詔曰服用之制條式具存儻奢僭不懲則耗蠹兹甚自今臣庶有鋪金泥玉之飾其禁之戊午曹彬薨己丑王顯樞密使秋八月乙卯羣臣上尊號曰崇文廣武聖明仁孝皇帝癸酉楊礪薨九月庚辰朔日有食之冬十一月丙戌合祭天地于圜丘奉太祖太宗並配大赦天下契丹侵邊乙未詔幸河北己酉李沆留守京師十二月甲寅發京師戊午駐蹕澶州甲子次大名契丹侵威虜軍王師破契丹于五合川三年春正月己卯朔益州軍亂向敏中權同知樞密院事契丹侵河間康保裔死之庚申赦河北壬辰宋湜薨甲午發大名益州叛軍推王均爲首庚子皇帝至自大名二月癸亥王顯罷周瑩王繼英並知樞密院事王旦同知院事三月戊寅朔日有食之己卯葬元德皇后夏五月丁丑赦天下六月丁卯向敏中爲河北河東宣撫大使冬十月雷有終復益州王均伏誅十一月壬午詔曰在昔黄帝有下風之問伯禹有昌言之拜勤納規諫以致雍和君臣叶心上下無壅永念于此予心惕然間者深詔朝倫大闢言路而箝結相尚啓沃無聞豈朕之誠信未孚邪將庶官狃於因循也今順攷舊規延進讜議凡朕躬過失時政違尤敎令之闕遺人情之壅閼並可條上勿或緘藏言近訐者亦議優容文不工者許其直致固將親覽宜體至懷甲申張齊賢罷四年春二月丙寅詔舉賢良方正直言極諫三月庚寅吕䝉正向敏中並同中書門下平章事辛卯王化基罷王旦參知政事馮拯陳堯叟同知樞密院事夏四月己未王欽若參知政事秋九月李繼遷陷清逺軍冬十一月王顯大破契丹于威虜軍五年春二月癸酉詔曰比司帑廩者以羡剰爲勞蓋出納之際有所輕重此可責而不可奬也宜令有司嚴加戒勵無復使然三月李繼遷陷靈州守臣裴濟死之夏六月己卯周瑩罷秋七月甲午朔日有食之冬十月丁亥向敏中罷十一月壬寅合祭天地于圜丘大赦天下己酉皇子祐封信國公六年夏四月契丹入冦王超逆戰于定州之望都王繼忠陷于陳辛巳皇子祐薨秋七月癸丑兖王元傑薨九月甲辰吕䝉正罷冬十二月甲子詔曰朕爲民司牧罔敢逸豫冀聞闕政屢詔讜言而羣臣奏封罕有極陳得失豈詢求之未至何循黙以自持其令御史臺諭内外官各上所見勿爲顧避李繼遷攻西涼戊寅赦天下景德元年春正月丙戌朔大赦天下改元辛丑京師地震丁未復震二月西涼潘羅支擊李繼遷繼遷中流矢死三月己亥皇太后崩于萬安宫秋七月丙戌李沆薨庚寅畢士安參知政事八月己未畢士安冦準並同中書門下平章事王繼英樞密使馮拯陳堯叟並改僉書樞密院事契丹入邉乙巳河決澶州閏月以王欽若判天雄軍契丹將達蘭率衆侵威虜順安軍又與契丹主及其國毋侵定州駐于陽城淀以求和契丹侵岢嵐軍冬十月王繼忠以契丹來請和命曹利用使于契丹丁未皇弟元份留守京師十一月辛亥契丹侵瀛州又逼冀州庚午皇帝親征王繼忠爲契丹請和契丹率衆犯澶州射殺其將達蘭丙子幸北砦戊寅移御澶州北城行宫曹利用還十二月庚辰朔日有食之契丹使韓玘來請和詔諸將按兵壬辰赦河北癸巳皇弟元份疾以王旦權留守甲午發澶州契丹使丁振來上誓書契丹出塞戊戌皇帝至自澶州二年春正月庚戌朔大赦天下夏四月己亥詔河北諸州葺城池癸卯王欽若罷馮拯參知政事六月趙德明歸款秋七月甲子詔復賢良方正能直言極諫博通墳典達於敎化才識兼茂明於體用武足安邊洞明韜略運籌決勝軍謀宏逺才任邊寄堪爲將帥六科八月戊寅雍王元份薨冬十月乙酉畢士安薨十一月丁巳合祭天地于圜丘大赦天下皇弟元偓封寧王元偁舒王元儼廣陵郡王三年春二月丁亥王繼英薨戊戌冦準罷王旦同中書門下平章事己亥王欽若陳堯叟並知樞密院事趙安仁參知政事韓崇訓馬知節僉書樞密院事冬十月葬明德皇后四年春正月甲辰陳堯叟留守京師己未皇帝朝謁諸陵發京師丙寅奠獻安陵永昌永熈陵及諸后陵二月己巳幸西京辛卯發西京甲午次鄭州遣使謁周嵩慶二陵三月己亥皇帝至自西京夏四月辛巳皇后郭氏崩甲午詔曰𣙜酤之利素有定規過求羡贏是縱掊克自今中外不得増課庶以息民五月丙申朔日有食之六月乙卯葬莊穆皇后秋七月宜州軍校陳進以宜州亂陷柳象州懷逺軍八月庚子韓崇訓罷冬十月曹利用擊敗賊黨陳進伏誅乙卯詔曰拷掠之法素著科條非理擅行兹謂慘酷諸道官司應有非法訊囚之具一切毁棄大中祥符元年春正月乙丑天書大中祥符三篇降于左丞天闕之上戊辰大赦天下改元夏四月甲午詔以十月有事于泰山王欽若趙安仁爲泰山封禪經度制置使丙午作玉清昭應宫五月戊子詔貴戚進奉物勿以銷金文繡爲飾六月乙未天書再降于泰山醴泉庚戌赦兖州辛亥羣臣上尊號曰崇文廣武儀天尊道寶應章感聖明仁孝皇帝秋八月己丑上太祖太宗尊諡九月庚申向敏中留守京師甲子皇帝奉天書告太廟冬十月辛卯發京師辛亥享昊天上帝于泰山之圜壇陳天書于左奉太祖太宗配命羣臣享五方帝諸神于山下大赦天下丙辰次兖州十一月戊午幸曲阜進謁文宣王廟加上文宣王曰𤣥聖文宣王丁丑皇帝至自泰山壬午以正月三日爲天慶節甲申親享六室十二月皇弟元儼封榮王二年冬十月甲午詔天下置天慶觀十一月丙辰皇帝作文武七條賜文臣任轉運使以下至知縣武臣任將帥以下至廵檢者三年春閏二月戊辰赦京畿秋八月詔以來年春有事于汾隂以陳堯叟爲祀汾隂經度制置使冬十一月陜州黄河清十二月又清向敏中留守京師四年春正月丙申以六月六日天書再降日爲天貺節丁酉皇帝奉天書發京師庚子至汜水辛丑望拜諸陵二月辛酉皇帝詣睢上祀后土地祇奉太祖太宗配大赦天下三月次西京丙申謁安陵永昌永熈元德皇后陵夏四月皇帝至自汾隂皇弟元偓封相王五月乙未詔曰峻極之岳神靈主焉其加上五嶽帝號秋七月壬申詔兩浙福建荆湖廣南路諸州每歳丁錢四十五萬四百千悉降之甲午馮拯罷八月乙巳河決通利軍五年夏四月戊申向敏中同中書門下平章事三司言民有販茶違法者許同居告上曰以利而壞風俗可乎不許秋八月丙申朔日有食之九月戊子王欽若陳堯叟並樞密使同平章事馬知節樞密副使丁謂參知政事趙安仁罷冬十月戊午九天司命天尊降于延恩殿諭以本人皇九天之一乃趙始祖再降爲黄帝後唐時復降主趙氏之族己未大赦天下閏月己巳上天尊聖號曰聖祖上靈髙道九天司命保生天尊大帝辛未謁謝太廟壬申詔避聖祖名以七月一日爲先天節十月二十四日爲降聖節乙亥上聖祖母懿號曰元天大聖后又加上太廟六室尊諡丙子羣臣上尊號曰崇文廣武感天尊帝應眞佑德上聖欽明仁孝皇帝十一月丙申親祀玉皇于朝元殿以聖祖太祖太宗配十二月壬申改諡孔子爲至聖文宣王丁亥以德妃劉氏爲皇后六年春正月辛酉詔宗正寺以帝籍爲玉牒夏五月赦東京建安軍以鑄玉皇聖祖太祖太宗尊像成故也秋七月癸卯詔天下勿稅農器八月庚申詔以來春親謁亳州太清宫辛酉以丁謂爲奉祀經度制置使庚午加上老子號曰太上老君混元上德皇帝冬十二月戊午朔日有食之丙寅冦準留守京師七年春正月壬寅皇帝奉天書發京師己酉朝謁太清宫庚戌幸亳州謁聖祖殿乙卯次應天府丙辰詔曰應天府太祖興王之邦也其建南京作鴻慶宫二月辛酉皇帝至自亳州壬申恭謝天地于南郊大赦天下三月丁未皇子封慶國公夏四月丙子舒王元偁薨六月乙亥王欽若陳堯叟馬知節罷㓂準樞密使秋七月癸卯王嗣宗曹利用並樞密副使九月辛卯上玉皇聖號曰太上開天執符御厯含真體道玉皇大天帝冬十二月己未作元符觀八年春正月壬午朔大赦天下夏四月壬戌冦準罷王欽若陳堯叟復爲樞密使丙寅詔曰倉庾出納自今勿得以羨餘爲吏課壬申榮王宫火五月庚子放宫人一百八十四人丙午皇弟元儼降封端王詔宗室皇親及外庭臣庶之家不得以銷金戭金金線之類爲衣服器用六月己酉朔日有食之閏月己卯大赦天下秋七月戊午王嗣宗罷冬十一月辛酉皇弟元儼封彭王十二月辛卯皇子封壽春郡王九年春正月丙辰張旻樞密副使夏五月景靈宫㑹靈觀兖州景福宫太極觀成秋七月蝗八月丙戌陳堯叟罷九月甲辰丁謂罷丙午陳彭年王曾張知白並參知政事任中正樞密副使宗哥唃厮羅入冦曹瑋擊敗之冬十一月乙卯詔改元天禧元年春正月薦獻玉皇大天帝于玉清昭應宫上聖祖天尊大帝仙服于景靈宫辛亥恭謝天地于南郊大赦天下以四月一日爲天祺節二月戊寅皇弟元偓封徐王己亥陳彭年薨夏四月乙亥攽聖祖金寶牌于天下五月戊申王旦爲太尉侍中遇軍國重事不限時日入預參決六月壬申赦西京秋七月丁巳王旦罷八月庚午王欽若同中書門下平章事張旻罷戊寅免牛稅九月癸卯王曾罷李迪參知政事馬知節知樞密院事曹利用任中正周起並同知院事冬大雪二年春二月丁卯皇子封昇王夏四月庚寅赦天下癸卯馬知節罷作祥源觀五月壬戌詔曰民勤稼穡家有儲偫所以備流行之災而末俗澆浮罕務蓄積歳或小歉便至流亡豈敎導之方未甚篤也今禾麥將稔令所在長吏躬親勉諭無使復然甲子徐王元偓薨六月乙未曹利用知樞密院事秋七月壬申赦天下八月甲辰詔以皇子昇王爲皇太子大赦天下壬子皇弟元儼封通王冬十二月丙午張知白罷三年春三月戊午朔日有食之是月朱能以天書降于乾祐山中夏六月甲午王欽若罷河決滑州戊戌冦準同中書門下平章事丁謂參知政事秋七月壬申羣臣上尊號曰體元御極感天尊道應真寶運文德立功上聖欽明仁孝皇帝八月丁亥大赦天下冬十一月乙卯詔曰自今犯酒麴銅鍮等條有死刑者去之己巳月重輪辛巳合祭天地于圜丘大赦天下十二月辛卯皇弟元儼封涇王曹利用丁謂並樞密使任中正周起並副使四年春正月乙丑曹瑋僉書樞密院事三月己卯向敏中薨夏六月丙申冦準罷秋七月丙寅李迪同中書門下平章事馮拯樞密使庚子丁謂同中書門下平章事癸酉誅内侍周懷政八月乙酉任中正王曾並參知政事錢惟演樞密副使九月丙辰周起曹瑋罷丁卯赦天下冬十一月戊辰丁謂李迪罷己巳謂仍赴中書視事馮拯同中書門下平章事庚午詔自今除軍國大事朕自親決餘皆委皇太子同宰相樞密使等參議施行十二月乙亥皇帝不豫五年春正月癸巳赦天下丁酉張士遜樞密副使秋七月甲戌朔日有食之乾興元年春正月辛未朔改元二月庚子朔大赦天下詔自今中外所上表咸去稱號羣臣請上尊號曰應天尊道欽明仁孝皇帝從之庚戌皇帝不豫戊午皇帝崩于延慶殿聖壽五十五殯于殿之西階羣臣上尊諡曰文明章聖元孝皇帝廟號眞宗冬十月己酉葬永定陵天聖二年加上尊諡曰文明武定章聖元孝皇帝慶歴七年再加上尊諡曰膺符稽古神功讓德文明武定章聖元孝皇帝臣稱曰宋興承五季之餘天下得離兵革之苦至眞宗之世太平之治洽如也咸平以來君明臣良家給人足刑措不用契丹請和示以休息德明納款撫以恩信於是朝帝陵封岱宗祀汾睢謁亳社絶代曠典莫不具舉禮樂明備頌聲洋溢崇本報功以告神明千載一時豈不休哉噫守成之賢致治之盛周成康漢文景可以比德矣東都事略卷四
