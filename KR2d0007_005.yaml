body:
  text: 東都事略卷五宋王稱撰本紀五仁宗體天法道極功全德神文聖武睿哲明孝皇帝眞宗第六子也母曰章懿皇后李氏嘗夢二日在天其一忽墜以裾承之自是有娠以大中祥符三年四月十四日生是日大雷震章獻明肅皇后以爲己子七年爲左衞上將軍封慶國公八年拜中正軍節度使兼侍中進封壽春郡王天禧元年兼中書令二年爲建康軍節度使太保封昇王八月立爲皇太子仁宗容止莊重不妄言笑四年詔中書樞密院及諸司非大事並委皇太子資善堂裁處以聞乾興元年春二月戊午真宗崩奉遺制即皇帝位于匶前尊皇后曰皇太后以皇帝尚幼軍國事兼權取皇太后處分己未大赦天下丙寅丁謂以司徒馮拯以司空兼侍中皇叔元儼封定王三月乙酉作受命寶夏六月庚申誅内侍雷允恭癸亥丁謂貶任中正罷秋七月辛未王曾同中書門下平章事吕夷簡魯宗道並參知政事丙子錢惟演樞密使八月乙巳皇帝皇太后初御承明殿垂簾決事九月己卯以天書從葬永定陵冬十月己酉葬文明章聖元孝皇帝于永定陵十一月丁卯朔錢惟演罷張知白樞密副使天聖元年春正月丙寅朔改元秋七月辛巳放天下逋欠八月丙午赦天下九月丙寅馮拯罷王欽若以司空同中書門下平章事二年春二月癸未皇太后詔宰臣曰吾受先帝顧託之深皇帝富于春秋助成正道用乂斯民期見抱孫之歡永遂含飴之樂此吾之志也更賴三事庶尹百工羣司勉悉乃心同底于道夏五月丁亥朔日有食之秋八月丙辰朔詔自今舉官已遷改而貪汚者許元舉官以狀聞不以實者劾其罪冬十一月甲午加上真宗尊諡丁酉合祭天地于圜丘大赦天下羣臣上尊號曰聖文睿武仁明孝德皇帝上皇太后尊號曰應元崇德仁壽慈聖皇太后乙巳立皇后郭氏三年夏四月壬子朔詔恤刑獄冬十月辛酉晏殊樞密副使十一月戊申王欽若薨十二月張知白同中書門下平章事乙丑張耆樞密使四年夏五月壬午詔曰國家勤卹黎庶必期無訟而生齒之繁犯者頗衆朕甚閔焉應天下大辟情理可憫及刑名疑慮者具案以聞有司無得舉駮閏月減江淮發運司歳漕止六百萬石六月建州劒州邵武軍大水庚寅大雨震雷平地水數尺壞京城民舍河南府鄭州大水秋九月乙卯詔曰講學之廢久而執卷者不知經義非上之敎導有失邪其令講官孫奭馮元舉京朝官博通經術者以名聞冬十月甲戌朔日有食之十二月丁亥皇帝白皇太后欲元日率百官先上皇太后壽然後受朝太后曰豈可爲吾而後元會之禮哉王曾奏曰陛下以孝奉母儀而太后以謙全國體請如太后令五年春正月壬寅朔皇帝率百官上皇太后壽于會慶殿朝于天安殿己未晏殊罷戊辰夏竦樞密副使三月秦州地震夏五月癸亥楚王元佐薨冬十一月癸丑合祭天地于圜丘大赦天下六年春二月壬午張知白薨三月丙申朔日有食之壬子張士遜同中書門下平章事姜遵范雍樞密副使辛酉建太一宫夏四月甲申流星大如斗秋七月河北大水九月遣近臣十七人廵行河北七年春正月癸卯曹利用罷二月庚申朔魯宗道薨丙寅張士遜罷吕夷簡同中書門下平章事夏竦薛奎參知政事陳堯佐樞密副使三月癸未詔曰國家設制策之科將博詢於鯁議有能規朕躬之過失陳宰相之闕遺糾中外之姦囘斥左右之朋比述未明之機事貢無隱之密謀以至臺省之官阿私而罔上郡國之吏専恣以濫刑或通受貨財潛行請託或恃憑權勢敢事貪殘並許極言朕當親覽其令百官遇起居日轉對在外臣僚亦許具實封以聞夏四月庚寅大赦天下六月丁未玉清昭應宫災甲寅王曾罷秋八月丁亥朔日有食之詔以天下職田租送官以數上三司均給之辛卯夏竦樞密副使陳堯佐王曙並參知政事冬十月丙午京師地震十一月癸亥皇帝率百官上皇太后壽于會慶殿是歳皇叔元儼封鎮王八年秋九月乙丑姜遵薨己巳趙稹樞密副使冬十月丙申詔罷𣙜池鹽地分初陜西京西京南路許解鹽餘皆𣙜之議者以輦運之役困軍民至是京西京北河東京東路並聽以見錢金銀輸京師𣙜貨務就池給鹽其後商賈流通而官課損矣十一月戊辰合祭天地于圜丘大赦天下九年春二月癸巳詔曰天下吏給職田所以惠養廉節也而貪汙之人並縁爲私侵漁細民滋以爲害比詔有司皆從停罷如聞勤事之吏禄薄不足以自養朕甚愍焉其復職田冬十月丙戌詔曰朕遵列聖之謀荷慈宸之敎于兹八年矣而搢紳之間名節罔勵矜勞者掠美以近名希進者行險以徼寵詆誣執政干撓有司分屏翰者或奏請之靡厭主按察者或寛縱之爲得貪而無耻姑務營私老而非材曽不知退繇廉耻之未飭致風化之靡醇此豈朕之所望哉用稽彞訓申儆羣倫茍少冒於官箴將自投於公憲布告遐邇體朕意焉明道元年春二月庚戌張士遜同中書門下平章事丁卯順容李氏爲宸妃是日薨秋七月乙酉王曙罷八月庚子朔晏殊樞密副使丙午殊參知政事甲寅楊崇勲樞密副使壬戍文德殿成是夜禁中火乙丑詔求直言丁卯大赦天下冬十一月甲戍恭謝天地于天安殿遂謁太廟大赦天下改元癸未皇叔元儼徙封孟王辛卯封荆王十二月壬寅楊崇勲樞密使二年春二月乙巳皇太后饗太廟羣臣上皇太后尊號曰應元齊聖顯功崇德慈仁寶壽皇太后丁未皇帝祀神農于壇乃就耕位執耜行籍田之禮三推有司請止上曰朕將耕之終畝以勸天下之力農乃耕十二歩而止大赦天下羣臣上尊號曰睿聖文武體天法道仁明孝德皇帝三月庚寅皇太后不豫大赦天下甲午皇太后崩于寶德殿夏四月罷命婦進獻祈乞恩澤凡表奏無得縁親戚投進禁中事有傳宣令有司實封覆奏内批改官及與差遣未得即行委中書樞密院審取處分天下毋得剏修寺觀聖節所進香合山儀並停上親政中外大恱己未吕夷簡張耆罷李迪同中書門下平章事夏竦陳堯佐范雍趙稹晏殊罷王隨參知政事李諮樞密副使王德用僉書樞密院事五月癸酉詔曰大行皇太后保佑沖人十有二年恩勤至矣而言者㒺識大體詆訐一時之事非所以慰朕孝思也其垂簾日詔命中外毋輒以言上親攬政而言者多譏斥垂簾日事上惡其持情近薄故禁之乙亥李諮以父憂起復六月甲午朔日有食之秋七月戊子詔曰比年以來蝗旱作沴郡國交奏日月相仍豈朕德之不明將天時之適爾夙夜循省咎實在予自今尊號去睿聖文武四字仍令中外各直言極諫朕將親覽焉八月庚申以内藏錢百萬賜三司初三司以用度不足告于上上曰國家禁錢本無内外蓋以助經費也自是歳歉或調發則出内藏以濟之冬十月丁酉葬莊獻明肅皇后于永定陵戊午張士遜楊崇勲罷吕夷簡同中書門下平章事王曙樞密使宋綬參知政事王德用蔡齊樞密副使十一月癸亥朔薛奎罷十二月乙卯皇后郭氏廢丁巳詔改元景祐元年夏閏六月甲子泗洲淮汴溢秋八月壬戍有星孛於張翼癸亥王曙薨庚午王曾樞密使辛未以星變大赦天下九月甲辰立皇后曹氏冬十月西戎冦邊二年春二月戊辰李迪罷王曽同中書門下平章事王隨李諮並知樞密院事王德用韓億同知院事蔡齊盛度並參知政事夏四月庚午詔曰雅樂之作治道所基郊丘宗廟之祠朝廷饗侑之禮人神和會兹實重焉爰命有司攷正鍾律應中外臣僚暨州里儒學草澤博聞之士能洞曉古今雅樂制作及音律得失灰琯測候之法並許所在薦聞或自言官司將較試之五月甲申朔詔曰朕恭惟太祖皇帝受天命建大業可謂有功矣二聖繼統重熈累洽可謂有德矣其令禮官稽按典籍辨崇配之序定二祧之位中書門下審加詳閱以稱朕心於是禮院言我太祖經綸草昧遂有天下功宜爲帝者祖太宗勤勞制作眞宗功成治定德宜爲帝者宗三廟並萬世不毁至於升侑上帝請自今以太祖爲定配二宗爲迭配將來皇帝親祠請以三聖並侑中書門下奏請如禮官議詔恭依庚寅禁銷金縷金之飾秋七月戊戌羣臣上尊號曰景祐體天法道欽文聦武聖神孝德皇帝九月新樂成己酉建睦親宅廣親宅冬十一月戊子廢后郭氏薨乙未合祭天地于圜丘大赦天下三年秋七月初置大宗正司八月乙酉詔天下士庶之家凡室宇非邸第樓閣無得四輔作鬭八非品官無得起門屋非宫室寺觀無得綵繪棟宇及間朱梁柱器用無得純金及表裏用朱非三品以上及宗室戚里之家無得金稜器及用玳瑁器非命婦無得金爲首飾及真珠裝綴首飾衣服凡帟幕架帕床裙無得用純錦民間無得乗檐子其用兜子者所舁無得過二人非五品以上無得乗閙裝銀鞍其乗金塗銀䊋條子促結鞍轡自文武升朝以上聽違者物主工匠並以違制論過百日而不變毁者坐之冬十一月戊寅保慶太后楊氏薨十二月李諮薨王德用知樞密院事章得象同知院事四年夏四月甲子吕夷簡王曾宋綬蔡齊罷王隨陳堯佐並同中書門下平章事盛度知樞密院事韓億程琳石中立並參知政事王鬷同知樞密院事六月乙亥杭州大風雨秋七月戊申有星數百西南流冬十二月忻代并三州地震寶元元年春正月甲辰麟府州及陜西大雨雹三月戊戌王隨陳堯佐韓億石中立罷張士遜章得象並同中書門下平章事王鬷李若谷並參知政事王博文陳執中並同知樞密院事夏四月辛未王博文薨乙亥張觀同知樞密院事秋七月丙辰大臣以將郊上尊號上曰唐穆宗謂彊我懿號不若使我爲有道之君加我虚尊不若居我於無過之地朕常愛斯言羣臣請不已上刋英睿二字而受之於是上尊號曰寶元體天法道欽文聦武聖神孝德皇帝冬十一月庚戌合祭天地于圜丘大赦天下十二月甲子京師地震趙元昊反僭號于夏州二年夏五月壬子王德用罷夏守贇同知樞密院事六月壬午削奪元昊在身官爵仍除屬籍有能生擒及斬首來獻者與除定難軍節度使秋八月甲戌皇子生十一月戊子出禁中真珠估緡三十萬賜三司上曰此無用之物不欲捐棄不若散之民間收其直助給邊儲亦可紓吾民之力也丁酉盛度程琳罷壬寅王鬷知樞密院事宋庠參知政事十二月夏人犯保安軍狄青敗之康定元年春正月庚戌日有食之乙亥元昊圍延州劉平石元孫與賊戰于三川口王師敗績平死之二月丙午赦延州保安軍改元夏守贇罷三月戊寅王鬷陳執中張觀罷宋綬晏殊並知樞密院事王貽永同知院事夏四月丙午誅内侍黄德和五月壬戍張士遜以太傅致仕吕夷簡同中書門下平章事六月乙亥夏守贇同知樞密院事秋八月戊午夏守贇罷杜衍同知樞密院事九月壬午李若谷罷宋綬晁宗慤參知政事鄭戩同知樞密院事戊辰王師失利于三川砦晏殊樞密使王貽永鄭戩杜衍並改副使辛未范仲淹以任福等出師政賊白豹城破之冬十一月范仲淹以葛懷敏出師出歸娘谷與夏人戰敗之十二月宋綬薨東都事略卷五
