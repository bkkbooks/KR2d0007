body:
  text: 東都事略卷六宋王稱撰本紀六慶歴元年春二月辛卯韓琦以任福等與賊戰于好水川任福及耿傅桑懌王珪武英死之己亥皇子昕薨夏五月乙丑皇子昉薨辛未宋庠鄭戩罷王舉正參知政事任中師任布並樞密副使秋八月元昊冦麟府二州戊子元昊陷豐州守臣王餘慶死之乙未毁潼關九月乙亥詔天下立義倉冬十一月丙寅合祭天地于圜丘大赦天下改元二年春正月契丹聚兵幽薊三月丁巳杜衍宣撫河東辛酉晁宗慤罷己巳契丹遣蕭英劉六符來求關南地夏四月庚寅命富弼使于契丹五月丁巳陞大名府爲北京戊寅詔自中宫已下並不得衣銷金縷金蹙金陷金明金泥金楞金背金欄金盤金織金金線撚金等秋七月丙午任布罷戊午吕夷簡判樞密院章得象兼樞密使富弼還癸亥再使契丹九月丙午吕夷簡改兼樞密使乙丑契丹遣邪律仁先劉六符來修好甲午葛懷敏與元昊戰于定川砦敗績冬元昊求納款三年春正月辛未封皇子曦爲鄧王是日薨癸巳延州言元昊稱夏國遣賀從勗來納款二月遣梁適使于契丹三月戊子吕夷簡守司空軍國大事與中書門下樞密院同議以聞晏殊同中書門下平章事兼樞密使賈昌朝參知政事夏四月癸卯以邵良佐使夏州甲辰韓琦范仲淹並樞密副使乙巳杜衍樞密使夏竦罷甲子吕夷簡罷與議軍國大事五月乙卯朔日有食之乙亥忻州地震丁亥置武學戊子雨上曰天久不雨將害民田朕每焚薌上禱於天昨寢殿中聞雷遽起冠帶露立殿庭須臾雨霑衣或冀枯苗尚可救秋七月甲子王舉正罷甲戌任中師宣撫河東范仲淹宣撫陜西元昊遣使來八月丁未范仲淹參知政事富弼樞密副使癸丑以韓琦宣撫陜西九月乙亥任中師罷冬十月詔韓琦等曰比以中外人望故決意用卿等今琦暫往陜西仲淹弼宜與宰相得象盡心國事毋或有所顧避其當世急務有可建明者悉爲朕陳之壬寅詔曰虞典考三載之績周官計羣吏之治攷課則有限年之制入官則有循資之格然非襃沮善惡則不激厲非甄别流品則不憤發特頒程式以茂官箴自今京朝官有舉官五人方得磨勘外郎至卿監亦如之其舉者不足增二年甲子鄭戩奏城水洛冬十一月丙寅上清宫災庚寅韓琦使還四年春正月乙亥荆王元儼薨丙子宜州歐希範叛破環州癸未詔自今見任兩府及兩省已上官不得陳乞子弟親戚爲館職其進士及第三人已上者一任囘無過犯須進經術十卷下兩制看詳可否召試入優等方得除館職或闕人即以甞有兩府臣僚二人或大兩省已上三人保薦者並令進文字然後補試之丁亥詔曰周禮大司樂掌學政以六藝敎國子漢制光禄勲典任藉以四行察三省郎今䕃法之所原古典刑之是憲夫冢嗣先録以篤爲後之體支子限年以明入官之重非惟爲國造士是乃爲臣立家咨尓百僚體朕兹意壬辰詔曰廉素者士之常而富貴者是人之所欲也昔先帝詔復公田合王制班禄之差得聖人養賢之道然郡縣受地有無不齊其議所以均之三月壬申詔曰夫儒者通乎天地人之理而兼明古今治亂之原可謂博矣然學者不得騁其說而有司務先聲病章句以牽拘之則吾豪儁竒偉之士何以奮焉士有明純樸茂之美而無敎學養成之法其飭身勵節者使與不肖之人雜而並進則夫懿德敏行之賢何以見焉今朕建學興善以尊子大夫之行而更革弊法以盡學者之材其於敎育之方勤亦至矣有司其務嚴訓導精察舉以稱朕意學者其思進德修業而無失其時於是諸路州府軍監並立學如修學者多及二百人以上許更置縣學夏四月令杜杞往平歐希範五月庚午忻州地震丙戌元昊遣使來稱臣更名曩霄秋七月水洛城成庚戌范仲淹宣撫陜西河東癸未契丹遣邪律元衡來告舉兵攻夏州八月富弼宣撫河北戊戌保州軍亂九月辛卯田況以李昭亮平保州庚午晏殊罷甲申杜衍同中書門下平章事兼樞密使賈昌朝樞密使陳執中參知政事冬十一月壬寅改諡眞宗五后尊諡壬午合祭天地于圜丘大赦天下十二月乙未封曩霄爲夏國王五年春正月乙酉范仲淹富弼罷丙戌杜衍罷賈昌朝同中書門下平章事兼樞密使王貽永樞密使宋庠參知政事吳育龐籍樞密副使二月辛卯詔曰比者京朝官須因人保任始得遷官朕念廉士或不能以自進也其罷之三月己未詔大宗正寺曰朕思古之人君莫不厚親戚以輔王室始邦家而化天下宋興八十餘載宗室蕃衍宜令睦親宅諸院敎授官課經典文詞以聞辛酉韓琦罷甲子杜杞誘歐希範醢之甲申赦陜西戊申章得象罷陳執中同中書門下平章事兼樞密使庚戌呉育參知政事丁度樞密副使秋七月甲子廣州地震乙卯荆南岳州地震冬十月乙卯契丹使來獻㨗辛酉升祔章獻章懿于眞宗廟室大赦天下庚戌宰相罷兼樞密使六年春二月戊寅青州地震三月辛巳朔日有食之庚寅登州地震五月甲申雨雹地震秋八月癸酉吳育樞密副使丁度參知政事九月丁卯登州地震上曰山東連年地震宜防未然之變其下登州嚴武備七年春二月己未賈昌朝吳育罷夏竦樞密使文彦博樞密副使丁酉文彦博參知政事髙若訥樞密副使冬十月乙丑河陽許州地震十一月乙未加上眞宗尊諡戊戌合祭天地于圜丘大赦天下王則反于貝州八年春正月丁丑文彦博宣撫河北閏月辛丑文彦博平貝州甲辰赦河北戊申文彦博同中書門下平章事甲子衞士作亂于禁中丙午王則伏誅夏四月壬辰丁度罷明鎬參知政事五月夏竦罷宋庠樞密使龐籍參知政事六月甲午明鎬薨河北大水冬十二月乙丑朔詔改元皇祐元年春正月甲午朔日有食之二月淯井蠻冦邊秋八月壬戌陳執中罷宋庠同中書門下平章事龐籍樞密使髙若訥參知政事梁適樞密副使九月廣源州蠻冦邕州二年春三月戊子朔詔以九月有事于明堂夏四月乙丑詔曰明堂之禮前代並用鄭康成王肅義說兼祭昊天上帝已爲變禮國朝自祖宗以來三歳一親郊即徧祭天地而百神靡不從祀明堂正當三歳親郊之期而禮官所定上祭昊天五帝而不及地祇又配坐不及祖宗未合三朝之制今移郊爲大享蓋爲民祈福若祭天而不祭地又祖宗不得徧配於禮未安其將來親祀明堂宜合祭昊天皇地祇奉太祖太宗眞宗並配而五帝神州地祇亦親獻日月河海諸神悉如圜丘從祀之數以稱朕躬事天地祖宗神靈之意五月廣源州蠻遁秋九月辛亥大享明堂大赦天下冬十一月秀州地震三年春三月庚申宋庠罷夏五月眉州進瑞麥圖上曰朕嘗禁四方瑞物今則西川麥秀可謂真瑞矣其賜田夫束帛以敦勸之六月無爲軍獻芝草上曰朕以豐年爲瑞賢臣爲寶至於草木蟲魚之異焉足尚哉仍戒州郡自今無得以聞秋七月丙辰詔曰兖州仙源縣自國朝以來孔子子孫知縣事使奉承廟祀近歳廢而不行非所以尊先聖也自今宜以孔子子孫知縣事冬十月作隆儒殿庚子文彦博罷龐籍同中書門下平章事髙若訥樞密使梁適參知政事王堯臣樞密副使四年夏四月廣源州蠻儂智髙反五月乙巳儂智髙陷邕州司戸參軍孔宗旦死之癸丑儂智髙陷横州丙辰陷貴州庚申陷龔州辛酉陷藤州又陷梧州又陷封州守臣曹覲死之壬戌陷康州守臣趙師旦死之癸亥儂智髙陷端州丙寅儂智髙圍廣州六月丁亥狄青樞密副使秋七月壬戌智髙去九月庚午命狄青討儂智髙冬十月丁丑儂智髙陷賓州甲申智髙入據邕州十一月壬寅朔日有食之五年春正月戊午狄青敗儂智髙于歸仁鋪智髙遁二月甲申赦廣南三月甲子奉太祖御容赴滁州太宗御容赴并州真宗御容赴澶州立原廟夏四月壬申狄青還五月乙巳狄青樞密使髙若訥罷丁未孫沔樞密副使六月己亥奏新樂秋閏七月壬申龐籍罷陳執中梁適並同中書門下平章事劉沆參知政事冬十一月己巳合祭天地于圜丘大赦天下至和元年春正月癸酉貴妃張氏薨三月己巳王貽永孫沔罷王德用樞密使田況副使庚申改元夏四月甲申朔日有食之秋七月丁卯程戡參知政事戊辰梁適罷八月丙午劉沆同中書門下平章事冬十月辛卯朔太白晝見二年春三月丙子詔封孔子後爲衍聖公夏四月己亥契丹遣使以其主繪像來獻且求御容六月陳執中罷戊申文彦博富弼並同中書門下平章事冬十二月庚戌太白晝見嘉祐元年春正月庚申皇帝不豫甲子大赦天下二月甲辰御延和殿閏三月癸未王堯臣參知政事程戡樞密副使夏四月河北大氷壬子河決商胡六月乙亥太社太禝壇壞己卯詔曰廼者淫雨降災大水爲沴兩河之間決溢爲患皆朕不德天意所譴其令中外實封言時政闕失毋有所諱秋七月彗出紫微垣八月庚戍朔日有食之癸亥狄青罷韓琦樞密使九月辛卯恭謝天地于大慶殿大赦天下改元冬十一月辛巳王德用罷賈昌朝樞密使十二月戊申朔劉沆罷曽公亮參知政事二年春三月丁丑雄霸州地震三月己未契丹遣邪律防來求御容秋八月丁卯天下置廣惠倉九月契丹遣蕭扈來求御容冬十月乙巳以張昪奉御容使于契丹三年夏六月丙午文彦博罷韓琦同中書門下平章事賈昌朝罷宋庠田況樞密使張昪副使乙亥交趾獻異獸秋八月己未王堯臣薨冬閏十二月丁丑詔曰朕惟國之取士士之待舉皆不可以曠久亦不可以泛宂宂則課校不審久則賢儁或滯用間歳之期而約貢舉之數以精其選著爲定法申敕有司而髙下之往甞不次而用若猶例進終至溢貟故增其任以舉其材緩其進以圖其效此天下之士所同欲而朕果於必行也若夫髙材異行施於有政忠謨嘉猷見諸行事已試之狀爲衆所推必有非常之恩以示至公之道咨尓多士體朕意焉四年春正月丙申朔日有食之三月辛卯詔凡宫室之制器用之度冠服之章妾媵之數其令中外各遵守前後詔條違者御史臺及開封府糾察以聞諸路即委轉運使提㸃刑獄及長吏如詔施行夏四月癸酉詔曰先王推紹天之序尚尊賢之義襃其後嗣賓以殊禮豈非聖人稽古報功之大典哉國家受命之元繼周而王雖民靈欣戴歴數允集而虞賓將遜德美丕顯頃者推原本始襃及支庶恩則厚矣而義未稱將上采姚姒之舊略循周漢之典詳其世嫡優以公爵異其仕進之路申以土田之錫俾寢廟有奉庶幾乎春秋通三統之義厚先代之制矣其以柴氏最長一人封崇義公與河南鄭州差遣給公田十頃以奉周祀至知州資叙即别與差遣却取以次近親人襲爵永爲定式五月丙辰田況罷六月辛亥放宫女二百一十四人冬十月癸酉祫祭于太廟大赦天下五年夏四月癸未程戡罷孫抃樞密副使五月京師地震六月乙丑詔曰朕聞前代之稱治者君臣同心上下輯睦人知禮義之節俗無激訐之風何其德之盛也朕雖弗敏切甞慕焉自今臣僚如有輒上封章告人罪及以赦前事言者並當訊劾之言事之臣雖許風聞宜務大體如事關朝政無憚極論自餘小過細故勿須察舉秋七月庚戌詔曰夫和平醇一之政行則民休美之氣應險刻媮薄之路啓則民戚慘之變生蓋風化之感天下其猶影響之相從也御史執法甞爲朕言宜深詔執事以遏浮競之風其令中書門下務采端厚忠實可以表厲風俗之士並進于朝以啓迪朕心其詭激辨巧敢涉朋比之迹者必行放棄之罰庶幾朝廷清明百異消弭以起治平咨尓攸司其服朕命冬十一月辛丑宋庠罷曾公亮樞密使張昪孫抃參知政事歐陽脩陳升之趙槩並樞密副使六年春三月己亥富弼以母喪罷夏四月庚辰陳升之罷包拯樞密副使六月壬子朔日有食之秋七月癸巳詔曰朕惟善治之主以天下耳目爲視聽而不自任其聦明耳目之官今臺諫之任也夫以四海之廣萬事之衆臺官數人不能以周知固將詢及士大夫而其間傾邪險害之徒不惟朝廷義理所在謂職在言責埶必施行輒徇已之愛憎倚依形似扇造語言以中善良豈朕所以圖治之意哉昔夏后氏之時官師相規漢之公卿耻言人過今吾士大夫乃違古人之守蹈薄俗之爲日益之流漫不知止甚無謂也其令中書門下開儆百工務行敦實閏八月庚子曾公亮同中書門下平章事張昪樞密使歐陽脩參知政事胡宿樞密副使冬十月壬辰詔以皇姪起復知宗正寺七年春正月乙亥詔自今南郊以太祖皇帝定配三月乙卯孫抃罷趙槩參知政事呉奎樞密副使夏五月庚午包拯薨秋八月己卯詔曰人道親親王者之所先務也蓋二帝之隆治由斯出朕甚慕之右衞大將軍岳州團練使某皇兄濮安懿王之子而朕之猶子也少鞠于宫中而聦智仁賢見於夙成向者選於宗子近藉命以治宗正之事使者數至其第乃崇執謙退久不受命朕黙然有嘉焉朕承先帝遺緒奉承聖業罔敢失墜夫立愛之道自親者始固可以厚天下之風而上以嚴夫宗廟也其以爲皇子九月辛亥大享明堂大赦天下八年春二月癸未皇帝不豫甲申赦天下三月辛未皇帝崩于福寧殿聖壽五十四甲午殯于殿之西階羣臣上尊諡曰神文聖武明孝皇帝廟號仁宗冬十月甲午葬永昭陵元豐六年加上尊諡曰體天法道極功全德神文聖武睿哲明孝皇帝臣稱曰神文皇帝即位四十二年恢廓有聖度以大公至正臨御不爲喜怒愛憎之所遷尊敬大臣容受直諫其於宫室苑囿無所興作三司請以玉清舊地爲御苑上曰吾奉先帝苑囿猶謂其廣何以苑爲其事天地宗廟則齊栗不自勝或遇時變必跣足露立致禱於庭退則靜思所以致變者所幸張貴妃每責以正禮見其以珠玉爲飾則却而不視帷帟衾裯多施以繒絁元昊不臣懐以文德契丹渝盟敦守大信專務恭儉以德化民天下大辟有疑而情可閔者皆令上讞之所活歳以千數吏有失入死者則終身不用嘗曰朕未甞詈人以死況敢濫刑罰乎是以四海之内舉熈熈然至於昆蟲草木各安其生又能傳政賢明克昌景祚烏虖仁哉東都事略卷六
