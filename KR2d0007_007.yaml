body:
  text: 東都事略卷七宋王稱撰本紀七英宗體乾膺厯隆功盛德憲文肅武睿聖宣孝皇帝濮安懿王第十三子也母曰仙遊縣君任氏以天聖十年正月三日生宣平坊宅仁宗鞠養于宫中景祐三年授左監門衞率府副率四年遷率府率五年遷左千牛衞將軍又遷左領軍衞將軍寶元二年皇子生以慶厯元年十一月壬申出還濮邸特授右千牛衞大將軍皇祐元年遷右衞大將軍岳州團練使仁宗春秋髙皇嗣未立至和三年不豫天下共以爲憂大臣文彦博富弼韓琦及范鎮司馬光吕誨等屢以爲言嘉祐六年英宗居濮王憂乃命起復右衞大將軍遷秦州防禦使知大宗正寺固辭不受七年立以爲皇子八年春三月辛未仁宗崩奉遺制即皇帝位于匶前尊皇后曰皇太后癸酉大赦天下丙子皇帝不豫己卯詔請皇太后權同處分軍國事夏四月己酉立皇后髙氏皇長子封安國公顥祈國公五月富弼樞密使秋九月辛亥皇長子封淮陽郡王頵封鄠國公冬十月甲午葬神文聖武明孝皇帝於永昭陵己酉赦兩京治平元年春正月改元夏五月戊申皇太后歸政閏月己亥皇長子封頴王顥封東陽郡王冬十一月籍陜西鄉丁為義勇軍十二月吴奎以父憂罷王疇樞宻副使二年春二月癸卯王疇薨三月己巳頒明天厯夏五月癸亥陳升之樞密副使秋七月癸亥富弼罷庚辰張昪罷文彦博樞密使吕公弼副使八月庚寅大雨乙未詔曰蓋聞古之聖賢在位隂陽和風雨時日月光星辰静黎民阜蕃以底休平朕甚慕之朕猥以眇身託於王公之上夙夜以思懼不能上承先帝鴻業而比年以來水潦爲沴乃八月庚寅大雨京師室廬墊傷被溺者衆大田之稼害于有秋竊迹災變之來曽不虛發豈朕之不敏於德而不明於政與將天下刑獄滯寃賦徭煩苦民有愁歎亡聊之聲以奸其順氣與不然何天戒之甚著也今飭躬焦思欲消復大異而未聞在位者之忠言進祈自新厥路何由焉應中外臣僚並許上實封言時政闕失及當世之利病可以佐元元者悉心以陳毋有所諱執政大臣皆朕之股肱協德交脩以輔朕之不逮冬十一月壬申合祭天地于圜丘大赦天下三年春正月丁丑皇太后手書濮安懿王譙國夫人王氏襄國夫人韓氏仙遊縣君任氏宜令皇帝稱親即園立廟詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋爲園即園立廟旣而御史吕誨等言濮王典禮未正議遂寢三月癸酉上以雨潦詔諸路轉運使提㸃刑獄體量刑獄冤滯民間疾苦速行辨理及加賑卹如事稍重即具聞奏夏四月丙申詔曰夫左道亂法淫祀敗俗與夫賊善良之人皆古之所甚禁而在上者所同疾也自今轉運使常行檢察毋得寛縱庚戌胡宿罷郭逵同僉書樞密院事秋九月壬子朔日有食之夏人冦慶州冬十月丁亥詔今後每三年一開科場郭逵宣撫陜西兼權判渭州甲辰羣臣上尊號曰體乾膺歴文武聖孝皇帝十一月戊午皇帝不豫十二月壬寅立皇長子頴王爲皇太子大赦天下四年春正月丁巳皇帝崩于福寧殿聖壽三十八殯于殿之西階羣臣上尊諡曰憲文肅武宣孝皇帝廟號英宗秋八月癸酉葬永厚陵元豐六年加上尊諡曰體元膺歴隆功盛德憲文肅武睿聖宣孝皇帝臣稱曰英宗皇帝之在濳藩也允蹈恭儉力行禮義而天資明叡物望攸屬仁宗皇帝雅知其賢授以重器在位五載盡循父道雖以憂勤損夀然甚盛之德固已度越前王憲章後嗣矣東都事略卷七
