body:
  text: 東都事略卷八宋王稱撰本紀八神宗體元顯道帝德王功英文烈武欽仁聖孝皇帝英宗長子也母曰宣仁聖烈皇后髙氏以慶厯八年四月十日生于濮安懿王之宫邸祥光照室初授率府副率遷率府率嘉祐五年遷右千牛衞將軍英宗入繼大統拜安州觀察使封安國公加同中書門下平章事忠武軍節度使封淮陽郡王治平元年進封頴王四年春正月丁巳英宗崩奉遺制即皇帝位于匶前尊皇太后曰太皇太后皇后曰皇太后戊午大赦天下丙寅吳奎樞密副使戊辰韓琦以司空兼侍中皇弟顥封昌王頵樂安郡王二月詔曰朕常侍先帝左右恭聞德音以本朝舊制士大夫之子有尚帝女者輒皆升行以避舅姑之尊習行既久義甚無謂豈可以富貴之故屈人倫長㓜之序也自今宜革之三月壬申歐陽脩罷癸酉吳奎參知政事閏月庚子詔求直言夏六月辛未詔曰農天下之本也祖宗以來務加惠養比下寛恤之令賜蠲復之恩然而歴年于兹未極富盛間因水旱頗致流離深惟其故殆州郡差役仍重勞逸不均喜爲浮宂之名不急之務以奪其時而害其財故也其令逐路轉運司下州縣如官吏有差役利害可以寛減者實封條析以聞秋八月己巳京師地震癸酉葬憲文肅武宣孝皇帝于永厚陵九月辛卯皇弟顥封歧王頵髙密郡王辛丑韓琦及吳奎陳升之罷吕公弼樞密使張方平趙抃並參知政事韓絳邵亢樞密副使癸卯郭逵罷冬十月己酉張方平以父憂罷癸酉种諤率兵取綏州戊寅詔百官轉對熈寧元年春正月甲戌朔日有食之改元丙申趙槩罷唐介參知政事秋七月癸酉詔謀殺已傷案問欲舉自首從謀殺減二等論己卯陳升之知樞密院事羣臣上尊號曰奉元憲道文武仁孝皇帝司馬光入直因言上尊號非先王令典願陛下推而不居上用光言不許遂終身不受尊號甲申京師地震乙酉又震是夕月有食之辛卯京師地再震八月甲辰京師地震甲子詔封太祖之後爲王九月辛未封從式安定郡王冬十一月丁亥合祭天地于圜丘大赦天下十二月庚申造神臂弓辛酉邵亢罷二年春二月己亥富弼同中書門下平章事庚子王安石參知政事甲子陳升之王安石同制置三司條例三月乙酉詔曰朕以爲欲致治於天下者必富之而後可今縣官之費不給而民財大屈故特詔輔臣置司於内以革其大弊夫事顓於所習則能明乎得失之原今將權天下之財而資之於有司能習知其事者焉則其所得必精所言必通聚而求足固足以成吾富民之術若夫苛刻之論務欲朘削於下而斂怨於上者斯亦朕之不取宜令三司判官諸路監司及内外官限受詔後兩月各具財用利害聞奏夏四月甲辰詔曰方夏大旱麥將槁朕惟災變之來蓋不虚發豈朕政令未孚聽納靡中以致厥咎與其罷同天節上夀公卿大夫其勉脩厥職以圖脩復丁未唐介薨丙辰詔曰傳曰近臣盡規以其榮耻與上同也今此在位者視朕過失與朝廷政事之闕黙而不言乃或私議竊歎若以其責不在已夫豈皆習見成俗以爲當然其以有含章懷寶待倡而發者也今百度墮弛風俗偷惰薄蝕災異譴告不一此誠忠賢助朕憂惕以剏制改法救弊除患之時宜令侍從官自今視朕過失與朝廷政事之闕無有巨細各具章極言無隱噫言善而不用朕有厥咎道之而不言爾爲不恭朕將用此攷察在位所以事君之實而明黜陟焉丁巳遣使八人相度農田水利稅賦科率徭役利害五月壬辰太皇太后遷居慶壽宫冬十月丙申富弼罷陳升之同中書門下平章事十一月韓絳同制置三司條例甲戌詔裁宗室授官法唯宣祖太祖太宗之子擇其後一人爲公世世不絶其餘元孫之子將軍以下聽出外官袒免之子更不賜名授官許令應舉初吕夷簡在仁宗時改宗室補環衞官驟増廪給其後費大而不可止至韓琦爲相嘗議更之而不果上即位遂行之閏月壬子置諸路提舉常平廣惠倉行青苗法應郡縣毎歳春秋未熟據民等第以常平及廣惠倉錢斂散取息三年春正月詔諸路常平廣惠倉給散青苗錢本以惠䘏貧乏並取民情願今慮官吏不體此意追呼均配抑勒翻成騷擾其令諸路提㸃刑獄官體量覺察違者立以名聞敢沮抑願請者按罰亦如之二月壬申司馬光樞密副使光辭三月己亥廷試進士始用策夏四月己卯趙抃罷韓絳參知政事五月罷條例司壬子罷入閣戊午新作來逺驛六月丁丑宗室承亮等襲封秋七月壬辰吕公弼罷馮京樞密副使九月夏人冦慶州乙未韓絳宣撫陜西庚子曾公亮罷辛丑馮京參知政事吳充樞密副使冬十月夏人冦環慶戊寅陳升之以母憂罷十一月韓絳爲陜西河東宣撫使十二月乙丑行保甲法于諸路丁卯韓絳王安石並同中書門下平章事王珪參知政事四年春二月丁巳朔罷貢舉詞賦科以經術取士壬申皇弟頵封嘉王夏人犯延州慶州軍亂三月丁未韓絳罷夏五月己亥月有食之司農寺以免役法頒天下秋九月辛卯大享明堂大赦天下夏國主秉常請綏州冬十一月丙申月有食之增廣太學置三舍五年春二月丙寅蔡挺樞密副使三月丙午京師置市易務夏六月乙亥置武學冬十月王韶收復鎭洮軍十二月壬午陳升之樞密使六年春正月辛亥詔奉僖祖神主爲太廟始祖二月丙申克河州遂復洮岷曡宕等州夏四月甲戌朔日有食之己亥文彦博罷冬十月章惇開梅山十二月癸未詔在京納免行錢旱七年春正月乙卯皇子俊封永國公二月甲申吐蕃青宜結鬼章圍河州景思立與戰于踏白城死之三月丙午王韶軍寧河解河州圍己酉木征降丙辰遼主遣蕭禧來言薊應朔三州地界命韓縝報聘又命劉忱蕭士元吕大忠同商量地界于代州乙丑詔曰朕渉道日淺晻于致治政失厥中以干隂陽之和乃冬迄春旱暵爲虐四海之内被災者廣間詔有司損常膳避正殿冀以塞責消變歴日滋久未䝉休應嗷嗷下民大命近止中夜以興震惕靡寧永惟其咎未知攸出意者朕之聽納不得於理與獄訟非其情與賦斂失其節與忠謀讜言鬱於上聞而阿諛壅蔽以成其私者衆與何嘉氣之久不效也應中外文武臣僚並許實封直言朝政闕失朕將親覽攷求其當以輔政理三事大夫其務悉心交儆成朕志焉夏四月己巳上以久旱見輔臣嗟嘆懇惻王安石曰水旱常數堯湯所不免陛下即位以來累年豐稔今旱暵雖逺但當修益人事以應天災耳上曰朕所以恐懼如此者正爲人事有所未修也辛未頒方田制度丙戍王安石罷韓絳同中書門下平章事吕惠卿參知政事己丑詔曰朕嘉先王之法澤於當時而傳於後世可謂盛矣故夙興夜寐八年于兹度時之宜造爲法令布之四方皆稽合先王參攷羣策而斷自朕志已行之效固已可見士大夫其務奉承之以稱朕意遼主遣蕭素梁頴來辛亥罷制科秋九月蔡挺請置三十七將河北十七府界七京東十京西三冬十月己未合祭天地于圜丘大赦天下王韶樞密副使八年春正月庚子蔡挺馮京罷二月丙寅皇子僴封景國公癸酉王安石同中書門下平章事三月庚子遼主再遣蕭禧來命韓縝乗驛會議癸丑命沈括使于遼夏四月戊寅吳充樞密使庚寅廢沙苑監閏月己未陳升之罷壬子宗室世居反伏誅秋八月庚戌韓絳罷冬十月庚戌吕惠卿罷丁酉彗出軫己亥詔求直言壬寅大赦天下十二月壬寅元絳參知政事曾孝寛僉書樞密院事乙巳皇子僴薨交趾陷欽廉白三州辛亥命趙卨李憲討之尋罷憲以郭逵爲宣撫使而卨副之九年春正月庚辰交趾陷邕州守臣蘇緘死之秋八月壬辰詔司農寺罷鬻天下祠廟冬十月丙午王安石罷吳充王珪並同中書門下平章事馮京知樞密院事十二月甲午遣内侍李憲措置邊事十年春二月己亥王韶罷丙午交趾李乾德納款夏五月廖恩叛于南劒州秋七月己亥廖恩降冬十月癸巳詔濮安懿王諸子襲封濮國王奉祠事後承襲遍即傳長孫庚子皇子俊薨十一月甲戌合祭天地于圜丘大赦天下十二月壬午詔改元丁亥皇第六子封均國公价建國公元豐元年春正月庚申月有食之閏月壬辰孫固同知樞密院事己亥曾孝寛以父憂罷秋九月乙酉吕公著薛向並同知樞密院事冬十月丁未重修都城畢工興役凡三年十二月壬子皇子价薨置大理獄二年春瀘州蠻乞弟反以韓存寶討之三月庚辰以内侍宋用臣導洛通汴夏五月庚辰詔曰濮安懿王先帝斟酌典禮即園立廟詔王子孫歳時奉祀義叶恩稱後世無得議焉今三夫人名位或未正塋域或異處有司置而不講曷足以彰先帝甚盛之德仰承在天之志乎三夫人可並稱曰王夫人命主司擇歳月遷祔濮園甲申元絳罷戊子蔡確參知政事六月清汴成冬十月庚戌赦天下乙卯太皇太后曹氏崩十二月乙巳詔酌周官賔興之意立太學三舍選察升補之法三年春二月丙午章惇參知政事三月乙丑吳充罷癸酉葬慈聖光獻皇后于永昭陵秋七月甲戌詔曰朕惟皇以道帝以德王以業各因時制名用配其實何必加崇稱號以自飭哉秦漢以來尊天子曰皇帝其亦至矣朕承祖宗之休宅士民之上凡虚文繁禮悉已革去而近司羣辟猶或時以稱號見請雖出於歸美報上之忠然非朕所以若稽先王之意自今毎遇大禮罷上尊號癸未彗出西方丙戌詔曰乃孟秋癸未彗出西方朕甚懼焉其令中外臣僚並許直言朝政闕失朕虚心以改丁亥詔曰孝莫大於嚴父嚴父莫大於配天而屬有尊親之殊禮有隆殺之别故逺而尊者祖則祀於郊之圜丘而配天邇而親者禰則祀於國之明堂而配上帝圜丘祀天則對越諸神明堂則上帝而已故其所配如此然後足以適尊親逺近之義其將來祀英宗皇帝於明堂惟以配上帝餘從祀羣臣悉罷八月乙巳詔曰朕嘉成周以事建官以爵制禄小大詳要莫不有叙分職率屬而萬事條理國家受命百年而官政尚愧前聞參酌損益趨時之宜使臺省寺監之官實典職事領空名者一切罷去而易之以階因以制禄凡厥恩數悉如舊章中書具奏九月乙亥初行官制辛巳大享明堂用新樂大赦天下癸未薛向孫固並改樞密副使丙戍皇弟顥封雍王頵曹王馮京樞密使薛向罷丁亥吕公著改副使冬十月甲戍月有食之十一月己丑朔日有食之四年春正月改五路義勇爲保甲辛亥馮京罷孫固知樞密院事韓縝同知院事三月癸卯章惇罷甲辰張璪參知政事夏四月种諤言夏人害其主秉常議討之遣内侍王中正節制鄜延内侍李憲節制環慶涇原髙遵裕以環慶之師劉昌祚以涇原之師种誼以鄜延之師問罪夏人辛未月有食之五月庚子皇子倜薨秋七月癸卯斬韓存寶于軍更命林廣將存寶兵平乞弟九月乙酉復蘭州冬諸將之師至靈州城下敗績十二月詔班師林廣與乞弟戰敗之五年春正月林廣追逐乞弟至歸徠州二月癸巳還師夏四月壬子日有食之癸丑更官制以王珪爲尚書左僕射兼門下侍郎蔡確尚書右僕射兼中書侍郎章惇門下侍郎張璪改中書侍郎蒲宗孟尚書左丞王安禮尚書右丞丁丑吕公著罷六月丙辰詔自今事不以大小並中書省取㫖門下省覆奏尚書省施行三省同得㫖更不帶三省字行出是日輔臣有言中書省獨取㫖事體太重上曰三省體均中書省揆而議之門下省審而覆之尚書省承而行之茍有不倫自可論奏不當縁此以亂體制也秋八月壬子皇第六子封延安郡王九月甲戍城永樂夏人來攻戊戌城陷徐禧李稷李舜舉死之冬十一月乙酉奉安祖宗神御于景靈宫大赦天下六年春正月丁丑朔新玉輅毁夏閏六月乙亥朔夏國主秉常納款壬辰皇子佖封儀國公庚子加上仁宗英宗尊諡秋七月丙辰孫固罷韓縝知樞密院事安燾同知院事八月丁亥月有食之辛卯蒲宗孟罷王安禮尚書左丞李清臣尚書右丞冬十月夏國主秉常遣使來甲戍皇第十一子封寧國公十一月丙午祭昊天上帝于圜丘大赦天下七年春三月丁巳皇子延安郡王侍宴于集英殿秋七月甲寅王安禮罷八月己丑皇子俁封成國公冬十一月庚午皇子似封和國公八年春正月戊戌皇帝不豫甲辰大赦天下三月甲午朔皇太后垂簾立皇子延安郡王爲皇太子乙未大赦天下戊戌皇帝崩于福寧殿聖壽三十八殯于殿之西階羣臣上尊諡曰英文烈武聖孝皇帝廟號神宗冬十月乙酉葬永裕陵紹聖二年加上尊諡曰紹天法古運德建功欽仁皇帝崇寧三年再加上尊諡曰紹天法古運德建功英文烈武欽仁聖孝皇帝政和三年改上尊諡曰體元顯道帝德王功英文烈武欽仁聖孝皇帝臣稱曰宋自建隆迄于治平百年之間四聖相授深仁厚澤浹于人心者至矣承平日久事多舒緩神宗皇帝乃慨然圖乂立政造事以新一代之治於是廣親親之道以睦九族尊經術之士以作人材弛力役以便民通貨財而阜國時散薄斂以行補助之政嚴修保伍以爲先事之防興水土之利而厚農桑分南北之祀而侑祖禰酌六典以正百辟制九軍而攘四夷凡所制作欲以逺迹治古可謂厲精之主矣雖然銳于始者其終必悔神宗末年蓋亦悔矣而臣下不能將順其意此後日繼述之論所由起也東都事略卷八
