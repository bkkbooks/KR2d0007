body:
  text: 東都事略卷九宋王稱撰本紀九哲宗憲元繼道顯德定功欽文睿武齊聖昭孝皇帝神宗第六子也母曰欽成皇后朱氏以熙寧九年十二月七日生赤光照室十年授天平軍節度使封均國公元豐五年改鎮彰武封延安郡王七年神宗宴百官于集英殿哲宗初侍立于朝天表粹溫進止中度宰臣王圭稱賀神宗曰皇家慶事與卿等同之令皇子與圭等相見圭等再拜稱謝八年春神宗寢疾彌留二月癸未王圭奏言去冬常奉聖訓皇子延安郡王來春出閣願蚤建東宫又奏請皇太后權同聽政神宗首肯越明日三月甲午朔皇太后垂簾於福寧殿是日立哲宗為皇太子戊戍神宗崩奉遺制即皇帝位于匶前尊皇太后曰太皇太后皇后曰皇太后德妃朱氏為皇太妃己亥大赦天下皇叔皓封楊王頵荆王皇弟封遂寧郡王佖大寧郡王俁咸寧郡王似普寧郡王夏四月辛未詔寬保甲養馬壬申罷免役錢五月乙未詔求直言庚戌王圭薨戊午蔡確尚書左僕射兼門下侍郎韓縝尚書右僕射兼中書侍郎章惇知樞密院事司馬光門下侍郎六月丁亥詔曰朕紹承燕謀獲奉宗廟初攬庶政鬱于大道夙夜祇畏不敢皇寧懼無以章先帝之休烈而安輯天下之民永惟古之王者御政之始必明目逹聰以防壅蔽敷求讜言以輔不逮然後物情遍以上聞利澤得以下究詩不云乎訪豫落止此成王所以求助而羣臣所以進戒上下交警以遂文武之助朕甚慕焉應中外臣僚及民庶並許實封直言朝政闕失民間疾苦在京於登聞檢鼓院投進在外於所屬州軍驛置以聞朕將親覽以考其中而施行之秋七月戊戌吕公著尚書左丞罷保甲八月丙子日有食之既冬十月乙酉葬英文烈武聖孝皇帝于永裕陵丙戌罷方田元祐元年春正月庚寅朔改元丙戌太皇太后詔曰原廟之立所從來久矣前日神宗皇帝初即祠宫並建寢殿以崇嚴祖考其孝可謂至矣今神宗既已升祔於故事當營館御以奉神靈而宫垣之東密接民里欲加開展則懼成煩擾欲採搢紳之議皆合帝后為一殿則慮無以稱神宗欽奉祖考之意聞治隆殿後有園池以后殿推之本留以待未亡人也可即其地立神宗原廟吾萬歲之後當從英宗皇帝於治隆上以寧神明中以成吾子之志下以安民之心不亦善乎二月乙丑罷雇役丁卯詔內外待制大中大夫以上各舉監司二人閏月庚寅蔡確罷司馬光尚書左僕射兼門下侍郎壬辰吕公著門下侍郎丙午李清臣尚書左丞吕大防尚書右丞辛亥章惇罷乙卯范純仁同知樞密院事夏四月己丑韓縝罷壬寅吕公著尚書右僕射兼中書侍郎文彥博以太師平章軍國重事五月丁巳朔韓維門下侍郎秋七月辛酉詔以十科舉士八月辛卯罷俵青苖壬辰皇弟偲封祁國公九月丙辰朔司馬光薨辛酉大享明堂大赦天下己卯張璪罷冬十月戊午吕大防中書侍郎劉摯尚書右丞以浮屠安強葭蘆米脂四寨歸于夏人二年春三月丁巳太皇太后詔曰祥禫既終典策告具而有司遵用章獻明肅皇后故事豫當受册於文德殿雖皇帝盡孝愛之意務極尊崇而朝廷有損益之文各從宜稱仰惟章獻明肅皇后輔佐真廟擁佑仁宗茂業豐功宜見隆異顧豫涼薄絶企徽音稽用舊儀實有慙德所有將來受册可止就崇政殿太皇太后諭執政曰母后臨朝非國家盛事文德殿天子正牙豈女主所當御哉夏四月旱辛卯詔曰朕承祖宗之休獲紹大統而涉道日淺昧于致治萬事失中以千隂陽之和乃自冬迄夏旱暘為虐四方之內被災者廣生民嗷嗷無所告勞永維災變之來蓋不虛發意者朕之聽納不得於理與功罪失當而賦稅無節與民力屈竭而土木不息與抑忠言壅於上聞而德澤不下流與何災異之滋至也非克已思過洗心修德其何以答塞天變協至太和可自今避正殿減常膳公卿大夫其勉修厥職共圖消復己亥太皇太后詔曰有司奏受册當依典故在從吉之後夫册典備物以致隆名國之盛禮也行於和平之日懼不克稱況今旱暵為虐苗稼將稿民則何罪咎實在豫雖側躬永思損膳自戒尚慮無以塞責消變而有司乃於此時欲以隆名盛禮加我是實豫之不德所有將來受册禮宜權停罷丁未詔曰祖宗設六科之選策三道之要以網羅天下賢俊先皇帝興學校崇經術以作新人材變天下之俗故科目之設有所未遑今天下之士多通於經術而知所學矣宜復制策之科以徠拔俗之材裨于治道蓋乃帝王之道損益趨時不必盡同同歸于治而已今復置賢良方正能直言極諫科自今年為始西蕃酋鬼章犯南川寨遂城洮州遣遊師雄行邊五月丁亥李清臣罷劉摯尚書左丞王存尚書右丞六月辛丑安燾知樞密院事秋七月辛未韓維罷八月遊師雄以种誼入洮州擒鬼章青宜結以獻三年夏四月辛巳吕公著以司空平章軍國事吕大防尚書左僕射兼門下侍郎范純仁尚書右僕射兼中書侍郎孫固門下侍郎劉摯中書侍郎王存尚書左丞胡宗愈尚書右丞趙瞻僉書樞密院事六月夏人冦邊荆王頵薨秋七月癸丑太皇太后詔有司褒崇皇太妃討論典故以聞夏人冦邊八月皇叔皓封徐王冬閏十二月甲辰詔百官觀新樂甲寅太皇太后詔曰官冗之患所從來尚矣流弊之極實萃于今以闕計貟至相倍蓰上有久間失職之吏則下有受害無告之民故命大臣考求其本茍非裁損入流之數無以澄清取士之原吾今自以眇身率先天下永惟臨御之始嘗敕有司蔭補私親舊無定限自惟薄德敢配前人已詔家庭之恩止從母后之比今當又損以示必行夫以先帝顧託之深天下責望之重茍有利於社禝吾無愛於髮膚矧此恩私實同毫末忠義之士當識此誠各忘內顧之恩共成節約之制今後每遇聖節大禮生辰合得親屬恩澤並四分減一皇太后皇太妃準此四年春二月甲辰吕公著薨三月己卯胡宗愈罷夏五月甲申月有食之六月甲辰范純仁王存罷丙午韓忠彥尚書左丞許將尚書右丞趙瞻同知樞密院事秋七月庚辰安燾以母憂罷九月辛巳大享明堂大赦天下冬十一月癸未孫固知樞密院事劉摯門下侍郎傅堯俞中書侍郎五年春二月庚戌文彥博致仕三月丙寅朔趙瞻薨壬申韓忠彥同知樞密院事蘇頌尚書左丞夏四月丙午孫固薨自去冬不雨至于五月丁亥始雨冬十二月辛卯朔許將罷六年春二月辛卯劉摯尚書右僕射兼中書侍郎王巖叟僉書樞密院事癸巳蘇轍尚書右丞秋上清儲祥宫成冬十月庚午幸太學十一月乙酉朔劉摯罷辛丑傅堯俞薨七年夏四月己未立皇后孟氏甲子詔皇后具六禮五月戊戌御文德殿發册以吕大防為奉迎使六月辛酉蘇頌尚書右僕射兼中書侍郎蘇轍門下侍郎韓忠彥知樞密院事范百祿中書侍郎梁燾尚書左丞鄭雍尚書右丞劉奉世僉書樞密院事王巖叟罷秋九月壬辰太皇太后謂輔臣曰郊祀依仁宗先帝故事吕大防蘇轍蘇頌以天地合祭為是范百祿以元豐六年南郊分祀上帝配以太祖未可輕改大防等議以皇帝即位未嘗親祀天地合行合祭之禮為有名遂降詔曰國家郊廟時祀祖宗以來命官攝事惟三歲一親郊則饗清廟冬至合祭天地于圜丘元豐間有司援周制以合祭不應古義先帝詔定親祠北郊之儀未之及行是歲郊不設皇地示位而宗廟之饗率如權制朕以涼昧嗣承六聖休德鴻緒今茲禋禮奠幣上帝祼鬯廟室而地示大神久未親祀矧朕方郊見天地之始其冬至日南郊宜依熙寧十年故事設皇地示位以嚴並況之報冬十一月癸巳合祭天地于圜丘大赦天下八年春三月甲申蘇頌罷辛卯范百祿罷夏四月癸丑詔曰方夏暑時動植之類皆以遂其長養而吾民觸禁抵法繫縛囹圄其深文之吏或不能體朕欽恤之意因循延蔓久不為決干隂陽之和非細故也其詔天下官師之長敬若時令哀矜庶獄以丕應朕志丁巳詔曰朕惟祖宗嚴奉郊廟每以三歲對越二儀先帝元豐之末講方丘特祭之儀蓋將補一代之闕容振百王之墜典朕以菲德嗣守丕基列聖已行謹當遵奉先朝未舉懼不克堪理既不疑事無可議今後南郊合祭天地依元祐七年例施行六月戊午梁燾罷秋七月丙子朔范純仁尚書右僕射兼中書侍郎八月辛酉太皇太后不豫戊辰大赦天下九月戊寅太皇太后髙氏崩于壽康殿是月皇帝親政紹聖元年春二月丁未李清臣中書侍郎鄧潤甫尚書右丞鄭雍尚書左丞己酉葬宣仁聖烈皇后于永厚陵三月壬申朔日有食之乙亥吕大防罷戊子皇叔皓封冀王丁酉蘇轍罷夏四月癸丑改元壬戌章惇尚書左僕射兼門下侍郎范純仁罷閏月癸酉詔罷十科舉士甲申安燾門下侍郎五月甲辰詔進士專治經術辛亥劉奉世罷乙丑鄧潤甫薨丁卯復免役保甲法六月癸未曾布同知樞密院事貶責元祐臣寮秋九月庚戌罷制科冬十二月甲午貶責元祐史官范祖禹趙彥若黃庭堅二年春三月加上神宗尊諡夏四月庚午詔恤刑獄秋九月辛亥大享明堂大赦天下冬十月甲子鄭雍罷甲戌許將尚書左丞蔡卞尚書右丞辛巳皇叔皓封楚王十一月乙未安燾罷三年春正月庚子韓忠彥罷二月夏人犯邊戊子詔罷合祭自今間因大禮之歲以夏至之日躬祭地祇于北郊三月辛亥皇弟佖封申王皇弟封端王六月夏人冦邊秋七月癸卯月有食之九月折可適與夏人戰于雞􅀈嶺敗之己酉滁州沂州地震壬子楚王皓薨乙卯皇后孟氏廢居瑶華宫冬十月夏人犯邊四年春正月庚戌李清臣罷二月章惇言司馬光等已追貶而吕大防劉摯梁燾等亦宜量罪示罰凡三十七人皆貶甲子文彥博降太子少保閏月壬寅曾布知樞密院事林希同知院事許將中書侍郎蔡卞尚書左丞黃履尚書右丞夏六月癸未朔日有食之秋八月己酉彗出西方九月壬子詔曰彗出西方災譴為大朕甚懼焉公卿各宜悉心修政輔朕不德仍許中外臣僚直言朝政闕失朕將親覽乙卯大赦天下元符元年春三月戊午殺內侍陳衍乙丑咸陽民段義獻玉璽甲戌皇弟俁封莘王似簡王偲永寧郡王夏四月壬辰林希罷五月戊申朔皇帝受傳國寶吕惠卿帥師破夏人于大沙堆六月戊寅朔改元冬十一月甲子祀昊天上帝于圜丘大赦天下二年春三月遼國遣蕭德崇來夏四月癸巳皇弟偲封睦王五月癸亥進策西安城于天都山六月詔親祀北郊並依南郊儀制秋八月皇子生赦天下丁酉王贍招納青唐王子瞎征九月庚子朔夏國遣使來丁未以賢妃劉氏立為皇后閏月收復青唐以瞎征隴拶等來歸辛巳黃履罷乙未皇子薨三年春正月戊寅大赦天下己卯皇帝崩于福寧殿聖壽二十五殯于殿之西階羣臣上尊諡曰欽文睿武昭孝皇帝廟號哲宗七月壬寅葬永泰陵崇寧三年加上尊諡曰憲元繼道世德揚功欽文睿武齊聖昭孝皇帝政和三年改上尊諡曰憲元繼道顯德定功欽文睿武齊聖昭孝皇帝臣稱曰哲宗皇帝爰自沖年嗣膺大歷是時宣仁共政登進忠賢以安天下故元祐致治之盛庶幾仁宗及紹聖親政起熙豐舊人而用之元祐政事一切務以相反烏呼哲宗之英毅開敏有能致之資惜乎大臣不以忠厚而事其上也東都事略卷九
