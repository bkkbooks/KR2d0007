body:
  text: 東都事略卷十二宋王稱撰本紀十二欽宗恭文順德仁孝皇帝徽宗長子也母曰顯恭皇后王氏以元符三年四月己酉生于坤寧殿時徽宗甫登位即生嫡長欲異其禮越三日辛亥大赦授山南東道節度使封韓國公建中靖國元年改鎮興德封京兆郡王崇寧二年拜司空移鎮武昌封定王三年拜太保五年立為皇太子宣和七年金人入侵除開封牧徽宗內禪以十二月辛酉即皇帝位于垂拱殿徽宗出居龍德宫吳敏門下侍郎壬戌大赦天下立皇太子妃朱氏為皇后甲子尼堪圍太原耿南仲僉書樞密院事金人陷信德府丙寅上道君皇帝尊號曰教主道君太上皇帝母皇后曰道君太上皇后詔改元靖康元年春正月丁卯朔詔求直言戊辰金人犯濬州內侍梁方平以其兵遁大將何灌亦望風潰金人遂度河已已詔親征吳敏知樞密院事道君皇帝東幸庚午李綱尚書右丞宇文粹中扈從東幸綱建議城守罷親征以綱為行營使辛未白時中罷李邦彥太宰兼門下侍郎張邦昌少宰兼中書侍郎趙野門下侍郎王孝迪中書侍郎蔡懋尚書左丞金人逼京師癸酉斡里雅布軍至城下遣李梲鄭望之使于軍前金人移壁開逺門唐恪同知樞密院事蔡懋為京城四壁守禦使金人攻通天景陽門又攻陳橋封丘衛州等門大將何灌死之丙子皇弟康王使金營庚寅張邦昌從康王詣金營辛巳道君皇帝至鎮江府路允迪僉書樞密院事大風吹沙皇子諶封大寧郡王乙酉路允迪使河東尼堪軍丁亥种師道姚平仲兵至闕下以師道同知樞密院事京畿河東北路宣撫使四方勤王並隸之己丑种師道與金人戰于板橋敗之癸巳大霧四塞二月李梲鄭望之至金營金先遣梲歸是夜姚平仲率步騎萬人劫金寨以敗還李綱罷庚子金人求上母弟為質辛丑以宇文虛中王俅使斡里雅布軍齎割三鎮詔書以往太學生伏闕上書擅殺內臣于闕下李綱復為尚書右丞金人遣王汭隨宇文虛中來報聘金人攻咸豐門癸卯皇弟肅王樞使斡里雅布軍蔡懋罷徐處仁中書侍郎宇文虛中僉書樞密院事乙已以宇文虛中王俅再使斡里雅布軍是日康王還自金營丙午罷明堂頒朔布政丁未金人退師戊申大赦天下詔曰自今庶事並遵用祖宗舊制選用大臣裁抑內侍不崇飾恩幸不聽任姦人不輕爵祿不濫賜豫不奪爾居以營燕遊之地不竭爾力以廣浮用之費凡蠧國害民之事一切寢罷咨爾有衆明聽朕言庚戌李邦彥罷張邦昌太宰兼門下侍郎吳敏少宰兼中書侍郎李綱知樞密院事耿南仲尚書左丞李梲尚書右丞辛亥宇文粹中罷癸丑种師道罷尼堪兵次髙平甲寅童貫蔡攸貶貫仍致仕金人陷隆德府守臣張確死之辛亥斬梁方平于都市遣王雲曹曚使斡里雅布軍王孝迪罷三月戊辰李梲罷已已張邦昌罷徐處仁太宰兼門下侍郎唐恪中書侍郎何栗尚書右丞許翰同知樞密院事庚子宇文虛中罷命趙野蔡攸奉迎道君皇帝辛巳道君皇帝至南京壬午詔曰朕承道君皇帝付託之重即位十有四日金人之師已及都城大臣建言捐金帛割土地可以紓禍賴宗廟之靈守備弗缺久乃退師而金人要盟終弗可保今肅王度河北去未還尼堪深入南陷隆德又所過殘破州縣掠士女朕夙夜追咎何痛如之已詔元主和議李邦彥及奉使許地之人悉行罷黜又詔种師道姚古种師中往援三鎮朕惟祖宗之地尺寸不可與人且保塞陵寢所在誓當固守不忍陷三鎮二十州之民以偷頃刻之安與民同心永保疆土播告中外使知朕意癸卯命李綱迎道君皇帝于南京辛卯李綱自南京還夏四月丁酉朔立大寧郡王諶為皇太子戊戍夏人冦震威城己亥道君皇帝至自南京入居龍德宫癸卯耿南仲門下侍郎戊申置詳議司于尚書省己酉趙野罷壬子斡里雅布遣賈霆冉企來甲寅以种師道為河北河東宣撫使戊午皇弟栻封和王榛信王癸亥誅趙良嗣五月庚午寒如深冬甲戌赦河北丁丑种師中與金人戰于榆次死之甲申罷詳議司六月戊戌李綱為河北河東宣撫使辛丑以劉韐為副使壬寅皇弟楃封安康郡王楗廣平郡王詔曰朕既詔三省樞密院並依祖宗舊法而羣臣庶士亦當講孔孟之正道察安石舊説之不當者壬戌彗出紫微垣秋七月辛卯誅童貫勝捷軍叛犯濮州韓世忠討平之八月辛丑詔以彗見條具疾苦俾官吏除苛解嬈冀召和氣折可求與金人戰敗績退保汾州甲辰以宗澤使斡里雅布軍李若水使尼堪軍己未徐處仁吳敏罷唐恪少宰兼中書侍郎何栗中書侍郎陳過庭尚書右丞許翰罷聶昌同知樞密院事李回僉書樞密院事九月丙寅尼堪陷太原府帥張孝純為金人所執戊寅李綱罷分天下為四道置四帥帶都總管北京帥總北道西京帥總西道南京帥總東道鄧州帥總南道冬十月丁酉金人陷真定府戊戌金人遣楊天吉王汭來欲割三鎮要尊號車輅等朝廷以帝號車輅及三鎮稅數遣王雲同汭行庚子陷汾州守臣張克戩死之丁未馮澥知樞密院事壬子皇弟康王使斡里雅布軍以王宇為尚書左丞副之宇辭行貶以馮澥代之丙辰金人犯平陽府澤州十一月丙寅夏人陷懷德軍守臣劉銓通判杜翊世死之戊辰康王還馮澥罷王雲還言金必欲得三鎮庚午詔河東河北京畿清野甲戌金人度河乙亥命皇弟康王再使斡里雅布軍王雲副之京師戒嚴丁丑何栗罷陳過庭中書侍郎孫傅尚書右丞庚辰康王至相州辛巳命聶昌領守禦使壬午康王次磁州磁人殺王雲康王回相州命耿南仲使斡里雅布軍聶昌使尼堪軍甲申孫傅同知樞密院事曹輔僉書樞密院事乙酉斡里雅布軍至城下丁亥李回罷金人攻通津門楊天吉等再來己丑張叔夜以南道勤王之師到闕庚寅皇帝幸東壁勞軍何栗門下侍郎閏月壬辰皇帝幸西壁唐恪罷改太宰少宰復為左右僕射以何栗為尚書右僕射兼中書侍郎癸巳皇帝幸東壁是日迎土牛以借春甲午皇帝幸北壁大雨雪金人陷懷州守臣霍安國死之乙未皇帝幸西壁丙申皇帝幸南壁金人陷拱州丁酉赤氣亘天馮澥尚書左丞尼堪兵薄南壁王宗濋下城與金人戰敗績庚子皇帝幸東壁張叔夜僉書樞密院事金人攻宣化門壬寅皇帝幸北壁癸卯聶昌至絳州遇害甲辰大雪金人陷亳州丙午大雪金人為鵝車以攻城己酉命皇弟康王為兵馬大元帥辛亥金人來議和要親王出盟壬子遣曹輔馮澥及宗室仲溫士􅧘使于金營癸丑仲溫士􅧘還甲寅至丙辰大風雪不止金人陷京師上曰朕不用种師道言以至於此初敵騎之去也師道常勸上半度擊之不然異日必為後患至是果然金人遣蕭慶等四人來要皇帝會盟議欲請道君皇太子越王鄆王為質上曰朕為人子豈可以父為質哉丁巳道君皇帝入居延福宫金人盡得四壁遣李若水再使金營金人招宰相議事乃遣何栗及濟王栩栗栩回同金人四人來議和自乙卯雪大作盈三尺不止天地晦冥雪霽彗星竟天己未何栗再往軍前詔曰大金堅欲道君出郊朕以宗廟生靈之故義當親往咨爾衆庶無致驚疑庚申旦日赤如火辛酉皇帝出郊入金營十二月壬戌朔皇弟康王開兵馬大元帥府于相州癸亥皇帝還宫甲子金人來索金一千萬鋌銀二千萬鋌練帛如銀之數以犒軍乙丑詔曰元祐皇后逮事宣仁聖烈皇后欽聖憲肅皇后又曽經送哲宗皇帝山陵元符之末欽聖憲肅皇后垂簾曽降指揮復册命為元祐皇后可檢會恭依元降指揮仍尊為元祐皇后以順天下之意丙寅遣陳過庭劉韐折彥文往河北河東割地金人拘過庭于軍前丁卯金人來索軍器乙亥皇弟康王如大名府是夜京師火癸未詔曰風雪大寒小民闕乏凍餒皆朕不德所致其艮山竹木許任便樵採庚寅皇弟康王如東平府金人犯蔡州二年春正月庚子皇帝再出郊入金營丙午劉韐死于金營二月丙寅吳幵莫儔自金營持文書令依金主詔推薦異姓堪為人主者從軍前備禮册命仍邀道君皇帝出城丁卯道君皇帝道君皇后同出郊鄆王楷以下諸王妃公主都尉皆從燕王越王亦出辛未皇后皇太子同出郊壬申孫傅張叔夜往軍前戊寅金歸張邦昌庚辰康王如濟州金人無禮於我李若水死之乙酉金人以金銀不足殺梅執禮程振陳知質安扶三月辛卯朔張邦昌入京師丙申吳革謀起義不克死之丁酉金人立張邦昌國號大楚宗澤與金人戰于長垣敗之庚子金人來取宗室甲辰金人入內藏庫乙卯馮澥曹輔路允迪等還何栗孫傅張叔夜秦檜司馬朴以廢立異議令舉家北遷丁巳道君皇帝北狩夏四月庚申朔皇帝北狩金人退師遂取河東河北地辛酉康王以檄書告諭四方壬戌邦昌迎元祐皇后入居延福宫號宋太后癸亥羣臣勸進于康王甲子邦昌以書至大元帥府丁卯謝克家以邦昌之命齎玉璽至大元帥府戊辰邦昌請元祐皇后垂簾聽政庚午邦昌復辟癸酉在京文武百官勸進于康王乙亥以路允迪為奉請車駕進發使范宗尹副之康王自濟州由金鄉單父以至南京癸未駐軍府治甲申張邦昌至南京伏地慟哭請死王慰撫之戊子元祐皇后遣使齎手書于南京五月庚寅朔康王即皇帝位于南京遙上尊號曰孝慈淵聖皇帝紹興三十一年金國使來言皇帝去冬崩聖壽六十一七月癸未諡曰恭文順德仁孝皇帝廟號欽宗臣稱曰自吾有狄難而欽宗適丁斯時天下之勢岌岌矣欽宗乃當寧興歎思得賢佐以張國威而朝無君子終敗乃事蓋百六之會難逭也然民之戴宋有死無二此仁聖所以中興于南都云東都事略卷十二
