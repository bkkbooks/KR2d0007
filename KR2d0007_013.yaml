body:
  text: 東都事略卷十三宋王稱撰世家一詩稱關睢之德所以正夫婦而化天下也是以輔佐君子有逮下之仁而無嫉妬之心懷進賢之志而有憂勤之念用能助成一代之治以興太平之基塗山啓夏任姒作周豈不曰內德之茂哉昭憲杜后篤生上聖以造我宋其宏規逺慮實應關睢之德與塗山任姒亦何以異自昭憲以降正始之道相守如一皆以遵承祖宗家法為先是雖賢德懿範有所從始然亦列聖修身正心齊家之本有以極其摯如此至於名品之别儀制之序其所由來者尚矣故略而不書宣祖昭憲皇后杜氏定州安喜人也父爽贈太師后既笄歸于宣祖治家嚴毅有禮法生太祖太宗周顯德中太祖為定國軍節度使封南陽郡太夫人及太祖為羣情推戴自陳橋還京師人走報后曰點檢已作天子后曰吾兒素有大志今果然矣太祖既即位拜后於堂上衆皆賀后愀然不樂左右進曰臣聞母以子貴今子為天子胡為不樂后曰吾聞為君難且天子者置身兆庶之上若治得其道則此位可尊茍或失馭則求為匹夫不可得是吾所以憂也子其勉之太祖再拜曰謹受教於是尊為皇太后建隆二年后不豫太祖侍藥餌不離左右疾亟召趙普入受顧命后因問太祖曰汝知所以得天下乎太祖嗚噎不能對后問之如初太祖曰臣所以得天下者皆祖考及太后之積慶也后曰不然正由周世宗使幼兒主天下耳使周氏有長君天下豈為汝有乎汝百歲後當傳位于汝弟四海至廣萬幾至衆能立長君社禝之福也太祖頓首泣曰敢不如太后教后因謂趙普曰爾同記吾言不可違也命普於榻前為約誓書普於紙尾自書名云臣普書藏之金匱命謹密宫人掌之后崩于滋德殿年六十諡曰明憲葬安陵神主祔享太廟乾德二年改卜安陵更諡曰昭憲合祔安陵太祖孝惠皇后賀氏開封人右千牛衛率府率景思長女也晉開運初宣祖為太祖娉焉太祖領定國軍節度使封會稽郡夫人性溫恭柔順事舅姑盡禮生子德昭周顯德五年寢疾崩年三十宋興追册為皇后諡曰孝惠葬于安陵之西北神主享于别廟神宗時與孝章淑德章懷並祔享太廟孝明皇后王氏邠州新安人彰德軍節度使饒之第三女也孝惠崩納為繼室封琅邪郡夫人建隆元年立為皇后后慈仁恭勤奉養太后得其歡心崩年二十二諡曰孝明葬于安陵之北神主享于别廟太平興國二年祔享太廟孝章皇后宋氏河南洛陽人左衛上將軍偓之長女也孝明崩太祖遂聘入宫為皇后年十七性柔順好禮太祖崩號開寶皇后居西宫雍熙四年移居東宫崩年四十四諡曰孝章祔葬永昌陵之北神主享于别廟神宗時升祔太廟臣稱曰廟室祔以一后若追册者則否太祖祔以孝明者禮之正也太宗祔以懿德者蓋以明德在也及明德崩與懿德同祔而元德以誕育真宗亦得祔焉此則禮從變也於此之時孝章豈不應與孝明同祔邪真宗廟室亦祔三后而孝章又不得升配太祖復何邪至神宗之世追册之后並配于廟於是孝章始升祔云太宗淑德皇后尹氏相州濮人滁州刺史廷勛之女也太宗在周時娶焉早崩太宗即位追册為皇后諡曰淑德葬于孝明陵之西北享于别廟後神主升祔太廟懿德皇后符氏陳州宛丘人魏王彥卿第六女也顯德初歸太宗國初封汝南郡夫人建隆二年封楚國夫人太宗封晉王進封越國崩年三十四葬于安陵之西北太宗即位追册為皇后諡曰懿德享于别廟真宗即位詔有司議太宗配后宰相請以懿德配而宗正卿趙安易請以淑德配是時禮官以明德在萬安宫淑德懿德生不及尊崇之位沒升配享於人情未安請虛配位祕閣校理吳淑駮議皆以為未允時將追尊元德淑因請以元德升配詔曰禮非天降地出酌于人情其以懿德皇后配於是神主升祔太廟明德皇后李氏潞州上黨人淄州刺史處耘第二女也懿德崩太祖為太宗聘為妃既納幣會太祖崩至太平興國二年始入宫雍熙元年立為皇后太宗崩真宗即位尊后為皇太后居西宫之嘉慶殿上宫名曰萬安崩年四十五諡曰明德祔葬永熙陵禮官請以懿德明德同祔太宗室以先後為次從之元德皇后李氏真定人乾州防禦使英之女也開寶中封隴西郡君太宗即位進夫人性恭肅有法度六宫推重之生楚王元佐及真宗薨年三十四真宗即位追封賢妃又追上尊號為皇太后諡曰元德祔葬永熙陵享于别廟大中祥符三年禮官趙湘請以元德皇后祔太宗廟室真宗曰此重事也俟令禮官議之至六年宰相王旦與羣臣繼請然後從之祔明德之次真宗章懷皇后潘氏大名人忠武軍節度使美之第八女也真宗為韓王太宗為聘之召入宫封莒國夫人崩年二十二真宗即位追册為皇后諡曰莊懷葬于永昌陵側陵名保泰神主享于别廟後升祔太廟國朝皇后諡冠以帝諡慶厯中禮官言孝字連太祖諡德字連太宗諡遂改莊為章以連真宗諡云章穆皇后郭氏太原人宣徽南院使守文第二女也真宗為襄王太宗為聘之封魯國夫人進封秦國真宗即位立為皇后崩年三十二諡曰莊穆葬永熙陵之西北神主享于别廟乾興元年升祔真宗廟室後改諡曰章穆章獻明肅皇后劉氏益州華陽人也父通贈太師魏王后善播鼗蜀人龔美與之入京師美以煆銀為業真宗為襄王納于濳邸張耆為王宫指使王乳母秦國夫人性嚴整因令王斥去因為太宗言之王不得已置之張耆家太宗崩真宗即位以為美人以其無宗族乃更以美為兄弟改姓劉大中祥符中為修儀進德妃自章穆崩真宗欲立為皇后大臣多以為不可真宗卒立之李宸妃入宫生子是謂仁宗后以為已子與楊淑妃撫視甚篤天禧四年真宗疾甚宰相冦準密議請皇太子監國以謀泄罷相既而入內都知周懷政謀廢后復用準為楊崇勳所告懷政誅準貶海上真宗崩仁宗即位尊后為皇太后軍國大事權取皇太后處分垂簾聽政詔書稱吾以生日為長寧節出御大安輦鳴鞭侍衛如乘輿父名通令天下皆避父諱有劉綽者自京西漕臣還朝以其在部日盤量在庾之糧得千餘斛乞付三司后問曰卿識王曾張知白吕夷簡魯宗道乎此四人者豈因盤量收出賸進哉綽大慙當時廷臣皆服后之明天聖七年冬至仁宗率百官上壽會慶殿及恭謝宗廟乘玉輅褘衣九龍華叉冠行禮則服衮衣減宗彛藻去劒戴儀天冠前後垂珠翠各十旒于時小臣方仲弓上書請依武后故事立劉氏廟而程琳亦獻武后臨朝圖后擲其書于地曰吾不作負祖宗事后稱制凡十一年自仁宗即位乃諭輔臣曰皇帝聽斷之暇宜詔名儒講習經書以輔其德於是設幄崇政殿之西廡而日命近臣侍講讀丁謂曹利用既以侮權貶竄而天下惕然畏之晚年稍進外家而信任內官仁宗春秋髙猶不知為宸妃所出終后之世無豪髮間隙蓋仁宗能盡孝而后亦慈愛保護之至也崩年六十四諡曰章獻明肅國朝皇后二諡稱制者則加四諡葬于定陵之西北於是泰寧軍節度使同平章事錢惟演請以章獻明肅章懿與章穆並祔真宗之室詔禮院議禮官以章穆祔食真宗斯為正禮章獻母儀天下與明德例同章懿帝母之尊與元德例同且前代無同日並祔之禮其二后或祔真宗廟室或祀别廟惟上裁之詔三省與禮院更議皆以為章穆皇后位崇中壼與懿德無異已祔真宗廟室自叶一帝一后之文章獻明肅處坤元之尊章懿感日符之貴皆功德莫與為比謂宜崇建新廟同殿異室嵗時薦饗一用太廟之儀仍别立廟名以崇世享於是翰林學士馮元等請以奉慈為名詔從之至慶厯五年禮院言章獻章懿二后請遵國朝懿德明德元德三后同祔太宗廟室故事遷祔真宗廟室詔兩制議翰林學士王堯臣等議請二后遷祔真宗廟室序於章穆之次從之章懿皇后李氏杭州人也性莊重寡言初入宫為司寢生仁宗封崇陽縣君進才人為婉儀仁宗即位為順容初章獻以仁宗為已子而后不敢言中外亦未知也及后病革乃進為宸妃薨年四十六章獻崩明道二年追册為皇太后諡曰章懿葬永定陵祔于别廟升祔太廟章惠皇后楊氏益州郫人也少事真宗于藩邸景德初為才人進婕妤又進婉儀拜淑妃真宗崩以遺制為皇太妃章獻崩遺誥為皇太后同議軍國事議者以仁宗春秋髙遂刪去同議軍國事之語不以攽天下號保慶皇太后仁宗未有嗣每勸仁宗選宗子近屬養于宫中其選即英宗也無疾而終年五十三諡曰章惠仁宗廢后郭氏平盧軍節度使崇之孫也后生而性聰悟有容德天聖二年立為皇后時仁宗寵張美人欲以為后章獻難之后既立而頗見疏也其後尚美人楊美人俱得幸數與后忿爭宰相吕夷簡請廢后仁宗亦以其無子遂廢之封為淨妃玉京沖妙仙師賜名清悟居長樂宫於是御史中丞孔道輔右司諫范仲淹等伏閣言后無過不可廢既而道輔等俱被逐景祐元年出居瑶華宫而尚美人亦廢於洞真宫入道楊美人於别宅安置又賜號金庭教主沖靜元師仁宗頗念之遣使存問賜以樂府后和答之辭甚悽愴仁宗嘗密令召入后曰若再召我須百官立班受册方去其所守如此后有小疾命內侍閻文應挾醫視療數日乃言后暴薨年二十四外人莫能明也仁宗甚悼之追復皇后而停諡册祔廟之禮慈聖光獻皇后曹氏贈韓王彬之孫贈吳王玘之女也皇后郭氏廢詔娉入宫册立為皇后后牲節儉喜稼穡宫中種五榖親蠶好讀史書飛白慶厯八年後八月望日仁宗欲於禁中張燈后諫止之後三日衛士作亂至寢殿仁宗聞變遽欲出后召都知王守忠以兵入衛后知賊必縱火乃遣宦者持水踵賊後賊果以燭焚簾水隨滅之是夕所遣宦者后親翦髮以為識諭之曰賊平加恩當以髮為證故宦者爭盡死力賊即擒滅張貴妃專寵驕恣后待之謹妃屢危中之卒不能害也英宗始四歲鞠養于禁中宣仁聖烈皇后后之甥也與英宗同歲亦鞠於后所仁宗曰他日以此女歸之后許諾仁宗春秋髙未有繼嗣天下寒心后居中決定大䇿遂以英宗為皇子入居慶寧宫后待之恩意尤密仁宗崩英宗即位尊后為皇太后英宗感疾詔軍國事請太后權同處分乃御內東門小殿垂簾聽政天下翕然事涉曹氏及內臣者無少絲豪假借英宗寖康復后下手書歸政詔以所居宫殿名曰慈夀英宗崩神宗即位尊后為太皇太后易宫名曰慶夀神宗用王安石變更法度用兵興利而天下紛然神宗一日侍宣仁后同岐王至慶夀宫后曰吾昔聞民間疾苦必以告仁宗嘗因赦行之今宗祀在邇亦當爾神宗曰今無他事后曰吾聞民間甚苦青苖助役錢宜因赦罷之神宗曰新法以利民非苦之也后曰王安石誠有才學怨之者衆何不出之於外神宗曰羣臣中唯安石能橫身為國家也岐王曰太皇太后之言至言也陛下不可不思神宗不懌神宗有意於燕薊已與大臣議定乃詣慶夀宫白其事后曰儲蓄賜豫備乎鎧仗士卒精乎神宗曰平戎所須積有年所固已辦之矣后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧則生靈所係粟帛所蠧未易以言茍可取之太祖太宗收復久矣何待今日神宗曰敢不受教蘇軾以詩得罪下御史獄人知必死后違豫中聞之謂神宗曰嘗憶仁宗以制科得軾兄弟甚喜曰吾為子孫得兩宰相今聞軾以作詩繫獄得非仇人中傷之捃至於詩其過微矣吾疾藝已篤不可以冤濫致傷中和宜熟察之神宗涕泣軾由此得免后疾久不平忽顧左右問此為何日左右對以十月二十日后頷之乃自語曰只此日去只此日去免煩他百官蓋是日太祖大忌也遂崩其逹生死之變如此年六十四諡曰慈聖光獻葬于永昭陵神主祔于太廟溫成皇后張氏河南永安人也祖潁進士第終建平令父堯封亦舉進士為石州推官以卒時兄堯佐補蜀官堯封妻求挈孤幼隨之官堯佐不收恤辭以道逺止之堯封母錢氏女也妃幼無依由錢氏納于章惠皇后宫寖長得幸有盛寵妃巧慧多智數善承迎藝動中外慶厯元年封清河郡君歲中為才人遷修媛三年忽被疾曰妾姿薄不勝寵名願為美人許之皇祐初進貴妃後五年而薨年三十一仁宗哀悼之追册為皇后諡曰溫成父堯封追封清河郡王諡曰景思而堯佐夤緣僥幸致位通顯云東都事略卷十三
