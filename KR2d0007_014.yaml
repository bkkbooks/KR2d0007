body:
  text: 東都事略卷十四宋王稱撰世家二英宗宣仁聖烈皇后髙氏亳州蒙城人也曾祖瓊贈魏王祖繼勳贈楚王父遵甫贈魯王慈聖光獻皇后后之從母也以故少與英宗同育禁中既長歸英宗英宗入繼大統治平二年立為皇后后明睿習史所以輔佐憂勤備至后既立弟士林管當御藥院將遷官后曰妾乃安敢上比章獻明肅皇后及皇太后陛下承顔長樂故推恩曹氏以致孝愛之意願毋以妾故亂祖宗法神宗即位尊為皇太后宫曰寶慈元豐七年大燕延安郡王侍立神宗諭輔臣曰明年建儲當以司馬光吕公著為師保至明年神宗不豫王圭蔡確韓縝章惇請對福寧殿圭乞立延安郡王為皇太子請太后權同聽政神宗頷之圭等見太后簾下后泣撫王曰兒孝順自官家服藥未嘗去左右書佛經以祈福喜學書已誦論語七卷絶不好弄乃令王出簾外見圭等圭等再拜謝且賀是日降制立為皇太子后敕中人梁惟簡曰令汝婦製一黃袍十歲兒可衣者密懷以來蓋為王倉卒踐祚之備也神宗與后屬意於哲宗者如此初雍王皓曹王頵日詣寢殿問起居至是后諭二王非宣召毋得入哲宗即位尊為太皇太后與皇帝御延和殿垂簾聽政詔書稱吾以生日為坤成節出入御大安輦警蹕侍衛如乘輿立魯王諱更宫名曰崇慶召司馬光吕公著等于外未至遣中使迎勞手書問以今日設施所當先者既而有旨散遣修京城役夫罷減皇城內覘者止御前工作出近侍無狀者三十餘人戒敕中外無敢苛刻暴斂廢導洛司物貨及民所養户馬寬保馬限皆從中出大臣不與王圭薨蔡確章惇以罪去韓縝亦罷政光與公著同心輔政於是更新法之不便於民者以常平舊法改青苖以嘉祐差役參改募役除市易之法寬茶鹽之禁賜邊寨贖亡民以和西戎而天下復安元祐三年御試進士有司請如天聖故事皇帝皇太后同御殿不許有司請受册文德殿后曰吾豈敢比章獻且文德殿天子正牙也非女主所當御以旱詔停册禮羣臣固請乃聽廷議患官冗詔裁損外家恩四之一服用儉質素見厚於慶夀遵其餘矩不敢忘斥賣橐裝命近侍往西洛舉曹氏喪數百悉封之后臨朝九年於寢食起居所以調護於哲宗者懇惻周盡八年后寢疾召宰輔至簾前曰今日疾少間欲與公等訣皇帝年少善輔導之崩年六十二諡曰宣仁聖烈葬永厚陵神主祔享太廟神宗欽聖憲肅皇后向氏故宰相敏中之曾孫贈楚王傅亮之孫贈秦王經之女也以治平三年歸于潁邸封安國夫人神宗即位立為皇后神宗崩哲宗即位尊為皇太后居慈德宫后平居無玩好閲祖宗實録寶訓遂以通知故事向氏有援他族例遷官者后曰吾族未嘗有此詎可以恩廢法哲宗選后及諸王擇婦后豫戒族人勿以諸女自言宣仁聖烈皇后命有司葺舊慶壽宫請后居之后固辭曰豈有婦居東而姑處西瀆上下之分宣仁嘉其正以慶夀後殿為隆祐宫哲宗崩宰相章惇有異議后毅然獨斷決䇿立徽宗遂權同處分軍國事凡故事所有如御正殿避家諱立誕節之類皆不用每聞褒録勳賢省賦息兵崇儉愛民之事則喜見容色是嵗降手書還政崩于慈德殿年五十六諡曰欽聖憲肅葬永裕陵神主祔于太廟欽成皇后朱氏本姓崔父傑母李氏后少依任廷和家冒繼父朱士安姓初入宫為御侍進才人又進婕妤元豐中拜昭容封賢妃進德妃哲宗即位尊為皇太妃居瑞聖宫哲宗及蔡王似皆其所生也元祐三年太皇太后詔曰皇帝嗣位于兹四年皇太妃以恭儉之德鞠育之恩雖典䇿以時奉行而情文疑有未稱皇帝以祖考之奉尊無二上而吾惟春秋之義母以子貴其推天下之養以慰人子之心宜下有司尋繹典故於是簷子飾以龍鳳繖用紅羅增從衛人冠服等並依皇后惟所居宫閣不設鴟尾又詔皇太妃儀制已依皇后其宫閣合稱殿與不禮官言緣禮尊無二上皇太妃無稱殿立殿名之制宣仁后山陵復土復下詔令禮官參考典禮又詔曰昨親奉皇太后聖諭皇太妃特與立宫殿名坐六龍輿進黃繖出入由宣德正門三省乃議皇太妃坐龍鳳輿繖紅黃兼用遇從皇太后出入止用紅宫中並依皇后儀制於是宫殿名並以瑞聖為名崇寧元年崩年五十一追尊為皇太后諡曰欽成陪葬永裕陵神主升祔于神宗廟室欽慈皇后陳氏開封人也以選入禁中年十七神宗以為御侍生徽宗封才人遷美人薨年三十三贈貴儀徽宗即位詔有司議尊崇之禮追號皇太妃建中靖國元年追尊為皇太后諡曰欽慈陪葬永裕陵神主升祔于神宗廟室哲宗昭慈聖獻皇后孟氏洺州人眉州防禦使元之孫女也元祐七年太皇太后以六禮儀制娉入宫立為皇后以左僕射吕大防攝太尉充奉迎使同知樞密院事韓忠彥攝司徒副之尚書左丞蘇頌攝太尉充發䇿使僉書樞密院事王巖叟攝司徒副之尚書右丞蘇轍攝太尉充告期使皇叔祖同知大宗正事宗景攝宗正卿副之皇伯祖判大宗正事髙密郡王宗晟攝太尉充納成使翰林學士范百祿攝宗正卿副之吏部尚書王存攝太尉充納吉使權户部尚書劉奉世攝宗正卿副之翰林學士梁燾攝太尉充納采問名使御史中丞鄭雍攝宗正卿副之后既立而劉婕妤寵幸隂有奪位之意紹聖三年哲宗遂廢后黜居瑶華宫賜號華陽教主玉清妙淨仙師名沖真初后朝謁景靈宫訖事就坐諸嬪御皆立侍劉婕妤獨背立簾下后閣中人陳迎兒喝曰綽開婕妤背立如故迎兒退歸有不平語由此閣中皆忿冬至日會朝隆祐宫俟見於他所后所御坐朱髹金飾宫中之制惟后乃得之劉婕妤在他坐意象頗愠其從行者為易坐製與后等衆皆側目不能平者故傳唱曰皇太后去所婕妤亦起立尋各復所或已徹婕妤坐頓于地懟不復朝泣而去且訴于哲宗內侍郝隨謂婕妤曰毋以此戚戚願蚤為大家生子此坐正當為婕妤有耳會福慶公主疾后有姊頗知醫嘗已后危疾以故出入掖庭公主藥弗效乃取道家治病符水以入宫㜮以示后后變色問曰此何從來㜮對以實后曰六姊寧知中禁嚴密與外舍異邪戒令存之俟見上言所以然已而哲宗過視公主疾后持以告哲宗哲宗曰此亦人情之常耳后即取符爇於前宫禁相傳厭魅之端作矣方公主病革忽有紙錢在旁后顧視頗惡忌之意自婕妤所遣人持來益有疑心未幾后養母聽宣夫人燕氏為后禱祠事聞詔入內押班梁從政管當御藥院蘇圭即皇城司鞠之獄成命侍御史董敦逸録問遂詔廢后詔獄初起禁中捕逮幾三十人箠楚甚峻皆宦官宫妾柔弱之人暨録問罪人過庭下者氣息僅屬或肢體已毁折至有無舌者無一人能聲對敦逸秉筆疑未下郝隨從旁以言脅之敦逸畏禍不能剛決乃以奏牘上蓋宰相章惇迎合於外而隨擠排於內莫有敢異議者其後敦逸奏言中宫之廢事有所因情有可察詔下之日天為之隂翳是天不欲廢之也人為之流涕是人不欲廢之也且言其常録問獄事恐得罪天下後世哲宗曰敦逸不可更在言路曾布曰陛下本以皇城獄出於近習推治故命敦逸録問今乃貶録問官何以取信中外哲宗乃然之哲宗崩欽聖后臨御復其位號號元祐皇后崇寧元年馮澥上書以復后非是臺臣合奏共附和之蔡京主其説力請不已徽宗從之詔依紹聖詔旨復居瑶華宫加賜希微元通知和妙靜仙師靖康元年冬金人陷京師及二聖北狩自道君皇后皇太子以下后妃嬪御諸王帝姫并宗室近屬皆北徙而后以廢居瑶華不與也張邦昌為金人所逼僭位號乃奉迎后于瑶華入居延福宫邦昌避位請后垂簾聽政號元祐皇后入居禁中時康王為兵馬大元帥后以位授之於是康王即位于南京其後事具日歷昭懷皇后劉氏初入宫為御侍明豔冠後庭初封昌平郡君進美人又進婕妤遂拜賢妃有盛寵由是孟后廢元符二年立為皇后哲宗崩欽聖念孟后無罪乃召入復位號稱元祐皇后而后稱元符皇后及欽聖崩元祐皇后復廢乃進號太后居崇恩宫政和三年后無疾而崩年三十五諡曰昭懷陪葬永泰陵神宗升祔于哲宗廟室徽宗顯恭皇后王氏德州刺史藻之女也歸于端邸封順國夫人徽宗即位册為皇后生欽宗崩年二十五諡曰靖和葬永裕陵之次神主祔于别廟改諡曰惠恭後又改曰顯恭顯肅皇后鄭氏開封人也父紳始為直省官以后貴纍封太師樂平郡王后本欽聖殿押班徽宗為端王每日朝慈德宫欽聖命鄭王二押班供侍及即位欽聖以二人賜之王後封貴妃鄆王母也崇寧初后封賢妃遷貴妃后有異寵徽宗多賚以詞章天下歌之王后崩政和元年立為皇后欽宗即位尊后為道君太上皇后居寧德宫靖康元年金人犯京師后從徽宗北遷云顯仁皇后韋氏開封人也生太上皇帝徽宗狩沙漠后從北遷太上皇帝在御尊為皇太后紹興十二年騩駕遄歸其後事具日厯明逹皇后劉氏贈太尉彥清女也入宫為御侍遷才人進美人又遷婉儀進位淑妃德妃册拜貴妃政和三年薨年二十七徽宗欲踵溫成故事遂追册為皇后諡曰明逹陪葬惠恭皇后園明節皇后劉氏本酒家保女也父宗元以女貴為興寧軍節度使始入宫為小殿直都知係昭懷殿寖被顧遇後以事囚於宦者何欣家內侍楊戩奏取歸復得入宫明逹薨以同姓之故使承明逹閣焉由才人為婕妤纍遷賢妃又為淑妃進位貴妃性頴悟能迎旨合意又善裝飾衣冠塗澤一新世爭效之道士林靈素以左道得幸謂上為長生帝君謂妃為九華玉真安妃每神霄降必别置安妃位圖畫肖妃象謂每祀妃妃方酣寢而覺有酒色始妃囚何欣家欣遇妃不禮焉及得志遂陷欣以罪未幾妃薨年三十三時宣和三年也追册為皇后諡曰明節與明逹並園立祠欽宗皇后朱氏開封祥符人也父伯材武泰軍節度使欽宗為皇太子册為妃及即位為皇后靖康之禍欽宗幸金營邀駕以行后亦北徙云臣稱曰古有攝主而秦漢以來則以母后攝國朝稱制者五章獻擁幼君政由房闥而保祐勤勞之恩為大慈聖宣仁德及天下欽聖昭慈功在社禝而宣仁致治之懿比迹永昭其來有自矣於呼母后攝政之賢自秦漢迄今未有加于我宋者也真社禝生靈之福哉東都事略卷十四
