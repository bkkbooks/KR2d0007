body:
  text: 東都事略卷十五宋王稱撰世家三烏乎論封建者何其紛紛哉世徒見春秋齊晉之彊漢室呉楚之亂遂一切歸咎於三代之良制是大不然周建親賢漢王同姓以蕃王室故詩所稱懐徳惟寜宗子維城者封建之謂也周享過厯之期而漢載祀四百兹非其效與周徳雖衰齊晉尚能攘戎狄以尊天子豈不以封建之利也哉若夫呉楚之所以亂者乃在於封國過制以成尾大不掉之埶爾非封建之罪也本朝大道之行與天下爲公故宗親無茅土之胙至熈寜中以宣祖太祖太宗之子擇其後一人世世封公雖有世襲之爵而皆聚之京師維城之固果安在哉天下治雖不封建可也天下有變則封建有可恃之理是以靖康之難天族亡尺寸之柄而亦安有所謂召穆公者糾合宗族于成周是可歎也由是觀之封建宗親以屏蔽天下誠有國者之當務也哉宣祖五子長曹王光濟次太祖皇帝次太宗皇帝次魏王廷美次岐王光賛曹王光濟早亡宋興追封邕王徽宗即位改封曹王魏王廷美字文化本名光美宋興授嘉州防禦使遷山南西道節度使加同平章事徙鎭永興太宗即位加中書令開封尹封齊王進封秦王太宗北征命廷美留守京師太平興國七年出爲西京留守坐與宰相盧多遜交通降涪陵縣公房州安置廷美憂悸成疾九年卒年三十八太宗聞之流涕詔曰涪陵公廷美朕之同氣也宜追封涪王諡曰悼眞宗即位追復故官爵廷美十子徳恭衡州防禦使贈髙密郡王徳隆左武衛大將軍贈平陽郡王徳彞保信軍留後贈潁川郡王諡曰安簡徳雍天平軍留後贈廣陵郡王諡曰康簡徳鈞右監門衛大將軍徳欽徳潤俱右羽林將軍徳文忠武軍節度使同平章事封東平郡王贈申王諡曰恭裕徳惠左武衛將軍徳存左羽林將軍徳文子承顯以王後封康國公官至昭化軍節度使贈樂平郡王本朝故事皇族本宫之長封國公物故則以次授封徳文以慶厯四年薨承簡封徐國公承簡徳鈞子也於屬爲長得封官至保慶軍留後贈安定郡王諡曰和懿承簡薨徳雍子承亮封昌國公神宗即位拜感徳軍節度使改封榮熈寜二年詔宣祖太祖太宗之子皆擇其後一人爲宗世世封公以奉祭祀不以服屬盡故殺其恩禮至三年太常禮院言本朝近制諸王之後皆用本宫最長一人封公繼襲去年詔祖宗之子皆擇其後一人爲宗世世封公即與舊制有異謹按禮文諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無同母弟立庶孫曽孫以下準此合依禮令傳嫡承襲詔曰可改封榮國公承亮爲秦國公宗肅魯國公宗逹蔡國公宗惠魏國公宗保燕國公仲郃陳國公世程越國公而禮官言昭成太子陳王蔡王無後而宗保宗逹仲郃以旁親出繼自應典禮太祖之子越王徳昭當立世長孫世程太宗之子魏王元佐當立嫡孫同母弟宗惠魯王元份當立嫡孫宗肅韓王元偓當立嫡孫宗繢呉王元儼當立庶長孫宗絳同判太常寺陳薦以秦王宜以庶曽孫克繼嗣楚王宜以庶曾孫世逸嗣知禮院韓忠彦等以秦王宜以庶長孫承亮嗣楚王宜以庶長孫從式嗣詔秦王楚王後如忠彦議故承亮以下得立而宗繢宗絳以喪故後封從式已封郡王後嗣令依今所定於是宗室克繼等言封秦王之後不當詔兩制議翰林學士承旨王珪與范鎭司馬光等言臣等看詳秦王楚王魏王自有正統而承亮從式宗惠皆旁支今追議當爲後之人豈可捨正統而取旁支也案秦王薨嫡子徳恭當立徳恭卒嫡子承慶當立承慶卒無嫡子有庶子五人長曰克晤先卒無子次曰克繼當立楚王薨長子惟叙卒嫡子從煦當立從煦卒無嫡子有庶子世逸一人當立魏王薨嫡子宗魯當立宗魯卒嫡長子仲翹先卒無子次母弟仲髦亦先卒次母弟仲蒼當立秦王楚王後宜如薦議魏王後當以仲蒼嗣事下中書中書言越王無嫡子嫡孫無嫡子同母弟無庶子無嫡孫同母弟無庶孫宜以庶長孫世清嗣魏王無嫡子無庶子宜以庶長孫宗立嗣世程宗惠不應封遂以宗立封魏國公世清封越國公四年封宗繢韓國公宗絳呉國公承亮薨贈樂平郡王諡曰恭靜子克愉嗣克愉卒子叔牙嗣徽宗即位秦王改封魏王岐王光賛幼亡宋興追封夔王徽宗封岐王太祖四子長滕王徳秀次呉王徳昭次舒王徳林次秦王徳芳滕王徳秀早亡徽宗即位追賜名封滕王呉王徳昭字日新母皇后賀氏乾徳二年出閤爲貴州防禦使故事帝子出閤當封王太祖謙抑止以列辟處之開寳六年授山南西道節度使同平章事終太祖之世竟不封以王爵太宗即位改鎭永興兼侍中始封武功郡王太平興國四年暴薨年二十九贈中書令追封魏王諡曰懿徳昭謹重寡言左右未嘗見其喜愠之色喜讀書不好犬馬之翫後贈太師治平元年改封越王子惟正建寜軍節度使贈同安郡王諡曰僖靖惟吉感徳軍節度使同平章事贈南陽郡王諡曰康孝追封冀王惟固昌州團練使惟忠武勝軍留後惟和右千牛衛將軍惟吉子守節彰化軍留後同知宗正寺贈丹陽郡王諡曰僖穆子世永封邢國公官至鎭南軍留後贈南康郡王諡曰脩孝慶厯四年封十王之後以惟忠子從靄封頴國公而惟吉子守巽以冀王後爲最長與從靄同封穎國公守巽官至和州觀察使從靄官至齊州防禦使守巽從靄卒以惟固子從信封榮國公官至雄州防禦使從信卒以惟固之孫從恪子世規封崇國公世規官至右龍武大將軍沂州防禦使以卒守巽之子世清封申國公至熈寜三年襲封越國公後封㑹稽郡王會四后升祔受命告廟世清屬疾家人請以疾辭世清曰辭君命不忠廢廟祀不孝力疾就事世清官至保信軍留後贈虢王諡曰恭安舒王徳林早亡徽宗即位追賜名封舒王秦王徳芳開寳九年出閤爲貴州防禦使太宗即位拜山南西道節度使同平章事薨年二十三贈中書令追封岐王諡曰康惠後贈太師改封楚王子惟叙左千牛衛大將軍贈髙平郡王惟憲資州團練使惟能右羽林將軍慶厯中以惟叙子從煦封安國公終左金吾衛大將軍歸州團練使從煦卒以惟能子從古封安國公終延州觀察使諡曰惠恪從右卒從式封舒國公從式惟憲子也神宗即位謂剏業垂統實自太祖顧無以稱乃下詔曰昔我藝祖之興肈造區夏大謨偉烈被諸萬世朕奉承聖緒夙夜不敢康乃顧後之子孫而有未議封爵之典豈朕所以繼大統尊親親之意哉且積厚者流必逺施大者報必豐其令中書門下攷太祖之籍以屬近而行尊者一人裂土地而王之使常從獻于郊廟也世世勿復絶以稱朕尊祖報本之志焉時熈寜二年八月也於是有司推擇以從式應詔封安定郡王從式終保康軍節度使贈榮王諡曰安僖從式既薨乃封越王之孫世準爲安定郡王世準從靄子也爲人内恕外嚴無綺羅金玉之好既封凡天子祀郊廟必從祀如詔旨世準官至保靜軍節度使薨贈成王世開嗣世開從誨子惟和孫也官至奉國軍留後薨諡曰獻敏世雄嗣世雄亦從靄子也秀整莊重以詩書教子孫貯書萬卷名其堂曰樂善世雄官至崇信軍節度使薨贈淄王諡曰恭惠世福嗣官至集慶軍節度使薨贈儀王令盪嗣越王之後世清薨子令廓襲封越國公楚王之後從式薨子世恩襲封楚國公徽宗立改封越王爲呉王楚王爲秦王太宗九子長漢王元佐次昭成太子元僖次真宗皇帝次商王元份次越王元傑次鎭王元偓次楚王元偁次周王元儼次崇王元億漢王元佐字惟吉初名徳崇母元徳皇后李氏太平興國五年出居内東門别第明年拜同平章事封衛王又明年進封楚王更今名初秦王廷美得罪元佐獨申救之由是失愛及廷美死元佐遂感心疾雍熈二年元佐疾小愈重陽召諸王宴而元佐以疾新起不與元佐曰諸王與宴而我不與是棄我也遂發憤中夜閉媵妾縱火焚宫太宗怒廢爲庶人寘于南宫眞宗即位爲左金吾衛上將軍復封楚王眞宗東封拜太傅西祀拜太尉中書令又遷太師加尚書令授天䇿上將軍賜劒履上殿詔書不名仁宗即位以元佐伯父之尊恩禮甚厚薨年六十三追封齊王諡曰恭憲改潞王治平元年進封魏王子允升安國軍節度使贈平陽郡王諡曰懿恭允言黄州刺史允成濮州防禦使允升子宗旦崇信軍節度使開府儀同三司華隂郡王贈滕王諡曰恭孝仁宗封王後以允言子宗說恭憲王長孫封祁國公皇祐中坐亂其子婦除名又坐坑殺女僕於宗室外宅鎻閉卒熈寜三年以宗惠襲封魏國公宗惠允升子中書以宗惠不應封而以允言子宗立襲宗惠官至武昌軍留後江夏郡王贈郯王宗立官至武寜軍留後贈南康郡王子仲來襲封官至金州刺史子不儻嗣徽宗立改封魏王爲漢王不儻卒子彦清乞襲父爵奉漢王祀詔以彦清襲父爵昭成太子元僖初名徳明太平興國七年出閤授同平章事封廣平郡王八年進封陳王改名元佑詔班在宰相下雍熈二年爲開封尹加兼侍中改今名太宗以契丹犯邊將大舉遣使徃河北諸州科鄉民爲兵元僖論其不便時趙普亦言其事太宗納之普爲朋邪所疾元僖上表言普開國忠臣也願復以爲相太宗從之進封許王加中書令薨年二十七無子太宗哭之慟贈皇太子諡曰恭孝改諡昭成當仁宗之世以允成子宗逹出後昭成太子爲孫熈寜三年封燕國公以奉其祀宗逹卒贈新平郡王諡曰恭靖子仲恕襲封官至忠州團練使諡曰純僖子士盉嗣商王元份初名徳嚴太平興國八年出閤改名元俊拜同平章事封冀王又改今名加兼侍中威武軍節度使進封越王淳化中兼領建寜軍改鎮寜海鎮東眞宗即位加中書令徙鎭永興鳳翔改王雍永熈復土爲山陵使拜太傅眞宗北征爲東京留守㑹得疾薨年三十七贈太師尚書令鄆王改陳王又改潤王治平中封魯王元份寛厚言動有禮子允寜寜武軍節度使贈信安郡王次允中右屯衛將軍次則濮王也别傳濮王薨以允寜子宗諤封虢國公至熈寜三年以宗肅襲封魯國公宗肅亦允寜子也終安化軍留後子仲先嗣徽宗改封魯王爲商王政和三年詔曰宗室諸王追封大國其世襲子孫尚仍舊國甚未稱正名之意如魯王改封商王其子尚襲魯國之類其令大宗正司改正制以寜逺軍節度使魯國公仲先改封商國公越王元傑字明哲初名徳和太平興國八年出閤改名拜同平章事封益王端拱初加侍中爲劒南西川節度使淳化中徙封呉鎭淮南鎭江元傑嘗作假山既成召僚屬置酒共觀之翊善姚坦正直之士也獨頫首不視元傑強使視之坦曰坦見血山安得假山元傑問其故坦曰坦在田舍時見州縣督稅上下相剥急里胥臨門捕人父子兄弟送縣鞭笞流血滿身愁苦不聊生此假山皆民租賦所出非血山而何是時太宗亦爲假山未成或以坦言聞太宗曰傷民如此何用山爲亟命毁之元傑有過失坦必盡言規正左右教元傑詐疾太宗憂之召元傑乳母入宫問疾増損狀乳母曰王本無疾以翊善檢束王起居故不樂成疾耳太宗怒曰吾選端士爲王僚屬者固欲輔王爲善今王詐疾欲使朕去正人邪且王年少未知出此必爾輩爲之因命杖之數十召坦慰安之至道二年移鎮淮南忠正眞宗即位授中書令徙鎭武寜泰寜封兖王加太保薨年三十三贈太尉尚書令追封安王諡曰元惠元傑力學樂善後改封邢王治平中追封陳王元傑無子仁宗以魏王之孫仲郃爲之後熈寜三年嗣封陳國公官至陳州觀察使諡曰良僖子士開嗣徽宗改封陳王爲越王鎭王元偓字希道端拱元年出閤封徐國公至道二年拜鎭南軍節度使眞宗即位加同平章事封彭城郡王改鎭靜難彰化進封寜王改王相累拜太尉兼尚書令天僖元年改兼中書令歴鎭䕶國成徳安國鎮寜封徐王薨年四十二贈太師尚書令鄧王諡曰恭懿元偓姿表偉異厚重寡言暁音律後改封密王又改王蘇治平中追封韓王子允弼少與仁宗並席仁宗爲皇太子除英州刺史仁宗朝官至侍中武寜軍節度使判大宗正寺北海郡王英宗朝拜中書令徙王東平神宗即位拜太保鳳翔雄武軍節度使薨贈太師尚書令兼中書令相王以允弼子宗繢襲恭懿王封爲韓國公卒贈南康郡王諡曰良孝宗繢弟宗景官至彰信軍節度使濟隂郡王薨贈循王諡曰思宗繢既卒子仲黁嗣徽宗改封韓王爲鎮王靖康元年仲黁自平川軍節度使徙鎮劒南西川楚王元偁字令問淳化三年出閤除武昌軍節度使眞宗即位加同平章事封安定郡王景徳中遷宣徳保寜軍節度使進爵舒王眞宗東封進兼侍中移平江鎮江軍從祀汾隂加兼中書令徙鎭鎭南寜國拜太保薨年三十四贈太尉尚書令曹王諡曰恭惠元偁好學善屬文奉佛甚謹改贈華王治平中封蔡王子允則至右千牛衛將軍先是諸王子授官即爲諸衛將軍餘以父官及族屬親疎差等天禧元年令宗正卿趙安仁參議定制安仁請以宣祖太祖太宗孫初䕃授將軍曾孫授右侍禁元孫授右班殿直内父爵髙者聽從髙䕃其事縁特旨者不以爲例詔中書門下樞密院參定行之允則無子以平陽懿恭王允升之子宗逹爲後熈寜三年襲封蔡國公以奉其祀宗逹卒子仲湯嗣徽宗改封蔡王爲楚王周王元儼生而潁悟太宗尤所鍾愛而不欲早令出宫每朝㑹宴集必侍左右期以年二十始得出就外傅眞宗即位封曹國公明年爲平海軍節度使踰年拜同平章事景徳初封廣陵郡王眞宗封泰山改鎭昭徳等軍進爵榮王祀汾隂加兼侍中徙鎭安靜武信祀太清宫加中書令坐侍婢縱火延燔禁中奪武信節降封端王尋拜鎭海安化軍節度使封彭王累拜太傅厯鎭横海永清保平定國封通王改涇王仁宗即位拜太尉尚書令兼中書令徙鎭安忠武軍節度使封定王賜賛拜不名又賜詔書不名天聖七年徙封鎭明年賜劒履上殿明道初拜太師換河陽三城節度使改封孟又改鎭永興鳳翔進封荆王景祐二年改荆南淮南節度大使仍賜入朝不趨元儼廣顙豐頥資質嚴重凛凛不可犯名聞外夷契丹尤畏其名事母孝嚴幼好學喜聚書善爲文又善二王書法及飛白性謹約寡耆欲天聖以來太宗諸子獨元儼在仁宗尊寵甚異元儼不敢數入闔門不接人事好坐木馬子坐則不下或飢則便就其上飲食往往乗興奏樂於前酣飲終日其疾亟時仁宗親爲調藥屏人與語久之所對多忠言薨年六十贈天䇿上將軍追封燕王諡曰恭肅治平中改封呉王有子十三人允良允廸允初餘皆早死允良泰寜軍節度使襄陽郡王允良好酣寢以晝爲夜由是一宫之人皆晝睡夕興然性寛裕不甚喜聲色亦不爲他驕恣未嘗詰責左右薨贈定王有司以允良起居無度反易晦明諡曰易允廸居父喪哭不哀又嘗宫中爲優戲制曰安靜軍節度使允廸五刑之屬三千其罪莫大於不孝小民無知犯者猶鮮況爾燕恭肅王之子而朕之諸弟也宜率訓義以廸四方而乃在苴麻泣哭之哀爲酣飲流酗之佚肆情鄙行害于而家而逹於朕聞嗟怨無已朕茍貸法何以處王公之上而教天下哉宜歸爵秩下領屯衛蓋寛於馭過而欲循省其罪無蹈後悔也可責授右監門衛大將軍久之遷密州觀察使復鎮安靜卒贈永嘉郡王諡曰思恪允初寜國軍節度使贈博平郡王諡曰安泰熈寜中以允良子宗絳嗣封呉國公徽宗改封呉王爲周王崇王元億早亡追賜名封代國公治平中封安定郡王徽宗即位賜崇王東都事略卷十五
