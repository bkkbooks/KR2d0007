body:
  text: 東都事略卷十五宋王稱撰世家三烏乎論封建者何其紛紛哉世徒見春秋齊晉之強漢室吳楚之亂遂一切歸咎於三代之良制是大不然周建親賢漢王同姓以蕃王室故詩所稱懷德惟寧宗子維城者封建之謂也周享過厯之期而漢載祀四百兹非其效與周德雖衰齊晉尚能攘戎狄以尊天子豈不以封建之利也哉若夫吳楚之所以亂者乃在於封國過制以成尾大不掉之藝爾非封建之罪也本朝大道之行與天下為公故宗親無茅土之胙至熙寧中以宣祖太祖太宗之子擇其後一人世世封公雖有世襲之爵而皆聚之京師維城之固果安在哉天下治雖不封建可也天下有變則封建有可恃之理是以靖康之難天族亡尺寸之柄而亦安有所謂召穆公者糾合宗族于成周是可歎也由是觀之封建宗親以屏蔽天下誠有國者之當務也哉宣祖五子長曹王光濟次太祖皇帝次太宗皇帝次魏王廷美次岐王光贊曹王光濟早亡宋興追封雍王徽宗即位改封曹王魏王廷美字文化本名光美宋興授嘉州防禦使遷山南西道節度使加同平章事徙鎮永興太宗即位加中書令開封尹封齊王進封秦王太宗北征命廷美留守京師太平興國七年出為西京留守坐與宰相盧多遜交通降涪陵縣公房州安置廷美憂悸成疾九年卒年三十八太宗聞之流涕詔曰涪陵公廷美朕之同氣也宜追封涪王諡曰悼真宗即位追復故官爵廷美十子德恭衡州防禦使贈髙密郡王德隆左武衛大將軍贈平陽郡王德彞保信軍留後贈潁川郡王諡曰安簡德雍天平軍留後贈廣陵郡王諡曰康簡德鈞右監門衛大將軍德欽德潤俱右羽林將軍德文忠武軍節度使同平章事封東平郡王贈申王諡曰恭裕德惠左武衛將軍德存左羽林將軍德文子承顯以王後封康國公官至昭化軍節度使贈樂平郡王本朝故事皇族本宫之長封國公物故則以次授封德文以慶厯四年薨承簡封徐國公承簡德鈞子也於屬為長得封官至保慶軍留後贈安定郡王諡曰和懿承簡薨德雍子承亮封昌國公神宗即位拜感德軍節度使改封榮熙寧二年詔宣祖太祖太宗之子皆擇其後一人為宗世世封公以奉祭祀不以服屬盡故殺其恩禮至三年太常禮院言本朝近制諸王之後皆用本宫最長一人封公繼襲去年詔祖宗之子皆擇其後一人為宗世世封公即與舊制有異謹按禮文諸王公侯伯子男皆子孫承嫡者傳襲若無嫡子及有罪疾立嫡孫無嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟無同母弟立庶孫曽孫以下準此合依禮令傳嫡承襲詔曰可改封榮國公承亮為秦國公宗肅魯國公宗逹蔡國公宗惠魏國公宗保燕國公仲郃陳國公世程越國公而禮官言昭成太子陳王蔡王無後而宗保宗逹仲郃以旁親出繼自應典禮太祖之子越王德昭當立世長孫世程太宗之子魏王元佐當立嫡孫同母弟宗惠魯王元份當立嫡孫宗肅韓王元偓當立嫡孫宗繢吳王元儼當立庶長孫宗絳同判太常寺陳薦以秦王宜以庶曽孫克繼嗣楚王宜以庶曾孫世逸嗣知禮院韓忠彥等以秦王宜以庶長孫承亮嗣楚王宜以庶長孫從式嗣詔秦王楚王後如忠彥議故承亮以下得立而宗繢宗絳以喪故後封從式已封郡王後嗣令依今所定於是宗室克繼等言封秦王之後不當詔兩制議翰林學士承旨王圭與范鎮司馬光等言臣等看詳秦王楚王魏王自有正統而承亮從式宗惠皆旁支今追議當為後之人豈可捨正統而取旁支也案秦王薨嫡子德恭當立德恭卒嫡子承慶當立承慶卒無嫡子有庶子五人長曰克晤先卒無子次曰克繼當立楚王薨長子惟敘卒嫡子從煦當立從煦卒無嫡子有庶子世逸一人當立魏王薨嫡子宗魯當立宗魯卒嫡長子仲翹先卒無子次母弟仲髦亦先卒次母弟仲蒼當立秦王楚王後宜如薦議魏王後當以仲蒼嗣事下中書中書言越王無嫡子嫡孫無嫡子同母弟無庶子無嫡孫同母弟無庶孫宜以庶長孫世清嗣魏王無嫡子無庶子宜以庶長孫宗立嗣世程宗惠不應封遂以宗立封魏國公世清封越國公四年封宗繢韓國公宗絳吳國公承亮薨贈樂平郡王諡曰恭靜子克愈嗣克愈卒子叔牙嗣徽宗即位秦王改封魏王岐王光贊幼亡宋興追封夔王徽宗封岐王太祖四子長滕王德秀次吳王德昭次舒王德林次秦王德芳滕王德秀早亡徽宗即位追賜名封滕王吳王德昭字日新母皇后賀氏乾德二年出閣為貴州防禦使故事帝子出閣當封王太祖謙抑止以列辟處之開寶六年授山南西道節度使同平章事終太祖之世竟不封以王爵太宗即位改鎮永興兼侍中始封武功郡王太平興國四年暴薨年二十九贈中書令追封魏王諡曰懿德昭謹重寡言左右未嘗見其喜愠之色喜讀書不好犬馬之玩後贈太師治平元年改封越王子惟正建寧軍節度使贈同安郡王諡曰僖靖惟吉感德軍節度使同平章事贈南陽郡王諡曰康孝追封冀王惟固昌州團練使惟忠武勝軍留後惟和右千牛衛將軍惟吉子守節彰化軍留後同知宗正寺贈丹陽郡王諡曰僖穆子世永封邢國公官至鎮南軍留後贈南康郡王諡曰修孝慶厯四年封十王之後以惟忠子從靄封頴國公而惟吉子守巽以冀王後為最長與從靄同封穎國公守巽官至和州觀察使從靄官至齊州防禦使守巽從靄卒以惟固子從信封榮國公官至雄州防禦使從信卒以惟固之孫從恪子世規封崇國公世規官至右龍武大將軍沂州防禦使以卒守巽之子世清封申國公至熙寧三年襲封越國公後封會稽郡王會四后升祔受命告廟世清屬疾家人請以疾辭世清曰辭君命不忠廢廟祀不孝力疾就事世清官至保信軍留後贈虢王諡曰恭安舒王德林早亡徽宗即位追賜名封舒王秦王德芳開寶九年出閣為貴州防禦使太宗即位拜山南西道節度使同平章事薨年二十三贈中書令追封岐王諡曰康惠後贈太師改封楚王子惟敘左千牛衛大將軍贈髙平郡王惟憲資州團練使惟能右羽林將軍慶厯中以惟敘子從煦封安國公終左金吾衛大將軍歸州團練使從煦卒以惟能子從古封安國公終延州觀察使諡曰惠恪從右卒從式封舒國公從式惟憲子也神宗即位謂創業垂統實自太祖顧無以稱乃下詔曰昔我藝祖之興肇造區夏大謨偉烈被諸萬世朕奉承聖緒夙夜不敢康乃顧後之子孫而有未議封爵之典豈朕所以繼大統尊親親之意哉且積厚者流必逺施大者報必豐其令中書門下考太祖之籍以屬近而行尊者一人裂土地而王之使常從獻于郊廟也世世勿復絶以稱朕尊祖報本之志焉時熙寧二年八月也於是有司推擇以從式應詔封安定郡王從式終保康軍節度使贈榮王諡曰安僖從式既薨乃封越王之孫世準為安定郡王世準從靄子也為人內恕外嚴無綺羅金玉之好既封凡天子祀郊廟必從祀如詔旨世準官至保靜軍節度使薨贈成王世開嗣世開從誨子惟和孫也官至奉國軍留後薨諡曰獻敏世雄嗣世雄亦從靄子也秀整莊重以詩書教子孫貯書萬卷名其堂曰樂善世雄官至崇信軍節度使薨贈淄王諡曰恭惠世福嗣官至集慶軍節度使薨贈儀王令蕩嗣越王之後世清薨子令廓襲封越國公楚王之後從式薨子世恩襲封楚國公徽宗立改封越王為吳王楚王為秦王太宗九子長漢王元佐次昭成太子元僖次真宗皇帝次商王元份次越王元傑次鎮王元偓次楚王元稱次周王元儼次崇王元億漢王元佐字惟吉初名德崇母元德皇后李氏太平興國五年出居內東門别第明年拜同平章事封衛王又明年進封楚王更今名初秦王廷美得罪元佐獨申救之由是失愛及廷美死元佐遂感心疾雍熙二年元佐疾小愈重陽召諸王宴而元佐以疾新起不與元佐曰諸王與宴而我不與是棄我也遂發憤中夜閉媵妾縱火焚宫太宗怒廢為庶人置于南宫真宗即位為左金吾衛上將軍復封楚王真宗東封拜太傅西祀拜太尉中書令又遷太師加尚書令授天䇿上將軍賜劒履上殿詔書不名仁宗即位以元佐伯父之尊恩禮甚厚薨年六十三追封齊王諡曰恭憲改潞王治平元年進封魏王子允升安國軍節度使贈平陽郡王諡曰懿恭允言黃州刺史允成濮州防禦使允升子宗旦崇信軍節度使開府儀同三司華隂郡王贈滕王諡曰恭孝仁宗封王後以允言子宗説恭憲王長孫封祁國公皇祐中坐亂其子婦除名又坐坑殺女僕於宗室外宅鎖閉卒熙寧三年以宗惠襲封魏國公宗惠允升子中書以宗惠不應封而以允言子宗立襲宗惠官至武昌軍留後江夏郡王贈郯王宗立官至武寧軍留後贈南康郡王子仲來襲封官至金州刺史子不儻嗣徽宗立改封魏王為漢王不儻卒子彥清乞襲父爵奉漢王祀詔以彥清襲父爵昭成太子元僖初名德明太平興國七年出閣授同平章事封廣平郡王八年進封陳王改名元佑詔班在宰相下雍熙二年為開封尹加兼侍中改今名太宗以契丹犯邊將大舉遣使往河北諸州科鄉民為兵元僖論其不便時趙普亦言其事太宗納之普為朋邪所疾元僖上表言普開國忠臣也願復以為相太宗從之進封許王加中書令薨年二十七無子太宗哭之慟贈皇太子諡曰恭孝改諡昭成當仁宗之世以允成子宗逹出後昭成太子為孫熙寧三年封燕國公以奉其祀宗逹卒贈新平郡王諡曰恭靖子仲恕襲封官至忠州團練使諡曰純僖子士盉嗣商王元份初名德嚴太平興國八年出閣改名元俊拜同平章事封冀王又改今名加兼侍中威武軍節度使進封越王淳化中兼領建寧軍改鎮寧海鎮東真宗即位加中書令徙鎮永興鳳翔改王雍永熙復土為山陵使拜太傅真宗北征為東京留守會得疾薨年三十七贈太師尚書令鄆王改陳王又改潤王治平中封魯王元份寬厚言動有禮子允寧寧武軍節度使贈信安郡王次允中右屯衛將軍次則濮王也别傳濮王薨以允寧子宗諤封虢國公至熙寧三年以宗肅襲封魯國公宗肅亦允寧子也終安化軍留後子仲先嗣徽宗改封魯王為商王政和三年詔曰宗室諸王追封大國其世襲子孫尚仍舊國甚未稱正名之意如魯王改封商王其子尚襲魯國之類其令大宗正司改正制以寧逺軍節度使魯國公仲先改封商國公越王元傑字明哲初名德和太平興國八年出閣改名拜同平章事封益王端拱初加侍中為劒南西川節度使淳化中徙封吳鎮淮南鎮江元傑嘗作假山既成召僚屬置酒共觀之翊善姚坦正直之士也獨俯首不視元傑強使視之坦曰坦見血山安得假山元傑問其故坦曰坦在田舍時見州縣督稅上下相剝急里胥臨門捕人父子兄弟送縣鞭笞流血滿身愁苦不聊生此假山皆民租賦所出非血山而何是時太宗亦為假山未成或以坦言聞太宗曰傷民如此何用山為亟命毁之元傑有過失坦必盡言規正左右教元傑詐疾太宗憂之召元傑乳母入宫問疾增損狀乳母曰王本無疾以翊善檢束王起居故不樂成疾耳太宗怒曰吾選端士為王僚屬者固欲輔王為善今王詐疾欲使朕去正人邪且王年少未知出此必爾輩為之因命杖之數十召坦慰安之至道二年移鎮淮南忠正真宗即位授中書令徙鎮武寧泰寧封兖王加太保薨年三十三贈太尉尚書令追封安王諡曰元惠元傑力學樂善後改封邢王治平中追封陳王元傑無子仁宗以魏王之孫仲郃為之後熙寧三年嗣封陳國公官至陳州觀察使諡曰良僖子士開嗣徽宗改封陳王為越王鎮王元偓字希道端拱元年出閣封徐國公至道二年拜鎮南軍節度使真宗即位加同平章事封彭城郡王改鎮靜難彰化進封寧王改王相纍拜太尉兼尚書令天僖元年改兼中書令歷鎮護國成德安國鎮寧封徐王薨年四十二贈太師尚書令鄧王諡曰恭懿元偓姿表偉異厚重寡言曉音律後改封密王又改王蘇治平中追封韓王子允弼少與仁宗並席仁宗為皇太子除英州刺史仁宗朝官至侍中武寧軍節度使判大宗正寺北海郡王英宗朝拜中書令徙王東平神宗即位拜太保鳳翔雄武軍節度使薨贈太師尚書令兼中書令相王以允弼子宗繢襲恭懿王封為韓國公卒贈南康郡王諡曰良孝宗繢弟宗景官至彰信軍節度使濟隂郡王薨贈循王諡曰思宗繢既卒子仲黁嗣徽宗改封韓王為鎮王靖康元年仲黁自平川軍節度使徙鎮劒南西川楚王元稱字令問淳化三年出閣除武昌軍節度使真宗即位加同平章事封安定郡王景德中遷宣德保寧軍節度使進爵舒王真宗東封進兼侍中移平江鎮江軍從祀汾隂加兼中書令徙鎮鎮南寧國拜太保薨年三十四贈太尉尚書令曹王諡曰恭惠元稱好學善屬文奉佛甚謹改贈華王治平中封蔡王子允則至右千牛衛將軍先是諸王子授官即為諸衛將軍餘以父官及族屬親疏差等天禧元年令宗正卿趙安仁參議定制安仁請以宣祖太祖太宗孫初蔭授將軍曾孫授右侍禁元孫授右班殿直內父爵髙者聽從髙蔭其事緣特旨者不以為例詔中書門下樞密院參定行之允則無子以平陽懿恭王允升之子宗逹為後熙寧三年襲封蔡國公以奉其祀宗逹卒子仲湯嗣徽宗改封蔡王為楚王周王元儼生而潁悟太宗尤所鍾愛而不欲早令出宫每朝會宴集必侍左右期以年二十始得出就外傅真宗即位封曹國公明年為平海軍節度使踰年拜同平章事景德初封廣陵郡王真宗封泰山改鎮昭德等軍進爵榮王祀汾隂加兼侍中徙鎮安靜武信祀太清宫加中書令坐侍婢縱火延燔禁中奪武信節降封端王尋拜鎮海安化軍節度使封彭王纍拜太傅厯鎮橫海永清保平定國封通王改涇王仁宗即位拜太尉尚書令兼中書令徙鎮安忠武軍節度使封定王賜贊拜不名又賜詔書不名天聖七年徙封鎮明年賜劒履上殿明道初拜太師換河陽三城節度使改封孟又改鎮永興鳳翔進封荆王景祐二年改荆南淮南節度大使仍賜入朝不趨元儼廣顙豐頥資質嚴重凛凛不可犯名聞外夷契丹尤畏其名事母孝嚴幼好學喜聚書善為文又善二王書法及飛白性謹約寡耆欲天聖以來太宗諸子獨元儼在仁宗尊寵甚異元儼不敢數入闔門不接人事好坐木馬子坐則不下或飢則便就其上飲食往往乘興奏樂於前酣飲終日其疾亟時仁宗親為調藥屏人與語久之所對多忠言薨年六十贈天䇿上將軍追封燕王諡曰恭肅治平中改封吳王有子十三人允良允迪允初餘皆早死允良泰寧軍節度使襄陽郡王允良好酣寢以晝為夜由是一宫之人皆晝睡夕興然性寬裕不甚喜聲色亦不為他驕恣未嘗詰責左右薨贈定王有司以允良起居無度反易晦明諡曰易允迪居父喪哭不哀又嘗宫中為優戲制曰安靜軍節度使允迪五刑之屬三千其罪莫大於不孝小民無知犯者猶鮮況爾燕恭肅王之子而朕之諸弟也宜率訓義以迪四方而乃在苴麻泣哭之哀為酣飲流酗之佚肆情鄙行害于而家而逹於朕聞嗟怨無已朕茍貸法何以處王公之上而教天下哉宜歸爵秩下領屯衛蓋寬於馭過而欲循省其罪無蹈後悔也可責授右監門衛大將軍久之遷密州觀察使復鎮安靜卒贈永嘉郡王諡曰思恪允初寧國軍節度使贈博平郡王諡曰安泰熙寧中以允良子宗絳嗣封吳國公徽宗改封吳王為周王崇王元億早亡追賜名封代國公治平中封安定郡王徽宗即位賜崇王東都事略卷十五
