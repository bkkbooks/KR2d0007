body:
  text: 東都事略卷十六宋王稱撰世家四真宗六子長溫王禔次周王祐次昌王祇次信王祉次欽王祁次仁宗皇帝溫王禔早薨徽宗即位追賜名贈溫王周王祐字慶長母曰章穆皇后咸平中封信國公生九年而薨追封周王諡曰悼昌王祗早薨徽宗追賜名贈昌王信王祉早薨徽宗追賜名贈信王欽王祈早薨徽宗追賜名贈欽王仁宗三子長揚王昉次雍王昕次荆王曦揚王昉生未踰月而薨追封褒王賜名昉諡曰懷靖後封魏王治平中封周王徽宗即位贈揚王雍王昕封夀國公生三年而薨追封豫王諡曰悼穆改封魏王治平中封唐王徽宗贈雍王荆王曦慶厯三年生生三年封鄂王賜名曦未及宣制而薨諡曰悼懿改封陳治平中封燕王徽宗贈荆王濮王諱允讓字益之恭靖商王元份之子也為人天姿渾厚外莊而內寬左右親近未嘗見其有喜愠之色始為右千牛衛將軍周王薨真宗以緑車旄節迎養于禁中至仁宗生用簫韶部樂送還邸真宗時官衛州刺史仁宗即位授汝州防禦使纍拜寧江軍節度使仁宗建睦親宅乃命知大宗正寺宗子有好學趨義則褒勉委曲進之於善若不率教始勸諭之又糾戒之至不悛則正其罪而上聞故人人莫不畏愛而心服之慶厯四年封汝南郡王拜同平章事改判大宗正寺嘉祐四年薨年六十贈太尉中書令封濮王諡曰安懿仁宗在位既久無子乃以王第十三子為皇子仁宗崩皇子即位是為英宗治平元年宰相韓琦等奏以濮安懿王德盛位隆宜有尊禮請下有司議濮安懿王及譙國夫人王氏襄國夫人韓氏仙遊縣君任氏合行典禮詔須大祥後議之至二年乃詔禮官與待制以上議翰林學士王圭等奏曰謹按儀禮喪服為人後者傳曰何以三年也受重者必以前服服之為所後者祖父母妻之父母昆弟之子若子者皆如親子也又為人後者為其父母傳曰何以期不二斬特重於大宗降其小宗也為人後者為其昆弟傳曰何以大功也為人後者降其昆弟先王制禮尊無二上若恭愛之心分於彼則不得專於此故也是以秦漢以來帝王有自旁支入承統者或推尊其父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法況前代入繼者多宫車晏駕之後援立之䇿或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡推聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承皆先帝德也臣等竊以為濮王宜準先朝封贈期親尊屬故事尊以髙官大國譙國襄國仙遊亦封太夫人考之古今為宜稱於是中書奏王圭等所議未見詳定濮王當稱何親名與不名圭等議濮王於仁宗為兄於皇帝宜稱皇伯而不名如楚王涇王故事中書又奏儀禮令及五服年月敕出繼之子於所繼所生皆稱父母又漢宣帝光武皆稱父為皇考今圭等議稱濮王為皇伯於典禮未有明據請下尚書省集三省御史臺議奏方議而皇太后手詔詰責執政於是手詔聞集議不一宜權罷議當令有司博求典故以聞禮官范鎮等又奏漢之稱皇考稱帝稱皇立寢廟序昭穆皆非陛下聖明之所法宜如前議為便自是御史吕誨等彈奏歐陽修首建邪議韓琦曽公亮趙概附會不正之罪固請如王圭等議既而內出皇太后手詔曰吾聞羣臣議請皇帝封崇濮安懿王至今未見施行吾載閲前史乃知自有故事濮安懿王譙國夫人王氏襄國夫人韓氏仙遊縣君任氏可令皇帝稱親濮安懿王稱皇王氏韓氏任氏並稱后事方施行而英宗即日手詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋為園即園立廟俾王子孫主奉祠事翌日誨等以所論列彈奏不見聽用繳納御史敕告家居待罪誨等所列大抵以為前詔稱權罷集議後詔又稱且欲以塋為園即追崇之意未巳英宗命閣門以告還之誨等力辭臺職誨等既出而濮議亦寢至神宗元豐二年詔以濮安懿王三夫人可並稱曰王夫人云濮王長子宗懿當英宗時為宿州團練使封和國公次子宗朴為隴州防禦使封岐國公宗懿卒神宗以宗懿濮安懿王元子追封舒王宗朴與英宗相友愛初詔英宗入居慶寧宫固辭不即赴宗朴帥近屬敦勸乃入治平中建濮王園廟宗朴遂拜彰德軍節度使濮國公以奉王後神宗即位加同平章事兼侍中封濮陽郡王薨贈定王弟宗誼襲濮國公官至昭化軍節度使同平章事贈廣陵郡王宗誼既薨宗暉襲封濮國公自雍州觀察使拜淮康軍節度使元豐中濮王三夫人改祔濮王園以宗暉為鎮安軍節度使同平章事神宗詔宗暉嗣封濮王哲宗即位徙鎮鎮南薨贈懷王諡曰榮穆以宗晟嗣官至武安軍節度使贈昌王諡曰端孝宗晟薨宗愈嗣官至鎮南軍節度使開府儀同三司贈襄王宗愈薨宗綽嗣官至河陽三城節度使開府儀同三司贈榮王諡曰孝端宗綽薨宗楚嗣官至武昌軍節度使贈惠王諡曰僖節宗楚薨宗祐嗣官至清海軍節度使贈欽王宗祐薨宗漢嗣官至奉寧軍節度使開府儀同三司贈景王宗漢薨仲增嗣仲增濮王孫於屬為長故封官至彰德軍節度使開府儀同三司贈簡王仲增薨仲御嗣官至奉寧軍節度使開府儀同三司贈郇王諡曰康王仲御薨仲爰嗣官至武定軍節度使開府儀同三司判大宗正寺贈恭王仲爰薨仲理嗣靖康初為武安軍節度使開府儀同三司臣稱曰禮大宗無子而以小宗為後聖人許之英宗既以父仁宗矣若濮王又稱親則是二統也父子之道天性也君臣之義也藉使濮王極其尊崇則於君臣之義得為安乎當時大臣違禮廢義臺臣焉得不以死爭之英宗容受盡言寢而不議而使後世無可指之瑕聖矣夫英宗四子長神宗皇帝次吳王皓次潤王顔次益王頵吳王皓字仲明母曰宣仁聖烈皇后始名仲糾授率府副率英宗即位遷至明州觀察使封祁國公賜今名拜保寧軍節度使同平章事東陽郡王治平三年出閣居東宫神宗即位拜武昌武安軍節度使封昌王易泰寧鎮海軍改王岐官制行册拜司空徙王雍哲宗嗣位拜太保換成德橫海二鎮徙封楊王用周漢故事賜贊拜不名五日一朝見於禁中神宗祔廟拜太傅移鎮京兆鳳翔元祐初與荆王頵遷外第名曰親賢宅拜太尉諸子自勝衣以上皆命進官制曰先皇帝篤兄弟之好以恩勝義不許二叔出居于外蓋武王待周召之意太皇太后嚴朝廷之禮以義制恩始從其請出就外宅得孔子逺其子之意二聖不同同歸于道可以為萬世法朕承侍兩宫按行新第顧瞻懷思澘然出涕昔漢明帝問東平王在家何以為樂王言為善最樂帝大其言因送列侯印十九枚諸子年五嵗以上悉佩之著之簡䇿天下不以為私今王諸子性于忠孝漸于禮義自勝衣以上頎然皆有成人之風朕甚嘉之其各進一官以助其為善之樂尚勉之哉毋忝乃父祖以為邦家光徙封徐王詔書不名宣仁祔廟拜太師徙王冀賜入朝不趨改淮南荆南節度使徙封楚初宣仁不豫皓日問起居因以被疾至是薨年四十七哲宗哭之慟成服苑中贈尚書令兼中書令諡曰榮皓薨之五日以月朔應視朝于文德殿哲宗以皓未成服改視垂拱云皓通經史工飛白善鼓琴神宗臨御久友愛彌篤哲宗尊禮尤隆既薨葬于永厚陵之北徽宗即位追封吳王子孝騫靖康初為定武軍節度使晉康郡王孝錫終嘉州防禦使贈永國公潤王顔早薨徽宗追賜名贈潤王益王頵初賜名仲恪為率府副率英宗時賜今名遷至耀州觀察使神宗即位拜同平章事領武勝軍節度使樂安郡王熙寧四年出閣拜保信保鎮軍節度使封嘉王元豐三年拜司空徙王曹哲宗即位拜太保鎮武昌武安進爵荆王賜贊拜不名五日一朝禁中哲宗致恭如家人禮神宗祔廟拜太傅徙武寧鎮海元祐元年始居外第拜太尉改鎮成德荆南薨年三十三贈太師尚書令魏王諡曰端獻徽宗改封益王頵端重明粹博通羣書有智識好釋氏亦好方書數捐藥以救病者其仁厚蓋天稟云子孝哲邢州觀察使贈廣陵郡王孝怡終保寧軍節度使孝參靖康時為武勝軍節度使豫章郡王孝奕終彰化軍留後贈平原郡王孝騭靖康時為武寧軍節度使孝忱奉寧軍節度使孝潁順昌軍節度使孝願靖難軍節度使東都事略卷十六
