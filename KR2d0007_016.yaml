body:
  text: 東都事略卷十六宋王稱撰世家四眞宗六子長温王禔次周王祐次昌王祇次信王祉次欽王祁次仁宗皇帝温王禔早薨徽宗即位追賜名贈温王周王祐字慶長母曰章穆皇后咸平中封信國公生九年而薨追封周王諡曰悼昌王祗早薨徽宗追賜名贈昌王信王祉早薨徽宗追賜名贈信王欽王祈早薨徽宗追賜名贈欽王仁宗三子長揚王昉次雍王昕次荆王曦揚王昉生未踰月而薨追封褒王賜名昉諡曰懐靖後封魏王治平中封周王徽宗即位贈揚王雍王昕封夀國公生三年而薨追封豫王諡曰悼穆改封魏王治平中封唐王徽宗贈雍王荆王曦慶厯三年生生三年封鄂王賜名曦未及宣制而薨諡曰悼懿改封陳治平中封燕王徽宗贈荆王濮王諱允讓字益之恭靖商王元份之子也爲人天姿渾厚外莊而内寛左右親近未嘗見其有喜愠之色始爲右千牛衛將軍周王薨眞宗以緑車旄節迎養于禁中至仁宗生用簫韶部樂送還邸眞宗時官衛州刺史仁宗即位授汝州防禦使累拜寜江軍節度使仁宗建睦親宅乃命知大宗正寺宗子有好學趨義則褒勉委曲進之於善若不率教始勸諭之又糾戒之至不悛則正其罪而上聞故人人莫不畏愛而心服之慶厯四年封汝南郡王拜同平章事改判大宗正寺嘉祐四年薨年六十贈太尉中書令封濮王諡曰安懿仁宗在位既久無子乃以王第十三子爲皇子仁宗崩皇子即位是爲英宗治平元年宰相韓琦等奏以濮安懿王徳盛位隆宜有尊禮請下有司議濮安懿王及譙國夫人王氏襄國夫人韓氏仙遊縣君任氏合行典禮詔須大祥後議之至二年乃詔禮官與待制以上議翰林學士王珪等奏曰謹按儀禮喪服爲人後者傳曰何以三年也受重者必以前服服之爲所後者祖父母妻之父母昆弟之子若子者皆如親子也又爲人後者爲其父母傳曰何以期不二斬特重於大宗降其小宗也爲人後者爲其昆弟傳曰何以大功也爲人後者降其昆弟先王制禮尊無二上若恭愛之心分於彼則不得專於此故也是以秦漢以來帝王有自旁支入承統者或推尊其父母以爲帝后皆見非當時取譏後世臣等不敢引以爲聖朝法況前代入繼者多宫車晏駕之後援立之䇿或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡推聖明授以大業陛下親爲先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承皆先帝徳也臣等竊以爲濮王宜準先朝封贈期親尊屬故事尊以髙官大國譙國襄國仙遊亦封太夫人攷之古今爲宜稱於是中書奏王珪等所議未見詳定濮王當稱何親名與不名珪等議濮王於仁宗爲兄於皇帝宜稱皇伯而不名如楚王涇王故事中書又奏儀禮令及五服年月敕出繼之子於所繼所生皆稱父母又漢宣帝光武皆稱父爲皇考今珪等議稱濮王爲皇伯於典禮未有明據請下尚書省集三省御史臺議奏方議而皇太后手詔詰責執政於是手詔聞集議不一宜權罷議當令有司博求典故以聞禮官范鎭等又奏漢之稱皇考稱帝稱皇立寢廟序昭穆皆非陛下聖明之所法宜如前議爲便自是御史吕誨等彈奏歐陽脩首建邪議韓琦曽公亮趙㮣附㑹不正之罪固請如王珪等議既而内出皇太后手詔曰吾聞羣臣議請皇帝封崇濮安懿王至今未見施行吾載閱前史乃知自有故事濮安懿王譙國夫人王氏襄國夫人韓氏仙遊縣君任氏可令皇帝稱親濮安懿王稱皇王氏韓氏任氏並稱后事方施行而英宗即日手詔曰稱親之禮謹遵慈訓追崇之典豈易克當且欲以塋爲園即園立廟俾王子孫主奉祠事翌日誨等以所論列彈奏不見聽用繳納御史敕告家居待罪誨等所列大抵以爲前詔稱權罷集議後詔又稱且欲以塋爲園即追崇之意未巳英宗命閤門以告還之誨等力辭臺職誨等既出而濮議亦寢至神宗元豐二年詔以濮安懿王三夫人可並稱曰王夫人云濮王長子宗懿當英宗時爲宿州團練使封和國公次子宗樸爲隴州防禦使封岐國公宗懿卒神宗以宗懿濮安懿王元子追封舒王宗樸與英宗相友爱初詔英宗入居慶寜宫固辭不即赴宗樸帥近屬敦勸乃入治平中建濮王園廟宗樸遂拜彰徳軍節度使濮國公以奉王後神宗即位加同平章事兼侍中封濮陽郡王薨贈定王弟宗誼襲濮國公官至昭化軍節度使同平章事贈廣陵郡王宗誼既薨宗暉襲封濮國公自邕州觀察使拜淮康軍節度使元豐中濮王三夫人改祔濮王園以宗暉爲鎭安軍節度使同平章事神宗詔宗暉嗣封濮王哲宗即位徙鎮鎮南薨贈懐王諡曰榮穆以宗晟嗣官至武安軍節度使贈昌王諡曰端孝宗晟薨宗愈嗣官至鎮南軍節度使開府儀同三司贈襄王宗愈薨宗綽嗣官至河陽三城節度使開府儀同三司贈榮王諡曰孝端宗綽薨宗楚嗣官至武昌軍節度使贈惠王諡曰僖節宗楚薨宗祐嗣官至清海軍節度使贈欽王宗祐薨宗漢嗣官至奉寜軍節度使開府儀同三司贈景王宗漢薨仲増嗣仲増濮王孫於屬爲長故封官至彰徳軍節度使開府儀同三司贈簡王仲増薨仲御嗣官至奉寜軍節度使開府儀同三司贈郇王諡曰康王仲御薨仲爰嗣官至武定軍節度使開府儀同三司判大宗正寺贈恭王仲爰薨仲理嗣靖康初爲武安軍節度使開府儀同三司臣稱曰禮大宗無子而以小宗爲後聖人許之英宗既以父仁宗矣若濮王又稱親則是二統也父子之道天性也君臣之義也藉使濮王極其尊崇則於君臣之義得爲安乎當時大臣違禮廢義臺臣焉得不以死爭之英宗容受盡言寢而不議而使後世無可指之瑕聖矣夫英宗四子長神宗皇帝次呉王顥次潤王顔次益王頵呉王顥字仲明母曰宣仁聖烈皇后始名仲糾授率府副率英宗即位遷至明州觀察使封祁國公賜今名拜保寜軍節度使同平章事東陽郡王治平三年出閤居東宫神宗即位拜武昌武安軍節度使封昌王易泰寜鎮海軍改王岐官制行冊拜司空徙王雍哲宗嗣位拜太保換成徳横海二鎭徙封楊王用周漢故事賜賛拜不名五日一朝見於禁中神宗祔廟拜太傅移鎭京兆鳳翔元祐初與荆王頵遷外第名曰親賢宅拜太尉諸子自勝衣以上皆命進官制曰先皇帝篤兄弟之好以恩勝義不許二叔出居于外蓋武王待周召之意太皇太后嚴朝廷之禮以義制恩始從其請出就外宅得孔子逺其子之意二聖不同同歸于道可以爲萬世法朕承侍兩宫按行新第顧瞻懐思澘然出涕昔漢明帝問東平王在家何以爲樂王言爲善最樂帝大其言因送列侯印十九枚諸子年五嵗以上悉佩之著之簡䇿天下不以爲私今王諸子性于忠孝漸于禮義自勝衣以上頎然皆有成人之風朕甚嘉之其各進一官以助其爲善之樂尚勉之哉毋忝乃父祖以爲邦家光徙封徐王詔書不名宣仁祔廟拜太師徙王冀賜入朝不趨改淮南荆南節度使徙封楚初宣仁不豫顥日問起居因以被疾至是薨年四十七哲宗哭之慟成服苑中贈尚書令兼中書令諡曰榮顥薨之五日以月朔應視朝于文徳殿哲宗以顥未成服改視垂拱云顥通經史工飛白善鼓琴神宗臨御久友愛彌篤哲宗尊禮尤隆既薨葬于永厚陵之北徽宗即位追封呉王子孝騫靖康初爲定武軍節度使晉康郡王孝錫終嘉州防禦使贈永國公潤王顔早薨徽宗追賜名贈潤王益王頵初賜名仲恪爲率府副率英宗時賜今名遷至耀州觀察使神宗即位拜同平章事領武勝軍節度使樂安郡王熈寜四年出閤拜保信保鎭軍節度使封嘉王元豐三年拜司空徙王曹哲宗即位拜太保鎭武昌武安進爵荆王賜賛拜不名五日一朝禁中哲宗致恭如家人禮神宗祔廟拜太傅徙武寜鎭海元祐元年始居外第拜太尉改鎭成徳荆南薨年三十三贈太師尚書令魏王諡曰端獻徽宗改封益王頵端重明粹博通羣書有智識好釋氏亦好方書數捐藥以救病者其仁厚蓋天稟云子孝哲邢州觀察使贈廣陵郡王孝怡終保寜軍節度使孝參靖康時爲武勝軍節度使豫章郡王孝奕終彰化軍留後贈平原郡王孝騭靖康時爲武寜軍節度使孝忱奉寜軍節度使孝潁順昌軍節度使孝愿靖難軍節度使東都事略卷十六
