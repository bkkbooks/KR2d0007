body:
  text: 東都事略卷十七宋王稱撰世家五神宗十四子長成王佾次惠王僅次唐王俊次褒王伸次冀王僴次哲宗皇帝次豫王價次徐王倜次吳王佖次儀王偉次徽宗皇帝次燕王俁次楚王似次越王偲成王佾早薨徽宗即位追賜名贈成王惠王僅早薨徽宗追賜名贈惠王唐王俊熙寧七年封永國公十年薨贈兖王徽宗封唐王褒王伸早薨徽宗追賜名贈褒王冀王僴熙寧八年封景國公是嵗薨徽宗贈冀王豫王價熙寧十年封建國公元豐元年薨贈衛王徽宗封豫王徐王倜早薨贈鄆王諡曰沖惠徽宗封徐王吳王佖元豐間封儀國公哲宗即位封大寧郡王紹聖二年出閣拜鎮安武勝軍節度使封申王元符二年加司空徙鎮保平泰寧哲宗崩欽聖后議所立以佖有目疾不得立乃立端王是為徽宗加太傅移鎮永興成德徙王陳賜贊拜不名加太尉荆南淮南節度使拜太師徙鎮河東山南西道薨贈尚書令兼中書令燕王又加贈侍中吳王子有奕武信軍節度使和義郡王有常寧逺軍節度使儀王偉早薨徽宗追賜名贈儀王燕王俁元豐間封成國公哲宗即位封咸寧郡王元符元年出閣拜河陽三城雄武軍節度使封莘王加司空移鎮武寧鎮寧徽宗即位加太保徙鎮河東奉寧封衛王又徙鎮護國山南西道又改鎮海泰寧大觀元年詔曰衛王定王朕之愛弟也其改封魏王定王亦徙王鄧拜太尉永興成德軍節度使進爵燕王遷太傅欽宗即位詔曰燕王越王神祖之子道君之弟而朕之諸父也其賜入朝不趨贊拜不名授太師河東劒南西川節度使二帝北狩宗族盡徙云楚王似元豐間封和國公哲宗即位封普寧郡王元符元年出閣拜橫海鎮海軍節度使封簡王哲宗崩宰相章惇以似哲宗同母弟當立欽聖后不可乃立徽宗進司徒改鎮武昌武寧徙封蔡拜太保移鎮保平鎮安又改鳳翔雄武以書史語言指斥送大理寺驗治似上表待罪於是左司諫江公望上疏曰臣聞天下之理有隙則物皆可入故聖人塗隙於未開之前有迹則瑕皆可指故聖人泯迹於未形之際物可入則親者離矣瑕有指則疑者實矣其可不察邪臣聞蔡王府史相告有不順之語浸淫恐及蔡王有司已行根治臣聞之駭汗浹背驚悸不自持豈有孝治之本太平之時乃容小人銜私怨逞不軌離間陛下骨肉之親者乎象之於舜焚廪浚井其逆心已萌矣擁二女坐床鼓琴其逆謀已成矣舜未嘗藏怒宿怨卒封之有庳而富貴之也至魏文帝褊忿疑忌一陳思王且不能相容致有煮豆然萁之說相煎太急之語為天下後世笑豈不思兄弟人之大倫也有手足相捍之親有首尾相應之義有塤箎之和有友于之樂故孔子以不間於父母兄弟之言為孝蓋親隙不可開隙開則言可離二疑迹不可顯迹顯則事難磨滅陛下之得天下也惇嘗簾前持異議已有隙迹矣蔡王出於無心年尚幼少未逹禍亂之萌故恬不以為恤陛下一切包容已開之隙復塗矣已顯之迹復泯矣恩意渥縟歡然不失兄弟之情與夫區區未能忘天下操以自狹者不啻相十百矣陛下若以曖昧無根之語而加諸至親骨肉之間則有魏文相煎太急之隙而忘大舜親親之道豈治世之美事也臣願陛下密詔有司凡無根之言勿形案牘箠楚之下何求弗得一有浸淫旁及蔡王之語不識陛下將如何處之儻形案牘有瑕可指一入胸次終身不忘雖父子之間尚未能磨滅況兄弟乎迹不可泯隙不可塗則骨肉離矣陛下將何道以治天下也蔡王萬一䝉犯霧露之疾神考在天之靈豈不知之陛下將何顔見神考於太廟乎書曰克明俊德以親九族九族既睦平章百姓詩曰刑于寡妻至于兄弟以御于家邦故至德要道足以風動天下未有不自親始者也疏入公望罷知淮陽軍徽宗雖黜公望頗思其言止治其左右崇寧中徙鎮荆南武寧薨贈太師尚書令兼中書令韓王改封楚王子有恭定國軍節度使永寧郡王越王偲元祐初封祁國公元符元年封永寧郡王出閣以為鎮安集慶軍節度使封睦王徽宗即位拜司徒移鎮清海鎮海封定王又徙鎮武寧武勝改鎮淮南永興進封鄧王拜太尉鳳翔山南西道節度使改封越王遷太傅欽宗即位授太師永興成德軍節度使金人犯京師欲以越王為質欽宗以越王叔父不可遣乃遣肅王及駙馬都尉曹晟以行晟尚榮德帝姬與欽宗同生故遣之偲竟從二帝北遷云哲宗獻愍太子茂母皇后劉氏生一年而薨追賜名贈越王諡曰沖獻徽宗即位贈鄧王崇寧二年詔曰朕惟先皇帝在位十有六年而皇嗣鄧王降年不永逮朕入繼大統之初雖加贈典而恩意未隆非所以上慰先帝在天之靈其特追贈皇太子仍改諡曰獻愍徽宗三十一子長欽宗皇帝次兖王柳次鄆王楷次荆王楫次肅王樞次景王杞次濟王栩次益王棫次太上皇帝次邠王材次祁王模次莘王植次儀王朴次徐王棣次沂王樗次鄆王栱次和王栻次信王榛次漢王椿次安康郡王楃次廣平郡王􅚃次相國公梴次陳國公機次瀛國公樾次建安郡王楧次嘉國公椅次溫國公棟次英國公橞次儀國公桐次昌國公柄次潤國公樅兖王柳以建中靖國元年九月生一夕而殞追賜名贈兖王諡曰沖僖鄆王楷字德逺初名煥崇寧元年封魏國公更今名封髙密郡王以八寶恩除司空鎮東軍節度使封嘉王遷太保又遷太尉政和六年出閣拜太傅武寧保平軍節度使八年令赴殿試有司考為第一改鎮荆南寧江提舉皇城司封鄆王徙劒南西川鎮南軍又徙河東寧海靖康元年移鎮鳳翔彰武徽宗諸子薨于京師者則哀榮終始備見焉餘從二帝北遷皆不知其所終荆王楫崇寧二年封楚國公三年封南陽郡王改王樂安薨贈荆王諡曰悼敏肅王樞崇寧三年封吳國公大觀二年封建安郡王重和元年出閣拜太保保平寧武軍節度使封肅王靖康元年金人犯京師以樞北質云景王杞崇寧三年封冀國公大觀二年封文安郡王重和元年出閣拜太保護國武昌軍節度使封景王靖康元年授太傅徙鎮荆南鎮東濟王栩崇寧五年封魯國公大觀二年封安康郡王宣和三年拜太保清海軍節度使封濟王靖康元年授太傅徙鎮護國寧海益王棫大觀元年封揚國公二年封淮南郡王徙濟陽後以橫海軍節度使封益王邠王材大觀二年封魏國公薨追封邠王諡曰沖穆祁王模大觀二年封鎮國公宣和三年封樂安郡王拜武勝興寧軍節度使封祁王靖康元年授太傅改鎮清海慶源莘王植大觀二年封吳國公宣和四年封信安郡王拜寧江軍節度使封莘王靖康元年授太傅改鎮保平崇信儀王朴大觀三年封雍國公宣和五年封華原郡王後以靜難軍節度使封儀王徐王棣大觀三年封徐國公宣和五年封髙平郡王拜山南東道節度使封徐王靖康元年授太傅改鎮山南西道武昌軍沂王樗大觀四年封冀國公宣和六年封河間郡王拜太保劒南東川威武軍節度使封沂王靖康元年授太傅改鎮河陽武寧鄆王栱政和元年封定國公二年薨追封鄆王諡曰沖懿和王栻政和元年封廣國公宣和七年封南康郡王靖康元年拜瀛海安化軍莭度使封和王信王榛政和元年封福國公宣和七年封平陽郡王靖康元年拜慶陽昭化軍節度使封信王漢王椿政和二年封慶國公薨追封漢王安康郡王楃政和二年封衛國公改封鄆靖康元年封安康郡王廣平郡王􅚃以政和三年封韓國公靖康元年封廣平郡王相國公梴以政和四年封陳國公機以政和五年封瀛國公樾以政和五年封建安郡王楧政和五年封惠國公宣和七年封建安郡王嘉國公椅以政和八年封溫國公棟以宣和元年封英國公橞以宣和二年封儀國公桐以宣和三年封昌國公柄以宣和四年封潤國公樅以宣和七年封欽宗皇太子諶母曰皇后朱氏以政和七年生於東宫於徽宗為嫡長皇孫及應賜名命官而祖宗無故事宰相蔡京與鄭居中共議封為崇國公王黼奏曰蔡京以皇子之禮封東宫子則是便以東宫為人主矣徽宗不恱欽宗即位以為昭慶軍節度使大寧郡王徙鎮寧國立為皇太子是嵗金人圍京師明年欽宗幸金營以皇太子監國從二帝北徙云東都事略卷十七
