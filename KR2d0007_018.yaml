body:
  text: 東都事略卷十八宋王稱撰列傳一范質字文素大名宗城人也母張氏夢人授五色筆而質生九嵗善屬文唐長興中舉進士爲忠武軍推官晉天福中懐其文見宰相桑維翰維翰竒之擢監察御史稍遷主客員外郎直史舘召入翰林爲學士契丹入邉晉出帝命十五將出征是夕質宿直出帝命諸學士分草制質曰宫城已閉慮泄機事遂獨爲之辭理優贍當時文士皆歎伏周太祖征李守貞每朝廷遣使齎詔處分軍事皆中機㑹太祖問誰爲此辭使者以質對太祖曰宰相器也太祖起兵入京師遽令草太后誥及議迎湘隂公儀注乃白太后以質爲兵部侍郎樞密副使周廣順初拜中書侍郎同中書門下平章事集賢殿大學士兼參知樞密院事世宗時累加司徒洪文館大學士恭帝即位封蕭國公北邊奏太原劉承鈞結契丹入邉乃命我太祖北征爲六師推戴自陳橋入城還府第時質方就食閤中聞太祖入率王溥魏仁浦就府謁見質執溥手曰倉卒遣將吾儕之罪也爪入溥手幾出血溥無語既見太祖質曰先帝養太尉如子今身未令奈何太祖性仁厚嗚咽流涕曰吾受世宗厚恩今爲六軍所逼一旦至此將若之何軍校羅彦瓌按劒厲聲向質曰我輩無主今日須得天子太祖叱之不退質知勢不可遏曰事已爾無太倉卒自古帝王有䄠位之禮今可行也因具陳之且曰太尉既以禮受䄠則事太后如母養少主如子無負先帝舊恩太祖揮涕許諾然後率百官成禮太祖由此深敬重質太祖既即位加兼侍中仍以爲相乾徳初封魯國公二年罷爲太子太傅卒年五十四贈中書令初和凝知貢舉愛質所試文自以中第在第十三故亦以處質其後質官及封國皆與凝同當時謂之傳衣鉢太宗嘗言近世輔弼循規矩惜名器持亷節無與質比者但欠世宗一死爲可惜爾子旻兄子杲旻字貴參以父任爲千牛備身國初爲度支貟外郎知開封縣太宗爲開封尹頗器重之嶺南平知邕州知淮南轉運事太宗時爲三司副使累官給事中判三司坐擅市竹木入官爲王仁贍所發貶房州司户參軍移唐州以卒年四十六杲字師回力學有文太宗時由鄧州從事爲直史館厯左拾遺補闕擢知制誥以工部郎中罷知夀州復爲知制誥當遷翰林學士太宗以其躁競不使居内職出爲右諫議大夫知濠州召爲史館修撰至京師而卒年五十六王溥字齊物并州祁人也漢乾祐中舉進士甲科李守貞據河中趙思綰反京兆王景崇亂鳳翔周太祖將兵討三叛以溥爲從事三叛既平朝士及藩鎮嘗以書徃來詞意渉于悖逆者太祖籍其名欲按之溥諫曰魑魅伺夜而出日月既照則氛沴消矣請焚之以安反側太祖從之太祖將大漸促召學士草制以溥爲中書侍郎同中書門下平章事已宣制太祖曰吾無恨矣世宗嘗問漢相李崧蠟彈書結北虜有記其辭者否溥曰使崧有此肯示人耶蘇逄吉輩陷之爾世宗遂優贈崧官世宗將討秦鳳溥薦向拱遂平之世宗因宴酌卮酒賜之曰成吾邊功卿擇帥之力也恭帝即位加尚書右僕射國初進位司空乾徳二年罷爲太子太保加太子太傅開寳二年遷太子太師太平興國初封祁國公卒年六十一贈侍中諡曰文獻後以溥諡同僖祖改諡文康溥在相位日父祚以宿州防禦使家居每公卿至必謁祚引觴爲夀溥侍側坐客不敢安席祚曰此豚犬爾不煩諸君起人稱其孝敬子貽孫貽正貽正官至國子博士貽正之子克明尚太宗女鄭國長公主賜名貽永令與父同行貽孫字象賢顯徳中溥在相位以貽孫爲著作郎國初遷金部貟外郎溥藏書至萬卷貽孫徧覽之太祖嘗問趙普拜禮何以男子跪而婦人不跪普訪禮官無知者貽孫曰古詩云長跪問故夫即婦人古亦跪也唐武后時婦人始拜而不跪普問所出對曰唐幽州從事張建章著渤海記備言之普歎伏貽孫累遷右司郎中以卒貽永字季長眞宗以其故相家也選尚主除右衛將軍駙馬都尉明年主薨貽永累遷右監門衛大將軍蔣州團練使請試郡得知單州徙徐州是時河決貽永作隄城南以禦水患詔褒之仁宗即位改衛州團練使知澶州遷懐州防禦使拜耀州觀察使歴彰化武定軍留後拜彰徳軍節度使知天雄軍改鎭保寜知鄆州自咸平中徙城而故治爲通衢密邇梁山泊春夏多病渉貽永相地築東西道三十餘里至今人獲其濟徙定州成徳軍康定元年擢同知樞密院事改副使加宣徽南院使拜樞密使慶厯六年加同平章事明年封遂國公加兼侍中改鎮海軍節度使封鄧國公貽永以寵禄過盛願解樞柄乃聽罷侍中徙鎮彰徳復以疾求去位除尚書右僕射兼侍中景靈宫使卒年七十一贈太師中書令諡曰康靖貽永性謹約寡言無綺羅聲色之好惟養鵓鴿數十愛翫而已魏仁浦字道濟衛州汲人也少爲刀筆吏𨽻樞密院周太祖爲樞密使問以卒乗數仁浦對曰帶甲者六萬太祖喜曰天下事不足憂也漢隱帝遣使害太祖仁浦曰公有大功於朝廷握彊兵臨重鎭以讒見疑豈可坐而待死教以易其語云誅將士以激其怒心太祖納其言遂長驅度河及即位以爲樞密承旨世宗時爲樞密副使陞樞密使拜中書侍郎同中書門下平章事集賢殿大學士兼樞密使始議者以仁浦不由科第進世宗曰顧才如何爾遂用之恭帝嗣位加刑部尚書國初進位右僕射乾徳初罷開寳二年春宴太祖笑謂仁浦曰何不勸朕酒乎仁浦奉觴上夀太祖密謂之曰朕欲征太原如何仁浦曰欲速不逹太祖頷之從征太原至梁侯驛遇疾而卒仁浦性寛厚接士有禮專務以徳報怨世宗卞急輕殺戮仁浦營救而免者十常七八從出征鋒鏑之下而無一人横死者有鄭元昭者爲解州刺史仁浦婦翁李温玉爲㩁鹽使元昭不得專其利乃誣温玉之子從李守貞叛捕以告變欲中傷仁浦周太祖爲辨其誣獲免及仁浦大用乃以元昭典五郡又嘗爲賈延徽譖幾遇禍揔師出征有得延徽以獻者仁浦曰因兵戈以報怨不忍爲也人稱其長者諡曰宣懿後以子咸信尚主追封齊王咸信字國寳國初昭憲皇后嘗至仁浦第見咸信竒之開寳中太宗尹京以咸信尚永慶公主拜右衛將軍駙馬都尉太平興國初爲吉州防禦使遷觀察使契丹入冦以咸信知澶州拜彰徳軍節度使眞宗即位徙鎮定國武成知曹州改知河陽又知澶州移鎭忠武眞宗升宋州爲南京以咸信太祖舊臣加同平章事判天雄軍改鎭保平卒年六十九贈中書令咸信頗知書亦喜待士然性吝嗇喜規利子昭昞至觀察使臣稱曰自古治少亂多五代干戈之亂極矣天既厭亂而思治故眞主勃興此范質王溥仁浦得以講揖遜之禮遂相藝祖于立國之初而天下晏然也嗚呼以伊尹之聖太公之賢皆以夏商之舊而歸湯文蓋以授受于天者有不庸釋則舍湯文將安歸乎由是觀之質等所以歸有徳爲無嫌也誠與夫賣國而趍利䝉耻而立朝者有間矣東都事略卷十八
