body:
  text: 東都事略卷二十一宋王稱撰列傳四咱居潤字廣川博州髙唐人也少有氣節嘗為樞密院小吏景延廣留守西京補為右職契丹犯京師以兵圍延廣家故吏悉避去居潤為全護其家時論稱之仕周世宗為軍器庫使從征髙平以功遷客省使知青秦二州歷知鳳翔河中入知開封府世宗幸淮上命為副留守遷宣徽北院使加南院使判開封府太祖征澤潞命居潤赴澶州巡警師還知鎮州拜義成軍節度使卒年五十九贈太師張美字元圭貝州清河人也少為三司小吏澶州糧料使周世宗鎮澶淵每有求取美悉力應之及即位召為樞密承旨權判三司授三司使世宗用兵淮上及北征以美為大內都點檢師還擢左領軍上將軍充宣徽北院使世宗連歲征討糧餽無乏美之力也然每思澶州所為終不以公忠待之李筠叛太祖親征以饋運功拜定國軍節度使五代以來官市木關中州歲出緡錢數十萬以假民長吏十取其一謂之率分錢美至鎮有所謂率分錢者一無所受由是始革其弊移鎮滄州太宗時為左驍衛上將軍致仕卒年六十八諡曰恭惠向拱字星民懷州河內人也始名訓避周恭帝名改焉嘗以策干漢髙祖髙祖不用客于周太祖及太祖即位授宫苑使屢破太原軍會慕容彥超反以拱為都監賊平為陜州巡檢改知陜州權知延州召拜左神武大將軍世宗親征劉崇以精騎居陳中髙平之捷以功拜義成軍節度使自晉以來秦成階三州入于蜀蜀又取鳳州至是宰相王溥薦拱有將帥材今欲取秦鳳非拱不可世宗遂命拱討之復取四州世宗征淮以拱權東京留守徙鎮淮南為沿江招討使時周師久駐維揚圍夀春經年未下拱言於世宗欲且徙揚州之師併力以攻夀春世宗許之拱遣牙將分部按巡城中秋毫不犯軍民感恱及師行有負糗糧以送者至夀春與李重進合勢以攻其城改淮南道招討都監敗淮軍二千于黃耆寨世宗幸夀州以拱為武寧軍節度使以克夀州功加同平章事徙鎮歸德淮南又徙山南東道國初加兼侍中太祖征李筠拱迎謁至汜水言於太祖曰李筠謀逆已久兵勢漸盛陛下宜濟河踰太行乘其未集而誅之儻稽旬浹恐賊氣愈滋攻之難為力矣太祖從之筠果率兵南向聞太祖至惶駭遂入澤州封譙國公為河南尹拱在河南十餘年專修飾園林第舍日縱酒以聲妓自奉府政不治太祖聞之怒乃移安州以左武衛上將軍焦繼勳代之謂曰卿無效向拱也太平興國初進封秦國公來朝授左衛上將軍卒年七十五贈中書令髙懷德字藏用常山人也周天平軍節度使齊王行周子也行周五代史有傳懷德忠厚倜儻有武略仕晉漢為刺史至周為侍衛馬軍都指揮使寧江軍節度使太祖受禪擢為殿前副點檢移鎮滑州尚宣祖女燕國長公主加駙馬都尉李筠叛太祖親征先令懷德率所部與石守信進攻破筠衆于澤州改鎮忠武又改歸德加同平章事太宗即位加兼侍中徙鎮曹州封冀國公移鎮武勝卒年五十七贈中書令追封渤海郡王諡曰武穆韓重贇磁州武安人也少以勇力𨽻周太祖帳下廣順初為左班殿直從世宗戰于髙平以功遷鐡騎指揮使又從征淮南以功領虔州刺史國初以重贇有翊戴之功擢為龍捷右廂軍校領永州防禦使從太祖征澤潞還為侍衛馬軍都指揮使領寧江軍節度使李重進反以重贇為行營馬步軍都虞候改殿前都指揮使徙鎮義成太祖命有司畫洛陽宫殿按圖修治宫闕以重贇總其役自是皇居壯麗矣哉有譖重贇私取親兵為腹心者太祖怒欲誅之趙普力辨其不然且曰親兵陛下必不自將須擇人付之若重贇以讒誅即人人懼罪誰復為陛下將親兵者太祖納其言重贇得不誅重贇徐聞普常救已即詣普謝普拒不見也出鎮彰德太祖征太原召重贇謂曰敵知我是行必率衆來援卿可領兵倍道由鎮定以破之乃命重贇總北面行營之師重贇遇敵于定州大破之卒贈侍中子崇訓崇訓字知禮以父任為供奉官纍擢四方館使樞密都承旨景德三年與馬知節並僉書樞密院事崇訓長厚謙畏未嘗忤物以目疾求罷除齊州防禦使授左龍武大將軍韶州防禦使求致仕以本官分司卒年五十六張永德字抱一并州曲陽人也初周太祖柴后本唐莊宗之嬪御也莊宗沒明宗遣歸其家行至河上父母迓之會大風雨止於逆旅數日有一丈夫走過其門衣弊不能自庇后見之驚曰此何人耶逆旅主人曰此馬步軍史郭雀兒者也后異其人欲嫁之請于父母父母恚曰汝帝左右人歸當嫁節度使奈何欲嫁此人后曰此貴人不可失也囊中裝分半與父母我取其半父母知不可奪遂成婚于逆旅中所謂郭雀兒即周太祖也后每資以金帛使事漢髙祖卒為髙祖佐命后父柴翁既老每夜寐及晝起常寡言笑其家問之不答其妻醉之以酒乃曰昨見郭雀兒已作天子初周太祖將兵征淮南過宋州宋州使人勞之于葛驛葛驛先有一男子一女子不知其所從來轉客於市傭力以食父老憐之醵酒肉衣服相配為夫婦及太祖至市人聚觀女子於衆中呼曰此吾父也市人驅之去太祖聞之使前問之信其女也相持而泣將携之以行女曰我已嫁人矣復呼其夫視之曰此亦貴人也乃俱挈之軍中奏補供奉官即永德也漢命永德押賜昭義節度使常遇生辰禮物遇太祖之外兄弟也太祖時鎮鄴有密詔付遇永德在潞州聞之因謂遇曰郭公被讒今日之詔得非蒞殺永德耶永德即死切恐纍公爾遇驚曰何謂也永德曰姦邪蠧政郭公誓清君側願且以永德屬吏事成足以為德不成死未晚遇以為然止令壯士嚴衛然所以餽之甚厚親問之曰君視丈人事得成否永德曰殆必成以柴翁夢所見為驗未幾太祖使至遇賀且謝曰老夫幾誤大事周氏親戚盡誅唯永德夫婦在周太祖既即位除永德左衛將軍駙馬都尉妻為晉國公主遷泗州防禦使從世宗征劉崇髙平之戰何徽樊愛能退衄時我太祖及永德牙兵各二千人而已太祖曰賊氣方驕公麾下頗能射可西出陟髙而上吾張左掖以應之其勝可必永德以為然遂大捷劉崇單騎而遁世宗謂永德曰樊愛能何徽及偏禆七十餘人吾欲盡按軍法何如對曰必欲開拓疆宇威加四海安可已也因盛稱太祖智勇世宗善其言悉誅愛能輩以徇軍聲始振從世宗征淮南破紫金山十八寨吳人樓船蔽川永德擇習水者濳鑽其船引兵擊之多溺死又以兵絶濠州餉道世宗褒之擢為殿前都點檢從克夀州領鎮寧軍節度使同平章事恭帝嗣位移鎮忠武太祖受禪加兼侍中改鎮武勝入覲道舊不名恩禮甚厚嘗問下并汾之策對曰彼兵雖少而悍加以北敵之援未可遽也姑以間諜離敵心設遊兵以擾其穡事待其困弊乃可圖耳嘗有人告永德謀反太祖曰永德非反者即械送之永德曰爾敢告吾反膽甚大命破械笞而遣之太宗即位封永德鄧國公連知滄雄定三州徙鎮安化召還為河北路排陳使屯定州與敵戰斬獲甚衆淳化初知鎮州又徙鎮泰寧兼侍中判并州真宗即位封魏國公改鎮彰德知天雄軍以老還鎮卒年七十二贈中書令始永德四歲時母馬氏被出嫁安邑人劉祚祚卒永德於南陽公宇為二堂繼母劉居其左馬氏居其右問安視膳皆得其歡馬氏封莒國夫人劉先卒永德為起大第買田以聚其族繼母之弟劉再思亦任以官初永德居睢陽時比鄰有書生臥疾療之獲痊來謝永德因丐水銀五兩永德與之即以藥同置鼎中有頃成中金將别永德欲求其術書生曰吾不吝此慮損君夀永德留之不可曰後當見淮上周世宗用兵夀春永德從之因出射見一僧乃昔書生也謂永德曰若見二屬豬人善事之當保五十年富貴且辭去是時太祖方以力戰有功雖勳名日盛而出於側微鞍馬服用未有以自給永德稍以家資奉太祖太祖天資英特問其年生於亥永德大喜傾身事之太祖深以為德而不知其故也其後太宗娶符氏后謀於太祖曰符氏大家而吾方貧無以為聘奈何太祖與永德書令太宗往以情告之永德延之臥內太宗姿表偉異問其年亦生於亥也永德驚喜傾家助之故永德在兩朝恩寵不替永德涉獵書史頗善吟詠禮賢樂士故士大夫皆推尚之郭崇應州金城人也初名崇威避周太祖諱止稱崇弱冠以勇力應募為卒後唐清泰中為應州騎軍都校晉髙祖割雲應地入于契丹崇耻臣於敵挺身南歸為騎軍都校仕漢至果州團練使護聖右廂都指揮使從周太祖入平國難與李筠拒慕容彥超於留子陂走之以崇補侍衛馬軍指揮使時遣馮道迎湘隂公贇于徐州將立之會契丹入邊周太祖北征次澶州軍變樞密使王峻遣崇率七百騎拒贇遇於睢陽崇曰澶州兵變遣崇來衛乘輿非有它也具言軍情有屬天命已定贇執崇手而泣崇即送贇就館崇仕周為陳州節度使同平章事世宗親征太原副符彥卿將行營之師軍還加侍中移鎮成德世宗征淮甸契丹萬騎掠邊境崇帥師破之于束鹿斬首數百級俘人口牛羊三萬餘國初加兼中書令初太袓受禪崇感周室恩遇或時出涕為監軍所奏太祖曰我素知崇篤於恩義此蓋感激爾遣人覘之還言崇方與賔屬飲博城中晏然太祖笑曰果如吾言未幾來朝時李重進叛命崇節制乾德三年卒年五十八贈太師崇重厚寡言有謀略子守璘至洛苑副使守璘子允恭仕至崇儀副使允恭次女天聖二年立為皇后宋偓河南洛陽人也祖瑶唐天德軍節度使父廷浩尚後唐莊宗女義寧公主生偓仕至房州刺史晉初為汜水關使張從賔之叛戰死之偓年十一以父死事補內殿直遷供奉官漢髙祖在晉陽遣其子承訓至洛與偓結婚即永寧公主也稍遷皇城使漢乾祐初拜右金吾衛大將軍駙馬都尉隱帝即位授昭化軍節度使移鎮滑州周太祖舉兵向闕偓在鎮開門迎謁即率兵從太祖至留子陂隱帝衛兵悉走投太祖太祖謂偓曰至尊危矣公近親可亟去擁衛無令驚動偓策馬及御營軍已亂矣世宗征淮以偓為右神武統軍充行營右廂都排陳使大破其衆世宗多露宿野次忽有猛虎逼近乘輿偓引兵射之一發而斃江北平師還復授滑州節度使又移鎮鄧州宋興李重進謀以揚州叛偓察其情具以聞太祖令偓屯海陵以觀變遂從征揚州為行營排陳使以功改鎮保信徙鎮國又徙忠武開寶中太祖納偓長女為皇后徙鎮靖難太平興國初加同平章事移鎮定國從平太原又從征幽州太宗幸大名命偓知滄州封邢國公俄還同州入為右衛上將軍雍熙中曹彬等北伐班師命偓知霸州卒年六十四贈侍中諡曰莊惠偓唐莊宗之外孫漢髙祖之壻女即孝章皇后貴戚之盛鮮有其比然謙恭下士人亦以此稱之始名延渥後易為偓云郭守文字國華太原人也其父暉從周太祖征河中戰死守文年十四太祖憐之召𨽻帳下補左班殿直國初遷西頭供奉官潘美征嶺南擒劉鋹遣守文馳傳告捷遷翰林副使從曹彬平金陵護送李煜歸闕煜無生意守文語之曰國家開拓境土復禹舊迹豈責防風之後至耶煜心遂安改西京作坊使太宗征太原命守文與判四方館事梁迥分護行營馬步軍會劉繼元降其弟繼文據代州依契丹之援以拒命遣守文討平之又破契丹于滿城以功遷東上閣門使檀州刺史召拜內客省使契丹侵雄州守文赴援既至契丹遁去加武州團練使破夏州鹽城鎮岌羅膩等十四族斬首數千級焚千餘帳俘百餘口獲牛馬羊萬計又破咩嵬殱焉諸部畏懼相率來降凡銀麟夏三州歸附者百二十五族萬六千餘户西鄙以定雍熙三年大舉北伐為幽州道行營前軍步軍水陸都監與契丹遇為流矢所中氣色不撓督戰益急左右騎從莫之知也軍中服其量會我師不利坐違詔逗留退軍左遷右屯衛大將軍明年復故官拜宣徽北院使北面排陳使屯鎮州改南院使契丹入邊大破之于唐河卒于屯所年五十五贈侍中諡曰忠武守文沉厚有謀頗知書既卒有使自北邊來言守文死軍中皆流涕太宗問何以致此對曰守文得奉悉以犒士卒死之日家無餘財太宗歎息久之賜其家錢五百萬太宗為真宗納守文次女為夫人即章穆皇后也追封守文譙王東都事略卷二十一
