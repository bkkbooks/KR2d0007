body:
  text: 東都事略卷二十二宋王稱撰列傳五李筠并州太原人也善騎射後唐秦王從榮判六軍諸衛募男士以為爪牙筠得隸麾下從榮難作筠遁去清泰初為內殿直遷指揮使晉開運末契丹犯京師趙延夀為敵將聞其勇召置帳下及契丹主北歸攻解里於邢洺筠請馮道領節度道曰豫主奏事而已留後事當議功臣為之以諸將之甲者為留後送欵于漢髙祖嘉之授博州刺史周太祖鎮大名以為先鋒使太祖入汴與慕容彥超戰于留子陂敗之廣順初拜義成軍節度使歷鎮彰德昭義顯德初加同平章事屢破太原之師以功加侍中筠在鎮自擅征賦頗召集亡命嘗以私忿囚監軍使世宗下詔切責之宋興加兼中書令太祖遣使諭以受䄠之意筠即欲拒命左右為陳歷數乃􅀈俯下拜及宴使者方張樂遽取周太祖畫像懸於㕔壁筠泣下賔佐皇恐告使者曰令公被酒爾幸勿以為訝也㑹河東劉承鈞以蠟書結筠為冦筠雖緘其書來上而反謀已蓄矣太祖賜詔慰撫之是時筠子守節為皇城使嘗泣諫筠筠不聽太祖又遣守節諭㫖令效順太祖曰吾聞汝數諫汝父汝父不汝聽耳吾今殺汝何如汝歸語汝父我未為天子時任自為之我既為天子獨不能臣我耶守節歸具以白筠筠謀反愈甚求濟師于劉承鈞遂據澤州承鈞率兵與契丹數千衆來援至太平驛筠迎謁甚恭及見承鈞兵衛寡弱心甚悔之承鈞封筠為西平王筠自言受周大恩不敢愛死承鈞默然蓋承鈞與周氏世讎也留其子守上黨引兵南向太祖命石守信髙懷德率兵討之大敗其衆於長平太祖自往征之山路險峽多石不可行太祖自於馬上負數石羣臣六軍皆負石即日開成大道與守信懷德㑹大破筠衆三萬于澤州境上筠走保澤州太祖命列柵圍之太祖親督戰拔其城筠赴火死筠有愛妾劉氏隨筠至澤州時王師攻城危甚劉氏謂筠曰城中健馬幾何筠曰爾安問為劉氏曰孤城危蹙破在旦夕今誠得馬數百匹與腹心將士潰圍而出保昭義求援河東猶愈於坐而待死也筠然之召左右計馬尚不減千匹以是夕將出或謂筠曰今帳前將士儻有劫公而降者悔可及乎筠猶豫不決城遂陷將赴火劉氏欲與俱死筠以其有娠麾令去太祖進伐上黨守節以城降始筠之將舉兵也其從事閭丘仲卿獻謀於筠曰公以孤軍舉事其勢危哉雖依河東之援亦恐不得其力大梁甲兵精鋭難與爭鋒不如西下太行直氐懷孟塞虎牢據洛邑東向而爭天下此計之上者也筠曰吾與世宗義同兄弟周之宿將也禁衛之士皆吾舊人聞吾至必倒戈歸我何憂不得天下乎不用其計筠始名榮後以避世宗諱更焉筠嘗曰李筠李筠玉帛云乎哉人傳以為笑守節既降詔釋其罪歷單濟二州團練使出知遼州改和州團練使卒年三十二李重進其先滄州人也周太祖之甥母即福慶長公主晉天福中任為殿直漢周之際纍遷至武信軍節度使重進年長於世宗及太祖寢疾召重進受顧命令拜世宗以定君臣之分世宗即位為侍衛親軍馬步軍都虞候從征髙平以功領忠武軍節度使又進討太原為行營馬步軍都虞候師還加同平章事改鎮歸德兼侍衛馬步軍指揮使世宗親征淮甸重進為招討使功最多及克夀州加侍中又改鎮天平世宗北征駐蹕瓦橋關重進與諸將帥師而至時關南已平矣恭帝嗣位徙鎮淮南太祖建國加中書令移鎮青州始重進與太祖俱事周室心憚太祖太祖既即位隂有叛逆之志及移鎮益疑懼太祖以鐡劵賜之重進欲入朝為左右所惑又自以周室近親也遂反遣人求援於李景景懼不納及聞太祖命石守信王審琦李處耘宋延渥四將率禁兵討之削其官爵太祖曰朕於周室舊臣無所猜閒重進不體朕心自懷反側今六師在野朕當暫往慰撫之遂親征師次大儀頓石守信遣使言曰揚州破在旦夕願陛下臨視太祖徑至城下即日拔之重進舉族自焚死方重進反時有二子在京師皆為宿衛太祖召而語之曰汝父何苦而反江淮兵弱又無良將誰與共圖事者汝速乘傳往諭之吾不殺汝也二子戰汗泣涕辭去重進方與諸軍議事忽二子至具道太祖之言重進大駭士卒聞之遂皆有向背之意既而王師壓境重進不知所為遂赴火始重進遣其親吏翟守珣往潞州隂結李筠守珣素識太祖往來京師濳告樞密承㫖李處耘求見太祖太祖召問曰我欲賜重進鐵劵彼信我乎守珣曰重進久蓄反謀必無歸順之志太祖厚賜守珣令說重進緩其謀無令二凶並作分吾兵勢守珣歸勸重進養威持重未可輕發重進信之及李筠誅重進反悉如太祖之策及不受鐵劵亦如守珣所言云臣稱曰帝王之興有天命哉太祖受命祚宋四方內外罔有不服李筠重進敢謀叛逆可謂不知天命矣及兵威所臨無往不克繼踵而滅咸蹈烈火亂臣賊子天豈容之哉東都事略卷二十二
