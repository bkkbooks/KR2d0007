body:
  text: 東都事略卷二十四宋王稱撰列傳七錢俶字文德臨安人也名上字犯宣祖諱止稱俶祖曰鏐因唐末黃巢之亂據有吳越之地昭宗授以杭越節制封彭城王梁唐封為吳越國王諡曰武肅父元瓘諡曰文穆王子佐嗣佐卒以弟倧繼倧為牙校胡進思所廢俶時鎮浙東遂度江襲位漢授以東南面兵馬都元帥錫以金印玉册仍領鎮海鎮東節度使至周以天下兵馬都元帥處之宋興改大元帥自太祖受命俶貢奉有加開寶六年封其妻孫氏為賢德順穆夫人遣幕吏黃夷簡入貢太祖謂之曰汝歸語元帥常訓甲練兵江南倔強不朝我將討之元帥當助我無惑人言云皮之不存毛將安傅時命有司造大第甚宏麗賜名禮賢宅以待兩浙江南之先來朝者王師討江南以為升州東面招討制置使李煜貽書於俶其略曰今日無我明日豈有君一旦明天子易地酬勳王亦大梁一布衣爾俶以其書來上率兵拔常州加守太師又遣其大將沈承禮率兵隨王師平潤州詔俶歸國江南平俶與妻子來朝太祖對于崇德殿待以優禮詔曰古者宗工大臣特被隆眷或劒履上殿或詔書不名率由豐功待以殊禮吳越國王錢俶特賜劒履上殿詔書不名又以俶妻為吳越國王妃宰相言自古異姓諸侯王妻無封妃之制太祖曰行之在我安問舊典太祖待俶甚厚自晉王宰相及中外臣僚上章請留俶不遣太祖曰錢俶在吳越歲修職貢今又委質來朝若利其土宇而留之殆非人主之用心何以示信於天下也及俶歸國太祖以黃絹封文字一復付俶曰候到國即開之仍諭俶曰朕知公忠若朕常在公則常有東南他人未可知也俶感泣拜謝至國啓封皆晉王宰相以下請留俶章也俶上表謝太平興國三年復來朝遂以國歸有司太宗改封俶淮海國王以禮賢宅賜之錢氏傳五主共八十四年俶以天下既平求去元帥之稱從之改漢南國王雍熙四年出為武勝軍節度使徙國南陽既又辭國號改封許王端拱元年徙封鄧王俶以天成四年八月二十四日生至是年八月二十四日薨年六十薨之日又與父元瓘同人皆異之册封秦國王諡曰忠懿俶崇信釋教性謙謹未嘗忤物為太師中書令者四十年任元帥者二十年富貴之盛無與為比七子惟濬惟治惟渲惟灝惟溍惟演惟濟惟治官至左驍衛上將軍惟渲惟灝俱至團練使惟溍左龍武將軍惟濟保靜軍留後諡曰宣惠惟濬字巨川太祖即位以為建武軍節度使改鎮海鎮東二鎮王師征江南惟濬從其父俶下常州以功加同平章事太宗即位加侍中俶封淮海國王惟濬徙鎮淮南改鎮山南東道又鎮安州封蕭國公俶薨有詔起復加中書令卒追封汾王諡曰安僖惟演字希聖幼有俊才俶嘗使賦逺山詩有髙為天一柱秀作海三峯之句俶深器之初補職牙門纍遷左神武將軍咸平中獻其所為文章拜太僕少卿擢知制誥翰林學士坐為人於開封府請求奪職久之復為學士纍遷至刑部侍郎天禧末丁謂為參知政事惟演見謂寵盛附之與講姻好而惟演女弟適后戚劉美相與共排冦準準既罷相真宗欲相李迪因問迪何如惟演曰迪無過但才短爾今執政中曹利用丁謂任中正皆位迪上真宗默然惟演又曰舊人中馮拯可用也真宗亦默然真宗曰張知白何如惟演曰使之參政則可為相則不可真宗卒以迪為相拯遂拜樞密使時曹利用丁謂先以為樞密使惟演入對言曰今樞密院有三使而中書止一相曷遷曹利用或丁謂乎真宗曰誰可惟演曰謂可惟演又曰曹利用忠赤有功亦宜與平章事真宗曰諾於是丁謂拜相利用加同平章事惟演尋拜樞密副使加尚書右丞轉工部尚書真宗崩仁宗即位進兵部尚書為樞密使章獻明肅皇后稱制宰相馮拯以惟演太后姻家也請出之除保大軍節度使知河陽請覲加同平章事判許州改鎮武勝又徙泰寧惟演意在柄用嘗謂人以不得於黃紙後署名為恨及屢徙鎮鬱鬱不得志仁宗耕籍田求入侍祠留為景靈宫使章獻崩還判河南請以章獻章懿二后同配食真宗廟室御史劾奏惟演擅議宗廟落平章事改鎮崇信卒年五十八贈侍中惟演少富貴能志於學有文章與楊億劉筠齊名嘗曰學士備顧問不可不該博故其家聚書侔於祕府又多藏古書畫在館閣與修策府元龜凡千篇特詔楊億分為之其為人少誠信初附丁謂力排冦準其後逐謂亦與有力焉所著有典懿集樞庭擁髦前後集伊川漢上集金坡遺事録飛白書敘録逢辰録奉藩書事初諡曰文穆改諡曰思又改曰文僖凡三易名云有子暄為寶文閣待制暄子景臻尚仁宗女許國大長公主拜左領軍衛大將軍駙馬都尉官至少師安武軍節度使封康國公臣稱曰五代之際吳越常外尊中國至太祖世俶遂委質來朝于時太宗及羣臣咸欲留俶而取其地太祖卒遣還國且語之故烏呼太祖洪人之度如是哉及太宗即位俶不待詔命即以國入覲蓋有以也子孫世有爵邑豈非忠孝之報乎髙繼沖字贊平其先陜州硤石人也曾祖季興唐末荆南司馬張環逐其節度使陳儒自稱留後環敗而季興守荆南梁開平初遂據有其地封秦王卒諡曰武信子從誨後唐天成三年襲位封南平王卒諡曰文獻子保融漢乾祐五年襲封南平王卒諡曰正懿無子建隆元年其弟保勗嗣立太祖即授以節度使從誨於諸子中最愛保勗雖盛怒見之則釋然荆南人目之為萬事休四年卒子繼沖襲位時湖南張文表叛周保權求救于朝廷太祖命慕容延釗討之延釗假道荆南約以兵過城外繼沖大將李景威曰兵尚權譎城外之約可信乎其祕書監孫光憲曰中國自周世宗時已有混一之志況聖宋受命真主出焉以理諭繼沖令獻三州之地延釗軍至繼沖出迎于郊而前鋒遽入其城繼沖懼上表納土請舉族歸朝授馬步軍都指揮使自季興至繼沖五帥凡五十七年光憲有學術歸朝授黃州刺史乾德三年繼沖拜武寧軍節度使卒年三十二贈侍中周行逢武陵人也少時不事生業嘗犯法配𨽻鎮兵以驍勇纍遷禆校自唐乾寧二年馬氏專有湖南二十州之地周廣順初兄弟爭國求援於江南李景遣大將邊鎬率兵赴之因下長沙遷馬氏之族於建康以鎬為潭帥會朗州軍亂推牙將劉言為留後言以行逢為都指揮使行逢以衆情表於景請授言節鉞景不從召言入金陵言懼遣副使王進逵行軍何真與行逢率舟師襲破潭州鎬遁去行逢等據其城遣使言狀周太祖即以言為朗帥進逵為潭帥行逢為潭州行軍司馬未幾進逵害言太祖以進逵代為節度使行逢領鄂州節度使知潭州顯德中世宗用兵淮甸詔進逵出師進逵遣禆將潘叔嗣領兵五千為先鋒行及鄂州界叔嗣乃回戈襲進逵進逵敗走為叔嗣所殺迎行逢為帥行逢至即斬叔嗣以徇世宗乃授行逢武平軍節度使兼侍中於是盡有湖南之地國初加兼中書令行逢在鎮盡心為治所用官屬率皆廉介之士條教簡約民皆恱之然性猜忌左右小有忤意必置於法夫人鄧氏諫曰人情有善惡安得一槩殺之乎行逢怒曰此外事婦人何知行逢既為帥夫人不為屈不入府治躬率奴僕耕織以自給賦調必先期輸送行逢止之不從曰稅官物也若主帥自免其家何以率下乎行逢卒追封汝南郡王子保權年十一自武平軍節度副使襲父位初行逢疾亟召將佐謂曰吾起壠畝為團兵同時之人皆死惟衡州刺史張文表獨存焉常怏怏不得行軍司馬吾死文表必為亂諸公善佐吾兒無失土宇必不得已當舉族歸朝也行逢死文表果舉兵叛據潭州保權乞師於朝廷太祖遣慕容延釗李處耘等討之王師次江陵文表已為保權之衆所殺保權牙校張從富等以謂文表已平而王師未回懼為襲取相與拒守延釗以聞太祖遣中使諭保權及將校曰爾本請師求救故發大軍以拯爾難今妖孽既平是有大造於爾輩何乃反拒王師也保權幼為左右所制不從命遂討之保權出軍於澧州南兵未交而潰王師獲從富于西山下梟首于市大將汪端劫保權并家屬棄城亡匿山洞王師至數月獲保權克嶽州端擁保權衆冦掠未幾亦就擒磔于市湖湘悉平保權至京師以為右千牛衛上將軍纍遷左羽林統軍太平興國九年知并州卒年三十四始太祖既下湖湘思得通蠻情習險厄智勇可任者以鎮撫之有秦再雄者辰州徭人也長七尺武健多謀在行逢時以戰鬬立功太祖召至京師察知其可用以邊事付之除辰州刺史賜豫甚厚仍使自辟官屬盡與一州租賦再雄誓死報效至州日訓練土兵得三千人又遣親校二十八人分使諸蠻以傳朝廷懷來之意悉皆欵附遷辰州團練使再雄盡瘁邊圉故終太祖世無蠻貊之患再雄不知所以終因附于此陳洪進字濟川其先泗州人也曾祖為閩官遭亂因家泉州之仙遊縣唐光啓中王潮陷泉州以福州觀察使王審知為副潮卒審知據其位梁册審知為閩王二十九年而卒其子延翰繼踰年而被殺其弟延鈞襲八年遂僭帝號十一年卒子昶嗣被逐而叔延義立以其弟延政為建州刺史既而背命自立國號商六年閣門使連重遇推客省使朱文進以奪其位復號閩時晉天福七年也文進以黃紹頗為泉州刺史程贇漳州刺史許文稹汀州刺史泉人念王氏為羣逆分據指揮使留從效王忠順董思安謀復王氏於是募敢死士五十人而洪進與焉夜擒紹頗殺之立延政從子繼勳欲送紹頗首于建州奉延政為主而道阻賊盛莫敢往者獨洪進請行道逢賊語以泉福已定賊遂潰洪進至建州延政大恱既而程贇立延政從子繼成許文稹又以汀州降而朱文進為連重遇所殺福人亦殺重遇延政遂遣洪進還泉州三年江南李景陷建州以延政入金陵明年留從效劫繼勳使降江南自領州事李景授從效泉州刺史進清源軍節度使以洪進佐之進職統軍使建隆三年從效死洪進誣其子紹鎡將叛執送建康推副使張漢思為留後自為副使漢思患其專將圖之一日洪進袖大鎖鎖其門叩頭謂漢思曰軍使速以郡印見授漢思皇懼亟與之即置漢思别館遣使告江南而李煜遂授以清源軍節度使自太祖平澤潞下維揚取荆湖威震四海洪進大懼乃請命于朝改清源軍為平海軍拜洪進節度使及江南平吳越錢俶來朝洪進亦遂入覲至南劒州聞太祖崩乃歸鎮發哀太平興國三年來朝即以其地來歸太宗以洪進為武寧軍節度使同平章事從平太原封杞國公進封岐卒年七十一贈中書令諡曰忠順東都事略卷二十四
