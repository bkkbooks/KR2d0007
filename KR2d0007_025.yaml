body:
  text: 東都事略卷二十五宋王稱撰列傳八吳廷祚字慶之太原人也始仕周太祖為親校及即位為莊宅副使稍遷皇城使世宗即位遷右羽林將軍內客省使踰年拜宣徽北院使遷南院使西京留守世宗征關南以廷祚留守京師拜左驍衛上將軍為樞密使宋興加同中書門下二品以父名璋故也李筠反廷祚白太祖曰潞城巖險且有太行之阻賊若保之未可以歲月破筠素恃勇輕脫若速舉兵擊之必離上黨來逆戰獸亡其藪魚脫於淵擒之必矣太祖遂親征以廷祚留守京師筠果領兵與王師戰澤州南筠衆大敗如廷祚之言及征李重進又為東京留守建隆三年為雄武軍節度使改鎮京兆卒年五十四贈侍中子元扆元扆字君華尚太宗女蔡國公主拜左衛將軍駙馬都尉遷慶州團練使知鄆州徙河陽改郢州觀察使再知河陽河溢城將壞元扆躬涉泥濘督工壅塞民有避水於林杪者既濟以舟楫又以家財賑之時數郡被水患獨元扆所部民無墊溺真宗即位換安州觀察使知澶州治有聲遷寧國軍留後知定州契丹入邊王超王繼忠領兵踰唐河戰元扆度其必敗濳發兵護河橋起等果敗敵衆至橋見陳整而遁代還拜武勝軍節度使出知潞州徙徐州改鎮山南東道卒年五十贈中書令諡曰忠惠始父廷祚厚重寡言齊家有法好儒學聚書數千卷至元扆聚書乃至數萬卷讀左氏春秋尤通內典精筆札臨事莊重御下有術在藩鎮能愛民待賔佐必盡禮奉身簡素所得祿賜均及親族國朝以來尚主者獨稱其賢李崇矩字守則上黨人也幼有至行為鄉里所稱始事史𢎞肇為親吏周太祖以崇矩𨽻世宗帳下顯德初補供奉官轉供備庫副使改作坊使國初李筠叛為南面行營前軍都監大破筠衆于碾子谷以功拜右監門衛大將軍充三司使從征李重進還為宣徽北院使判三司乾德二年拜樞密使趙普為相與崇矩分秉國政以女妻普子承宗太祖頗不恱有鄭伸者崇矩之客傾險士也乃上書告崇矩陰事崇矩不能自明開寶五年罷為鎮國軍節度使入為左衛大將軍太宗即位授嶺南都巡檢使改瓊崖儋萬都巡檢代還拜右千牛衛上將軍判金吾街仗卒年六十五贈太尉諡曰元靖追封河東郡王崇矩寡言尚信義史𢎞肇被禍崇矩方事世宗既貴遇𢎞肇之孫必優禮之子繼昌繼昌字世長以蔭補供奉官遷如京副使崇矩出鎮為牙職遷西京左藏庫使王均亂為招安巡檢使與雷有終上官正石普破之于彌牟追至資州而均已就擒于富順監以功領奬州刺史知青州又知延州入判右金吾街仗拜連州刺史出知涇州卒年七十二繼昌性謹厚鄭伸死其母貧餓嘗詣繼昌乞假家人憾前事詬逐之繼昌憐之乃與白金百兩時稱其長者繼昌之子勗尚太宗女萬壽公主是謂齊國獻穆大長公王舊制尚主者升居諸父之列真宗特於其名上益遵字升為崇矩之子焉遵勗字公武初授左龍武將軍駙馬都尉賜第永寧里主既下降而所居堂甎華有翔鳳者命工琢去主服有虬龍文屏藏之真宗喜顧待加異常稱其好學為人醖藉喜讀書通浮屠性理之說居第園池聚名華奇果美石於其中有自千里而至者其費不資有會賢閒燕二堂北隅有莊曰靜淵引流水周舍下嘗師事楊億億卒為制服營其家事積官至鎮國軍節度使知許州卒年五十一贈中書令諡曰和文有閒燕集二十卷外館芳題七卷子端懿官至鎮潼軍留後為人和厚多讀書喜賔客所與游皆時之賢士大夫端慤官至蔡州觀察使請老以安德軍留後致仕卒諡曰恭敏端願官至節度使歷鎮武康定國請老以太子太保致仕卒子評官至成州團練使楚昭輔字拱辰宋城人也初太祖典禁衛嘗召置左右陳橋之還師也昭憲皇后在城中太祖憂之遣昭輔先入問起居昭輔具言士衆推戴之狀后意乃安國初為軍器庫使知揚州太祖以其有心計拜左驍衛大將軍權判三司開寶六年拜樞密副使太平興國初拜樞密使昭輔性勤謹介直掌樞務人不可干以私六年以疾罷為左驍衛上將軍卒年六十九贈侍中諡曰景襄東都事略卷二十五
