body:
  text: 東都事略卷二十六宋王稱撰列傳九趙普字則平幽州薊人也父迥以世亂徙其族常山又徙洛陽普性沈厚有大略周顯德初永興軍節度使劉詞辟為從事詞卒遺奏薦其才世宗用兵淮甸太祖克滁州以普為軍事判官太祖與語奇之時捕獲為盜者百餘人盡誅之普意其中必有濫者請加訊治由是多所全宥太祖益重之時宣祖將兵抵滁上得疾普躬視藥餌朝夕無倦宣祖愧其情與講同家之好太祖領定國軍節度使移鎮滑許普皆在幕府最後為歸德軍節度掌書記太祖北征普從行夜宿陳橋六軍共議推戴普諭將校曰并敵與西戎相結點撿奉命征討爾輩甲兵幾何便欲扶策天子點撿一心忠赤通於神明若聞此事必誅爾輩列校皆不退普即戒諸將勿令縱兵若都城人心不搖則四方自然寧謐黎明入白太祖時太祖醉臥帳中欠伸徐起則萬衆擐甲露刃喧不可止或以黃袍加太祖之身扶太祖上馬擁逼南行既而太祖受禪普以佐命功授右諫議大夫樞密直學士昭義李筠叛太祖親征以普留守京師普願扈從太祖曰趙普勝介胄乎許之普因進策曰陛下初登寶位光耀神武挫英雄之氣服天下之心在此舉矣且兵機貴速不尚巧遲若倍道兼行掩其未備所謂自天而下可一戰而擒也太祖用其策及筠誅普以功遷兵部侍郎樞密副使維揚李重進叛太祖問普攻取之策普曰重進昧武侯之逺圖守薛公之下計不過繕修孤壘以長淮為恃也況其內乏資儲外無救援以臣愚見急攻亦取緩守亦取兵法尚速不如速取之矧陛下以順討逆何憂哉不踰月遂誅重進時昭憲皇后無恙每與太祖參決政事猶以書記呼普嘗曰趙書記且為盡心吾兒未更事也及昭憲寢疾普入與顧命昭憲語太祖汝百歲後當傳位于汝弟太祖曰敢不如太后教即令普就榻前為誓書藏之金匱拜樞密使初二叛既平太祖召普問天下自唐季以來數十年間帝王凡易八姓兵革不息蒼生塗地其故何也吾欲息天下兵為國家長久之計其道何如普曰陛下及此言天地人神之福也唐季以來戰鬪不息國家所以不安者由節鎮太重君弱臣強而已今所以治之無他惟稍奪其權制其錢穀收其精兵則天下自安矣頃之太祖因晚朝與石守信王審琦等飲太祖屏左右謂曰我非汝曹之力不得至此念汝之德無有窮已然天子亦大囏難殊不若為節度使之樂也守信等曰何故太祖曰是不難知矣居此位者誰不欲為之守信頓首曰陛下何謂出此言今天命已定孰敢有異心太祖曰不然汝曹雖無異心其如汝麾下之人欲富貴者何一旦以黃袍加汝之身汝雖欲不為其可得乎守信等曰臣等愚不及此惟陛下哀矜示以可生之塗太祖曰人生如白駒過隙所為好富貴者不過多積金錢厚自娛樂使子孫無貧乏之憂汝曹何不釋去兵權擇便好田宅市之為子孫立永久之業多置歌舞日飲酒相歡以終天年君臣之間兩無猜嫌上下相安不亦善乎於是守信等皆稱疾請解軍職太祖許之已而太祖欲使符彥卿管軍普屢諫以為彥卿名位已盛不可復委以兵柄太祖不從宣已出普復懷之請見太祖迎謂之曰豈非以符彥卿事耶普對曰非也因奏他事既罷乃出彥卿宣進之太祖曰果然宣何以復在卿所普曰臣託以處分之語有未備者復留之惟陛下深思利害勿復悔太祖曰卿苦疑彥卿何也朕待彥卿厚彥卿豈負朕者耶普曰陛下何以能負周世宗太祖默然事遂中止乾德二年范質等三相罷以普為門下侍郎同中書門下平章事集賢殿大學士監修國史命薛居正吕餘慶為參知政事以副之事無大小皆決於普自唐以來方鎮多以賦入自擅而上供殆鮮場院率令部曲主之厚斂以自利其屬三司者輸額之外輒歸已或私納貨賂以事貢奉用兾恩奬普勸太祖革其弊方鎮闕帥命文臣權知所在場院間遣京朝官廷臣監臨諸道置轉運使諸州置通判使主錢穀自是利歸公上矣又數遣使者分詣諸道選本道兵驍勇者籍其名送京師以備宿衛教習精練太祖每御便殿親臨試之不數年兵甲精鋭府庫充實皆普之謀也五年拜尚書左僕射昭文館大學士普嘗為某事擇官列二臣姓名以進太祖不用明日復奏之又不用又明日復奏之太祖怒裂其奏擲陛上普顔色自若徐拾奏歸補綴明日復進太祖悟乃可其奏後二臣者果稱職太祖一日以幽燕地圖示普普曰此必曹翰為之太祖曰然翰可取否普曰翰可取孰可守太祖曰以翰守之普曰翰死孰可代太祖不語久之曰卿可謂逺謀矣太祖嘗夜幸普第立風雪中普皇恐出迎太祖與普飲于堂中設重裀地坐熾炭燒肉普妻和氏行酒太祖以嫂呼之普從容問曰夜久寒甚陛下何以出太祖曰吾睡不能著一榻之外皆他人家也普曰陛下小天下耶南征北伐今其時矣願聞成算所嚮太祖曰吾欲取太原普默然久之曰非臣所知也太祖問其故普曰太原當西北二邊使一舉而下則二邊之患我獨當之何不姑留以俟削平諸國則太原彈丸黑志之地將無所逃矣太祖笑曰吾意正如此特以試卿爾因謂普曰王全斌平蜀多殺人吾今思之猶耿耿不可用也普薦曹彬潘美可用其後太祖征嶺南用潘美伐江南任曹彬而二國悉平兩浙錢俶遣使入貢遺普書及物十罌太祖幸其第適見而問之普以實對太祖曰此必海味也即令啓之皆滿貯瓜子金也普謝曰臣未發書實不知也太祖笑曰但收之無害也彼謂國家事皆由汝書生耳又江南李煜亦以白金五萬兩遺普普以白太祖太祖曰苐受之使之勿測也既而煜遣其弟從善朝于京師太祖於常錫外復賜金如所以遺普者江南君臣駭服太祖寵待普如左右手判大理寺雷德驤憤其屬附普增減刑名因求見太祖語不遜太祖怒叱之曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎德驤坐貶商州又貶靈武普遣親吏市木關隴吏私市大木冒稱普所市以規利前三司使趙玭以白太祖詔問太子太師王溥等普當何罪溥等奏趙玭誣罔大臣乃出玭為汝州牙校盧多遜在翰林頻召對攻普之短會德驤之子有鄰憤其父流竄乘隙訟堂吏過悉抵以罪而普由是罷為河陽節度使同平章事方普之在相位也嘗於視事閣坐屏後設二大甕凡中外表奏普意不欲行者必投之甕中滿則束緼焚之以是人多怨者太宗即位改太子少保遷太子太保時盧多遜為相數於上前毁普普鬱鬱不得志會柴禹錫告秦王廷美與盧多遜交結普奏臣開國舊臣為權幸所沮願備樞軸察姦變太宗感悟召普謂之曰人誰無過朕不待五十已盡知四十九年之非矣未幾拜司徒侍中封梁國公廷美廢多遜南遷普之力也有弭德超者驟被委遇誣奏曹彬有不軌之謀太宗疑之彬罷樞府以德超為樞密副使普見太宗因訴辨其誣太宗大悟德超既得罪而待彬如故自是太宗頗不懌從容謂普曰朕聽斷不明幾誤大事朕甚自愧普對曰陛下知德超有才而任用之察曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事至立斷此所以彰陛下之明聖也雖堯舜何以過哉太宗於是釋然出為武勝軍節度使兼侍中太宗眷禮甚厚作詩餞之雍熙三年太宗命曹彬等北伐普上疏切諫曰陛下出師將以收復幽薊今戰鬭不息民疲師老臣以為克復未可期也陛下聰明睿智自翦平太原懷來閩浙混一諸夏遂欲恢復舊疆曽不思兵者凶器也戰者危事也可不慮哉可不戒哉自古聖帝明王無不置夷狄於度外陛下何必留意於斯乎陛下興兵北伐驅百萬生靈悉令輦運使之耕桑失時所得者少所失者多豈陛下之利耶漢武帝時主父偃徐樂嚴安所上書及唐姚元崇説明皇以十事其年代雖逺事則與今無以異也臣輒具録奏願賜觀覽臣又聞之聖人不凝滯於物見可則進知難則退理貴變通情無拘縶所謂事苦則慮易兵久則變生此臣之所甚懼也臣濫膺藩寄切見差配自鄧至莫往來四千餘里典桑賣牛無慮十有六七其間有鬻男女者有棄性命者陛下豈容不知乎而邪諂之徒進言者曰契丹時逢幼君災異婁見可以用武以中陛下之意陛下樂禍求功以為萬全遂興無名之舉豈不過甚矣哉臣願陛下審其虛實究其妄謬正姦臣誤國之罪罷將士伐燕之師非特多難興王抑亦從諫則聖也古之人尚聞尸諫老臣未死豈敢面諛為安身之計而不言區區之忠惟陛下裁察太宗賜詔褒之移山南東道節度使改封許國公會有詔親耕籍田普表求入覲太宗謂宰相曰趙普開國元臣朕所尊禮宜從其請禮成册拜太保兼侍中時樞密副使趙昌言與翟馬周交通毁時政立朋黨以求進用普深疾之奏流馬周黜昌言侯莫陳利用以左道得幸為鄭州團練使驕肆僭侈大為姦利普奏其事太宗為黜之商州普固請誅之太宗曰豈有萬乘之主而不能庇一人死乎普曰此巨蠧也陛下不誅是亂天下法法可惜此何足惜哉太宗悟遣使誅之既又貸其死使者至而利用死矣其疾惡強直皆此類也以疾求致仕太宗不得已以為西京留守河南尹加中書令懇辭數四詔曰開國勳舊惟卿一人不同他等無致固辭俟首途有日當就第與卿為别普捧詔泣涕因力疾請對賜坐移晷頗言及國家事太宗嘉納之上章告老拜太師封魏國公給宰相奉仍遣其弟宗正少卿安易齎詔賜之又遣使以璽書賜普曰皇帝問太師頃以微疴懇求致政朕以居守之重慮煩耆耋維師之命用表尊賢佇聞有瘳與朕相見今遣使撫問仍賜銅羊上尊酒太師宜愛精神近藥石以副朕眷注之意焉薨年七十一太宗聞訃震悼謂近臣曰趙普國初元勳事先帝與朕最為舊故能斷大事盡忠國家真社稷之臣聞其殂謝悽愴之懷不能已因出涕左右皆感慟册贈尚書令封真定郡王諡曰忠獻太宗撰神道碑親八分書以賜之遣右諫議大夫范杲攝鴻臚卿護喪事葬日設鹵簿鼓吹如式舉唐制也至道二年追封韓王咸平二年配享太祖廟廷普佐太祖太宗定天下平僭偽大一統當其為相每朝廷遇一大事定一大議才歸第則亟闔户自啓一篋取一書而讀之有終日者雖家人不測也及翌旦出則是事決矣用是為常後普薨家人始得開其篋而見之則論語二十篇普嘗戒其子弟曰吾本書生偶逢昌運受寵踰分當以身許國私家之事吾不復與爾等宜自勉勵無重吾過故輔兩朝出入三十餘年未嘗為子弟求恩澤者子承宗承煦承宗字德祖以父任為西頭供奉官遷右羽林將軍改大將軍知潭鄆二州皆有治聲普留守西京以承宗侍行淳化二年來朝卒于京師年四十一承煦字景陽普歷河陽武勝山南皆為牙職普未嘗為求官端拱初太宗特命為六宅使普薨拜宫苑使領恩州刺史纍遷昭宣使加領誠州團練使卒年五十五普之子孫至今顯榮不絶論者以為安天下之功大是宜有後云臣稱曰自古受命之君必有碩大光明之臣以左右大業太祖光宅中夏普以謀議居中用能削百年藩鎮之權剗五季僭偽之國撥亂世反之正獨相十年天下廓廓日以無事至太宗寵遇愈隆矣古之人臣有非常之功則人主亦必報之以非常之禮觀二帝所以待普者可謂至矣勳名爛然與宋無極盛哉東都事略卷二十六
