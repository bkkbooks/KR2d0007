body:
  text: 東都事略卷二十七宋王稱撰列傳十曹彬字國華真定靈壽人也父藝成德軍兵馬使彬始生周歲日父母以百玩之具羅於席觀其所取彬左手持干戈右手取爼豆斯須取一印他無所視人皆異之既長氣質淳厚漢乾祐中為成德牙將周太祖貴妃張氏彬之從母也彬歸京師得𨽻世宗帳下補供奉官纍遷西上閣門使出使吳越訖事即行不受私覿吳越人以輕舟追遺之至於數四彬猶不受既而曰吾或終拒之是近名也遂受而歸盡輸內帑世宗彊還之欲辭不獲悉以分親舊而一介不取遷引進使宋興遷客省使與王全斌郭進屢破北敵太祖伐蜀以內客省使監歸州路行營劉光毅軍峽中郡縣悉下諸將皆欲屠城殺降彬獨任恕而戢下所至恱服太祖降璽書褒之蜀平王全斌等不恤軍事蜀人苦其侵奪彬屢請旋師全斌等不從俄而全師雄等作亂擁衆十萬彬復與光毅破之于新繁卒平蜀亂時諸將多有子女玉帛彬橐中惟圖書衣衾而已太祖以全斌等貪縱不法屬吏而謂彬清介廉謹拜宣徽南院使義成軍節度使彬辭曰伐蜀將士俱得罪臣以無功獨蒙褒寵恐無以勸天下太祖曰卿有茂功加以不伐設有微纍全斌等豈惜言哉夫懲惡勸善朕所以勵臣下也彬乃不敢辭太祖將親征太原為前軍都監率兵次團柏谷降賊將陳廷山太祖伐江南以彬將行營之師彬分兵由荆南順流而東破峽口寨進克池州連克當塗蕪湖二縣駐軍采石磯作浮梁跨大江以濟師大破其軍于白鷺洲師進次秦淮江南水陸十萬陳於城下大敗之俘斬數萬計遂克潤州進圍金陵李煜危甚遣其臣徐鉉奉表詣闕乞緩師彬亦緩攻取兾煜歸服使人諭之曰事勢如此所惜者一城生聚若能歸命策之上也城垂克彬忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈惟須諸公誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日稱愈遂克金陵城中皆按堵如故李煜與其臣百餘人詣軍門請罪彬慰安之待以客禮煜之君臣賴以獲免自出師至凱旋士衆畏服無輕肆者其軍政如此及入見以榜子進稱奉敇江南幹事回其謙恭不伐又如此初彬之揔師也太祖謂曰俟克李煜當以卿為使相副帥潘美豫以為賀彬曰不然夫是行也仗天威遵廟謨乃能成事吾何功哉況使相極品乎美曰何謂也彬曰太原未平爾已而還朝獻俘太祖曰本除卿使相然劉繼元未下姑少待之既聞此語美竊視彬微哂太祖覺之遽詰所以美不敢隱遂以前對太祖亦大笑乃賜彬錢二十萬彬曰人生何必使相好官亦不過多積金錢耳未幾拜樞密使忠武軍節度使太宗即位加同平章事太宗議征太原召彬問曰周世宗及太祖皆親征何以不能克彬曰世宗時史彥超敗于石嶺關人情驚擾故班師太祖頓兵甘草地㑹歲暑雨軍士多疾因是中止太宗曰今吾欲北征卿以為如何彬曰以國家兵甲精鋭翦太原之孤壘譬摧枯拉朽爾何為而不可太宗意遂決從平太原加兼侍中後為弭德超所誣罷為天平軍節度使既而太宗悟其譖封魯國公待之愈厚雍熙三年詔彬將幽州行營前軍馬步水陸之師與潘美等北伐敗契丹于固安破涿州又與米信破契丹于新城戰于岐溝關我師敗績初諸將上言契丹主少母后專政寵幸用事請乘其釁以取幽薊遂遣彬與崔彥進米信自雄州田重進趣飛狐潘美出鴈門約期齊舉將發太宗謂之曰潘美之師但先趣雲應卿等以十萬衆聲言取幽州且持重緩行毋貪利虜聞大兵至必悉衆救范陽不暇援山後矣既而美之師先下寰朔雲應四州彬等至涿州以糧運不繼退師雄州以援其餽彬部下諸將以為已握重兵不能有所攻取由是謀議蜂起彬不得已乃復裹糧再往攻涿州而失利於岐溝太宗追諸將赴京師鞫於尚書省令翰林學士賈黃中等雜治彬等具伏違詔失律之罪責右驍衛上將軍彥進右武衛上將軍信右屯衛上將軍四年起彬為侍中武寧軍節度使徙鎮平盧真宗即位復同平章事召入為樞密使咸平二年被疾真宗親視臨問手為和藥仍賜以白金萬兩問以後事對曰臣無事可言臣二子璨與瑋才器有取臣若內舉皆堪為將真宗問以優劣對曰璨不如瑋薨年六十九真宗惻然震悼對輔臣語及彬必流涕贈中書令追封濟陽郡王諡曰武惠與趙普配享太祖廟廷彬仁敬和厚在朝廷未嘗忤旨亦未嘗言人過失伐二國秋毫無所取位兼將相不以等威自異待遇士大夫必引車避之居官奉入給宗族無餘積平蜀回太祖詢官吏善否對曰軍政之外非臣所聞也固問之唯薦隨軍轉運使沈倫廉謹可任北征之失律也趙昌言在魏奏乞誅彬及昌言自延安還被劾不得入見彬在右府為請於太宗乃許朝謁彬之仁厚皆此類也子璨珝瑋玹玘珣琮珝官至昭宣使玹左藏庫副使玘尚書虞部貟外郎珣東上閣門使玘之女即慈聖光獻皇后也藝纍贈魏王彬韓王玘吳王諡曰安僖玘之子佾傅佾見外戚傳傅后之兄也仕至榮州刺史諡曰恭懷璨字韜光以父任為供奉官彬為上將璨常從行彬以為類已特鍾愛之征討得與計議太祖以為宫苑副使太宗朝為銀夏麟府等州鈐轄契丹入邊屢戰有功諸將多欲追奔璨曰夷狄多變力止之至道初遷四方館使知靈州稍遷亳州團練使領康州防禦使知定州拜侍衛馬軍都指揮使天德軍節度使改鎮彰德轉殿前都指揮使又改保靜武寧忠武在禁衛十餘年以疾除河陽節度使同平章事卒年七十贈中書令諡曰武懿璨習韜略好讀左氏春秋善撫士卒兼著威愛居家以孝謹稱雖輕財不逮其父而仁敬和厚亦有父風子儀官至耀州觀察使瑋字寶臣始彬歷徐鄆節度使皆以為牙內都虞候授供奉官閣門祗候李繼遷擾邊諸將數出無功太宗問誰可任者是時彬在樞府對以瑋可任召知渭州時年十九彬薨請服喪不許遷西上閣門使徙知鎮戎軍嘗出戰小捷戎人引去瑋伺戎人兵去已逺乃驅所掠牛羊輜重緩驅而還其下憂之言於瑋曰牛羊無用不若棄之整衆而歸瑋不應戎人聞瑋利牛羊而師不整遽還襲之瑋愈緩行得地利處乃止以待之使人諭之曰蕃軍逺來必甚疲我不欲乘人之怠請休憩士馬少選決勝良久又使人諭之曰可相馳否於是各鼓軍而進一戰大破其軍遂弃牛羊而還徐謂其下曰吾知戎人已疲故為貪利以誘之比其復來幾行百里矣若乘鋭便戰猶有勝負逺行之人若小憩則足痺不能立人氣亦闌吾以此取之于時李繼遷虐用其衆下多怨者瑋移書蕃部諭以朝廷撫納之意於是康奴族內附上言鎮戎地平便於騎戰非中國之利請自隴山而東循古長城鑿塹以為限又請以兵械及間田蠲租以給弓箭手繼遷死其子德明請命於朝瑋言繼遷擅中國要害地終旅拒使人主有西顧之憂方其國危子弱不即撲滅彊盛恐難復制當是時朝廷欲以恩致德明寖其書不報瑋曰德明野心今不急折其翼而長養之其飛必矣既而河西延家妙娥等數大族來歸附瑋即將騎士薄天都山援徙內屬諸小種皆望風納質德明由此遂弱至死不敢窺邊召還知邠州進東上閣門使領髙州刺史再知渭州破章􅀈族于武延鹹泊川滅撥臧于平涼隴山諸族皆獻地瑋為築堡山外號籠竿城募弓箭手守之改引進使未幾領英州團練使知秦州宗哥立遵與唃厮囉謀內冦乃上書求號贊普瑋言不可聽若復有求益難制也朝廷猶授立遵保順軍節度使既而立遵令其舅樣丹說蕃部郭厮敦為鄉導瑋遂以計使厮敦圖樣丹後旬日果携其首至瑋表厮敦為順州刺史先是張吉知秦州生事熟戶多去蕃部驚擾至是凡前拒王師者皆伏匿瑋令納馬贖罪而還故地至者數千人厮敦因獻南市即秦渭之咽喉也自弓門至威逺共置寨十數亭障橋梁相望浚壕僅四百丈既而唃􅣳囉以一萬衆入冦瑋逆於三都谷擊敗之斬首萬級獲馬牛雜畜器仗三萬三千計遷客省使康州防禦使踰年又破宗哥將馬波咤吒于野谷誅叛者鬼留族夷之於是河洮蘭三州安江妙敦邈川黨通等羌皆破散宗哥首立文法納質內屬唃􅣳囉逃入磧中塞垣遂安凡羌酋欲有所為必先令其下謂之立文法焉秦人請立碑紀功有詔褒之德明冦慶州柔逺寨都巡撿楊承吉與戰不利乃拜華州觀察使鄜延路環慶等州安撫使委乞骨咩大門等族聞其至歸附者千餘落天禧四年拜宣徽北院使鎮國軍留後僉書樞密院事是歲冦準謫道州宰相丁謂惡瑋不附已指以為準黨除南院使環慶路安撫使降左衛大將軍容州觀察使知萊州又為華州觀察使知青州徙知天雄軍尋改彰武軍留後知永興軍拜昭武軍節度使復知天雄軍踰年知河陽徙帥真定改鎮彰武卒年五十八贈侍中諡曰武穆治平中配享仁宗廟廷瑋好讀書通春秋尤善左氏為將幾四十年未嘗敗衄威震西鄙唃􅣳囉每聞其名即以手加額而東嚮之鎮天雄契丹使過必戒其下無敢疾驅者在渭州有告戍卒叛入夏州軍吏來告瑋方對客奕不應軍吏亟言之瑋怒叱之曰吾固遣之去汝再三顯言耶繼遷聞即斬首投境上環慶邊人多市屬羌之田致單弱不自給即沒虜中瑋令還之有犯即徙其家于內地舊羌殺邊民以羊贖其死瑋下令曰羌自相犯從其俗即犯邊民論如律遂無犯者始置弓箭手斥塞上棄地使相角力勝者給田二頃再經秋成課市一馬馬必勝甲然後官為印之益賦田五十畝至三百家以上團為十指揮築堡於要處環之以塹又立馬社一馬斃衆為市馬塞下諸塹皆以一丈五尺為深廣之阻山險不可浚者止使治峭絶而已其制屬羌百帳以上置軍主指揮使不及百帳止置指揮使其蕃落將校止於本軍序進之不從他軍以其熟虜情與山川之形勢也其所措置如此後皆為法云琮字寶章彬領鎮海節制補牙內都指揮使纍遷榮州刺史仁宗納后除衛州團練使因上言臣家若有以外戚干私恩者願致之法時論稱之元昊反拜同州觀察使知秦州上攻守禦三策久之兼領涇原路兵事遷定國軍留後劉平石元孫敗關輔震恐琮請自關以西籍民為義軍遂簡鄉兵弓手數萬人改陜西經略安撫使慶歷元年拜馬軍副都指揮使卒年五十八贈安化軍節度使兼侍中諡曰忠恪琮小心謹畏御軍嚴整既沒家無餘資惟存兵書邊奏而已孫詩尚魯邠國大長公主潘美字仲詢魏郡人也少倜儻嘗謂其里人王密曰漢代將終凶臣肆虐四海有改卜之志大丈夫不以此時立功名取富貴與萬物共盡可羞也周世宗為開封尹美以中㳙事世宗及即位徙供奉官髙平之戰美以功遷西上閣門副使稍遷客省使太祖與美素相厚既受䄠命諭旨中外陜帥袁彥凶悍太祖慮其為變以美監其軍俾圖之美至喻以天命彥遂入朝太祖曰潘美不殺袁彥而彥朝覲成我志矣太祖親征李重進以美為揚州巡撿以功除泰州團練使湖南既下授美潭州防禦使嶺南劉鋹數侵湖湘美擊走之溪洞蠻獠自唐以來為居民患美率兵平之開寶三年征嶺南以美將行營諸軍朗州團練使尹崇珂副之進兵克富州又克賀州又下昭桂連三州拔韶州斬獲凡數萬計鋹勢窮蹙乃遣其臣王圭求通好又遣其左僕射蕭漼中書舍人卓惟休奉表至軍中乞降美因諭以上意以為彼若能戰則與之戰不能戰則勸之守不能守則諭之降不能降則死不能死則亡非此五者他不得受使者泣美即令殿直冉彥衮部送漼等至京師鋹復遣其弟保興率衆拒戰鋹衆十五萬依山谷堅壁以待王師美因築壘休士與諸將計曰彼編竹木為柵若以火焚之必擾亂以鋭師夾擊之萬全策也遂分遣丁夫數千人人持二炬間道造其柵暮夜萬炬俱發天大風火勢甚盛鋹衆驚擾來犯王師美麾兵急擊之鋹衆大敗斬數萬計長驅至廣州鋹盡焚其府庫遂克之擒鋹送京師露布以聞拜山南東道節度使與尹崇珂同知廣州土豪周思瓊聚衆負海為亂美討平之嶺表遂安兼嶺南轉運使七年征江南以美為升州道行營都監與曹彬偕往美因造舟以濟師至金陵江南水陸十萬衆陳於城下美率兵襲擊大敗之李煜危甚遣徐鉉來乞緩師太祖不之省仍號令諸將促令歸附煜遷延未能決夜選精鋭數千持炬鼓譟犯我軍壘美率精鋭以短兵接戰因與大將曹彬率士晨夜攻城百道俱進金陵平以功拜宣徽北院使與党進攻晉陽戰于汾上多所擒獲太宗即位改南院使太宗征太原以美將河東行營之師判太原行府事三交西北三百里地號固軍最險阻虜人之咽喉也美帥師襲之美巡撫至代州虜萬騎攻近塞美誓衆銜枚大破之封代國公改忠武軍節度使進封韓國公詔美及曹彬崔彥進等北伐美獨拔寰朔雲應州詔內徙其民虜復至驍將楊業戰沒于陳家谷口美坐削秩三等明年復故官知真定府改判并州加同平章事卒年六十七贈中書令諡曰武惠咸平二年配享太宗廟廷子惟德官至宫苑使惟固西上閣門使惟正西京作坊使惟清崇儀使惟熙莊宅使惟吉深州刺史惟熙女即章懷皇后也追封美鄭王惟吉子夙仕至光祿卿臣稱曰曹潘二武惠俱以大將之材慷慨仗義征伐四克勒功帝籍而彬操履忠厚戒誓諸將不妄殺戮得王師弔伐之體則美有不逮矣天相忠孝子孫多賢武穆治軍整暇羌戎畏服父子俱配食清廟其最優也夫東都事略卷二十七
