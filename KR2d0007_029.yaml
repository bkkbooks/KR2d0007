body:
  text: 東都事略卷二十九宋王稱撰列傳十二何繼筠字化龍河南人也父福進仕後唐至周官至天平軍節度使福進節制鎮州繼筠補牙職以偏師出土門與并人戰斬首數千級以功除刺史契丹入邊又擊敗之世宗征瓦橋關命繼筠以所部出百井道以破并冦宋興以繼筠為棣州團練使關南兵馬都監加防禦使太祖征太原繼筠奪并人汾河橋又敗其衆于城下擒其將張環石斌以獻開寶三年太祖親征太原契丹來援繼筠屯石嶺關追奔數十里斬千餘級獲器用甚衆太祖命以所獲首級鎧甲示於城下并人奪氣以功拜建武軍節度使繼筠屢以少擊衆在塞上二十年敵人畏其名繢其像而拜之卒年五十一贈侍中繼筠兒童時嬉戲必分布部伍為戰陳狀及長善射深沉有謀與士卒同甘苦子承矩承矩字正則從繼筠討劉崇除間廏副使太平興國中監兵泉州以功遷間廄使知河陽徙潭州居六年除淄州刺史僉書滄州事時契丹數入邊承矩請屯兵於順安寨西關易河溝口引水東西三百餘里南北五七十里築隄瀦水以助要害太祖用其策屬霖潦為患議者多以為非承矩援漢魏至唐故事以折之詔以承矩為河北制置屯田使民遂獲萑蒲魚蛤之利而稻田歲入亦助邊餉自是髙陽並海以抵順安絶敵人奔衝之虞又言順安至西山不逺百里亦多川源願因而廣之用息外患朝廷雖嘉之未及行也自滄徙雄州契丹萬騎夜逼城堞遲明承矩出戰獲其酋所謂鐵林相公者敵始引去復徙滄州真宗即位知雄州嘗上疏請和戎為息民之利進英州團練使知澶州契丹修好真宗益善其有謀又命知雄州拜本州團練使時敵使初至承矩以為待之之禮宜得中庶可久也真宗嘉納久之徙齊州卒年六十一贈相州防禦使緣邊及涿易州軍民聞承矩卒無不流涕相與至雄州發哀供佛何氏世為名將而承矩好學有文所與游者必賢士大夫太宗嘗遣內侍齎御製并書積五十餘軸又面付手札以寵之初除團練使真宗謂宰相曰承矩知書好名以才能自許宜授以美名遂除英州及去雄州請以李允則自代允則亦良將也承矩御下以誠同其甘苦民有告機事必與欵語無所猜忌故敵人動息無不逆知其後敵使者言敵人畏服其名云李謙溥字德明太原人也少通左氏春秋仕晉為供奉官至周任刺史嘗監晉州兵以偏師屢挫太原而屠城略地功為多隰州闕守謙溥攝州事至則濬城隍嚴兵備未旬日而并人至方盛暑謙溥服絺綌揮羽扇引二小吏登城徐步并人望之勒兵不敢動因以敢死士百人夜縋城銜枚薄賊營破之逐北數千里斬首千餘級為澶州巡檢改丹州刺史建隆初移慈州久之謙溥與孫延進沈繼深王睿進兵太原略地謙溥為畫出入進退策衆不能用及班師又謂曰今退兵彼必來乘我宜整衆為備諸將亦不應果為并人所襲狼狽奔走獨謙溥兵成列并人遂却復移隰州刺史築保安平同等寨敵人十年不敢犯境有招收將劉進勇力絶人屢以少挫衆并人患之濳為蠟彈書以閒進佯遺道中晉帥趙贊得之以聞太祖詔謙溥械進闕下謙溥言并人欲我殺之也臣願以血屬保其無它奏至太祖為釋進賜金帛開寶中召為濟州團練使會邊將失律復以謙溥還蒞隰州其後以疾至京師卒年六十二謙溥慷慨重然諾所賜甚厚皆分遺將士故為其所用者莫不盡力子允則允正允正官至河州團練使允則字垂範以父任為濟州牙內指揮使謙溥卒任左班殿直少以才略聞太平興國七年初置靜戎軍榷場以允則領之自是屢奉使諸路知潭滄雄鎮潞州而雄嘗再蒞焉湖南民歲輸絹謂之地稅絹又屋每間出絹一丈二尺謂之屋稅絹始戶給一牛歲輸米四斛牛斃猶輸謂之枯骨稅皆馬氏暴斂之餘允則治潭州悉奏除之湖湘山田民不耕墾允則下令給諸軍芻皆輸粟藁由是山田遂無遺地潭州舊分兵戍邵州允則謂蠻不擾而益戍兵是長邊患也亦遂奏罷初至滄州葺營壘多開井泉言者以為擾未幾北敵圍城近郊老幼皆入城保而水不乏又以水代炮壘成深泥敵兵遂解真宗召而語之曰頃有言卿擾民者及敵至始見其利也王超之敗人心危動允則勸使衰絰向師而哭以解衆忿仍趣整師以進真宗聞而降詔褒勵之雄州榷場禁通異貨邏者以珉玉帶及婦人首飾交易者允則縱之曰此以我無用易彼有用也周世宗始以瓦橋關置州民居唯結茅允則教以陶公私營造皆易為瓦甓矣又合外舊甕城與大城為一始創關城焉濬濠起月隄環以溝塹增廣閻承翰所修屯田架橋引水作梁築亭榭列隄道以通安肅廣信順安軍所以設險者備矣舊城樓可望十里以為斥候允則曰南北通好安用此為命毁之後乃徙浮圖於北原上所望踰三十里將為關城也先建東嶽祠自以黃金百兩為供器導以鼓吹民閒競以金銀器獻久之密徹去而捕盜移文北界因以護祠為言興板築城就而虜不知也雄州上元舊不張燈允則結綵為山聚優樂縱民夜遊諜知敵人欲觀燈乃率同僚㑹城北俄有衣紫敵人至出妓女列侍延之傳舍劇語而罷密使縱所乘騾遁去即幽州統軍也後數日聞為敵人所誅矣嘗宴賔而甲仗庫火終宴不救真宗問其故對曰兵械警火甚嚴當宴而燔姦人欲以計見動若捨宴救火其誰不它窺測也真宗善之雄州諜者嘗告敵人要官間遣人至京師造茶籠燎爐允則使倍與直作之纎巧無毫髮之異耳先期至則携之入榷場使茶酒班多口者夸說其巧令蕃商遍觀之如是者三四日知蕃官所作已過乃收之不復出敵人相傳謂允則賂之恐有姦變蕃官無以自明乃被殺允則為長吏或於市中下馬過富民家入軍營與婦女笑語無所閒然富民犯罪未嘗少寬假契丹幾密事動息皆知之當時邊臣無及者景德以後國信往還儀制及所費用皆其所裁定智識開敏處事審當其方略施設雖游觀亭傳莫不有所寓也允則官至寧州防禦使卒年七十六馬仁瑀大名夏津人也少不好學與群兒戲必為行陳之狀自稱將軍日與之約鞭其後期者羣兒畏服及長善射周太祖鎮鄴仁瑀年十六因求見帳下太祖留置左右廣順初補內殿直世宗即位㑹太原劉崇入冦世宗親征至高平周師不利諸將引退仁瑀曰主辱臣死遂躍馬以進大軍乘之崇敗績擢仁瑀為弓箭控鶴直指揮使又從征淮南以功遷內殿直都虞候又從平三關恭帝即位仁瑀從太祖北伐宋興以佐命功遷貴州刺史為鐵騎右廂虎捷左廂都指揮使領扶州團練使從平澤潞以功領常州防禦使改嶽州漢州初詔仁瑀領荆湖諸郡不數歲復其地朝廷將平蜀又以仁瑀領川峽諸郡亦皆蕩平薛居正知貢舉仁瑀以貢士屬之為御史所劾又坐與后族忿爭出為密州防禦使太祖征太原命仁瑀巡邊敵聞其威名不敢出遷瀛州防禦使兄之子因醉誤殺平民繫獄當死民家自言非有憾也過誤爾願以過失傷論仁瑀曰我為長吏而兄子殺人此乃恃吾勢橫恣耳非過失也豈可以已之親而亂國法哉遂論如律給民家布帛移知遼州從征太原有功又從征范陽擊敵於盧龍北師還遷朔州觀察使判瀛州七年卒年五十贈河西觀察使李漢超字顯忠雲中人也始事鄴帥范延光不為其所知又事鄆帥髙行周雖知之而不甚親也㑹周世宗鎮澶淵漢超遂委質焉仕周至殿前都虞候宋興遷恩州團練使從平李重進以功領齊州防禦使關南兵馬都監漢超在關南人有訟漢超彊取其女為妾及貸而不償者太祖召而問之曰汝女可適何人曰農家也又問漢超未至關南契丹如何曰歲苦侵暴曰今復爾耶曰否太祖曰漢超朕之貴臣也為其妾不猶愈於農婦乎使漢超不守關南尚能保汝家之所有乎責而遣之密使諭漢超曰亟還其女并所貸朕姑貰汝勿復為也不足於用何不以告朕耶漢超感泣誓以死報齊棣鹽海之利數倍它郡何繼筠在棣漢超在齊皆得用以養士而朝廷不計其所費在郡凡十七年有善政齊人愛之嘗詣闕求立碑太祖命率更令徐鉉為文以賜太平興國初除應州觀察使判齊州明年卒于屯所贈太尉忠武軍節度使漢超善撫士卒與之絶甘分少死之日軍中皆殞涕子守恩官至隴州刺史部芻粟旱海為賊所邀死之郭進深州博野人也少貧賤依邢州巨鹿富人家傭作有膂力多結豪俠飲博人有欲殺之者富人婦竺氏陰告之乃至晉陽漢髙祖留之帳下北冦屠安陽髙祖遣進拒戰敵敗走以功除刺史及德光盜京師復北歸進請以奇兵間道入洺州因定河北諸郡仕周改登州刺史郡多冦盜進悉為剪除吏民願紀其事命近臣撰文賜之改刺衛州河朔盜匿汲郡山閒者稍衆閒出攘奪久不能滅進往攻勦絶之民以安居於是郡民又請立碑紀其事改洺州團練使有善政郡民又請立碑詔左拾遺鄭起為文以賜進嘗植栁種荷芰遍城其後郡民見之有垂涕者曰此郭公所種也太祖將征澤潞遷本州防禦使充西山巡檢以備并冦嘗領兵與曹彬王全斌入太原境獲數千人太祖征太原以進為河東道欣代等州行營馬步軍都監招徠山後諸州民三萬七千餘口始進在西山太祖每遣戍西山必戒之曰汝謹奉法我猶赦汝郭進殺汝矣有部下軍校告其陰通太原將有異志者太祖詰之軍校辭窮復曰進御下嚴臣不勝忿怨故誣之耳太祖命執以與進令自誅進釋不問使禦河東冦曰汝有功則我奏汝官敗則降勿復來也軍校往死戰果立功而還進奏乞命以官太祖不可曰汝誣我忠良此才贖汝死爾進曰若然則今後臣不復使人矣太祖於是命以一官太祖嘗命有司治第賜進蓋以筒瓦有司言舊制非親王公主之第不用筒瓦太祖曰進控扼西山十餘年使我無北顧憂我視進豈減兒女耶太平興國初領雲州觀察使判邢州至是進訪竺氏婦已死而家甚貧得其女撫養如己子厚其資裝以嫁之以報婦德進善聽訟能以鈎距得其情御衆有方略軍政嚴肅前後二十年不易西山巡檢之任太宗征太原命進控石嶺關契丹來援進擊敗之并人喪氣時田欽祚護石嶺軍恣為姦利以他事侵進進剛直不能辨乃自經死年五十八贈安國軍節度使姚內斌盧龍人也少仕契丹周顯德末世宗北征我太祖將兵至瓦橋關內斌為關使開門請降世宗以為汝州刺史國初從平李筠改刺虢州太祖以西鄙為憂以內斌為慶州刺史戎不敢犯塞號內斌為虎蓋畏其勇也在慶州積十餘年卒年六十四董遵誨范陽人也父宗本事幽帥趙延壽為延壽所惡遂舉家奔太原漢高祖得之以宗本為隨州刺史遵誨補牙校有方略善御夷狄周世宗時從韓通討秦鳳擒蜀招討使王鸞攻淮南下合肥又從韓通平雄霸二州以功至驍武指揮使太祖以西戎近邊使守通逺軍凡十四年蕃漢恱附許以便宜制軍事初太祖以其母在契丹也令人賂邊民使迎其母送於遵誨遵誨遣外弟劉綜貢馬以謝太祖解其所服真珠盤龍衣命齎賜之綜曰遵誨人臣豈敢當此太祖曰吾委以方面不此嫌也太平興國六年卒年五十六賀惟忠欣州人也初𨽻周世宗藩邸召補供奉官不辭而去世宗怒不復用宋興始授儀鸞副使令知易州捍禦有功遷正使太祖駐常山以為刺史兼易定祁等州都巡檢使常中流矢創發而卒惟忠知書曉兵法撫士卒得其心威名震北敵故十餘年契丹不敢南牧云王彥升字光烈蜀人也後唐平蜀徙家洛陽周顯德末為散貟指揮使從太祖北伐至陳橋以軍中推戴而還時韓通為侍衛親軍副都指揮使在殿閣聞變皇懼而歸彥升遇通於路策馬逐之通馳入其第門未及闔為彥升所害太祖聞通死大怒乃出彥升為唐州刺史久之徙原州防禦使彥升殘忍在原州戎人有犯漢法者㑹賔客則引而前以手捽其耳大嚼沃以巵酒前後所啖數百人並塞數年戎人畏之無犬吠之警卒年五十八臣稱曰太祖削五代之亂創萬世之業制兵有謀御將有術付郭進以邢州李謙溥以隰州俾制太原畀何繼筠以滄景賀惟忠以易州李漢超以關南馬仁瑀以瀛州俾控北敵授姚內斌以慶州董遵誨以通逺軍王彥升以原州俾禦西冦結之以恩豐之以財小其名而重其權少其兵而久其任每來朝則命之坐賜豫優厚北邊軍市之租多賜諸將惟何繼筠授以節制示以懋功之典其他所居之官不過巡檢使之名而所領之兵亦不過五六千人而任之久乃至二十年少亦不減十餘年是以夷狄畏服邊鄙無事由制兵御將得其道東都事略卷二十九
