body:
  text: 東都事略卷三十宋王稱撰列傳十三張昭字濳夫河間人也舊名昭逺避漢髙祖諱止稱昭十歲誦書數十萬言及長該洽經史以文謁興唐尹張憲憲即以為府推官憲為北京留守昭從至晉陽時明宗起自鄴兵變于魏昭勸憲奉表明宗以勸進憲曰吾書生也天子委以保釐之任吾豈茍生者乎昭曰此古之大節公能行之忠臣也憲既死論者以昭能成憲之節仕唐為中書舍人晉時用桑維翰薦為翰林學士漢初為吏部侍郎加禮部尚書隱帝年十九猶有童心昵近小人昭上疏諫請近師傅延問正人以開聰明隱帝不省周廣順初拜戶部尚書遷兵部尚書世宗好拔奇取俊有自布衣上書下位言事者多不次進用昭諫曰昔唐初劉洎馬周起徒步太宗擢用為相其後朱朴栁璨在下僚昭宗亦以大用然則太宗用之於前而國興昭宗用之於後而國亡士之難知也如此臣願陛下存舊法而用人以劉馬為鑒朱栁為戒則善矣恭帝即位封舒國公國初拜吏部尚書乾德元年為郊祀鹵簿使禮成封鄭國公改封陳以老致仕嶺南平太祖遣使就問獻俘之禮昭臥疾口占皆有所據當時服其博記卒年七十九昭在晉日與吕琦崔稅集唐義寧終天祐末史書二百卷又撰漢六廟諡策樂章所修有唐莊宗實録及功臣傳周太祖實録續唐愍帝漢隱帝實録陶榖字秀實邠州新平人也北齊尚書令唐雍唐內史侍郎唐儉皆其逺祖因避晉髙祖諱而更為陶遂不復其舊父渙仕至夷州刺史為邠帥楊崇本所害榖隨母栁氏育崇本家幼有俊才起家為校書郎以書干漢相李嵩自單州判官擢為集賢校理未幾遂知制誥在周為翰林學士世宗命近臣各撰平邊策為臣不易論皆以修德來逺為意惟榖與王朴竇儀楊昭儉以江淮即當用師取之世宗嘉之宋興歷禮刑户部三尚書遷承旨乾德初郊廟法物制度多榖所定又乘輿大輦久亡其制榖立意造之至今用焉卒年六十八贈右僕射穀博記美詞翰滑稽好大言佛老之書陰陽之學亦能詳究太祖將受禪未有禪文榖在旁出諸懷中而進之曰已成矣太祖甚薄之性傾險巧詆其進緣李嵩嵩之死穀自謂有力焉周世宗召魚崇諒為學士未至榖譖之以為顧望而遂代其任世宗謂趙上交多謁告穀乃及其受門生名園事而上交被黜國初附宰相趙普以排竇儀皆為世論所不與穀亦嘗自言頭骨當珥貂冠蓋有意大用也人咸笑之竇儀字可象薊州漁陽人也父禹鈞在周為諫議大夫五子曰儀儼侃稱僖皆相繼登科時人謂之竇氏五龍儀少舉進士景延廣為侍衛軍帥以儀為記室延廣歷滑陜孟鄆四鎮儀皆在幕府漢初召為右補闕周廣順初知制誥遷翰林學士拜端明殿學士從世宗征淮南儀領行在三司以軍需不即辦世宗將欲深罪之范質力為救解得免淮南平出為西京留守纍官至兵部侍郎宋興遷工部尚書太祖謂宰相曰深嚴之地當以宿儒處之范質曰竇儀清介重厚然已自翰林遷端明矣太祖曰禁中非此人不可卿當諭以朕意即日再入翰林為學士范質等三相罷越三日命趙普為相制既下太祖問學士曰質等已罷普敕何官當書承旨陶榖時任尚書乃建議以為自古輔相未嘗虛位唯唐太和九年甘露事後數日無宰相當時左僕射令狐楚右僕射鄭覃刑部尚書王源中奉行制書今尚書乃南省六官之長可以書敇儀曰穀所陳非承平之制皇弟開封尹同平章事即宰相之任也太祖曰儀言是命太宗書敇以賜普加禮部尚書時御史臺議欲以左右僕射為表首太常禮院以東宫三師為表首儀援典故以僕射合為表首者六而謂三師無所據朝廷以儀之議為是趙普為相人有毁之者太祖問儀普所為如何儀曰不知退而謂人曰我必不大用然亦不之朱崖及詢盧多遜多遜乘間攻其短其後普既罷相多遜遂預政及普再相多遜果有朱崖之貶云儀卒年五十二贈右僕射初太祖之克滁州也世宗遣儀籍府庫後數日太祖令親吏取藏中絹給麾下儀曰當城下之初雖傾藏取之無妨也今既籍在官非有詔不可得也太祖以是重之後欲用以為相未及用而卒太祖憫然謂左右曰天何奪我竇儀之速耶蓋惜其未大用也侃至起居郎僖至左補闕儼字望之幼能屬文舉進士為天平軍掌書記拜左拾遺仕漢為史館修撰周廣順初拜中書舍人顯德四年儼上疏請令有司討論古今禮儀作通禮考正鍾律作正樂嘗言為政之本莫大擇人擇人之重莫先宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容默為事但思解密勿之務守崇重之官逍遙林亭保安宗族乞令即日宰相於南宫三品兩省給舍以上各舉所知若陛下素知其賢自可登庸若其未也且令以本官權知政事期歲之間察其職業若果能堪稱其官已髙則除平章事未髙則稍更遷官權知如故若有不稱則罷其政事責其舉者又班行之中有貟無職者大半乞量其才器授以外任試之於事還則以舊官登敘考其治狀能者進之否者黜之又請令盜賊自相糾告以其所告資産之半給之或親戚為之首則論其徒侣而赦其所首者如此則盜賊不能聚矣又新鄭鄉村團為義營各立將佐一户為盜纍其一村一户被盜罪其一將每有盜則鳴鼓舉火丁壯雲集盜少民多無能脫者由是鄰縣充斥而一境獨清請令他縣效之亦止盜之一術也又纍朝以來屢下詔書聽民多種廣耕止輸舊稅及其既種則有司履畝而增之故民皆疑懼而田不加闢夫為政之先莫如敦信信茍著矣則田無不廣田廣則穀多穀多則藏之民猶藏之官也又言陛下南征江淮一舉而得八州再駕而平壽春威靈所加前無強敵今以衆擊寡以治伐亂勢無不克但行之貴速則彼民免俘馘之災此民息轉輸之困矣多見聽納世宗觀大水泗州記以問儼儼以為天地有五德曰潤曰暵曰生曰成曰動五德陰陽之使陰陽水火之本陰陽有常數水火有常分奇耦相半盈虛有準謂之通證羡備過冗極無不至謂之咎證陰之始主於淵水之行紀於九六凡千七百二十有八歲為浩浩之會雖堯舜在上不能免者數也若夫辟狂臣專乂昏不明苦雨數至水不潤下乃政之所致非數也唐貞元壬申之水是已德宗暗蔽篤於自任陸贄盡忠而斥逺裴延齡専利而信用常雨之應天豈虛生世宗甚善之拜翰林學士國初就轉禮部侍郎當是時祠祀樂章宗廟諡號多儼撰定卒年四十二儼博物洽聞通音律歷數盧多遜楊徽之為諌官儼嘗謂之曰丁卯歲五星聚奎自此太平矣二拾遺見之儼不與也已而果然稱字日彰舉進士為單州判官國初由歸德軍節度判官拜右補闕知宋州太宗領開封尹以稱為判官賈琰為推官一日太宗燕射稱琰與而琰贊美過甚稱叱之曰賈氏子導諛豈不自愧坐上皆失色因罷宴太宗白太祖黜為彰義軍節度判官太平興國四年太宗幸大名召至行在拜比部郎中時方議北征稱抗疏極諫而止遂除樞密直學士遷左諫議大夫七年拜參知政事入謝太宗曰汝何由至此稱曰陛下不忘藩邸之舊太宗曰非也乃奬汝面折賈琰耳未幾卒年五十八贈工部尚書明日太宗燕羣臣以稱喪故罷稱嘗與丁皓同幕皓子謂尚幼稱見之曰此子後必以文致逺即以其子妻之謂果至宰相劉溫叟字永齡河南洛陽人也蓋唐武德功臣政會之後世為名家父嶽後唐太常卿五代史有傳溫叟七歲善屬文工楷𨽻嶽嘗語家人曰吾兒風骨秀異所不知者壽耳今世難未息得與老夫偕為溫洛之叟足矣故名之曰溫叟始以父任補四門助教仕唐為右拾遺監察御史右補闕仕晉為翰林學士契丹犯京師溫叟懼隨契丹北徙與承旨張允求去職契丹主怒欲黜為縣令趙延壽曰學士不稱職而求解者罷之可也得不黜仕漢為史館修撰顯德中坐知貢舉為人所譖世宗怒於十六人中黜去十二人由是左遷太子詹事建隆初拜御史中丞一日晚歸道由闕前太祖方御明德樓溫叟行至樓側下馬入奏按故事非肆大眚即不御樓今陛下無故而御之軍庶或聞則有恩給之望臣所以不敢却導從者不欲驚彼耳目也太祖遽還給內帑三千緡付縣官以自罰卒年六十四溫叟性重厚有禮法事親孝雖盛暑非冠帶不敢見父名嶽終身不聼樂客有犯其諱者溫叟慟哭而起遂與客絶楊徽之范杲皆溫叟所薦引也太宗為晉王時屢與太祖言其清節云子煜煜字耀卿舉進士嘗知龍門縣通判益州天禧初詔置諫官御史十二貟煜與魯宗道首與其選擢為右正言時王晦叔治蜀以法御下有謗之者真宗問曰凌策王晦叔治蜀孰優煜曰策在蜀值歲豐故得以平易治之王晦叔值歲小歉慮民為盜故以法治之使之易地則皆然真宗是之時歲荐飢河復決東郡煜上言歲數不登力役屢起元元困苦道殍相望此宰相事也未聞有濟之之術願策免以塞羣望不報京師傳有靈泉飲者愈疾議建祥源觀煜上言前世有傳聖水愈疾者皆詭妄不經今盛夏亢陽大興土木以營不急非國事也煜以外官有勸農之號而使窮民轉徙汙萊弗闢蓋考課弗明吏職廢弛寖以及此昔召信臣守南陽闢田三萬頃此實效也今守宰居位皆積日以幸遷非有意於民者宜申明考課法一切為殿最以督之又請禁民之棄孝養而事浮圖老子者又請重臧吏之制纍赦弗原又請近臣對見不當為子弟乞恩以開幸進又以薦士宜較其章著者推以恩典國家景德後分部置使總按刑獄煜以為郡守皆朝廷之臣轉運使已專刺舉之職復置使按刑非所以責任守臣而息獄訟也當罷之河北平煜請蠲兩河賦以寬民力又建言請黜章句篆刻之技崇尚學術復聘士之禮加直集賢院同修起居注改右司諫換侍御史知雜事遷三司户部副使除龍圖閣待制天聖中知開封府遷龍圖閣直學士知河南府徙河中卒年六十二七子几忱知名忱為監司郡守有聲忱子唐老元祐中為右正言几字伯壽以父任為將作監主簿舉進士第孫沔言其有將帥才自太常博士易如京使知寧州又知邠州儂智髙盜嶺南几上章願自效授荆湖南路兵馬鈐轄克雍州以功加皇城使纍遷東上閣門使涇原路總管會夏人圍同家堡轉運使陳述古權渭帥几移文請出兩將為援述古怒移几知鳳翔府且劾生事朝廷以總管非轉運使得擅移几亦訟其誣於是御史按之述古坐謾讕黜知欣州几亦改知鄜州召還拜秦鳳路總管遷四方館使知保州請老以祕書監致仕神宗祀明堂大臣有言几知音律詔詣太常修定雅樂几面陳古樂備四清聲沿五季亂離遂廢請復增置樂成詔褒之賜一子官改通議大夫卒年八十一几少篤風義有家法晚年放曠得養生訣故老而不衰其議律主於人聲不以尺度求合嘗謂古今異時聲亦隨變猶以古衣冠加今人安能稱儒者泥古詳於形名度數之間而不知清濁重輕之用故求於器雖合考於聲則不諧矣几之説如此扈蒙字日用幽州安次人也與從弟載俱以文學知名鄠杜間有道士善知人嘗謂蒙曰君家兄弟當繼典誥命蒙舉進士周廣順中為歸德軍掌書記世宗聞其名召為右拾遺直史館遷屯田貟外郎知制誥宋興拜中書舍人入翰林為學士坐纍黜為左贊善大夫拜左司貟外郎復知制誥為盧多遜所惡出知江陵府太宗即位復入翰林從征太原還轉户部侍郎加承旨自張昭竇儀卒朝廷典故儀制皆蒙裁定博洽長厚然好笑雖在人主前不能自止也始太祖即位禮官以為舜郊嚳商郊契周郊后禝王業因之而興也若漢髙帝之太公光武之南頓君雖有帝父之尊而無豫配天之祭故自太平興國三年六年再郊並以太祖配天於禮為允太宗將東封蒙定禮儀乃奏議云經曰嚴父莫大於配天請以宣祖配天自雍熙元年罷封禪為郊祀遂行其禮識者非之蒙積官至工部尚書卒年七十三贈右僕射載官至知制誥翰林學士五代史有傳王祐字景叔大名莘人也父徹左拾遺祐少篤志詞學性倜儻而俊以書見桑維翰維翰奇之鄴帥杜重威辟為觀察支使祐常諭重威使無反漢重威竟反祐坐責遼州司户參軍仕周歷魏縣南樂二令太祖即位擢拜監察御史出知光州遷殿中侍御史知制誥遷翰林學士太祖征太原召祐謂曰上黨要地也汝當控制之遂知潞州及班師復召還會符彥卿鎮大名頗不治太祖以祐為之禆令察彥卿動靜又謂祐曰此卿故鄉所謂晝錦者也祐以百口明彥卿無罪且曰五代之君多因猜忌殺無辜故享國不永願陛下以為戒而彥卿由是以免故世稱祐有陰德俄用兵嶺南徙知襄州移潭州召還知吏部選事初盧多遜與宰相趙普相傾多遜欲祐協力擠普一日祐以唐宇文融排張説事示之多遜不悅至是多遜參知政事乃黜為鎮國軍司馬太宗即位知河中府拜中書舍人史館修撰未幾知開封府以病請告拜兵部侍郎卒年六十四子旦自有傳東都事略卷三十
