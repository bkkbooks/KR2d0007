body:
  text: 東都事略卷三十一宋王稱撰列傳十四薛居正字子平開封浚儀人也父仁謙周太子賔客居正少好學有大志為人方重不事苛察舉進士晉華帥劉遂凝辟為從事其兄遂清領邦計以為鹽鐵巡官改度支鹽鐵推官遷右拾遺桑維翰為開封尹以居正為判官漢史𢎞肇領侍衛親軍威震人主殘忍自恣人莫敢忤其意其部下吏告民犯鹽禁法當死居正疑其不實召詰之乃其吏以私憾而誣之也逮捕吏鞫之具伏以吏抵法𢎞肇雖怒甚竟亦無以屈也仕周為三司推官知制誥遷左諫議大夫使滄州定民租擢拜刑部侍郎宋興遷戶部侍郎出知許州入為樞密直學士初平湖湘以居正知朗州有亡卒數千為盜監軍使疑城中釋子為應欲盡殺之居正以計緩其事因擒賊首汪端詰之乃知釋子千數無與謀者咸賴以得免乾德初加兵部侍郎初置參知政事命居正及吕餘慶為之久之兼淮南湖南嶺南等道發運使又監修國史受詔監修五代史開寶六年拜門下侍郎同中書門下平章事太平興國初加左僕射昭文館大學士從平太原還進位司空薨年七十贈太尉中書令諡曰文惠咸平二年以居正配享太宗廟廷吕餘慶幽州安次人也名犯太祖諱遂以字稱父琦晉兵部侍郎五代史有傳餘慶以蔭補千牛備身歷開封府參軍戶曹掾忠武軍推官鄼縣令濮州録事參軍太祖節制同州餘慶為從事太祖歷滑許宋三鎮並在幕府及即位召拜給事中端明殿學士知開封府遷戶部侍郎荆湖平知潭州改襄州遷兵部侍郎知江陵府遂以本官參知政事蜀平知成都府以執政蒞藩自餘慶始也加吏部侍郎歸朝兼劒南荆南發運使開寶六年引疾求罷除尚書左丞卒年五十八贈鎮南軍節度使太祖幕客餘慶居其先趙普李處耘首大用餘慶略不介意及處耘被黜同列欲共排之太祖問處耘以實對餘慶執政時㑹普忤旨左右爭傾普餘慶仍力為辨釋人稱其長者餘慶重厚有守所至以寬簡治至道中以弟端為宰相特贈侍中端字易直少敏悟好學以蔭補千牛備身在周為直史館建隆初遷太常丞知浚儀縣同判定州開寶中遣西上閣門使郝崇信使契丹以端為之副八年以司門貟外郎知成都府為政清簡人用便之秦王廷美為開封尹召拜考功貟外郎開封府判官太宗征河東廷美將有居留之命端曰主上櫛風沐雨以申弔伐王當扈從主留務非所宜也廷美由是懇請從行尋坐王府親吏請託執事者違詔市竹木貶商州司戶移汝州復為太常丞出知蔡州入知開封縣為侍御史知雜事使高麗暴風折檣舟人怖恐端讀書自若人服其量遷大理少卿拜右諫議大夫許王元僖為開封尹又為判官王薨有發其陰事者端坐禆贊無狀左遷衛尉少卿淳化四年復故官為樞密直學士拜參知政事擢戶部侍郎同中書門下平章事端歷官四十年始大用太宗常恨任用之晚端持重識大體同列奏對或多異議一日內出手札戒諭自今中書事經吕端裁決乃得聞奏初李繼遷擾西鄙嘗獲其母矣至是太宗欲誅之獨召冦準與之謀宰相不與也端謂準曰陛下戒君勿言於端乎準曰否端曰邊鄙常事端不必與知若軍國大計端備位宰相不可不知也準以繼遷母告端曰君何以處之準曰欲斬於保安軍北門之外以戒凶逆端曰陛下以為如何準曰陛下以為然端曰必若此非計之得也願君少緩其事端將覆奏之端即入奏具道準言且曰昔項羽得太公欲烹之髙祖曰願分我一杯羮夫舉大事者不顧其親況繼遷乃一悖逆之人哉陛下今日殺之而明日繼遷可擒乎若其不然徒結怨讎而愈堅其叛心爾太宗曰然則何如端曰以臣之愚謂宜置於延州使善養視之以招徠繼遷雖不能即降終可以繫其心而母死生之命在我矣太宗撫髀稱善曰微卿幾誤我事即用其策進門下侍郎兼兵部尚書真宗即位加右僕射監修國史初太宗疾大漸內侍王繼恩忌太子英明陰與參知政事李昌齡知制誥胡旦謀立故楚王元佐太宗崩太后使繼恩召問端端知有變鎖繼恩於閣內使人守之而入太后謂曰宫車已晏駕立嗣以長順也今將如何端曰先帝立太子正為今日今始棄天下豈可遽違先帝之命更有異議耶乃迎太子立之真宗既立垂簾引見羣臣端平立殿下不拜請卷簾升殿審視然後降階率羣臣拜呼萬歲尋罷昌齡貶忠武軍司馬繼恩均州安置旦除名流潯州端身體偉大凡加體貌必見拱揖為納陛升殿以疾求罷除太子太保卒年六十六贈司空諡曰正惠端有器量而性寬厚雖經擯斥未嘗以得喪介意始李維清自樞密改中丞意端抑已屢遣人訟堂吏過又彈端久在病告端曰吾直道而行無所愧也端之孫誨自有傳劉熙古字義淳宋州寧陵人也唐左僕射仁軌十一代孫少通經史避祖諱不應進士舉以三傳賜第太祖領宋州節制熙古為節度判官及受䄠召為左諫議大夫知青州遷刑部侍郎知鳳翔府移秦州轉兵部侍郎徙知成都府加端明殿學士開寶五年召拜參知政事以戶部尚書致仕卒年七十四贈右僕射熙古好學明陰陽象緯書雖通顯自奉養若寒素云沈倫字順宜開封太康人也名上一字避太宗舊名去之周顯德初太祖領同州節制辟在幕府太祖繼領滑許宋三鎮皆從焉太祖受䄠授戶部郎中使吳越歸奏便宜事太祖嘉之遷給事中為陜西轉運使王師伐蜀諸將以賄敗倫歸篋中惟圖畫而已擢戶部侍郎樞密副使開寶六年拜中書侍郎同中書門下平章事集賢殿大學士兼荆南劒南發運使太平興國初加右僕射門下侍郎監修國史太宗親征太原以倫留守判開封府事師還加左僕射七年盧多遜敗坐與多遜同列責工部尚書請老復授左僕射致仕卒年七十九贈侍中諡曰恭惠倫清介在相位自守而已微時娶閻氏無子妾田氏生子及貴以田氏為正室搢紳非之盧多遜懷州河內人也父億字子元少篤學以孝悌聞舉明經調新鄉簿復舉進士為校書郎集賢校理仕周纍至司封郎中宏文館直學士出為河南令國初遷少尹億性恬退聞其子多遜知制誥即告老授少府監致仕多遜舉進士為祕書郎集賢校理遷左拾遺集賢殿修撰改左補闕知制誥太祖征太原以多遜知太原行府事移幸常山又命權知鎮州師還真學士院遷翰林學士開寶六年拜中書舍人參知政事初趙普為相多遜屢短之于上前普由是罷相父億不以為然每歎曰彼元勳也而小子毁之吾得早死不見其敗幸也多遜既執政億愀然不樂謂人曰家世儒素一日富貴暴至吾不知稅駕之所矣未幾億卒詔多遜起復多遜博涉經史善伺人主意太祖好讀書每遣使取書史館多遜伺知即通夕閲視詰朝問書中事多遜應答無滯太祖寵異之太宗即位拜中書侍郎同中書門下平章事從平太原加兵部尚書多遜在相位趙普之子及其親屬多為所抑初普出鎮河陽上章自訴云外人謂臣輕議皇弟開封尹皇弟忠孝全德豈有閒然矧昭憲皇太后大漸之際臣實與聞顧命知臣者君願賜昭鍳太祖手封其書藏於宫中至是普密奏臣開國舊臣為權幸所沮因言昭憲顧命及先朝自訴之事太宗於宫中訪得之因感悟即留為相多遜益不自安七年有告多遜遣堂吏趙白告秦王廷美願盡心事大王秦王亦使㳙人樊德明報多遜曰丞相言正㑹我意普因發其事遂罷相明日以多遜屬吏命百官議太子太師王溥等以為大逆不道當死太宗貸之追削官爵并其家流崖州白德明皆坐誅卒于流所年五十二其家徙于容州又移置荆南仁宗時追復工部侍郎臣稱曰太祖皇帝之於趙普也君臣相與之際深矣多遜以其區區之私而擠之普既去位為多遜者亦可已矣而猜譖之謀復用於太宗之世不旋踵而致敗彼豈不知太宗之深念舊勳者為如何哉犯五不韙而以伐人此君子知息之將亡也多遜之謂矣宋琪字叔寶范陽薊人也晉天福中在契丹舉進士登第幽帥趙延壽惜其自陷虜廷辟為從事㑹契丹猾夏延壽至京師其子贊為河中節度使又鎮晉陽皆辟琪為記室贊鎮盧州為觀察判官國初贊改鎮陽延安二鎮皆以琪為從事召拜左補闕開封府推官太宗為開封尹禮遇甚厚出知龍州移閬州召還稍遷至太常丞出知大通監以都官貟外郎知廣州將行對於便殿太宗以藩邸舊僚留判三司與三司使王仁贍廷辨事坐責兵部貟外郎俄通判開封府京府通判惟琪而已自是不復置也太平興國八年拜右諫議大夫為參知政事是歲太宗將用工部尚書李昉參預大政以琪先入乃超遷兵部尚書未幾與昉並拜同中書門下平章事琪自庶僚一歲中為宰相其速如此加門下侍郎昭文館大學士與宣徽使柴禹錫請盧多遜舊第太宗惡之遂罷相太宗耕籍田進吏部尚書拜右僕射卒年八十贈司空諡曰惠安琪有吏能而寡學識好詼諧無大臣體在相位百執事謁見或有干請必面折之石熙載字凝績洛陽人也周時舉進士太宗初領泰寧節度辟為掌書記及尹開封又辟為推官授右拾遺遷左補闕出為忠武崇義二鎮掌書記太宗即位召還復為左補闕出知潭州擢兵部貟外郎樞密直學士遂拜僉書樞密院事僉書始于此太宗征河東從至鎮州遷給事中樞密副使太宗還京師遷刑部侍郎未幾拜戶部尚書樞密使以疾求解機務除左僕射卒年五十七贈侍中諡曰元懿與薛居正配享太宗朝廷熙載有文學立朝無顧避喜稱薦善人有長者之譽子中立中立字表臣年十三喪父朝廷以中立為供奉官十八獻文改光祿寺丞遷殿中丞家富於財悉推與諸父久之除直集賢院纍擢知制誥翰林學士景祐四年拜參知政事明年以戶部侍郎罷為資政殿學士轉大學士遷吏部侍郎以太子少傅致仕遷少師卒年七十八贈太子太傅諡曰文定初中立家産歲入百萬至死之日不能給喪具仁宗聞而憫之賜以白金三百兩中立性疏曠少威儀善諧謔時人以鄭棨方之頗諳臺閣故事不汲汲近名請老于家客至其門者必延飲非醉不得去東都事略卷三十一
