body:
  text: 東都事略卷三十三宋王稱撰列傳十六張遜博州髙唐人也駙馬都尉魏咸信同母之兄太宗在藩邸得𨽻帳下補左班殿直從征太原遷文思副使進東上閣門使為度支使端拱初遷鹽鐵使二年除宣徽北院使僉書樞密院事改副使又知院事知樞密院始于此四年坐與冦準不協罷為右領軍衛將軍李順亂于蜀朝廷發兵水陸進討荆渚當其要害以遜為右驍衛大將軍知江陵府遜至時峽路諸州漕運卒數千人皆聚江陵有告其將謀變以應蜀冦府中議欲盡捕誅之遜止令捕首惡斬于市奏聞太宗甚喜以其餘配諸郡遜卒年五十六贈桂州觀察使柴禹錫字元圭大名人也少時有相者謂曰子甚貴若輔以經術必至將相禹錫由是頗讀書事太宗于晉邸太平興國初授供奉官改翰林副使如京使太宗以藩府之舊多訪以外事遷宣徽北院使告秦王廷美陰事擢為樞密副使轉南院使罷為左驍衛大將軍出知滄州徙澶鎮二州駐泊俄知潞州徙永興軍復召為宣徽使知樞密院事至道初除鎮寧軍節度使知涇州移貝州徙陜州以子宗慶尚主召歸京師公主就第謁見行舅姑之禮頃之復令赴鎮卒年六十二贈太尉宗慶字天祐尚太宗女魯國長公主除左千牛衛將軍駙馬都尉領恩州刺史禹錫卒拜康州團練使舊制諸公主皆雜買務市物宗慶遣家僮自外州市炭所過免算至則盡鬻之復市於務中自是詔罷雜買務所市物真宗祀汾陰進泉州觀察使又自言陜西市材木至京師望蠲所過稅真宗曰向諭卿毋得遣人私販以奪民利今復爾耶未幾拜武勝軍節度使徙永清彰德拜同平章事又徙鎮武成知陜州轉運使假少連言其政事庸謬改知潞州又判鄭州以縱部曲擾民召還久之出判濟州御史中丞賈昌朝亦言宗慶所至皆以無狀罷不可復使治郡遂留不遣卒時年六十三諡曰榮密主纍封楚國大長公主宗慶性貪鄙積財巨萬而自奉甚儉歷官多過失云趙鎔字化鈞滄州樂陵人也以刀筆事太宗于晉邸太宗即位補供奉官兩浙錢俶以國歸覲遣鎔檢校帑廪轉內酒坊副使與楊守一等告秦王廷美事遂遷六宅使掌翰林司擢東上閣門使出為梓遂巡檢使改左驍衛大將軍代還知滄州鎔守鄉郡人以為榮遷左神武大將軍會崔翰知州改鈐轄又知廬州踰年召為樞密承旨宣徽北院使同知樞密院事與柴禹錫並掌機務禹錫出鎮鎔知院事真宗即位改南院使以壽州觀察使罷卒年五十五贈忠正軍節度使鎔少涉獵文史善書翰太宗甚眷寵之本名容太宗改之為鎔取陶鎔之義云楊守一字象先其先洛陽人也唐末徙家宋鄭之間初為晉邸涓人太宗即位補右班殿直纍遷翰林副使初名守素太宗為更其名與趙鎔柴禹錫等同告秦王陰謀事擢為東上閣門使樞密都承旨改判四方館事轉客省使端拱元年除宣徽北院使僉書樞密院事卒年六十四贈太尉守一質直勤謹無它材能徒以幸會致位通顯云弭德超滄州青池人也嘗給事晉邸太宗即位補供奉官遷酒坊使杭州鎮州都監先是太宗念緣邊征戍者勞苦月賜士卒白金軍中謂之月頭銀德超乃誣樞密使曹彬秉政歲久得士衆心臣從塞上來皆言月頭銀曹公所致微曹公我輩當餒死矣又巧誣以它事太宗疑之彬不自辨遂罷以王顯為宣徽南院使德超為北院使並樞密副使德超怒顯居其上詬之且曰我有安社禝功汝何人反在我上又大罵曰汝輩當斷頭我度上無執守為汝輩眩惑顯以聞太宗命御史鞫之德超具伏削奪官爵同家屬配𨽻瓊州未幾死于流所臣稱曰甚矣讒言之為害也以秦王同氣之親而禹錫等發其私使兄弟之隙可乘曹彬有定亂之勳亦為德超所誣致君臣之間見疑彼譖人者亦已太甚可不畏哉東都事略卷三十三
