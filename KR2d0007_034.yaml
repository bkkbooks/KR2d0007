body:
  text: 東都事略卷三十四宋王稱撰列傳十七荆罕儒冀州信都人也少為盜晉天福中詣范陽事燕王趙延壽延壽從耶律徳光入京師以罕儒為密州刺史髙平之戰周世宗既戮敗将何徽樊愛能等乃擇驍勇士為将以為招收都指揮使以功擢至團練使建隆初加鄭州防禦使改晉州兵馬鈐轄罕儒恃勇輕敵嘗懸軍深入敵獲甚衆一夕至京土原劉承鈞遣兵追躡之罕儒方據胡床饗士錦袍衷甲遂直犯賊鋒為并人所殺河東久畏其勇欲生致之及死求殺罕儒者悉誅焉太祖亦深嗟惜罪土原之不用命者罕儒從孫嗣嗣少應募為控鶴卒王師討河東擇勇敢百人開道捷洛陽砦嗣請行斬五十餘級河東将楊業退保城嗣與衆進焚南門奪其羊馬城賊夜薄砦繼選五百人嗣為其冠及旦斬馘殆盡及太宗親征廵師嗣登城手刄數賊股貫雙箭又中手礮折二齒太宗亟召賜以袍帶嘗從崔翰征幽州又從田重進討賊于飛狐口戰無不克賊嘗夜圍重進砦重進問計於嗣嗣曰今所領不過五百人彼衆踰二萬計請閒道求救於它将得數百人即依山布隊以三百人執白旗於道隅獨率所部趣契丹契丹見其疾馳而旗幟稍盛疑大軍至遂遁去嗣之用兵前後凡一百五十餘戰未嘗無功亦未嘗自伐也積官至虢州防禦使臨死垂涕謂其子曰累世為将者其後不昌汝輩益修謹乃免於患遂卒曹光實字顯忠雅州百丈人也父疇仕蜀為靖南軍使疇卒光實繼莅其職蜀以光實為永平軍節度使太祖命王全斌等平蜀既而羣盜蜂起有夷人張樂忠者率衆數千星夜掩至環光實所居鼓譟而進光實負其母揮戈突圍以出賊衆辟易不敢近光實舉家三百口皆見殺又發其父墓光實詣全斌白其事誓雪冤憤時蜀中諸郡未下乃圖雅州地形要害兼陳用兵攻取之意全斌壯其勇遂令将兵果克其城獲樂忠而甘心焉全斌以光實為黎雅州都廵撿使安集勞來民夷懷之召還太祖喜曰此蜀中之俊傑也以為黎州刺史遷唐州團練使太宗征河東以光實知威勝軍令調軍食河東平為汾遼石沁州廵撿改汝州團練使王師北伐與潘美出鴈門光實為前鋒遇敵人迎擊敗之李繼捧之入朝也以光實為銀夏等州都廵撿使繼捧弟繼遷遁入蕃部為冦邊民苦之光實乘閒掩襲至地邱澤俘斬甚衆破其族帳獲繼遷母妻及牛羊万計繼遷幾擒矣乃使人紿光實曰我數奔北公許我降乎光實信之繼遷設伏光實以數百騎赴之至葭蘆川繼遷舉手揮鞭而伏兵起光實遂見殺時年五十五從子克明克明字堯卿父光實為敵人所害克明尚幼有妾匿之葦薄中得免既長曉兵法善騎射光實既沒克明時為牙内虞候從行祕不發䘮使人傳光實命回兵銀州乃與其僕濳入彼中獲光實尸還葬京師先是蜀人禁不許還其鄉克明以母老趣道而歸李順反求克明欲用之乃携母遁山谷閒及賊䧟雅州克明集潰兵七千人又募丁壯三千遂復名山火井夾江等九縣立七砦於嘉眉邛州界分兵邀擊賊因復雅州擢西頭供奉官監兵黎州以餘賊未平徙邛州駐泊廵撿峽洛潰兵鄧紹等攻雅州克明又討平之蠻冦邕州以供備庫使知邕州乃遣書三十六遺溪洞酋長諭以朝廷恩信悉來赴承天節宴并遺以篋衣咸感泣而去獨洪洞恃險不至克明領兵攻之斬其首領既而宜州澄海軍校陳進反會鬱江暴漲州城摧克明伐木造舟為虛城水上以備守禦仍募溪洞兵趣象州賊遂南去廵撫使曹利用召克明會兵至貴州遇賊斬首四百餘級賊平利用專其功克明耻自言徙江淮兩浙捉賊使獲賊必釋其罪予以私錢使反捕索其黨所獲三千餘人知江寧府張詠上其事賜錢四十萬領平川刺史知辰州會撫水州蠻叛以克明為宜容等十州廵撿使乃領兵深入蠻多伏弩窮谷閒而磴道險絶克明意士卒有退志命後軍伐大木絶歸路且行且戰踰月至撫水州知州䝉承貴出降克明謂曰尔三十餘年為邊患止謂官軍不能至尔今天子好生不欲絶尔類姑許自新皆伏拜感激命飲血為誓勒銘奴山而還於是蠻人願内徙者七百餘口散之荆湖閒奏改撫水州曰安化州安化既平徙知桂州始置溪洞司而兼領之又奏以廣南兩路土軍並為忠敢嶺外居人結茅為屋雖嚴火禁不能弭患克明激以水入城夾道分流以為之備又命北軍敎以陶埴民始為瓦舎自是其患遂罕代還知滁州又知鼎州會交趾李公藴冦邕州改文思使知邕州時克明老矣或勸以不宜南去克明曰天子不以吾衰老委之邊事安可止耶至則遣人入交趾諭以利害公藴上章謝罪遷西上閤門使復知鼎州卒年七十二楊業并州太原人也父信仕劉氏為麟州刺史業少任俠善射好田獵謂其徒曰我他日為将用兵亦如用鷹犬逐雉兔尔弱冠事劉崇為保衞指揮使累遷至建雄軍節度使屢立戰功所向克捷國人號為楊無敵太宗征太原業扞城之東南面拒城苦戰及繼元降太宗聞其勇欲生致之令中使諭繼元以招之業乃北面再拜大慟釋甲來見太宗得之大喜以為左領軍衞大将軍師還除鄭州防禦使太宗以業老於邊事命知代州敵入鴈門領數百騎擊之敵衆大敗以功遷雲州觀察使王師北征以潘美将雲應路行營之師命業副之以蔚州刺史王侁順州團練使劉文裕護其軍拔雲應寰朔四州時曹彬敗於岐溝詔美護四州民内徙既而敵復破寰州業謂侁等曰賊勢盛不可與戰姑密諭雲朔等将先出衆我師次應州賊必悉衆來拒俾朔州吏民直入石碣谷列彊弩千人於谷口以騎士援於中路則三州之衆萬全矣侁沮之文裕亦欲業赴敵業曰此必敗之道也侁曰公素號無敵見敵逗撓豈有它志乎業曰非愛死也特殺傷士卒而功不可立尔即自石朱路趨朔州将行泣謂美曰業太原一降将天子不殺而授以兵柄非縱敵不擊欲圖報萬一也諸君責業以避敵當即死矣因指陳家谷曰公於此張步兵彊弩以援使業轉戰至此失援則無遺類也美與侁陣於谷口自寅至已侁使人登托羅臺望見敵敗欲爭其功即引兵離谷美不能止行二十里聞業敗帥兵却走業力戰至暮望谷口無人拊膺大慟帳下兵殆盡猶手刃數十百人因重傷為敵所獲乃太息曰業為姦臣所迫致王師敗衂不食三日而死陣之将䧟也麾下猶百餘人業謂曰汝曹各有父母妻子速去報天子無與我俱死衆皆流涕不去遂俱死無一生還者時淄州刺史王貴亦死貴從業為敵所圍親射殺數十人矢盡張空弮又擊數人遂死業勇而有謀與下同甘苦寒未嘗獨設炭為政簡易郡民愛之天下聞其死皆為之憤歎太宗尤痛惜之贈太尉大同軍節度使潘美削官三資侁文裕竝除名侁周樞密使朴之子也子延昭延朗下一字犯聖祖名改為延昭用業蔭補供奉官業之死太宗憫之擢延昭崇儀副使咸平二年契丹入邊延昭在遂城城小無備敵攻之甚急衆心危懼延昭集城下丁壯護守偶大寒命汲水注城外及旦悉為冰堅滑不可近敵遂解去拜莫州刺史契丹復入邊延昭伏銳兵於羊山之西自北擊之且戰且止及伏發敵衆敗績獲其名王函首以獻進團練使景徳初敵人南侵延昭領兵敵地破古城多所俘獲會修好乃止官至英州防禦使卒年五十七延昭於吏事非所長訴諜皆決於小校眞宗知而不責也第戒飭小校而已然其智勇善戰沉嘿寡言平居未嘗問及家事所得奉賜均遺士卒奉己簡易出入騎從如軍校法號令嚴明同士卒甘苦寒不披衣暑不張蓋遇敵必身先功成推其下故人樂為之用威振異域守邊二十餘年虜人畏之呼為六郎其卒也河朔之人皆望柩殞泣康保裔河南洛陽人也祖志忠後唐長興中討王都戰沒父再遇從太祖征李筠又以兵死於太行山下鄉民立廟祀之保裔在周以戰功為東班押班再遇死太祖以保裔代其父職從石守信破澤州開寳中又從諸将破契丹于石嶺闗累以方面領軍職遷登州刺史端拱初為淄州團練使知代州移深州加侍衞馬軍都虞候領涼州觀察使從屯滄州移帥鎮州咸平初除彰國軍節度使帥髙陽闗契丹入邊傅濳擁兵不戰諸将與契丹戰於河間援不至保裔選精銳赴之㑹暮約詰朝合戰遲明契丹圍之三數重左右勸易甲馳突以出保裔曰臨難無茍免遂決戰二日殺傷甚衆蹙踐塵深二尺兵盡矢絶救兵不至遂殁焉眞宗震悼久之贈侍中保裔有母年八十四封陳國太夫人遣内司賔勞問賜白金五十兩其妻已亡亦追封夫人保裔謹厚好禮軍政嚴整喜賔客延儒士善騎射弋飛走無遺鏃嘗以三十五矢引滿射筈鏑相繼而墜人伏其妙前後戰身被七十創又為礟傷鼻毁臂未嘗自言所賜金帛分與士卒宴勞軍伍嘗貸錢數千萬既沒親吏鬻物以償眞宗知之而厚賜焉子繼英繼英字仲雄以父任為供奉官保裔戰沒特授六宅使順州刺史累遷馬軍都虞候端州防禦使知渭州遷殿前都虞候桂州觀察使繼英謂戎人雖内附而終蓄姦謀乃大索其所反覆者蕩除之於是威震西鄙改建州觀察使知衞州曹利用貶繼英以婣家亦降為右羽林大将軍分司久之復左衛大将軍貴州團練使卒年七十一繼英嚴於馭軍而厚於撫宗族故其卒也家無餘財東都事略卷三十四
