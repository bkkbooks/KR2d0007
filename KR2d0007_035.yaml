  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0007_WYG_035-1a, image: WYG0382/WYG0382-0231c.png}
body:
  text: 東都事略卷三十五宋王稱撰列傳十八李穆字孟雍開封陽武人也幼温厚寡言好學聞酸棗王昭素善易往師之昭素謂人曰觀李生材器他日必為卿相昭素以著易論三十三篇授之舉進士調郢州判官周世宗即位博求文學之士近臣薦其才拜右拾遺太祖登極遷殿中侍御史太祖既平蜀以穆通判洋州徙陜州坐輸田租於西京失期免官又坐所舉吏有罪去前任久之召為太子中允尋以右拾遺知制誥穆文學操履為太祖所知太祖甞謂盧多遜曰李穆士大夫之仁者也多遜曰穆臨事不以死生易節所謂仁者必有勇也乃遣使李煜諭令入朝煜辭以疾穆曰朝與不朝惟自處之朝廷繁富兵甲精銳恐不易當尔太祖聞其言以為要切太宗即位累遷中書舍人宰相盧多遜得罪穆坐與之同年降司封貟外郎太宗惜其才尋命之殿試考較見其形容甚癯憐之謂曰憂畏所致耶穆流涕太宗為之動容命復故官擢翰林學士知開封府有能名遂擢左諫議大夫參知政事穆至孝母病累年惡暑而畏風穆身自扶持起居能適其志或通夕不寐未嘗有倦惰之色母卒哀毁過人朝命起復固辭不得已視事然終不飲酒不食肉未終喪而卒年五十七太宗深惜之謂宰相曰李穆國之良臣奄尔淪謝非穆之不幸朕之不幸也贈工部尚書諡曰文恭穆子行簡以父任為将作監丞不樂仕進家居二十餘年眞宗聞其賢行即其家拜太子中允致仕後遷太常丞而卒賈黄中字媧民滄州南皮人也唐相耽四世孫黄中年六歲中神童十五舉進士授校書郎集賢校理直史館遷左拾遺歴左補闕通判定州入為禮官嶺南平為采訪使江南平知宣州太宗即位知昇州一日黄中按行府庫見扃鐍甚嚴集僚吏發之得寳貨數十櫝皆李氏宫闈之物不𨽻於籍者黄中悉表上之太宗歎曰吾府庫之物有籍貪黷者尚冒禁盜之況此亡國之餘物乎賜黄中錢三百萬以旌其潔召還知制誥遷翰林學士太宗多召見訪以時政得失對曰職當書詔思不出位太宗益重之兼掌吏選品藻精當揀拔寒俊號為無私淳化二年除給事中參知政事太宗召見其母王氏命之坐謂曰教子如是今之孟母也黄中性端重守家法多知臺閣故事朝之典禮資以損益當時之名士皆出其門談論娓娓聽者忘倦特常憂畏而執政循嘿時論少之四年罷明年知襄州上言母老乞留京師改知澶州太宗謂侍臣曰朕念黄中憂畏必先其母老矣因曰蘇易簡之母亦如之易簡前謝曰陛下以孝治天下奨及人親臣何人敢膺榮遇拜禮部侍郎祕書監卒年五十六而母果無恙贈禮部尚書太宗因念翰林無良毉詔天下并大臣各薦能毉者其為太宗追惜如此蘇易簡字太簡梓州銅山人也父協仕至光禄寺丞易簡少好學風度凝粹弱冠舉進士為将作監丞通判昇州入為右拾遺知制誥除翰林學士淳化中充承旨易簡多振舉翰林故事太宗為飛白書院額曰玉堂及以詩賜之太宗曰此永為翰林中一美事易簡曰自有翰林未有如今日之榮也太宗又草書宋玉大言賦賜易簡易簡因擬賦以獻其詞曰皇帝以白龍牋書大言賦賜玉堂詞臣易簡御筆煌煌雄辭洋洋瓌琦博達不可備詳詔易簡升殿躬指其理且歎宋玉之奇怪也因伏而奏曰恨宋玉不得與陛下同時帝曰噫何代無人耶卿為朕言之臣易簡拜手稽首曰聖人興兮告成功登崑崙兮展升中地為席兮饗祖宗天起籟兮調笙鏞日烏月兔耀文明也參旗井鉞嚴武衞也執北斗兮奠𤣥酒也削西華兮為石䃭也飛雲涌霞騰燔燎也刳鵬腊鯨代牲魚也迅雷三發山神呼也流電三激爟火舉也禮再獻兮淳風還君百拜兮三神歡四時一周兮萬八千年泰山融兮滄海乾圜蓋穴兮方輿穿君王壽兮無窮焉時殿上皆呼萬歲太宗覽而嘉之一日易簡當禁直以水試欹器太宗曰聞卿所玩非欹器耶易簡曰然乃進曰日中則昃月滿則虧器盈則覆物盛則衰願陛下持盈守成念終始固万世之基業則天下幸甚遷給事中參知政事與趙昌言共事多不協昌言出使劒南中道而罷受詔知鳳翔踰年易簡亦罷為禮部侍郎出知鄧州移陳州卒年三十九贈禮部尚書易簡之執政也太宗召其母薛氏入禁中賜寳冠霞帔命坐問曰何以教子對曰幼則束以禮義長則訓以詩書太宗歎曰孟母也賜白金千兩易簡性耆酒太宗嘗以詩戒之在翰林入直雖不敢飲在私第未嘗不醉及其死太宗曰易簡果以酒敗可惜也子耆仕至直集賢院耆子舜欽有傳錢若水字淡成河南人也十歲能屬文華山陳摶一見以為有仙風道骨舉進士為同州推官有富民失女奴其父母訟于州鞫于有司獄吏嘗有貸於富民不獲乃劾富民父子數人共殺女奴棄之水中遂失其尸而誣以罪皆應死若水疑之密使人訪求女奴得之乃引以示女奴之父母皆泣曰是也富民父子賴以得免郡太守欲薦之若水固辭曰且朝廷以此為若水功當置獄吏者於何地太守歎服太宗聞之遂召用擢祕書丞直史館半歲中超遷知制誥翰林學士至道初拜右諫議大夫同知樞密院事真宗即位加户部侍郎以親年高求解機政乃罷為集賢院學士修太宗實録初太宗崩有馴犬號呼不食遣送陵所參知政事李至欲若水書其事遺之詩曰白麟朱鴈且勿書勸君書此懲浮俗若水不從至因若水奏書不列監修官吕端名以為若水掠美若水援唐故事以為言衆不能折又重修太祖實録從眞宗幸大名上書曰臣聞用兵以伐謀為上御将以用法為先比者傅濳為帥擁十萬之衆閉闗縱冦坐看敵人殘虐生民不正典刑曷懲其後楊延朗輩勇於赴敵奮不顧身授任尚輕賞功未大臣願陛下誅敗将以徇衆擢有功以勸能使諸将承風各思用命聲馳塞外威攝敵人昔劉崇結契丹入邊懦将樊愛能何徽臨敵不戰周世宗陳宴而戮之因使偏将十數分擊太原崇不敢支戎亦遁去其後收淮甸下秦鳳平闗南如席卷之易此用兵伐謀之效也欲消外侮必本安邊用得其人莫如太祖畀董遵誨以通逺軍郭進以邢州李漢超之在闗南何繼筠之處鎭定隰州則李謙溥易州則賀惟忠王彦昇之治原姚内斌之守慶名不過㳂邊廵檢責其效皆十餘年闊略其細故則無畏避之心就録其功能則絶幸遷之意官卑故易以使久任故知敵情閒授睿謀戒其生事是以西冦北敵十七年間遣使稱藩不為外患已試之效今皆可行不數年間可以致邊烽罷警矣俄知開封府北敵未賔服内出手詔詢若水禦備翦滅之術若水上言曰臣讀前史論匈奴者多矣若漢婁敬樊噲季布賈誼晁錯主父偃徐樂王恢韓安國朱買臣董仲舒之所陳特和親征伐之二議唐李靖魏徵温彦博郭正一狄仁傑之所及亦不過戰守之兩端晋桑維翰不背約之言出於微弱故相趙普請回軍之奏姑兾息民悉非逺謀臣所不取嚴尤謂自古御戎無上策臣竊笑之守在四夷制勝以靜非上策而何臣聞唐魏博一鎭尓兵戎固不衆於今日而敵騎未嘗南牧者以幽薊為北門扼其險阻故也石晉割地之後由定武達滄海千里受敵雖設二闗鎭之以重兵莫可以禦故晉末度長河漢初復擾邊徼以周世宗之英武曾未能絶其冦中山窺上黨今御札詢備禦翦滅之術臣以為不得幽州未可翦滅也後唐莊宗在河北命周徳威取幽州然後南向而爭天下蓋先為萬全之計使不能勝此善用兵者也夫戰守不同心将不能料敵重兵在外輕兵在内則今之所患也臣願陛下選智謀可以任邊郡者聽召壯士以為部曲而官為廪給之又募民為招收軍厚其粮賜蠲其租賦彼供輸兩地各有親屬則敵之動息得以知之如是同心将能料敵而在外者皆輕兵矣然無以統衆則不能用衆無以制勝則不能勝敵故必擇大臣領近鎭提重兵以專閫外之事有警則督戰已事則班師既無舉兵之名又得馭兵之要三軍同力上下一心備禦之方舉積此矣若乃患民力之困則廣邊地之營田患戍卒之驕則嚴将帥之法令古語有之曰法不可移令不可違又云功不勸謂之止善罪不懲謂之縱惡昔太祖用郭進守西山遣戍卒必戒之曰汝謹奉法我猶赦汝郭進殺汝矣其假借如此郭進所至兵未嘗小衂臣願陛下推太祖所以待郭進之心而待諸将則法令不患不嚴勸懲不患不至矣眞宗善其議謂左右曰若水儒臣中知兵者也拜鄧州觀察使知并州以疾召還卒年四十四贈户部尚書諡曰宣靖若水風流儒雅有文學善談論事母以孝聞所至有譽望接物以誠評人貴賤壽夭多驗自知不壽故懇辭勢位賢士大夫皆宗慕之有文集二十卷眞宗念若水母老數遣使存問賜緡帛羊酒云臣稱曰孔子論孝備矣是以求忠臣必於孝子之門惟能孝於親然後可移忠於君四子之母其賢有擇鄰之風而其子幼被慈訓卒能有立非此母不生此子也東都事略卷三十五
