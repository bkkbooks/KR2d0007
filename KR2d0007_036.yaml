body:
  text: 東都事略卷三十六宋王稱撰列傳十九郭贄字少儀開封人也應進士為開封首薦太宗任京尹得侍讀藩邸太宗即位擢贄著作佐郎兼皇子侍讀遷右補闕拜中書舍人太平興國七年拜參知政事曹彬為弭德超所譖贄為辨其誣宰相趙普因是重之嘗奏事對太宗言曰臣受遇不次惟以愚直上報太宗曰愚直何益贄曰雖然猶勝姧邪也八年早朝被酒左遷祕書少監知荆南府加左諫議大夫入為鹽鐵使出知澶州坐河決免真宗即位拜刑部侍郎知天雄軍入判太常寺吏部流內銓加集賢院學士知河南府遷工部尚書翰林侍讀學士進禮部尚書卒年七十六贈左僕射諡曰文懿贄長者喜延譽後進宋白趙昌言皆其所薦也晚節頗以治生為物論所惜云李至字言幾真定人也初為內臣李知審養子舉進士為將作監丞通判鄂州擢著作佐郎直史館遷右拾遺加右補闕知制誥為翰林學士拜右諫議大夫參知政事雍熙中加給事中時太宗親征范陽至上疏以為兵凶器也戰危事也用之之理必貴万全儻邊庾不充則宜養威蓄鋭夫京師天下本陛下恭守宗廟不離京轂示敵人以間暇慰億兆之瞻仰此策之上者也以目疾免授禮部侍郎遷吏部為祕書監真宗為皇太子以至李沆並為賓客真宗即位拜工部尚書參知政事真宗問以靈武事至上疏曰河湟之地夷夏雜居是以先王置之度外且繼遷素性強悍騷動邊鄙然臍不足以弭其惡擢髮不足以數其罪然聖人之道務屈已含垢以安兆人蓋所損者小所益者大陛下以元元為念不以巨憝介意臣料彼脅從亦厭兵久矣茍朝廷捨之不問待之如初啖以厚利縻以重爵亦安肯迷而不復訖於淪胥哉其後靈武卒不能守除武勝軍節度使知河南府卒年五十五贈侍中王沔字楚望齊州人也舉進士為大理評事太宗征太原見於行在拜著作佐郎直史館遷右拾遺出為京西轉運副使知懷州擢樞密直學士拜右諫議大夫僉書樞密院事遷副使端拱元年加户部侍郎參知政事沔辨慧苛刻尚數多詐視士大夫猶吏卒唯以甘言恱人而進退皆非物望初與張齊賢同在樞府頗不協及齊賢參知政事沔不自安因王禹稱上言請中書本廳不得接見賔客許於政事堂同見沔喜即奏行之直史館謝泌以為如此是疑大臣以私也疏駮之太宗即追還前詔沔因此罷卒年四十三贈工部尚書辛仲甫字之翰汾州孝義人也初從郭崇辟掌書記又隨崇為平盧軍節度判官崇卒改授鄆齊二州觀察判官入拜右補闕知光州移彭州課種柳蔭行路郡人謂之補闕柳太祖問趙普羣臣文武兼資者普以仲甫對即徙益州兵馬都監代還為三司判官太平興國初遷起居舍人奉使契丹契丹主問黨進何如人仲甫曰國家異人間出黨進何足道哉契丹主欲留之仲甫曰信以成命義不可留有死而已契丹主竟不能屈使還以刑部郎中知成都府政尚寬簡蜀人安其治入知開封府拜御史中丞雍熙三年拜給事中參知政事仲甫居大位自守而已出知陳州遷户部尚書告老以太子少保致仕加少傅卒年七十四贈太子太保諡曰康節張宏字巨卿青州益都人也舉進士為將作監丞通判宣州歷左拾遺為峽路轉運副使加左補闕徙知遂州以勤幹聞歸朝為主客郎中遷樞密直學士雍熙三年拜右諫議大夫樞密副使時河朔用兵宏循默備位無所建明而御史中丞趙昌言數上書論兵事乃用昌言為樞密副使改宏御史中丞端拱初復拜樞密副使淳化二年以吏部侍郎罷俄知開封府出知潞州進工部尚書卒年六十二贈右僕射臣稱曰朝論以張宏循默故罷其政使與趙昌言更其任夫御史之職在觸邪而中丞之位號執法事之利害人之忠佞皆得而言之其責豈不重哉循默之人使充其位可乎趙昌言字仲謨汾州孝義人也舉進士為將作監丞通判鄂州遷直史館荆湖轉運副使入拜職方貟外郎知制誥出知天雄軍召拜御史中丞遂代張宏為右諫議大夫樞密副使遷工部侍郎時陳象輿為鹽鐵副使與昌言善又知制誥胡旦度支副使董儼皆昌言同年日夕會于昌言之第京師為之語曰陳三更董半夜云有翟頴者險誕之士也素與旦親狎旦為作大言怪誕之辭使頴改名馬周以為唐馬周復出也其言多排毁時政自薦可為天子大臣及力舉數十人皆公輔之器令昌言內為之助陳王尹開封以其事聞趙普深嫉之捕馬周繫獄鞫之得實馬周流海島昌言貶崇信行軍司馬起知蔡州復知天雄軍初豪家有偫芻茭者時誘姦人穴隄昌言廉知之一日隄吏告急亟取豪家所積給用自是遂絶其弊淳化四年拜給事中參知政事京師大水請出廏馬外牧或云以馬備胡不可闕昌言謂塞下積水胡必不至從之果如其言李順亂于蜀命王繼恩討之繼恩握重兵久留成都軍士無鬭志由是郡縣復有陷者太宗意頗厭兵召昌言謂曰西川本自一國太祖平之訖今三十年矣昌言揣知上意即於上前指畫攻取之策太宗甚喜遣昌言督繼恩戰自繼恩以下並受節度既行或言其無嗣鼻折山根恐握兵難制即以昌言知鳳翔府賊平改户部侍郎罷政事仍知鳯翔徙澶涇延三州遷兵部侍郎知陜州移知永興軍召為御史中丞坐鞫獄失實貶安逺行軍司馬移武勝拜刑部侍郎真宗幸澶淵命知河陽歷天雄軍徙鎮州遷吏部侍郎卒年五十五贈吏部尚書諡曰景肅昌言喜推奬後進常薦李沆以為有公輔之器又以女妻王旦二人皆賢相也昌言臨事果斷無所顧避雖屢擯斥不少抑惟對僚史倨慢時論少之陳恕字仲言洪州南昌人也少為小吏折節讀書王明知洪州見而歎曰奇士也起家為大理評事通判澧州以吏幹聞召入為三司判官與判三司王仁贍廷爭事仁贍坐貶秩擢恕度支貟外郎以工部郎中知大名府復除戶部副使知澶州驛召為河北營田制置使密奏曰戍卒皆惰遊仰食縣官一旦使冬被甲兵春執耒耜恐變生不測既詔罷營田止葺堡壁而已知代州入為鹽鐵使恕有心計釐去宿弊太祖深器之曰真鹽鐵使也拜給事中參知政事太宗嘗言户部使樊知古所部不治恕以太宗意語之知古辨于上前坐泄禁中語罷知江陵府復召為工部侍郎總計使又為鹽鐵使恕屢司金榖為經久之制於是貨財流通公用足而民富實甚有稱職之譽常言出入之任所當謹者起知定例人以為當然亦頗傷苛碎也真宗即位拜吏部侍郎真宗命恕條具中外錢榖以聞恕久而不進真宗屢趣之恕曰陛下富於春秋若知府庫之充實恐生侈心臣是以不敢進真宗嘉之知審官院知貢舉避嫌凡江南貢士悉被黜又舉行貢舉非其人條被譴者咸怨憤然是舉以王曾為舉首恕每自歎曰吾得曾名世才也不愧於知人矣恕事母孝居喪絶葷茹哀毁過禮以故得疾不任治劇遷尚書左丞知開封府復以病求館殿之職乃以為集賢院學士卒年五十九子執中自有傳溫仲舒字秉陽河南人也舉進士為大理評事通判吉州遷右正言直史館拜工部郎中樞密直學士淳化二年以右諫議大夫為樞密副使改同知樞密院事四年罷知秦州移鳳翔徙興元江陵復召為戶部侍郎參知政事咸平初以禮部尚書罷明年出知河陽代還知開封府為御史中丞遷刑部尚書知天雄軍徙河南進户部尚書卒年六十七贈左僕射諡曰恭肅仲舒有應務才與冦準同進人謂之溫冦吕蒙正為相嘗援進仲舒及用乃反攻蒙正士君子非之劉昌言字禹謨泉州南安人也陳洪進以為工曹太平興國二年洪進歸朝改鎮徐州辟為推官八年舉進士遷保信武勝二鎮判官移泰寧軍入為左司諫廣南安撫使趙普留守西京辟昌言為通判府事悉以委之普薨昌言感普知已為經理其家事太宗以為忠於所舉召歸遂拜樞密直學士遷右諫議大夫同知樞密院事太宗既寵用昌言或言其委母妻鄉里十年不迎侍者詔令迎歸京師光祿寺丞何亮果州南充人也遊宦十餘年以蜀人不得歸覲省遂訴于轉運使盧之翰之翰以聞太宗驚歎又祕書丞陳靖亦泉州人也隨洪進歸闕留母妻在别墅聞太宗令昌言迎侍靖遽告歸其母戀鄉里愛他子不肯隨靖但迎妻子而已太宗訝之因下詔告諭文武官父母在逺地並令迎侍就養昌言遂以給事中罷出知襄州徙知荆南府遷工部侍郎卒年五十八贈工部尚書東都事略卷三十六
