body:
  text: 東都事略卷三十八宋王稱撰列傳二十一宋白字素臣大名人也年十一善屬文舉進士又舉拔萃科授著作佐郎歷玉津蒲城衛南三縣令太宗即位擢左拾遺知兖州從征太原劉繼元降白獻平晉頌遂除中書舍人入翰林為學士至道初為承旨真宗即位遷吏部侍郎白擬陸贄榜子集以獻真宗察其意希大用遂命知開封府以才不勝任罷為集賢院學士請老以兵部尚書致仕進吏部尚書卒年七十七贈左僕射諡曰文安白為文頗事浮麗而理致或不工善諧謔不拘小節典貢舉得蘇易簡王禹稱田錫李宗諤胡旦時謂之得人至它所取有納賂者又髙年不能決退多致譏誚殆能贍濟親族而恤其孤幼是亦其所長也楊徽之字仲猷建州浦城人也世尚武力父澄始業儒徽之少好學同邑有江文蔚善賦江為善詩徽之遂與齊名遊學于廬山是時福建屬江南江南亦置進士科以延士大夫徽之耻之乃閒道詣中朝應舉遂登進士第歷集賢校理著作佐郎右拾遺太祖為時望所歸徽之上書言其事及太祖受䄠太宗見其書謂太祖曰此周室忠臣也乾德初出為天興令徙峨眉知全州纍遷右補闕太宗即位遷侍御史拜右諫議大夫治許州入為史館修撰上疏曰陛下嗣統鴻圖闡揚文治廢墜修舉儒學嚮臻乃至周巖野以聘隱淪盛科選以寵材彥取士之道亦已至矣然擅文章者多獲迅遷明經業者罕聞殊用且京師四方之㑹太學首善之本今五經博士並闕其貟非所以厚人倫獎儒學厲賢崇化繇內及外之道也臣愚謂宜下明詔博求通經之士以分教胄子無使漢唐稱得人太宗嘉之顧謂宰相曰徽之儒雅之士也宜置之館殿遂判集賢院為張洎劉昌言所誣貶鎮安行軍司馬真宗為開封尹妙選僚屬召徽之為府判官兼左庶子真宗即位拜樞密直學士兼祕書監咸平初始置翰林侍讀學士以徽之為之與夏侯嶠並命纍官至兵部侍郎卒年八十贈兵部尚書徽之清素重名教尚風義常言溫仲舒輩以搏擊取貴位使後進趨競禮俗寖薄與石熙載李穆賈黃中為文義之友多識典故唐之士族人物悉能詳記尤工吟詠太宗真宗嘗和其詩有集二十卷其後仁宗以徽之先帝宫僚特贈太子太師諡曰文莊徽之無子一女適宋氏賢眀知書有禮法外孫綬位至參知政事徐鉉字鼎臣揚州廣陵人也十嵗能屬文與韓熙載齊名江南謂之韓徐仕吳為祕書郎又事南唐為知制誥與宋齊丘不協坐泄機事貶泰州司户召歸故官又坐專殺流舒州周世宗南征李景徙饒州召為太子右諭德復知制誥遷中書舍人景死事其子煜為禮部侍郎通知中書省事歷尚書左丞兵部侍郎翰林學士御史大夫吏部尚書王師圍金陵煜遣鉉朝京師求緩兵語在李煜傳太祖以禮遣之後隨煜至京師太祖責之鉉對曰臣仕江南國亡不能死臣之罪也太祖歎曰忠臣也以為太子率更令太平興國初置學士院從征太原加給事中出為左散騎常侍二年以廬州尼道安訟其弟與婦姜氏不飬母姑姜氏鉉妻之甥且誣鉉與姜姦鉉坐貶靜難行軍司馬道安亦坐告姦不實抵罪鉉初至京師見披毛褐者輒哂之邠州苦寒終不御毛褐冷氣致腹而卒年七十六鉉恬淡無矯僞不喜檡氏而好神怪有以此獻者所求必如其請李穆常使江南見鉉及其弟鍇文章歎曰二陸不能及也鍇仕江南為內史舍人而卒鉉好李斯小篆尤得其妙𨽻書亦工尺牘為士大夫所得皆珍藏之有集三十卷又有質疑論稽神録行於世至道二年復左散騎常侍無子宋準字子平開封雍丘人也舉進士第一時李昉知舉㑹貢士訴昉取舍非公太祖召準覆試復冠多士授校書郎直史館太平興國中知制誥準美風儀善談論文詞清麗始盧多遜南遷也李穆以同年坐黜左右無敢言者準因奏事盛言穆長者有檢操常非多遜所為豈黨哉太宗寤得復故官時論多之雍熙四年以疾免卒年五十二梁周翰字元褒鄭州管城人也幼好學能為文章周時舉進士為虞城簿宰相范質王溥以其聞人也不使佐外邑改為開封府户曹參軍國初二人猶為相用為祕書郎直史館武成王廟配享議者以王僧辨不克令終非全德者詔張昭竇儀銓定功業無瑕者方得與享周翰論自樂毅以降配享廟貌茍欲指瑕誰當無纍今一旦除去擯出祠庭臣竊惑之謂宜罷新議仍舊貫為便疏入不報遷左拾遺乾德中太祖大修宫闕周翰為五鳯樓賦以進太祖嘗欲用為知制誥以語石守信守信因以語周翰周翰遽以表謝太祖怒遂不用出為通判綿眉二州坐杖人至死者奪二官復為左拾遺監綾錦院太祖將郊天周翰上疏曰陛下再郊上帝必覃赦宥臣以天下至大其中有慶澤所未及節文所未該者所宜推而廣之方今稅賦所入至多加以科變之物名品非一調發供輸不無重困且西蜀淮南荆潭廣桂之地皆以為王土陛下誠能以三方所得之利減諸道租賦之入則庶乎均德澤而寬民力矣坐杖錦工過差為其所訴太祖怒謂曰爾豈不知人之膚血與已無異何至如是之酷邪左遷司農寺丞逾年為太子中允太平興國中知蘇州周翰善音律喜蒱博惟以飲戲為度於是治郡不進黜為分司俄除楚州團練副使李昉為相以其名聞于太宗召為右補闕兼史館修撰尋遷起居舍人兼起居郎事因言自今崇政殿長春殿皇帝宣諭之言侍臣論列之事望依舊中書修為時政記其樞密院事涉幾密亦令編纂各至月終送史館自餘百司凡于封拜除改㳂革制置之事悉備編録仍令郎與舍人分直崇政殿以記言動别為起居注每月先進御後降付史館起居注進御自周翰始也真宗為皇太子知其名及即位擢知制誥拜翰林學士從幸澶淵遷給事中罷為工部侍郎踰年卒年五十八周翰性疏俊辨急臨事過於嚴由是躓于時及掌書命周翰已老矣才思不如昔多不稱上意云朱昂字舉之其先京兆人也父葆光寓潭州遂家于衡山昂少篤學有朱遵度者時謂之萬卷目昂曰小萬卷嘗游廬陵有術者謂昂曰中原當有真主矣君仕當至四品遂北游江淮時周世宗南征韓令坤統兵揚州昂謁令坤陳治亂方略令坤器之令攝永正縣有政績國初為衡州録事參軍歷宜城令知蓬州徙廣安軍既又為宰相薛居正所知與李昉薦引之遷殿中丞知泗州就遷監察御史江南轉運副使知鄂州遷殿中侍御史為峽路轉運使除直祕閣知復州召還真宗即位遂知制誥入翰林為學士請老以工部侍郎致仕自宰相張齊賢而下皆賦詩贈行而從臣出祖於東門之外弟協仕為主客郎中雍王府翊善其後亦告老而歸時人以比漢二疏陳堯咨知荆南表其所居東西致政坊昂所得奉以三之一買竒書於所居為二亭曰知止曰幽棲自號曰退叟卒年八十三門人諡之曰正裕先生昂方正恬淡非公事不至兩府引年得體士君子多之胡旦字周父渤海人也舉進士第一通判升州代還遷左拾遺直史館上書言時政利病出為淮東轉運副使徙知海州盧多遜既貶趙普罷相其夏河決韓村尋復塞旦獻河平頌有逆遜投逺姦普屏外之語太宗怒貶商州團練副使乃上平燕八議起為右補闕修國史有翟馬周者旦與之善馬周上書排毁執政因自薦可為大臣又舉才任公輔者十人其辭頗壯當時皆指旦所為太宗怒流馬周海島貶旦坊州團練副使徙絳州淳化五年直集賢院復知制誥史館修撰旦與中官王繼恩善事連宫禁貶安逺行軍司馬又削籍流潯州移通州團練副使又移滁州分司西京又以為保信軍節度副使久之通判襄州未幾喪明以祕書少監致仕居襄州遷祕書監卒年八十旦雋辨彊敏少有大志退老漢上既喪明猶令人讀經史憑几聽之未嘗少輟嘗上所著漢春秋七十卷又著五代史略四十三卷將帥要略五十三卷演聖同論七十三卷唐乘七十卷初琢大硯方五六尺既而埋之且刻曰胡旦修漢春秋硯旦以文章名世然晚節黷貨干擾郡縣持吏短長時論薄之栁開字仲塗大名人也父承翰仕至監察御史開幼警悟豪勇父顯德末為南縣令有盜入其家衆不敢動開年十三亟取劔逐之盜踰垣開揮劔斷其足二指及就學講說能究經旨舉進士第自五代以來學者少尚義理有趙生者得韓文數十篇未達乃携以示開開一見遂知為文之趣自是屬辭必法韓愈初名肩愈蓋慕之也開尚氣自任不顧小節所與交必時之豪俊初為宋州司寇治獄稱職遷録事參軍太宗征河東開從駕督糧適常潤有小冦遂以開知常州徙潤州開至治所招誘群盜以奉金給之又解衣與賊酋置之左右或謂不可開曰彼失所則盜不爾則吾民也始懼死故假息鋒刃之下今推以赤心夫豈不懷未半嵗境內輯寧拜監察御史召還知貝州雍熙中坐與監軍忿爭貶上蔡令㑹王師北伐開部糧至涿州遇米信與契丹戰久不解遣使求和開謂信曰兵法無約而請和謀也亟攻必勝信不能決後二日復引兵來挑戰開因上書願效死邊鄙遂除殿中侍御史命使河北又上書願賜步騎數千以破敵太宗方擇文臣有武略者用之即授開崇儀使知寧逺軍契丹貴將白萬德本真定人統緣邊七百餘帳開因其親族往來令說萬德許以藩鎮俾挈幽州之衆內屬萬德喜請為期約使未還徙知全州州之西有蠻溪洞粟氏久為邊患朝廷設峽口香煙等七寨不能禦開至選勇辨吏往說之不踰月携老幼至州開賦其居業作時鑑一篇刻石戒之遣其酋赴闕授州上佐邊患遂息詔賜開緡錢三十萬㑹有黥卒訟非辜者坐削二官頃之上書自陳還舊秩知環州為理互市之不直者戎落恱附徙知邠州又知曹邢二州遷如京使上書言時政真宗嘉納之又徙代州葺城壘戰具諸將沮議因謂其從子浩曰吾觀北星有光雲從北來殆敵將至今諸將見疾一旦敵至必危我矣即丐小郡得欣州敵果犯塞徙滄州未至卒年五十四開著書號東郊野夫又號補亡先生作二傳以見意時范景好古學開與齊名謂之桞范開垂絶語門人張景曰吾十年著一書可行於世景為名之曰默書辭義稍隱讀者難遽曉也東都事略卷三十八
