body:
  text: 東都事略卷三十九宋王稱撰列傳二十二田錫字表聖嘉州洪雅人也楊徽之宰峨眉宋白宰玉津甚延譽之舉進士為將作監丞通判宣州遷著作郎京西轉運判官改左拾遺直史館錫鯁正寡言恭敬好禮既得諫官即上疏獻軍國要機者一朝廷大體者四頃嵗王師平太原未褒軍功迄今二載今幽燕竊據固當用兵雖禀宸謀必資武力願陛下因郊禋耕籍之禮議平晉之功則駕馭戎臣莫此為重此要機之一也臣聞聖人不務廣疆土惟務廣德業聲教逺被自當來賔周成王時越裳九譯來貢謂周公曰天無迅風疾雨海不揚波三年矣意者中國其有聖人乎盍往朝之交州謂之瘴海得之如獲石田臣願陛下務修德以愛民無鈍兵以挫鋭又何必以蕞爾蠻夷取勞震怒乎此大體之一也今諫官不聞廷爭給事中不聞封駁左右史不聞升陛記言動豈聖朝之美事乎又御史不聞彈奏中書舍人不聞訪以政事集賢院雖有書籍而無職官祕書省雖有職官而無圖籍臣願陛下擇才任之各司其局茍職業修舉則威儀自嚴此大體之二也今㝢縣平寧京師富庶軍營馬監靡不恢崇佛寺道宫悉皆輪奐闢西苑廣御池雖周之靈囿漢之昆明未足為比而尚書無聽事九寺三監寓天街之兩廊貢院就武成王廟是豈太平之制度耶臣願陛下别修省寺用列職官此大體之三也案獄官令枷杻有短長鉗鎖有輕重尺寸斤兩並載刑書未聞以鐵為枷者也昔唐太宗觀明堂圖見人之五臟皆麗於背遂減徒刑况隆平之時將措刑不用法之所無悉宜去之此大體之四也太宗褒其言因賜錢五十萬時宰相令有司受羣臣章疏必先白而後敢進錫上書以為失至公之體為河北轉運副使驛書言邊事曰臣聞動靜之機不可妄舉安危之理不可輕言利害相生變易不定取舍無惑思慮必精夫動靜之機不可妄舉者動為用兵靜為持重應動而靜則飬冦以生姦應靜而動則失時以敗事動靜中節乃得其宜伏望陛下申飭將帥勿尚小功使河朔之民得務農業亭障之地可積邊儲茍待其亂而取之則克乘其衰而兵之則降既心服而志歸則力省而功倍臣願陛下考古道恢逺圖示綏懷萬國之心用駕馭四夷之䇿事戒輕發理貴深謀若夫安危之理不可輕言者臣請為陛下陳之國家務大體求至理則安舍近謀逺勞而無功則危為君有常道為臣有常職是務大體也上不拒諫下不隱情是求至理也漢武帝唐太宗皆徇無厭之求奉不急之役是舍近謀逺也沙漠窮荒之地得之何所用耶敵人遺種殺之更生矣是勞而無功也臣又聞利害相生變易不定者兵書曰不能盡知用兵之害者則不能盡知用兵之利蓋事有可進而退則害成之事至焉可退而進則利用之事去焉可速而緩則利必從之而失可緩而速則害必由之而致可誅而赦則姦宄之心或有時而生害可赦而誅則勇烈之人或無心而利國可勸而懲則有以害勤勞之功可懲而勸則有以利僭踰之幸能審利害則為聰明書曰明四目逹四聰此之謂也臣又謂取舍不可以有惑者故曰孟賁之狐疑不如童子之必至思慮不可以不精者故曰差若毫釐繆以千里自國家圖幽燕以來兵連未解則財用不得不耗臣下不得不憂願陛下精思慮決取舍無使曠日持久窮兵極武焉太宗嘉之徙知相州移睦州遂知制誥錫好直言太宗或時不能堪錫從容進曰陛下日往月來飬成聖性太宗恱愈重之端拱二年嵗旱錫上疏曰今嵗旱暵之沴此實隂陽失和調燮倒置上侵下之職而文理未盡下知上之失而規過未能所以成此咎徵也伏望陛下引咎責躬以答天戒進德覃慶以安民心蠲免征徭搜察淹滯振廪通貨以救餓殍加估收儲以備闕乏弭災求理正在此時若旱沴不已臣恐盜聚緑林狄乘饉塞則朝廷之憂非淺也錫疏有調燮倒置之語為宰相不恱罷知陳州坐稽留獄訟責海州團練副使徙單州召還為工部貟外郎復論時政闕失加直集賢院至道中復知制誥上疏言諸州奉河西力役生民重困出知泰州彗見上疏請責躬以答天戒咸平三年召對言事錫嘗奏曰陛下治天下以何道臣願以皇王之道治之舊有御覽但記分門事類不若以經史子集為御覽三百六十卷日覽一卷經嵗而畢又取經史要切之言為御屏風十卷置御坐側則治亂興亡之鑒常不忘矣真宗詔史館借以羣書乃先上御覽三十卷御屏風五卷御覽序曰臣聞聖人之道布在方䇿六經則言髙㫖逺非講求討論不可測其淵深諸史則跡異事殊非參㑹異同豈易記其繁雜子書則異端之說勝文集則宗經之辭寡非獵精以為鑒戒舉要以觀㑹同可為日覽之書資於日新之德則雖白首未能窮經矧王者萬機之暇乎臣每讀書思以所得上補達聰可以銘於坐隅者書於御屏可以用於帝道者録為御覽經取帝王易曉之意史取帝王可行之事子或總於雜録集或附之逐篇悉求切當之言用達精詳之理俾功業可與堯舜等而生靈亦使躋仁夀之域臣區區之忠不勝大願御屏風序曰湯之盤銘曰茍日新日日新又日新太公之金匱云武王欲造起居之戒乃銘於几杖曰安不忘危存不忘亡孰惟二者後必無凶墨子云堯舜禹湯書其事於竹帛瑑之盤盂曰君子福大而愈懼爵隆而益恭逺察近視俯仰有則軒帝輿几皆有銘焉曰吾居民之上惴惴恐不及武王户席必有戒焉席之銘曰無行可悔户之銘曰名難得而易失唐黃門侍郎趙智為髙宗誦孝經曰天子有諍臣七人雖無道不失其天下微臣敢以此言上獻憲宗采漢史三國以來經濟要事撰書十四篇曰前代君臣事迹書之屏風臣每覽經史子集因取其語要揔一卷輒用進獻可書於屏置之御坐之右焉詔褒之錫覽天下奏章有言民飢盜起及詔敕不便悉條奏其事真宗以為得爭臣之體兼侍御史知雜事擢右諫議大夫史館修撰連上八疏皆直言時政得失嘗曰吾立朝以來封章五十二奏皆諫臣任職之常也言茍獲從吾之幸也豈可藏副示後謗時賣直邪悉取焚之真宗每見錫容必莊嘗目之曰朕之汲黯也卒年六十四真宗惻然謂宰相李沆曰田錫直臣也特贈工部侍郎有咸平集五十卷王禹稱字元之濟州巨野人也家世為農九嵗能為歌詩畢士安見而異之勉以勤業及長善屬文舉進士為武城簿知長洲縣端拱初太宗聞其名召試擢右拾遺直史館獻端拱針時契丹未寧太宗訪羣臣以邊事禹稱上禦戎十䇿以為外任人內修德則可以弭之外則合其勢以重將權罷小臣詗邏邊事行間諜以離其心遣趙保忠折御卿率所部以張犄角下詔感勵邊人取幽薊舊疆蓋弔晉遺民非貪其土地內則省官以寬經費抑文士以激武夫信用大臣以資其謀不貴虛名以戒無益禁游惰以厚民力惟陛下裁察太宗嘉之尤為趙普所器二年親試貢士詔使作歌援筆立就太宗謂侍臣曰此歌不踰月遍天下矣即拜左司諫知制誥冬旱禹稱上疏曰一榖不收謂之饉二穀不收謂之饑饉則大夫以下皆損其祿五分之一饑則奉無祿廩而已今旱雲不霑宿麥未茁既無九年之蓄可憂百姓之飢陛下降詔書直云君臣之間政教有闕自乘輿服御以下至百官奉料非宿衛軍士邊庭將帥悉第減之上答天譴下猒人心俟雨足復故臣朝行中家最貧奉最薄亦願少減奉以贖耗蠧之咎外則省嵗市之物內則罷工巧之伎近城掘土侵冢墓者瘞之外州配𨽻之衆非贓盜者釋之然後戒州縣官吏以古者猛虎度河飛蝗越境之事其餘軍民刑政之弊非臣所知者望委宰臣裁議頒行但感人心必召和氣惟陛下行之太宗幸瓊林苑召至御榻前顧問語宰相曰禹稱文章獨步當世其寵奬如此因抗疏為徐鉉雪誣貶商州團練副使移解州召還拜左正言太宗曰禹稱文章俊麗無能及者但性剛不能容物爾俄直昭文館時太宗命將討李繼遷禹稱屢陳便宜以為繼遷不必勞力而誅自可用計而取兵法曰使貪使愚言貪者利其財愚者不計其死也臣愚謂宜明數繼遷罪惡曉諭蕃漢重立賞賜髙與官資昔劉知俊兄弟以同州叛附于岐梁太祖下詔曰有捉得知俊者賞萬緡與節度使得其弟者賞五千緡與刺史一月之間先擒其弟今但信賞必行則繼遷身首不梟即擒矣求外任得知單州至郡十五日而召為禮部貟外郎知制誥入翰林為學士孝章皇后崩梓宫遷于燕國長公主第禹稱爭之曰皇后嘗母儀天下當遵用舊典罷知滁州禹稱嘗草李繼遷制送馬五十匹為潤筆禹稱却之及出閩人鄭褒徒步來謁禹稱禹稱愛其儒雅及别去為買一馬或言買馬虧價者太宗曰彼能却繼遷五十馬顧肯虧一馬價哉移知揚州真宗即位詔羣臣論事禹稱上疏陳五事一曰謹邊防通盟好因嗣統之慶赦繼遷罪復與夏臺彼必感恩內附且使天下知屈已而為人也二曰減冗兵併冗吏使山澤之饒流於下開寶前諸國未平而財賦足兵威強由所蓄之兵鋭而不衆所用之將專而不疑設官至簡而事皆舉興國後增貟太冗宜皆經制之三曰艱選舉使入官不濫先朝登第僅萬人宜糾以舊制還舉場於有司吏部擇官亦非帝王躬親之事宜依格敕注擬四曰澄汰僧尼使疲民無耗罷度人修寺一二十載容自銷鑠亦救弊之一端五曰親大臣逺小人使忠良蹇諤之臣知進而不疑姦憸傾巧之徒知退而有懼疏奏召還復知制誥其後潘羅支射死繼遷夏人欵附卒如禹稱䇿修太祖實録禹稱直書其事執政以禹稱為輕重其間出知黃州州境有二虎鬭其一死而食其半又羣雞夜鳴經月不止禹稱上疏引洪範傳申戒且自劾真宗遣使乘馹問勞醮禳之詢日官則云守臣當其咎真宗亟命移知蘄州禹稱表謝有宣室鬼神之問不望生還茂陵封禪之書正期身後至郡未逾月而卒年四十八禹稱辭章敏贍喜談世事臧否人物以正自持故屢擯斥所與游必儒雅薦寵後進如孫何丁謂遂皆名重一時有小畜集三十卷奏議十卷後集詩三卷子嘉祐嘉言俱知名方禹稱在翰林也嘉祐為館職冦準知之準使知開封府一日問嘉祐曰吾尹京外議云何嘉祐曰人皆言丈人旦夕入相準曰於吾子意何如嘉祐曰以愚觀之丈人不若不為相之為善也若相則譽望損矣準曰何故嘉祐曰自古賢相所以能建功業澤生民者其君臣相得皆如魚之有水故言聽計從而臣主俱榮今丈人負天下重望相則中外有太平之責焉丈人於眀主能若魚之有水乎此嘉祐所謂譽望之損焉準大喜執其手曰元之雖文章冠天下至於深識逺慮或不逮吾子也嘉祐官不顯而嘉言亦以進士第為江都簿真宗觀書龍圖閣得禹稱奏章嗟美切直因訪其後宰相稱薦嘉言即召對擢大理評事仁宗時嘗為殿中侍御史其曾孫汾舉進士甲科元祐中為工部侍郎寶文閣待制入元祐籍云臣稱曰錫禹稱真天下正直之士哉其事君必盡言無隱以謹其微以防其漸由是二宗有聽言之美二臣有敢言之效而治道隆矣古之所謂主聖臣直君明臣忠者豈不然哉豈不然哉東都事略卷三十九
