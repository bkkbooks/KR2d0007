body:
  text: 東都事略卷四十宋王稱撰列傳二十三李沆字太初洺州肥郷人也父炳仕至侍御史沆好學沉厚寡言器度宏逺炳甞謂人曰此兒異日必至公輔舉進士爲將作監丞通判潭州轉著作佐郎直史館雍熈三年右拾遺王化基上書自薦太宗曰李沆宋湜皆佳士也並除右補闕知制誥遷翰林學士淳化三年拜給事中參知政事四年罷歸故官眞宗爲皇太子以沆爲賔客待以師傅禮眞宗即位遷户部侍郎參知政事咸平初拜同中書門下平章事監修國史㑹契丹入邊眞宗北幸命沆留守京師肅然加門下侍郎尚書右僕射李繼遷乆以西鄙叛遂有圖取朔方之意時朝廷困於飛輓朔方危蹙左右大臣及中外之議咸以爲靈州廼必爭之地不可失眞宗以問沆沆曰靈州必非朝廷有也臣請發單車之使召州將部分戍卒居民委其空壘而歸如此則闗右之民可息肩矣未幾靈州陷眞宗益信重之眞宗甞問沆曰人皆有密啟而卿獨無何也沆曰臣待罪宰相公事則公言之何用密啟夫人臣有密啟非讒即佞臣常惡之眞宗遣使持手札問沆欲以後宫劉氏爲貴妃沆對使者自引燭爇之附奏曰但道臣沆以爲不可其議遂寢眞宗又問沆治道所先沆曰不用浮薄新進喜事之人此最爲先眞宗問其人沆曰如梅詢曽致堯輩是矣眞宗深以爲然故終眞宗之世數人者皆不進用所用皆得厚重之士由沆之力也沆甞言吾在朝廷無功可紀惟四方之言利者未甞有一施行用此以報國在相位日取四方水旱盜賊奏之參知政事王旦以爲細事不足煩上聽沆曰人主少年當使知四方囏難不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作吾老不見矣此君異日之憂也景徳元年薨于位年五十八眞宗對侍臣曰沆忠亮淳厚終始如一言之泣涕贈太尉中書令諡曰文靖乾興元年配享眞宗廟廷沆内行修謹識大體不求聲譽所居湫隘處之晏然沆既薨其後眞宗朝陵展禮封山行慶鉅典盛儀無所不舉旦爲相每思沆之言歎曰李文靖聖人也故當時謂沆爲聖相云弟維維字仲方舉進士爲保信軍節度推官召試中書除直集賢院兄沆爲宰相與維友愛暇日相與笑言而未甞及世務然維終欲避權勢出知歙州沆薨累擢知制誥翰林學士以疾出知許州復入翰林爲承旨修眞宗實録累遷刑部尚書換相州觀察使知亳州徙河陽又知陳州卒年七十一維以文學進與修冊府元龜至老手不釋卷性寛厚喜怒不形於色善談論工詩嗜酒常曰人生詩酒足復何營哉既卒家無餘財王旦字子明大名莘人也父祐有傳旦少好學祐器之甞手植三槐于庭曰吾之後必有爲三公者舉進士爲大理評事知臨江縣再遷殿中丞通判鄭濠二州王禹偁薦其才旦亦獻其所爲文章得直史館拜右正言知制誥趙昌言參知政事旦以壻避嫌改集賢殿修撰昌言罷復知制誥眞宗即位拜中書舍人翰林學士錢若水名能知人甞見旦曰眞宰相器也若水爲樞密副使罷召對苑中問誰可大用者若水言旦可大用眞宗曰吾固已知之矣咸平三年拜給事中同知樞密院事明年以工部侍郎參知政事景徳元年契丹犯邊眞宗幸澶州雍王元份留守京師得暴疾命旦馳自行在代元份留守三年拜工部尚書同中書門下平章事集賢殿大學士監修國史天書降爲天書儀仗使東封泰山西祀汾隂俱爲大禮使累遷右僕射昭文館大學士聖祖降爲玉清奉聖像大禮使眞宗以兖州壽丘爲聖祖降生之地建景靈宫以旦爲朝修使宫成冊拜司空進司徒遷太保方是時契丹既已請盟趙徳明亦納誓約願守河西故地二邊兵罷不用天下無事旦以謂宋興三世祖宗之法具在其爲相務行故事進退能否眞宗久而益信之所言無不聽雖他宰相大臣有所請必曰王旦以謂如何事無大小非旦所言不決旦在相位乆外無夷狄之虞兵革不用海内富實羣工百司各得其職故天下稱爲賢相旦於用人不以名譽必求其實茍賢且才矣必久其官衆以爲宜其職然後遷其所薦引人未甞知冦準爲樞密使當罷使人告旦求爲使相旦大驚曰將相之任豈可求邪且吾不受私請準深恨之已而制出除準武勝軍節度使同平章事準入見泣涕曰非陛下知臣何以至此眞宗具道旦所薦準始媿歎以爲不可及趙徳明言民飢求糧百萬大臣皆曰徳明新納誓而敢違請以詔書責之眞宗以問旦旦請敕有司具粟百萬於京師詔徳明來取眞宗大喜徳明得詔書慙且拜曰朝廷有人大中祥符中天下大蝗眞宗使人於野得死蝗以示大臣明日執政有袖死蝗以進者云蝗實死矣請示於朝率百官賀旦獨以爲不可後數日方奏事飛蝗蔽天眞宗曰使百官方賀而蝗如此豈不爲天下笑邪宦者劉承規病且死求爲節度使眞宗以語旦曰承規待此以瞑目旦執以爲不可曰他日將有求爲樞密使者奈何自是内臣官不過留後旦任事乆有謗於上者旦輙引咎未甞自辨人有過失雖人主盛怒可辨者辨之必得而後已榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人旦獨請見曰始失火時陛下已罪已詔天下而臣等皆上章待罪今反歸咎於人何以示信且火雖有迹寜知非天譴邪由是當坐者皆免日者上書言宫禁事坐誅籍其家得朝士所與往還問吉凶之説眞宗怒欲付御史問狀旦曰此人之常情且語不及朝廷不足罪眞宗怒不解旦因自取甞所占問之書進曰臣少賤時不免爲此必以爲罪願併臣付獄眞宗曰此事已發何可免旦曰臣爲宰相執國法豈可自爲之幸於不發而以罪人眞宗意解旦至中書悉焚所得書既而眞宗悔復馳取之旦曰臣已焚之矣於是獲免者衆旦在政府十八年以病求罷入見滋福殿眞宗曰朕方以大事託卿而卿疾如此因命皇子拜旦旦言皇子盛徳必任陛下事因薦可爲大臣者十餘人其後不至兩府者李及凌䇿二人而已然亦爲名臣旦屢以疾請眞宗不得已拜太尉兼侍中五日一朝遇軍國大事不以時參決以疾懇辭冊拜太尉玉清昭應宫使初旦以宰相兼領至是罷政仍領使宫觀專置使始于旦自旦病使者存問日甞三四眞宗手自和藥賜之薨年六十一贈太師尚書令魏國公諡曰文正乾興元年配享眞宗廟廷旦事寡嫂謹兄弟友愛尤篤而務以儉約率勵子弟使在富貴不知爲驕侈兄子睦欲舉進士旦曰吾常以太盛爲懼其可與寒士爭進至其薨也子素猶未官云子雍冲素雍官至司封郎中冲至左賛譱大夫素字仲儀以父遺恩授太常寺太祝御史中丞孔道輔薦其材拜侍御史道輔貶素亦出知鄂州徙宣州召還知諫院時以皇子生議大赦及恩賜者素上疏言方元昊叛契丹多所要求縣官財用大屈謂宜惜費以紓民力且將士以乆勞待恩賜而臣下乃坐享無勞之奉皆非所以爲國計也議遂寢仁宗甞召諫官歐陽脩及素等四人嘉其論事無所避悉賜章服擢天章閣待制淮南都轉運使徙知渭州宣撫使范仲淹劾轉運使劉京市木擾民事連素降知華州又落職知汝州乆之復天章閣待制知渭州除龍圖閣直學士蔣偕知原州說范仲淹築堡大蟲巉堡未備而爲明珠滅臧伺閒邀擊之偕遁歸伏庭下請死素貰其罪令復徃立功以自贖緫管狄青曰偕輕而無謀不可遣素曰偕死則君往青不敢復言偕卒能致其酋長全所築堡而還遷樞密直學士知開封府仁宗問素曰大僚中孰可命以相事者素曰陛下命相臣何敢言仁宗曰姑言之素曰唯宦官宫妾不知姓名者可充其選仁宗憮然有閒曰如此則富弼耳素再拜曰陛下得人矣求補外除龍圖閣學士知定州加翰林侍讀學士知成都府復知開封爲羣牧使出知許州夏人冦靜邊砦圍童家堡改端明殿學士再知渭州英宗勞遣之比素至則虜圍已解改澶州觀察使知成徳軍移青州觀察使復爲端明殿學士遷尚書左丞知太原府又知汝州以端明殿學士工部尚書致仕本朝故事宰執侍從引年告謝必優遷品秩或爲東宫師傅未有帶職者帶職致仕自素始卒年六十七諡曰懿敏素爲吏敢擊斷時稱其材晚節官顯意不在事諸子中鞏知名鞏字定國從蘇軾問學能爲文章爲祕書省正字甞坐軾累貶賔州元祐中用軾薦除太常博士其後坐元祐黨貶官云質字子野旦猶子也始以䕃補太常寺太祝獻所爲文召試除集賢校理通判蘇州州守得盜銷鑄者百餘人以詫質質曰事發無迹何從得之曰吾以術鈎之質曰仁者之政以術鈎人寘之死而又喜乎爲開封府推官出知壽州徙廬州盜有殺其徒而并其財者獲之寘于法大理駮曰法當原質以謂盜殺其徒而自首者原之所以疑壊其黨而開其自新若殺而不首既獲而亦原則公行爲盜而苐殺一人既得兼其財又可以贖罪不獲則肆爲盜獲則引以自原如此盜不可止非法意疏三上貶監靈仙宫起知泰州遷荆湖北路轉運使知荆南府爲政有惠愛召爲史館修撰遂拜天章閣待制初范仲淹以言事貶饒州方治黨人甚急質獨扶病率子弟餞于東門留連數日大臣有以誚質曰長者亦爲此乎何自陷朋黨復曰昔徐晦不負楊臨賀今質願附范饒州若得爲黨人公之賜厚矣聞者媿伏明年出知陜州卒年四十五臣稱曰李沆王旦相繼相章聖君臣俱欲無爲上則隂陽和風雨時下則水土平艸木茂外則邊鄙不聳内則比屋可封眞得宰相之職矣而沆猶日奏水旱盜賊之事以防人主侈心其先識逺慮蓋如此以旦之賢諫行言聽而於此有媿於沆焉此春秋之法所以責備於賢者也東都事略卷四十
