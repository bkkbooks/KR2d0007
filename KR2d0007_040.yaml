  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0007_WYG_040-1a, image: WYG0382/WYG0382-0257c.png}
body:
  text: 東都事略卷四十宋王稱撰列傳二十三李沆字太初洺州肥鄉人也父炳仕至侍御史沆好學沉厚寡言器度宏逺炳嘗謂人曰此兒異日必至公輔舉進士為將作監丞通判潭州轉著作佐郎直史館雍熙三年右拾遺王化基上書自薦太宗曰李沆宋湜皆佳士也並除右補闕知制誥遷翰林學士淳化三年拜給事中參知政事四年罷歸故官真宗為皇太子以沆為賔客待以師傅禮真宗即位遷户部侍郎參知政事咸平初拜同中書門下平章事監修國史會契丹入邊真宗北幸命沆留守京師肅然加門下侍郎尚書右僕射李繼遷久以西鄙叛遂有圖取朔方之意時朝廷困於飛挽朔方危蹙左右大臣及中外之議咸以為靈州乃必爭之地不可失真宗以問沆沆曰靈州必非朝廷有也臣請發單車之使召州將部分戍卒居民委其空壘而歸如此則關右之民可息肩矣未幾靈州陷真宗益信重之真宗嘗問沆曰人皆有密啓而卿獨無何也沆曰臣待罪宰相公事則公言之何用密啓夫人臣有密啓非讒即佞臣常惡之真宗遣使持手札問沆欲以後宫劉氏為貴妃沆對使者自引燭爇之附奏曰但道臣沆以為不可其議遂寢真宗又問沆治道所先沆曰不用浮薄新進喜事之人此最為先真宗問其人沆曰如梅詢曽致堯輩是矣真宗深以為然故終真宗之世數人者皆不進用所用皆得厚重之士由沆之力也沆嘗言吾在朝廷無功可紀惟四方之言利者未嘗有一施行用此以報國在相位日取四方水旱盜賊奏之參知政事王旦以為細事不足煩上聽沆曰人主少年當使知四方囏難不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作吾老不見矣此君異日之憂也景德元年薨于位年五十八真宗對侍臣曰沆忠亮淳厚終始如一言之泣涕贈太尉中書令諡曰文靖乾興元年配享真宗廟廷沆內行修謹識大體不求聲譽所居湫隘處之晏然沆既薨其後真宗朝陵展禮封山行慶巨典盛儀無所不舉旦為相每思沆之言歎曰李文靖聖人也故當時謂沆為聖相云弟維維字仲方舉進士為保信軍節度推官召試中書除直集賢院兄沆為宰相與維友愛暇日相與笑言而未嘗及世務然維終欲避權勢出知歙州沆薨纍擢知制誥翰林學士以疾出知許州復入翰林為承旨修真宗實録纍遷刑部尚書換相州觀察使知亳州徙河陽又知陳州卒年七十一維以文學進與修册府元龜至老手不釋卷性寬厚喜怒不形於色善談論工詩嗜酒常曰人生詩酒足復何營哉既卒家無餘財王旦字子明大名莘人也父祐有傳旦少好學祐器之嘗手植三槐于庭曰吾之後必有為三公者舉進士為大理評事知臨江縣再遷殿中丞通判鄭濠二州王禹稱薦其才旦亦獻其所為文章得直史館拜右正言知制誥趙昌言參知政事旦以壻避嫌改集賢殿修撰昌言罷復知制誥真宗即位拜中書舍人翰林學士錢若水名能知人嘗見旦曰真宰相器也若水為樞密副使罷召對苑中問誰可大用者若水言旦可大用真宗曰吾固已知之矣咸平三年拜給事中同知樞密院事明年以工部侍郎參知政事景德元年契丹犯邊真宗幸澶州雍王元份留守京師得暴疾命旦馳自行在代元份留守三年拜工部尚書同中書門下平章事集賢殿大學士監修國史天書降為天書儀仗使東封泰山西祀汾隂俱為大禮使纍遷右僕射昭文館大學士聖祖降為玉清奉聖像大禮使真宗以兖州壽丘為聖祖降生之地建景靈宫以旦為朝修使宫成册拜司空進司徒遷太保方是時契丹既已請盟趙德明亦納誓約願守河西故地二邊兵罷不用天下無事旦以謂宋興三世祖宗之法具在其為相務行故事進退能否真宗久而益信之所言無不聽雖他宰相大臣有所請必曰王旦以謂如何事無大小非旦所言不決旦在相位久外無夷狄之虞兵革不用海內富實羣工百司各得其職故天下稱為賢相旦於用人不以名譽必求其實茍賢且才矣必久其官衆以為宜其職然後遷其所薦引人未嘗知冦準為樞密使當罷使人告旦求為使相旦大驚曰將相之任豈可求邪且吾不受私請準深恨之已而制出除準武勝軍節度使同平章事準入見泣涕曰非陛下知臣何以至此真宗具道旦所薦準始愧歎以為不可及趙德明言民飢求糧百萬大臣皆曰德明新納誓而敢違請以詔書責之真宗以問旦旦請敕有司具粟百萬於京師詔德明來取真宗大喜德明得詔書慙且拜曰朝廷有人大中祥符中天下大蝗真宗使人於野得死蝗以示大臣明日執政有袖死蝗以進者云蝗實死矣請示於朝率百官賀旦獨以為不可後數日方奏事飛蝗蔽天真宗曰使百官方賀而蝗如此豈不為天下笑邪宦者劉承規病且死求為節度使真宗以語旦曰承規待此以瞑目旦執以為不可曰他日將有求為樞密使者奈何自是內臣官不過留後旦任事久有謗於上者旦輒引咎未嘗自辨人有過失雖人主盛怒可辨者辨之必得而後已榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人旦獨請見曰始失火時陛下已罪已詔天下而臣等皆上章待罪今反歸咎於人何以示信且火雖有迹寧知非天譴邪由是當坐者皆免日者上書言宫禁事坐誅籍其家得朝士所與往還問吉凶之説真宗怒欲付御史問狀旦曰此人之常情且語不及朝廷不足罪真宗怒不解旦因自取嘗所占問之書進曰臣少賤時不免為此必以為罪願併臣付獄真宗曰此事已發何可免旦曰臣為宰相執國法豈可自為之幸於不發而以罪人真宗意解旦至中書悉焚所得書既而真宗悔復馳取之旦曰臣已焚之矣於是獲免者衆旦在政府十八年以病求罷入見滋福殿真宗曰朕方以大事託卿而卿疾如此因命皇子拜旦旦言皇子盛德必任陛下事因薦可為大臣者十餘人其後不至兩府者李及凌䇿二人而已然亦為名臣旦屢以疾請真宗不得已拜太尉兼侍中五日一朝遇軍國大事不以時參決以疾懇辭册拜太尉玉清昭應宫使初旦以宰相兼領至是罷政仍領使宫觀專置使始于旦自旦病使者存問日嘗三四真宗手自和藥賜之薨年六十一贈太師尚書令魏國公諡曰文正乾興元年配享真宗廟廷旦事寡嫂謹兄弟友愛尤篤而務以儉約率勵子弟使在富貴不知為驕侈兄子睦欲舉進士旦曰吾常以太盛為懼其可與寒士爭進至其薨也子素猶未官云子雍沖素雍官至司封郎中沖至左贊譱大夫素字仲儀以父遺恩授太常寺太祝御史中丞孔道輔薦其材拜侍御史道輔貶素亦出知鄂州徙宣州召還知諫院時以皇子生議大赦及恩賜者素上疏言方元昊叛契丹多所要求縣官財用大屈謂宜惜費以紓民力且將士以久勞待恩賜而臣下乃坐享無勞之奉皆非所以為國計也議遂寢仁宗嘗召諫官歐陽修及素等四人嘉其論事無所避悉賜章服擢天章閣待制淮南都轉運使徙知渭州宣撫使范仲淹劾轉運使劉京市木擾民事連素降知華州又落職知汝州久之復天章閣待制知渭州除龍圖閣直學士蔣偕知原州説范仲淹築堡大蟲巉堡未備而為明珠滅臧伺間邀擊之偕遁歸伏庭下請死素貰其罪令復往立功以自贖總管狄青曰偕輕而無謀不可遣素曰偕死則君往青不敢復言偕卒能致其酋長全所築堡而還遷樞密直學士知開封府仁宗問素曰大僚中孰可命以相事者素曰陛下命相臣何敢言仁宗曰姑言之素曰唯宦官宫妾不知姓名者可充其選仁宗憮然有間曰如此則富弼耳素再拜曰陛下得人矣求補外除龍圖閣學士知定州加翰林侍讀學士知成都府復知開封為羣牧使出知許州夏人冦靜邊寨圍童家堡改端明殿學士再知渭州英宗勞遣之比素至則虜圍已解改澶州觀察使知成德軍移青州觀察使復為端明殿學士遷尚書左丞知太原府又知汝州以端明殿學士工部尚書致仕本朝故事宰執侍從引年告謝必優遷品秩或為東宫師傅未有帶職者帶職致仕自素始卒年六十七諡曰懿敏素為吏敢擊斷時稱其材晚節官顯意不在事諸子中鞏知名鞏字定國從蘇軾問學能為文章為祕書省正字嘗坐軾纍貶賔州元祐中用軾薦除太常博士其後坐元祐黨貶官云質字子野旦猶子也始以蔭補太常寺太祝獻所為文召試除集賢校理通判蘇州州守得盜銷鑄者百餘人以詫質質曰事發無迹何從得之曰吾以術鈎之質曰仁者之政以術鈎人置之死而又喜乎為開封府推官出知壽州徙廬州盜有殺其徒而并其財者獲之置于法大理駮曰法當原質以謂盜殺其徒而自首者原之所以疑壞其黨而開其自新若殺而不首既獲而亦原則公行為盜而苐殺一人既得兼其財又可以贖罪不獲則肆為盜獲則引以自原如此盜不可止非法意疏三上貶監靈仙宫起知泰州遷荆湖北路轉運使知荆南府為政有惠愛召為史館修撰遂拜天章閣待制初范仲淹以言事貶饒州方治黨人甚急質獨扶病率子弟餞于東門留連數日大臣有以誚質曰長者亦為此乎何自陷朋黨復曰昔徐晦不負楊臨賀今質願附范饒州若得為黨人公之賜厚矣聞者愧伏明年出知陜州卒年四十五臣稱曰李沆王旦相繼相章聖君臣俱欲無為上則隂陽和風雨時下則水土平草木茂外則邊鄙不聳內則比屋可封真得宰相之職矣而沆猶日奏水旱盜賊之事以防人主侈心其先識逺慮蓋如此以旦之賢諫行言聽而於此有愧於沆焉此春秋之法所以責備於賢者也東都事略卷四十
