body:
  text: 東都事略卷四十二宋王稱撰列傳二十五髙瓊家世燕人也父乾徙居亳州之蒙城瓊少時在外寢一夕父往視之若見有金甲而侍其側者父異之及長以材勇事太宗于濳邸即位以爲御龍直指揮使從征太原命押弓弩兩班合圍攻城及征幽薊太宗倍道還京師留瓊與軍中鼓吹殿後六班扈從不及惟瓊首帥所部見行在太宗大恱累遷待衛歩軍都指揮使領歸義軍節度使移鎮保大眞宗即位改鎮彰信咸平初契丹犯塞瓊將并代之師與石保吉㑹鎮定既而傅濳以逗留得罪以瓊代將其兵兵罷復還治所三年授殿前都指揮使先是諸將臨敵退衂眞宗已貸其罪議者以爲敗軍之將當誅眞宗以問瓊瓊對曰罪誠當誅然陛下去嵗已釋其罪今復行之又方屯諸路非時代易臣恐衆心疑懼乃止景徳初契丹入冦大臣有欲避狄江南西蜀者冦準不可諸將中獨瓊與準意同準既力爭之眞宗曰卿文臣豈能盡用兵之利準曰請召髙瓊瓊至乃言避狄爲便準大驚以瓊爲悔也已而徐言避狄固爲安全但恐扈駕之士中路逃亡無與俱西南者耳眞宗乃大驚始決北征之䇿眞宗既親征時前軍已與契丹戰或有勸眞宗南還者瓊因言契丹師衆已老陛下宜親臨觀兵督其成功眞宗嘉其言即幸澶州南城瓊固請度河眞宗從之至浮橋駐輦未進瓊乃執撾築輦夫背曰何不亟行今已至此尚何疑眞宗乃命進輦既至登北門城樓張黄龍旗城下將士皆呼萬嵗氣勢百倍㑹契丹大將撻覽中弩死契丹遂退明年以罷兵料簡兵卒諸班直十年者出補軍校年老退爲本班剰貟瓊曰此非激勸之道宿衛豈不勞乎自是八年者皆得叙補以疾求解兵柄授忠武軍節度使卒年七十二贈侍中諡曰武烈瓊暁軍政善訓諸子使讀書率能自立於時子繼勲繼忠繼和繼宣繼隆繼元繼宣官至防禦使繼忠至四方館使榮州團練使繼勲字紹先初補殿直太宗見而竒之擢寄班祗候咸平初監兵益州王均反繼勲引兵與賊黨戰轉鬭至嘉州界敗之復還力攻益州城而王均夜潰以功遷崇儀使徙綿漢劒門都廵檢又徙陜西鈐轄還朝陳用兵方略眞宗嘉之除宫苑使并代州鈐轄徙岢嵐軍敵入冦繼勲謂軍使賈宗曰敵雖衆而不成列是無主帥也急擊之因設伏要害與接戰寒光嶺伏發斬獲甚衆遷弓箭庫使累遷東上閤門使以隴州團練使知雄州拜威武軍節度使馬軍副都指揮使徙鎮保順又徙昭信景祐二年以年髙進見節其拜許其子扶掖未幾辭管軍遂改鎭天雄知滑州卒年七十八贈太尉諡曰穆武繼勲謙謹有機略善撫士卒戰常有功第三子遵甫終西作坊使女即宣仁聖烈皇后也瓊累贈魏王繼勲楚王遵甫魯王遵裕字公綽繼宣子以父任爲三班借職稍遷供備庫副使鎭戎軍駐泊都監夏人冦大順城諒祚中矢引去㑹英宗崩遵裕告哀抵宥州下宫夏人遣王盥受命至則吉服廷立遵裕切責之遂易服聽遺命既而具食上宫語及大順城事盥曰剽掠輩耳遵裕曰扶傷而遁者非若主邪夏人怒曰王人蔑視下國弊邑雖小控弦數十萬亦能躬執櫜鞬與君周旋遵裕瞋目叱之時諒祚覘於屏閒搖手使止神宗聞而嘉之擢知保安軍种諤取綏州帥怒其擅興欲正軍法諤稱得密旨於遵裕諤被罪遵裕亦降爲乾州兵馬監押熈寜初王韶議將復洮隴命遵裕從行遂副韶帥秦鳳韶帥熈河徙遵裕爲緫管六年從韶取岷州以功遷龍神衛四廂都指揮使知熈州坐事罷知頴州起帥環慶又坐奏報不實降西上閣門使知淮陽軍起知代州尋以團練使知慶州神宗命諸路兵討夏國涇原兵聴遵裕節制師度旱海距靈州百里次南平濼敵騎驟至遵裕出精騎接戰斬首千餘級遂合涇原師圍靈州劉昌祚請分兵擊東闗必下遵裕沮之圍城乆未拔賊引河灌我師水至斷砲爲梁以濟追騎至轉戰累日敵騎少却涇原師殿爲賊所乗一軍皆潰坐貶郢州團練副使安置後復右屯衛將軍卒年六十四紹聖中追贈奉國軍留後臣稱曰髙瓊與冦準協謀勸眞宗親征戮力破敵遂成莫大之功自是和好益固人物嵗滋北邊無烽燧之警者百有餘年盛徳之報慶流後裔篤生聖后爲女中堯舜天實興之也傅濳兾州衡水人也太宗在藩邸召置左右及即位爲東西班指揮使從征太原一日再中流矢又從征范陽先至涿州與契丹戰有功累遷至雲州防禦使雍熈三年命曹彬北征以濳爲幽州道行營前軍都指揮使與契丹戰敗于拒馬河責右領軍衛大將軍起爲内外馬歩軍頭遷殿前都虞候領容州觀察使端拱初拜昭化軍節度使徙鎮武成眞宗即位改鎭忠武契丹入邊以濳將鎭定髙陽關三路行營之兵濳畏懦擁歩騎八萬閉門自守未嘗出戰將校皆蓄銳爭奮則醜言罵之無何契丹破狼山砦遂攻威虜略寕邊軍及祈趙游騎出邢洺鎭定路不通者踰月朝廷遣使督其出師諸將亦屢促之不聽諸將憤怒因詬濳曰公怯乃不如一嫗耳都鈐轄張昭允又屢勸濳濳笑曰賊勢如此使吾與之角適挫吾銳耳乃分騎八千歩二千付諸將于髙陽關逆擊之許出兵爲援諸將與敵血戰而濳竟不至康保裔遂陷于陳眞宗將親征又命石保吉自大名領前軍赴鎭定濳逗留不發以致敵騎犯徳棣度河劫人民焚廬舍眞宗駐大名而邊㨗未至聞驍將石普楊延昭等屢請益兵濳不之與有戰勝者濳又抑而不聞眞宗大怒命髙瓊單騎即軍中代之令濳詣行在至則下御史府議法當斬眞宗貸之削奪官爵長流房州張昭允亦貶道州㑹赦徙汝州復團練使改左千牛衛將軍分司西京遷左監門衛大將軍乆之判左金吾仗卒年七十九王超趙州人也弱冠長七尺餘太宗爲開封尹召𨽻麾下及即位以𨽻御龍直累立戰功遂至河西軍節度使殿前都虞候改鎮天平咸平二年眞宗大閱禁兵二十萬于東郊超執五方旗以節進退眞宗御戎幄觀之顧謂超曰士衆嚴整戎行訓練惟汝之功契丹入邊眞宗親征以超爲先鋒都㸃檢傅濳逗撓命超代將鎮州行營之師又帥鎮定髙陽三路與契丹戰于遂城斬其禆王騎將十五人俘馘二萬計李繼遷陷清逺軍以超將西面行營之師禦之徙帥永興軍宰相言超有將帥材遂以超帥定州路行營王繼忠副之尋又加鎮定髙陽關三路屯定州六年契丹入邊繼忠與戰于望都而超不赴援繼忠遂陷于契丹景徳初眞宗駐蹕澶淵命超赴援超又緩行契丹遂深入㑹契丹通好眞宗罷超三路帥以爲崇信軍節度使知河陽徙鎮安逺知潞州又移鎮建雄知青州卒年六十二贈侍中超御下有恩與髙瓊同典禁旅嘗因休沐過營壘軍校不將迎瓊命捶之超曰若按習可懲其不肅人稱其恕然臨軍寡謀拙於戰鬭有子徳用仁宗朝樞密使同平章事自有傳王繼忠開封人也父爲軍校戍邊而死繼忠因得補殿直眞宗在東宫得給事左右累擢至雲州觀察使咸平末契丹入邊繼忠帥定武出戰于望都之北自以被遇之厚力戰圖報而服飾稍異契丹識之轉鬭累日援兵不至遂陷于契丹朝廷謂其死矣贈大同軍節度使景徳初契丹令繼忠請修和好朝廷允其請戢兵息民繼忠有力焉自是朝廷遣使至契丹必厚賜繼忠繼忠對使者亦必泣下嘗附表請召還眞宗以誓好既定賜詔諭之契丹主待之甚厚更其姓名曰耶律顯忠又改名宗信封爲呉王後不知其所終葛霸眞定人也始事太宗于濳邸以雄勇知名太宗即位補殿前指揮使三遷散貟都虞候雍熈中北伐契丹諸將失利以霸爲騎軍都指揮使領檀州刺史戍定州與敵戰于唐河敗走之召爲御前忠佐馬歩軍都軍頭端拱初出爲博州團練使累擢澶州觀察使殿前都虞候拜保順軍節度使出帥鎮州徙天雄軍眞宗幸大名以霸領具鎮髙陽關前軍就遷副都指揮使改邠寜涇原環慶遷侍衛馬軍都指揮使徙鎮感徳契丹犯邊眞宗議親征以霸副李繼隆爲排陳使駐澶州明年召還霸以老請解軍職授昭徳軍節度使出帥并代徙知耀州卒年七十五贈太尉霸爲人鄙吝然以謹直保位云子懷敏懐敏始以父䕃授西頭供奉官懐敏通時事善希合故多薦其才者嘗爲益州路提㸃刑獄知隰莫保雄滄滁六州陜西用兵爲涇原秦鳳經略安撫副使擢眉州防禦使知涇州遷鄜延路副都揔管改涇原兼經略安撫使元昊冦鎮戎軍賊引兵僞遁懐敏遂率諸將趣定川環慶路都監劉賀以蕃兵五千與賊戰不勝而潰懐敏入保定川砦涇原鈐轄曹英又敗於砦之東北隅懐敏所部人奔駭懐敏爲衆所擁幾蹂踐死輿至甕城乃蘇賊遂圍城懐敏與諸將謀赴鎮戎軍賊斷其歸路與諸將皆遇害賊遂長驅直抵渭州初懐敏之除鄜延也范仲淹言其怯懦不知兵遂徙涇原卒敗事奏至贈鎮西軍節度使諡曰忠隱馮守信字中孚滑州白馬人也太平興國初應募軍籍從征太原先登斬獲甚衆至眞宗時以軍功遷至天武都虞候從幸大名遷御龍直都虞候又從眞宗北廵次衛南頓眞宗問曰契丹入邊汝輩何以展效守信曰臣等備宿衛常願必死今乃上勞大駕親征將帥之過也眞宗嘉其忠授天武軍都指揮使累遷萊州團練使守信雖起行伍然本田家子頗知民間疾苦爲政無害徙滄州未幾選爲龍神衛四廂都指揮使英州防禦使出知定州徙髙陽關知瀛州河決滑州城西即命守信領州事就加歩軍副都指揮使容州觀察使領威虜軍節度使卒年六十六贈太尉諡曰勤威石普其先幽州人也自言唐河中節度使雄之後自其曽祖徙居太原父通給事太宗于晉邸普方十嵗亦留邸中補寄班祗候以督捕盜賊功轉内殿崇班帶御器械李順之亂爲西川行營先鋒與馬知節等合擊之順誅遷西京左藏庫使賊黨王鸕鷀復冦邛蜀又爲西川捉賊使因馳驛陳蜀亂之因由賦斂急廹使農民失業不能自存而遂爲盜請一切蠲其租賦太宗許之民用感恱賊平及王均據益州叛又以普爲招安使雷有終攻城均走普追斬于富順監以功拜兾州團練使明年契丹入冦普爲先鋒殺敵騎於炎涼城又敗之于長城徙帥定州靈州失守益兵備關中又徙永興軍眞宗以普性剛愎與衆不和乃徙莫州普言軍中號令遣人馳告慮爲姦詐所誤眞宗爲製𫝊令牌又獻御戎圖掘塹設穽以陷征馬轉兾州防禦使眞宗幸澶淵是時王繼忠爲契丹請和以書遺普且置密表以請事平普亦有力焉遷容州觀察使再遷保平軍留後遂拜河西軍節度使知河陽徙許州眞宗方崇符瑞之事普請罷天下醮設嵗可省緡錢七十餘萬以贍國用遂忤意大中祥符中普言九月下旬日食者三又言商賈自泰州來言唃厮囉欲讎殺邊臣請以臣所獻地圖當決必勝眞宗怒付御史劾之法當死詔貶賀州改率府副率房州安置後稍復右武大將軍卒年七十五普有膽略聞敵所在即馳赴親冐矢石前後戰未嘗少衂通兵書及隂陽六甲星歴推步之術太宗嘗令善工製金帶普帶御器械輙面求賜太宗解以賜之後雖謫廢當太宗忌日必舉族詣佛寺齋薦嵗以爲常東都事略卷四十二
