body:
  text: 東都事略卷四十四宋王稱撰列傳二十七陳堯叟字唐夫閬州閬中人也父省華終左諫議大夫堯叟舉進士第一為光祿寺丞直史館遷祕書丞久之為工部貟外郎廣南西路轉運使其俗有疾不服藥唯禱神堯叟以集驗方刻石桂州驛舍自後始有服藥者嶺外少林木井泉堯叟為植木道傍鑿井置亭舍至今為利代還為度支判官遷樞密直學士咸平四年拜右諫議大夫同知樞密院事王繼英為樞密使以堯叟僉書樞密院事遷工部侍郎真宗幸澶淵命乘傳先赴北寨按視戎事許以便宜景德中與王欽若並知樞密院事兼羣牧使堯叟究心羣牧馬政多立條約公私便之從祀東封加尚書左丞祀汾隂加户部尚書與欽若並同平章事為樞密使與欽若同罷明年復與欽若為樞密使以疾出為右僕射知河陽疾甚求還京師卒年五十七贈侍中諡曰文忠堯叟有材用多智術久典機密軍馬之籍皆記之母馮氏性嚴毅堯叟事親孝謹未嘗忤其意焉弟堯佐堯咨堯佐字希元舉進士纍遷太常丞知開封府録事參軍用理獄有能績遷府推官以言事切直貶通判潮州潮之惡溪鱷魚食人不可近堯佐命捕得鳴鼓于市以文告而戮之鱷魚遂息又修孔子廟作韓公祠潮人始知為學於是大臣薦其文學得直史館嘗為兩浙轉運使錢塘江隄以竹籠石而潮嚙之不數歲輒壞而復理堯佐議實薪土以易之或言其不可而丁謂執政遂徙堯佐京西又徙河北又徙河東其後隄久不成遂用薪土河決滑州捲掃不能定堯佐乃鑿木如編齒置於湍流隨水而下謂之木龍遂殺水勢而隄乃成又護以長隄郡人謂之陳公隄天禧三年編次御試進士坐誤差其第貶監鄂州茶場起知渭州徙京西轉運使入為三司副使拜知制誥遷龍圖閣直學士知河南府徙并州知開封府堯佐以謂治煩之術任威以擊強盡察以防姦譬如激水而欲其澄也故為政一以誠信而京師治拜翰林學士天聖七年除樞密副使陳詁知祥符縣以法繩吏吏悉遁去章憲明肅皇后怒事下樞密院堯佐以為罪詁則姦人得計而能吏沮矣詁遂獲免改參知政事明道三年罷知永興軍徙廬州又徙同州復知永興軍又徙鄭州官至户部侍郎吕夷簡請老仁宗問之曰卿果退以何人代卿夷簡曰知臣莫若君惟陛下擇之仁宗再三問之夷簡曰陛下欲用經綸之才臣所不知必欲圖任老成鎮撫百度周知天下之良苦無如陳堯佐者仁宗深然之景祜四年召拜同中書門下平章事堯佐既拜以唐劉蕡所對䇿進曰天下治亂自朝廷始朝廷懲勸自貴近始凡蕡之所究言者皆當今之弊此臣所欲言而陛下之所宜行且臣等職也其年冬雷地震星象數變堯佐言王隨位在臣上而病不任事程琳等位皆在下乃引漢故事以災異自責明年諫官韓琦論政事錯繆以宰相非其人卒與王隨同罷拜淮康軍節度使同平章事判鄭州以太子太師致仕居于鄭四年而卒臨終自志其墓曰有宋頴川先生堯佐字希元號知餘子年八十二不為夭官一品不為賤卿相納祿不為辱三者粗可歸息於父母棲神之域矣贈司空侍中諡曰文惠堯佐工為二韻詩人多傳之又有潮陽編野廬編遣興䇿愚丘集性儉約不事浮侈未第時同父及伯季訪華山陳摶摶謂之曰三子皆將相中子伯季所不逮也卒如其言堯咨字嘉謨舉進士第一為將作監丞通判濟州代還直史館纍擢知制誥殿試進士與劉幾道於試卷中為密號貶單州團練副使大中祥符中復知制誥出知荆南遷集賢院學士又遷龍圖閣直學士知永興軍長安地斥鹵而井泉不可食堯咨乃疏龍首渠入城而民甚利之然其性豪侈置武庫建視草堂開三門築甬道出入而又慘於用刑數以氣陵轉運使樂黃目黃目不能堪請徙它路以避之真宗以其所為不法不欲窮治也止罷學士徙鄧州復知制誥嘗為人所傾其兄堯叟乞示所犯使知陛下保全之意因詔切責之乃引謝久之復職擢知開封府除翰林學士龍圖閣學士換宿州觀察使知天雄軍堯咨固辭因自陳以儒臣而易武守所惜者腰無金魚耳仁宗特命佩魚以示優恩改武勝軍留後拜武信軍節度使知澶州復知天雄軍卒年六十五贈太尉諡曰康靖堯咨善射知荆南時母馮氏問曰古人居一郡一邑必有異政汝典郡有何治效堯咨曰荆南當衝要郊勞宴餞殆無虗日然稍精於射衆無不服馮氏曰汝父訓汝以忠孝俾輔國家今不務仁政善化而專卒伍一夫之技豈汝先人之意邪杖而擊之著治本十六篇渚宫上下編與兄堯叟堯佐同時貴顯本朝最為盛云趙安仁字樂道河南洛陽人也生而頴悟年十三通經傳舉進士獻所為文章召試翰林以為著作佐郎直集賢院真宗即位拜右正言真宗巡師于大名安仁上疏以為當今有急務者三大要者五激勵武臣舉勸懲之令振救邊民行優恤之惠車駕還京重神武之威此三者急務也所謂大要者五則選將略恃兵勢求軍謀修軍政愛民力真宗嘉之遷知制誥景德初為翰林學士從幸澶淵契丹請和命學士各進報書真宗獨用安仁所撰亦以其能備記太祖朝書問規式因獲與聞通好之議敵使至首命安仁接伴其辭見儀制皆所裁定敵使姚東之談次頗矜兵強戰勝安仁曰聞君多識前言老氏云佳兵者不祥之器聖人不得已而用之勝而不美而美之者是樂殺人樂殺人者不得志於天下東之自是不敢復談安仁敏於酬酢切中事機類如此時論以為得體拜右諫議大夫參知政事大中祥符初議封禪與王欽若並為泰山經度制置使判兖州禮成拜工部侍郎五年罷知禮儀院兼宗正卿請依唐故事置修玉牒官奏以劉筠楊億夏竦宋綬為之又為仙源積慶圖皆統類精簡遷尚書右丞改御史中丞請給御寶印歷三院御史彈糾事又請修國朝六典並從之卒年六十贈吏部尚書諡曰文定安仁善議論好誘後進學士大夫以清德宗之有同學宋元輿者篤學而早卒安仁力周其後善訓諸子各授以一經居宗族以雍睦稱雖家人未嘗見其喜愠操履純正外晦內明寬恕謙退無事浮飾有所獻納必焚藁致身貴顯無改儉素尤練典故近世衣冠人物制度悉能記之子良規尚寬尚寬見循吏傳良規字元甫以安仁奏為祕書省正字宰相張知白舉其才召試集賢校理稍遷太常博士兼宗正丞良規得祿賜多所分贍餘則盡之於酒子君錫甚孝以良規老而酒色不節棄官出入臥起隨之良規積官至工部侍郎卒年六十八君錫字無愧以父任為將作監主簿復舉進士司馬光編歷代君臣事迹辟君錫同修會丁父憂服除纍遷宗正丞同知太常禮院時近臣有請祀英宗於明堂配昊天上帝及五帝君錫與禮官建言以為非是請專配上帝以稱嚴父之意詔如君錫議遷開封府推官元祐初自太常少卿擢給事中蔡確復觀文殿學士章惇復資政殿學士君錫奏駮論其姦惡命遂格移刑部侍郎改吏部除天章閣待制樞密都承旨拜御史中丞於是諫官鄭雍姚勔謂君錫風節不立君錫遂請外除天章閣待制知鄭州紹聖初提舉明道宫時方例廢元祐舊人君錫坐落職分司南京卒年七十二陳彭年字永年撫州南城人也幼好學母惟一子愛之禁其夜讀書彭年置燈密室晝夜忘倦嘗師事徐鉉為文喜嘲詠不為宋白所善白屢知貢舉屢出之卒以進士中第調江陵府司理參軍真宗時嘗知金州上疏曰夫事有雖小而可以建大功理有雖近而可以為逺計臣請言之其事有五一曰置諫官二曰擇法吏三曰簡格令四曰省冗官五曰行公舉此五者實經世之要道致治之坦途也代還直史館修起居注遷右正言龍圖閣待制大中祥符中改龍圖閣直學士遷右諫議大夫召入翰林為學士兼龍圖閣直學士修國史彭年嘗謁王旦旦辭不見翌日見向敏中敏中以彭年所上文字示旦旦瞑目不一覽謂敏中曰是不過興建符瑞圖進取耳九年拜刑部侍郎參知政事進兵部侍郎卒于位年五十七贈右僕射諡曰文僖彭年在祥符間附王欽若丁謂朝廷典禮無不參與凡儀制沿革刑名之學皆所詳練雖談笑間屬辭不廢當時制度雖前世所未有必推引依據以成就之時政大小日有咨訪應答該辨一無凝滯真宗眷遇尤厚資性敏給博聞強記應舉時京師賜酺與同學出遊自東華門至闕前已成一賦其後雖處通顯奉飬無異貧約時所得奉唯市書籍幼而篤學老亦不倦左右給使之人有彌年不知其姓名者所著文集百卷唐紀四十卷任中正字慶之曹州濟隂人也少舉進士為池州推官遷大理評事通判邵州改濮州翰林學士錢若水嘗薦其才遷著作佐郎通判大名府遷江南轉運副使真宗即位擢監察御史徙兩浙轉運使民飢中正發官廪以振之代還知并州纍遷兵部貟外郎直史館河北轉運使拜樞密直學士知益州代張詠在郡五載遵詠條教人用便之又知并州權知開封府拜工部侍郎樞密副使改同知院事又改副使進兵部侍郎參知政事仁宗為皇太子以尚書左丞兼賔客仁宗即位遷兵部尚書中正與丁謂善謂敗中正力營救之謂既竄而中正亦降太子賔客知鄆州徙曹州復禮部尚書丁母憂哀毁而卒年六十六贈左僕射諡曰康懿中正沉厚以孝稱於鄉里事親敬衣服簡質而飲食極於豐美弟中師中師字祖聖舉進士積官至殿中丞張知白薦其才拜右正言丁謂敗坐兄纍降太常博士監宿州酒稅復通判應天府纍擢右諫議大夫以樞密直學士知益州先是轉運使急於課利稅及薪芻蔬果之屬中師奏蠲之慶歷初任布守河陽數上書論事仁宗欲用之中師素見知於吕夷簡謂中師才不在布下遂並召為樞密副使以禮部侍郎資政殿學士知永興軍徙陳州上書自言老臣家曹州願守鄉郡以營休老之計仁宗許之踰月請老以太子少傅致仕卒年七十七贈太子太保諡曰安惠中師性樂易家素饒財雖處通顯自奉甚約仁宗數賜飛白書及歸休於里中建御書閣鄉人榮之周起字萬卿淄州鄒平人也母得吉夢而生起父異之謂其必大其門因名之曰起舉進士為將作監丞通判齊州召還直史館纍擢知制誥真宗東封還自泰山羣臣多獻文章以頌德起獨上書言天下之勢常患恬於安逸而忽於兢業願陛下毋以告成為恃真宗嘉之起素患貢舉之弊因建議糊名以革之至今為著令遷樞密直學士知開封府聽斷明審庭無留事以真宗判南牙聽事之所為繼照堂自是無敢居者仁宗初降誕起方奏事真宗謂曰知朕有喜乎起曰臣不知也真宗曰朕始生子即入禁中懷出金錢賜起出知河中府又知永興移天雄軍以右諫議大夫知并州遂拜給事中同知樞密院事既而又以為禮部侍郎樞密副使真宗得疾幾不悟丁謂用事逐去冦準而以起為黨罷為户部侍郎知青州又降太常少卿知光州仁宗即位稍遷祕書監知杭州又知揚州謂得罪復禮部侍郎留守南京以疾請知頴州自頴徙陳自陳徙汝卒年五十八贈禮部尚書諡曰安惠東都事略卷四十四
