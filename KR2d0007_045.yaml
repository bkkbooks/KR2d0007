body:
  text: 東都事略卷四十五宋王稱撰列傳二十八張詠字復之濮州鄄城人也舉進士知崇陽縣又知浚儀縣稍遷太常博士為荆湖北路轉運使入覲除虞部郎中授樞密直學士同知銀臺封駮司張永德為并州帥有小校犯法笞之至死詔按其罪詠封還詔書且言陛下方委永德邊任若以一部校故摧辱主帥臣恐下陵上自此始太宗不從未幾果有營卒脅訴軍校者詠復引前事為言太宗乃改容勞之出知成都府時李順亂後冦掠之際民多脅從詠移文諭以朝廷恩信使各歸田里詠曰前日李順脅民為賊今日吾化賊為民不亦可乎後廣武卒劉旰謀作亂掠懷安破漢州及永康軍蜀州招安使上官正頓師不進詠以言激正勉其親行仍盛為供帳餞之酒酣舉爵謂將校曰爾曹受國厚恩此行當直抵冦壘平蕩醜類若曠日持久此地即爾死所矣正懼由是遂取勝時民間訛言有白頭翁午後食人男女郡縣譊譊至暮路無行人既而得倡為訛言者戮之于市即日帖然詠曰妖訛之興沴氣乘之妖則有形訛則有聲止訛之術在乎識斷不在乎厭勝其為政恩威並用蜀民畏而愛之初蜀士知向學而不樂仕宦詠察郡人張及李畋張逵者皆有學行為鄉里所服遂延奬加禮敦勉就舉而三人者悉登科於是蜀之學者知勸文風日振詠在蜀采訪民間事悉得其實嘗曰詢君子得君子詢小人得小人各就其黨詢之則事無不審矣入拜給事中為御史中丞以工部侍郎出知杭州遇嵗歉民私鬻鹽者輒寬之使獲安濟有與其姊壻訟家財者壻言婦翁疾篤子才三嵗遺書明言異日資産以什之三付子餘七與壻詠曰汝婦翁智人也以子幼託汝茍以七與子則子死汝手矣命以七給其子餘三給壻時皆服其明決知永興軍真宗以詠在蜀治行優異復命知益州仍加刑部侍郎真宗遣使傳諭曰得卿治蜀朕無西顧憂歸朝求知頴州真宗乃命知升州州率火災詠廉知民之不逞者為之懲以峻刑其患遂息轉工部尚書進禮部詠自金陵造朝以腦瘍未見詠恨不得面陳所懷乃抗論言近年虛國家帑藏竭生民膏血以奉無用之土木者皆賊臣丁謂王欽若啓上侈心之所為也不誅死無以謝天下章三上出知陳州初詠與青州傅霖少同學霖隱不仕詠既中第致位光顯散遣親密四方求霖者三十年不可得詠守陳一日霖來謁閽吏走白詠詠責吏曰傅先生天下賢士吾尚不得而友汝何人敢姓名乎霖笑曰别子一世尚爾邪是豈知世間有傅霖者乎詠且問昔何隱今何出霖曰子將去矣來報子爾詠曰詠亦自知之霖曰知復何言翌日而去後一月而詠卒年七十贈右僕射諡曰忠定詠剛方尚氣嘗有士人遊宦逺郡不能制其僕詠假以出郊斷其首而還又有小吏忤詠械其頸吏恚曰吏罪不至斬詠怒其悖即斬之少學擊劒好為大言喜事竒節嘗謂其友人曰張詠幸生明時言典墳以自律不爾則為何人邪則為何人邪故其言曰事君者廉不言貧勤不言苦忠不言已效公不言已能斯可以事君矣詠卞急不喜人拜有拜之者則連拜不已或倨坐忿罵嘗自號乖崖公以為乖則違衆崖不利物云馬亮字叔明其先茂陵人也自其祖韜徙居廬州遂為合淝人舉進士久除外官亮有治劇才太宗初置提點刑獄官亮領福建治獄察寃多所全活就除知福州蘇易簡薦其才召還同提點三司久之出知饒州州豪白氏多持吏短長嘗殺人會赦得原益橫甚亮發其姦而誅之郡中肅然改殿中侍御史真宗即位亮言陛下初即政軍賜宜速而所在不時給請遣使分督之又州郡逋負至多赦書雖為蠲除而有司趣責如故非所以宣布恩澤也國朝故事以親王尹開封地勢尊重疑隙易生非保親全愛之道契丹仍嵗內侵河朔蕭然請修好以息邊民凡四事後皆施用之咸平初命往京西河東二道放積欠奏除者數百萬使還拜三司磨勘司王均反以為西川轉運使賊平主將誅戮不已亮救免者千數及械送詿誤者僅九十人至京師知樞密院周瑩欲盡誅之亮言脅從者衆此特百之一二若不貸之恐益危懼貽朝廷憂從之加直史館復還部奏除廢井鹽逋二百餘萬代還知潭州久之入為御史中丞請父祖未葬者不許析居以厚風教明年以兵部侍郎知廬州徙江寧府告老以太子少傅致仕卒年七十三贈右僕射諡忠肅薛映字景陽唐中書令元超八世孫也後徙居于蜀父允中仕孟氏為給事中還朝為都官郎中映舉進士為大理評事通判綿州稍遷殿中丞為監察御史知開封縣太宗召對顧謂左右曰薛映賢士也除江南轉運使遷直史館為京東河東轉運使請郡知相州真宗即位以吏部貟外郎復為京東轉運使遷禮部郎中知制誥景德初以右諫議大夫知杭州映臨政敏鋭庭無留事居五年入知通進銀臺司真宗東封為東京留守判官遷給事中出知河南府以樞密直學士知升州徙揚州進刑部侍郎建言升州官有牛賦民出租牛死租不得蠲真宗覽奏矍然曰有是哉此豈朝廷所知邪悉蠲之天禧初知并州入判集賢院改尚書右丞知永興軍拜工部尚書御史中丞加禮部尚書又遷刑部為集賢院學士知曹州頃之分司南京卒年七十四贈右僕射諡曰文恭映好學該博典藩府其治嚴明吏不能欺每五鼓冠帶黎明據案決事寒暑無一日異云凌䇿字子竒宣州人也世給事州縣策幼孤獨勵志好學舉進士起家為廣安軍判官換西川節度推官又僉書兩使判官代還通判定州李順之亂朝廷擇官于川峽策自陳嘗三蒞蜀矣雖逺不敢憚乃命知蜀州徙綿州又知揚州王旦言策蒞事強濟乃以為江南轉運使召拜右諫議大夫集賢院學士知益州初策登第夢人以六印加劒遺之其後官劒外者凡六人以為異策處事精審所至有治迹入知通進銀臺司真宗嘗言策有才用治蜀敏而有斷拜給事中御史中丞以疾罷為工部侍郎卒年六十二李及字幼幾鄭州人也舉進士冦準薦其才擢知興化軍通判曹州州有趙諫者素交通權貴而持郡短長縱為姦利及既受命而諫適至京師求見及及拒之乃慢罵而去因誣及嘗訕毁朝政會有上書發諫事者命轉運使與及察其狀盡疏前後所為以聞下御史鞫之斬于都市及由是知名稍遷至户部副使出為淮南轉運使改知秦州議者以及謹厚非守邊之才也及至秦州州之將吏亦頗易之會有禁卒白晝掣婦人叉金於市吏執以聞及方坐觀書召之使前略加詰問其人服罪及亟命斬之復觀書如故於是將吏皆驚服遷樞密直學士入判吏部銓出知杭州于時內侍江德元居中用事其弟德明奉使過杭及待之薄僚佐驚曰江使者兄弟榮枯大臣如反掌耳今公不加禮待之公雖不求福獨不畏其為禍乎及曰待之如是足矣既而德明謂僚佐曰李公春秋髙何不求間郡以自處而居杭繁劇之地邪僚佐走語及曰果然江使者之言可懼也及笑曰及老矣誠得間郡以自逸庸何傷既而德明亦不能傷也時人重其操守及資性清介治尚簡嚴喜慰薦下吏而樂道人之善忌杭風俗輕靡未嘗事宴遊一日微雪遽出郊衆謂當命賔朋為髙會乃獨造林逋清談至暮而歸在杭未嘗市物惟置白樂天一集而已徙知應天府遷工部侍郎知鄆州又徙河南召拜御史中丞卒年七十贈禮部尚書諡曰恭惠臣稱曰治民之術貴乎剛柔適中而已矣剛則民怨而不服柔則民肆而難制剛足以制其肆而不起其怨柔足以收其怨而不致於肆者自非因時乘理之君子其何以能之哉以詠之明決亮之開濟映之果敢策之敏鋭及之沉毅施于有政號為稱職而皆得剛柔之中有益於治求諸漢世其韓延壽尹翁歸之流近之矣東都事略卷四十五
