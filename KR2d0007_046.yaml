body:
  text: 東都事略卷四十六宋王稱撰列傳二十九邢昺字叔明曹州濟隂人也應九經廷試日召至外殿講師比二卦又取其羣經發題太宗嘉其精博擢上第授大理評事知泰州鹽城監召為國子監丞專講學之任出知儀州代還為諸王府侍講真宗即位遷司勳郎中知審刑院改右諫議大夫國子祭酒真宗始置翰林侍讀學士首以命昺詔令與杜鎬孫奭等校定周禮儀禮公羊榖梁春秋論語爾雅義疏初置講論之職即於便坐令昺講左氏春秋昺侍真宗嘗講說孝經禮記者二論語者十書十三易二詩左氏各一據傳疏敷引之多及時事為喻真宗甚嘉奬之遷工部侍郎兼祭酒四年以疾拜工部尚書知曹州真宗東封進禮部尚書昺曉播殖尤悉民事真宗每雨雪不時憂形於色昺因進耒耜嵗占三卷皆田父嵗月於畎畝間揣占得雨澤豐凶之兆無不稽驗又言民之災患大者有四一曰人疫二曰旱三曰水四曰牛瘴必嵗有其一但或輕或重耳四事之害旱暵為甚也真宗然之真宗晚年多召於禁寢從容延對忽一日見昺衰甚即掩袂泫然曰宫邸舊僚淪謝殆盡存者惟卿爾昺既病將易簀真宗臨問昺拖紳整巾歷叙遭遇真宗為之流涕卒年七十九真宗臨其喪哭之舊制非宗室將相無省疾臨喪者蓋優禮也贈左僕射杜鎬字文周常州無錫人也少好學初應舉將試有鼠銜孝經疏置榻前鎬怪之取以熟誦果試題出其中遂與選鎬既博學又有記問兄為法官有毁其父之畫象為近親所訟疑不能決鎬曰僧道毁佛老象此可比也兄從之衆服其審南唐時舉明經為集賢校理江南平授千乘簿改國子監丞崇文院檢討將南郊彗星見宰相趙普問鎬鎬曰當祭而日食猶廢祭況彗見如此乎普言于太祖而罷其禮翌日遷著作佐郎纍遷虞部貟外郎太宗問西漢賜豫多用黃金而近代不能何也鎬曰當漢時佛事未興故金甚賤太宗以為然真宗即位有司舉故事上已金明池習水戰真宗以太宗忌月問鎬鎬據唐憲宗朝奏議禮有忌日無忌月遂從之景德初置龍圖閣待制首以鎬為之真宗幸澶淵凱旋遇懿德皇后忌日疑軍中鼓吹馳騎問鎬鎬對曰武王載木主伐紂前歌後舞可據也王欽若勸真宗為祥瑞以鎮服四夷真宗疑焉因問鎬河出圖洛出書果何事鎬遽對曰此聖人以神道設教耳真宗意遂決議者謂祥瑞事啓自欽若而成於鎬云真宗凡得古器異書必詢之皆能究其本末令人檢閲必其事在某書幾紙幾行未嘗少忘鎬雖春秋髙四鼓起誦春秋遲明已數卷日以為常久之除龍圖閣直學士積官至禮部侍郎卒年七十六子渥孫杞杞字偉長以鎬䕃補將作監主簿纍遷太子中允知建陽縣除無名租萬計閩人有老而生子者父兄以其分資多不飬之杞上書立保伍以相伺察由是稍絶其弊性豪邁遇事敢為稍遷至度支判官虞部貟外郎京西轉運使廣西歐希範誘白崖山酋豪蒙趕反希範環州人也嘗舉進士應募討安化州蠻因求録用事下宜州知宜州馮伸己言其妄遂送全州編管既而遁歸與其族百餘人謀舉兵殺伸已以叛乃殺牛建壇場祭天神推蒙趕為帝而自為神武帝國令公破環州以攻桂管朝廷授杞刑部貟外郎直集賢院為廣西路轉運安撫使杞至宜州得州人吳香及獄囚區世宏往說其酋豪杞乘其怠而擊之攻破白崖等寨及其五峒斬首千餘級復環州焚其山林積聚蒙趕等大恐隨香出降獨希範走荔枝峒杞曰蠻依險阻如捕猩猱而吾兵苦暑難久是進退遲速皆不可為故當務捐厚利以招之蓋威不足以制則恩不能以懷此其所以數叛也今吾兵雖幸勝然蠻特叛而來矣豈真降者邪若啖以利後必復動乃給牛酒為大㑹環州戮之坐中者凡六百餘人後三日兵破荔枝峒擒希範至并戮而醢之以醢賜諸溪洞於是御史梅摯言杞殺降仁宗置而不問徙兩浙路轉運使明年徙河北頃之擢天章閣待制知慶州蕃酋孟香率千餘衆內附夏人以兵索香因劫邊户掠馬牛有詔責杞還之杞言彼違誓舉兵香不可與因移檄夏人不償所掠則香亦不可得既而兵亦解去未幾杞卒杞博覽彊記通隂陽術自推其數曰吾年四十六死矣卒如其言朝迥字明逺澶州清豐人也自其父儉始徙家彭門迥少從學于王禹稱舉進士為大理評事稍遷太常丞真宗在東宫諭德楊礪稱其學行及即位宰相吕端李沆又薦之擢右正言直史館吕蒙正舉應賢良方正科以迥方為諫官乃報罷召試翰林遷右司諫擢知制誥雍王元份留守京師除右諫議大夫為判官遷翰林學士同修國史進承旨時朝廷方修禮文之事每下詔多出迥手請解禁林以為工部尚書集賢院學士判西京留司御史臺遷禮部尚書以太子少保致仕召燕太清樓仁宗寵遇甚渥其子宗慤知制誥亦與人以為榮進太子少傅召對延和殿仁宗問洪範雨暘之應對曰比年災變仍發此天所以警陛下願陛下修飭王事以當天心庶幾轉亂而為祥也迥感疾絶人事屏醫藥具冠服而卒年八十四贈太子太保諡曰文元迥善吐納飬生之術通釋老書以經史傳致精意為一家之說性樂易純固服道甚篤歷官臨事未嘗挾情害人真宗稱迥為好學長者楊億嘗謂迥所作書命無過褒而得代言之體平生不喜術數之說而術者嘗以三命語之迥曰自然之分天命也樂天不憂知命也推理安常委命也何必逆計未然乎所著有翰林集三十卷道院集十五卷其它著述又數十卷子宗慤宗慤字世長以父任為祕書郎獻所為文章召試舍人院除校勘纍遷祠部貟外郎知制誥入翰林為學士兼龍圖閣學士知開封府康定元年拜右諫議大夫參知政事㑹朝廷以金飾胡床及金器賜唃厮羅宗慤言昔仲叔于奚辭邑而請繁纓孔子以為不如多與之邑繁纓諸侯之馬飾聖人以為不可輕與陪臣乘輿之器可賜外臣乎必欲優其禮加賜金帛可也慶歷二年以疾免除資政殿學士給事中未幾而卒年五十八贈工部尚書諡曰文莊宗慤性敦厚事父母至孝篤於故舊凡任子恩皆先其族人當制甚愜人望有文集四十卷孫奭字宗古博平人也幼好學徙居鄆之項城舉九經及第為莒縣簿改大理評事為國子監直講太宗幸國子監奭講尚書說命太宗甚恱真宗即位為諸王府直講校正九經正義除龍圖閣待制奭以經術進未嘗阿附取恱真宗嘗問以天書奭曰臣愚所聞天何言哉豈有書也真宗知其忠每容之真宗命向敏中諭奭令陳朝廷得失奭上納諫恕直輕徭薄斂四事真宗頗施用其言及將祀汾隂奭上疏曰夫汾隂后土事不經見昔漢武帝將行封禪大禮欲優游其事故先封中嶽祀汾隂始巡幸郡縣侵尋于泰山今陛下既已東封亟議西幸臣竊以為不可又周禮圜丘方澤所以郊祀天地於南北郊漢初承秦惟立五畤以祀天后土無祀故武帝立祠于汾隂自元成以來從公卿之議徙汾隂后土于北郊後之王者多不祀汾隂陛下乃欲捨北郊而祀汾隂乎唐以河東為王業所起之地故明皇幸河東因祀后土與本朝事異也比年以來水旱相繼陛下宜側身修德以答天譴豈宜徇姦回逺勞民庶忘社禝之大計而事簫鼓之盤游夫民神之主也是以先王先成民而後致力于神今水旱作沴饑饉洊臻乃欲勞民事神神其享之乎臣觀陛下必行此禮不過如漢武帝唐明皇刻石頌功而已此虛名也陛下天縱欽明神資濬哲固當追蹤三五豈可效此虛名乎而議者不過引開元故事以為盛烈乃欲倡導陛下而為之臣愚竊所不取願少賜清閒以畢其說真宗遣內侍諭以若復有陳具奏奭又上疏曰陛下將幸汾隂而京師民心弗寧江淮之衆困于調發且土木之功未息而奪攘之盜必興昔黃巢出自凶饑陳勝起于徭戍隋煬帝勤逺略而唐由是開基晉少帝昧邊防而耶律德光以之謀夏今陛下俯從姦佞逺棄京師罔念民疲不虞邊患涉仍嵗荐饑之地修違經久廢之祠又安知飢民之中無黃巢之劇賊乎役徒之內無陳勝之大志乎肘腋之下無英雄之窺伺乎寰區之間無夷狄之觀釁乎陛下方祠后土駐蹕河中若敵猖狂忽及澶淵陛下將何以待之臣竊見奸臣以先帝寅畏天災詔停封䄠故贊陛下力行東封以為繼成先志也先帝欲北平幽朔西取繼遷大勳未集用付陛下則未嘗獻一謀畫一策以佐陛下繼先帝之志而乃卑詞重幣求和于契丹蹙國縻爵姑息於保吉謂主辱臣死為空言以誣下罔上為己任而陛下信其諛言輕勞聖駕是陛下以祖宗艱難之業為佞邪僥幸之資臣所以長歎而痛哭也是時羣臣爭言祥瑞奭又上疏曰五載巡狩虞書常典觀民設教羲易明文何須紫氣黃雲始能封嶽嘉禾異草然後省方今乃野鵰山鹿並形奏簡秋旱冬雷率皆稱賀將以欺上天則天不可欺將以愚下民則民不可愚將以惑後世則後世不可惑疏入不報㑹將幸亳州祠太清宫奭又上疏曰臣觀陛下多效明皇所為且明皇非令德之君觀其禍敗足為深戒而陛下反希慕之近臣知而不諫豈非奸佞乎方今外議籍籍以陛下將幸亳州臣願陛下鑒明皇之禍敗不襲危亂之迹豈特天下之幸實亦社稷之福也真宗為著解疑論以示羣臣奭以父老求典郡出知密州居二年遷糾察在京刑獄時立天慶先天降聖節而天下設齊醮奭又請裁省浮用不報出知河陽及朱能獻乾祐天書奭復上疏曰昔漢文成將軍以帛書飯牛陽言牛腹中有竒書殺視得書天子識其手迹斬之後有五利將軍妄自言多方不讎坐誅漢武以能誅文成五利前史謂之雄材先帝時有侯莫陳利用者始以方術暴得寵用一旦發其奸誅于鄭州至今輿誦謂之英斷唐明皇得靈寶符上清護國經寶劵等皆王鉷田同秀等所為明皇不能顯誅訹于邪說曲奉鬼神過崇妖妄今日見老子閣上明日見老子山中大臣尸祿以將迎端士畏威而緘默既惑左道即紊正經民心用離沒不復振暨祿山兆亂輔國劫遷老子寧肯禦兵寶符安能排難身危名辱為千古所笑今朱能所為頗類王鉷等臣願陛下逺思漢武之雄材近法先帝之英斷中鑒明皇之召禍庶幾災害不生禍亂不作享萬世無疆之休入為給事中以父年髙乞侍養得知兖州召還為翰林侍讀學士父喪去官詔起復兼龍圖閣學士每講論上前至前世亂君亡國之際志在規諷必反復言之嘗畫無逸圖以進請設便坐初五郊從祀不設席尊不施羃七祠時饗飲福一尊不設三登升歌不雍徹冬至攝祀昊天上帝外級止十位饗先農在祈榖之前上丁釋奠無三獻宗廟不備二舞奭皆援古奏正之又以為六天者名有六其實一帝冬至請罷祠五帝大雩設五帝而罷祠昊天上帝事下有司議不同而止以老請致仕復知兖州拜禮部尚書以太子少傅致仕疾甚徙正寢屏侍妾曰無令我死婦人之手卒年七十二贈左僕射諡曰宣奭性方重事親至篤孝父亡䑛其面以代頮嘗剟五經切于治道者為經典徽言五十卷又撰崇祀録樂記圖五經節解五服法度子瑜官至天章閣待制馮元字道宗三世仕嶺南為日官劉鋹入朝為保章正元少好學崔頥正孫奭授以五經大義舉進士為江隂尉㑹詔擇明經補學官自陳通五經謝泌領銓管詰之曰古者治一經或至皓首子能盡通之耶對曰達者一以貫之泌喜其對因問以疑義隨輒辨析遂以為國子監直講真宗召元講易泰卦元因推君道至尊臣道至卑而能上下交感所以輔相天地裁成萬物也真宗恱除直龍圖閣直閣官名蓋始此也仁宗為皇太子擢右諭德及即位遷龍圖閣直學士兼侍講判國子監故事國子監必宿儒典領元與孫奭並命輿議大服未幾為龍圖閣學士修三朝正史遂入翰林為學士護葬章懿皇后于洪福院及葬永定陵發壙中有水罷知揚州宰相王曾為言元東宫舊臣不宜以細故棄外即召為翰林學士侍讀遷户部侍郎卒年六十三贈户部尚書諡曰章靖元性簡重非慶弔未嘗通謁公卿執親喪自括髮至祥練皆按禮變服多識古今臺閣品式之事所學長於易嘗患先儒多失揚雄太𤣥之旨獨唐王圭注為稍近為釋文一篇欲因王說補正之然亦不能就也臣稱曰邢昺杜鎬朝迥孫奭馮元皆惇儒碩德橫經講道發明古訓使人主問學之益融光顯著宅天下而被四海者皆其輔成之效也鎬對上一言遂成祥瑞之事然鎬非求恱者也特思之有未至爾奭徑正挺特忠言剴切賢矣哉東都事略卷四十六
