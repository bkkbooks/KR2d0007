body:
  text: 東都事略卷四十八宋王稱撰列傳三十一曾致堯字正臣撫州南豐人也舉進士稍遷祕書丞爲兩浙轉運使諫議大夫魏庠知蘇州介舊恩以進致堯劾其罪太宗曰是敢治魏庠可畏也徙知壽州再遷主客貟外郎爲三司鹽鐵判官是時李繼捧以銀夏五州來歸其弟繼遷亡入磧中爲冦太宗遂遣繼捧往招之至則誘其兄以隂合卒復圖而囚之自陜以西既苦兵矣眞宗初即位欲以恩徳來之許還其地使聽約束致堯以謂繼遷反覆不可予繼遷已得五州後二年果叛圍靈武眞宗知其才欲以爲知制誥召試矣而宰相李沆不可乃出爲京西轉運使徙知壽州西鄙兵久不解命張齊賢爲經略使以致堯爲判官仍遷秩賜以金紫致堯因抗疏自陳願不受章紱之賜詔御史鞫其罪黜爲黄州團練副使知泰泉蘇揚鄂五州坐知揚州日誤添月奉貶監江寜府酒稅卒年六十六致堯性剛率喜言事前後屢上章疏詞多激訐好纂録所著有仙鳧羽翼三十卷廣中台志八十卷清邊前要西陲要記十卷爲臣要記十五篇孫鞏布肈布宰相自有傳鞏字子固生而警敏年十二能文及冠游太學歐陽脩見其文而竒之自是名聞天下舉進士調太平州司法參軍召入編修史館書籍遷館閣校勘集賢校理爲英宗實録檢討官通判越州歷知齊襄洪福明亳滄州進職直龍圖閣鞏爲治尚威嚴其徙滄州也過闕神宗召見勞問甚寵遂留判三班院鞏上疏議經費曰宋興承五代之弊六聖相繼與民休息故生齒既庶而財用有餘且以景徳皇祐治平校之景徳户七百三十萬墾田一百七十萬頃皇祐户一千九萬墾田二百二十五萬頃治平户一千二百七十萬墾田四百三十萬頃天下歳入皇祐治平皆一億萬以上歳費亦一億萬以上景徳官一萬餘貟皇祐二萬餘貟治平并職幕官州縣官三千三百餘貟緫二萬四千貟景徳郊費六百萬皇祐一千二百萬治平一千三百萬以二者校之官衆一倍於景徳郊之費亦一倍於景徳官之數不同如此則皇祐治平入官之門多於景徳也郊之費不同如此則皇祐治平用財之端多於景徳也誠詔有司案尋載籍而講求其故使官之數入者之多門可攷而知而郊之費用財之多端可攷而知然後各議其可罷者罷之可損者損之使天下之入如皇祐治平之盛而天下之用官之數郊之費皆同於景徳二者所省蓋半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行以歳入一億萬以上計之所省者什之一則歳有餘財一萬萬馴致不已至於所省者什之三則歳有餘財三萬萬以三十年通計之當有餘財九億萬可以爲十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每歳之入存什之三耳蓋約而言之也今臣之所陳亦約而言之其數不能盡同然要其致必不逺也前世於彫敝之時尤能易貧而爲富今吾以全盛之世用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下沖靜質約天性自然乗輿服器尚方所造未嘗用一竒巧嬪嬙左右掖庭之間位號多闕躬履節儉爲天下先所以憂閔元元更張庶事之意誠至惻怛格于上下其於明法度以養天下之財又非陛下之所難也已而再上議曰陛下謂臣所言以節用爲理財之要世之言理財者未有及此也今付之中書臣待罪三班案國初承舊以供奉官左右班殿直爲三班立都知行首領之又有殿前承旨班院别立行首領之端拱已後分東西供奉又置左右侍禁及承旨借職皆領于三班三班之稱亦不改三班吏貟止於三百或不及之至天禧之間乃緫四千二百有餘至于今乃緫一萬六千六百九十宗室又八百七十蓋景徳貟數已十倍於初而以今攷之殆三倍於景徳略以三年出入之籍較之熈寜八年入籍者四百八十有七九年五百四十有四十年六百九十而死亡退免出籍者歳不過二百人或不及之則是歳歳有増未見其止也臣又略攷其入官之繇條於别記以聞議其可罷者罷之可損者損之惟陛下之所擇臣之所知者三班也吏部東西審官與天下他費尚必有近於此者惟陛下試加攷察以類求之使天下歳入億萬而所省者什三計三十年之通當有十五年之蓄夫財用天下之本也使國家富盛如此則何求而不得何爲而不成也哉神宗頗嘉納之久之手詔中書曰五朝史事宜付曾鞏遂以爲史館修撰試中書舍人遭母憂卒年六十五鞏少孤奉母孝鞠飬羣弟妹甚友愛宦學婚嫁一出鞏力平生耆書家藏至二萬餘卷手自讎對雖白首不倦又集古今篆刻爲金石録五百餘卷有文集曰元豐類藁五十卷外集十卷所爲文章開闔馳騁應用不窮然言近指逺要其歸必止於仁義初與王安石友善安石稱其文辭以譬水之江漢星之斗神宗嘗問鞏卿與王安石最密安石何如人鞏曰安石文學行誼不減揚雄以吝故不及神宗遽曰安石輕富貴不吝也鞏曰臣謂吝者安石勇於有爲而吝於改過耳神宗頷之吕公著嘗告神宗以鞏爲人行義不如政事政事不如文章鞏以此不大用云肈字子開舉進士調黄岩簿稍遷國史院編修官進吏部郎中又遷右司郎中元祐初擢起居舍人拜中書舍人實録院修撰太皇太后受冊遵章獻明肅皇后故事御文徳殿肈言天聖二年兩制定議皇太后受冊於崇政殿仁宗特詔有司改文徳殿蓋人主一時之制今皇帝述仁宗故事以極崇奉之禮孝敬之誠可謂至矣臣切謂太皇太后當於此時特下明詔揚皇帝孝敬之誠而固執謙徳屈從天聖兩制之議止於崇政殿受冊則皇帝之孝愈顯太皇太后之徳愈尊兩誼俱得顧不美與詔如其言蔡確謫新州中書舍人彭汝礪草制不奉詔而諫官言汝礪實肈使之時肈已除給事中固辭請外以寳文閣待制知潁州徙陳州又徙應天府入爲吏部侍郎論南郊旣去皇地祇位而議者欲夏至遣冡宰攝事則不復有親祭地祇之時於事天則躬行事地則遣官非王者父天母地之義又議明堂配帝請復設五帝與昊天上帝並祀徙刑部侍郎出知徐州數月徙江寜府紹聖初知瀛州時元祐士大夫皆流竄嶺表最後謫前史官范祖禹等以實録譏訕爲罪而肈以嘗與修降集賢院修撰知滁州歳滿知泰州又徙海州徽宗即位復爲中書舍人上疏言治道在廣言路以言奬人猶或畏縮以言罪人人將鉗口去矣㑹日食四月朔故事當降詔求直言徽宗命肈草詔詔下投匭者日千百人元祐士大夫再以赦恩甄叙或復舊職典方面肈奏生者䝉恩矣死者未被聖澤也請如冦準曹利用故事撿㑹臣僚貶死未經叙復者還其所奪官職遷翰林學士兼侍讀諫官陳瓘以言東朝與政被謫肈即上書以爲瓘昨者所論臣雖不知其詳以詔旨觀之瓘言雖狂其意則忠何則瓘以疎逺小臣妄意宫闈之事披冩腹心無所顧避此臣所謂狂也皇太后有援立明聖不世之大功有前期歸政過人之盛徳萬一有纎毫可以指議則於清躬不爲無累瓘以憂君之誠陳預防之戒欲以開悟聖心保全盛美忘身爲國臣子所難此臣所謂忠也以臣愚計皇帝以瓘所言爲狂而逐之皇太后以天地之量察瓘之忠特下手詔而留之則兩誼俱得矣兄布拜相以親嫌除龍圖閣學士提舉中太一宫出知陳州歴太原府南京揚州定州元祐士大夫再被降黜肈請與俱貶言者繼之遂落職謫知和州徙知岳州貶濮州團綀副使汀州安置移台州卒年六十二梅詢字昌言宣州宣城人也舉進士爲利豐監判官知仁和縣咸平三年與考進士於崇政殿眞宗過殿廬中一見詢偉然以爲竒召試中書直集賢院是時契丹數侵河北李繼遷急攻靈州眞宗銳於爲治詢上書請以朔方授潘羅支使自攻取是謂以蠻夷攻蠻夷眞宗然其言問誰可使羅支者詢自請行眞宗惜之不欲使蹈兵間詢曰茍活靈州而罷西兵何惜一梅詢眞宗壯其言因遣使羅支未至靈州没于賊召還爲三司户部判官於是屢言西邊事眞宗益器其材欲以知制誥宰相李沆以其躁競不可乃已其後繼遷卒爲潘羅支所困而朝廷以兩鎮授徳明徳明頓首謝罪河西平眞宗亦幸澶淵盟契丹而河北之兵亦解天下無事矣詢既見疎不用流落于外幾二十年初坐斷田訟失實通判杭州嘗知蘇濠鄂楚壽陜六州又爲兩浙荆湖陜西轉運使坐事貶池州至天聖六年復直集賢院改直昭文館知荆南府召還爲龍圖閣待制以龍圖閣直學士知并州進樞密直學士遷左諫議大夫入知通進銀臺司改翰林侍讀學士爲羣牧使遷給事中出知許州卒年七十八詢素有才而好名喜進既老又病足嘗撫其足詈之曰是中有鬼不令我至兩府者汝也有所愛馬亦嘗撫其鞍曰我固命薄矣汝豈無分被繡韀邪聞者笑之堯臣詢從子也以詩知名見文藝傳臣稱曰曽致堯梅詢有應用之才而徳弗稱眞宗雅器之而李沆以爲浮薄抑而不進眞宰用心要當如是哉鞏與肈以文章被近用爲時儒宗學者仰之布雖相蓋可貶云錢昆字裕之呉越國王倧之子也隨俶歸朝諸從子皆授官獨昆與其弟易願從科舉遂登進士第累遷至三司度支判官仁宗時知廬濠泉亳梓壽許七州爲治尚寛簡官至右諫議大夫以秘書監致仕卒年七十六昆善爲詩賦又喜草𨽻有文集十卷弟易易字希白年十七舉進士御試三題日中而就言者以其輕俊而黜之太宗語蘇易簡曰朕恨不與李白同時易簡曰有錢易者李白才也太宗喜曰若然當用唐故事召至禁林㑹盜起劔南不果用復舉進士甲科爲光禄寺丞通判蘄州上疏曰國之所重莫先乎刑刑不可不本於法不本於法則黷黷則暴暴則下無所措手足矣古之肉刑者劓黥刖皆非死刑而尚以爲虐而絶之近代以來非法之刑斷截手足鉤背烙筋身見白骨而口眼猶動四肢分落而呻痛未息而謂嚴刑可戒於衆臣愚以爲非法之刑非所以助治也惟陛下除之又舉賢良方正科策入第四等除祕書丞通判信州眞宗封泰山獻殊祥録遷太常博士直集賢院眞宗祀汾隂易修車駕所過圖經轉祠部貟外郎坐事監潁州商稅歳中知開封縣眞宗幸亳州復修所過圖經遂擢知制誥遷翰林學士卒年五十九易俊逸過人爲文數千百言頃刻而就又善行草書有集一百六十卷壽雲緫録一百卷洞微志十卷子彦逺明逸彦逺字子髙以父任爲太廟齋郎大理寺丞復舉進士又舉賢良方正䇿入等由太常博士授祠部貟外郎彦逺因災異上疏曰陛下即位以來内無聲色之娯外無畋遊之樂而前歳地震今歳大旱人心嗷嗷天其或者以爲陛下備冦之術未至牧民之吏未良天下之民未安故出譴告以示陛下茍能欽天之戒増修徳業則宗廟社禝之福也古者夷狄言語衣服與中國不同其來也不過驅老弱掠畜産而已今契丹據山後諸鎭元昊盜靈武銀夏衣冠車服子女玉帛莫不如之往時元昊内冦出入五載天下騷然又納款賜命則被邊長吏不復銓擇髙冠大袍耻言軍旅一日契丹負恩乗利入塞豈特元昊之比邪又湖廣蠻獠劫掠生民調發督斂軍須百出三年于今未聞尺寸之效惟陛下念此三方之患講長久之計以荅天戒則天下幸甚遷起居舍人直集賢院卒年三十七子勰明逸字子飛亦舉賢良方正父子三人皆中制科世以爲盛由殿中丞除太常博士通判亳州召爲右正言直集賢院明逸言事希陳執中章得象之意以排杜衍范仲淹富弼由是三人者俱罷政事遂爲時論罪之進右司諫同修起居注遷知制誥翰林學士知開封府坐尹京師無威望又考獄囚凍墮足以龍圖閣學士知蔡州歷揚青鄆曹四州加端明殿學士知秦州召還經筵爲翰林學士御史言其文詞不足以備職禁林罷爲端明殿學士兼龍圖閣學士復翰林侍讀學士知永興軍代還卒年五十七贈禮部尚書諡曰修懿勰字穆父以從父明逸任試將作監主簿稍遷國子博士舉賢良方正科召試秘閣不中除知尉氏縣元豐中爲左司郎中遷中書舍人元祐初知開封府遷給事中復以龍圖閣待制知開封府以繫囚别所遷就圄空出知越州易瀛州明年爲江淮荆浙路發運使召爲工部侍郎改户部出知青州未至召拜户部尚書八年以龍圖閣直學士知開封府勰治京師有名紹聖初拜翰林學士兼侍讀鄭雍爲左丞以臺諫彈奏丐罷勰當批荅有羣邪共攻之語於是臺諫以勰爲欺誣遂罷知池州卒年六十四後入元祐籍云藻字醇老呉越王鏐五世孫也舉進士又中制科爲人清謹寡過居守繩墨爲治簡靜立朝無矯亢之節亦不爲雷同處勢利淡如也人稱其長者英宗時爲秘書挍理上書請太后還政通判秀州神宗時稍遷直舍人院同修起居注擢知制誥直學士院除樞密直學士知開封府遷翰林侍讀學士卒年六十一東都事略卷四十八
