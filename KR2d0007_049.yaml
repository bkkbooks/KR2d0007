body:
  text: 東都事略卷四十九宋王稱撰列傳三十二王欽若字定國臨江軍新喻人也祖郁嘗官鄂州家黃鶴樓漢陽人望樓上若有仙景一夕欽若生父仲華欽若少孤郁愛之郁後為濠州判官嘗曰吾之後必有興者其在吾孫乎欽若舉進士甲科為亳州防禦推官遷太常丞理缺憑由司奏蠲乾德至咸平逋負千餘萬釋繫囚三千餘人以廣惠澤召試學士院真宗覽其文謂輔臣曰欽若非獨敏於吏事兼富於文辭遂以右正言知制誥遷翰林學士拜左諫議大夫參知政事景德初契丹入冦欽若請行以工部侍郎參知政事判天雄軍還朝罷政事特置資政殿學士以寵之既久又加大學士三年遷尚書左丞知樞密院事真宗既與契丹和冦準之功也契丹受盟而歸準每有自多之色雖真宗亦以自得也欽若深害之一日從容言於真宗曰澶淵之役準以陛下為投瓊與敵博耳錢輸將盡盡出之謂之孤注陛下冦準之孤注也且城下之盟古人羞之而陛下以為功乎真宗愀然曰為之奈何欽若知真宗厭兵即謬曰陛下以兵取幽燕乃可刷耻真宗曰河朔生靈始免兵革之禍吾安能為此可思其次欽若曰惟有封禪泰山可以鎮服四海誇示夷狄然自古封禪當得天瑞希世絶倫之事然後可為也既而又曰天瑞安可必得前代蓋有人力為之者也真宗久之乃可然王旦方為相真宗曰王旦得無不可乎欽若曰臣得以聖意諭旦宜無不可欽若乘間為旦言之旦黽勉而從然真宗意猶未決也它日晚幸祕閣惟杜鎬方直宿真宗驟問之曰古所謂河出圖洛出書果何事也鎬曰此聖人以神道設教耳其言適與真宗意合真宗遂意決於是天書降于左承天闕之上大中祥符初泰山父老請封禪遂為經度制置使兼判兖州又為天書儀仗副使天書再降泰山欽若以聞真宗謂輔臣曰朕五月十七日夜夢神人來言當賜天書於泰山祕不敢言今果與夢協出欽若所上天書再降祥瑞圖以示百僚欽若又言至嶽下兩夢神人願增建廟亭真宗從之封禪禮成遷禮部尚書祀汾隂復為天書儀仗副使遷吏部尚書明年為樞密使同平章事初真宗議立皇后參知政事趙安仁謂劉德妃家世寒微不如沈才人出於相門真宗雖不樂亦不罪也它日與欽若論方今大臣之長者欽若欲排安仁乃譽之曰趙安仁長者也安仁昔為故相沈倫所知至今不忘舊德常欲報之真宗默然始有斥安仁之意矣安仁既罷王旦欲引所善李宗諤參知政事嘗以告欽若欽若唯唯宗諤家貧祿廪不足以給婚嫁旦前後資借甚多欽若知之故事參知政事謝日所賜之物幾三千緡欽若因密奏宗諤負王旦私錢不能償旦欲引宗諤參知政事得賜物以償己非為國計也明日旦果以宗諤名聞真宗不許欽若因薦丁謂謂遂參知政事欽若與謂及劉承規陳彭年林特交通蹤跡詭異時以五鬼目之七年為同天書刻玉使馬知節與欽若同在樞府知節惡其為人不相下因詆其短爭於上前由是罷樞密使八年復為樞密使同平章事天禧元年上玉皇尊號遷右僕射尋拜左僕射兼中書侍郎同平章事初真宗欲相欽若王旦曰欽若遭遇陛下恩禮已隆且兩府任用亦均臣見祖宗朝未嘗使南人當國雖古稱立賢無方然必賢士乃可臣位居元宰不敢沮抑人此亦公議也及旦罷真宗始相欽若三年人有言其受金者欽若於上前自辨乞下御史臺覆實真宗不悅曰國家置御史臺固欲為人辨虛實耳欽若皇恐因求出藩㑹商州捕得道士譙之易蓄禁書能以術使六丁六甲神而欽若贈之詩故罷為太子太保尋判杭州踰年復資政殿大學士資善堂侍講進司空既而除山南東道節度使同平章事判河南府以疾不俟報赴闕降司農卿分司南京仁宗即位復祕書監改太常卿知濠州遷刑部尚書知江寧府天聖元年復拜司空門下侍郎同平章事昭文館大學士進司徒封冀國公薨于位贈太師中書令諡曰文穆欽若嘗言少時過圃田夜視天文有紫微字又嘗於蜀褒城道中有通刺字未暇視而與之相見告欽若曰異日位宰相既去視刺字乃唐相裴度也自此遂喜神異事且撰文以紀之朝廷有所興作必委曲遷就以合上意真宗作喜雪詩誤用旁韻王旦欲白真宗欽若曰天子詩可校以禮部格耶旦遂止欽若退遽密以聞他日真宗謂輔臣曰前日所賜詩微欽若幾為衆所笑與楊億等同撰䇿府元龜有褒詔則自為表謝譴問則戒吏云苐言億等故馬知節面斥其姦罔仁宗亦謂王曾曰欽若所為真姦邪也五子皆夭以從子寅亮為後欽若平日撰述有天書再降泰山祥瑞圖鹵簿記彤管懿範天書儀制翊聖傳聖祖事迹羅天大醮儀廣聞遷叙圖列宿萬靈朝真二圖共數百卷多述神異之事云臣稱曰帝王之功業未始不成於艱難多事之時而肆於安逸無事之日真宗之初北有契丹之彊西有繼遷之患真宗既已馴服二虜天下無事欽若乃首為天書之說自是封禪之禮行而祥瑞興矣雖曰褒功頌德以歸美于上是豈忠臣之所當然者與聖人不畏多難畏無難詎可忽哉丁謂字公言初字謂之蘇州人也嘗以文謁王禹稱禹稱稱其文與孫何比之韓栁名遂大振既而何冠多士而謂占第四自以與何齊名耻居其下臚傳之際殿下有言太宗曰甲乙丙丁合居第四尚何言為大理寺評事通判渝州踰年直史館為福建路轉運使初置龍焙嵗貢團茶咸平初為三司户部判官峽路蠻擾邉㑹分川峽為四路謂領夔州路轉運使措置蠻事作誓刻石柱境上其後又入冦委其酋領討平之居五年入為三司鹽鐵副使擢知制誥契丹入邊謂知鄆州敵騎稍南民大驚趣揚州渡舟人邀利不時濟謂斬死罪囚于河上舟人懼不復稽阻又令廣旗幟擊刁斗聲振百餘里於是契丹亟走明年召為三司使加樞密直學士大中祥符初議封禪未決謂因言大計有餘議遂定謂機敏有智謀在三司案牘有差老吏不能曉者決以一言皆中其理朝廷每有營造莫不兼領凡奏祥瑞事皆謂與王欽若與焉初議建昭應宫也真宗命謂經度謂欲侈大其制近臣多言其不可者真宗以問謂謂曰陛下富有天下建一宫崇奉上帝何所不可且陛下未有皇嗣建宫於宫城之乾地正可以祈福羣臣不知陛下此意或妄有沮止願以諭之既而王旦密上疏諫止其役真宗諭之如謂所對旦遂不敢復言五年拜户部侍郎參知政事明年朝謁太清宫為奉祀經度制置使判亳州又為天書刻玉副使再遷兵部尚書九年除平江軍節度使知升州天禧閒徙鎮保信復以吏部尚書為參知政事改樞密使冦準罷相真宗既已相李迪未幾亦拜謂同中書門下平章事昭文館大學士真宗疾久頗艱於語言皇后與政準為相時議欲請太子監國準既罷楊崇勳告內侍周懷政謀殺謂等復用準謂微服夜詣曹利用謀之遂誅懷政貶準安州再貶道州司馬王曾為參知政事不平之曰責太重矣謂熟視久之曰居停主人勿復言恐亦不免也曾踧然而懼其後真宗欲令皇太子聽政皇后裁制於內以二府兼東宫官遂加謂門下侍郎兼太子少傅為李迪斥其姦遂與迪俱罷相謂尋知河南府內臣雷允恭者嬖臣也謂之進皆允恭之力至是允恭𫝊宣以中書闕人權留謂發遣謂因此直入中書召堂吏索文書閲之來日與羣工同奏事真宗亦無語衆退獨留及出道過學士院謂傳詔召當直學士劉筠草復相制筠曰命相必面得㫖果爾今日必有召制乃可為也謂無如之何乃命他學士草制遂拜左僕射門下侍郎同平章事兼太子少師謂既復相尋又加司空封晉國公仁宗即位章獻后臨朝進司徒兼侍中為山陵使允恭既有力於謂謂德之故遣允恭修陵域允恭惑司天邢中和妄言移皇堂於東南二十步王曾具奏其事以謂擅易陵寢意有不善語在允恭𫝊允恭既誅謂罷相為太子少保分司西京謂次子玘與女冠劉德妙通出入謂家謂坐貶崖州司户參軍玘除名籍其家自參知政事任中正等十數人皆坐貶始冦準謫雷州時謂與馮拯同在中書謂當秉筆初欲貶崖州而謂忽自疑語拯曰崖州再涉鯨波如何拯唯唯而已謂乃徐擬雷州至是謂貶拯遂擬崖州云初謂之復留也貶李迪於衡州宋綬知制誥草謫詞請其罪名謂曰春秋無將漢法不道皆其事也詞既上謂嫌其不切多所改定其言上前爭議曰罹此震驚遂至沉頓謂所定也及謂貶綬猶掌詞命即為之詞曰無將之戒深著於魯經不道之誅難逃於漢法天下快之謂在朱崖凡五年嘗以家財與土人商販蠲其息其人問所欲謂曰欲煩齎家書至洛陽爾仍戒其人曰俟有中貴人至與留守宴即投之其人如教留守得之大驚不敢拆其書遂奏之乃謂作陳情表假家書以逹之也其表叙其受遺冊立之功有云臣有彌天之罪亦有彌天之功章獻與仁宗覽之惻然遂徙雷州又三年徙道州復祕書監致仕居安州又徙光州卒年七十二謂性憸巧而善談笑在朱崖嘗問客天下州郡孰為大客曰京師也謂曰不然朝廷宰相作崖州司户參軍則崖州為大也聞者絶倒先是謂逐冦準京師為之語曰欲得天下寧當拔眼中釘欲得天下好莫如召冦老及謂得罪人以為報云馮拯字道濟河陽人也少時以文謁趙普普見而竒之謂曰子位與夀他日我若也舉進士為大理評事通判峽州稍遷度支判官淳化中與尹黃裳王世則洪湛伏閣請立許王元禧為皇太子太宗怒出知端州久之徙鼎州道改通判廣州㑹母亡請內徙得知江州入判三司度支兼侍御史知雜事時西北用兵拯論大將王超傅潜在定瀛觀望玩冦陛下不見杜重威之事乎後超等果以逗撓覆軍擢樞密直學士為河東河北安撫副大使明年以右諫議大夫同知樞密院事景德初改工部侍郎僉書樞密院真宗訪以邉事拯以謂備邉之要當須扼襟喉據險隘以制敵之衝若於保州威虜閒依徐河以布陳裹糧其勢足以决勝今防秋請定州北唐河增屯軍馬至六萬為大陳邢州置都總管為中陳天雄軍鈐轄為後陳而罷莫州狼山兩路屯兵從之明年為參知政事纍遷工部尚書引疾丐罷以刑部尚書知河南府除御史中丞又以疾除户部尚書知陳州真宗問王旦曰拯屢求間郡何也對曰馬知節嘗薄拯拯志在旌節不敢請大藩也明年再知河南天禧四年入判都省拜吏部尚書同平章事充樞密使尋加左僕射中書侍郎居相位兼太子少博集賢殿大學士進左僕射封祁國公仁宗即位遷司空兼侍中與丁謂同為相謂獲坐隂祈拯營救時章獻欲殺謂拯言上初即位誅大臣駭天下耳目謂得不誅而竄之朱崖拯有力焉謂既得罪拯遂代謂為司徒昭文館大學士充山陵使拯嚴重中人傳宣至中書未嘗與坐上章請罷拜武勝軍節度使兼侍中判河南府仁宗遣內人撫問還奏其寢處皆儉素無他飾仁宗因賜以衾裯及錦倚屏然拯平居自奉極於侈靡也卒年六十六贈太師中書令諡曰文懿東都事略卷四十九
