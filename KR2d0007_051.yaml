  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0007_WYG_051-1a, image: WYG0382/WYG0382-0318c.png}
body:
  text: 東都事略卷五十一宋王稱撰列傳三十四李迪字復古濮州鄄城人也少從栁開學為古文開曰此公輔器也舉進士第一除將作監丞通判徐州代還直史館為開封府發解官真宗東封泰山以迪通判兖州既而坐前發解舉人失當降監海州鹽稅明年以右司諫知鄆州再遷吏部員外郎為三司鹽鐵副使遂知制誥真宗幸亳州為留守判官亳升節制以迪知亳州代還知永興軍尋除陜西都轉運使召為翰林學士是時知秦州曹瑋數言唃厮囉欲內冦請益兵不遣乃求罷真宗問誰可代之迪曰非瑋莫能制也陛下重發兵得非將上玉皇聖號耶陜西諸郡兵自可以益之真宗因問以陜西兵數對曰臣為轉運使時以方寸小䇿記兵及糧以備調發今猶置佩囊中真宗令探取之因給紙札令迪悉上合存留及調塞下數以進真宗曰不意頗牧在吾禁中矣未幾唃厮囉冦邉復召問對曰瑋必克後數日捷報至真宗曰卿何料之審也迪曰彼舉兵逺來此堅壁待之是以知其必勝爾歲薦飢三司調用不給真宗召問所以濟之之䇿迪對曰祖宗置內藏庫欲攻取西北且備凶年今邉無費倘以佐國用則庶幾天下財利寬而民不加賦矣真宗為大發內庫金繒賜三司又言方東封時嘗詔車駕所過毋伐木除道及祀汾亳以來土木之役不可勝紀今旱蝗之起殆天所以警戒於陛下也願罷諸不急之費真宗嘉納天禧元年拜給事中參知政事東宫建以迪為太子少傅迪辭以太宗時未嘗立保傅遂止兼賔客加禮部侍郎冦準罷相真宗欲相迪迪固辭一日對滋福殿皇太子出拜上前曰蒙以賔客為宰相真宗顧迪曰復何辭邪乃拜吏部侍郎兼太子少傅同中書門下平章事集賢殿大學士真宗不豫令皇太子總軍國事首相丁謂獨請皇太子止決常務他皆聽旨迪固爭不可謂曰即上躬良已何以處之迪曰太子出則撫軍入則監國古之制也力爭不已自是皇太子止於資善堂聽事餘皆聽旨謂益擅權至除吏不以聞迪語同列曰迪起布衣至宰相安能徇權臣以取容乎時二府並進秩乃遷迪中書侍郎兼尚書左丞故事宰相無作左丞者謂又欲進所善林特為詹事迪不可又欲以為樞密副使兼賔客迪又不可至上前斥謂擅權不法事願與謂俱罷且言冦準無罪不當黜因格前制不下於是謂罷為吏部尚書迪罷為户部侍郎翌日謂知河南府迪鄆州謂尋復留貶迪衡州團練副使謂竄起為祕書監知舒州徙江寧府又徙青兖二州復兵部侍郎知河南府朝京師章獻明肅皇后謂迪曰卿不欲吾與國事吾今保養天子至此如何迪曰臣不知太后有至德也章獻喜以尚書左丞知河陽明道元年遷工部尚書章獻崩召為資政殿大學士判尚書都省未幾復拜同中書門下平章事集賢殿大學士迪再相自以受不世之遇盡心輔佐知無不為於是吕夷簡忌之景祐二年罷為刑部尚書知亳州迪謂人曰迪不自量恃聖主之知自以為宋璟而以吕公為姚崇其待我乃如是邪改知相州尋為資政殿大學士翰林侍讀學士留京師因奏吕夷簡結荆王元儼為除門僧惠清守闕鑒義詔鞫之乃迪在中書時所行降太常卿知密州復刑部尚書知徐州改户部尚書知兖州復資政殿大學士是時元昊反契丹背盟迪請臨邉拜彰信軍節度使判天雄軍徙青州引老以太子太傅致仕卒年七十七贈司空諡曰文定三子柬之附傳徽之補之仕至列大夫柬之字公明以父任為將作監主簿除館閣校勘遷直集賢院擢天章閣待制以集賢院學士判西京留司御史臺英宗即位富弼薦柬之學行遷龍圖閣直學士兼侍讀纍遷工部尚書拜太子少保致仕再遷太子少師卒年七十八諡曰懿靖柬之性簡易詳練本朝故事與人交必盡情實云王曾字孝先青州益都人也幼孤鞠於仲父宗元里人張震有道之士也曾從之學謂有將相之器甫冠舉進士第一為將作監丞通判齊州代還直史館景德初契丹始修好所致書以南北朝冠國號之上曾言春秋外夷狄爵不過子今與抗稱兩朝非外夷狄之意真宗嘉之擢右正言知制誥天書降詔作玉清昭應宫規創萬楹廷臣莫有言者曾列五害願省損制度奉使契丹而迓者邢祥辨給好以氣陵人稱本國宗支皆賜鐵劵曾曰大臣反側賜鐵劵以安其心何為及宗支哉祥大慙大中祥符六年為翰林學士一日真宗晚坐承明殿召對命謁者諭之曰思卿甚故不及御朝服毋謂朕慢卿也初違制之法無故失率坐徒二年曾知審刑院請分故失非親被制書者止以失論真宗不悅曰如是不復有違制者曾曰如陛下言亦無復有失者矣自是違制遂分九年以右諫議大夫參知政事時王欽若挾祥瑞迎合人主意隂排異己者真宗怒責大臣當傅會國事何遽自異耶曾曰君從諫謂明臣盡忠謂義陛下不知臣不肖使待罪政府臣知義而已不知異也及欽若為相乃以禮部侍郎罷曾政事頃之知應天府天禧初民訛言有妖若飛帽搏人自京以南皆驚恐曾夜開里門捕倡言者民乃定徙天雄軍復為參知政事再遷吏部侍郎兼太子賔客仁宗即位遷禮部尚書方真宗不豫也有諷皇后謀稱制者曾密語后戚錢惟演曰今太子決政資善堂天下固已屬望而劉氏遂欲稱制以疑百姓公獨不見吕武之事乎惟演悟不敢異議及真宗崩丁謂欲皇太后對近臣決政事皇帝獨朔望見羣臣庶務悉令入內押班雷允恭畫可於禁中曾曰天下者太祖太宗之天下非劉氏之天下奈何使兩宫異處柄歸宦者禍端兆矣乃奏請如東漢舊制太后坐右垂簾同聽政謂與允恭改皇堂抵罪參知政事任中正言於仁宗曰謂被先帝顧命請如律議功曾曰謂不忠無足議於是謂貶崖州中正而下十數人隨亦廢黜是時中外洶洶曾正色立朝姦邪懼焉未幾拜中書侍郎同中書門下平章事集賢殿大學士遷門下侍郎兼户部尚書昭文館大學士踰年進吏部尚書嘗請用孫奭馮元勸講殿中又自采聖賢事迹會解用為規戒曾薦參知政事吕夷簡才望可當政柄章獻未用曾奏曰臣言吕夷簡而未用以臣度太后之意不欲其班在樞密使張耆之上耳且耆一赤腳健兒豈容妨賢如此章獻曰固無此意行且用矣夷簡遂拜相章獻與政久稍通請托曾力裁制忤章獻意及章獻受册供帳天安殿曾執不可於是改文德殿章獻滋不悅玉清昭應宫災章獻有再興葺意曾又以為不可乃罷相知青州徙天雄軍拜彰德軍節度使魏人愛其政生祠之改鎮天平同平章事判河南府景祐二年召拜樞密使明年拜右僕射兼門下侍郎同平章事集賢殿大學士封沂國公是時吕夷簡為昭文相專決事曾與夷簡議論多不協力求去以右僕射出知青州既入謝改判鄆州加資政殿大學士由宰相罷政而帶職自曾始曾前後輔政十年處天下事審而中禮性儉素居家人不見其喜愠之色在上前開陳處可辨博有餘每廣朝大會盛服正色郎謁者視進止如有尺寸士大夫服其清修莫敢干以私者嘗云大臣執政不當收恩避怨故其言曰恩若已出怨將誰歸聞者歎服薨年六十一贈侍中諡曰文正皇祐中曾弟子融言臣兄曾事章聖興諸生不十年總大政其後拜玉几下聞顧命章獻聽政臣兄確然秉正勤翊王家大業以安陛下幸詔詞臣勒銘隧石誠得天筆篆額敷賁前人死且不朽因以唐明皇所題裴耀卿碑額上之仁宗乃御篆旌賢碑三字賜其家其後踵為故事治平中以曾配享仁宗廟庭子融初用曾奏為將作監主簿又舉進士獻所為文章召試集賢院為三司判官以直龍圖閣知河陽荆南府遷天章閣待制為三司副使子融以材自奮籍籍為聞人遷工部侍郎集賢院學士知兖州不赴以刑部侍郎致仕卒年八十一子融初名曍字子融及趙元昊反乃請改今名嘗集本朝禮為禮閣新編五十卷又論次五代事為唐餘録六十卷臣稱曰章獻擁幼君制天下時大臣怙權乘之以逞曾毅然奮忠臨大節而不可奪卒使帝室尊榮禍亂不作可謂社稷之臣矣夫賢者以身為天下用而安危繫焉曾佩安危之寄功烈光明何愧於古宜仁宗之旌異云張知白字用晦滄州青池人也父鸞為鹽亭令知白幼好學鸞喜曰大吾門者子矣遂不復仕知白舉進士為靜戎軍解州推官定武軍掌書記河北節度判官咸平中西北未寧中外多言兵事知白奏疏言王者當奉時令茂功典省刑罰及取士之制數千言真宗異之召試舍人院擢右正言出知劒州復召試中書拜直史館江南旱命知白安撫及還授京東轉運使周伯星見百官稱賀知白獨以為人君當修德以應天星之見何所繫焉因極陳治道之要真宗曰知白在外而乃心朝廷可謂知所職矣陜西飢命知白按巡尋知鄧州拜龍圖閣待制知審官院知白以朝廷重內職輕外官引唐李嶠議建請選臺閣分典藩郡仍自請補外真宗不許知白固請乃以知青州還朝求領國子監真宗曰知白倦於處劇耶宰相言知白更踐中外未嘗為身謀乃擢右諫議大夫御史中丞拜給事中參知政事遷工部侍郎是時王欽若為相與知白議論多不合以疾辭位罷為翰林侍讀學士知大名府徙南京至是欽若分司南京衆謂知白必報之而知白待之加厚論者多之徙知亳州仁宗即位召入為樞密副使天聖二年拜工部尚書同中書門下平章事集賢殿大學士知白在相位重名器無毫髮私雖貴顯清約如寒士六年薨於位贈太傅中書令諡曰文節東都事略卷五十一
