body:
  text: 東都事略卷五十二宋王稱撰列傳三十五張士遜字順之光化軍人也唐漢陽王東之之後生百日始能啼舉進士為鄖鄉簿遷射洪令嵗旱禱白崖山神即雨士遜立須雨足乃去蜀人異之轉運使檄士遜治郪射洪民遮道馬不得去乃聽還改襄邑令又知邵武縣除御史臺推直官遷監察御史當貢舉初用糊名法士遜試諸科為巡鋪白主司有親戚在進士中願引避不聽因自言真宗是之自是舉人與試官有親嫌者皆移試别所江南轉運使缺中書進擬數人真宗自除士遜焉士遜謁王旦於政事堂自言驟領使職願聞善教旦從容曰朝廷榷利至矣士遜起謝既去旦語人曰此轉運使識大體其後士遜所至每思旦言不敢妄有興建也徙廣東當是時天下置天慶觀士遜言今營造競起逺近不勝其擾請因諸舊觀為之詔如其請移漕河北久之遷為夀春郡王友除直史館初宰相將除士遜翊善記室真宗曰翊善記室府屬也王皆受拜今王尚少宜命士遜為友令王答拜又為王府咨議參軍仁宗為皇太子遷右諫議大夫兼右庶子又為賔客遷樞密直學士既而兩府大臣皆領東宫官遂換太子詹事天禧五年擢拜樞密副使纍遷尚書左丞張知白薨仁宗謀相王曾薦吕夷簡曹利用薦士遜章獻亦欲相士遜拜禮部尚書同中書門下平章事明年趙州上曹汭變汭利用從子也官鄉郡所為不法時內侍有忌利用者隂毁之於中仁宗以問執政士遜曰此獨不肖子為之爾利用大臣宜不知狀利用既得罪士遜亦罷知江寧府王曾復薦吕夷簡可相遂以夷簡代士遜居二年朝京師除定國軍節度使知許州復拜中書侍郎兼刑部尚書同平章事集賢殿大學士吕夷簡罷相進士遜門下侍郎昭文館大學士為章獻明肅皇后章懿皇后山陵使先是百官皆詣洪福院上章懿皇后諡冊已而入慰士遜乃與同列過樞密使楊崇勳園飲百官立庭中以俟日中不至為御史所彈罷為左僕射知河南府復拜吕夷簡為相而崇勳亦罷以使相守河陽他日同入謝仁宗見士遜班崇勳下即除山南東道節度使同平章事改判陳州徙河南吕夷簡罷相仁宗用王隨陳堯佐為相明年隨堯佐罷復拜士遜門下侍郎兼兵部尚書同平章事昭文館大學士封郢國公元昊叛嫚書始聞朝廷為之忿然士遜即議絶和問罪時西邉弛備已久人不知兵識者以為憂既而和事一絶元昊遂入冦西鄙用兵士遜議揀輦官為禁軍於是輦官皆喧訴待漏院士遜上馬將朝而遮道不得進馬駭墮地士遜年老不自安乃七上章請老優拜太傅進封鄧國公致仕宰相謝事自士遜始也仁宗因復召吕夷簡為相士遜就第十年而薨年八十六贈太師中書令諡曰文懿仁宗欲臨奠左右言其日庚戌仁宗曰朕以師臣復何避文彥博曰陛下過於唐太宗辰日哭張公謹逺矣始士遜七嵗喪母養於其姑姑亡徒跣扶匶仁宗為追封為南安郡君陳堯佐罷參知政事有挾怨言其欲反者又有誣諫官隂附宗室者士遜言憸言動搖朝廷若一開姦萌則臣亦不能自保矣仁宗悟置告者於法誣諫官事亦寢為相時曹利用憑寵自恣而不能正時誚之為和鼓惡參知政事程琳多異議御史中丞孔道輔不附已欲併逐之知開封府鄭戬發琳令府吏馮士元市第事士遜揣知仁宗有不悅之意道輔適至中書謂曰上顧程公厚今為小人所誣曷見上為明辨之道輔不知士遜賣已也遂言於仁宗仁宗疑以朋黨琳及道輔於是俱被黜士遜又嘗納女口於宫中侍御史楊偕劾其罪且曰此盧杞李林甫之所不為也然士遜為人寬厚亦有過人者一日仁宗語士遜曰人言范仲淹嘗欲乞廢朕朕但未見其章疏爾士遜曰陛下既未見其章疏不可以空言加罪望陛下訪之積十數請仁宗曰竟未之見也然為朕言之者多矣士遜力為辨其不然仁宗意乃解其後士遜歸老啓國於鄧仲淹適守鄧州士遜還鄉仲淹置酒髙㑹明日士遜復置㑹揮金甚盛時人榮之吕夷簡字坦夫河南人祖龜祥嘗知夀州遂以家焉夷簡大理寺丞䝉亨之子而宰相䝉正之猶子也夷簡擢進士又舉制科嘗通判通濠二州往河北按行水災還奏曰今田器有算非所以重本也請除之真宗納其言自是天下農器皆免算時王曾為知制誥一日至中書見宰相王旦旦謂曾曰君識吕夷簡否曾曰不識也它日復問曾曰嘗訪之士大夫人多稱其才者旦曰此人器識逺大君其善交之異日當與君對秉鈞軸曾曰公何以知之旦曰吾亦不識夷簡但以其奏請得之曾曰奏請何事旦曰如不稅農器是已既而擢提㸃兩浙刑獄方是時大建宫觀尚方伐材木期㑹嚴峻至有死者則以其亡命捕繫其子夷簡上疏請緩其程役又方冬水涸民苦於挽運宜須河疏通以卒送之真宗以夷簡為有憂國愛民之心可其奏除侍御史知雜事冦準知永興軍擲巨奸徙湖南有過闕而上變事者夷簡曰此必有以使之宜勿問益徙之逺方真宗從之改起居舍人擢知制誥西蜀饑出為安撫使除龍圖閣直學士知開封府雷允恭擅移皇堂而丁謂庇之命夷簡與魯宗道乘傳按視盡得其迹及允恭盜陵中金寶狀聞允恭誅而罷謂相乃以夷簡為給事中參知政事自祥符以來崇奉天書設官置使典司其事儀衛物采甚盛夷簡建議請納天書於陵中而官司儀衛悉罷夷簡處事類如此真宗既祔廟章獻后欲神主復日悉陳其平生服玩夷簡奏曰太后於先帝喪祭之禮曲盡尊奉此雖至誠至孝之道然未足以報先帝惟逺姦邪進忠直推心待下克己抑謙愛惜民財拔擢時彥使邊鄙寧謐人物庶富皇帝德業日茂太后夀樂無憂此乃報先帝之大節也仁宗嘗問輔臣四方奏獄來上不知所以裁之如之何則可夷簡曰凡奏獄必出於疑疑則從輕可也仁宗深以為然終仁宗之世疑獄一從於輕故事輔臣因郊恩遷官夷簡與同列豫辭之遂著為令天聖七年以户部侍郎拜同中書門下平章事集賢殿大學士時王曾為首相與夷簡同列果如王旦之言曾嘗從容與夷簡具道旦語皆嗟歎以為不可及玉清昭應宫災曾因是罷相章獻意欲復修夷簡固請罷之以答天戒拜昭文館大學士進吏部侍郎監修國史章懿皇后上仙夷簡因奏事簾前曰聞夜中有宫嬪亡者章獻即起挽仁宗入內有頃獨坐謂夷簡曰一宫人死相公何與夷簡曰臣待罪宰相內外事無不當與章獻怒曰相公欲離間吾子母耶夷簡曰太后它日不欲保全劉氏乎太后不以劉氏為念則臣不敢言若尚念劉氏也喪禮宜從厚章獻悟乃曰宸妃也夷簡曰宸妃之薨當斂以后服實以水銀司天承章獻之意且言嵗月葬未利夷簡黜其說乃發哀成服備禮以葬章獻有㫖令鑿內城垣以出神柩夷簡遽求對言其鑿垣非禮宜開西華門以出章獻使內侍羅崇勳諭夷簡曰向夷簡道豈意卿亦如此也夷簡曰臣為宰相朝廷大事理當廷爭因正色謂崇勳曰宸妃誕育聖主而送終之禮如此異日治今日之事莫道夷簡不曾說來崇勳大懼馳以告章獻於是始從其言大內災宫門晨未闢輔臣請對仁宗御拱辰門樓百官拜樓下獨夷簡不拜仁宗遣問其故曰宫庭有變願一見上仁宗為舉簾見之然後拜初章獻后養荆王子於禁中既長矣夷簡請出之章獻欲與仁宗伴讀夷簡曰皇帝富於春秋非親儒學之臣則恐無以輔導聖德即日命還邸中章獻崩夷簡上疏請正朝綱塞邪徑禁貨賂辨佞壬絶女謁疏近習罷力役節冗費言甚剴切章獻既崩或疑章懿之喪仁宗遣李用和發其葬視之容貌如生使者馳入奏仁宗於章獻神御前焚香泣告曰人言其可信邪先是章懿之葬命晏殊撰志文殊謂后無子至是仁宗親政殊為參知政事一日內出志文以示夷簡曰先后誕育朕躬殊為侍從安得不知夷簡曰宫省事祕殊之不審理容有之然方章獻臨御若明言先后實生聖躬可乎仁宗默然良久命出殊守金陵明日以為逺改守南都夷簡輯睦二宫保全大臣如此明道二年罷為武勝軍節度使同平章事判陳州期以半嵗召還是嵗復入為門下侍郎兼吏部尚書同平章事昭文館大學士兼修國史郭后與尚美人楊美人爭寵尚氏有侵后不遜語后不勝忿起批其頰仁宗自起救之誤傷仁宗頸仁宗大怒內侍閻文應白仁宗以爪痕示執政大臣而謀之夷簡遂欲廢后仁宗疑之夷簡曰光武漢之明主也郭后止以怨懟坐廢況傷乘輿乎夷簡將廢后請敕有司無得受臺諫章奏於是御史中丞孔道輔右司諫范仲淹帥臺諫詣閣門請對須臾有㫖令臺諫詣中書夷簡即貶出道輔等后遂廢其後仁宗欲立民間女陳氏為后夷簡力止之景祐二年封申國公夷簡嘗建議立州郡學校又因郊禮授宗室子以環衛官建睦親宅增教授員置大宗正以總之始王曾薦吕夷簡為相未幾曾罷夷簡為首相及王曾復相夷簡專决政事曾不能平因對斥夷簡嘗納賂市恩仁宗以問夷簡夷簡請置對曾亦請罪求去遂以曾知鄆州亦除夷簡鎮安軍節度使同平章事判許州徙天雄軍未幾復入為右僕射兼門下侍郎同平章事昭文館大學士慶歷元年拜司空封許國公二年兼判樞密院事改兼樞密使自西鄙用兵劉平死於陳黃德和誣平降賊詔腰斬德和議者以朝廷使宦者監兵主帥節制不得專故平失利乞罷監兵仁宗以問夷簡夷簡曰不必罷但擇謹厚者為之仁宗委夷簡擇其人夷簡曰臣待罪宰相不與中官私交無由知其賢否願詔押班保舉有不職與同罪仁宗許之翌日都知押班叩首乞罷監兵於是士大夫嘉夷簡之有謀契丹兵壓境范仲淹奏乞城京師以備狄衆是其說唯夷簡以為非曰雖有契丹之敵設備當在河北奈何遽城京師以示弱乎使虜深入而獨固一城天下殆矣乃建議北都因修其城池增置守備示親征之意且曰此子囊城郢計也卒建北京識者韙之契丹遣劉六符等來議和親夷簡奏曰蕃國求和親漢唐所不免徐議所以答之者耳無深憂也仁宗然之及六符至殿上讀書如平日無所問六符失色咨嗟而出至殿門幄次曰事已漏矣由此有司與之評議無甚難遂不復求昏而朝廷許增嵗幣與之再和以疾辭位拜司空平章軍國重事仁宗憂之乃翦頿賜之以療疾夷簡薦范仲淹富弼韓琦文彥博龎籍梁適曾公亮等可大用因再引退拜司徒固請老以太尉致仕薨年六十六贈太師中書令諡曰文靖夷簡為相方章獻臨朝內外無間言天下晏然夷簡之力為多王曾家請篆其墓碑仁宗慘然思夷簡書懷忠碑三字賜之治平中配享仁宗廟廷子公綽公弼公著公孺公著位宰相自有傳公綽字仲裕少補將作監丞知陳留縣纍遷史館修撰夷簡薨知制誥拜龍圖閣直學士知永興軍徙秦州召為龍圖閣學士知開封府嵗餘除翰林侍讀學士龎籍罷相公綽亦出知徐州徙河陽留侍經筵未拜而卒年五十七方夷簡在相位士大夫喜進者頗附之故事多涉干請者公弼字寶臣以父任為將作監簿纍遷至直史館河北轉運使在部四年蠲冗賦及民負債不能償者數百萬計而官用亦饒仁宗知其能擢天章閣待制為都轉運使進龍圖閣直學士知開封府初夷簡薨仁宗思之一日公弼奏事仁宗目送之語宰相曰公弼甚似其父拜樞密直學士知渭州徙延州還為羣牧使進樞密直學士知成都府公弼至人以為少威斷㑹營卒犯法當杖不肯受曰寧請劒死公弼再三諭之不從乃曰杖國法不可不受劒汝所請亦不汝違命杖而後斬之復召為羣牧使權三司使英宗在藩邸嘗得賜馬給使吏以為不善求易之公弼不可至是公弼奏事已英宗曰朕往在宫中卿不與朕易馬是時朕固已知卿矣逾月拜樞密副使神宗即位遷刑部侍郎樞密使公弼上疏以謂人君不可以聖自尊當用晦以接下方今之病在於知人之難而虛文無實尤不可不察陳升之議衛兵年四十以上稍不中程者量減請受徙之淮南公弼謂既使之去土又減其常廪於人情未安且事體甚大未易遽行也神宗以沙門島罪人數多即竄還議立法且欲復行肉刑公弼以為不可上疏曰臣伏見韓絳嘗奏乞用肉刑今日陛下亦以為然絳又言假如折一支去一指有何不可况堯舜尚用之此徒信古之論不適時變自漢文感一婦人之言罷肉刑而天下歸仁逮今千有餘年一旦暴行之駭四海之觀聽况古雖有肉刑之法在堯舜之世亦未嘗行之書曰象以典刑流宥五刑堯舜之世用流以寬五刑也若四凶者止於流則五刑無所施焉臣願陛下上法堯舜下體漢文無取迃儒好古之論陛下病今之犯刑者衆臣願擇守臣宣布惠愛使民各得其所則民不犯上矣今不究其本而徒更其刑辟臣恐民心一駭而動雖欲全撫之未易安也神宗納之時王安石變更祖宗法度公弼數言宜務安靜又與韓絳議論多不協從孫嘉問小人也竊公弼論事奏草以示安石於是罷為觀文殿學士户部侍郎知太原府以疾請知鄭州是時王韶方取洮河神宗恐韶生事欲使公弼帥秦鳯拜宣徽南院使判秦州疾作乞還道除河陽未至更拜西太一宫使卒年六十七贈太尉諡曰惠穆公孺字稚卿以父任為奉禮郎稍遷判吏部南曹仁宗見其占對詳雅以為可用纍官右諫議大夫為陜西都轉運使時朝廷已復綏州遣使議守與棄久不决以公孺往鄜延與郭逵議定公孺至則與逵請存綏州且具三年儲偫久之以龍圖閣直學士知鄆州元祐初為祕書監遷刑部侍郎知開封府擢户部尚書請老提舉醴泉觀以卒公孺清儉不妄言笑與人寡合云臣稱曰宰相之位必得人而後可以持其權蓋位者君子行道之具而權者因以為利用也得其位用其權而道於是乎可行夷簡相仁宗䇿功立名有益於世方其主治喪之禮則其見逺矣消監兵之䇿則其意深矣請建都之議則其謀偉矣斯善持宰相之權者與噫夷簡誠有絶人之才故能逹權而應變然其功最大者乃在於處仁宗母子之際使人無可乘之隙消患於未萌制治於未亂朝廷以之安靜公卿士大夫亦賴以無禍此其所以有後也哉東都事略卷五十二
