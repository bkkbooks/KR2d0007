body:
  text: 東都事略卷五十四宋王稱撰列傳三十七夏竦字子喬江州德安人也其父承皓太宗時上平晉䇿補右侍禁後與契丹戰沒於河朔竦以死事恩授丹陽簿上書乞應制舉其略曰邉障多故羽書旁午而先臣承皓殞身行陳陛下録臣孤幼任之州縣唯陛下辨而明之陛下以枕石漱流為逹則臣世居市井陛下以金榜丹桂為材則臣未忝科第陛下以鳩杖鮐背為德則臣始踰弱冠陛下以荷戈控弦為勇則臣生不綿歷若陛下令臣待詔公車條問急政對揚紫宸指陳時事猶可與漢唐諸儒方轡並馳而較其先後矣真宗頗嘉之既中制舉擢光祿寺丞通判台州召入為直集賢院遷右正言真宗幸亳州為東京留守推官仁宗封慶國公宰相王旦薦竦才遂命教慶國公書未幾同修起居注是時參知政事丁謂請釃金水河作后土祠三司使林特欲治玉清昭應宫復道發運使李溥欲致海上巨石為三神山於㑹靈觀池中君臣爭言符瑞竦獨抗疏以為不可其事遂寢及大臣領玉清昭應宫使以竦為判官竦由是附㑹神怪僥幸進取遂遷知制誥初竦與妻楊氏不睦楊氏訟其過左遷知黃州徙鄧州又徙襄州嵗饑發公廪募富人出粟嘗全活數萬人徙夀州歷安洪二州洪俗信巫有疾輒屏去親屬飲食衣藥悉聽於神死者甚衆竦索部中得巫一千九百餘家毁其淫祠以聞朝廷詔江淮以南皆嚴禁絶天聖三年丁母憂是時章獻明肅皇后聽政宰相王欽若素與竦厚善乃微服至京師圖進取欽若主之遂起復知制誥奉使契丹竦辭不行其表有父沒王事身丁母憂義不戴天難下穹廬之拜禮當枕塊忍聞夷樂之聲等語當時謂其四六為精絶明年為翰林學士兼侍讀又兼龍圖閣學士遂拜右諫議大夫樞密副使遷參知政事與宰相吕夷簡不協改樞密副使纍遷尚書左丞章獻崩罷為禮部尚書知潁州徙青州又徙應天府後二年以户部尚書入為三司使元昊叛拜泰寧軍節度使知永興軍改鎮忠武知涇州明年為陜西經略安撫招討使判永興軍進宣徽南院使與陳執中共事多不合徙鄧州仁宗遣使問攻討元昊之䇿竦言太宗時李繼遷擾邉命李繼隆等五路出討卒無功而還真宗時唯戒邉吏嚴斥堠以備之今元昊略有河外之地貨易華夷其勢非特繼遷比也雖然其欲僭竊名號者不過要市朝廷爾天下久不見兵革一旦遽議深討臣未見其可也願下令諸將敵即入境毋得與戰彼既絶中原賜豫又喪其緣邉和市可坐待其弊也時議者多不以為然於是徙判河中府慶歷二年徙蔡州召拜樞密使諫官御史皆言竦姦邪在陜西怯於用兵今用之則邉將之志惰矣凡十八疏遂罷言者不已以吏部尚書知亳州明年加資政殿大學士又明年復宣徽南院使河陽三城節度使判并州又明年拜同中書門下平章事判大名府又明年召以為相制下而言者又言竦嘗與宰相陳執中不協不可共事遂改樞密使封英國公未幾親事官夜入禁中將為亂皇城司皆坐譴逐內侍楊懷敏領入內都知如故言者又以竦結懷敏而曲庇之是日京師無雲而震者五仁宗召翰林學士張方平謂曰夏竦姦邪以致天變如此宜草制出之遂罷知河南府皇祐元年加侍中移鎮武寧改封鄭國公明年以疾求歸卒於京師年六十七贈太師中書令賜諡曰文正考功以竦行不應諡改曰文莊竦少好學自經史百氏隂陽律歷之書無所不通善為文章朝廷大典䇿屢以屬之所至立保伍之法盜賊不發閭里怗然性素貪多商販部中喜離間僚屬以鉤致其事雖待家人亦不以誠故時以姦邪目之子安期官至龍圖閣直學士范雍字伯純世居河東其曾祖仁恕從孟氏入蜀為相祖龜從昶歸朝為左屯衛將軍父德隆為供奉官葬河陽因家焉以舉進士為洛陽簿天禧中為京東河北轉運使時兩河宿兵大賈轉粟而下獲利甚厚雍移他郡緡錢市糴於德棣間運以餉邉頗減橫費徙京西路入為三司户部副使擢龍圖閣待制陜西都轉運使召還又以為安撫使除右諫議大夫權三司使加龍圖閣直學士天聖六年拜樞密副使玉清昭應宫災章獻皇后有再葺之意雍言先朝竭天下之力而作之今火出非意豈非天之譴乎如又將葺之民不堪命矣章獻悟乃止章獻崩罷為户部侍郎知陜州既至又改永興軍徙河陽以資政殿學士知河南府遷吏部侍郎元昊叛拜鎮武軍節度使知延州一日元昊驅衆十萬至城下雍令石元孫出戰又召劉平來援通判計用章固執以衆寡不敵無輕舉雍不從二將既戰殁雍左遷户部侍郎知安州復吏部侍郎知河中府拜資政殿學士知永興軍遷左丞加大學士雍在永興全城浚池言者以為驚擾詔止其役雍匿詔而趣成之明年葛懷敏敗於定州邠岐之閒皆恐惟永興人心怗然復知河南遷禮部尚書卒年六十八贈太子太師諡曰忠獻初雍在延州辟計用章為通判用章臨卭人也以進士起家稍遷至祕書丞既從雍辟嘗請修城壘備器械乞朝廷加兵選將以圖討賊若不以為意恐朝廷之憂關輔之禍非年嵗可弭雍不以為然及元昊以兵圍城二將陷陳都監黃德和奔還雍召用章問以䇿用章曰用章屢獻言矣而公不用今惟有一死以報國爾然城中老幼無辜皆公陷之至此若令同為血肉是公上負天子下負百姓雍怒拂衣而起至晚又召用章問計用章曰惟有死爾尚何言㑹其夜雪大作賊遂退雍挾用章陷百姓之言而誣以罪用章遂竄雷州其後范仲淹經略延州知用章以忠獲罪奏雪於朝田況亦以為言起監隨州酒明年復故官用章後知龔州終都官員外郎雍子宗傑至兵部員外郎直史館孫子竒紹聖間為吏部侍郎寶文閣待制子竒之子坦政和中為户部侍郎程琳字天球永寧軍博野人也舉服勤詞學科中選授泰寧軍節度推官召試除直集賢院仁宗即位為三司户部判官契丹使來以琳為接伴使言皇太后當遣使通書北朝琳以為禮不可通問拒止之使者屈時修真宗實録而起居注闕命琳追修書成遂修起居注知制誥天聖五年琳館伴契丹使蕭藴杜防藴出坐圖謂琳曰中國使至契丹坐位髙契丹使至中國坐位下請升之琳曰此真宗皇帝所定不可改也防曰大國之卿可乎琳曰南北兩朝安有大小防不能對仁宗令與宰相議或曰此特細事爾將許之琳以謂許其小必啓其大力爭之乃已拜右諫議大夫權御史中丞改樞密直學士知益州上元張燈先戒火備曰有火即救之勿以白已而果有火吏如琳教不以白而隨即救止終燕人無知者有告振武軍變者監軍以白琳琳曰軍中動息我自知之茍有謀不待告者可使告者來而告者卒不至蜀人嵗為社以祀灌口神琳曰往時不誅李順故大亂乃捕為首者戮之或以琳殺人以為蜀人恐且亂矣仁宗遣使視之使者還言蜀無事召知開封府禁中火下府使治之琳曰此天災也不可以罪人仁宗為緩其獄卒無死者遷龍圖閣學士守御史中丞久之為翰林侍讀學士復知開封府期年為三司使時議者患民稅多目吏得為姦欲除其名而合為一琳曰合而沒其名一時之便後有興利之臣必復增之是重困民也纍遷吏部侍郎景祐四年拜參知政事時元昊叛猶遣使入朝議者欲誅其使琳曰古者兵交使在兵閒不可其後使益驕議者又以為言琳曰始不誅以罪有在也今既驕誅之宜矣又何患耶議者又欲重賄唃􅣳囉使討元昊因以其地與之琳曰使唃氏有其地是去一元昊得一元昊也曷若用間使二羌不相合豈不為中國之利乎寶元二年鄭戩知開封府發琳使府吏馮士元抑孀婦市第及買女奴責光祿卿知潁州已而徙青州又徙大名府復尚書左丞為資政殿學士時建北京內侍皇甫繼明典營造宫室欲侈大其制琳以為方事備邉又困民以土木不可繼明數有論奏仁宗遣一御史視其曲直御史直琳遂罷繼明遷工部尚書加資政殿大學士河北安撫使拜武昌軍節度使知永興軍明年拜宣徽北院使判延州元昊死諒祚立尚幼三大將分治其國或請授三將節度使以分弱其勢琳曰幸人之喪非所以示大信於夷狄不如因而撫之議者以為失機㑹皇祐元年拜同中書門下平章事知大名府琳持重不撓前後守魏十年魏人愛之改鎮武勝又徙鎮安卒於鎮年六十九贈中書令諡曰文簡琳為人嚴深長於政事平時議論不少下人至朋僚故舊飲酒笑歌不復有勢位之間然性嗇於財而厚自奉當章獻聽政時琳嘗獻武后臨朝圖及章獻崩仁宗在邇英謂侍臣曰琳心行不佳而琳竟大用云臣稱曰以天下為度者不以我之私而藏怨焉昔漢文既立修代來功而謂朱虛侯初謀立齊王故詘其功夫名寬大長者莫如漢文也猶不忘朱虛之怨况其他乎當仁宗之初章獻在御而琳乃以武后臨朝圖為獻尊崇母后以求容悅及仁宗親政非特無怨而竟用琳出入將相幾二十年非仁宗之盛德亦豈能容之世稱仁宗可比漢文此則過之矣姜遵字從式淄州人也舉進士為蓬萊尉嘗知廬陵縣召為監察御史遷殿中侍御史遵與知吉州髙惠連有隙惠連言遵前在廬陵受賄請逮治詰遵往對卒無狀猶降通判延州入為侍御史青州大姓麻氏其富冠四方契丹之冦澶淵也兵至臨淄麻氏率莊人千餘據堡自保鄉里賴之全濟者甚衆敵退麻氏斂器械盡輸官留什二三以衛其家家既富饒宗族橫於齊麻士瑶有孫姪懦弱士瑶恐其分財幽餓而死遵發其事因索其家獲兵器及玉小印乃奏麻氏大富縱橫臨淄齊人懼伏私蓄禁兵刻玉寶將圖不軌詔按實誅之麻氏遂衰而遵由是以擊搏知名知邢州徙滑州為京西轉運使復入為侍御史知雜事踰年為三司副使以右諫議大夫知永興軍章獻皇后嘗營建浮圖遵毁漢唐以來碑碣代磚甓躬督成之因獲進用天聖七年召拜樞密副使遷給事中卒年六十八贈吏部侍郎遵為吏尚嚴故所蒞必震肅云趙稹字表微宣州宣城人也舉進士為安定軍判官稍遷殿中侍御史開封府判官益州路轉運使稹至部事無大小悉心咨訪有平允之稱召為侍御史知雜事改鹽鐵副使拜集賢院學士知益州坐市錦寬縱落職知同州徙鳯翔京兆復為集賢院學士加樞密直學士知并州纍遷刑部侍郎章獻后臨朝既久劉美有婢出入禁中稹厚結之天聖八年遂為樞密副使明道二年罷為尚書左丞知河中府以太子少傅致仕卒年七十六贈太子太保諡曰僖質東都事略卷五十四
