body:
  text: 東都事略卷五十八宋王稱撰列傳四十一韓億字宗魏其先真定靈夀人也後徙開封之雍丘少力學舉進士為大理評事知洛城縣為治有聲真宗幸澶淵以億掌機事通判陳澶二州時河决屬邑億集瀕河丁夫就民役親督築不賦於民而河患平真宗嘗覽其文欲召試以親嫌知洋州有富民李甲喪兄而迫嫁其嫂又誣從子為他姓而并其資産嫂訟之十餘嵗吏受賂不得直億按舊牘獨未嘗證以乳醫億密致乳醫以驗决衆皆詘服知相州坐事降通判大名府召入為殿中侍御史淮南兩浙安撫使除開封府判官改河北轉運使丁謂忌曹瑋威名斥知萊州慮其或拒命乃以億馳往代收其兵欲以中億蓋億亦謂所不喜也既而瑋奉詔徙知青州召為侍御史知雜事知臨江軍吳植託所親納金於宰相王欽若有詔下臺窮治植既除名欽若釋不問三司更茶法嵗課不登億承詔劾之由丞相而下當坐失當之罰其不撓如此除龍圖閣待制奉使契丹時副使者章獻外姻也妄傳皇太后㫖於契丹諭以南北歡好傳示子孫之意億初不知也契丹主問億曰皇太后即有㫖大使何獨不言億對曰本朝每遣使皇太后必以此戒之非欲逹於北朝也契丹主大喜曰此兩朝生靈之福也人謂副使既失辭而億更以為恩意甚推美之頃之出知亳州以樞密直學士知益州故事嵗當官出米六萬石以濟貧民當嵗儉億先期數倍賑之故民不大乏又疏江流溉民田數千頃至今以為利還拜御史中丞上言維茂二州地接羌夷蕃部嵗鬻馬今置官場永康非便謂宜徙場沈黎境上以絶其覘兩川之意楊尚二美人以罪斥去仁宗復欲召入億言唐武氏已出居感業寺復召入宫終為唐室之禍乃已景祐四年除工部侍郎同知樞密院事億言天下承平之久武備不戒請二府各舉才任將帥者數人稍試用之唃厮囉與元昊相攻已而來獻捷朝廷議以唃厮囉為節度使億曰二虜皆外臣今不能諭令解仇而因捷以奬之豈所以綏御四夷之道哉固執不可遂已四年為户部侍郎參知政事億見天下諸路有奏攟拾官吏小過輒顔色不懌曰今天下太平聖上之心雖昆蟲草木皆欲得所夫仕者大則望為公卿次亦望為侍從職司二千石其下亦望京朝幕職奈何錮之於聖世其持心如此以災異數發罷知政事除禮部侍郎知應天府加資政殿學士徙成德軍改澶亳二州遷尚書左丞以太子少傅致仕卒年七十二贈太子太保諡曰忠憲億方重有守治家嚴肅雖燕居未嘗見其惰容八子綱綜絳繹維縝緯緬而絳縝位宰相維門下侍郎綜字仲文始以父任入官舉進士為集賢校理擢同修起居注使於契丹契丹主以其父子仍世奉使酌酒勸之綜亦起勸契丹主亦離席酬之既還宰相陳執中以為生事出知滑州後復起居注擢知制誥綜嘗館伴敵使敵人欲稱北朝綜曰自古未有建國而無號者敵使慙遂不復言卒年四十六綜子宗道元祐初為户部侍郎寶文閣待制絳字子華少力學以父任為大理評事舉進士甲科為太子中允通判陳州遷直集賢院同知太常禮院故事享太廟百官前期習儀廟中絳言其非禮遂徙就尚書省為開封府推官男子冷青自言其母嘗得幸掖庭有娠而出生青開封捕得以為狂人流汝州絳以青惑衆非所宜追青窮治蓋其母嘗執役宫禁嫁民冷緒生一女乃生青遂論棄市遷户部判官除右正言道士趙清貺出入宰相龎籍家以賄敗開封府杖之道死事連籍絳奏請窮治於是籍與開封尹吕公綽皆坐謫修起居注召試知制誥故事郊祀天子親閲警場絳曰致齊而觀鼓吹非禮也仁宗從之請外出知河陽召判流內銓李仲昌議開六塔而績用弗成以絳安撫河北絳劾仲昌首議費國虐民遂竄南方使還遷龍圖閣直學士拜翰林學士仁宗遣使祈嗣於茅山絳因上疏願放掖庭宫人之無用者及限內臣養子以重絶人之世即日出宫人數百詔裁定內臣養子令遷右諫議大夫御史中丞絳劾宰相富弼以張茂實為先帝子而引用管軍將謀不軌遂家居待罪於是臺諫言絳論事不當罷知蔡州未幾以翰林侍讀學士知慶州加端明殿學士知成都府召還遷户部侍郎知開封府浹日除三司使俄拜樞密副使神宗嘗問天下遺利絳請盡地力因言差役之弊害農業傷民財願更定其法神宗嘉之役議自此始矣遂領制置三司條例司與王安石共事拜參知政事夏人犯環慶絳請行即拜陜西宣撫使治兵鄜延遣偏將种諤出青澗趨銀州破撫寧開元諸帳築囉兀等城自髙奴通河東塞詔兼河東宣撫使即軍中拜同中書門下平章事昭文館大學士遂出麟府兵徑虜中㑹囉兀城下破賊馬户川斬首千級已而撫寧堡失守夏人急攻囉兀城慶州卒叛言者罪絳遂罷相知鄧州始朝廷面授絳攻守二䇿絳選蕃兵馬七軍命諸將分領之又選募軍配卒及盜賊亡命為竒兵用种諤謀欲取橫山使將兵城囉兀雪中築撫寧堡調發倉猝關陜騷然絳駐延州命諸將並聽諤節制又命蕃官王文諒自慶州出討環慶路聽文諒節制絳得空名告身宣敕及錦袍銀帶撫納降附至邉盡召蕃官蕃部厚犒之軍士怨望又奪騎兵馬曰此輩不能戰以與蕃部有抱馬首號泣者夏人出兵爭撫寧堡陷之又攻囉兀城絳命諸路出師牽制慶州兵再出遂作亂朝廷憂之乃罷兵而棄囉兀撫寧云徙知許州加觀文殿學士明年進大學士知大名府熙寧七年復拜同中書門下平章事監修國史絳繼王安石為相請置局中書鉤考用度以均節邦計事多留滯不决踰月以疾辭位除觀文殿大學士禮部尚書知許州徙太原府拜建雄軍節度使知定州又領西太乙宫使絳乞納節遂拜金紫光祿大夫觀文殿大學士復領建雄軍節度使知河南府移鎮鎮江封康國公加開府儀同三司判大名府告老拜司空致仕薨年七十七贈太傅諡曰獻肅絳莊重有體遇事敢為與人交久而益信之喜延接士大夫始與王安石善其後頗異因數稱薦司馬光可大用云子宗師元祐中為兵部侍郎維字持國幼篤志問學以父任為將作監主簿非其好也闔門不仕宰相文彥博薦維好古耆學安冷靜退富弼帥河東辟掌機宜文字又薦為史館檢討知太常禮院祫享下禮官集議東嚮位維議以為尊祖之道禮之大者有三於廟則百代不遷於天地之祭則為配主至於祫享則位東嚮商以契周以后稷其毁廟之主皆出於太祖之後故其禮順後世太祖之上復有追崇之廟故其禮疑所以議論不一然大氐不過三義一則直推見廟最尊之祖為先即唐顔真卿韓愈以獻祖居東嚮之位是也一則以追崇之祖别廟而祭全太祖之尊即漢之太上皇魏之處士晉之府君唐之獻懿是也一則以太祖尚在昭穆虛位以待自魏晉以訖於隋唐及本朝故事是也惟崇最尊之祖既非始封有功之君親盡則毁於聖人制禮之意殆恐不然别廟而祭者雖有變禮未可遽行於今惟虛東嚮之位以待太祖於禮近可宜如祖宗故事虛東嚮之位便先是溫成皇后立廟用樂維上疏乞詔有司議廟制有不如禮者一切裁去以明陛下不私後宫専奉祖宗之意陳執中薨請諡維議以謂貴妃張氏薨治喪皇儀殿追冊位號建廟用樂此執中不忠之大者宜諡曰榮靈詔諡曰恭維言責難於君謂之恭臣之議執中正以不恭遂乞罷以祕閣校理通判涇州神宗封淮陽郡王以維為記室參軍遷直集賢院神宗遇維甚厚嘗與論天下事語及功名維曰聖人功名因事始見不可有功名心神宗拱手稱善維嘗采東平樂善之語以獻時為頴王擇妃維上疏以謂頴王卜族授室宜歷選勳望之家審擇淑哲之媛考古納采問名之義以禮成之不宜茍取華色而已遷起居注侍邇英講英宗方免喪簡默不言維上疏曰邇英閣者陛下燕間之所也侍於側者皆獻納論思之臣陳於前者非聖人之經則歷代之史也御燕閒則可以留漏刻之永對侍臣則可以極咨訪之博論經史則可以窮仁義之道成敗之原今禮制終畢臣下傾耳以聽玉音語曰時然後言陛下之言此其時也臣雖不敏請秉筆以俟遷右正言知制誥知通進銀臺司修撰仁宗實録御史吕誨等論濮安懿王稱親得罪維請追還前詔既而誨等降黜敕命不由門下封駮維言罷黜御史事關政體而不使有司與聞紀綱之失無甚於此宜追還誨等敕命由銀臺司使臣得申論議以正官法不從遂闔門待罪有㫖舉臺官維舉吕誨范純仁頴王為皇太子以維兼右庶子神宗即位除龍圖閣直學士御史中丞王陶彈擊宰相韓琦不押常朝班以為跋扈陶罷中丞為翰林學士維言宰相跋扈王法所當誅也御史中丞之言是則宰相安得無罪若其非是則御史中丞安得止罷臺職而已今為翰林學士是遷也願廷對羣臣使是非兩判遂請郡得知汝州召還修英宗實録兼侍講初英宗即位祔仁宗主而遷僖祖及神宗即位復還僖祖而遷順祖維上疏請如故語在兄絳傳為翰林學士權知開封府遷翰林侍讀學士充羣牧使孔文仲對䇿入等以直言罷黜維言陛下無以文仲為一賤士爾黜之何損臣恐賢俊由此解體忠良結舌阿諛茍合之人將窺隙而進則為禍有不勝言者矣除端明殿學士知襄州徙許州數月復除翰林學士承㫖兼侍讀學士時京師旱維上疏曰陛下憂閔旱災損膳避殿此乃舉行故事恐不足以應天變願陛下痛自責已下詔廣求直言以開壅蔽大發恩令有所蠲免以和人情後數日又上疏曰近日畿內諸縣督責青苗錢甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之際重罹此苦若夫動甲兵危士民匱財用於荒夷之地朝廷處之不疑行之甚鋭至於蠲除租稅寬裕逋負以救愁苦之良民則遲遲而不肯發望陛下自奮英斷行之過於養人猶愈於過於殺人也神宗命維草詔求直言詔出人情大悅是日乃雨兄絳入相援故事乞補外以端明殿學士龍圖閣學士知河陽坐議免行錢不合落端明殿學士踰年復職知許州進資政殿學士提舉崇福宫神宗崩維赴闕臨宣仁聖烈皇后遣使降手詔勞問維對曰治天下之道不必過求髙逺止在審識人情而已識人情不難以己之心推人之情則可見矣大凡貧則思富苦則思樂困則思息鬱則思通陛下誠能常以利民為本則民富常以憂民為心則民樂矣賦役非人力所堪者去之則勞困息矣法禁非人情所便者蠲之則鬱塞通矣推此而廣之盡誠而行之則神孫觀陛下之法不待教而自成聖德賢士聞陛下之風不煩諭而爭宣忠力矣既又言六事一曰青苗蠲嵗散之法二曰免役除寬剩之數三曰坊場依祖宗法不可添長四曰罷市易五曰斂保馬六曰禁錢幣起知陳州召赴闕除兼侍讀提舉中太一宫加資政殿大學士維言先帝以夏國主秉常受朝廷爵命而國母擅行囚廢故興兵問罪今國母死秉常復位所為恭順有藩臣禮宜復還其故地以成先帝聖恩因陳兵之不可不息者有三地之不可不棄者有五元祐元年為門下侍郎議者欲廢三經義維謂宜與先儒之說並行不必廢二年以資政殿大學士知鄧州改汝州知潁昌府告老以太子少傅致仕加太子少師後坐元祐黨降左朝議大夫再責崇信軍節度副使均州安置諸子乞盡歸其官聽父居故里許之元符初復左朝議大夫卒年八十二縝字玉汝以父任為將作監主簿復舉進士稍遷太常博士前此武臣不執親喪縝建言三年之服古今通制晉襄墨縗事出一時遂著令自崇班以上聽持服知洋州代還為殿中侍御史言參知政事孫抃保身持祿抃遂罷免陜西轉運副使薛向赴闕秉議右府輒畫㫖改賜章服縝以右府越職中書不論奏虧損國體劉永年以外戚除防禦使縝復言武臣正任以上非有勳績不許遷今遷永年何也內侍史志聰私役皇城親從布列宿衛所以奉至尊戒不虞也使宦者得私役則禁衛之嚴弛矣仁宗為罷向與永年而正志聰之罪遷侍御史英宗即位為淮南轉運使移河北㑹夏國使至報諒祚亡秉常立求封冊朝廷以上即位西人不入賀數犯邉遣縝赴西驛責問來使神宗謂執政曰朕選用韓縝得人矣改陜西轉運使移河東除直舍人院以兄絳執政改集賢殿修撰為鹽鐵副使拜天章閣待制知秦州指使傅勍夜被酒誤隨入州宅縝令軍校以鐵裹杖箠死勍妻持血衣撾登聞鼓院以訴落職分司南京秦人語曰寧逄乳虎莫逄玉汝其酷如此久之復天章閣待制為河北都轉運使知瀛州熙寧七年北敵遣泛使蕭禧議代北地界禧行命縝報聘使還除知開封府明年禧再至復命館伴與禧往河東據圖分畫卒以分水嶺為界使還除羣牧使遷右諫議大夫龍圖閣直學士官制行易大中大夫拜同知樞密院事遷知院事哲宗即位拜尚書右僕射兼中書侍郎與蔡確同秉政縝素不平確與章惇邢恕等妄貪定䇿之功誣罔太皇太后及確為山陵使縝於簾前具陳確姦狀由是東朝與外廷備知之裕陵復土確使還欲進用其屬髙遵惠又以張璡為郎官韓宗文為館職宣仁以問縝縝曰遵惠太皇太后之族璡乃璪之弟而宗文臣之姪擢任非次則是君臣各私其親也乃止縝相未期年諫官孫覺蘇轍王覿御史劉摯論縝操心深嶮才鄙望輕士大夫初不以輔相期之在先朝奉使無狀割地七百餘里以遺北敵邉人怨之不可使居相位章數十上除光祿大夫觀文殿大學士出知頴昌府移守永興軍河南府嵗餘拜武安軍節度使知太原府徙鎮奉寧知頴昌請老除中太一宫使觀文殿大學士以太子太保致仕卒年七十九贈司空縝外事莊重所至以嚴稱雖出入將相而寂無功烈厚自奉養清議非之臣稱曰昔袁安未曽以臧罪鞫人史氏以其仁心足以覃乎後昆韓億不悅攟人以小過而君子知其後必大皆盛德事也億有子位公府而行各有適絳適於同維適於正縝適於嚴烏呼維其賢哉東都事略卷五十八
