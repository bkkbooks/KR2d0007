body:
  text: 東都事略卷六十三宋王稱撰列傳四十六丁度字公雅開封祥符人也祖顗盡其家資以置書至八千卷且曰吾聚書多矣必有好學者為吾子孫父逢吉為光祿寺丞度力學有守登服勤詞學科為大理評事通判通州除直集賢院同判太常禮院上書請博延儒臣勸講道誼增置諫官切劘治體墾闢荒萊安集流庸以為殿最章獻后善之舊制監司及藩鎮辭見皆賜對仁宗初即位止令附奏度言附奏非所以防壅蔽也又作王鳯論諷章獻以檢外戚歷知湖州為京西轉運使太史上言永昌陵有白氣當徙陵以厭之度奏陵寢大事也不可輕議乃止除知制誥入翰林為學士兼侍讀學士初劉平石元孫戰沒仁宗問禦邊計度奏曰中國宜以智勝難以力克今當謹亭障逺斥堠控扼要害因上備邊十䇿遷承旨時西事未寧知樞密院宋綬私忌不給假度謂大臣給假宜如故且無使外夷窺朝廷淺深仁宗從之為羣牧使上言天聖中牧馬至十餘萬其後言者以天下無事遂廢八監陜西河東嵗市馬二萬二百尤能補京畿塞下之闕自用兵數年所市馬比常嵗特三之一請下令河東京東京西淮南籍丁壯為兵處有能蓄一戰馬者與免二丁仍不升户等以備緩急如此則國馬蕃矣久之遷端明殿學士仁宗問用人以資與才孰先度曰承平時用資邊事未平用才諫官孫甫論度此言是自求柄用也仁宗曰度侍從十五年數論天下事未嘗及其私豈有是哉因除工部侍郎樞密副使明年改參知政事居頃之衛士為變事連宦官楊懷敏樞密使夏竦於上前請使御史與宦官同於禁中鞫之不可滋蔓令反側者不自安度曰宿衛有變事關社稷此而可忍孰不可忍請付外臺窮治黨與爭於上前仁宗從竦言度遂求解政事罷為紫宸殿學士議者以紫宸非人臣所稱改觀文殿學士判尚書都省積官至尚書右丞卒年六十四贈吏部尚書諡曰文簡度性資純直不事威儀左右無姬侍喜論時事在經筵仁宗呼為學士而不名嘗問以蓍龜占應事對曰不若以古之治亂為蓍龜也仁宗出欹器以示之曰朕欲臨天下以中正對曰臣等亦願以中正事陛下在政府一日召諸子謂曰王旦為宰相十二年卒之日其子猶未官自今吾不復有請矣著邇英聖覽十卷龜鑑精義十二卷慶歷兵録五卷編年總録八卷吳育字春卿建州建安人也為人明敏徑果強學博辨舉進士甲科授大理評事知臨安諸暨二縣又知襄城縣宗室多葬襄城以中貴人典護民患其擾育請所須皆從官給非特省費民甚便之舉賢良方正䇿入三等有國以來制舉惟育入三等前此未有也除著作郎直集賢院通判蘇州加太常禮院育言禮文殘缺願詔諸儒裁定乃詔修禮書故事尚書省集議在朝則先職入省則先官官卑而職髙者常託事不至景祐中遂罷兩制清望有議而不集非所謂求至當者也乃請使異席不相壓則適中矣衆議是之為三司判官知諫院趙元昊反慢書始聞朝廷為之忿然張士遜為相即議絶和問罪時西邊弛備已久人不知兵識者以為憂元昊既稱帝還所授旌節議者皆謂宜發兵逐之育獨曰元昊雖名藩臣而乃夷狄其服叛荒忽不常宜示以不足責度外置之且其已僭名號誇其人勢必不能自削以取羞種落第可因之賜號若國主者且故事也彼得其欲宜不敢妄動然後隂敕邊臣密修戰備使年嵗之間戰守之計立則元昊雖欲妄作不能為深害矣時方鋭意於必討故皆以育言為不然其後師久無功元昊亦歸過自新仁宗為除其罪卒以為夏國主由是議者始悔不用育言而虛弊中國同修起居注遂知制誥遷起居舍人為翰林學士久之知開封府慶歷五年拜右諫議大夫樞密副使數月除參知政事章懿皇后升祔真宗廟言者請覃恩育力諫止之山東盜起仁宗遣中使察視還言盜不足慮也兖州杜衍鄆州富弼山東人甚尊愛之臣以為憂仁宗欲徙二人者育曰盜誠無足畏小人乘間以撼大臣此可慮也議遂寢育在政府與宰相賈昌朝數爭議上前上之左右與殿中人皆恐色變育論辨不已既而曰臣所爭者職也顧力不能勝矣願罷臣職不敢爭乃復為樞密副使明年竟罷以給事中知許州又知蔡州育嚴保伍之法以檢制盜賊拜資政殿學士徙知河南府又徙陜州永興軍以父喪免服除且將召之育辭以疾遂知汝州又辭以集賢院學士判西京留司御史臺分臺舊不領民事育在西京河陽之民以張堯佐裁決稽積多詣育育判於紙尾堯佐畏恐即奉行疾少愈復知陜州加拜資政殿大學士召還判尚書都省除宣徽南院使判延州夏人既納欵而並邊種落數侵為患龎籍守并州欲築堡備之育因謂約不先定而亟城則爭而受患者麟府也乃移文河東又與籍書及疏於朝不報已而夏人果犯邊殺驍將郭恩而太原將佐皆以罪去以疾求解邊事乃復以為資政殿大學士尚書左丞知河中府徙河南卒年五十五贈吏部尚書諡曰正肅有集五十卷弟充充字沖卿舉進士嘗為國子監直講兼吳王宫教授他官與宗室狎習無誨導之誼充獨以嚴見憚為宗室六針以獻一曰視二曰聼三曰好四曰學五曰進德六曰崇儉仁宗命分寫遍賜皇族英宗書之坐右授集賢校理權判吏部南曹歐陽修判流內銓胡宿之子宗堯改官有言其私者乃出修知同州充上疏言修以忠直結陛下之知若以為私則臣願與修同貶於是修復留充亦改知太常禮院張貴妃崩大臣意欲隆其禮王洙判太常寺禮院吏以印紙行文書而僚屬不知充即移開封治吏罪府不受充持之不置會溫成神主祔新廟以楊察攝太尉充獻官趙抃與充監禮仁宗又遣內臣臨視祭事內出圭瓚以灌鬯充言於察曰禮親享太廟則用圭瓉若有司攝事則用璋瓉今使有司祭溫成廟而用圭瓉是薄於太廟而厚於姬妾也請奏易之察有難色曰日色暮矣明日行事言之何益而內臣視祭者已聞之密以聞即改用璋瓉明日御史劾開封觀望不治吏罪執政疑充諷之出知髙郵軍召還為開封府推官三司户部判官知陜州移京西淮南河東三路轉運使召入為三司鹽鐵副使知制誥同知諫院熙寧初為龍圖閣直學士三年拜右諫議大夫樞密副使王韶取洮州木征逃竄充建議請委韶招誘木征授以官爵令自守岷洮領部族長為外臣不必留屯絶塞列置郡縣屈力費財居位五年拜工部侍郎樞密使逾年拜同中書門下平章事監修國史充性謹密在西府數言王安石政事非是充為相務以安靜不遣使不滋長法令隂欲變更新法之不便者乞還司馬光吕公著韓維蘇頌又薦孫覺李常程皓等十數人於是王圭忌之于時知諫院蔡確以擊搏進充素惡之初相州嘗勘劫盜為堂後吏所駁有陳安民者僉判相州懼得罪詣京師歷抵親識求救詔御史臺劾吏請屬命確雜治確捕充親戚官屬繫考鈎致充語神宗獨明其無他充數為同列所危然素多病至是疾益侵慈聖崩不能入臨力辭位不許明年除觀文殿大學士吏部尚書西太一宫使卒年六十贈司空兼侍中諡曰正憲充神采秀徹詞氣溫厚內行修飭事兄甚謹將終戒妻子無以私事干朝廷神宗對輔臣每歎其孤立云子安詩安持安詩在元祐時為諫官起居郎安持為都水使者遷工部侍郎終天章閣待制安詩子儲侔官皆至員外郎始張壞素以妖術妄説災福見儲以為福當似姚興須賴懷素之力可以王關中儲信之大觀元年因星變謀與侔起事為人所告懷素儲侔並誅死明鎬字化基密州安丘人也舉進士為廣濟軍判官從薛奎辟為秦州節度判官奎徙益州又辟知録事參軍程琳代奎奏為僉書節度判官通判夀州奎又稱鎬有廊廟材遂除開封府推官權京東益州路轉運使嵗歉民無積蓄盜賊間發鎬為平其物價募民為兵人賴以安坐失按察降知同州元昊寇延州起為陜西轉運使敵破金明寨既去議修復其城帥臣擁兵不即進而鎬止領百餘騎親督將士一月而成又嘗閲同州廂軍得材武者三百人教以強弩奏為清邊軍最驍勇其後陜西河東悉置此軍遷直史館知陜州徙江淮發運使未行擢天章閣待制河東轉運使遷龍圖閣直學士知并州進樞密直學士以右諫議大夫知成德軍入知開封府王則反于貝州以鎬為安撫使城未下命參知政事文彥博宣撫河北以鎬副之貝州平以功遷端明殿學士給事中進三司使彥博相以鎬參知政事未幾而卒年六十贈禮部尚書諡曰文烈鎬端重寡言所至安靜有體臨事不茍既卒人多傷之髙若訥字敏之并州榆次人也十嵗喪父寓家衛州因居焉舉進士授彰德軍節度推官知咸陽金堂商河三縣商河多圭田舊令或假民工種以治之若訥獨棄而不耕人以為清入為監察御史裏行再遷知諫院時范仲淹知開封府與宰相吕夷簡爭論于上前貶知饒州余靖尹洙相繼被斥歐陽修移書責若訥為諫官阿附宰相而不言若訥忿而繳奏其書且言自仲淹貶職之後臣不敢妄有營救歐陽修移書詆臣謂仲淹平生剛正通古今朝列中無與比者責臣不能辨仲淹非辜猶能以面目見士大夫出入朝中稱諫官至謂不復知人間有羞耻事仍言今日天子與宰相忤意逐賢人臣謂賢人者國家所以為治也若陛下忤意逐之臣當諫諍臣愚以謂仲淹以狂言取譴豈謂之非辜恐中外聞之誠謂天子以忤意逐賢人也請令有司召修戒諭免於惑衆修亦謫夷陵令而若訥遂為士君子所耻至謂為不肖加直史館為侍御史知雜事若訥言古者三公坐而論道今二府對才數刻豈能盡萬機之事宜賜從容如唐延英故事仁宗然之擢天章閣待制遷龍圖閣直學士以右諫議大夫為御史中丞賈昌朝與吳育數爭事明年春大旱仁宗從容問所以然者若訥引洪範故事以謂大臣不肅則雨不時若於是昌朝與育皆罷而若訥遂代育為樞密副使公議非之王則反於貝州議者多欲招降獨若訥言河朔重兵所聚今釋不討且啓亂議乃定改工部侍郎參知政事拜樞密使皇祐五年罷為觀文殿學士兼翰林侍讀學士尚書左丞判都省卒年五十九贈右僕射諡曰文莊若訥苦學善記於申韓管子之書尤其所好亦習醫書雖國醫無以過也然拘古方治疾多不效皇祐間纍詔參定尺以制鍾律論久不決若訥以漢貨泉度一寸依隨書定審天下之尺十五鍾上之有集二十卷臣稱曰烏呼士之舉指云為不可以不審也觀若訥為人非有大過特始也不能辨仲淹之無罪而繳進修書終也擠吳育去位而躐取政柄遂為清議所薄方仁宗之世求賢如不及若訥既有位於朝榮名厚祿何患不得而乃敗名撓節以僥幸一時士而至此不足以言士矣使若訥砥礪廉隅不叛名節未必無可取云東都事略卷六十三
