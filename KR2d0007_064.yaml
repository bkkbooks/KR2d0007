body:
  text: 東都事略卷六十四宋王稱撰列傳四十七謝絳字希深陽夏人也父濤太子賔客絳以父任為校書郎舉進士知汝隂縣遷光禄寺丞為祕閣校理上疏謂有宋當以土徳王天下下兩制議兩制以為太祖受終周室豈可弗遵五行之序事遂寝仁宗即位絳建議請以真宗配感生帝而翰林學士李維又以為不可尋出通判常州天聖初天下水旱蝗生河決絳上疏引洪範京房易傳陳災異之變以為陛下夙夜勤苦思有以塞時變惟是號令所發未聞有所以當天心故水未復而繼之以旱此天所以誨告陛下也夫風雨寒暑之於天時為大信也信不及於物澤不究於下則水旱為沴近制命有信宿輙改適行遽止風雨以信其可得乎今陛下朝夕左右以佞幸而進為陛下言者刻民而取利則甘御下而惜恩則悦諛言似忠而害於理忠言似逆而便於政然而為國以恩不以利取士以忠不以諛觀漢以災異䇿免三公示戒懼也陛下進用丞弼而政道未茂天時未順豈大臣輔賛不明耶陛下信任不篤耶何為干邪者易進守道者數窮政出多門俗喜由徑也伏願惻然下詔深自引咎許士大夫極言時政得失罷不急之役省無名之斂勿崇私恩更進直道宣徳流化以休息天下仁宗嘉納之為國史院編修官稍遷直集賢院以父年髙請便飬通判河南府又論唐室麗正史官之局並在大明華清宫内太宗肇修三館更立祕閣于昇龍門左親飛白題額刻賛閣下景徳中圖書寖廣又益以内帑四庫三聖數嘗臨幸親加勞問遞宿廣内有不時召人人力道術究蓺文知天子尊禮而名臣髙位繇此選也往者延燔簡編略盡詔訪舊本定正疑文有司引兩省故事别創外館以從繕冩攷校之便直舍卑喧大官衛尉供應滋削陛下未嘗迃翠華降玉趾寂寥冊府不聞輿馬之音曠有日矣議者以為慕道不篤於古待士少損於前士無延訪之勤而不自激䇿文雅漸弊甚為聖朝惜也願闢内館以恢景徳之制為開封府判官又為三司度支判官上言號令數變則虧體利害偏聼則惑聦請者務於必行守者患於不一願罷内降凡詔令皆由中書密院然後施行因進聖治箴五篇以父憂去服除擢知制誥請補外得知鄧州卒年四十六有文集五十卷蘇紳字儀甫泉州晉江人也舉進士為宜州推官稍遷太常博士舉賢良方正入等遷祠部員外郎直史館為開封府推官三司鹽鐵判官仁宗以天異地震方春而雷下詔求直言紳上疏曰星之麗天猶萬國之附王者下之畔上故星亦畔天精氣所感先示其象陛下既祇畏天誡則宜推原其本而與修其備若生民之疾苦未復郡縣之刑辟未平者願推所以拯䘏之道有位有背公懐私害直醜正相為比周不顧廉節者願思所以懲艾之術據名藩專使領有假非其人守邊防擁重兵有方略不聞者願議所以更置之宜西北諸戎久恃信好有强悍而自恣獷傲而慢上者願求所以伐其謀而制其命左右近習久處親信有狎侮而不戒恩過而患生願思所以杜其萌而柅其隙草澤庻士有負非常之才上不知而未用者願思所以觀其行而盡其能凡此數者幸留聼而察焉天者陽之氣地者隂之體其有越隂之分侵陽之政則應以變動故書曰無有作威作福害于而家凶于而國是也今天異若此得非任事之臣踰常分乎朝廷事無大小委之政府至於黜陟之柄亦或得專夫一二大臣平居之日所宜辨論官材使陛下周知在位之能否及有除擬則可以隨材而任用使進擢之人知恩出於上則威福不外分也今則不然每一官闕但閲其履歴附以比例而陛下無復有所更改競進之徒趨走權門經營㨗徑靡所不至是恩命未出於上而請託已行於下矣祖宗時擢用要官惟才是用臣下莫得而先知不牽制於一切故被擢之人感恩自厲此無他也講求之有素而大權不在於下也又雷者天之號令所以開發萌芽辟除隂害萬物須雷而解須雨而潤惟人君崇寛大順春令則應節否則動於冬今方春而雷發聲天其或者欲陛下出號令以震動天下宜及於早而矯臣下舒緩之咎凡朝廷事無巨細無内外取其先急者悉闗聖慮而振肅之不可緩也夫星變既有下畔上之象地震又有隂侵陽之證天意若曰夷狄将有畔上之釁恐陛下未悟也又以震雷警之欲陛下先事為備則患禍消而福祥至矣既又陳八事仁宗嘉納之除史館修撰擢知制誥翰林學士紳舉馬端為御史諫官歐陽脩論紳所舉非其人改龍圖閣學士知揚州父喪服除復入翰林言者又彈紳急於進取以翰林侍讀學士知河陽徙河中府未行感疾毉者誤用藥猶力疾杖之已而卒年四十八子頌自有傳葉清臣字道卿蘇州長洲人也少好學善屬文舉進士為僉書平江軍節度判官還為集賢校理通判太平州知秀州入為三司鹽鐵户部判官出知宣州景祐四年同修起居注進直史館時京師地震清臣上疏曰天以陽動君之道也地以隂静臣之道也天動地静主尊臣卑易此則亂地為之震乃十二月丙辰地震此大異也陛下憂勤庶政而災變如此必有下失民望上戾天意者頃范仲淹余靖以言事被黜天下之士結舌不敢議朝政者将二年矣願陛下深自咎責明詔郡國詳延忠直敢言之士庶幾明威降監而善應來集也出為兩浙轉運副使疏太湖盤龍匯滬瀆港入于海而民賴其利除知制誥方陜西用兵急於經費仁宗自擢清臣為龍圖閣直學士權三司使始奏編前後詔勑使吏不能欺簿帳之宂者一切刪去内東門御廚凡所呼索有司不敢問乃為合同以檢其出入焉宰相吕夷簡不恱清臣以宋庠鄭戬與清臣同年指為黨出知江寧府入為翰林學士以父䘮免或言其知兵請起守邊為宰相陳執中所不悦除翰林侍讀學士知邠州改青州永興軍復為翰林學士三司使請以河北安撫司錢平糴賈昌朝固争而罷復為翰林侍讀學士知河陽卒年五十贈右諫議大夫清臣為人爽邁遇事敢言數言天下事皆當世可施行者有集一百五十卷楊察字隐父其先成都人也舉進士為将作監丞通判宿州召試學士院改著作郎直集賢院為開封府推官同修起居注出為江東轉運使部吏頗易其年少及擿姦伏一路悚栗召為右正言知制誥有上書請罷有司糊名考試及變文格使為放軼以襲唐體者察謂防禁一潰則奔競復起文無今昔惟以體要為宗若肆其誕謾亦非唐氏科選之法議遂寝㑹晏殊為宰相察以子壻嫌換龍圖閣待制拜翰林學士知開封府以右諫議大夫為御史中丞詔舉御史因言臺屬供奉殿中廵糾不法必得通古今治亂良直之臣今舉格太密去坐細故皆所不取恐英傑之士或有所遺時御史何郯論事不得實問状察言御史故事許風聞若反被責問非所以為人主耳目之官也以事出知信州改揚州除翰林侍讀學士知永興軍加端明殿學士知益州進禮部侍郎知開封府復為翰林學士三司使以户部侍郎兼三學士提舉集禧觀進承旨踰年復拜三司使卒年四十六贈禮部尚書諡曰宣懿察七嵗始能言為文敏贍典内外制有體要吏術簡而中理有文集二十卷弟寘舉進士第一通判潤州以母憂不赴毁瘠而卒年三十一既死人多傷之尹洙字師魯河南人也兄源字子漸與洙俱以儒學知名舉進士為芮城河陽二縣僉書孟州判官又知新鄭縣通判涇州慶州趙元昊㓂邊圍定州堡大将葛懐敏發涇原兵救之源遺懐敏書曰賊舉其國而來其利不在城堡而兵法有不得而往救者且吾軍畏法見敵必赴而不計利害此其所以數敗也宜駐兵瓦亭見利而後動懐敏不能用其言是以敗死劉渙知滄州杖一卒不服渙命斬之以徇坐專殺降知密州源上書為渙論直得復知滄州范仲淹薦其材遂知懐州官至太常博士卒年五十洙少舉進士為正平簿河南府户曹邵武軍判官舉書判拔萃遷山南東道掌書記知伊陽縣王晦叔薦其材召試充館閣校勘遷太子中允范仲淹貶饒州諫官御史不肯言洙上書言仲淹臣之師友願得與俱貶貶監唐州稅復太子中允知河南縣趙元昊反陜西用兵大将葛懐敏奏起為經略判官洙雖用懐敏辟而尤為經略使韓琦所深知其後諸将敗於好水琦降知秦州洙亦徙通判濠州久之琦奏得通判秦州加直集賢院上疏曰漢文帝盛徳之主賈誼論當時事勢猶云可為痛哭孝武帝外制四夷以强主威徐樂嚴安亦以陳勝亡秦六卿篡晋為戒二帝不惡危亂滅亡之語故子孫保有天下者十餘世秦二世時闗東盜起或以反者聞二世怒下吏或曰逐捕今盡不足憂乃悦隋煬帝時四方兵興左右近臣皆隐賊數不以實聞或言賊多者輒被詰二帝以危亂滅亡為諱故秦隋之宗社數年而為丘墟矣陛下視今日之治孰與漢文威制四夷孰與孝武國家基本仁徳陛下慈孝愛民誠萬萬於秦隋至於西有不臣之國北有强大之鄰非特閭巷盜賊之勢也自敵叛命四年並邊苦數擾内地疲逺輸兵久于外而休息無期卒有乘敝而起兵法所謂雖有智者不能善其後當此之時陛下當夙夜憂懼所以慮事變而塞禍源也陛下雖樂聞過未聞以宗廟為憂危亡為懼此臣所感忿於邑而不已何者以今命令數更恩寵過濫賜予不節此三者在陛下所行爾因循不革弊壊日甚臣是以謂陛下未以宗廟為憂危亡為懼者此也夫命令者人君所以垂信於下異時民間降一命令皆竦觀之今則不能皆相與竊語以為不久當更既而信然此命令日輕於下也命令輕則朝廷不尊矣又聞羣臣有獻忠謀者陛下始甚聼焉後復一人沮之則意移矣忠言以信之不能終自絀其謀以為無益此命令數更之弊也夫爵祿者陛下所持之柄也近臣外戚内臣以及士人或因縁以求恩澤從中而下謂之内降臣聞唐氏衰政妃主擅朝結恩私黨名為斜封今陛下威柄自出外戚内臣賢而才者當與大臣公議而進之何必襲斜封之弊使大臣從之則壊陛下綱紀不從則沮陛下徳音壊綱紀忠臣所不為沮徳音則威柄輕於上且盡公不私朝廷所以責大臣今乃自以私暱撓之而欲責大臣之守不私難矣此恩寵過濫之弊也夫賜予者國家所以勸功也比年以來嬪御伶官太醫之屬賜予過厚民間傳言内帑金皆祖宗累朝所積陛下用之不甚愛惜今之所存無幾疎逺之人誠不能知内府豐匱之實但見取於民者日滋即知蓄於公者不厚臣亦知國家自西方興兵用度寖廣帑藏之積未必當為賜予所費然下民不可家至户曉獨見陛下行事頃嵗聞邊將王珪以力戰獲名馬金帛之賜則無不悦服見優人所得之過則往往憤嘆人情不可不察此賜予不節之弊也臣所論三事人皆共知近臣從諛而不言以至今日方今非獨夷狄之為患朝政日弊而陛下不寤人心日危而陛下不知臣願先正於内以正於外能使忠謀漸進綱紀漸舉國用漸充士心漸奮夷狄之患非所患也惟深察秦隋惡聞忠言所以亡逺法漢帝不諱危亂所以存日新盛徳與民更始則天下幸甚仁宗嘉納之遷知涇州又知渭州鄭戩為陜西帥遣劉滬董士廉城水洛洙奏罷之時戬已解四路而奏滬等督役如故洙屢召滬等不至遣人代之亦拒命洙乃諭狄青械以下吏戬論奏不已徙洙慶州又徙晉州遷起居舍人直龍圖閣知潞州士廉至京師上書訟洙命御史劉湜就鞫無罪乃以假公用錢與部将孫用又以為嘗自貸貶崇信軍節度副使天下莫不以為湜文致之也徙監均州酒税得疾無毉藥舁至南陽求毉疾革隐几而坐與賓客言不及其私遂卒年四十七洙博學有識度通六經尤深於春秋為文章簡而有法自西兵起洙未嘗不在兵閒而於西事尤習其詳其為兵制之説述戰守勝敗之要盡當今利害又欲訓土兵戍卒以減邊用為禦戎長久之策皆未及施為而元昊臣有文集二十七卷孫甫字之翰許州陽翟人也舉進士常從杜衍辟永興軍司錄衍為樞密副使又薦之得祕閣校理是時諸將討元昊久無功天下騷動仁宗方銳意更用二三大臣乃極選一時知名士増置諫員以甫為右正言仁宗好納諫未嘗罪言者甫嘗言宫禁事則曰所謂后者正嫡也其餘皆婢爾貴賤有等用物不宜過僭今張脩媛寵恣市恩禍漸已萌自古寵女色初不制而後不能制者其禍不可悔仁宗曰用物在有司吾恨不知爾甫曰世謂諫臣耳目官所以逹不知也若所謂前世女禍者載在書史陛下可自知也保州兵變前有告者大臣不時發之甫因力言樞密使副當得罪使乃杜衍也邊將劉滬城水洛于渭州尹洙以滬違節度將誅之大臣稍主洙議甫以謂水洛通秦渭於國家利滬不可罪由是罷洙而釋滬洙甫平生所善者也又言參知政事陳執中不知經術不可用由是仁宗難之甫遂求解職以右司諫知鄧州徙安州歴江東兩浙轉運使范仲淹知杭州多便宜行事甫曰范公大臣也吾屈於此則不得伸於彼矣一切繩之以法仲淹退未嘗不稱其賢改直史館知陜州徙晉州為河東轉運使三司度支副使擢天章閣待制河北都轉運使不行留侍讀卒年六十贈右諫議大夫甫性勁果美談論有文集七卷著唐史記七十五卷每言唐君臣行事以推見當時治亂若身履其間而聴者曉然如目見云石揚休字昌言眉州眉山人也少孤自力學舉進士髙第為同州觀察推官知中牟縣民賦役重而富人𨽻太常為樂工者六十餘人揚休皆罷之為祕閣校理以太常博士為開封府推官歴三司度支鹽鐵判官坐前在開封常失盜出知宿州復為度支判官修起居注初記注官與講讀之臣皆得侍坐邇英閣揚休奏史官當立上之左右與聞聖言不可坐仁宗從其言遷刑部員外郎知制誥初温成廟降香仁宗誤書名揚休言此奉宗廟之禮而有司承誤不以聞仁宗曰温成之廟豈可書名盖失在有司非卿言朕無由知之即命改焉揚休又奏乞増諫官七員以廣言路置五經博士以尊儒術命御史出使以防壅塞擇郡守縣令以安赤子禁奢侈以豐財用皆有益於國者卒年六十三揚休喜閑放平居飬猿鶴收畫圖以自適工於詩什世稱其才而於誥命非所長云東都事略卷六十四
