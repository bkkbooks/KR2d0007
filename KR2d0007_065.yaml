body:
  text: 東都事略卷六十五宋王稱撰列傳四十八賈昌朝字子明真定人也曽祖緯為史官官至給事中五代史有傳天禧元年昌朝獻文章于朝召試除晉陵簿國子監説書時孫奭判監一見許以公輔景祐元年初置崇政殿説書以授昌朝而天章閣侍講亦自昌朝始在經筵善稱説仁宗多所質問昌朝皆記錄刪潤以進賜名邇英延議二閣記注錄太平興國寺災以易春秋進戒因言近嵗屢災寺觀盖有所在可勿繕治以稱陛下畏天威愛人力之意西域僧以佛骨銅像來獻請加賜遣還無以所獻示外皆從之歴知制誥龍圖閣直學士判流内銓銓法縣令奉錢滿萬二千乃舉令昌朝以為法如此則小縣終不善治乃請槩舉令而與其奉如大縣權知開封府為御史中丞劉平石元孫陷西虜或誣以降議收其族昌朝言漢殺李陵母妻子陵不歸而漢悔真宗撫王繼忠家後賴其力且平事固未可知乃不果收侍講林瑀以天子即位年月傅㑹易算推吉凶昌朝疏出之初元昊反昌朝請減不急費詔令與三司合議嵗省緡錢百萬又言所以待夷狄者六事時皆用其䇿慶歴三年遂參知政事四年為樞密使五年拜同中書門下平章事集賢殿大學士居兩月除昭文館大學士元昊歸石元孫議賜死昌朝獨曰自古將帥被執多不死元孫得不死宋興以來御試制科人無第三等者惟吴育第三等自餘皆第四等並為及第自天聖六年始復置中選者不過一二人然數年之後即為美官昌朝議欲廢之吴育不可與昌朝皆論於上前由是有隙乃詔自今制科者不聽自投牒皆兩制舉焉育數與昌朝争議議者不以昌朝為直髙若訥為御史中丞乃言大臣廷争不肅故雨不時若育罷昌朝亦除武勝軍節度使同平章事判大名府初張貴妃為貴人賈氏母飬于禁中貴妃既寵幸時賈氏用事宫中謂之賈夫人而昌朝以姑事之謂之賈姑姑時臺諫論其姦近侍有進對者曰近日臺諫言事虚實相半如賈姑姑事豈有是哉仁宗黙然久之曰賈氏實曽薦昌朝也王則反貝州昌朝遣部將往討事平移鎮山南東道封安國公河決商胡屬歲饑又疫人多流棄昌朝所救活甚多徙鄭州及見留為觀文殿大學士判都省觀文殿置大學士自此始求補外復以山南東道節度使為右僕射兼侍中判鄭州辭僕射侍中乃改同平章事以母喪去召對經筵命講易出判許州移大名復請修河故道中書議歸之六塔昌朝力争不已其後河果不可塞振救瀕河水災之民全活者衆中人劉恢往還河上言河決趙征村與上姓名嫌為不祥時皆謂昌朝使之以搖當國者嘉祐元年封許國公召為樞密使仍同平章事三年諫官御史言昌朝别為客位以待宦官又宦官有矯詔者釋之而不治乃罷以鎮安軍節度使兼侍中景靈宫使又出判許州改鎮保平移大名英宗即位改鳯翔節度使加左僕射進封魏國公徙許州以疾求解將相復為右僕射觀文殿大學士判都省薨年六十八贈司空兼侍中諡曰文元昌朝博學善議論及大用不為正人所與而數有攻其結宫人宦官者有文集奏議各二十卷通紀八十卷本朝時令十二卷羣書音辨十卷有子炎徽宗時為工部侍郎臣稱曰聞之諸公長者方昌朝始見孫奭也奭以唐路隋韋處厚傳示之謂昌朝曰知此意否君異日以儒術作宰相正如此二人世以謂奭能知人然爵位固相似而其邪正則逺也盖知人之難自古而然矣宋庠字公序開封雍丘人也舉進士開封禮部俱第一與弟祁同時有名以詩賦為學者所宗謂之二宋初為大理評事同判襄州遷直史館修起居注遷右正言㑹郭皇后廢庠與諸諫官伏閣力争坐罰金景祐元年知制誥當是時制舉人與武舉雜試庠建言六科待天下異士宜設次具酒食禮之武舉人别試仁宗從其請五年仁宗欲以為同知樞密院事故事無自知制誥除者乃召入翰林為學士而以弟祁知制誥寳元二年遂拜右諫議大夫參知政事仁宗眷之厚宰相吕夷簡不悦㑹范仲淹在延安焚元昊國書不以聞而以私書復之事至朝廷羣公議之夷簡謬謂不可庠信之亟於上前乞斬仲淹夷簡徐救之時鄭戬為樞密副使葉清臣為三司使皆庠同年進士或誣以朋黨盡逐之庠得知揚州加資政殿學士移鄆州慶歴五年復拜參知政事仁宗御資政殿召兩府親䇿以時事庠獨進以為兩漢對䇿本延巖穴草萊之人臣等備位大臣自視遇如賤士非所以尊朝廷也乃請歸中書合議上奏從之後復手詔以時事詢兩府兩府皆推庠為對八年以工部侍郎充樞密使皇祐元年拜兵部侍郎同中書門下平章事集賢殿大學士遷工部尚書三年祁之子與越國夫人張氏客張彦方逰而彦方偽造敕牒為人補官論死御史奏庠不戢子弟又言庠在政府無所建明乃罷為刑部尚書觀文殿大學士知河南府徙許州河陽嘉祐三年拜樞密使同平章事封莒國公與副使程戡不協戡罷而御史言庠昬耄以河陽三城節度使同平章事判鄭州移鎮武寧改相州英宗即位封鄭國公為景靈宫使出判亳州庠所至以鎮静為治末年信愛幼子頗致物議至是御史有言勿令其子侍庠之官英宗曰庠老矣奈何不使其子隨乎請老以司空致仕卒年七十一贈太尉兼侍中諡曰元憲庠性儉約不喜聲色讀書至老不倦初名郊李淑在翰林因對言於仁宗曰宋郊姓符國號名應祀天不祥也仁宗語之更焉祁字子京與兄庠同試禮部㑹諒隂正奏名初為第一章獻皇后曰弟可先兄乎乃以郊為第一而祁為第十兄弟友愛甚篤初釋褐授復州軍事推官代還為國子監直講遷太常禮院修起居注陜西用兵調費日促祁上疏曰兵以食為本食以貨為資誠聖人一天下之歸之具也以天下取之以天下用之量入為出故天子不得私焉今左藏無積年之錢太倉無三載之儲南方冶銅匱而不發承平如此已自彫困何哉良由取之既廣用之無度也今朝廷大有三宂小有三費何謂三宂天下有定官無限員一宂也天下廂軍不任戰而耗衣食二宂也僧道日益多而無定數三宂也三宂不去不可以為國請斷自今日僧道以受戒具者且使如舊其在寺觀為徒弟者釋還為民勿復嵗度今日已後州縣寺觀留若干所僧道定若干人更不得過此數此䇿一舉可得耕夫五十萬人則一宂去矣天下廂軍不擇孱小尫弱而刺之才圖供役本不知兵亦且月費廪糧嵗費庫帛數口之家不能自庇於是相挻逃匿化而為盗者不可勝計朝廷每有夫役更籍農民以任其勞假如廂軍可驅以就役且又别給口劵復賜錢帛廣勸無益請罷天下招廂軍已在籍者許備役終身如此則中下之家悉入農桑又得力耕者數十萬則二宂去矣國家郡縣素有定官譬以十人為額則常以什二加之即遷代罪謫足以無乏今則不然一官未缺十人競逐紆朱滿路襲紫成林州縣之地不廣於前而官五倍於舊吏不可以茍進官不可以濫除請詔三班審官院諸司流内銓明立限員以為定法其門䕃之外貢舉之色實置選限稍務擇人候有闕官計員補吏則三宂去矣何謂三費一曰道場齋醮無日不有供億不可資計而皆以祝帝夀奉先烈祈民福為言令臣下不得開説臣愚以謂陛下上事天地宗廟次事社稷百神醴酪粢盛犧牲玉帛使有司端委而奉之嵗時而薦之足以竦明徳於天極介多福於黔庶何必道場齋醮希屑屑之報哉是國家抱虚以考祥小人誣神以獲利耳宜取其必不可罷者使略依本教以奉薫修則一費節矣二曰京師寺觀或多設徒卒或増置官吏衣糧所給三倍他處幄帳謂之供飬田産謂之常住不徭不役坐享齋名而又别築神祠争修塔廟皆曰不費官帑自用民財此誠不逞罔上之尤者也夫民藏於國國藏於民財不天來而由地出也役不使鬼而待人作也捨國取民其傷一焉請一切罷之則二費節矣三曰使相節度不𨽻藩要貪取公用以濟私家跡夫節相之建或當邊鎮或臨師屯公用之設所以勞衆而享兵也今則不然大臣罷黜率叨恩除取生人之資財為無功之奉飬坐縻邦用莫此為甚請自今地非邊要州無師屯不得建節已帶節度不得留近藩及京師則三費節矣臣又聞之人不率則不從身不行則不信陛下若能躬服至儉先示四方衣服醪膳無益舊規請自乘輿始錦綵珠玉不得妄費請自後宫始然後天下響應民業日豐人心不搖師役可舉雖使風行雷照飲馬西河蠢爾戎酋可翫之掌中矣次當知制誥以兄庠參知政事乃除天章閣待制庠罷亦出知夀州徙陳州還知制誥除翰林學士庠復執政改龍龍圖閣直學士遷羣牧使庠為樞密使復為翰林當張貴妃制初欲行䇿禮而祁乃以誥進妃怒抵于地曰何學士敢輕人遂落職知許州未數月復翰林侍讀學士史館修撰兼龍圖閣學士張彦方與祁子遊乃出知亳州知成徳軍請弛河東陜西馬禁聴蕃落民閒自相賣民飬馬者不得升户等又請復唐䭾慕之制居三月徙定州又言天下根本在河北河北根本在鎮定以其扼賊衝為國門户且契丹搖尾五十年習不畏人狼態猘心不能無動今䑛齶垂涎欲肆齧者惟鎮與定爾臣日夜深計以為欲兵之强莫若積穀與財欲士訓練莫若善擇将欲令人樂鬭莫若重賞而嚴罰欲賊顧望不敢前莫若使鎮重而定强今朝廷擇將練卒制財强勢反以陜西河東為先河北為後非計也夫陜西兵鋭士勇賊不能深入河東天險敵憚為㓂惟河北不然失長城之防自薊而南直視千里賊鼔而前如莞袵上行故曰謀契丹不得不先河北謀河北捨定與鎮無可議矣故臣願先入穀鎮定鎮定已足可入穀餘州列将在陜西河東有功状者得遷鎮定則鎮定重以天下久平馬益少臣請多用步兵夫閧然聚霍然去雲奔飇馳抄后掠前此馬之長也強弩巨梃長槍利刃什什相聮伍伍相縫大呼薄戰此步之長也臣料今不待馬而步可用也臣請損馬而益步故馬少則騎精步多則鬭健我能用步所長雖契丹多馬無所用之夫鎮定一體也自先帝以來為一道帥專而兵不分故定揕其胸則鎮𢷬其脅勢自然耳今判而為二其顯有害者屯砦山川要險之地裂而有之脫或一賊叩營壘則彼此不相謀誰肯任責邪臣請合鎮定為一路願以将相大臣領之無事時以鎮為治所有事則遷治定指授諸将權一而責有歸事無茍且之意䇿之上也惟陛下當安思危熟計所長必待事至而后圖之殆矣既又上禦戎七論加端明殿學士知益州代還除三司使御史中丞包拯言祁在益州多遊燕又其兄在政府乃加龍圖閣學士知鄭州初賈昌朝建議修唐書始令館職日供唐書所未載者二事附於本傳命祁與王堯臣楊察張方平為修撰又命范鎮邵必宋敏求吕夏卿為編修而以昌朝提舉昌朝舉王疇編修必以為史出衆手非是辭之昌朝罷相以丁度兼領度卒劉沆代之沆罷王堯臣代之堯臣卒曽公亮代之唐書初修而堯臣以憂去方平察相繼出外祁遂獨秉筆雖外官亦以稾自隨久之又命歐陽脩刋修分作紀志劉羲叟修律歴天文五行志将卒業而梅堯臣入局修方鎮百官表祁與范鎮在局一十七年王疇一十五年宋敏求吕夏卿並各十年刋纂紀志六十卷列傳一百五十卷至是書成祁進工部尚書踰月拜翰林學士承旨復除羣牧使卒年六十四贈刑部尚書祁将終親草遺表勸立皇嗣戒其子勿請諡勿求遺恩勿為銘誌勿修佛事其後翰林學士承旨張方平為祁請諡曰景文有文集一百卷廣樂記六十五卷祁非特文章有見於世其守邊議兵雖古名将不能過也然不至大用時論惜之吕夏卿劉羲叟附于傳吕夏卿字縉叔泉州晋江人也少以䕃補太廟齋郎閉户讀書親朋罕見其面舉進士調髙安簿又為江寧尉時修唐書以夏卿為編修官書成進直秘閣夏卿喜聚書博覧強記而於歴代史尤該洽唐自韋述等著史又有編年諸録而旁記雜説幾數百家夏卿討論是正於新書為力居多然亦好尚竒異也與修仁宗實録同修起居注遷知制誥神宗訪以政事夏卿言累朝不惜金帛講和二邊脫民鋒鏑之禍垂六十年古未有也願勿失前好久之以疾卒年五十三劉羲叟字仲更澤州晋城人也歐陽脩使河東薦其學術該博擢試大理評事趙州推官留修唐書羲叟强記於經史百家無不通曉至於國朝典故財賦刑名兵械鍾律皆知其要其樂事星歴數術尤過人嘗以春秋時變異合之以洪範災應斥古人所強合者著書十數篇視日月星辰以占國家休祥多應也唐書成授崇文院檢討未謝而卒臣稱曰唐有天下載祀三百其興衰治亂之迹必攷信於史而舊書則紀次無律懲勸不明不可以訓祁與諸儒博采舊聞作為新史於是一代之典粲然大備然其為書事雖増而失之宂文雖省而失之略此未免有是非輕信之蔽雖然能與班馬並驅則雖長於載記者有不能烏虖祁亦良史也哉東都事略卷六十五
