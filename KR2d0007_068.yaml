body:
  text: 東都事略卷六十八宋王稱撰列傳五十一富弼字彦國河南人也幼篤學有大度范仲淹見而識之曰此王佐才也懐其文以示王曽晏殊殊即以女妻之舉茂才異等授将作監丞知長水縣簽書河陽節度判官㑹郭皇后廢范仲淹争之貶知睦州弼言朝廷一舉而獲二過縱不能復后宜還仲淹以來忠言通判絳州遷太子中允直集賢院從王曽辟通判鄆州趙元昊反弼上疏陳八事且言元昊遣使求割地邀金帛使者部從儀物如契丹而詞甚倨此必元昊腹心謀臣自請行者宜出其不意斬之都市又言夏守贇庸人也平時猶不當用而況艱難之際可為樞密乎召為開封府推官擢知諫院康定元年日食正旦弼言請罷燕徹樂雖虜使在館亦宜就賜飲食而已執政以為不可弼曰萬一北朝行之為朝廷羞後使北還者云彼中罷燕如弼言仁宗深悔之初宰相惡聞忠言下令禁越職言事弼因論日食以謂應天變莫若通下情遂除其禁元昊㓂鄜延破金明延帥范雍鈐轄盧守懃閉門不救内侍黄徳和引兵先走劉平石元孫戰歿而雍守懃歸罪於通判計用章都監李康伯皆竄嶺南徳和誣奏平降賊詔以兵圍守其家弼言平自環慶引兵來援以姦臣不救故敗竟罵賊不食而死宜䘏其家守懃徳和皆中官怙勢誣人不可但已時守懃子昭序為御藥弼奏乞罷之徳和竟坐腰斬夏守贇為陜西都緫管又以入内都知王守忠為都鈐轄弼言用守贇既為天下笑而守忠鈐轄乃與唐中官監軍無異将吏必怨懼乃罷守忠不遣又言邊事係國安危不當專委樞密院乞如國初令宰相兼領仁宗從之以宰相兼樞密使為三司鹽鐵判官遷史館修撰慶歴二年改右正言知制誥契丹聚重兵境上遣其臣蕭英劉六符來求闗南地兵既壓境而使來非時中外忿之仁宗曰契丹吾兄弟之國未可棄也其有以大鎮撫之命宰相擇報聘者時敵情不可測羣臣皆不敢行宰相舉弼使契丹弼即入對便殿叩頭曰主憂臣辱臣不敢愛其死乃以弼為接伴弼開懐與語不以疎逺待之英等見弼傾盡亦不復隐其情遂去左右密以其主所欲得者告弼且曰可從從之不可從更以一事塞之弼具以聞仁宗命御史中丞賈昌朝館伴不許割地而許増歳幣以弼為樞密直學士辭不拜假資政殿學士户部侍郎使契丹既至六符館之往反十數皆論割地必不可状及見遼主問故遼主曰南朝違約塞鴈門増塘水治城隍籍民兵此何意也羣臣請舉兵而南寡人以謂不若遣使求地求而不獲舉兵未晚也弼曰北朝忘章聖皇帝之大徳乎澶淵之役若從諸将言北兵無得脫者且北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝諸臣争勸用兵者此皆其身謀非國計也遼主驚曰何謂也弼曰晋髙祖欺天叛君而求助於北末帝昬亂神人棄之是時中國狹小上下離叛故契丹全師獨克雖敵獲金帛充牣諸臣之家而壮士健馬物故大半此誰任其禍者今中國提封萬里所在精兵以百萬計法令修明上下一心北朝欲用兵能保其必勝乎曰不能弼曰勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶歳幣盡歸人主臣下所得止奉使者歳一二人耳羣臣何利焉遼主大悟首肯者久之弼又曰塞鴈門者以備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不増城隍皆修舊民兵亦舊籍特補其缺耳非違約也晋髙祖以盧龍一道賂契丹周世宗復伐取闗南皆異代事宋興已九十年若各欲求異代故地豈北朝之利也哉本朝皇帝之命使臣則有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租賦耳朕不欲以地故多殺兩朝赤子故屈已増幣以代賦入若北朝必欲得地是志在敗盟假此為辭耳朕亦安得獨避用兵乎澶淵之盟天地鬼神實臨之今北朝首發兵端過不在朕天地鬼神豈可欺也哉遼主大感悟遂欲求昬弼曰昬婣易以生隙人命脩短不可知不若歳幣之堅久也本朝長公主出降齎送不過十萬緡豈若歳幣無窮之獲哉遼主曰卿且歸矣再來當擇一授之卿其遂以誓書來弼歸復命再聘受書及口傳之詞于政府既行次樂夀謂其副曰吾為使者而不見國書萬一書詞與口傳者異則吾事敗矣發書視之果不同乃馳還都以晡入見宿學士院一夕易書而行既至遼不復求昬專欲増幣曰南朝移我書當曰獻否則曰納弼争不可遼主曰南朝既懼我矣何惜此二字若我擁兵而南得無悔乎弼曰本朝皇帝兼愛南北之民不忍使蹈鋒鏑故屈已増幣何名為懼哉若不得已而至於用兵則南北敵國當以曲直為勝負非使臣之所憂也遼主曰卿勿固執古亦有之弼曰自古惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納則不可知其後頡利為太宗所擒豈復有此禮哉弼聲色俱厲敵知不可奪曰吾當自遣人議之於是留所許増幣誓書復使邪律仁先及六符以其國誓書來且求獻納弼奏曰臣既以死拒之敵氣折矣可勿許虜無能為也仁宗從之増歳幣二十萬而契丹平時有用偽牒為僧者事覺乃堂吏為之開封按餘人而不及吏弼白宰相吕夷簡請以吏付獄且言曰必得吏乃止夷簡不恱故薦弼使契丹且變易國書欲因事罪之歐陽脩上書引顔真卿使李希烈事留之不報使還除樞密直學士懇辭不受尋遷翰林學士弼見仁宗力辭曰増歳幣非臣本意也特以朝廷方討元昊未暇與敵角不敢以死争爾其敢受賞乎三年拜樞密副使辭之愈力改資政殿學士兼翰林侍讀學士既又復除樞密副使弼言虜既通好議者便謂無事邊備漸弛敵萬一敗盟臣死且有罪非獨臣不敢受亦願陛下思契丹輕侮中原之耻坐薪嘗膽不忘修政因以告納上前而罷逾月復除前命時元昊使辭羣臣班紫宸殿門趨弼綴樞密院班乃御殿又命宰相章得象諭弼曰此朝廷特用非以使敵故也弼乃受命時晏殊為相范仲淹為參知政事杜衍為樞密使韓琦與弼副之歐陽脩余靖王素蔡襄為諫官皆天下之望弼既以社稷自任而仁宗責成於弼與仲淹望太平於朞月之閒數以手詔督弼等條具其事又開天章閣召弼等坐具給筆札使書其所欲為者遣中使二人更往督之且命仲淹主西事弼主北事弼遂與仲淹各上當世之務十餘條又自上河北安邊十三䇿大略以進賢退不肖止僥倖去宿弊為本欲漸易諸路監司之不才者使澄汰所部吏於是小人始不悦矣元昊遣使以書來稱男而不臣弼言契丹臣元昊而我不臣則契丹為無敵於天下不可許乃却其使卒臣之四年契丹來告舉兵討元昊時冊命元昊為夏國主使将行而止之以俟北使弼曰若虜使未至而行則事自我出既至則㤙歸契丹矣從之是嵗契丹受禮雲中且發兵㑹元昊伐呆兒族於河東為近仁宗問弼曰敵得無與元昊襲我乎弼曰敵自幽薊不復由河東入冦者以河北平易富饒而河東險瘠且虞我出鎮定𢷬燕薊之虚也今兵出無名契丹大國決不為此就使妄動當出我不意不應先言受禮雲中也元昊本與契丹約相左右以困中國今契丹背約結好於我獨獲重幣元昊有怨言故敵築威塞州以備之呆兒屢殺威塞人敵疑元昊使之故為是役安能合而㓂我哉或請調發為備弼曰敵雖不來猶欲以虚聲困我若調發正墮其計臣請任之敵若入冦臣為罔上且誤國仁宗乃止敵卒不動初魯人石介作慶歴聖徳詩歴頌羣臣以弼仲淹比之䕫契而詆夏竦竦怨之㑹介奏記於弼說以行伊周之事竦因傾弼等乃改伊周曰伊霍使女奴隂習介書為廢立詔草飛語上聞仁宗雖不信弼懼因保州賊平求為河北宣撫使以避之使還道除資政殿學士知鄆州兼京東西路安撫使而衍仲淹皆罷政未幾石介死讒者以介北走契丹結連起兵弼以一路兵應之罷弼安撫使且欲發介墓以觀之歳餘讒不驗加給事中知青州河朔大水民流京東弼擇所部豐稔者五州勸民出粟得十五萬斛益以官廩隨所在貯之得公私廬舍十餘萬區散處其人以便薪水官吏自前資待闕寄居者皆給其禄使即民所聚選老弱病瘠者廩之山林河泊之利有可取以為生者聼流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輒遣人以酒肉糗飯勞之出於至誠人人為盡力流民死者為大冢葬之謂之叢冢自為文祭之明年麥大熟流民各以逺近受糧而歸凡活五十餘萬人募而為兵又萬餘人仁宗遣使慰勞即拜禮部侍郎弼曰救災守臣職也辭不受王則據貝州叛齊州禁兵千人欲屠城以應之有告變者弼以齊非所部恐事泄生變㑹中使張崇訓銜命至青弼檄崇訓使馳至郡發吏卒取之無得脫者且自劾擅遣中使罪仁宗嘉之再遷禮部侍郎弼又懇辭不受遷資政殿大學士以明堂恩除禮部侍郎知鄭州徙知蔡州加觀文殿學士知河陽遷户部侍郎除宣徽南院使判并州至和二年召拜同中書門下平章事集賢殿大學士與文彦博並命宣制之日士大夫相慶於朝仁宗密覘知之歐陽脩奏事殿上仁宗具以語脩且曰古之求相者或得於夢卜今朕用二相人情如此豈不賢於夢卜也哉脩頓首稱賀仁宗弗豫大臣弗得見中外憂恐文彦博與弼等直入問疾内侍止之不可因以監視禳祈為名乞留宿内殿事皆闗白而後行禁中肅然嘉祐三年加禮部尚書昭文館大學士監脩國史仁宗悉以政事仰成宰府弼緫綱紀號令謹守典法所選用多得人天下無事號稱賢相六年丁母憂仁宗為罷春宴故事執政遇喪皆起復弼以謂金革變禮不可用於平世五遣使起之卒不從命英宗即位拜樞密使同平章事遷户部尚書初仁宗弗豫皇嗣未立人情憂恐弼與文彦博等議請蚤定儲嗣㑹仁宗康復故緩其事後韓琦以定䇿立英宗至是慈聖后還政并弼遷官制詔録其前議弼奏曰至和中臣雖泛論建儲其於陛下則如在茫昧杳冥之中未見形象安得與韓琦等等哉今陛下録臣先帝時㣲勞曷若報皇太后之大恩皇太后嘗謂臣與胡宿吴奎曰無夫孤孀婦人無所告訴其言至不忍聞臣寔痛心豈仁宗之所望於陛下哉仁宗與皇太后於陛下有天地之恩而未聞所以為報臣於陛下不過有先時議論絲髪之勞爾臣願陛下外則以仁恩道徳訓天下結人心内則以純孝恭恪奉仁宗事太后則臣雖啜菽飲水奔走陛下左右以死無悔一日韓琦進擬一二宦者䇿立有勞當遷官弼曰先帝以神器授陛下皇太后叶賛之力而此輩何功可書琦悚然有愧色却立數武弼嘗進除目英宗適震怒擲之榻下弼搢笏拾取以進曰前日陛下在藩邸時喜怒猶不可妄况今即天子位切以天子亦有怒焉出九師以伐四夷否則陳斧鉞以誅大臣今日陛下之怒不為常事除目也必以臣等有大過惡可怒者何不斬臣以謝天下英宗為之霽色温言弼猶進説不已治平二年以疾辭位拜鎮海軍節度使同平章事判河陽封祁國公神宗即位改鎮武寧進封鄭國公弼屢乞罷使相乃以為尚書左僕射觀文殿大學士集禧觀使復判河陽熙寧元年移汝州且詔入覲以足疾許肩輿至殿門神宗特為御内東門小殿見之令男紹隆入扶且命毋拜坐語從容至日昃問以治道弼對曰人君好惡不可令人窺測其意陛下當如天之鍳人隨人善惡然後誅賞從之則功罪得其實矣神宗又問以邊事弼曰陛下即位之始當布徳行惠願二十年口不言兵神宗又問為治所先弼曰阜安㝢内為先明年除司空兼侍中弼力辭復拜左僕射同中書門下平章事昭文館大學士弼既至未見有於上前言災異皆天數非人事得失所致者弼聞之嘆曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪說故先導上以無所畏使輔弼諫諍之臣無所復施其力此治亂之幾也吾不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其決不然者羣臣請上尊號及作樂神宗以久旱不許羣臣固請弼又言故事有災變皆徹樂恐陛下以同天節敵使當上夀故未斷其請臣以為此盛徳事正當以示夷狄乞并罷上夀從之即日而雨弼又上疏願益畏天戒逺姦佞近忠良神宗親書荅詔曰義忠言親理正文直茍非意在愛君志存王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也王安石始為參知政事議改法理財與神宗合意而弼不欲有所變更與安石不合多稱疾家居求退章數十上神宗将許之問曰卿即去誰可代卿者弼薦文彦博神宗黙然良久曰王安石何如弼亦黙然拜武寧軍節度使同平章事判亳州時方行青苖息錢法弼以為此法行則財聚於上人散於下且富民不願請願請者皆貧民後不可復得故持之不行而提舉常平倉趙濟劾弼以大臣格新法法行當自貴近者始若置而不問無以令天下乃除左僕射判汝州弼言新法臣所不曉不可以復治郡願歸洛飬疾許之尋請老拜司空復武寧軍節度使及平章事進封韓國公致仕弼雖家居而朝廷有大利害知無不言交趾叛以郭逵等討之弼言海嶠嶮逺不可以責其必進願詔逵等擇利進退以全王師因極言時弊請速改新法以救倒懸之急契丹來争河東地界手詔問弼弼言熙河諸郡皆不足守而河東地界決不可許官制行改授開府儀同三司故參知政事王堯臣之子同老上言至和三年仁宗弗豫其父堯臣嘗與文彦博劉沆及弼同決大䇿乞立儲嗣以其父堯臣所撰詔草上之神宗以問彦博彦博言與同老合神宗嘉之以弼為司徒元豐六年弼年八十懐不能已又上疏論治亂不出於用諛佞讜直二端而已今諛佞者競進讜直者多處外忠義之士仰室竊歎天下之敝陛下不得知而更張之恐禍亂将至益煩聖慮亦無及矣疏奏又條陳時政之失以待上問封之以付其子未幾而薨贈太尉諡曰文忠元祐初加贈太師配享神宗廟廷御篆其碑曰顯忠尚徳紹聖中章惇用事謂弼得罪先帝罷配享至靖康而復侑食于廟弼性至孝恭儉好禮與人言雖幼賤必盡敬氣色穆然不見喜愠其好善疾惡盖出於天性常言君子小人如冰炭決不可以同器若兼收並用則小人必勝薫蕕雜處終必為臭其為宰相及判河陽最後請老家居凡三上章皆言天子無職事惟辨君子小人而進退之此天子之職也君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則必交結千岐萬轍必勝而後已小人復勝必遂肆毒於善良無所不為求天下不亂不可得也弼早有公輔之望天下皆稱曰富公名聞四方遼使每至必問其出處安否忠義之性老而彌篤云子紹庭紹京紹隆紹京供備庫副使紹隆光禄寺丞皆先弼卒紹庭字徳先有家法為時所稱始以父任為祕書省正字嘗為光禄寺丞遷宗正丞出為白波輦運通判絳州建中靖國初以紹庭為河北提舉常平紹庭辭曰熙寧變法之初先臣以不行新法得罪臣不敢為此官徽宗嘉之除祠部員外郎制曰惟爾先正相予祖宗道徳勲勞竦服夷夏其冢上之木拱矣故笏可見猶當異之以比甘棠而況遺範之所在乎爾少長義方習以成性今朕命爾領職常平而乃力自貢其誠心兾不違於先志奏封來上朕用汝嘉詩不云乎惟其有之是以似之朕亦何愛典祠之清選而命汝陟焉以勸夫孝於親者往其欽哉未幾出知宿州卒年六十八有子直柔臣稱曰弼使敵之功偉矣而議者乃以活飢民為功何哉方其廷屈敵之君臣使曉然知通好用兵之利害自是兩邊無虞者幾百年其所活豈特五十萬人而已乎及踐宰府首開萬世之議抑又有社稷之功矣至於忠規激切而上不忌讒言深中而上不疑進退雍容有始有卒孔子所謂大臣以道事君者豈不然哉生而享其榮歿而配於廟為一代之宗臣有以也夫東都事略卷六十八
