body:
  text: 東都事略卷六十九宋王稱撰列傳五十二韓琦字稚圭相州安陽人也父國華終右諫議大夫琦風骨秀異弱冠舉進士名在第二時方倡名太史奏日下五色雲見左右侍從皆賀於殿上授将作監丞通判淄州再遷太常丞直集賢院監左藏庫歴開封府推官三司度支判官為右司諫時災異數見王隨陳堯佐為相以疾五日一朝數忿争參知政事韓億多私石中立好戲謔琦連疏疏論其過曰仍歳以來災異間作考天戒之所譴告則燮理之任正當其責陛下用輔臣如此外夷聞之亦有輕視中國之意如望天責之可消福應之自來則恐不可得也陛下若以退免大臣其事至重非臣下所宜輕議孰若以祖宗八十年太平之業坐付庸臣恣其毁壊乎臣職在言責可知而不言哉伏請下御史臺集百官決是非於是同日詔罷四人者又請罷内降排斥權幸王曽見琦論事切直有本末喜謂琦曰比年臺諫多畏避為自安計不則激切近名如君固不負所職諫官宜若此曽正人也琦得此益自信未幾同議雅樂琦以胡瑗阮逸鄧保信黍尺鍾律之法出私見乖戾古制奏罷之仍用王朴樂琦為諫官數稱進王曽蔡齊杜衍范仲淹等補政之闕事多施行以起居舍人知諫院趙元昊叛琦上疏曰臣聞元昊狂謀僭命不修常貢必為邊患今獻謀者不過欲朝廷選擇将帥訓習士卒修利戎甲營葺城隍廣蓄資糧以待黠羌之可勝此外憂也若乃綱紀不立忠佞不分功罪不明號令不信浮費靡節横賜無常宴衎之逸遊宫庭之奢靡受中謁之干請容近昵之僥倖此内患也且四夷内窺中國必觀釁而後動故外憂之起必始内患臣願陛下先治内患以去外憂内患既平外憂自息儻外憂已兆内患更滋臣恐國家之患非止一元昊而已擢知制誥益利歳饑為兩路安撫使為饘粥濟饑人一百九十餘萬蜀人曰使者之來更生我也元昊圍延州琦適自蜀還論西州形勢甚悉乃以為陜西安撫使至則賊引去矣初大将劉平軍敗為賊所執内侍黄徳和懼罪誣平降賊朝廷信之琦為直其寃遷樞密直學士陜西經略招討使與夏竦畫攻守二䇿琦入對請用攻䇿㑹元昊将冦渭州遂趨鎮戎軍時環慶副緫管任福奉詔計事琦盡出其兵使福撃賊授以方略令自懐逺城趣徳勝砦羊牧隆城出賊之後如未可戰即據險設伏以邀其歸福既行琦重戒之福違琦節度敗沒于好水川琦坐奪秩一等降知秦州居數月復為秦鳯經略使換秦州觀察使尋以舊職充陜西四路經略安撫招討使屯涇州琦與范仲淹在兵閒最久二人名重一時人心歸之朝廷倚以為重故天下稱為韓范初京師所遣戍兵脆懦不習勞苦賊常輕之目曰東軍而土兵勁悍善戰琦奏増土兵以抗賊而稍減屯戍内實京師又以籠竿城據衝要乞建為順徳軍以蔽蕭闗鳴沙之道又建請於鄜慶渭三州各以土兵三萬為一軍軍雖别屯而耳目相通為一視敵所不備互出𢷬之破其和市屠其落種因以招横山之人度横山隳則平夏兵素弱必不能支我下視興靈穴中兔耳章既上又與仲淹定謀益堅而元昊知不可敵歛兵不敢近塞入拜樞密副使元昊既已臣琦以為邊備不可弛請與仲淹俱出行已而仲淹參知政事以琦為陜西宣撫使使還時仁宗急於求治手詔宰相杜衍曰朕用韓琦范仲淹富弼皆中外人望有可施行宜以時上之又開天章閣賜坐咨訪時務琦條上九事大略備西北選将帥明按察豐財利抑僥倖進有能退不才去宂食謹入官繼又獻七事議稍用而小人已側目矣富弼宣撫河北還未入國門命守鄆州琦奏曰朝廷聞北敵㸃兵弼以忠義請行事畢歸奏去京師咫尺胷中籌䇿不得一陳於陛下之前而責補閒郡四方不聞其罪曽無一人為弼言者臣竊為陛下惜之前此陜西帥鄭戬以劉滬董士廉城水洛役方作而戬罷涇原守将尹洙以為非便而止之滬等猶城不已乃械繋滬等将斬之戬力争于朝琦亦以水洛未可城而滬等違令之罪不可貸朝廷卒城水洛故罷琦以資政殿學士知揚州徙鄆州又徙鎮定二州琦所至設條教葺帑廩治武庫勸農興學人人樂其愷悌定州久用武将治兵無法度至于驕不可使琦修明軍政剗除宿弊士卒犯令者一切繩以紀律恩威既信乃攷李靖兵法作方圓鋭三陣指授偏将日月教習之由是定兵冠河朔加資政殿大學士遷禮部侍郎觀文殿學士拜武康軍節度使知并州又知相州入為工部尚書三司使除樞密使冊拜同中書門下平章事集賢殿大學士遷刑部尚書昭文館大學士監修國史仁宗既連失褒豫鄂三王至和中得疾皇子未立中外憂之諌官范鎮首發其議司馬光繼之自是言者常以固天下根本為急而富弼亦屢上言歐陽脩因水災再上疏輒留中如此五六年言者稍怠琦乘間奏請立皇子一日取漢書孔光傳懐之以進曰漢成帝即位二十五年無嗣立弟之子定陶王為太子成帝中材之主猶能之況陛下之聖哉太祖為天下長慮福流至今惟陛下以太祖之心為心則無不可矣時諌官司馬光知江州吕誨皆言立皇嗣中書因将二疏以請仁宗曰朕有意久矣顧未得其人耳宗室中誰可者琦對曰宗室不接外人臣等無由知之當出自聖斷仁宗乃稱英宗舊名曰宫中嘗飬此人唯此可耳是日君臣定議扵殿上将退琦奏曰此事至大陛下今夕更思之來日取旨明日請對仁宗曰決無疑矣琦曰事當有漸容臣等議新除官時英宗方居濮王憂遂議起復泰州防禦使知宗正寺仁宗大喜琦奏曰此事既行不可中止仁宗首肯之時嘉祐六年也及命下英宗力辭仁宗聴候服除七年英宗既免喪稱疾不出琦曰宗正之命既出外人皆知必為皇子矣今不若遂正其名使知朝廷不可囘之意歐陽脩亦進曰宗正舊不領職事今有此命天下皆知陛下意矣然誥敕付閣門得以不受今若以為皇子詔書一出而事定矣仁宗以為然遂下詔英宗入居慶寧宫封琦儀國公仁宗崩英宗即位加門下侍郎兼兵部尚書進封衛國公為仁宗山陵使琦既輔立英宗其門人親客或燕坐從容語及立皇子定䇿事必正色曰此仁宗神徳聖斷為天下計皇太后母道内助之力臣子何與焉英宗暴得疾慈聖后垂簾聴政英宗疾甚有及慈聖語慈聖不樂琦與歐陽脩奏事簾前慈聖嗚咽流涕具道所以琦曰此病故耳病已必不然子疾母可不容之乎慈聖意不釋歐陽脩曰太后事仁宗數十年仁聖之徳著於天下婦人之性鮮不妬忌昔温成之寵太后處之裕然何所不容今母子之閒而反不能忍邪慈聖曰得諸君知此善矣脩曰此事何獨臣等知之中外莫不知也慈聖意稍和脩進曰仁宗在位歳久徳澤在人人所信服故一日晏駕天下禀承遺命奉戴嗣君無一人敢異同者今太后一婦人臣等五六書生耳豈足造事非仁宗遺意天下誰肯聴從慈聖黙然久之而罷後數日琦獨見英宗英宗曰太后待我無恩琦曰自古聖帝明王不為少矣然獨稱舜為大孝豈其餘盡不孝也父母慈愛而子孝此常事不足道惟父母不慈而子不失孝乃可稱耳今但陛下事之未至耳父母豈有不慈者英宗大悟自是不敢復言英宗疾既平琦請乘輿具素服出祈雨人情乃安慈聖下令還政進右僕射兼權樞密院封魏國公琦上還相事英宗詔曰卿有大徳于朕有大功于時一旦無名謝事豈不駭天下之耳目而重朕之過乎其輔朕使無忝先帝則卿之終惠也琦以陜西戍兵多而食不足請籍民丁為義勇得十四萬夏賊冦大順城又請停歳賜絶和市遣使問罪文彦博不可或舉寳元康定事琦曰諒祚狂童非有元昊智計而邊備過昔日逺甚詰之必服卒遣使齎詔而諒祚以謝表上英宗寝疾琦候起居問諒祚表云何曰一如卿言英宗崩琦奉詔立神宗拜司空兼侍中為英宗山陵使既復土琦累辭位拜鎮安武勝等軍節度使司徒兼侍中判相州辭兩鎮改淮南節度使判永興軍种諤收綏州詔廢之琦議不可乃留為綏徳城因大掲榜招横山之人㑹闗陜荐饑而止復判相州改河北安撫使判大名府時初行青苗法琦上疏論其害以為國之􅀈號令立法制必信其言而使民受實惠陛下遣使給散青苗乃令鄉村自第一等而下皆立借錢貫百三等以上更許増數坊郭户有物業抵當者依青苗例支借且鄉村上三等并坊郭有物力乃從來兼并之家也今皆得借錢每借一千令納一千三百則是官放息錢豈抑兼并濟困乏之意哉欲民信服不可得也伏惟陛下自臨御以來夙夜憂勤勵精求治況承祖宗百年仁政之後民浸徳澤唯知寛恤未嘗過擾若但躬行節儉以先天下常節浮費漸汰宂食自然國用不乏何必使興利之臣紛紛四出以致逺邇之疑哉章下制置條例司疏駮攽行天下琦又論奏不已且聽解安撫使改永興軍節度使琦固辭復判相州既至之二年告老復除永興軍節度使未拜而薨年六十八贈尚書令諡忠獻神宗自為碑文篆其首曰兩朝顧命定䇿元勲之碑配享英宗廟廷琦少有大志天下想望其風采識量宏偉臨事不見喜愠之色天資朴忠自稱安陽戇叟輕財好施家無留貲折節下士無貴賤禮之如一奨拔賢俊得人為多在相位時王安石有盛名或以為可用惟琦獨識其姦終不肯進及守相陛辭神宗曰卿去誰可屬國者王安石何如琦曰安石為翰林學士則有餘處輔弼之地則不可神宗頷之其鎮大名也魏人為立生祠相人尤愛之有闘訟者輒止之曰勿撓吾侍中也政和中追論琦定䇿之勲贈魏郡王子忠彦粹彦純彦嘉彦粹彦為吏部侍郎終龍圖閣學士純彦官至徽猷閣直學士嘉彦尚神宗女齊國公主拜駙馬都尉終瀛海軍承宣使忠彦字師朴少以父任為将作監簿復舉進士琦罷政忠彦以祕書丞召試館職除校理同知太常禮院為開封府判官三司鹽鐵判官三司使出通判永寧軍召還為户部判官琦薨服除為直龍圖閣擢天章閣待制知瀛州朝廷以夏人囚殺其主秉常用兵西方既下米脂等城砦數十夏人求救于遼遼人移書繼至㑹遣使賀遼主生辰神宗以命忠彦遂以給事中奉使遼國遼人遣趙資睦迓之語及西事忠彦曰此小役也何問為遼主使其臣王言敷燕于館言敷問夏國胡罪而中國兵不解也無失兩朝之懽則善矣忠彦曰問罪西夏於二國之好何所與乎使還時官制行章惇為門下侍郎奏給事中東省屬官封駮宜先禀而後上忠彦奏朝廷之屬執政之所行也事當封駮則與執政固已異矣尚何禀議之有詔從其請左僕射王珪為南郊大禮使事之當下者自從其所畫旨忠彦以官制駮之曰今事于南郊者大禮使既不從中畫旨處分出一時者又不從中書奏審官制之行曽未朞月而廟堂自渝之後將若之何乃詔事無鉅細必經三省而後行拜禮部尚書以樞密直學士知定州元祐中召為户部尚書忠彦議裁省中外宂費復言宫掖之費有司不得而見雖見不可盡也切見近降詔書太皇太后皇太后皇太妃每生辰及大禮恩澤四分減一仰測聖意克己為人無所不可願詔入内内侍省均節禁省之費報有司使天下曉然知陛下節用裕民自宫禁始擢尚書左丞弟嘉彦尚主改同知樞密院事遷知院事哲宗親政更用大臣言者觀望争言垂簾時事忠彦言昔仁宗親政言者亦多譏斥章獻時事仁宗惡其持情近薄下詔戒飭陛下能法仁祖用心則朝廷静矣以觀文殿學士知真定府移定州忠彦在西府以用兵西方非是願以所取之地棄而還之以息民力至是言者以為言降資政殿學士改知大名府徽宗即位以吏部尚書召拜門下侍郎忠彦陳四事一曰廣仁恩二曰開言路三曰去疑似四曰戒用兵踰月拜尚書右僕射兼中書侍郎徽宗用忠彦言數下赦令蠲天下逋責盡還流人而甄叙之有為御史諌官忠直敢言若知名之士卒見收用進左僕射兼門下侍郎封儀國公而曽布為右相多不協言事者助布排忠彦以觀文殿大學士知大名府又謂欽聖欲復廢后為忠彦罪再降大中大夫懐州居住又論忠彦在相位不應棄湟州謫崇信軍節度副使濟州居住逮復􅙉鄯又謫磁州團練副使復大中大夫遂以宣奉大夫致仕卒年七十二子治徽宗時為太僕少卿出知相州以疾丐祠命其子肖胄代之曽公亮字明仲泉州晋江人也父㑹集英殿修撰公亮以父任為大理評事舉進士遷奉禮郎知㑹稽縣累遷集賢校理兼天章閣侍講修起居注天章閣待制知制誥兼史館修撰拜翰林學士知三班院三班吏世所賤薄老胥抱文書升堂取判者髙下在口異時長官漫不省察謹占名而已公亮盡取前後條目置座側案以從事吏束手無能為後至者皆莫能易也以端明殿學士知鄭州為政有能名盜賊悉竄他境復為翰林學士知開封府居三月擢給事中參知政事加禮部侍郎除樞密使嘉祐六年拜吏部侍郎同中書門下平章事集賢殿大學士公亮精於法令多知朝廷典章臺閣故事時韓琦為上相歐陽脩參知政事琦於法令典故以問公亮文學人材以問脩百官奉法循理而朝廷治仁宗不豫中外以為憂琦請建儲副與公亮共定大議英宗即位慈聖后同聼政加中書侍郎兼禮部尚書慈聖還政加户部尚書英宗不豫即臥内奉詔立神宗為皇太子明年神宗即位加門下侍郎兼吏部尚書封英國公改兖國公熙寧初進封魯國公二年加昭文館大學士監修國史公亮初薦王安石可大用神宗以安石參知政事公亮乃隂助安石安石置條例司更張衆事公亮一切聼之於是神宗益專信任而安石以其助已深徳之御史至中書争論青苗事公亮俛首不言安石厲聲與之往反由是言者亦以安石為專公亮不與也蘇軾嘗從容責公亮不能救正朝廷公亮曰上與安石如一人此乃天也以病拜司空河陽三城節度使兼侍中集禧觀使起知永興軍召還復為集禧觀使請老以太傅侍中致仕未幾子孝寛僉書樞密院事迎公亮就飬西府薨年八十贈太師中書令配享英宗廟廷諡曰宣靖恩禮視韓琦御篆其碑首曰兩朝顧命定䇿亞勲之碑神宗嘗語輔臣曰公亮謹畏周密内外無閒言受遺輔政有始有卒可方漢張安世然公亮性吝嗇殖貨至鉅萬持禄固寵為世所譏子孝寛孝寛字公綽少好學為人詳密以䕃為將作監主簿知桐城咸平二縣除祕閣校理遷樞密院都承旨承旨用文臣自孝寛始拜龍圖閣待制為羣牧使遷龍圖閣直學士北朝遣使請代北並邉之地神宗遣孝寛按視乃奏曰國家待逺人恩與信也恩不可使濫信不可使失茍細事不問将有大於此者宜如故便拜樞密直學士僉書樞密院事尋丁外艱服除以端明殿學士知河陽又知鄆州鄆有孟子廟而無封爵孝寛請於朝得封鄒國公配享孔子廟召為吏部尚書元祐初以資政殿學士知潁昌府久之復召以吏部尚書召還道卒年六十六臣稱曰仁宗皇帝在位四十二年所用之相莫非天下偉傑盖晚而相琦屬以大事柱石之力以扶持大厦鈞衡之平以進退百官用能光輔三宗咸有一徳雖伊尹周公何以過也公亮勲亞於琦而昧於潔身之義懐禄不去君子譏之忠彦繼世宰相孝寛亦位宥密盛矣東都事略卷六十九
