body:
  text: 東都事略卷七十宋王稱撰列傳五十三王堯臣字伯庸應天府虞城人也都官員外郎瀆之子而翰林學士洙之猶子也洙字原叔性彊敏學問過人自六經史記百氏之書至於圖緯隂陽五行律歷星官算法訓故字書無所不通舉進士為舒城尉坐事免官久之調富川簿晏殊留守南京薦其才為府學教授召為國子監直講史館檢討天章閣侍講直龍圖閣慶歷中小人有不便大臣執政者欲排去之未知所發而宰相杜衍子壻蘇舜欽坐進奏院祠神㑹為御史所彈洙與坐客貶知濠州居久之復召為檢討侍講充史館修撰拜知制誥是時諸儒定雅樂洙與胡瑗更造鐘磬而無形制容受之别既成率不可用夏竦卒諡文正劉敞以竦行不應諡改諡文獻洙曰此僖祖諡也前有司諡王溥為文獻章得象為文憲字雖異而音同皆當改於是太常更諡竦文莊而溥得象皆易諡又言天下田稅不均請以千步開方為法班之州縣以均其稅拜翰林學士以兄子堯臣參知政事改侍讀學士兼侍講學士時選諫官御史有執政之臣當薦舉者皆以嫌不用洙以謂士飭身厲行而大臣薦賢以報國以嫌置之是疑大臣而廢賢材不可卒年六十所著易傳十卷雜文千餘篇子欽臣元祐中為吏部侍郎堯臣舉進士第一為將作監丞通判湖州召試以著作佐郎直集賢院知光州除三司度支判官再遷右司諫郭皇后廢居瑶華宫有疾仁宗頗疑之方后廢時宦者閻文應有力及后疾文應又主監醫后且死議者疑文應有姦謀堯臣請付其事御史考按虛實以釋天下之疑不報后在殯有司以歲正月用故事張鐙堯臣言郭氏幸得蒙厚恩復位號乃天子后也張鐙可廢仁宗遽為之罷權知制誥遷翰林學士元昊反西邊用兵以為㳂邊安撫使上言故事使者所至輒詔存問官吏將校而不及民自元昊反三年于今關中之民不勝雕敝宜有以勞來之仁宗從其請降詔俟賊平蠲其租賦二年又言陜西二十萬兵分屯四路不足以自守涇原最為要害處請萬人以屯渭州以制山外如此賊不敢輕出犯塞也自好水川失利韓琦降知秦州范仲淹亦以擅答元昊書降知耀州堯臣言此兩人天下之選也其忠義智勇名動夷狄不宜以小故置之又薦种世衡狄青有將帥材明年葛懷敏敗涇邠以東皆閉壘自守仲淹自將慶州兵捍賊始引去仁宗思其言乃復命使陜西而以琦仲淹為招討使堯臣曰陛下復用范仲淹韓琦幸甚然將不中御兵法也願許以便宜從事仁宗以為然因言諸路主帥可罷經略副使以重將權而偏將見招討使以軍禮置德順軍於籠竿城廢涇原等五州營田以其地募弓箭手堯臣使還至涇州而德勝寨兵迫其將姚貴閉城叛堯臣止道左解裝為榜射城中以招貴且發近兵討之初吏白曰公奉使且還歸報天子爾貴叛非公事也堯臣曰貴土豪也頗得士心然初非叛者今不乘其未定速招降後必生事為朝廷患貴果出降明年為三司使時入內都知張永和建議欲收民房錢什之三以助軍費堯臣言於仁宗曰此唐德宗所以致朱泚之亂也䕫州路漕臣請鹽井歲課十餘萬緡事下三司堯臣以為上恩未嘗及逺人而反浚取厚利適所以斂怨也皆罷之求解計事以翰林學士承旨兼端明殿學士為羣牧使皇祐三年以給事中充樞密副使堯臣持法守正務裁抑僥幸至有鏤匿名書傳之京城者仁宗信之益不疑而堯臣益奮厲狄青以軍功起行伍居大位而士卒多屬目而青頗有自得色堯臣與青言古將帥起微賤而富貴而不能保首領者可以為鍳戒青稍沮喪至和中拜户部侍郎參知政事進吏部卒年五十六將終有遺奏勸仁宗以早擇宗室之賢者為皇嗣贈左僕射諡曰文安堯臣典內外制十年文詞溫潤得王言體有文集五十卷元豐三年堯臣子水部員外郎同老上言至和中仁宗不豫內外寒心者纍月先臣參預朝政宰相文彥博富弼等數於上前陳宗社大計國家根本天啓先臣之心知英宗皇帝少嘗飬育宫中遂與彥博弼等於仁宗前忘身為國不顧忌諱求立為嗣盡忠納說反覆數四未許閒又與同列各求罷免避位以兾開納仁宗感悟遂許英宗為嗣神宗以問彥博彥博言與同老合神宗嘉之乃加贈堯臣太師改諡曰文忠以同老為祕閣校理孫沔字元規越州㑹稽人也中進士補趙州司理參軍為人明敏果敢有材稍遷監察御史裏行景祐元年章獻皇后服未除而禮官請用冬至日冊后沔奏請俟祥禫别擇日上書李安世被劾沔又奏請勿治出知衡山縣沔上書言時事以切直貶監衡州酒稅移通州知處州遷監察御史又知楚州所至皆有能迹召為右正言又有直名遷提㸃兩浙刑獄陜西轉運使居兩月即以天章閣待制為都轉運使又數月移知慶州三司所給特支物惡而估直髙軍人有語而優戲及之沔曰此朝廷特支何敢妄言搖衆亟命斬之諸將為請猶杖配嶺南明日給特支無敢歡者遷龍圖閣直學士又遷樞密直學士知明州移知秦州仁宗勉以邊事對曰秦州不足憂陛下當以南方為憂明日官軍以敗聞遂以沔為荆湖江西廣南安撫使未幾副狄青宣撫賊平遷給事中知杭州召拜樞密副使契丹使請觀太廟樂仁宗以問宰相對曰恐非祠享不可習也沔曰臣請以理折之乃謂使人曰廟樂之作皆本朝所以歌咏祖宗功德也使人如能留助吾祭乃可以觀之仁宗從其議使遂不敢復請張貴妃薨追冊為皇后命沔讀冊故事正后翰林學士讀冊沔既位右府力辭之且曰陛下若以臣沔讀冊則可以樞密副使讀冊則不可遂求罷職以資政殿學士知杭州沔在杭貪縱不法所刺配人以百數及去即竊其案後有訴者無以自解遷大學士移知青州又遷觀文殿學士知并州笞繫罪人不以法為御史彈奏按驗如實乃責寧國軍節度副使復光祿卿分司南京㑹恩除知濠州以禮部侍郎致仕起為資政殿學士知河中府又以為觀文殿學士知延州道卒年七十一贈兵部尚書諡曰威敏田況字元均其先京兆人也後徙居信都石晋之亂祖行周陷于契丹景德初契丹內寇以所掠數百人屬其父延昭悉縱之因遁歸官至太子率府率況舉進士又舉賢良方正為太常丞通判江寧府陜西用兵從夏竦辟為經略判官擢直集賢院諸將悉兵擊賊況極言其不可乃止又言所以治邊者十四事仁宗多見聼用還為右正言修起居注知制誥陜西宣撫副使除龍圖閣直學士知成德軍徙秦州進樞密直學士知渭州從益州自李順王均之亂蜀守皆得便宜決事雖或小罪并其家內徙流離道路失所者頗衆況察其非甚罪釋之又聼斷之明蜀人以比張詠遷給事中召為御史中丞未至復為樞密直學士權三司使既而又以為龍圖閣學士翰林學士況約景德㑹計録以今財賦所入多於景德而其出又多於所入著為皇祐㑹計録上之兾以悟上庶更立輕制使民充實而縣官有餘用也除禮部侍郎三司使至和元年擢樞密副使嘉祐二年拜樞密使以疾乞免除尚書左丞觀文殿學士兼翰林侍讀學士提舉景靈宫遂以太子少傅致仕卒年五十九贈太子太保諡曰宣簡況為人寬厚明敏與人若無不可而非義不可干也於天下事小利近功則置而勿論所及必朝廷先務而可以利民者嘗著好名朋黨二論有奏議三十卷程戡字勝之許州陽翟人也擢進士補涇州觀察推官稍擢為侍御史知諫院以天章閣待制為陜西都轉運使徙知渭州遷樞密直學士知瀛州契丹使過稱疾求小幘見戡不許曰疾則可毋相見相見宜如禮北使竟不能屈進端明殿學士知益州明年召還為給事中參知政事以宰相文彥博親嫌遷禮部侍郎為樞密副使數與宋庠爭議諫官御史兩非之罷為吏部侍郎觀文殿學士兼翰林侍讀學士同羣牧使未幾拜宣徽南院使判延州英宗即位加安武軍節度使橫山酋豪請以兵乘塞而自以其屬取靈夏歸中國戡奏言諒祚數悖慢而多殺戮人人離心今其酋豪如此可許之時英宗不豫大臣重生事不從戡年七十告老十數不許復以疾請乃許至同州卒年七十七贈太尉諡曰康穆戡久分帥閫號習邊事然無他智略折節交宦者君子譏之東都事略卷七十
