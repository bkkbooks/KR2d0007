body:
  text: 東都事略卷七十三宋王稱撰列傳五十六包拯字希仁廬州合肥人也舉進士以大理評事知建昌縣辭以親年髙改和州管庫而親不欲去鄉里遂解官就養及親亡廬墓側終喪不忍仕久之知天長縣有訴盜割牛舌者拯曰第殺而鬻之俄有告私屠牛者拯曰已割其舌矣非私殺也盜色變遂引伏徙知端州入為監察御史建言國家取士用人不得實歲賂戎狄非禦戎之䇿又言諸路轉運加按察使之名以苛察相尚奏劾官吏更倍於前皆捃托細故使吏不自安詔為罷之使契丹敵之典客曰雄州開便門欲誘納叛人刺候疆事邪拯曰誠欲刺之自有正門何必便門也此豈問涿州門邪敵有沮色為三司户部判官出為京東轉運使改直集賢院徙陜西路又徙河北入為三司户部副使奏罷斜谷務造船材木十萬及罷七州河橋竹索數十萬奉使河北言牧馬占邢洛趙三州沃壤萬五千頃悉請以豫民事多施行擢天章閣待制知諫院張堯佐挾貴妃以請自三司使拜宣徽節度景靈羣牧四使拯上疏切諫語在堯佐傳卒奪其宣徽景靈二使拯數論斥大臣請罷一切內降又録唐魏鄭公三疏請置座右及别條七事言明察聽納辨别朋黨愛惜人才不主先入之説蕩去疑法條責臣下牽録微過其論甚美除龍圖閣直學士復為河北轉運使知瀛州除放一路所負回易公使錢十餘萬仍奏請諸州毋得回易公使錢徙揚廬二州廬即拯鄉里也親黨有犯法者拯無少貸焉坐失保任降知池州徙江寧府召知開封府舊制訟牒令知牌司收之於門外拯使徑至庭下辨曲直吏民不敢欺京師大水拯以勢家多置園第惠民河上歲久湮塞遂盡毁去中貴人偽增地契步數者拯奏劾之權貴為之斂迹嘉祐三年除右諫議大夫御史中丞上疏請立皇嗣曰東宮虛位日久天下以為憂羣臣數以為言而陛下持久不決何也夫萬物皆有根本而太子者天下根本也根本不立禍孰大焉仁宗曰卿欲誰立拯曰臣乞陛下豫建太子者為宗廟萬世計耳陛下問臣誰立是疑臣也臣行年六十且無子非徼後福者仁宗喜乃曰當徐議之拯又上疏陳教養宗室之法責諸路監司聽御史府自舉屬官諫官御史不避二府薦舉兩制得至執政私第減一歲休假日皆施行之張方平為三司使拯攻罷之而除宋祁拯又擊祁祁罷遂除拯三司使歐陽修疏拯所謂牽牛蹊田而奪之牛罰已重矣又貪其富不亦甚乎拯家居避命者久之六年拜禮部侍郎樞密副使七年終于位年六十四贈禮部尚書諡曰孝肅拯為人不茍合未嘗偽辭色以恱人平居無私書故人親黨亦皆絶之人多憚其方嚴仕已通顯奉已儉約如布衣時少為劉筠所知筠無子為奏其族子為後而請還其所沒田廬有奏議十五卷吳奎字長文濰州北海人也年十七舉進士既冠調古田簿廣信軍判官宦者楊懷敏增廣北邊屯田至奪民榖地無敢抗之者奎上書論其不便知保州王果亦屢爭之懷敏使人訟果它事奎為果辨其誣果遂得免改大理寺丞僉判武寧軍監京東排岸司時衛士夜盜入禁中楊懷敏當宿直而得罪輕奎言陛下私近幸而屈公法臣竊為陛下惜之再遷殿中丞舉賢良方正對䇿入等擢太常博士通判陳州加直集賢院改起居舍人同知諫院奎勸仁宗禁切左右姦佞內東門捉獲賂遺禁中物下開封府劾而府尹用內降釋之奎劾其罪尹坐黜御史先事論赦書中語詰所從來奎奏言御史許風聞言事事有非實則當容之若窮其主名是後誰敢以事告于陛下者是自蔽其耳目也論郭承祐以舊恩不當為宣徽使內臣何誠用石全育皆左右私謁之害者不當用為御藥悉罷之御史唐介劾宰相文彥博事連奎彥博罷相奎亦出知密州徙兩浙轉運使久之同修起居注遷知制誥奉使契丹遇其主加稱號邀使者入賀奎自以使事有職不為往比還中道與北使遇北人衣服以金冠為重紗冠次之而使人輒欲以紗冠邀漢使盛服奎不許而殺其禮見之坐是黜知壽州至和三年大水奎上疏曰陛下即位三十四年而儲嗣未建災沴之發乃天地祖宗以警陛下也不然陛下無大過朝廷無甚失而天惟降災何邪臣願陛下早建儲嗣以繫天下之心拜翰林學士知開封府以翰林侍讀學士知鄆州復為翰林學士知開封府遂拜右諫議大夫樞密副使英宗即位再遷禮部侍郎於是奎辭英宗曰朕以卿嘗有建儲之言也以父喪免神宗即位復拜樞密副使踰月拜參知政事神宗嘗與奎言追尊濮王事奎對曰仁宗於先帝有天地之恩不可忘也追尊事誠牽私恩神宗深然之已而王陶論韓琦曽公亮不押文德殿班以為跋扈奎亦上疏言陶險躁摧辱大臣神宗欲除陶翰林學士奎固執不可陶亦上疏詆奎阿附宰相陶出知陳州奎亦以資政殿大學士户部侍郎知青州司馬光言奎名望素重今為陶罷奎其餘大臣皆不自安各求引去陛下新即位若舉朝大臣紛紛盡去則於四方觀聽非宜神宗乃召奎供職謂曰成王豈不疑周公邪神宗嘗對輔臣稱王安石之賢先帝召之不起今又力請郡何也曽公亮對曰安石文學器業自宜用世請郡必以疾也奎對曰安石當仁宗之世嘗議刑名不當有旨釋罪不肯入謝意以為韓琦沮抑故爾公亮曰安石輔相才也吳奎此言熒惑聖聽奎曰臣見安石臨事施設自用護前所為迂濶萬一用之必紊亂綱紀曽公亮熒惑聖聽臣奎不熒惑聖聽奎尋出知青州卒年五十八贈兵部尚書諡曰文肅奎性強記博識百家歷代史傳記律令無所不覽少時甚貧晚貴以錢二百萬置義莊以周親戚朋友之貧者死之日家無餘財諸子至無屋以居當世稱之趙抃字閲道衢州西安人也少孤貧舉進士為武安軍節度推官有偽造印者吏以為當死抃曰造在赦前而用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死監潭州糧料院歲滿知崇安縣徙通判宜州以母喪廬于墓三年不宿于家終喪起知海陵江原二縣還通判泗州入為殿中侍御史彈劾不避權幸京師號鐵面御史其言常欲朝廷别白君子小人以謂小人雖小過當力排而絶之後乃無後患君子不幸而有詿誤當保持愛惜以成就其德故言事雖切而人不厭溫成皇后方葬始命參知政事劉沆監護其役及沆為相而領事如故抃論其當罷以全國體復言宰相陳執中不學無術且多過失章二十上執中卒罷去王拱辰奉使契丹還為宣徽使抃言拱辰平生所為及奉使不法事命遂寢言樞密使王德用翰林學士李淑不稱職皆罷去至和中仁宗不豫而皇子未定抃疏請擇宗室賢子弟教育於宮中封建任使以示天下大本已而求郡得知睦州甚有惠政移梓州路轉運使未幾移益遷侍御史召為右司諫宋庠為樞密使選用武臣多不如舊法至有訴於上前者抃陳其不可陳升之除樞密副使抃與唐介吕誨范師道同言升之交結宦官進不以道章二十餘上即居家待罪二人皆相次去位抃與言者亦罷得知虔州虔州盜賊號難治抃變通鹽法疏鑿贛石民賴其利召知御史雜事改三司度支副使為天章閣待制河北都轉運使前此有詔募義勇州郡不時辦官吏當坐者八百餘人抃被旨督其事奏言河朔頻歲豐熟故募不如數請寬其罪以俟農隙從之坐者得免而募亦隨足遷龍圖閣直學士知成都府抃前使蜀時言蜀人有以妖祀聚衆為不法者其首既死其為從者宜特黥配及為成都適有此獄其人皆懼意抃必盡用法抃察其無他曰此特坐樽酒至此耳刑其為首者餘皆釋去蜀人歡服會榮諲除轉運使陛辭英宗面諭曰趙抃為成都中和之政也神宗即位召知諫院及謝神宗謂曰聞卿匹馬入蜀以一琴一龜自隨為政簡易亦稱是邪抃知神宗將用其言即上疏論吕誨傅堯俞范純仁呂大防趙瞻趙鼎皆骨鯁敢言久遣不復無以慰搢紳之望神宗納其説郭逵除僉書樞密院事公議不允抃力言之即罷居三月擢右諫議大夫參知政事抃感激思奮面議政事有不盡者輒欲啓聞神宗手詔嘉之會王安石用事下視廟堂如無人因爭新法怒目同列曰公輩坐不讀書耳抃折之曰君言失矣如臯夔稷契之時有何書可讀邪安石默然抃與安石議論多不協既而司馬光辭樞密副使臺諫侍從多以言事求去抃言朝廷事有輕重體有大小財利於事為輕而民心得失為重青苖使者於體為小而禁近耳目之臣用捨為大今不罷財利而輕失民心不罷青苖使者而輕棄禁近耳目去重而取輕失大而得小非宗廟之福臣恐天下自此不安矣言入即求去熙寧三年以資政殿學士知杭州州故多盜聞抃性寬大細民多駢聚為盜抃捕獲其情重者黥配他州盜遂遁去徙青州時山東旱蝗青獨多麥蝗將及境遇風退飛墮水而盡進大學士知成都府劔州民造符牒度僧聚衆二百人告者以為有異謀捕得獄具抃不畀法吏以意決之處其首以私造度牒餘皆得不死喧傳京師謂為脫逆黨朝廷取其獄閲之卒無以易也茂州蕃部蜂聚境上遣吏捕逐皆乞降願殺婢以盟抃使喻之曰人不可用用三牲可也使至已縶婢引弓將射心取血聞抃命歡呼以聽訖事不殺一人移越州吳越大飢民死者過半抃出官廪平其價以糶次諭富人出粟而以家資先之民樂從焉下令修城使民食其力故越人雖飢而不怨復知杭州杭旱與越等其民尤病既而朝廷議欲築其城抃曰民未可勞也罷之告老以太子少保致仕退居於衢有溪石松竹之勝與山僧野老遊不復有貴勢也居六年卒年七十七贈太子少師諡曰清獻抃和易長厚氣貌清逸人不見其喜愠年四十九即不御內自號知非子為吏誠心愛人所至崇學校禮師儒民有可與與之獄有可出出之治虔與成都尤為世所稱道云子㞦亦篤行君子也嘗為御史論事知治體後為太僕少卿以卒唐介字子方荆南人也舉進士為武陵尉又為沅江令遷著作佐郎知任丘縣通判德州為御史裏行時造龍鳳車于啓聖院內出珠玉為嚴飾介言此太宗神御所在不可慢况為後宮竒靡之器哉神宗即令徙出三司使張堯佐一日除宣徽節度景靈羣牧四使介與諫官包拯等力爭又請御史中丞王舉正留百官班卒奪堯佐宣徽景靈二使居頃之復除宣徽使介獨爭之不能得求全臺上殿不許自請貶亦不報於是劾宰相文彥博知益州日作聞金奇錦因中人入獻宫掖因此為執政昨除張堯佐宣徽節度使臣纍論奏面奉德音謂是中書進擬以此知非陛下之意蓋彥博顯用堯佐隂結貴妃外陷陛下有私於後宫之名內實自為謀身之計諫官吳奎與彥博相為表裏謂彥博有宰相才自彥博獨專宰政凡有除授多非公議乞罷彥博而相富弼仁宗怒甚却其奏不視且言將貶介介曰臣忠義憤激雖鼎鑊不避也仁宗急召二府以奏示之曰介言彥博因貴妃得執政此何言也介面質彥博曰彥博宜自省即有之不可隱彥博拜謝不已樞密副使梁適叱介下殿即貶介春州别駕御史中丞王舉正修起居注蔡襄皆言貶介太重會仁宗亦中悔明日改英州别駕又明日彥博罷吳奎亦黜而介自是以直聞天下尋徙監郴州稅通判潭州復召為殿中侍御史他日介奏曰臣繼今言不行必將固爭爭之急或更坐黜是臣重纍陛下願聽解言職乃除直集賢院開封府推官出知揚州歷江東轉運使江淮發運使三司度支副使除天章閣待制知諫院一日仁宗與介語及諫諍事且曰朕向用張堯佐而言者指言用堯佐必有明皇播遷之禍朕果用之豈遂如明皇播遷乎介曰用堯佐未必播遷使陛下播遷則更不及明皇蓋明皇有肅宗興復社稷陛下安得有肅宗乎仁宗變色徐曰此事與宰相商量久矣御史中丞韓絳劾宰相富弼弼家居求罷絳亦待罪介與王陶連奏絳以險言中傷大臣舉措顛倒不足以表率百司絳坐黜陳升之除樞密副使介與趙抃王陶吕誨論升之姦邪交結中人進不以道不可大用介凡九奏卒罷升之介亦出知洪州明年為龍圖閣直學士河北都轉運使徙瀛州英宗時召為御史中丞居數日又以為龍圖閣學士知太原府神宗即位遷給事中權三司使遂拜參知政事神宗亦欲用翰林學士王安石為參知政事以問執政曽公亮因薦之介曰安石不可大任神宗曰卿謂安石文學不可任邪經術不可任邪吏事不可任邪介曰非謂此也安石好學而泥古議論迂闊若使為政恐多所變更必擾天下退至中書謂公亮曰安石果用天下困擾必矣時執政嘗因進除目神宗久之不決既數日乃曰朕已謀之於王安石矣介曰此小事也陛下不以付大臣况大事乎中書政事豈可決可否於翰林學士也未幾安石參知政事奏言中書處分事用劄子皆言奉聖旨不中理者什常八九若止令中書自出牒不必稱聖旨介曰安石不欲稱聖旨則是政不自天子出也使執政皆忠賢猶為人臣擅命義亦難安或非其人豈不害國初安石議謀殺人傷者許首服以律案問欲舉法坐之得免所因罪介數與安石爭論於上前介曰此法天下皆以為不可首獨曽公亮王安石以為可首安石曰以為不可首者皆朋黨也安石辨益堅介不勝憤悶疽發背而卒介為人簡伉以敢言見憚神宗謂其先朝遺直也故大用之既卒贈禮部尚書諡曰質肅子淑問神宗以其世家擢為御史甚有直名義問終集賢殿修撰臣稱曰仁宗深仁大度與天地並舉天下是非付之臺諫其所進退宰相皆取天下公議臺諫是則黜宰相宰相是則黜臺諫唐介之論彥博若其言不至於大訐則彥博去位而介亦安於職矣惟其訐乃所以見黜也且彥博雖有過宰相也使廷辱宰相而不問則於眷禮大臣之道有所未盡故斥介以慰彥博介雖訐臺諫也或偏信大臣而抑臺諫則於聽言之美為有愧故罷彥博而行介之言使之俱無怨焉烏乎忘已以用人虛心而從諫後之君人者當以仁宗為法東都事略卷七十三
