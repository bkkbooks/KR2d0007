  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0007_WYG_074-1a, image: WYG0382/WYG0382-0477a.png}
body:
  text: 東都事略卷七十四宋王稱撰列傳五十七張方平字安道宋城人也少頴悟絶人凡書一覽終身不再讀宋綬蔡齊見之以為天下竒才也共以茂才異等薦之中選為校書郎知崑山縣復舉賢良方正能直言極諫又中選遷著作佐郎通判睦州時趙元昊欲叛而未有以發則為嫚書求大名以怒朝廷規得譴絶以激使其衆方平以謂朝廷自景德以來既與契丹盟天下忘備將不知兵士不知戰民不知勞蓋三十年矣若驟用之必有喪師蹶將之憂兵連民疲必有盜賊意外之患當含垢匿瑕順適其意使未有以發得歲月之頃以其閒選將厲士堅城除器為不可勝以待之雖元昊終於必叛而兵出無名吏士不直其上難以決勝小國用兵三年而不見勝負不折則破我以全制其後必勝之道也是時士大夫皆欲發兵誅之惟方平與吳育同不果用其議遂決計用兵天下騷動方平上平戎十策大略以宜屯重兵河東賊入寇必自延渭而興靈巢穴之守必虛我師自麟府度河不十日可至此所謂攻其所必救形格勢禁之道也宰相吕夷簡見之謂宋綬曰君能為國得人矣召對除直集賢院遷知諫院時夏人寇邊王師挫宰相張士遜嘗建言軍旅之事樞密院任其咎以故王鬷罷知院事而中書自若也方平援典故請政事總於中書以通謀議仁宗然之遂以宰相兼樞密使時夏竦為四路帥盡護諸將四路禀復事失機㑹方平請罷竦總帥使四路各自為守及慶歷元年西方用兵蓋六年矣方平上疏曰陛下猶天地父母也豈與犬豕豺狼較勝負乎願因赦書招徠夏寇令邊臣通其善意仁宗喜曰此朕心也是歲赦書開諭如方平意自是元昊通好而西師解嚴修起居注召試知制誥拜翰林學士遷御史中丞初唐詢為御史以親喪免服除還故職適與宰相賈昌朝親嫌參知政事吳育用故事罷詢而方平輒奏留詢因譖育育卒罷為翰林學士三司使前三司使王拱辰請𣙜河北鹽既立法矣而未下方平見仁宗問曰河北再𣙜鹽何也仁宗曰始立法非再也方平曰周世宗𣙜河北鹽犯輒處死太祖征河東還父老泣訴願以鹽課均之兩稅而弛其禁今兩稅鹽錢是也豈非再𣙜乎仁宗曰卿語宰相力罷之方平曰法雖未下民已户知之當直以手詔罷之不可自有司出也仁宗大喜命方平密撰手詔下之河朔父老相率拜迎於澶州為佛老㑹者七日以報上恩加端明殿學士慶歷中衛士為變貴妃張氏有扈蹕功樞密使夏竦倡言講求所以尊異貴妃之禮宰相陳執中不知所為方平見執中言漢馮婕妤身當猛獸不聞有所尊異且皇后在而尊貴妃古無是禮若果行之天下謗議必大萃於公執中聳然從其言而罷㑹三司判官楊儀以請求得罪事連方平出知滁州未幾復以端明殿學士知江寧府加龍圖閣學士徙知杭州以母喪服除判流內銓建言畿內稅重非所以示天下是歲郊赦減畿內稅三分遂為定制以禮部侍郎知滑州徙益州走馬承受張勉入秦廣南蠻賊儂智髙誘雲南冦蜀兵已涉邛部川朝廷促方平行且發秦渭兵馬役民夫晝夜築城增諸縣弓手率三倍方平徑至府下令悉歸所增弓手罷築城之役㑹上元觀鐙大啓城門民心乃定已而得邛部譯人始為此謀者斬之梟首境上而流其餘黨於湖南以三司使召還奏罷蜀賦四十萬減鑄錢十餘萬又列上漕運十四策仁宗悉施行之未朞年而京師有五年之蓄遷尚書左丞知南京未幾以工部尚書帥秦州夏酋諒祚大㸃集戎騎並邊蕃户多逃匿山林方平料閲軍馬聲言出境賊既不至諫官司馬光因論方平無賊而輕舉宰相曽公亮曰兵不出塞何名為輕舉哉復知南京英宗即位遷禮部尚書請知鄆州明年還為翰林學士承旨英宗不豫召方平赴福寧殿英宗憑几不言出書一幅八字曰來日降詔立皇太子方平抗聲曰必頴王也嫡長而賢請書其名英宗力疾書以付方平翌日制立頴王為皇太子神宗即位召見側門方平曰仁宗崩厚葬過禮公私騷然請損之神宗曰奉先可損乎方平曰遺制固云以先志行之天子之孝也神宗以為然除參知政事御史中丞司馬光論方平貪邪不當參大政光既遷以呂公著為中丞公著又以為言亦㑹方平丁父憂免喪拜觀文殿學士留守西京知陳州時方置條例司行新法方平因陛辭極論其害曰水所以載舟亦所以覆舟兵猶火也不戢當自焚若行新法不已其極必有覆舟自焚之憂神宗謂曰能復少留乎方平曰退即行矣詔舉諫官方平以李大臨蘇軾應詔纍請南京留司御史臺許之尋知陳州徙南京神宗欲除方平宣徽使留京師王安石言方平為御史中丞嘗附賈昌朝今授以宣徽使無名且不可留京師遂拜宣徽北院使知青州除中太一宫使久之易南院使判應天府神宗曰朕欲卿與韓絳共事而卿論政不同又欲除卿樞密使而卿論兵復異卿受先帝末命卒無以副朕意乎師征安南方平以謂舉西北壯士健馬棄之南方其患有不可勝言者遂條上九事新法鬻坊場河度司農請并祠廟鬻之方平言宋王業所基也而以火王閼伯封於商丘以主大火微子為宋始封此二祠者獨不可免於鬻乎神宗震怒批出曰慢神辱國無甚於斯於是天下祠廟皆得不鬻請老除東太一宫使後二年以宣徽南院使太子少師致仕官制行罷宣徽院獨命領使如舊以太子太保致仕卒年八十五贈司空諡曰文定方平慷慨有氣節善屬文數千言立就嘗知貢舉有薦王安石文學宜辟以考校方平從之安石既來凡一院之事皆欲紛更之方平惡之檄以出自是與之絶守蜀日蘇洵携其二子軾轍游京師方平一見待以國士而蘇氏父子名聲遂動天下云有樂全集四十卷玉堂集二十卷王拱辰字君貺開封咸平人也初名拱壽年十九舉進士第一仁宗改賜今名除將作監丞通判懷州遷直集賢院同知太常禮院廢后郭氏在殯有司前具上元觀燈燕拱辰言晉大夫知悼子卒未葬平公飲酒杜蕢揚觶郭氏以厚禮葬豈獨大夫比耶請罷御樓觀燈及遣奠日仍禁都下聲樂歷三司鹽鐵判官修起居注改右正言知制誥初朝廷禦邊重西北而輕東南拱辰請倣唐制益以東路之潮西路之雍容各總節制與廣桂為五管慶歷元年益梓饑以拱辰為安撫使至則奏蠲逋負以寬民契丹使劉六符嘗謂賈昌朝曰塘濼何為者耶一葦可航投箠可平不然決其隄十萬土囊遂可路矣仁宗以問拱辰對曰兵事尚詭彼誠有謀不應以語敵此六符夸言耳設險守固先王不廢而祖宗所以限敵騎也是歲契丹遣六符來求關南十縣其書謂太宗并汾之役舉無名之師直抵幽薊拱辰請對曰河東之役本誅僭僞契丹遣使行在致誠款已而寇石嶺關潛假兵以援賊太宗怒其反覆既平繼元遂下令北征豈謂無名因作報書云既交石嶺之鋒遂有薊門之役虜得報繼好如初遷起居舍人知開封府以右諫議大夫權御史中丞劉六符之求關南也敵意不測在庭之臣無敢使敵者富弼往報聘廷折其君臣敵辭屈朝廷增幣二十萬而和仁宗深念弼之功拱辰曰富弼不能止契丹溪壑無厭之求陛下止一女若敵乞和親弼亦忍棄之乎仁宗正色曰茍利社稷朕豈愛一女乎拱辰驚懼知言之不可入也因再拜曰陛下屈已愛民如此天下幸甚李用和以元舅除宣徽使又除使相拱辰言用無功而驕朝廷名器不可輕以假人甚非所以全后家之道也又言夏竦經略無功移疾求郡為自安計不當用為樞密使遂罷之蘇舜欽監進奏院因祠神燕集客有因酒放言為御史彈擊以舜欽易故紙得錢為㑹請屬吏如法拱辰遂言其放肆狂率實為害教由是皆坐重貶又言中書密院總天下機務巨細一切省覽窮日力不暇何暇逺圖哉宜悉除細務歸之有司僧紹宗因鑄佛像惑衆聚財都人爭以金銀飾投冶中宮掖亦出資佐之拱辰曰西師宿邊而財費於不急動士心起民怨詔遣中使禁止之除翰林學士為三司使首言兵冗不精費廪食宜訓練澄汰為持久計三路斂糴法當隨時盈縮以權輕重改翰林侍讀學士知鄭澶瀛三州留守西京除翰林學士承㫖拜三司使使契丹遼主遇之厚親御琵琶以侑酒拱辰謂其館伴曰南朝峭漢惟我館伴為遼主言之遼主曰吾見奉使之人惟富弼不可量也吾嘗問弼南朝如卿人材有幾弼曰臣斗筲之器不足道本朝人材勝如臣者車載斗量察斯人大未可量也拱辰使還除宣徽北院使御史趙抃論拱辰奉使契丹輕率失言又言知潭州任顓與轉運判官李章賤市死商真珠有司具獄來上而拱辰悉以珠進內以章宰相壻也罷為端明殿學士知永興軍帥秦定二州再守西京移北京神宗即位還朝見神宗言曰臣欲納忠未知陛下意所向又言牛李黨事方作不可不戒神宗以語執政王安石曰此未足為姦邪以未知陛下意所向此真姦邪也曾公亮因言拱辰在仁宗時已知其不正不復任用安石曰拱辰交結溫成皇后家人皆知之於是遂出守南京徙河陽再守西京召還為西太一宮使元豐初為宣徽南院使再守北京拱辰曰臣老矣恐不足任事神宗曰北門重地卿舊治也勉為朕行拜安武軍節度使改鎮彰德卒年七十四贈開府儀同三司諡曰懿恪臣稱曰方平附賈昌朝以譖吳育拱辰黨呂夷簡以撼富弼固正士之所不與也然方平志大氣髙有𢎞毅開濟之資識王安石之姦於將用之初知蘇氏父子之賢於未遇之際蓋有絶人者拱辰不可同日而語矣蘇軾序方平文有云世逺道散雖志士仁人或少貶以求用得非有為而言與東都事略卷七十四
