body:
  text: 東都事略卷七十五宋王稱撰列傳五十八余靖字安道韶州曲江人也為人質直剛徑舉進士為贛縣尉書判拔萃改將作監丞知新建縣遷袐書丞集賢校理范仲淹以言事忤意宰相貶饒州諫官御史不敢言靖上疏論仲淹不當貶且言陛下親政以來屢逐言事者恐鉗天下口不可坐落職監筠州酒稅徙秦州知英州以母憂去官免喪復為校理除右正言方是時仁宗勵精政事增諫官貟將以有所為靖數言事合意慶歷四年元昊納誓請和將加封冊而契丹以兵臨境上遣使言為中國討賊且告師期請毋與和朝廷患之欲聽重絶夏人而兵不得息不聽生事北邊議未決靖獨以謂中國厭兵久矣此契丹所幸一日使吾息兵養勇非其利也故用此以撓我尓是不可聽也朝廷雖是其言猶留夏冊不遣而假靖諫議大夫以報卒屈其議而還朝廷遂發夏冊臣元昊西師既解嚴而北邊亦無事是歲除知制誥史館修撰而契丹卒自攻元昊使來告捷又以靖往報靖通外國語至為蕃語詩為御史劾奏出知吉州靖嘗劾茹孝標不孝坐廢靖既失勢孝標因之告靖少時嘗犯法靖聞之不自得左遷將作少監分司南京六年起知䖍州以父憂去官儂智髙陷雍州乘勝連破嶺南州縣圍廣州乃即喪次起靖以袐書監知潭州改桂州智髙圍廣州不克則還據雍自智髙初起交趾請出兵助討賊靖以謂智髙交趾叛者宜聽出兵毋沮其善意纍疏論之不報至是靖曰雍州與交趾接境今不納必忿而反助智髙乃以便宜趣交趾㑹兵及智髙入雍州遂無外援既而朝廷遣狄青㑹靖兵敗賊於歸仁智髙去入海雍州平除工部侍郎仍帥桂管拜集賢院學士久之徙知潭州又知青州除吏部侍郎交趾冦雍州殺五巡檢以靖安撫廣西至則移檄交趾召其臣費嘉祐詰責之嘉祐皇恐對曰種落犯邊罪當死願歸取首惡以獻即械五人送欽州斬于界上遷尚書左丞知廣州拜工部尚書代還卒于金陵年六十五贈刑部尚書諡曰襄蔡襄字君謨興化軍仙游人也舉進士歷漳州判官西京留守推官改著作佐郎館閣校勘遷袐書丞知諫院兼修起居注仁宗以天下久安而西師無功慨然厭兵思正百度排羣議進用二三大臣又詔增置諫官四貟襄在選中於是宰相吕夷簡寵遇最隆襄言其過請罷其軍國大事元昊使人乞和所請過多襄上言曰元昊始以元卒之號為請又欲稱男而號吾祖此足見羌戎悖慢之意今縱使元昊稱臣而上書於朝廷自稱曰吾祖朝廷賜之詔書亦曰吾祖是何等語耶以右正言直史館知福州以便親遂為福建路轉運使復古五塘以溉田民以為利為襄立祠于塘側又奏減閩人五代時丁口稅之半以父憂去官服除復修起居注御史唐介以直言貶春州别駕襄言貶太重介得改英州遷起居舍人知制誥御史呂景初吳中復馬遵坐論宰相梁適罷臺職襄封還詞頭不草制其後屢有除授非當者輒封還之仁宗嘉其有守聞其母老特賜冠帔以寵之遷龍圖閣直學士知開封府進樞密直學士知泉州徙福州復移泉州襄為政精明而於閩人尤知其風俗時閩士多好學而專詞賦以應科舉襄得鄉先生周希孟以經術傳授學者嘗至數百人襄為親至學舍執經講問為諸生率延見處士陳烈尊以師禮而陳襄鄭穆方以學行著稱鄉里襄皆折節下之閩俗重凶事其奉浮圗會賔客以盡力豐侈為孝往往至數百千人至有親亡不舉哭必破産辦具而後敢發喪有力者乘其急時賤買其田宅而貧者立劵舉債終身困不能償襄下令禁止於巫覡生病蠱毒殺人之類皆痛斷絶之召拜翰林學士三司使仁宗山陵襄總其事調度供億皆數倍勞費既廣為議者所非初仁宗既立皇子而外人稍言襄嘗有異議英宗在慶寧聞之及親政數問大臣襄如何人因襄數請告英宗曰三司掌天下錢榖事務煩多而襄久在病告何不更用人後夏人犯邊英宗又曰邊事將興軍須未備三司當擇人襄聞之不自安遂求知杭州即拜端明殿學士遷禮部侍郎知杭州於是韓琦進曰蔡襄事出於流言難以必信前世人主以疑似之嫌害及忠良者可以為鑒歐陽修曰陛下曾見襄章疏否英宗曰不見也修曰往時夏竦欲陷富弼乃令婢子學石介書歲餘學成仍僞作介與弼書謀廢立事為言者所發賴仁宗聖明弼得免禍臣亦嘗為小人嫉忌僞作臣一劄子乞沙汰內官欲以激怒羣閹亦賴仁宗保全由是而言陛下曾見襄章疏猶須更辨真僞况傳聞疑信之言哉英宗曰傳聞何可信也未幾襄丁母憂以疾卒年五十六贈禮部侍郎襄於朋友重信義聞其喪則不御酒肉為位而哭嘗㑹飲㑹靈東園客有射矢誤中傷人者客指為襄矢京師喧然事既聞仁宗以問襄襄即再拜愧謝終不自辨退亦未嘗以語人工於書人得其字以為珍藏仁宗尤稱愛之御製元舅隴西王碑命襄書之其後又以襄書溫成皇后父清河郡王碑襄不肯言曰此待詔職也性耆茶第其品目以為譜云何郯字聖從成都人也舉進士由太常博士為監察御史遷殿中擢侍御史知雜上疏言宰相陳執中寡學術參知政事丁度輕脫樞密使夏竦回佞皆不協人望不當在此位親從官謀不軌竊發寢殿而連日賊未得內臣楊懷敏倚夏竦兾免失職之過郯劾其罪章纍上而懷敏未去郯言不已仁宗正色曰古之諫臣常有碎首者卿能行此否郯曰古者諫不行言不聽故臣有碎首今陛下從諫如流何用此舉必若碎首龍墀則美歸於臣子而過在君上臣不忍為也仁宗恱懷敏遂斥去方是時諫官有進姦言者以賊之根本起於皇后閣意欲傾中宫以進貴妃且言貴妃有扈蹕之功郯曰此必姦邪之人欲陷皇后願陛下詳察仁宗悟郯由是名重朝廷又言郭承祐不當為宣徽使張堯佐不當為三司使居職三年以親老乞郡除直龍圖閣知漢州就遷集賢殿修撰知梓州進天章閣待制入判銀臺司殿中丞龍昌期上所注書賜章服郯言昌期異端之學不宜崇長詔追所賜文彥博少從昌期學惡郯言出為龍圖閣直學士河東都轉運使劾奏故相梁適帥太原職事多弛適徙河陽又劾內侍蘇安靜為都鈐轄怙寵不法而安靜亦降為河中府鈐轄英宗即位移知永興軍徙河南府郯上九事一曰開聽納二曰遵典故三曰敦教化四曰辨邪正五曰明功罪六曰寬刑典七曰擇監司八曰進賢才九曰重名器召還判三班院知梓州始郯為御史鯁切無所避為仁宗所知晚節稍回畏在梓州因地震言隂盛臣彊以譏切韓琦又乞召還王陶以合上意由是名聲損於御史時也後提舉玉局觀以尚書右丞致仕卒年六十九梅摯字公儀成都新繁人也舉進士稍遷太常博士知蘇州二浙饑官貸種食已而督償之摰曰貸民所以為惠也反撓民可乎奏請緩期輸之慶歷中為御史權知諫院元昊納欵石元孫來歸議者欲援赦釋之摯不可曰元孫不能死行陳今不誅何以厲將臣哉李用和除宣徽南院使不數日又除同平章事摯言國初杜審瓊國舅也官止大將軍李繼隆功臣也晚年方得使相陛下豈可以名器而私外戚哉又言張堯佐緣宫掖以進恐上纍聖德仁宗曰梅摯言事殊有體為三司户部副使以事出知海州徙蘇州入為三司度支副使拜天章閣待制陕西都轉運使遷龍圖閣直學士知滑州州歲調民以備河民甚困摰以州兵代之而民獲休息入知三班院出知杭州仁宗賜詩以寵其行徙江寧府拜右諫議大夫移知河中府卒年六十五摯資性純厚不為矯厲之行平居未嘗問家業云許元字子春泰州海陵人也少以䕃為太廟齊郎稍遷太子中舍知如臯縣元為吏其術長於治財自元昊叛西兵出久無功而天下勞弊三司言元有材以主榷貨元言先時賈人入粟塞下京師錢不足以償故錢償愈不足則粟入愈少而價愈髙是謂內外俱困請髙塞粟之價下南鹽以償之使東南去滯積而西北之粟盈此輕重之術也行之果便於是范仲淹薦其能擢江淮荆浙制置發運判官既又為使元曰以六路七十二州之粟不能足京師者吾不信也至則治千艘浮江而上所過州縣留三月食其餘悉發而州縣之廪逺近以次相補由是不數月京師足食既而歎曰此可為於乏時然歲漕不給者有司之職廢也乃考故事明約信令發斂轉徙至於風波逺近遲速賞罰皆有法凡江湖數千里外談笑治之不擾不勞而用以足先是江淮歲漕京師者常六百萬石其後十餘歲歲益不充至元為之歲必六百萬而常餘百萬以備非常仁宗嘗謂執政曰發運使總六路之廣其財貨調用幣帛榖粟歲千百萬宜得其人而久任之擢元天章閣待制元在職十有三年已而乞守郡乃以知揚州越州又徙秦州卒年六十九陳希亮字公弼眉州青神人也舉進士知長沙縣浮圖有海印國師者出入章獻明肅皇后家與諸貴人交通恃勢據民地希亮捕治置諸法一縣大聳去為雩都巫覡歲斂民財祭鬼謂之春齊否則有火災民訛言有緋衣三老人行火希亮禁之民不敢犯火亦不作毁淫祠數百區勒巫為農者七十餘家及罷去父老送之出境遣去不可皆泣曰公捨我去緋衣老人復出矣後為開封府司録青州男子趙宇上書言元昊必反宰相以宇為狂徙建州而元昊果反宇自訟所部弗受即亡至京師自訟宰相怒下宇開封獄希亮奏乞以宇所上封事付所司其言驗不當加責與宰相爭不已宇由此得釋㑹考殺外戚沈元吉沈氏訴之希亮坐免官盜起京西富弼薦希亮可用起知房州州素無兵備民凛凛欲亡去希亮以牢城卒雜山河户得百人日夜部勒聲振山南民恃以安盜不敢入境轉運使使供奉官崔德贇督捕盜賊誣向氏父子為盜梟其首于市希亮察其寃下德贇獄德贇竟抵罪歷知宿滑曹壽四州提㸃江東河北刑獄入為開封府判官久之為京西京東轉運使知鳳翔府始州郡以酒相餉例皆私有之而法不可希亮以遺游士之貧者既而曰此亦私也以家財償之且自劾求去坐是分司西京遂致仕卒年六十四希亮為人清徑寡欲平生不假人以色自王公貴人皆嚴憚之見義勇發不計禍福必極其志而後已所至姦民滑吏易心改行不改者必誅然實出於仁恕故其為吏嚴而不殘少時從鄉人宋輔游輔卒於京師母老子少希亮以女聘其子而贍恤其母終身其篤於恩義如此吳中復字仲庶興國軍人也舉進士為招信尉金壇令知犍為縣通判潭州孫抃未識中復即舉為監察御史裏行或問其故抃曰昔人耻呈身御史今豈薦識面臺官耶遷殿中侍御史裏行彈治宰相梁適罷中復亦出通判䖍州未至知池州復召還宰相劉沆逐言官趙抃范師道中復論沆治溫成喪天下謂之劉彎俗謂鬻棺者為彎則沆素行可知於是沆罷相為殿中侍御史改右司諫論賈昌朝不宜拜樞密使遷同知諫院侍御史知雜事除三司户部副使擢天章閣待制知潭州徙瀛州改河東都轉運使進龍圖閣直學士知江寧府移知成德軍時方行青苖法使者至將遍行諸邑中復謂斂散固自有期止之移知成都府時議以永康軍為縣中復以為永康控制威茂不可廢其後夷人寇茂州乃復以永康為軍云遷給事中知永興軍關右大旱人多流亡中復奏請賑恤而執政遣使案驗誣以不實坐奪一官提舉玉隆觀起知荆南坐用公使違法被劾罷府事卒年六十八中復為人樂易簡約好周人之急士大夫稱之東都事略卷七十五
