body:
  text: 東都事略卷七十六宋王稱撰列傳五十九劉敞字邍父袁州臨江人也舉進士甲科為大理評事通判蔡州召試遷直集賢院判尚書考功仁宗賜夏竦諡曰文正敞言諡者有司之事也竦之行邪而陛下諡之以正不應法今百司各得守其職而陛下侵臣官疏三上仁宗為更竦諡曰文莊張貴妃追號溫成皇后有請立忌日者敞言太祖以來后廟四室陛下之妣也猶不立忌豈可以私昵之愛而變古越禮乎同修起居注尋遷右正言知制誥奉使契丹敞博聞強記素知敵山川道里敵人自古北至桞河回曲千餘里敞問曰自松亭趨栁河甚徑不數日可至中京何不道彼而道此敵人不虞敞知皆相顧驚愧曰誠如公言自通好以來置驛如此不敢易也時順州山中有異獸如馬而食虎豹敵不知名以問敞敞曰此所謂駮也為言其形狀聲音皆如所見敵人益歎其博物使還求知揚州初狄青在兵府諸軍訛言藉藉每出小民輒聚觀仁宗不豫青益為都人所指敞將行言於仁宗曰陛下愛青不如出之以全終始今外説紛紛雖不足信要當無後憂寧負青無使負國仁宗頷之曰可語中書敞見三丞相謂曰向者天下有大憂今有大疑上體復平大憂去矣而大疑者尚存具以青事告之丞相唯唯敞既至州遺公卿書曰汲黯之忠不難於淮陽而眷眷於李息朝廷皆知為青發也京師大水彗星見青出判陳州青去之夕而彗沒自揚徙鄆州糾察在京刑獄嘉祐四年祫享羣臣上尊號敞言尊號非古也陛下尊號盡善矣陛下自寶元之郊止羣臣毋得以為請殆今二十年無所加天下皆知甚盛德奈何一旦增虛名而損實美哉仁宗然之遂不允羣臣請而禮官前預請祔郭皇后於廟詔兩制與禮官議敞曰春秋之義夫人不薨於正寢不赴於同姓不反哭于廟則不言夫人不稱小君徒以禮不足故名號闕而郭氏以后廢案景祐之詔許復其號不許其諡與祔謂宜如詔書禮官蘇頌張洞以為景佑追復詔書言后逮事先后親奉寢園則后初不廢又言其諡册祔廟並停則后應諡祔可知今既有旨復議則宜以后祔皇后廟諡兼懷襄哀悼一字為可敞曰禮於祫未毁廟之主皆合食而無帝后之限且祖宗以來用之傳曰祭從先祖宜如故於是皆如敞言未幾御史言敞前議郭后嘗云上之廢后是欲𨗳人主廢后也敞因請補外除翰林侍讀學士知永興軍召還翰林治平中判太常寺敞在永興得眩瞀疾求便郡英宗曰如劉敞者豈易得哉遂出知汝州改集賢院學士判西京留司御史臺卒年五十敞為人明白俊偉博學自信自六經諸子百氏下至傳記小説無所不通為文敏贍在西掖時一日追封皇子公主九人敞將下直為之立馬却坐一揮九制文詞典雅各得其體在長安得先秦古器數十愛其款識文字竒古因以考知三代制度與先儒所説不同者所著春秋傳權衡説例意林總四十卷文集六十卷弟子記五卷七經小傳五卷弟攽子奉世攽字戇父少疏俊與兄敞同學自刻厲博讀羣書遂偕中進士調江隂簿為國子監直講趙槩薦攽可備文館召試優等當除直史館攽與言者有憾而執政乃擬校勘熙寧初知太常禮院神宗手詔推求太祖諸孫屬行尊者為王以奉太祖後攽曰禮諸侯不得祖天子太祖傳天下於太宗繼體之君皆太祖子孫不當别為太祖置後臣以謂太祖子唯德昭德芳二人宜從其後世世勿降爵宗廟祭祀使之在位則陛下褒揚藝祖休顯著明矣會勸講邇英者建言講官願得坐講下太常議攽曰侍臣見天子應對顧問日講論不可安坐自若避席立語乃古今常禮不可許或曰人臣何嘗不坐上前今使講官坐以示人主尊德樂道何害攽曰不然人主命之坐與人主不命而請之逆順分矣時議者不一卒如攽言考試開封府進士程文有用小畜字者王介謂犯神宗嫌名攽曰此六畜之畜亦嫌名也因紛爭御史劾之遂出通判泰州代還為集賢校理判登聞鼓院三司户部判官知曹州嘗轉對言強盜減罪流配多逃還鄉里復讎殺人捕得亦死宜約古制凡強盜得貸減者皆以刖代流配盜不得去鄉里全性命神宗善之而議者以斷趾駭衆事不行曹素多盜朝廷立重法而盜不息攽曰民不畏死奈何以死懼之至則尚寬平務在不撓視官屬如子姪嵗中盜賊衰息召為國史院編修官開封府判官元豐初出為京東轉運使坐不按斥部吏罷知兖州徙亳州後轉運使吳居厚以苛刻致財賦豐衍擢天章閣待制攽又坐廢弛奪兩官黜監衡州鹽倉起知襄州元祐初召為袐書少監以疾求補外除直龍圖閣知蔡州召拜中書舍人卒年六十七攽為人博學守道以故流離困躓然不修威儀喜諧謔雜以嘲誚每自比劉向也所著文集暨五代春秋內傳國語經史新議東漢刋誤詩話録芍藥譜漢官儀凡百卷奉世字仲馮元豐間為直史館元祐初為吏部貟外郎擢起居郎詔册乾順為夏國主以奉世使西夏遷天章閣待制樞密都承旨除吏部侍郎權户部尚書七年遂以樞密直學士僉書樞密院事罷為端明殿學士知成德軍徙定州成都府坐元祐黨責光祿少卿彬州居住御史中丞邢恕劾奉世合劉摯傾害顧命大臣附吕大防蘇轍遂登政府再貶隰州團練副使彬州安置後移居道州徙光州復端明殿學士知定州又知鄭州以言者落職知徐州提舉崇福宫以舊職致仕政和三年卒臣稱曰劉敞學問無所不知論諫有餘為時儒宗歐陽修嘗譬之為百鍊之英而萬物之鑑也修敞相豫以道義其言信哉攽言行髙逺名亞敞云吕溱字濟叔揚州人也舉進士第一為將作監丞通判亳州遷直集賢院知蘇州同修起居注坐與進奏院燕飲出知蘇州歷楚舒二州復修起居注改右正言儂智髙反詔進奏院不得輒報溱言邊防有警急一方有賊盜宜令諸路聞之共得為備欲人不知此何計也擢知制誥知杭州久之拜翰林學士上疏論宰相陳執中姦邪不練逹朝廷故事平居罕接士人惟隂陽卜祝之流入臥內干與政事又歷數其過惡仁宗還其疏溱進曰若止用口陳是隂中大臣也請付執中令自辨遂以侍讀學士知徐州移知成德軍坐以回易公用挾私物及違法過受公使餽贐為轉運使劾奏落職分司西京久之起知池州徙襄州又徙江寧遷給事中集賢院學士除龍圖閣直學士知開封府為政精敏京師翕然稱之未幾以疾求解遷樞密直學士提舉醴泉觀卒年五十五於是神宗曰溱立朝最孤知事君之節絶迹權貴故中廢者十數年無人肯為逹之者朕近擢領要務頗著風績今忽淪亡甚可嗟悼溱為人簡倨與賔客語不過數言性豪侈以故獲罪然開敏善議論人多推許之賈黯字直孺南陽人也舉進士第一為將作監丞通判襄州還朝以著作佐郎直集賢院上書稱薦范仲淹富弼韓琦之賢仁宗深重之遷同修起居注擢知制誥出知陳州移許州又知襄州父疾請解官就養未報乃棄官而歸責郢州未赴而父卒服除亦不復責也嘉祐中入翰林為學士知開封府於是御史中丞王疇諫官司馬光御史吕誨傅堯俞等言黯以文藝進身不間吏事遂罷復為翰林學士久之遷給事中權御史中丞時用吕誨為御史知雜誨以嘗言黯過失辭職黯奏曰諌官御史本為人主耳目况一時公言非有嫌怨且誨初得御史乃臣與孫抃薦舉臣知其為人方正謹厚今兹擢用甚允衆望臣得與之共事必能協濟詔以諭誨誨遂就職時人莫不賢黯也皇子封東陽郡王官兼檢校太傅黯上言太傅天子師臣也子為父師於體不順請自今皇子及宗室卑屬除師傅者隨其遷序改授詔兩制議如黯所奏朝論是之宰執建言請追尊濮王黯與兩制合議請以濮王為皇伯宰執不從會大雨黯上疏言水不潤下以二三大臣阿諛容悅違背經義故致此災變時論稱其切直以疾乞郡除翰林侍讀學士知陳州卒年四十四黯有學識好修潔無所阿附初登第還南陽范仲淹知鄧州黯謝仲淹曰黯晚輩偶得科第願受教仲淹曰君不憂不顯唯不欺二字可終身行之黯拜其言其後黯每以語人曰吾得於范公不欺二字平生用之不盡也沈遘字文通杭州錢塘人也以祖蔭補郊社齋郎舉進士第一大臣疑已在仕者不得為第一乃以為第二其後遂以為故事除大理評事通判江寧府召試直集賢院擢修起居注改右正言知制誥出知越杭二州英宗即位遷龍圖閣直學士知開封府為人明敏通達世務其治杭也以嚴見憚及治開封亦然每晨起視事日中則廷無留人出與親舊往還從容談笑以示有餘士大夫交稱其能以為且大用矣拜翰林學士遭母喪未除而卒年四十鄭獬字毅夫安州安陸人也為人俊邁不羣舉進士第一授將作監丞通判陳州召試直集賢院修起居注遂以右司諫知制誥仁宗崩獬上疏曰大行皇帝永昭陵依乾興制度雖未為過侈然乾興帑庫充積財力有餘可以溢祖宗舊制今國用空乏財賦不支豈可以乾興為法也夫儉葬之制周公非不忠曾子非不孝以為褒君愛父不在於聚財此前世之極論也竊惟大行皇帝節儉愛民出於天性無珠玉竒麗之好無犬馬遊觀之樂服御至於浣濯器用極於朴陋此天下之所共知也而山陵制度乃取乾興最盛之時為凖獨不傷先帝平日積儉之德乎又上疏言天子初即位四方郡國馳表稱賀例得官其子弟此必出於五代方鎮強悍朝廷茍欲結以恩義弭其不臣之患故因仍至今未知有改今天下承平庶官猥多充滿銓選况前日既用龍飛詔書俾羣臣類進一官足以推布主上惟新之澤固不須復官其子弟以開僥幸也京師大雨水詔求直言獬上疏曰臣竊觀陛下發德音下明詔以求忠言然臣愚未知陛下將欲實用之耶抑欲因災異舉應故事以文之邪茍欲文之則固無可議必欲實用之則於此時四方交章纍疏繁叢委至而陛下以一日萬幾之餘未能周覽亦不過如平時章疏關機密者則留中不出繫政體者則下中書屬兵機者則下樞密院兩府覆奏又以下羣有司及郡邑卒無所施行而後止如是則有求諫之名而無求諫之實所謂應故事者等耳以臣所見謂宜選官置屬令專掌羣臣所上章疏日許兩府及近臣番休更直便殿賜坐與之從容條講其可者則熟究而行之不可則罷之有疑焉則廣詢而後決之使羣言得而衆事舉此應天之實也又上疏曰日者詔諸郡敦遣遺逸之士後復廢罷臣欲乞復置此科而稍為增損蓋孔子為政必先正名漢之聘士不應召者則令敦遣就道豈有朝入科場暮為孰遣者哉宜正其名謂之舉遺逸間歲發解後有不豫薦者開封國學及諸路各舉一人又至禮部奏名後有不豫選者許主文共舉五人並至御試時務䇿中等者别為一榜如以為歲增中等者差多即乞復於進士數內減不合格者二十人以均之庶幾郡縣豪俊不至遺於草萊也出知荆南府神宗即位除翰林學士知開封府王安石參知政事不恱獬宰相富弼在告遂除獬翰林侍讀學士知杭州徙青州以疾提舉鴻慶宫卒年五十一獬為文有豪氣其流輩皆不及云祖無擇字擇之蔡州人也少從穆修為古文又從孫復受春秋舉進士甲科稍遷太常博士至和二年詔封孔子四十七世孫宗願為文宣公無擇言前代封孔子之後者在漢魏曰褒尊宗聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周及隋封鄒國公唐初曰褒聖開元中始追諡孔子為文宣王又以其後為文宣公是以祖諡而加後嗣也乃下兩制更定美號而令世襲遂改封宗願為衍聖公加直集賢院為三司户部判官出知陕州召為同修起居注知制誥仁宗已復土奉虞主于集英殿無擇與知諫院司馬光奏請親虞下禮院詳議以為宜如無擇等奏後英宗不豫令宗正卿攝事王疇除樞密副使錢公輔論其望輕繳還詞頭貶滁州團練副使無擇不即草公輔制而乞薄責之不報遷龍圖閣直學士初執政欲用無擇為翰林學士英宗弗許以為侍讀又弗許出知鄭州遷右諫議大夫知杭州初無擇與王安石同為知制誥時詞臣許受潤筆物安石因辭一人之饋不獲義不受以其物置舍人院梁上安石既以母憂去無擇取為本院公用安石聞而惡之以無擇為不亷熙寧初安石得政乃諷監司求無擇罪遣御史王子韶按治子韶小人也攝無擇對吏煆鍊無所得坐借公使酒三百小瓶以送遺客遂責忠正軍節度副使士大夫冤之有知明州光祿卿苖振監司亦由觀望發其罪朝廷遣崇文院校書張載按治載賢者也悉為平反之罪止罰金其幸不幸如此元豐中無擇復袐書監集賢院學士判西京留司御史臺移知信陽軍以卒東都事略卷七十六
