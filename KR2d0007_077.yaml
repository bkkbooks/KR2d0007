body:
  text: 東都事略卷七十七宋王稱撰列傳六十范鎮字景仁成都華陽人也薛奎守蜀還朝或問奎入蜀所得曰得一偉人當以文學名於世謂鎮也舉進士禮部奏名第一故事殿廷唱第過三人則禮部第一人者必越次抗聲自陳因擢置上第鎮不肯自言至第七十九人乃出拜退就列無一言廷中皆異之釋褐為新安簿王舉正薦召試擢館閣校勘宰相龐籍言鎮有異材不汲汲於進取特除直袐閣開封府推官擢起居舍人知諫院上疏論民田困弊請約祖宗以來官吏兵數酌取其中為定制以今賦入之數什七為經費而儲其三以備水旱非常又言古者冢宰制國用唐以宰相兼鹽鐵轉運或判户部度支今中書主民樞密主兵三司主財各不相知故財已匱而樞密益兵無窮民已困而三司取財不已請使中書樞密通知兵民財利大計與三司同制國用葬溫成皇后太常議禮前謂之園後謂之陵宰相劉沆前為監護使後為園陵使鎮曰常聞法吏舞法矣未聞禮官舞禮也請詰問前後議禮異同狀時有敕凡內降不如律令者令中書樞密院及所屬執奏未及一月而內臣無故改官者一日至五六人鎮乞正大臣被詔故違不執奏之罪石全斌以護溫成葬除觀察使凡治葬事者皆遷兩官鎮言章獻章懿章惠三后之葬推恩皆無此比乞追還全斌等告敕時陳執中為相鎮嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之鎮言今隂陽不和財匱民困盜賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之文彥博富弼入相百官郊迎時兩制不得詣宰相居第百官不得間見鎮言隆之以虛禮不若開之以至誠乞罷郊迎而除謁禁以通天下之情議減任子及每歲取士皆鎮發之又乞令宗室屬疏者補外官仁宗曰卿言是也顧恐天下謂朕不能睦族耳鎮曰陛下甄别其賢者用顯之不沒其能乃所以睦族也雖不行至熙寧初卒如其言仁宗即位三十五年未有繼嗣至和中得疾中外危恐不知所為鎮曰天下事尚有大於此者乎即上疏曰方今祖宗後裔蕃衍盛大信厚篤實陛下挍其尤賢者優其禮數試之以政與圖天下之事以系天下之心異時誕育皇嗣復遣還邸則真宗皇帝時故事是也初周王既薨真宗取宗室子養之宫中者此天下之大慮也太祖捨其子而立太宗者天下之大公也宗廟社稷之至計也臣願陛下以太祖為心行真宗故事斷于聖心以幸天下臣不勝大願章纍上不報因闔門請罪會有星變其占為急兵鎮言國本未立若變起倉卒禍不可以前料兵孰急於此者乎今陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變耳中變之禍不過於死而國本不立萬一有如天象所告急兵之憂死且有罪願以此示大臣使自擇死所除兼侍御史知雜事鎮以言不從固辭不受執政謂鎮上之不豫大臣嘗建此䇿矣今間言已入為之甚難鎮復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機會也諸公言今日難於前日安知他日不難於今日乎凡見仁宗面陳者三鎮泣仁宗亦泣曰朕知卿忠卿言是也當更俟三二年章十九上待罪百餘日須髮為白罷知諫院改集賢殿修撰修起居注除知制誥鎮雖罷言職而無歲不言儲嗣事及為知制誥正謝奏曰陛下許臣今復三年矣願早定大計其後韓琦卒定䇿立英宗遷翰林學士英宗即位中書奏請追尊濮安懿王下兩制議以為宜稱皇伯髙官大國極其尊榮非執政意更下尚書省集議已而臺諫爭言其不可乃下詔罷議令禮官撿詳典禮以聞鎮時判太常寺上言漢宣帝於昭帝為孫光武於平帝為祖則其父容可稱皇考然議者猶非之謂其以小宗而合大宗之統也今陛下既考仁宗又考濮安懿王則其失非特漢宣光武之比矣凡稱帝若皇考立寢廟論昭穆皆非是以侍讀學士出知陳州神宗即位復還翰林兼侍讀知通進銀臺司王安石為政變更法令改常平為青苖法鎮上疏曰常平之法始於漢之盛時視穀貴賤發斂以便農末最為近古不可改而青苖行於唐之衰亂不足法且陛下疾富民之多取而少取之此正百步與五十步之間耳今有二人坐市貿易一人下其直以相傾奪則人皆知惡之其可以朝廷而行市道之所惡乎疏三上不報會韓琦上疏極論新法之害安石使送條例司疏駮之諫官李常乞罷青苖錢安石令常分析鎮皆封還其詔詔五下鎮執如初司馬光除樞密副使光以所言不行不敢就職詔許辭免鎮再封還之神宗知其不可奪以詔直付光鎮奏曰臣不才使陛下廢法有司失職乞解銀臺司許之會有詔舉諌官鎮以蘇軾應詔而御史謝景溫彈奏軾罷鎮又舉孔文仲為賢良文仲對䇿極論新法之害安石怒罷文仲歸故官鎮皆上疏爭之不報時年六十三即上言臣言不行無顔復立於朝請致仕疏五上最後指言安石曰臣言青苖不見聽一可去薦蘇軾孔文仲不見用二可去今有人言獻忠與獻佞孰是必曰獻忠是納諫與拒諫孰是必曰納諫是蘇軾與孔文仲可謂獻忠矣陛下拒而不納是必有獻佞以誤陛下者不可不察也若李定避持服遂不忍母是壞人倫逆天理也而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求李大臨蘇頌諫院為之罷胡宗愈王韶上書肆意欺罔以興造邊事事敗則置而不問反為之罪師臣李師中及御史一言蘇軾則下七路掎托其過孔文仲則遣之歸任以此二人況彼二人以此事理觀彼事理孰是孰非孰得孰失陛下聰明之主其可以逃聖鑒乎言青苖則曰有見效者豈非歲得緡錢什百萬緡錢什百萬非出於天非出於地非出於建議者之家一出於民民猶魚也財猶水也水深則魚活財足則民有生意養民而盡其財譬猶養魚而竭其水也陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術臣職獻替而無一言則負陛下矣臣知言又觸大臣之怒罪在不測雖然臣嘗以忠事仁祖仁祖不賜之死才聽解言職而已以禮事英宗英宗不加之罪才令補畿郡而已所不以事仁祖英宗之心而事陛下是臣自棄於此世也安石怒落翰林學士以户部侍郎致仕鎮上表謝其略曰雖曰乞身而去敢忘憂國之心又曰望陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之官制行改正議大夫哲宗即位遷光祿大夫英宗登極祔仁宗主而遷僖祖及神宗即位復還僖祖而遷順祖鎮上言太祖起宋州有天下與漢髙祖同禧祖不當復還乞下百官議不報及哲宗即位鎮又言乞遷僖祖正太祖東嚮之位時年幾八十矣韓維上言鎮在仁宗朝首開建儲之議而鎮未嘗以語人雖顔子不伐善介子推不言祿不能過也悉以鎮十九疏上之拜端明殿學士且召鎮兼侍讀提舉中太一宫固辭改提舉崇福宫數月告老以銀青光祿大夫致仕初仁宗命李照改定大樂下王朴樂三律皇祐中又使胡瑗等考正鎮與司馬光皆上疏論律尺之法又與光往復論難凡數萬言後神宗詔鎮與劉几定樂鎮曰定樂當先正律神宗曰然雖有師曠之聰不以六律不能正五音鎮作律尺籥合升斗豆區釜斛欲圖上之又乞訪求真黍以定黃鐘而劉几即用李照樂加用四清聲而奏樂成詔罷局賜賚有加鎮謝曰此劉几樂也臣何與焉及致仕請太府銅為之逾年乃成比李照樂下一律有竒哲宗御延和殿召執政同觀賜詔嘉奬以樂下太常樂奏三日而鎮卒年八十一贈金紫光祿大夫諡曰忠文有文集正言樂書國朝韻對國朝事始東齋記事凡百餘卷鎮清明坦夷表裏洞逹遇人以誠口不言人過及臨大節決大義色和而語壯為文清麗簡逺少時嘗賦長嘯却胡騎流傳契丹契丹謂鎮為長嘯公云猶子百祿從孫祖禹百祿字子功父鍇為衛尉寺丞鎮之兄也少力學中進士第又中制科治平中以袐書丞知濛陽縣熙寧間擢提點江東刑獄徙利州梓州兩路加直集賢院召還同知諫院論手實法曰造簿手實許令告匿户令雖有手實之文而未嘗行蓋謂使人自占必不以實告而明許告訐人為仇怨則禮義亷恥之風衰矣五路兵置三十七將許辟召布衣為參謀百祿曰今大師未命而已除將佐有以恩澤用者有以瘝敗收者有未嘗經戰陳者有以故羣盜得官者願詳核其素參用之又列其甚無狀者十四人願依畿縣舊例將佐專教閲餘付之州縣而罷參謀神宗納之宗子世居謀不軌命百祿同徐禧治其獄百祿坐欺同落職監宿州酒稅語在禧傳久之為提點淮南東路刑獄徙知唐州入為司門郎中遷吏部除起居郎召試中書舍人除刑部侍郎有以強盜及故殺鬪殺情可矜者讞于朝法官援例貨免司馬光曰殺人不死則法廢矣百祿曰謂之殺人則可制刑而以為不疑原情而以為無可閔則不可今必處死則二殺之科自是無可疑與可閔者矣百祿在刑部用法多所平反遷吏部侍郎自元豐河決小吳元祐初水官請回河故道命百祿與趙君錫同行視百祿以東流髙仰不可回乞罷修河司以省大費其事遂寢進翰林學士除龍圖閣學士知開封府僚屬以圄空欲百祿言於朝百祿曰千里之圻而無一人之獄此上德所格豈尹功邪復召入翰林兼侍讀拜中書侍郎是歲郊祀議合祭天地吕大防蘇頌以合祭為宜百祿曰神宗以圜丘無祭地之理遂考求先王典禮止祀上帝配以太祖今未可輕改明日大防等復論皇帝臨御之始當親見天地百祿又言祖宗圜丘合祭皆是循用後代權時之制不合舊典大防曰百祿之言雖是典禮未易遽行太皇太后以大防言為然乃已熙河帥范育請進築汝遮納迷結珠龍川三城百祿曰此必爭之地我既城之賊馬時出居民豈得安全後欲棄之則城費已甚必不可與邊害何時休息右相蘇頌以稽留除書罷政百祿亦以資政殿學士出知河中府徙河南未行卒年六十五贈銀青光祿大夫所著詩傳文集內外制奏議凡八十卷後與元祐黨云祖禹字淳父祖鍇父百之太常博士祖禹舉進士為校書郎知龍水縣司馬光辟同編修資治通鑑凡十五年書成光上章稱薦曰臣誠不及也由臣頑固纂次淹久致其沈淪而祖禹安恬靜默若將終身者除袐書省正字神宗崩祖禹上疏論喪服之制曰先王制禮以君服同於父皆斬衰三年蓋恐為人臣者不以父事其君此所以管乎人情也自漢以來不惟人臣無服而人君遂以不為三年之喪惟國朝自祖宗以來外廷雖用易月之制而宫中實行三年之服且易月之制前世所以難改者以人君自不為服也今君上之服已如古典而臣下之禮猶依漢制是以百官有司皆已復其故常容貌衣服無異於行路之人豈人之性如此其薄哉由上不為之制禮也今羣臣雖易月而人主實行喪故十二日而小祥期而又小祥二十四日而大祥再期而又大祥不可以有二也既以日為之又以月為之此禮之無據者也古者再期而大祥中月而禫禫者祭之名也非服之色也今乃為之慘服三日然後禫此禮之不經者也既除服至葬而又服之蓋不可無服也祔廟後即吉才經八月耳而遽純吉無所不佩此又禮之無漸者也易月之制因襲故事已行之禮不可追也臣愚以為羣臣朝服止如今日而未服衰至期而服之漸除其重者再期而又服之乃釋衰其餘則君服期服可也至於禫不必為之服惟未純吉以至於祥然後無所不佩則三年之制略如古矣擢右正言吕公著為左丞祖禹以壻嫌改著作佐郎為實録院檢討官遷著作郎兼侍講上疏太皇太后曰今祥禫將終即吉方始服御器用內外一新奢儉之端皆由此臣以謂珠璣金玉之飾錦繡纂組之工凡可以蕩心恱目者不宜有加於舊增多於前也皇帝方嚮儒術親學問睿質日長聖性未定覩奢則奢覩儉則儉凡所以訓導聖德者宜動皆有法不可不戒若崇儉敦朴以輔養皇帝之性使目不視靡曼之色耳不聽淫哇之音非禮勿言非禮不動則學問日益聖德日隆此宗社無疆之福也神宗服除故事開樂置故祖禹上疏言君子之於喪服以為至痛之極不得已而除若以開樂故特設宴則似除服為慶賀非君子不得已而除之之意也請罷開樂宴惟因事則聽樂庶合先王禮意哲宗從之擢起居舍人辭不拜時以夏暑罷講祖禹上疏曰當今之務莫如學問之為急陛下今日學與不學繫天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子欣慕願立於朝以直道事陛下輔助德業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取富貴即專權利矣君子之得位欲行其所學也小人之得君將濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召臣竊為陛下惜此日月願以學為急召試中書舍人又辭不拜遷右諫議大夫兼實録院修撰蔡確既已得罪祖禹上言聖人之道不過得中天下之事不可極意一時極意後必有悔用刑寧失之於寬不可失之於急寧失之於略不可失之於詳自乾興貶丁謂以來不竄逐大臣六十餘年且丁謂見在相位故朝廷有黨不可不出今確已罷相數年陛下所用多非確黨其有素懷姦心為衆所知者固不逃於聖鑒自餘偏見異論者若皆以為黨確而逐之恐刑罰之失中人情之不安也又因對勸哲宗以辨邪正曰比年以來大臣以兼容小人為寬好惡不明邪正不分所引進者不盡得人宰相以進賢退不肖為職而邪正不分豈不負國望戒飭大臣各以公心求賢多引鯁正之人以重朝廷無使小人得位為他習所患復除中書舍人又力辭時遣都水監李偉分導大河入孫村口歸故道以解下流之急偉因欲塞宗城決口及移深州之費回大河歸故道祖禹上疏極言河無可塞之理既而遷給事中猶力言之以為今河役不息工費漸大臣竊謂功必不可成恐枉費國財民力朝廷卒從其議俄聞禁中覓乳媪祖禹以哲宗年十四非近女色之時上疏力勸哲宗進德愛身又上疏勸宣仁后保護上躬言甚切至既而宣仁后諭祖禹以外議皆虛傳祖禹復上疏臣所言皇帝進德愛身宜常以為戒太皇太后保護皇帝安身正心久逺之慮亦願因而勿忘今外議雖虛亦足為先事之戒臣侍經左右而有聞於道路實懷私憂是以不存形迹不知忌諱發於誠心愛上不敢避妄言之罪凡事言於未然則誠為過及其已然則又無所及雖言無益陛下寧受未然之言勿使臣等有無及之悔因聞虛語以為實戒則四海生靈動植之類永被其福矣改禮部侍郎進翰林侍讀學士知國史院事又為翰林學士宣仁登遐哲宗親政祖禹上言此乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時也有敢以姦言惑聖聽者宜明正其罪既而外論恟恟在位者多自引去祖禹力陳治道之要古今成敗之理與夫小人之情狀反復激切以感動上意因請外遂以龍圖閣學士知陜州紹聖初言者論祖禹所修實録以為詆斥先帝又以祖禹為朋附司馬光及論乳媪事以為離間兩宫初提舉明道宫繼責武安軍節度副使永州安置再貶韶州别駕賀州安置移賔州再移化州卒年五十八初祖禹嘗進唐鑑十二卷帝學八卷仁皇政典六卷而唐鑑深明唐三百年之治亂故學者尊之目袓禹為唐鑑公子仲溫臣稱曰孔子謂仁者必有勇信哉觀鎮首陳大計以安宗社中引古義以排政府最後以言不從遂致為臣而歸非有仁者之勇疇能爾哉夫學以古今成敗為議論仕以正君惠利及人為忠賢顧義自重不求茍合遇事輒發不為利奪此則范氏之家法也哉東都事略卷七十七
