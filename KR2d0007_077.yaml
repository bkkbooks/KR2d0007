body:
  text: 東都事略卷七十七宋王稱撰列傳六十范鎮字景仁成都華陽人也薛奎守蜀還朝或問奎入蜀所得曰得一偉人當以文學名於世謂鎮也舉進士禮部奏名第一故事殿廷唱第過三人則禮部第一人者必越次抗聲自陳因擢置上第鎮不肯自言至第七十九人乃出拜退就列無一言廷中皆異之釋褐為新安簿王舉正薦召試擢館閣校勘宰相龐籍言鎮有異材不汲汲於進取特除直袐閣開封府推官擢起居舍人知諫院上疏論民田困弊請約祖宗以来官吏兵數酌取其中為定制以今賦入之數什七為經費而儲其三以備水旱非常又言古者冢宰制國用唐以宰相兼鹽鐵轉運或判户部度支今中書主民樞密主兵三司主財各不相知故財已匱而樞密益兵無窮民已困而三司取財不已請使中書樞密通知兵民財利大計與三司同制國用葬温成皇后太常議禮前謂之園後謂之陵宰相劉沆前為監䕶使後為園陵使鎮曰常聞法吏舞法矣未聞禮官舞禮也請詰問前後議禮異同状時有敕凡内降不如律令者令中書樞密院及所屬執奏未及一月而内臣無故改官者一日至五六人鎮乞正大臣被詔故違不執奏之罪石全斌以䕶温成葬除觀察使凡治葬事者皆遷兩官鎮言章獻章懿章惠三后之葬推恩皆無此比乞追還全斌等告敕時陳執中為相鎮嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之鎮言今隂陽不和財匱民困盗賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之文彦博富弼入相百官郊迎時兩制不得詣宰相居第百官不得閒見鎮言隆之以虚禮不若開之以至誠乞罷郊迎而除謁禁以通天下之情議减任子及每歳取士皆鎮發之又乞令宗室屬疎者補外官仁宗曰卿言是也顧恐天下謂朕不能睦族耳鎮曰陛下甄别其賢者用顯之不没其能乃所以睦族也雖不行至熙寧初卒如其言仁宗即位三十五年未有繼嗣至和中得疾中外危恐不知所為鎮曰天下事尚有大於此者乎即上疏曰方今祖宗後裔蕃衍盛大信厚篤實陛下挍其尤賢者優其禮數試之以政與圖天下之事以系天下之心異時誕育皇嗣復遣還邸則真宗皇帝時故事是也初周王既薨真宗取宗室子養之宫中者此天下之大慮也太祖捨其子而立太宗者天下之大公也宗廟社稷之至計也臣願陛下以太祖為心行真宗故事斷于聖心以幸天下臣不勝大願章累上不報因闔門請罪㑹有星變其占為急兵鎮言國本未立若變起倉卒禍不可以前料兵孰急於此者乎今陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變耳中變之禍不過於死而國本不立萬一有如天象所告急兵之憂死且有罪願以此示大臣使自擇死所除兼侍御史知雜事鎮以言不從固辭不受執政謂鎮上之不豫大臣嘗建此䇿矣今閒言已入為之甚難鎮復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機㑹也諸公言今日難於前日安知他日不難於今日乎凡見仁宗面陳者三鎮泣仁宗亦泣曰朕知卿忠卿言是也當更俟三二年章十九上待罪百餘日須髮為白罷知諫院改集賢殿修撰修起居注除知制誥鎮雖罷言職而無歳不言儲嗣事及為知制誥正謝奏曰陛下許臣今復三年矣願早定大計其後韓琦卒定䇿立英宗遷翰林學士英宗即位中書奏請追尊濮安懿王下兩制議以為宜稱皇伯髙官大國極其尊榮非執政意更下尚書省集議已而臺諫爭言其不可乃下詔罷議令禮官撿詳典禮以聞鎮時判太常寺上言漢宣帝於昭帝為孫光武於平帝為祖則其父容可稱皇考然議者猶非之謂其以小宗而合大宗之統也今陛下既考仁宗又考濮安懿王則其失非特漢宣光武之比矣凡稱帝若皇考立寝廟論昭穆皆非是以侍讀學士出知陳州神宗即位復還翰林兼侍讀知通進銀臺司王安石為政變更法令改常平為青苖法鎮上疏曰常平之法始於漢之盛時視穀貴賤發歛以便農末最為近古不可改而青苖行於唐之衰亂不足法且陛下疾富民之多取而少取之此正百歩與五十歩之閒耳今有二人坐市貿易一人下其直以相傾奪則人皆知惡之其可以朝廷而行市道之所惡乎疏三上不報㑹韓琦上疏極論新法之害安石使送條例司疏駮之諫官李常乞罷青苖錢安石令常分析鎮皆封還其詔詔五下鎮執如初司馬光除樞密副使光以所言不行不敢就職詔許辭免鎮再封還之神宗知其不可奪以詔直付光鎮奏曰臣不才使陛下廢法有司失職乞解銀臺司許之㑹有詔舉諌官鎮以蘇軾應詔而御史謝景温彈奏軾罷鎮又舉孔文仲為賢良文仲對䇿極論新法之害安石怒罷文仲歸故官鎮皆上疏爭之不報時年六十三即上言臣言不行無顔復立於朝請致仕疏五上最後指言安石曰臣言青苖不見聽一可去薦蘇軾孔文仲不見用二可去今有人言獻忠與獻佞孰是必曰獻忠是納諫與拒諫孰是必曰納諫是蘇軾與孔文仲可謂獻忠矣陛下拒而不納是必有獻佞以誤陛下者不可不察也若李定避持服遂不忍母是壊人倫逆天理也而欲以為御史御史臺為之罷陳薦舍人院為之罷宋敏求李大臨蘇頌諫院為之罷胡宗愈王韶上書肆意欺罔以興造邊事事敗則置而不問反為之罪師臣李師中及御史一言蘇軾則下七路掎摭其過孔文仲則遣之歸任以此二人況彼二人以此事理觀彼事理孰是孰非孰得孰失陛下聦明之主其可以逃聖鑒乎言青苖則曰有見効者豈非歳得緡錢什百萬緡錢什百萬非出於天非出於地非出於建議者之家一出於民民猶魚也財猶水也水深則魚活財足則民有生意養民而盡其財譬猶養魚而竭其水也陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術臣職獻替而無一言則負陛下矣臣知言又觸大臣之怒罪在不測雖然臣嘗以忠事仁祖仁祖不賜之死才聽解言職而已以禮事英宗英宗不加之罪才令補畿郡而已所不以事仁祖英宗之心而事陛下是臣自棄於此世也安石怒落翰林學士以户部侍郎致仕鎮上表謝其略曰雖曰乞身而去敢㤀憂國之心又曰望陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壮之官制行改正議大夫哲宗即位遷光禄大夫英宗登極祔仁宗主而遷僖祖及神宗即位復還僖祖而遷順祖鎮上言太祖起宋州有天下與漢髙祖同禧祖不當復還乞下百官議不報及哲宗即位鎮又言乞遷僖祖正太祖東嚮之位時年幾八十矣韓維上言鎮在仁宗朝首開建儲之議而鎮未嘗以語人雖顔子不伐善介子推不言禄不能過也悉以鎮十九疏上之拜端明殿學士且召鎮兼侍讀提舉中太一宫固辭改提舉崇福宫數月告老以銀青光禄大夫致仕初仁宗命李照改定大樂下王朴樂三律皇祐中又使胡瑗等考正鎮與司馬光皆上疏論律尺之法又與光徃復論難凡數萬言後神宗詔鎮與劉几定樂鎮曰定樂當先正律神宗曰然雖有師曠之聰不以六律不能正五音鎮作律尺龠合升斗豆區鬴斛欲圖上之又乞訪求真黍以定黄鐘而劉几即用李照樂加用四清聲而奏樂成詔罷局賜賚有加鎮謝曰此劉几樂也臣何與焉及致仕請太府銅為之逾年乃成比李照樂下一律有竒哲宗御延和殿召執政同觀賜詔嘉奨以樂下太常樂奏三日而鎮卒年八十一贈金紫光禄大夫謚曰忠文有文集正言樂書國朝韻對國朝事始東齋記事凡百餘卷鎮清明坦夷表裏洞逹遇人以誠口不言人過及臨大節决大義色和而語壮為文清麗簡逺少時嘗賦長嘯却胡騎流傳契丹契丹謂鎮為長嘯公云猶子百禄從孫祖禹百禄字子功父鍇為衛尉寺丞鎮之兄也少力學中進士第又中制科治平中以袐書丞知濛陽縣熙寧閒擢提㸃江東刑獄徙利州梓州兩路加直集賢院召還同知諫院論手實法曰造簿手實許令告匿户令雖有手實之文而未嘗行蓋謂使人自占必不以實告而明許告訐人為仇怨則禮義亷恥之風衰矣五路兵置三十七将許辟召布衣為叅謀百禄曰今大師未命而已除将佐有以恩澤用者有以瘝敗収者有未嘗經戰陳者有以故羣盗得官者願詳覈其素參用之又列其甚無状者十四人願依畿縣舊例将佐專教閱餘付之州縣而罷叅謀神宗納之宗子世居謀不軌命百禄同徐禧治其獄百禄坐欺同落職監宿州酒稅語在禧傳久之為提㸃淮南東路刑獄徙知唐州入為司門郎中遷吏部除起居郎召試中書舍人除刑部侍郎有以強盗及故殺闘殺情可矜者讞于朝法官援例貨免司馬光曰殺人不死則法廢矣百禄曰謂之殺人則可制刑而以為不疑原情而以為無可閔則不可今必處死則二殺之科自是無可疑與可閔者矣百禄在刑部用法多所平反遷吏部侍郎自元豐河決小吳元祐初水官請囘河故道命百禄與趙君錫同行視百禄以東流髙仰不可囘乞罷修河司以省大費其事遂寝進翰林學士除龍圖閣學士知開封府僚屬以圄空欲百禄言於朝百禄曰千里之圻而無一人之獄此上徳所格豈尹功邪復召入翰林兼侍讀拜中書侍郎是歲郊祀議合祭天地吕大防蘇頌以合祭為宜百禄曰神宗以圜丘無祭地之理遂考求先王典禮止祀上帝配以太祖今未可輕改明日大防等復論皇帝臨御之始當親見天地百禄又言祖宗圜丘合祭皆是循用後代權時之制不合舊典大防曰百禄之言雖是典禮未易遽行太皇太后以大防言為然乃已熙河帥范育請進築汝遮納迷結珠龍川三城百禄曰此必爭之地我既城之賊馬時出居民豈得安全後欲弃之則城費已甚必不可與邊害何時休息右相蘇頌以稽留除書罷政百禄亦以資政殿學士出知河中府徙河南未行卒年六十五贈銀青光禄大夫所著詩傳文集内外制奏議凡八十卷後與元祐黨云祖禹字淳父祖鍇父百之太常博士祖禹舉進士為校書郎知龍水縣司馬光辟同編修資治通鑑凡十五年書成光上章稱薦曰臣誠不及也由臣頑固纂次淹久致其沈淪而祖禹安恬靜黙若将終身者除袐書省正字神宗崩祖禹上疏論喪服之制曰先王制禮以君服同於父皆斬衰三年蓋恐為人臣者不以父事其君此所以管乎人情也自漢以来不惟人臣無服而人君遂以不為三年之喪惟國朝自祖宗以来外廷雖用易月之制而宫中實行三年之服且易月之制前世所以難改者以人君自不為服也今君上之服已如古典而臣下之禮猶依漢制是以百官有司皆已復其故常容皃衣服無異於行路之人豈人之性如此其薄哉由上不為之制禮也今羣臣雖易月而人主實行喪故十二日而小祥朞而又小祥二十四日而大祥再朞而又大祥不可以有二也既以日為之又以月為之此禮之無據者也古者再朞而大祥中月而禫禫者祭之名也非服之色也今乃為之慘服三日然後禫此禮之不經者也既除服至葬而又服之蓋不可無服也祔廟後即吉才經八月耳而遽純吉無所不佩此又禮之無漸者也易月之制因襲故事已行之禮不可追也臣愚以為羣臣朝服止如今日而未服衰至朞而服之漸除其重者再朞而又服之乃釋衰其餘則君服朞服可也至於禫不必為之服惟未純吉以至於祥然後無所不佩則三年之制略如古矣擢右正言吕公著為左丞祖禹以壻嫌改著作佐郎為實錄院檢討官遷著作郎兼侍講上疏太皇太后曰今祥禫将終即吉方始服御器用内外一新奢儉之端皆由此臣以謂珠璣金玉之飾錦繡纂組之工凡可以蕩心恱目者不宜有加於舊增多於前也皇帝方嚮儒術親學問睿質日長聖性未定覩奢則奢覩儉則儉凡所以訓導聖徳者宜動皆有法不可不戒若崇儉敦朴以輔養皇帝之性使目不視靡曼之色耳不聽淫哇之音非禮勿言非禮不動則學問日益聖徳日隆此宗社無疆之福也神宗服除故事開樂置故祖禹上疏言君子之於喪服以為至痛之極不得已而除若以開樂故特設宴則似除服為慶賀非君子不得已而除之之意也請罷開樂宴惟因事則聽樂庻合先王禮意哲宗從之擢起居舍人辭不拜時以夏暑罷講祖禹上疏曰當今之務莫如學問之為急陛下今日學與不學繋天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子欣慕願立於朝以直道事陛下輔助徳業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪諂事陛下竊取富貴即專權利矣君子之得位欲行其所學也小人之得君将濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召臣竊為陛下惜此日月願以學為急召試中書舍人又辭不拜遷右諫議大夫兼實錄院修撰蔡確既已得罪祖禹上言聖人之道不過得中天下之事不可極意一時極意後必有悔用刑寧失之於寛不可失之於急寧失之於略不可失之於詳自乾興貶丁謂以來不竄逐大臣六十餘年且丁謂見在相位故朝廷有黨不可不出今確已罷相數年陛下所用多非確黨其有素懐姦心為衆所知者固不逃於聖鑒自餘偏見異論者若皆以為黨確而逐之恐刑罸之失中人情之不安也又因對勸哲宗以辨邪正曰比年以來大臣以兼容小人為寛好惡不明邪正不分所引進者不盡得人宰相以進賢退不肖為職而邪正不分豈不負國望戒飭大臣各以公心求賢多引鯁正之人以重朝廷無使小人得位為他習所患復除中書舍人又力辭時遣都水監李偉分導大河入孫村口歸故道以解下流之急偉因欲塞宗城决口及移深州之費囘大河歸故道祖禹上疏極言河無可塞之理既而遷給事中猶力言之以為今河役不息工費漸大臣竊謂功必不可成恐枉費國財民力朝廷卒從其議俄聞禁中覓乳媪祖禹以哲宗年十四非近女色之時上疏力勸哲宗進徳愛身又上疏勸宣仁后保䕶上躬言甚切至既而宣仁后諭祖禹以外議皆虚傳祖禹復上疏臣所言皇帝進徳愛身宜常以為戒太皇太后保䕶皇帝安身正心久逺之慮亦願因而勿忘今外議雖虚亦足為先事之戒臣侍經左右而有聞於道路實懐私憂是以不存形迹不知忌諱發於誠心愛上不敢避妄言之罪凡事言於未然則誠為過及其已然則又無所及雖言無益陛下寧受未然之言勿使臣等有無及之悔因聞虚語以為實戒則四海生靈動植之類永被其福矣改禮部侍郎進翰林侍讀學士知國史院事又為翰林學士宣仁登遐哲宗親政祖禹上言此乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時也有敢以姦言惑聖聽者宜明正其罪既而外論恟恟在位者多自引去祖禹力陳治道之要古今成敗之理與夫小人之情状反復激切以感動上意因請外遂以龍圖閣學士知陜州紹聖初言者論祖禹所修實錄以為詆斥先帝又以祖禹為朋附司馬光及論乳媪事以為離閒両宫初提舉明道宫繼責武安軍節度副使永州安置再貶韶州别駕賀州安置移賔州再移化州卒年五十八初祖禹嘗進唐鑑十二卷帝學八卷仁皇政典六卷而唐鑑深明唐三百年之治亂故學者尊之目袓禹為唐鑑公子仲温臣稱曰孔子謂仁者必有勇信哉觀鎮首陳大計以安宗社中引古義以排政府最後以言不從遂致為臣而歸非有仁者之勇疇能爾哉夫學以古今成敗為議論仕以正君惠利及人為忠賢顧義自重不求茍合遇事輒發不為利奪此則范氏之家法也哉東都事略卷七十七
