body:
  text: 東都事略卷七十九宋王稱撰列傳六十二王安石字介甫撫州臨川人也父益都官貟外郎安石蚤有盛名博聞強記為文動筆如飛觀者服其精妙舉進士髙第僉書淮南節度判官召試館職固辭乃知鄞縣安石好讀書三日一治縣事起堤堰决陂塘為水陸之利貸榖于民立息以償俾新陳相易興學校嚴保伍邑人便之通判舒州文彦博為相薦安石恬退不次進用可以激奔競之風尋再召試又固辭乃以為羣牧判官出知常州由是名重天下提㸃江東刑獄入為三司度支判官獻書萬餘言極陳當世之務居頃之除直集賢院累辭不獲命始就職除同修起居注固辭不拜遂除知制誥自是不復辭官矣以母憂去服除英宗朝累召不起神宗即位除知江寧府召為翰林學士初入對神宗曰方今治當何先安石曰以擇術為先神宗曰唐太宗何如安石曰陛下當以堯舜為法太宗所知不逺所為不盡合先王但乗隋亂子孫又皆昬愚所以獨見稱述堯舜所為至簡而不煩至要而不迃至易而不難但末世學者不能通知常以為髙不可及不知聖人經世立法以中人為制也神宗曰卿所謂責難於君朕自視眇然恐無以副卿此意可悉意輔朕庻同濟此道一日講席羣臣退神宗留安石坐曰有欲從容與卿論議者因言唐太宗必得魏鄭公劉備必得諸葛亮然後可以有為二子誠不世出之人也安石曰陛下誠能為堯舜則必有臯夔稷禼陛下誠能為髙宗則必有傅說魏鄭公諸葛亮皆有道者所羞何足道哉以天下之大人民之衆百年承平學者不為不多然常患無人可以助治者以陛下擇術未明推誠未至雖有臯夔稷禼傅說之賢亦必為小人所蔽因卷懐而去耳自古患朝廷無賢者以人君不明好近小人故也好近小人則賢人雖欲自逹無由矣神宗曰自古治世豈能使朝廷無小人雖堯舜之時不能無四凶安石曰惟能辨四凶而誅之此乃所以為堯舜也若使四凶得肆其讒慝則臯夔稷禼亦安肯茍食其禄以終身乎未幾除右諫議大夫參知政事安石既執政神宗曰人皆不能知卿以為卿但知經術不可以經世務安石曰經術者所以經世務也後世所謂儒者大抵皆庸人故世俗皆以經術不可施於世務神宗曰朕察人情比於卿有欲造事傾揺者朕常以吕誨為忠實毁卿於時事不通趙抃唐介數以言扞塞惟恐卿進用卿當立變此風俗不知卿所施設以何為先安石曰變風俗立法度最方今所急也於是設制置三司條例司與知樞宻院陳升之同領之而青苖免役市易保甲等法相繼興矣常平倉法以豐歲穀賤傷農故增價收糴使蓄積之家無由抑塞農夫須令賤糶凶歲榖貴傷民故減價出糶使蓄積之家無由邀勒貧民須令貴糴物價常平公私両利也安石以常平法為不善更将糴本作青苖錢散與人户令出息二分置提舉官以督之古者百姓出力以供在上之役安石以為百姓惟苦差役破産不憚增稅乃請據家貲髙下各令出錢雇人充役嚮者役人皆上等户得之其下等單丁女户及品官僧道本來無役安石乃使之一槩輸錢於是賦歛愈重市易之法聽人賖貸縣官貨財以田宅或以金帛為抵當三人相保則給之皆出息什分之二過期不輸息外每月更加罸錢百分之二保甲之法始因戎狄驕傲侵據漢唐故地有征伐開拓之志故置保甲乃藉郷村之民二丁取一皆授以弓弩教之戰陣又令河北陕西河東三路皆五日一教閱每一丁教閱一丁及諸縣弓手亦皆易以保甲其保甲習於游惰不復務農京東西両路保甲養馬仍各置提舉官權任比監司自是四方爭言農田水利古陂廢堰悉務興復又立賖貸之法又令民封状增價以買坊場又增茶鹽之額又設措置河北糴便司廣積糧穀於臨流州縣以備饋運而天下騷然矣自安石變法以來御史中丞吕誨首論其過失安石求去位神宗為出誨御史劉琦錢顗劉述又交論安石專肆胷臆輕易憲度殿中侍御史孫昌齡亦繼言皆坐貶同知諫院范純仁亦論安石欲求近功忘其舊學罷諫職吕公著代吕誨為中丞亦力請罷條例司并青苖等法諫官孫覺李常胡宗愈御史張戩王子韶陳襄程顥皆論安石變法非是以次罷去前宰相韓琦上疏論青苖之害乞罷諸路提舉官依常平舊法行之奏至安石稱疾求分司神宗不許時翰林學士司馬光當批答安石指言光有士夫沸騰黎民騷動之語神宗諭安石曰詔中二語乃為文督迫之過而朕失於詳閱當令吕惠卿諭旨翌日安石入謝因為神宗言中外大臣從官臺諫朝士朋比之情且曰陛下欲以先王之正道勝天下流俗故與流俗相為輕重流俗權重則天下之人歸流俗陛下權重則天下之人歸陛下權者與物相為輕重雖千鈞之物所加損不過銖兩而移今姦人欲敗先王之正道以沮陛下之所為是於陛下與流俗之權適爭輕重之時加銖兩之力則用力至㣲而天下之權已歸於流俗矣此所以紛紛也神宗以為然安石乃視事熙寧三年拜禮部侍郎同中書門下平章事監修國史御史中丞楊繪御史劉摯陳免役之害坐黜御史林旦薛昌朝范育皆以忤安石罷知雜御史謝景温初附安石亦以不合去六年命知制誥吕惠卿修撰經義以安石提舉而以子雱兼同修撰王韶取熙河洮岷疊宕等州安石率羣臣入賀神宗解玉帶賜之以旌其功慈聖光獻皇后宣仁聖烈皇后閒見神宗流涕言新法之不便者且言王安石亂天下神宗亦流涕退命安石裁損之安石重為解乃已七年神宗以久旱益疑新法之不便安石不恱求避位遂拜吏部尚書觀文殿大學士知江寧府明年復拜同中書門下平章事昭文館大學士三經義成拜尚書左僕射兼門下侍郎初吕惠卿為安石所知驟引至執政安石去位惠卿遂叛安石洎安石再相茍可以中安石無不為也㑹安石子雱卒安石力求去九年拜鎮南軍節度使同平章事判江寧府安石丐奉祠以使相為集禧觀使封舒國公又辭使相乃以左僕射為觀文殿大學士元豐三年封特進改封荆國公安石退居金陵始悔恨為吕惠卿所誤每歎曰吾昔交游皆以國事相絶意甚自愧也哲宗即位拜司空明年薨年六十六贈太傅紹聖初謚曰文配享神宗廟廷崇寧二年配享文宣王廟政和三年封舒王靖康元年停文宣王配享列于從祀後又罷安石配享神宗廟而奪其王爵初安石提舉修撰經義訓釋詩書周官既成攽之學官天下號曰新義晚歳為字說二十四卷學者爭傳習之日以經試于有司必宗其說少異輒不中程先儒傳注既盡廢士亦無復自得之學故當時議者謂王氏之患在好使人同已安石又著日錄七十卷如韓琦富弼文彦博司馬光吕公著范鎮吕誨蘇軾及一時之賢者重為毁詆而安石不䘏也安石性強忮遇事無可否自信所見執意不囘至議變法而在廷交執不可安石傅經義出已意辨論輒數百言衆皆不能詘甚者謂天變不足畏祖宗不足法人言不足䘏罷黜中外老成人幾盡多用門下儇慧少年久之以旱引去洎復相歲餘罷終神宗世八年不復召而恩顧不久衰云弟安國安禮子雱安國字平甫自丱角未嘗從人受學操筆為文語皆驚人神宗即位近臣薦其才行為武昌軍節度推官教授西京國子監召對神宗曰卿學問通古今以漢之文帝何如主也對曰賢主也神宗曰但惜其才不能立法更制爾對曰文帝自代來夜入未央宫定變故於呼吸俄頃之際恐無才者不及是然能用賈誼言待羣臣有節專務以徳化民海内興於禮義幾至刑措使一時風俗耻言人過則文帝加有才一等矣神宗曰王猛佐苻堅以蕞爾國而令必行今朕以天下之大而不能使人何也對曰王猛睚眦之忿必報專教苻堅以峻刑法殺人為事此必小臣刻薄有以誤陛下者願專以堯舜三代為法又問安石秉政物議如何對曰但恨聚歛太急知人不明耳神宗黙然久之除崇文院校書改著作佐郎袐閣校理初吕惠卿諂事安石安國惡之一日安石與惠卿論新法于其第安國好吹笛安石諭之曰宜放鄭聲安國曰亦願兄逺佞人惠卿深銜之乃因鄭俠獄陷安國見俠傳安國坐非毁其兄放歸田里歲餘而卒年四十七有文集六十卷元祐中復祕閣校理子斿安禮字和甫中進士第召對神宗欲峻用之以兄安石當國乃為崇文院校書久之直集賢院出知潤州移湖州為開封府判官同修起居注故事左右史記言動無得輒有所陳至是許直前奏事召試知制誥彗星見安禮上疏曰和氣致祥乖氣致沴意者執政大臣是非好惡不遵諸道乗權射利者不察上惠養元亢之意用力殫於溝瘠取利究於園夫殆有以召星變臣願陛下省不急之改作紓不勝之工力至於祈禳小數貶損舊章恐非應天以實者進翰林學士知開封府事至輙斷庭無留訟久係待辨者一切論決京師稱治元豐四年拜尚書右丞遷左丞御史言安禮在湖潤與倡女共飲遂罷以端明殿學士知江寧府遷資政殿學士知青州徙揚蔡二州言者論其貪落職知舒州復資政殿學士再知揚州改永與軍太原府卒年六十二贈右銀青光禄大夫安禮姿貌魁偉有口辨嘗以經綸自任而濶略細謹云雱字元澤未冠著書已數千百言舉進士為旌徳尉作䇿三十餘篇極論天下事又作老子訓傳及佛書義解亦數萬言有以雱書聞者召見除太子中允崇政殿說書被㫖撰詩書義擢天章閣待制書成遷龍圖閣直學士雱病疽已彌年辭不拜卒年三十三贈左諫議大夫詔即其家上雱所著論語孟子義雱論議刻深常稱商君以為豪傑之士言不誅異議者法不行嘗勸安石誅不用命大臣安石曰兒誤矣政和三年封臨川伯從祀文宣王廟雱無子以族人之子棣為後徽宗時為顯謨閣待制臣稱曰安石之遇神宗千載一時也而不能引君當道乃以富國強兵為事擯老成任新進黜忠厚崇浮薄惡鯁正樂䛕佞是以廉恥汨喪風俗敗壊孟子所謂作於其心害於其事作於其事害於其政者豈不然哉烏虖安石之學既行則姦宄得志假紹述之說以脅持上下立朋黨之論以禁錮忠良卒之民愁盗起社稷為墟其禍有不可勝言者悲夫東都事略卷七十九
