body:
  text: 東都事略卷八十宋王稱撰列傳六十三陳升之字陽叔建州建陽人也舉進士為校書郎知南安縣徙知漢陽軍為監察御史張堯佐以後宫親為三司使升之言其不可堯佐遂改為宣徽使景靈宫使升之復言其不可且曰已成之命雖不可以臣故追奪自今願以天寳為鑒防杜閒隙升之亦言事然持論不堅也改侍御史知雜事拜天章閣待制河北都轉運使知瀛州遷龍圖閣直學士知真定府召知諫院宰相文彦博屢乞罷政升之等恐樞密使賈昌朝復相乃疏其交通女謁之罪昌朝由此亦罷四年遷樞密直學士知開封府改右諫議大夫拜樞密副使臺諫官唐介吕誨趙抃王陶言升之交結宦者以圖柄任升之遂家居求罷仁宗手詔召出之介等復闔門待罪仁宗乃兩罷之升之以資政殿學士知定州徙太原府治平二年為陕西安撫使復拜樞密副使以母老丐便郡除觀文殿學士尚書左丞知越州徙大名府遂拜知樞密院事與王安石同制置三司條例司熙寧二年拜禮部尚書同中書門下平章事集賢殿大學士升之為人深沉多數善傅㑹以取富貴始為小吏與王安石相遇淮南安石深器之升之在樞府安石亦執政多變更舊制引升之共事升之心知其非而竭力賛助之以故先安石為相既拜乃言制置三司條例司難以僉書臣待罪宰相無所不統所領職事豈可稱司安石曰司者臣道也人臣固可稱升之曰今之有司皆領一職之名非執政之所宜稱安石曰古之六卿即今之執政有司馬司徒司空各名一職何害於理三公無官以六卿為官周公以三公為冢宰蓋其他三公或為司馬或為司徒或為司空古之三公猶今三師古之六卿猶今両府也宰相雖無所不統然亦不過如古冢宰而已冢宰掌邦治至於邦教邦政邦禮邦刑邦事則雖冢宰亦有所分掌矣升之曰若制置百司條例則可但今制置三司一官條例則不可神宗謂安石曰卿獨領可乎安石請用韓絳乃聽升之免條例司升之時為小異陽若不與安石皆同者天下謂升之為筌相以母喪去位終制拜同平章事樞密使契丹遣蕭禧来議河東地界理屈臥都亭驛不敢歸升之曰致饔授館有常禮過期曲留宜即裁抑禧慙沮乃行以足疾求罷拜鎮江軍節度使同平章事判揚州封秀國公請老以故官致仕卒年六十九贈太保中書令謚曰成肅初升之母竇娠至季秋為彌月父儼善推策得九日吉而升之以是日生故名從九從日字升之至神宗立乃以字為名云王珪字禹玉成都華陽人也徙家開封父凖為太常博士袐閣校理珪少好學日誦數千言及長博通羣書舉進士庭試第二為大理評事通判揚州召試學士院遷太子中允直集賢院同修起居注改右正言知制誥其文典麗有西漢風嘉祐初為翰林學士初詔以三聖並配於郊温成皇后立廟城南牲幣祼獻登歌設樂同太廟珪曰三后並配欲以致孝也而瀆乎享帝後宫有廟欲以廣恩也而僣乎享親於是郊以太祖專配而改温成廟為相近世享郊廟堂上升歌有節鼓而無柷敔珪言柷敔所以著樂之終始八音豈容有闕願詔有司考古增定之是歳明堂始置柷敔黜節鼓而用搏拊以備八音仁宗以英宗為皇子珪當草詔明日請對崇政殿曰天下望立皇子久矣果出自陛下意乎仁宗曰朕意決矣珪再拜賀曰陛下誠能為宗廟社稷計天下之福也於是退而草詔英宗即位詔珪撰仁宗謚珪言古者賤不誄貴㓜不誄長天子稱天以誄之欲稽舊典先請於郊遂為定制仁宗既祔廟珪以嚴父配天之義請以仁宗專配明堂明年小祥禮官言當以十月祫祭太廟而未終三年之制宜行時饗既禫請行禘祭珪曰神主祔廟已嘗告祭奈何禫畢復行饋食乎詔議濮安懿王典禮珪與禮官合奏宜依先朝封贈期尊稱皇伯濮安懿王三夫人當封大國執政不以為然其後三夫人卒如珪議除端明殿學士遷翰林學士承㫖熙寧元年當郊祀神宗疑亮闇珪曰王制喪三年不祭惟祭天地社稷為越紼行事不敢以卑廢尊真宗居明徳皇后之喪既易月而服除明年遂享太廟祀天地于圜丘請如故事其服冕車輅儀物音樂縁事神者皆不可廢從之三年除參知政事九年拜同中書門下平章事集賢殿大學士元豐二年以階易官珪時為禮部侍郎當為正議大夫遂越拜銀青光禄大夫兼門下侍郎同中書門下平章事監修國史珪嘗薦張璪不用珪曰臣為宰相三薦璪矣而不見用是臣失職也請罷神宗喜曰宰相當如是神宗欲以内侍李憲主兵珪奏非祖宗故事陛下獨不鑒漢唐之亂乎五年拜尚書左僕射兼門下侍郎以蔡確為右僕射初神宗既新官制先謂執政曰官制将行欲新舊人兩用之又曰御史大夫非司馬光不可時珪確相顧失色珪憂甚不知所出確曰陛下久欲收復靈武公能任責則相位可保也珪喜謝之自是西師深入靈武之役死者十餘萬蓋自西邊用兵神宗常持淺攻之議雖一勝一負猶不至大有殺傷至於西邊将帥習知兵事亦無肯言深入者非珪確不歴外任不習邊事無敢開此議者神宗不豫珪奏乞立皇太子請皇太后權同聽政候聖體康復依舊神宗首肯之皇太子既立未幾神宗升遐哲宗即位拜金紫光禄大夫封岐國公薨于位贈太師謚曰文恭紹聖四年章惇奏神宗寢疾之際中丞黄履吉大臣奏請建儲珪嘗語李清臣他家事外廷不當與邢恕又誘髙遵裕之子士京上書言珪當元豐末命嘗招其兄士充詢遵裕以建儲意遵裕怒叱其子勿再徃及議建儲珪初無語蔡確與章惇共詰之珪乃曰上自有子何議之有用此為珪罪遂追貶萬安軍司户參軍元符三年其子仲脩訴其父冤乃盡復故官贈謚及蔡京用事以珪為臣不忠入黨籍後以受八寳赦出籍云珪有文百卷號華陽集臣稱曰王珪為相隨時俯仰與蔡確比以沮司馬光而興西師之役此可罪也珪既死而為章惇所陷誣以為臣不忠追貶散秩則非其罪矣其後惇於簾前有異議亦以為臣不忠貶夫吉凶之於人猶影響也可不戒哉蔡確字持正泉州晉江人也為人有智數少舉進士為邠州司理參軍移繁昌令改著作佐郎知閿郷縣韓維知開封府奏為巡官後尹責確庭參確謂藩鎮辟除掾屬乃有此禮今輦轂下比肩事主雖故事不可用尹不能屈神宗聞而嘉之它日臺官闕執政奏乞除官神宗曰祗用不肯階墀見開封尹者遂除監察御史裏行王韶開熙河費用無蓺郭逵奏韶盗貸官錢詔杜純推治純奏以實宰相王安石怒再遣確鞫于秦州確希意逵純皆坐譴安石喜遷直集賢院除御史知雜事詔定奪渭州運河及黄河濬川杷利害確主范子淵而抑熊本本罷知制誥確遂代本知制誥知諫院三司使沈括以論免役事詣吳充確言括為近臣見朝廷法令有所未便不公言之而隂以異論干執政意王安石罷相大臣於法令有所更易故為朋附之資耳括坐是出知宣州又劾宣徽使郭逵經制安南逗撓不即平賊天章閣待制趙禼失措置芻糧觀文殿學士王韶知洪州謝表妄為自潔之辭歸過于上又論陳繹汙醜朋附不宜居侍從於是逵以左衛将軍安置禼降職韶落職知鄂州繹罷知制誥確益以彈撃為己任初相州有盗劫殺人州處以死大理寺以相州斷是刑部用新法引案問減等方爭論不決㑹皇城司奏獄事枉法者以御史中丞鄧潤甫監察御史上官均治其獄有㫖遣確詣臺參治潤甫均欲辨理于上前確獨鍜鍊其事潤甫均奏確掠訊過差人悉誣服確即劾二人黨有罪請逐之又任殘賊吏日引諸囚如使者慮問状稱冤者輒苦辱之神宗遣諫官黄履中使李舜舉審覆囚不知為詔使無敢一辭異於是皆抵罪而潤甫均俱出確遂代潤甫為御史中丞兼直學士院太學生虞蕃訟學官確與舒亶治其獄確遂劾參知政事元絳為其族孫伯虎私禱學官孫諤葉唐懿補内舎生諤唐懿坐貶絳罷政確遂代絳為參知政事人謂其為知制誥為御史中丞為參知政事皆以起獄奪人之位遂拜尚書右僕射兼中書侍郎時富弼在西京上言蔡確小人不宜大用確既相屢興羅織之獄搢紳士大夫重足而立矣神宗嘗對確稱邢恕謂其久在館中當遷確不可神宗不顧確有機巧退即遷恕著作郎自是恕為確黨矣神宗不豫繼而小康將御殿而疾再作確令恕要皇太后姪公繪公紀至東府令徃見恕恕曰家有桃著白華可愈人主疾幸留一觀入中庭紅桃華也公繪等驚曰白華安在恕執二人手曰右相令布腹心上疾未損延安冲㓜宜早定議雍曹皆賢王也公繪等懼曰君欲禍吾家徑去恕又徃問確曰上疾再作而外庭不知禁中必有變有大臣為之表裏者公為宰相不知一上起居状一日片紙以某人為嗣公未知死所公自度有功徳在朝廷乎天下士大夫素歸心乎確悚然曰且奈何恕徐曰上不豫公能辦建儲一事則如泰山之安矣但今日建儲不比異時當為備確曰如何恕曰宜用知開封府蔡京領儈子令待變於外公但作問疾以入若大臣有異議者呼京領儈子斬之祗可使章惇知韓縝已下不可使知也確愧謝謂恕曰君見子厚謀之惇時為門下侍郎恕見惇如對確言確遂約左相王珪及知樞密院韓縝與惇等同入問疾至政事堂確惇議紛然珪徐曰上自有子確惇不能起事入對福寧殿珪奏乞立延安郡王為皇太子請皇太后權同聽政神宗許之太后於簾下泣曰相公等能如此甚佳撫哲宗曰兒孝順自皇帝服藥不離左右親書佛經願皇帝早安珪等出逄二王于殿門外惇厲聲曰上立延安郡王為皇太子矣二王曰天下幸甚確惇既出禁中無他事蔡京乃放散儈子神宗崩哲宗即位遷通議大夫王珪薨代為左僕射兼門下侍郎為山陵使以祔廟遷正議大夫為言者攻其惡確不自安乃求避位除觀文殿大學士知陳州弟碩為軍器少監坐贓抵罪確坐故縱奪職知安州徙鄧州復觀文殿學士時知漢陽軍吳處厚奏確在安州作詩借郝處俊事以譏訕太皇太后詔確具析確奏曰臣在安州州有溳溪舊有郝處俊釣臺因歎其忠直見之詩句臣僚謂臣譏訕君親此最為深切處俊唐之直臣而上元中髙宗令其子周王等分朋角勝為樂及欲傳位於武后皆為處俊論議所囘故臣詩因歎其有敢言之直氣今臣僚以臣為譏訕其誣罔可見伏惟太皇太后以帝之祖母垂簾聽政而輒無故引唐髙宗欲遜位與皇后之事上瀆聖聽以此論之孰為大不恭孰為非所宜言也遂責光禄卿分司南司臺諫傅堯俞朱光庭梁燾范祖禹劉安世論確怨謗不道人臣所不忍聞按確與章惇黄履邢恕在元豐末結為死黨確惇執政倡之於内履為中丞與其僚屬和之於外恕立其閒徃來傳送自謂聖主嗣位皆有定䇿之功確所以桀驁很愎無所畏憚若不早辨白解天下之疑恐歳月浸久邪說得行離閒兩宫有傷慈孝於是宣仁后謂輔臣曰皇帝是神宗長子子承父業乃分當然昨神宗服藥旣久曾因宰執入對吾以皇子所書佛經宣示是時衆中唯首相王珪奏延安郡王為皇太子餘人無語確有何䇿立之功再責確英州别駕新州安置卒于貶所年五十七明年章惇為相追復確觀文殿學士黄履復為中丞與言官來之邵張商英劉拯論確先朝顧命大臣宜盡復官爵恩數乃贈太師謚曰忠懐又追封成衛二國公蔡京擅政自謂與確同功遂以確配享哲宗廟廷御書元豐受遺定䇿殊勲宰臣蔡確之墓賜其家其後京收用其子渭論其父定䇿之功未幾渭更名懋宣和中拜同知樞密院贈確清源郡王賜御製確傳立石墓前一門貴震當世靖康二年天子即位之二日有㫖辨宣仁聖烈皇后誣謗命國史院摭實刊修播告天下確追貶武泰軍節度副使懋單州團練副使英州安置臣稱曰自古有天下者必傳之子由禹以來莫不然也不幸當世主末命之際大臣有受遺輔政亦理之所必然者而小人當此遂謂有定䇿之功可乎烏虖神宗之與子宣仁之立孫庸有異議而確敢貪天之功乎敢以臣而誣君乎迹其姦凶謂當播其惡以正典刑而乃因詩罪之竄死嶺嶠以啟後日之禍誣累宣仁者幾三十年馴致大亂而後已抑國家之不幸也東都事略卷八十
