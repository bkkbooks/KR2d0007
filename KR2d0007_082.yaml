body:
  text: 東都事略卷八十二宋王稱撰列傳六十五蔡挺字子正應天府宋城人也其兄抗字子直登進士甲科補太平州推官平江軍節度掌書記潁川郡王伴讀英宗在藩邸器重之請於濮安懿王願得與游每見抗衣冠盡禮義兼師友再遷太常博士通判秦州為袐閣校理知蘇州徙廣南東路轉運判官英宗即位召對語抗曰卿朕故人勿以常禮自疏也以為工部郎中兼起居舍人同知諫院時議追崇濮安懿王抗引禮為人後大一統之義指陳切至涕下被面英宗亦泣㑹京師大水抗推原咎證在濮園議執政以抗在言路不便之召試知制誥罷諫職進龍圖閣直學士出知定州英宗曰第行且召卿矣潁王立為皇太子除抗詹事未至英宗崩改樞密直學士知秦州後靈駕發引抗因大慟哭遂得疾日中而卒年六十挺亦舉進士為慶州推官富弼使契丹奏以挺從行弼以所議誓書有所更易遣挺自雄州馳馹詣中書白執政仁宗欲知敵中事亟召挺挺有父喪聽服衫帽對便殿范仲淹宣撫陜西河東奏通判涇州徙鄜州挺知弼仲淹與吕夷簡不同道乃持其機事泄於夷簡遂為開封府推官提㸃京畿刑獄至和中河決商胡挺坐與李仲昌建議塞北流以入于六塔而河決追一秩停所居官嘉祐中起知南安軍擢江西提㸃刑獄時鹽賊為江西福建八州之患挺告諭所部私藏器甲者與其首納原其罪所得兵械以萬計於是盜販者衰歲增賣鹽四十餘萬治平初召為陜西轉運副使上書論禦戎攻守大計遂除直龍圖閣知慶州三年諒祚冦大順城𠂻銀甲氊帽以督戰挺先選強弩八百列于壕外注矢下射重甲洞貫諒祚遁去挺按視馬練平左通鄜延右固華池地形便可城即遣將護築城成分屬羌三千守之賜名荔原堡神宗即位除天章閣待制徙渭州挺建勤武堂輪諸將每五日一教閲五伍為隊五隊為陳陳橫列三鼓而出之並三發箭復位又鼓之逐隊槍刀齊出以步鼓節之為擊刺狀十步而復以上凡復位皆聞金即退騎兵亦五伍為列四鼓而出之射戰盤馬先教前一日將官㸃閲全備乃赴教再閲之隊中人馬皆強弱相兼強者立姓名為竒兵𨼆於隊中遇用竒則别為隊出戰涇原路內外凡七將又涇儀州左右䇿應將每將皆馬步軍各十陳分左右各第一至五日閲一陳此其大槩也神宗甚善其法時土兵有闕詔募三千人挺奏以義勇㸃刺纍年雖訓肄以時而未施於征防可以按府兵遺法俾之分畨更戍無補所闕土兵詔問挺措置逺近分畨之法挺即條上以涇渭儀原四州義勇分五畨畨三千人防秋以八月十五日上九月罷防春以正月十五日上三月罷周而復始比之募土兵省費多矣從之挺又撿括並邊生地漢畨冒耕田四千八百頃募佃以充邊儲邊人冒市蕃部田挺開自首免罪法復得地八千頃刺弓箭手三千養馬五百鎮戎軍三川髙平定川寨舊壕外有曹英新壕兩壕之間土膏腴東西四十里南有土山挺因險築寨乘髙四望護壕內地及覘賊往來築十八日畢開地二千頃募弓箭手三千人耕守之賜名熙寧寨熙寧初賊兵數萬集於瓠蘆河挺度其必入寇勒諸將分守衝要七日而賊至竒兵出賊不意遂驚潰遣四將分路追討破落勒緩等七族遷右諫議大夫賊數萬寇華池大順荔原諸寨挺正遣總管張玉統諸將兵合萬人策應虜解圍去慶州軍亂關中大擾挺遣張玉將兵招捕至邠遇賊盡殺之神宗曰慶州兵叛不至猖獗涇原之力也遷龍圖閣直學士五年召拜樞密副使神宗問挺涇原訓兵之法召部將按于崇政殿以為諸路牙校法北朝議雲中地界久不决挺請盡召還河北緣邊戍兵示以無事兼可積蓄邊儲因奏乞置三十七將將有正副及畿縣及諸道兵分肄皆給虎符以河北路次第為額又以河北兵數教習不如法緩急不足用奏乞於陜西選兵官訓練京城門鑰不嚴緩急無以防姦請置銅符以嚴防禁從之七年以疾罷為資政殿學士判南京留司御史臺卒年六十六贈工部尚書諡曰敏肅挺為人有智計多詭譎自以有勞久留邊作為歌詞有應念玉關人老之句因中使以逹禁中神宗閔之遂召用云王韶字子純江州德安人也舉進士調新安簿建昌軍司理參軍因客遊西邊時神宗初立韶內知天子智勇有志于天下乃上平戎䇿曰國家欲制西夏當復河湟河湟復則西夏有腹背之憂自唐乾元以後吐蕃陷河隴至今董氊不能制諸羌而人自為部莫相統一宜以時并有之以絶夏人之右臂凡數千言神宗覽而竒之召問方略以為秦鳳路經略司機宜文字時青唐俞龍珂族大難制而渭源諸羌與夏人誘令附已有司請討且城之韶以為非計遂親帥數騎直抵其帳中招諭之且留宿以示不疑青唐渭源皆遣其族隨韶歸附改保平軍節度推官召對因言渭源成紀閒有曠田萬餘頃可募人營田及秦鳳諸羌互市之利歲在商賈者不知幾千萬乞置市易以實邊朝廷從之改著作佐郎提舉鳳翔西京節度使兼管營田市易公事蕃僧結吳叱臘康尊新羅結潛迎董容詣武勝軍立文法謀昏夏國有并吞諸羌之意韶諭以禍福招兵豪酋撒四等降之結吳叱臘等至解內罷昏未幾康尊新羅結就擒於吳諸羌多降附者其後結吳叱臘出降俞龍珂率其族十二萬口內附熙寧三年詔奏墾田數知秦州李師中言其不實奪一官既而還之入對加太子中允袐閣校理五年改古渭寨為通逺軍以韶兼知軍韶上所降蕃部版圖得地二千餘里口二十餘萬以功授右正言直集賢院加集賢院修撰舉兵城渭源堡破蒙羅角遂城乞神平破抹耳水巴族初賊恃險韶領師至抹邦山踰竹牛嶺壓賊軍而陳下令曰敢有言退者斬使皆下馬少息賊乘髙下戰官軍稍却韶麾帳下兵逆擊之賊潰走獲首虜器甲焚其族帳洮西大震㑹木征度洮來寇餘黨復集抹邦山韶語諸將曰若官軍至武勝則抹邦山可一舉而定即趍武勝遇木征首領瞎藥等與戰破之遂城武勝武勝故武始郡也賜名鎮洮軍復遣將擊破木征木征走弟結吳延征舉其族二千餘人并大首領李藺氊等出降升鎮洮軍為熙州以熙州洮岷州通逺軍為一路即熙州為帥府進韶龍圖閣待制知熙州領兵由香子城討河州木征戰敗棄城遁降羌反圍香子城而諸羌屯積慶寺以應之韶回軍欲擊諸羌而木征復入河州韶擊叛羌解香子圍破積慶寺諸羌而還遷樞密直學士韶復遣將度洮略定南山地築回樂寨結河當川二堡韶自領兵破訶訥城固城之又城香子令諸羌人謀伏兵南山斷官軍歸路不利即伏木臧城韶諜知之遣將賜其伏兵投之穿露骨山南入洮州界破木征弟巴氊角盡逐南山諸羌木征留其黨守河州自將親鋭尾官軍伺擊韶分兵為兩道别遣將其一攻河州而以其一將逆木征所在與戰破走之韶至河州時守者猶以為木征至已而知其非乃出遂城之韶又至馬練川降瞎吳叱進攻拔宕州通洮山路岷州本令征以城降進軍岷州通熙州路疊州欽令征洮州郭厮敦皆詣軍以城聽命巴氊角亦以其族來附是役也行軍五十四日涉千八百里復州五辟地東西千里斬首三千餘級獲牛羊馬以萬計以功遷端明殿學士兼龍圖閣學士左諫議大夫入覲進資政殿學士兼制置涇原秦鳳軍馬糧草賜崇仁坊第一區韶還至興平㑹知河州景思立出兵踏白城敗績賊圍河州韶曰賊所以圍河州者恃有外援也今知救至必設伏以待我不若以兵直趍定羌遣將破耳金欺當二族進次寧河分兵討南山羌賊賊失援驚潰初思立輕敵覆軍賊勢復振而京師風霾旱災連仍論者欲棄河湟神宗為之旰食數遣中使戒韶駐熙州持重勿出及是捷聞神宗大喜賜詔嘉之韶還熙州遣將以兵循西山出踏白後賊黨望風奔潰斬獲甚衆於是木征請降進觀文殿學士禮部侍郎七年拜樞密副使以母老丐外任除觀文殿學士户部侍郎知洪州以表謝上御史蔡確言其罔慢落職知鄂州久之還舊職復知洪州卒年五十二贈金紫光祿大夫諡曰襄敏韶好兵喜殺有方略及罷樞府獻所著書名曰發明自身之學皆荒浪狂譎之語云九子厚為將有功端徽宗時為顯謨閣待制宷嘗著作東觀後為兵部侍郎以左道誅厚字處道少從父韶兵閒習羌事以父任為大理評事後以文易武為禮賔副使佐熙河帥府㑹吐蕃種落亂其王瞎征隴拶爭國厚與河州守將王瞻欲招徠羌人復故地師出塞下邈川諸城瞎征以其屬來降厚次青唐隴拶擁萬騎出迎遂定青唐元符末湟鄯不守厚坐貶監隨州酒稅再貶賀州别駕郴州安置崇寧初復故官自湟鄯棄畔羌多羅巴等迎隴拶之弟曰溪賖羅撒復國朝廷賜隴拶姓名曰趙懷德令還邈川溪賖羅撒之黨謀掩殺之懷德懼奔河南議者謂諸羌連結且生邊患朝廷方謀鎮輯而大臣有薦厚者賜對命知河州兼經略使厚請擇人以自助遣童貫與皆至乃如京玉關厚請進兵邈川與諸將分部而進於是髙永年為統制官以兵三萬出京玉厚以兵三萬出安鄉多羅巴結連鄯廓兵衆未㑹使其三子長曰阿令結次厮鐸麻令次阿蒙驅以數萬人據險自守進擊敗之殺阿令結厮鐸麻令阿蒙驅目中流矢而去道遇其父來援告之乃俱遁進至湟州攻三日拔之以功拜威州團練使帥熙河溪巴溫之妻大掌牟率諸部籍土地請降既乃歸之京師三年厚命髙永年以左軍循宗水張誡以右軍出宗谷厚以中軍出綏逺㑹于宗哥川溪賖羅撒置陳倚北山厚以中軍登山攻其背自督強弩迎射之賊大敗溪賖羅撒以一騎馳去未至鄯州五里僞國主龜兹公主胄宜結牟及大酋李阿溫率衆開門降更鄯州曰西寧州拜武勝軍留後以率制夏人坐逗留降郢州防禦使初大掌牟之入見也徽宗親撫諭使歸而誘致其子至是趙懷德遣使約降而猶豫未決厚以書諭之懷德遂送欵復武勝軍留後還朝提舉中太一宮卒贈寧逺軍節度使諡曰莊敏薛向字師正京兆長安人也以䕃為太廟齊郎調永夀簿稍遷監在京榷貨務知鄜州時大水冒城郭州兵廣鋭振武二指揮戍延州營兵聞之詣副總管王興求還興不能決乃相率逃歸至則家人無存者乃聚謀為盜郡人震恐向遣親吏諭之曰冒法以救父母妻子人之情也而不聽汝歸者武帥不知變之過也汝聽吾言亟歸收親屬之尸吾當貸汝擅還之罪不聽吾言汝無噍類矣皆泣謝境內乃安向言河北糴法之弊以為備邊十四州悉仰食度支歲費五百萬緡得米粟百六十萬斛其實才直二百萬緡耳而歲常虛費三百萬緡入豪商蓄販之家今既用見錢實賈革去虛加之弊矣雖然必有以佐之則其法可行故邊榖貴則糴澶魏粟以給邊新陳未交則散糴賈以救民乏軍食有餘則坐倉以待不足使見錢行而三利舉則河北之穀不可勝食矣於是置糴便糧草司以任向又以為提㸃河北刑獄兼糴便事入為開封府判官三司度支判官陜西轉運副使兼制置解鹽又以向提舉買馬監牧向吏事精鋭所至以辦治聞永昭復土計用錢糧五十萬貫石而三司不能備議者請移陜西緣邊入中於永安縣向陳五不可遂以其數獻坐嘗夜至靈寶縣向先驅入驛與應靈縣令崔令孫爭舍驚迫令孫至死降知汝州頃之復以為陜西轉運副使向使陜西八年其課最為緡千三百四十餘萬市鹽於官為斤三千三百一十餘萬市馬於邊為匹四萬五千斂糴芻糧為石束五千二百二十餘萬而奉昭厚二陵給賜豫刺兵民别費錢糧又百萬种諤取綏州向與諤不俟命以所部兵出塞城綏州議者以諤擅發兵當誅諤貶隋州向亦貶知絳州再貶信州移鳳翔府又改潞州王安石執政以向為江淮等路發運使領均輸之職運舟兵工交利侵盜貿易甚則託風水沈舟以滅迹歲不下减二十萬斛向始募客舟以官舟運費寡而物良而舊弊悉去兼領廣南福建坑冶市易拜天章閣待制權三司使遷右諫議大夫王韶開洮河費不資向悉力營辦遷龍圖閣直學士以樞密直學士給事中知定州遷工部侍郎入見論兵于上前遂拜同知樞密院事向知民不便蓄馬令議欲改諫官舒亶劾奏向論事反覆無大臣體罷知潁州改隋州卒年六十六向為吏有心計其商略財利無遺算然亦多病民也有子嗣昌徽宗時為尚書臣稱曰蔡挺以邊臣用王韶以熙河奮薛向以財利進夫殺人之禍莫大于用兵而聚斂之禍與殺人等烏呼嫁怨於上以為身謀而謂我能為辟土地充府庫也是亦不志於仁而已東都事略卷八十二
