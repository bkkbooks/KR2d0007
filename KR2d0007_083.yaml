body:
  text: 東都事略卷八十三宋王稱撰列傳六十六吕惠卿字吉甫泉州晉江人也舉進士為真州推官曾公亮薦為集賢校勘熙寜二年王安石領制置三司條例司以惠卿為檢詳遷集賢校理崇政殿說書方是時建青苖助役水利均輸之政置提舉官行其法於天下謂之新法一時奏請皆惠卿發之時議學校貢舉惠卿乞選通經術曉政事之人主判太學令侍從舉有學術行藝者為教授自京師至諸州皆建學取以經義䇿以時務殿試專以䇿問而學校貢舉法俱以次推行於是王安石乞罷制舉馮京曰漢唐以來豪傑多此塗出不可廢惠卿謂制科止於記誦非義理之學一應此科或為終身之累制科遂罷兼判司農寺父喪服除授天章閣侍講修起居注知制誥七年為翰林學士時王安石因久旱去位以執政薦惠卿遂拜右諫議大夫參知政事惠卿既執政恐安石復用遂起王安國李士寜之獄茍可以陷安石者無所不為八年神宗復召安石為相惠卿不自安㑹惠卿弟升卿考試國子監而惠卿妻弟方通在髙等為御史蔡承禧所奏既而中丞鄧綰言惠卿崇立私黨阿蔽所親強借富民錢置田産遂罷政事知陳州惠卿訟安石用綰誣辭而見黜因謂安石盡弃舊學而隆尚從衡之末數以至譖愬脅持蔽賢姦黨移怒行很方命矯令罔上要君凡此數惡莫不備具平日聞望掃地盡矣謀身如此以之謀國豈有逺圖陛下平時以何如人遇安石而安石亦以何等人自任而乃失志倒行而逆施一至是哉十年除資政殿學士知延州加資政殿大學士知太原府神宗諭惠卿令總四路守備惠卿上疏言陜西之師非惟不可以攻亦不可以守為今之計要在大為形勢神宗曰如惠卿之言陜西可弃也豈宜委以邊事遂落職知單州元豐六年復資政殿學士知定州移太原哲宗即位復資政殿大學士移知揚州引疾提舉崇福宫時諫官蘇轍疏其姦以為惠卿辨詐姦凶見利忘義王安石初任執政用之心腹惠卿指摘教導以濟其惡青苖助役議出其手又建手實簿法尺椽寸土撿括無遺雞豚狗彘抄劄殆遍小民怨苦甚於苗役又因保甲正長給散青苖結甲赴官不遺一户上下掻動不安其生旋又興起大獄以脅士人力陳邊事以中上意永樂之敗大将徐禧本惠卿自布衣保薦擢任終始協議遂付邊政敗聲始聞震動宸極循致不豫初實由此安石之於惠卿有卵翼之恩有父師之義方其求進則膠固為一更相汲引以欺朝廷及其權位既均勢力相軋反眼相噬化為讎敵惠卿發安石私書有無使齊年知齊年者馮京也先帝猶薄其罪惠卿復發其一曰無使上知先帝由是不恱安石夫惠卿與安石出肺肝託妻子平居相結惟恐不深故雖欺君之言見於尺牘不復疑間惠卿方其無事已一一収錄以備緩急之用一旦爭利遂相抉摘不遺餘力此犬彘之所不為而惠卿為之伏乞陛下斷自聖意将惠卿追削官職投畀四裔以禦魑魅初哲宗立首發安邉之詔惠卿時帥太原乃違命遣將出兵西界至是御史中丞劉摯亦論其罪以為惠卿勞師動衆以造釁夷狄其罪猶未足論而其公違詔敕擅發師旅實無人臣之禮則其罪不可以不治謹按惠卿遭遇暴起初不以道幸嘗備位執政不深惟大義報國乃欲徼非常之功圖再進用且邊竟本自無事又陛下新即寳位未遑用武故上循祖宗故事加惠邊垂所以休息軍民慰安夷夏至恩盛徳孰不忻戴而惠卿以前兩府居帥守之任所宜将順上意以安人情乃敢以貪功幸進之志為此亂階夫違廢詔敕虧臣子之道其罪一也當陛下諒隂之中謀動干戈其罪二也受神宗遺詔未逾月而忘哀戚之情兾幸功賞其罪三也致新天子命令失信於四夷其罪四也開邉方之隙至今儆備未得安静其罪五也夫惠卿天下知其為姦人也方命擅兵天下之大惡也以天下之姦人行天下之大惡臣恐防㣲杜漸朝延不當涵養而不問也請以臣章付外施行以為姦臣叛命之戒責授光禄卿分司南京蘇州居住尋又責建寜軍節度副使建州安置移宣州復中散大夫提舉崇福宫紹聖初以資政殿學士知大名府尋復大學士知延安府夏人舉國犯塞惠卿修築米脂等砦㑹破夏羌于大沙堆拜保寧軍節度使惠卿與章惇外相善惇以兄事惠卿而心實忌之故惇作相惠卿不得入朝帥延安累年止於建節惇既貶讁元祐臣僚惠卿聞之笑曰章子厚得合死罪人輒放之其凶險如此徙鎮武勝移知杭州復為觀文殿學士崇寜初拜武昌軍節度使知太原府以右銀靑光禄大夫觀文殿學士致仕起知揚青杭三州妖人張懐素謀不軌惠卿子淵見懐素道妖言不以告懐素既誅淵配沙門島惠卿坐責祁州團練副使宣州安置移鄂州廬州復資政殿學士提舉明道宫又復觀文殿學士為醴泉觀使未幾致仕卒年八十贈開府儀同三司有文集一百卷荘子解十卷張璪字邃明洎之孫也舉進士為王安石吕惠卿所知熈寜間為諌官御史劾鄭俠不當論列王安石俠與安石弟安國俱坐貶累擢三司副使遷右正言知制誥翰林學士遷承㫖璪建言天地合祭議者不一竊謂陽生於十一月隂生於五月以冬至日祀天於地上之圜丘夏至日祭地於澤中之方丘此萬世之不可易也謂宜即郊祀之歲於夏至之日盛禮容具樂舞遣冡宰攝事雖未能當於禮庻幾先王之遺意猶有存者自是南郊北郊之議興焉元豐四年拜參知政事五年改中書侍郎哲宗立宣仁后聽政璪為諫官蘇轍王覿論其邪佞轍又上疏曰臣竊惟璪性極巧佞遇事圎轉昔王安石吕惠卿首加擢任被以卵翼之恩熈寧弊法皆璪等所共成就今二聖在上因民所欲降黜群邪變革衆弊清淨之風日月滋長獨璪仍在重位與聞大政不唯正人所共側目而璪之私黨亦自不安但以同列無傾邪之助臺諫有彈撃之請是以且自歛戢未敢為非度其中心未嘗一日無窺伺之邪謀忘王吕之故黨也於是遂罷以資政殿學士知鄭州歴定州大名府揚州加大學士元祐末卒璪初名琥更為璪云蒲宗孟字傳正閬州新井人也舉進士為蘇州推官英宗以水災下詔求直言宗孟以臣隂象婦女隂類兵隂物閹宦隂之餘姦臣隂之極佞邪隂之本四夷中國之隂雨潦之變殆為是七者上疏以為陛下左右所與圖事幃幄中二三貴人皆先帝所擇以遺陛下者也保全寵愛使不近權而專威福乃所以安顧命元老矣二年來既借之權又使之專陛下之事陛下但拱手宴息於宫中無所可否臣亢而王豫此隂氣所以盛而雨潦所以為害也陛下掖庭永巷多先帝時嬪御所給事而幽閉者誠不勝算以少言之宜不減數千百人是端闈之内宸極之次日夜常有數千百怨曠矣沴氣安得而不作也藝祖時後宫止二百八十人嘗因霖雨去者五十太宗時宫中不過三百人猶患其多陛下後庭安用數千百哉此隂氣所以盛而雨潦所以為害也宦官出入宫禁權均人主兩朝來尤為太甚榮辱出其語言公卿重足一迹道路不敢以目邪柔之夫附之以進先朝顯人為國家執政柄者多由其門以久富貴陛下踐極之日稍抑奪其氣又謫其渠魁而老黠者數人其心慊慊不足觖言望語無所不出以數十年猖狂自恣而一日為陛下所軋懐忿忍怨安知其不為黨姦助惡之計此隂氣所以盛而雨潦所以為害也鷙敵視於北貪戎翫於西常欲虵豕吾民而并吞中國者蓋積有年姦雄之人草伏而廬處四立而環顧但未有以發之下紓上急恐北方將破盟西夏將慢命姦雄之人將傳檄而起此隂氣所以盛而雨潦所以為害也驕兵滿天下而勁捍無賴者尤聚於京師與河北動有所欲徜徉睥睨視其上之人如仇讎平時無事竭天下之財耗天下之穀粟以飼養之可謂衣豐而食足矣三歲一郊賚閒時一特支舉一非常之禮又隨而賜予猶未厭其心也過萌無耻之求一旦不如所懐羣行而譟呼色怒而詆訕前世當治安之時莫不皆有可驚之事惟其不以為憂故至於無可奈何今國家之憂正在驕兵惟陛下深憂而熟計遠覽而獨斷使不至於無可奈何以定萬世之業祖宗之望也曩者其謀屢發近日其志轉憤但含蓄而未動耳此隂氣所以盛而雨潦所以為害也佞邪之人語言便嬛易以惑亂主聽自邇以來二數人得進見左右者是皆何人因縁攀附遂屢召而數進四方不知以謂陛下寵私昵忘公道矣陛下尚不知逺之乃屢召而數見此隂氣所以盛而雨潦所以為害也陛下欲御大臣在攬威福而制其自專欲洗怨曠在省其職局而去其無用欲清閽寺在裁損其數而正其洒掃欲御夷狄在先求賢將而大為儲蓄欲消姦雄在愛養良民而務行寛厚之政欲懲驕兵在奮威刑罷姑息而裁省宂濫之卒欲杜佞邪在舎私昵廓至公而御百辟陛下弭灾而塞變莫急於此七者既又地震宗孟復上疏益指斥大臣宫禁及宦官除館閣校勘熙寧中為集賢校理同修起居注直舎人院擢右正言知制誥同修國史為翰林學士兼侍讀神宗曰學士職清地近而官儀未寵自今宜佩魚學士佩魚自宗孟始也元豐五年除尚書左丞甞與神宗論及人材宗孟曰方今人材難得司馬光以朋黨壊之者半矣神宗曰卿乃不取司馬光邪蓋不以宗孟之言為然也六年御史論宗孟荒于酒色出知汝州踰年加資政殿學士知亳州元祐初改杭州移鄆州鄆素多盗宗孟痛加誅鉏盗為之衰盗固衰矣而所戮不可勝計也於是御史劾宗孟治鄆慘酷坐落職知虢州詔曰女不以龔遂為心朕獨不愧孝宣之用人乎明年復職知河中府移帥永興又移北都以疾求河中既至而卒年六十六宗孟趣尚嚴整性侈汰燕飲無度為時議所貶有文集五十卷奏議二十卷東都事略卷八十三
