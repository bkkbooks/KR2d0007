body:
  text: 東都事略卷八十五宋王稱撰列傳六十八王廣淵字才叔魏郡人也舉進士第宋城簿大理寺法直官編排中書五房文字盡得祖宗御筆類成千餘卷仁宗嘉之選知舒州留不行英宗在藩邸廣淵因獻其所為文章英宗愛其才及即位除直集賢院於是知諫院司馬光言廣淵姦邪不可近昔漢景帝為太子召上左右飲衛綰獨稱疾不行及即位待綰有加周世宗鎮澶淵張美為三司使掌州之錢穀世宗私有求假美悉力應之及即位薄其為人不用今廣淵當仁宗之世私自結於陛下豈忠臣哉願黜之以厲天下為羣牧判官遷三司户部判官更直龍圖閣兼侍讀英宗不豫廣淵憂思忘食寢英宗自為詔以慰安之曰朕疾少閒矣神宗即位中丞司馬光御史劉述蔣之竒復言廣淵傾巧邪佞不宜留侍左右出知齊州改京東路轉運使徙河東擢寶文閣待制知慶州韓絳宣撫陜西欲興師深入夏境檄慶州出兵方授甲士卒劫庫兵撤民室廬縱火廣淵亟召五營屯禦之其首吳達領衆二千斬關以逃廣淵遣姚兕林廣追擊之柔逺三都戍卒聞難欲應賊不果廣淵陽勞之遣歸舊戍濳戒蕃將趙餘慶以步兵五千閒道襲擊盡戮之兕廣追亡至石門山降其衆亂兵事聞徙廣淵永興軍行至奉天而事已平廣淵坐奪兩官復還慶州後二年遷龍圖閣直學士知渭州卒年六十贈右諫議大夫詔曰廣淵先帝所親厚不幸云殁今獨其弟臨其子得君仕宦稍著其議旌録之於是臨自皇城使為兵部郎中直昭文館知齊州賜得君同進士出身王陶字樂道京兆萬年人也為人爽邁眉宇韶秀美書翰博學能文舉進士甲科編校史館書籍除監察御史裏行時狄青罷右府為使相陶曰此亂階也請自今軍伍之人不得任樞密使相陳升之為樞密副使陶與趙抃唐介交章論奏不報遂出知衛州明年復以諫官召時英宗知宗正寺逾年不就職陶上疏曰自至和中聖體不豫之後天下之人日望上穹眷祐降生聖嗣內以承九廟祀享之重外以安四海億兆之心天貺莫期未如民志而內外小大之臣抗疏交章引古今陳災異請早建儲嗣者動以百數陛下納諫從善親發德音擇宗子之賢者使知宗正寺上以寅奉天心而俟與子之祥次以尊崇宗廟而修主鬯之職下以順悅人情而示强宗之本今宗正之命既出乃聞過為辭避良由宫中嬪御宫臣宦者有姑息之言陛下因而微惑使其畏避不敢前臣恐天下之人謂陛下始者順天心人欲而命之今者聽左右姑息之言而疑之若然則自今逺近中外姦雄之人得以窺伺閒隙矣臣職為諫官儻又不言則誰為陛下言者既而韓琦歐陽修亦皆力陳其事仁宗遂立英宗為皇子英宗猶稱疾陶言君父召豈容遷延蓋所遣使備禮致命不副聖意乞重行降責由是英宗入居慶寧宫英宗即位進右司諫直史館修起居注皇子初王淮陽後王潁陶皆為翊善擢知制誥遷龍圖閣直學士知永興軍召為太子詹事神宗即位進樞密直學士拜右諫議大夫權御史中丞神宗問以政事陶請謹聽納明功罪斥佞人任正士復轉對以通下情省民力以勸農桑先儉素以風天下限年藝以汰冗兵神宗然之時以司馬光吕公著為翰林學士神宗以問陶陶曰陛下得人矣初陶事韓琦甚謹故琦深器之驟加拔用至是神宗頗不悅大臣之專陶乃彈奏宰相不押常參班至謂琦為跋扈琦等待罪神宗以陶章示琦琦奏曰臣非跋扈者陛下遣一小黃門至則可縛臣以去矣神宗為之動而陶連奏不已乃以為翰林學士吳奎執詔不肯下遂以陶為樞密直學士知陳州改許州入為三司使拜翰林學士於是御史中丞吕公著論其反覆不可近陶亦固稱足疾以翰林侍讀學士知蔡州改河南府移汝州請老判南京留司御史臺遷給事中知陳許二州徙河南府神宗以陶藩邸之舊拜觀文殿學士知汝州道病卒年六十一贈吏部尚書諡曰文恪有文集二十七卷臣稱曰韓絳言富弼誣以不軌王陶論韓琦亦以為跋扈何其言之過哉自古賢君莫不導臣下以言言而有益天下之幸也言而非所宜言是豈朝廷之福哉以弼之賢琦之忠處宥密輔弼之地則百僚師師六服承德詎可肆為敢言而撼搖之原二子之用心非所謂是非之公也蓋出於愛憎之私爾烏呼昭明好惡以訓迪在位此人主之職也宜乎二子之見黜也陳薦字彥升邢州沙河人也舉進士調華陽尉韓琦帥定武舉為屬又用琦薦為祕閣校理神宗為潁王薦為王府記室參軍直集賢院神宗為皇太子擢右諭德拜天章閣待制河北水災為安撫使還知制誥兼知諫院薛向首謀取橫山而功不成薦引王恢事請正向罪權開封府踰月拜龍圖閣直學士河北都轉運使河決棗疆水官按視議恩冀深瀛之閒築生隄三百六十里役丁夫八萬三千工一月薦言河未能為四州患願以歲月圖之入判吏部銓與議學校貢舉法請倣漢率口察孝亷均之諸路什取一判太常寺范純仁胡宗愈劉琦錢顗相繼罷言職薦用御史天子耳目之官今以言而逐之是自蔽其耳目也權知御史臺言李定不持所生喪豈可以為御史數日罷臺事以太常議襲封中書以為不當坐降一官見秦王世家改羣牧使知開封府出知蔡州以疾請提舉崇福宫又知青州北京留司御史臺遷寶文閣學士提舉醴泉觀進右諫議大夫兼侍讀神宗以東宫舊僚拜資政殿學士引退命知邢州至邢未幾復請崇福宫卒年六十九薦儀狀魁偉詞氣莊重天性簡淡無聲色之好韓琦常謂人曰亷於進而勇於退嫌疑閒豪髮不處與人交久而不變如彥升者蓋無幾而司馬光亦服薦之質直云孫永字曼叔趙郡人也祖冲集賢院學士永年十歲而孤以冲蔭奏為將作簿舉進士調襄城尉宜城令治平三年潁王出閣永以選為侍讀明年建儲為太子舍人神宗即位為天章閣待制歷河北陜西都轉運使時以邊用不足以解鹽市馬别為一司外臺不得與永奏曰鹽馬國之大計使主者專其柄既無以統𨽻茍為非法孰從而制之遷龍圗閣直學士知秦州以築保失守降天章閣待制知和州久之復以舊職知瀛州河決貝州瀛兾諸州尤被患而民租以災傷倚閣者督斂如故永具以聞詔從其請仍命發廪粟以賑之白溝界河常患北人絶河捕魚巡檢趙用擅引兵北渡焚其帳族故敵侵略境上神宗遣中使密訪虛實因奏南北通好久但緣趙用起釁若罪之則無事矣用既繫獄永遣邊吏諭敵敵乃引歸加樞密直學士知開封府城都市賈收錢以免直名免行錢神宗慮立法未盡詔韓維及永究實利害而御史張琥言維與永定奪不當永罷降龍圖閣直學士知潁州會赦復舊職知太原府以將作監召還遷端明殿學士提舉崇福宫起知陳州徙潁昌府哲宗即位召拜工部尚書會議役法永以差役為是除吏部尚書明年以資政殿學士兼侍讀提舉中太一宫未拜而卒年六十八諡康簡陳襄字述古福州候官人也中進士為浦城簿後用富弼薦祕閣校理判尚書祠部時譯經僧法護遺奏度十僧趙槩奏列子廟乞三年度一道士襄皆執奏不行出知常州為開封府推官知明州明年同修起居注知諫院改侍御史知雜事王安石為政行青苗法襄上書言已三奏乞罷青苗而陛下未以臣為然臣觀制置司奏請莫非引經以為言而其實貸民以取利是特為管仲商君之術非陛下之所宜行臣願陛下為堯舜之君以仁義治天下不願陛下為霸主也陛下富有中國廣輪萬里內無強臣敵國之患外無西戎北狄之難凡四海九州之賦入供吾之用不為不足陛下不於此時與廟堂之臣坐而論道以行王政而反屑屑為均輸舉貸之事臣竊為陛下惜之又乞貶斥王安石吕惠卿以謝天下奏五上又乞免劉琦等罪召還范純仁除直舍人院兼天章閣待制明年知制誥直學士院襄既忤安石以草河北詔言水不潤下中書改之又赦文有奉祠紫宫以為語犯俗嫌出知陳杭二州入知通進銀臺司遷樞密直學士兼侍讀卒年六十四襄有學行與陳烈鄭穆周希孟友善閩人謂之四先生所至務先學校至親為講解好薦逹人材喜愠不形于色為政多慕古人所為然或迃濶頗不為人所服云孫洙字巨源廣陵人也年十九舉進士調秀州司户參軍於濳令包拯歐陽修舉洙賢良方正洙上策論五十篇善言祖宗事指切治體推往較今分辨得失抑揚條鬯讀之令人感動歎息韓琦見而竒之曰今之賈誼也編校祕閣書籍遷館閣校勘集賢校理治平末京師大雨水詔求直言洙上疏言時政七事要務十五事多可施行者為史館檢討同知諫院兼直舍人院乞增置諫官以廣言路王安石以論青苗事多逐諫官御史洙鬱鬱不能有所言懇求補外得知海州入為同修起居注知制誥直學士院神宗稱其學術行誼有聞於時博習墳史多識典故以為翰林學士且大用矣逾月而卒年四十九洙博學多智進退整暇道古今事有條理漢魏以來書記其文可道者皆成誦云東都事略卷八十五
