body:
  text: 東都事略卷八十六宋王稱撰列傳六十九熊本字伯通饒州番陽人也擢進士調撫州軍事判官稍遷祕書丞知建德縣縣占漁池為圭田本悉棄豫貧民神宗即位遷屯田貟外郎熙寧初置提舉官本領淮南路擢檢正中書禮房公事改户房六年瀘川羅晏夷叛以本察訪梓夔兩路本曰彼能擾邊者以十二村之衆乃誘其酋領誅之其徒股栗願效死自贖於是諸夷皆從風而靡願世為漢官奴遷刑部貟外郎集賢殿修撰同判司農寺神宗曰熊本不傷財不病民一旦去百年之患檄奏詳明可嘉也河湟初復以本為秦鳳路都轉運使熙河法禁闊略蓄積不支歲月本奏省官百四十員歲減浮費數十萬八年夏渝州南川獠人木斗叛詔本安撫夔路營銅佛埧破賊黨與焚蕩聚落以威德木斗氣索以溱州地歸得五百里為四寨九堡建南平軍朝廷議除本天章閣待制神宗曰熊本有文當遂典誥命除知制誥判司農寺都水監丞范子淵創鐵龍爪疏河謂可以濬河殺其勢計所濬退灘地為功文彥博守北都言小臣興利欺罔詔本行視坐附㑹彥博報不以實分司西京元豐中知滁州復集賢殿修撰知廣州召拜工部侍郎會宜州蠻擾邊道除龍圖閣待制知桂州至則溪洞酋長請選將練土兵以代戍守益市馬以足騎兵宜州遂無事初郭逵宣撫安南劉几以廣源郡建為順州朝廷以為不足守詔給賜李乾德疆畫未明而交人狂窺宜州之隙欲并取儂智會勿陽地搗虛指歸化逐智㑹智會竄古江乞師本道遣使問狀交人為斂兵乾德謝罪本請賜以宿桑八洞不毛之地嶺表遂安召為吏部侍郎以疾乞補外除龍圖閣待制知洪州言者謂本棄八洞為失謀奪一官徙知杭州又徙江寧府再知杭州未幾而卒有文集奏議共八十卷沈起字興宗明州鄞縣人也少力學舉進士為除州軍事推官監真州轉般倉起因父疾委官歸侍為有司所劾法官論以私罪仁宗謂輔臣曰觀過知仁今以赴父疾而致罪何以厚風教而勸為人子者邪釋之後為天平軍節度推官遷大理寺丞知海門縣地卑溽海波至則冒民田舍為築隄百里引江水灌田田益闢民相率以歸户口增益除監察御史吏部格選吏以臧私絓法無輕重終身不遷起論其情可矜者可限年叙用遂著為令立縣令考課法設河渠司領諸道水政乞采漢故事擇卿大夫子弟入宿衛選賢良文學髙第給事宫省不宜專任宦官以論不合出通判越州歲餘知蘄州徙楚州提㸃京東刑獄改開封府判官出為湖南路轉運使凡毛羽筋革舟楫竹箭之材多出所部取於民率以畝計吏為姦費或倍蓰起計實取之所省什六七官自與商賈交易而民不擾簿入有餘召為三司鹽鐵副使兼直舍人院未幾遷集賢殿修撰陜西都轉運使慶州軍變將寇長安起率兵討平之會韓絳城綏州不利起亦罷知江寧府為三司度支副使奉使契丹至其庭其著位與西夏使人班起曰西夏陪臣不當與王人齒辭不就列力爭遂升夲朝使者班熙寧五年以天章閣待制知桂州自王安石用事始求邊功王韶以熙河進章惇熊本亦因此求奮是時交趾亦旅拒廣西經略失於懷輯數致疑起妄意朝廷有攻取之議因遣官入溪洞㸃集土丁為保伍授以陳圖使歲時𨽻習繼命指使因督運鹽之海濵集舟師寓教水戰故時交人與州縣貿易一切禁止於是交趾益二大集兵丁謀入寇蘇緘知雍州以書扺起請止保甲罷水運通互市起不聽劾緘沮議起坐邊議罷以劉彞代之徙知潭州再閲月徙杭州交人大舉陷欽亷雍三郡死者數十萬人起坐守桂日失備謫為郢州團練副使㑹赦移溫州卒年七十二劉彞字執中福州人也幼沉重介特讀書必求其義舉進士為邵武尉再調髙郵簿移朐山令治簿書恤孤寡作陂池教種藝平賦斂抑豪猾扼游惰凡所以惠民無不至也類其事以為一書名曰法範熙寧初擢荆湖北路轉運判官留為條例司屬官乃言更法非便旋罷權都水監丞出為兩浙轉運判官奏課稱最遷直史館知桂州交趾陷欽廉雍三州責為均州團練副使隨州安置又改涪州徙襄州元祐初以都水監丞召卒于道年七十著七經中義百七十卷明善集三十卷居陽集三十卷沈括字存中吳興人也博覽古今於書無所不通舉進士為揚州司理參軍編校昭文館書籍熙寧閒除太子中允為檢正中書刑房公事遷集賢校理察訪兩浙農田水利遷太常丞同修起居注邊吏報北敵將入寇亟遣中貴人取兩河民車以為戰備民大驚擾自宰執以下言不便者牆進俱不省一日括持筆立御坐側神宗顧曰卿知籍車之事乎括曰未知車將何用神宗曰北敵以多馬取勝唯車可以當之括曰敵之來民父子墳墓田廬皆當棄去復暇恤車乎朝廷姑籍其數而未取何傷神宗曰卿言有理何論者之紛紛也括曰車戰之利見於歷世巫臣教吳子以車戰遂伯中國李靖用偏箱鹿角車以擒頡利臣但未知一事古人所謂輕車者兵車也五御折旋利於輕速今之民閒輜車重大椎朴以牛挽之日不能行三十里少䝉雨雪則跬步不進故俗謂之太平車或可施於無事之日恐兵閒不可用耳神宗益喜曰無人如此語朕者當更思之明日遂罷籍民車執政問括曰君以何術而立談罷此事上甚多太平車之說也括曰聖主可以理奪不可以言爭若車可用其敢以為非未幾以右正言知制誥察訪河北西路出使遼國使還以淮浙災傷為體量安撫使權三司使遷翰林學士括詣宰相吳充陳說免役事謂可變法令輕役依舊輪差御史蔡確論括非其職而遽請變法括亦待罪求去確復言括詭求罷免有詔令今供職臣竊惑焉且括謂役法可變何不言之於檢正察訪之日而言之於翰林學士之時不言之於陛下而言之於執政原括之意但欲依附大臣巧為身謀而已遂罷以集賢院學士知宣州復龍圖閣待制召還知審官院復以言者罷知青州尋知延州王師大舉伐西夏种諤帥師入銀夏州而不能有明年括請城永樂命徐禧李舜舉計議邊事李稷主糧餉遂城永樂距銀州五十里米脂五十里城成賜名銀州寨既而賊二十萬重圍永樂城攻益急城陷於是漢蕃官二百三十人兵萬二千三百人皆沒焉禧舜舉稷死之神宗以括始議責為均州團練副使隨州安置徙秀州復光祿卿分司南京以卒括嘗上熙寧奉元歷編修天下郡國圖著述頗多有春秋機括筆談行於世徐禧字德占洪州分寧人也熙寧初王安石行新法禧作治策二十四篇以獻時吕惠卿領修撰經義禧以進士充檢討又上治兵策除鎮南軍節度推官召對除太子中允館閣校勘監察御史裏行沂州劾李進謀反連宗室世居詔中丞鄧綰知諫院范百祿與禧即御史臺雜治有李士寧者挾術出入貴人閒常見世居母康以仁宗御製詩贈之又許世居以寶刀且曰非公不可當此世居與其黨皆神之曰士寧二三百歲人也解釋其詩以為至貴之祥及鞫世居搜得之逮捕士寧而宰相王安石故與士寧善百祿劾士寧以妖妄熒惑世居致不軌禧秦士寧遺康詩實仁宗御製今獄官以為反因臣不敢同百祿言士寧有可死之狀禧故出之以媚大臣朝廷以御史雜知樞密承旨參治而百祿坐報上不實貶禧進集賢校理檢正中書禮房公事安石與惠卿交惡鄧綰言惠卿昔居父喪嘗貸華亭富人錢五百萬買田不法神宗遣禧雜治獄方具而禧除荆湖北路轉運副使綰劾禧黨惠卿乞改付吏乃遣蹇周輔治之㑹綰貶官安石罷相惠卿獄亦解召知諫院尋差環慶路計議措置邊防事初陜西緣邊兵馬蕃弓箭手與漢兵各自為軍每陳多以蕃部為前鋒而漢兵守城伺便利然後出不分戰守每一路以數將通領之吕惠卿帥鄜延以為調發不能速集始變舊法雜漢蕃兵團結分守戰每五千人隨屯駐將具條約以上邊人及議者多言其不便神宗欲推其法於諸路遣禧往禧先具環慶法上之遣官措置涇原而渭帥蔡延慶以為不可朝廷亦是之并難禧環慶法禧歷疏涇原法疏略且言環慶法不可改神宗以禧為右正言直龍圖閣帥涇原以母憂去官服除召試知制誥兼御史中丞官制行罷知制誥專為中丞改給事中王師大舉伐西夏鄜延帥沈括因請城永樂詔禧與李舜舉往相其事括總兵以從李稷主糧餉城成禧與舜舉括俱還米脂寨明日賊數千騎趨新城禧亟往視之或說禧曰本被詔相城禦寇非職也禧不聽與舜舉稷俱行括獨守米脂比及永樂賊傾國而至前將髙永能請及賊未陳擊之禧曰爾何知王師不鼓不成列禧執刀自率士卒拒戰賊衆不啻十倍分兵迭攻重圍既合官軍不利禧汗流如雨賊逼門門閉城中乏水士卒渴死者大半括退保綏德城永樂孤絶賊攻益急城陷禧與舜舉稷闔城俱沒初括奏賊兵來逼城見官兵整故還神宗曰括料敵疏矣彼來未出戰豈肯遽退邪必有大軍在後已而果然神宗哀禧等死贈禧吏部尚書舜舉昭化軍節度使並賜諡曰忠愍稷贈工部侍郎仍厚恤其家舜舉內臣也纍擢文思使文州刺史參議涇原軍事五路出師無功朝廷再議興師舜舉入奏具言師老民困其言誠盡神宗為之罷兵遷嘉州團練使鄜延計議邊事稷始以父任為將作監主簿後為成都府路茶事初蜀茶額嵗三十萬至稷加及五十萬及陸師閔代稷又加為百萬稷以勞擢陜西轉運使以乏興降為判官永樂之陷俱死舜舉且死望闕再拜曰願陛下勿輕此賊至稷死乃云臣則千苦萬屈語聞神宗又為之一慟禧為人狂疏而有膽氣好言兵吕惠卿以此力引之故不次驟用先是惠卿在延州首以邊事迎合朝廷已而去官沈括繼之遂請討伐种諤以鄜延之師深入無功髙遵裕以環慶之師至靈武城下狼狽而還陜西河東騷然困敝天下共望朝廷息兵而沈括种諤陳進取之策復請城永樂神宗遣禧經畫之既入賊境略不為備寡謀輕敵以至於敗自是神宗始知邊臣不可信亦厭兵事無意西伐矣東都事略卷八十六
