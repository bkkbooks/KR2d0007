body:
  text: 東都事略卷八十八宋王稱撰列傳七十一吕公著字晦叔宰相夷簡子也識慮深逺有度量夷簡嘗曰此子公輔器也任為奉禮郎舉進士纍遷殿中丞通判潁州歐陽修為守甚重之召試館職辭不就判吏部南曹仁宗諭曰朕知卿有恬退之節嘉祐中同判太常寺數言濮王在殯請燕北使毋用樂輟上元遊幸廢溫成廟為祠多見聽用擢天章閣待制召試知制誥三辭不就兼侍講時壽星觀建真宗神御殿公著言都城中真宗有三神御殿而營建不已非祀無豐昵之義不報為諌議大夫時英宗修慶寧宫建夲命殿公著言畿內京東西淮南飢此豈修宫之時乎王疇為樞密副使知制誥錢公輔坐封還詞頭貶公著極論公輔舉職不宜出除龍圗閣直學士英宗問今之郊與古之郊何如對曰古之郊也貴誠而尚質今之郊也盛儀衛事物采而已時詔近臣議追崇濮安懿王或欲稱皇伯考公著曰真宗以太祖為皇伯考非可加於濮王也及詔下稱親公著言於仁宗有兩考之嫌又班濮王諱公著曰此羣臣於上前不當稱耳不宜與祖宗七廟同諱御史吕誨傅堯俞范純仁吕大防趙瞻坐論濮王事貶公著曰陛下臨御以來納諫之風未形於天下而誨等以言事去非所以風四方力爭之願與誨等俱貶英宗曰學士朕所重豈得輕去朝廷哉求去不已出知蔡州神宗即位召為翰林學士兼侍讀頃之兼寶文閣學士知通進銀臺司時御史中丞司馬光以言張方平不可為參知政事罷為學士公著封還制書言光以言舉職而賜罷則有言責者不得盡其言矣陛下雖有欲治之心而安危利害何從而知於是內出光誥付閣門又言誥不由封駮而出則是職因臣而廢乞正臣之罪以正紀綱神宗手批其奏俟邇英當喻朕意後數日講退獨留之語曰朕欲光勸講左右非為其言事也公著請不已聽解封駮事修英宗實録轉禮部侍郎知開封府自夏秋淫雨地震公著言自昔人君遇災異者或恐懼以致福或簡誣以致禍上以至誠待下則下思至誠以應之上下相與以誠而變異不消者未之有也夫衆人之言不一而至當之論難見君人者去偏聽獨任之弊而不私先入之言則不為邪説所亂顔淵問為邦孔子以逺佞人為戒蓋佞人惟恐不合於君則其勢易親正人惟恐不合於義則其勢易疏惟先格王正厥事蓋未有正事而世不治者惟陛下勉行之而勉終之數月復還翰林禮官議欲用唐故事以五月朔請御大慶殿受朝因上尊號公著言五月會朝始於唐德宗取術數厭勝之説憲宗以不經罷之況尊號非古典不繫人主重輕於是罷議尊號不受近臣有請吏非領郡者毋任監司公著曰人才類伏下僚而資格愈峻則簡拔愈難審其才可用宜不次用之試而無效則已之及請增館閣之選以長育人才文武官非素有罪戾者宜給奉以示始終多用其言拜御史中丞王安石秉政始置三司條例司行青苗斂散法公著極論其不可曰自昔有為之君未有失人心而能圖治者亦未有脅之以威勝之以辨而能得人心者今在位之賢者率以此舉為非而主議者一切以流俗浮論詆黜之豈有昔者賢而今皆不肖乎會韓琦論青苗之害神宗語執政吕公著嘗面奏若韓琦因人心不忍如趙鞅舉晉陽之甲除君側之惡陛下何以待之安石用此為公著罪罷為翰林侍讀學士知潁州宋敏求草公著詞云敷陳失實援據非宜安石不快欲明著其語陳升之以為不可安石乃自易之曰厚誣藩鎮興除惡之名深駭豫聞乖事理之實公著素謹密實無此言蓋孫覺嘗為神宗言今藩鎮大臣如此論列而遭挫折若當唐末五代之際必有興晉陽之甲以除君側之惡者矣神宗因誤以為公著也久之復寶文閣學士提舉崇福宫公著上疏曰陛下臨朝願治為日已久左右前後莫敢正言使陛下有欲治之心而無致治之實者何哉此任事之臣負陛下也夫士之邪正賢不肖蓋素定也今則不然前日舉之以為天下之至賢後日逐之以為天下之至不肖其於人才既反復而不一則於政事亦乖戾而不審矣古之為政初不信於民者有之矣鄭之子産是也一年而鄭人怨之三年而歌之陛下垂拱仰成七年於兹矣輿人之誦亦未異於七年之前也陛下獨不察乎起知河陽召還提舉中太一宫遷端明殿學士知審官院神宗與之極論治道遂及釋老虛寂之旨公著曰堯舜知此道乎神宗曰堯舜豈不知公著曰堯舜雖知此然嘗以知人安民為難此所以為堯舜也神宗又言唐太宗能以權智御臣下公著曰太宗所以成帝業者以能屈已從諌爾頃之拜同知樞密院事公著謝因奏曰臣老於中外蒙陛下收之桑榆唯知拳拳納忠以報恩遇自熙寧以來朝廷論議不同端人良士例為小人排格指為沮壞法度之人不可復用此非國家之利也願陛下加意省察神宗曰然當以次收用之時有請復肉刑者公著曰後世禮教衰而刑獄繁肉辟不可復將有踊貴屨賤之譏或欲取天府死囚試劓刖之公著曰不可刖而不死則此法遂行矣議遂寢元豐三年官制行改正議大夫樞密副使復同知樞密院事神宗賜手札曰顧在廷之人可託中外腹心之寄均皇家休戚之重無逾卿者可亟起視事初夏人幽其主秉常神宗將大舉兵討之公著曰問罪之師當得人為帥茍帥未得人不如勿舉及兵興河東陜西民力大屈大臣不敢言公著數為神宗言之五年以資政殿學士光祿大夫知定州是歲永樂城陷奏至神宗對輔臣曰邊民疾弊如此獨吕公著為朕言之它人未嘗及也徙揚州除資政殿大學士神宗將建儲諭執政曰來年皇子出就學當以司馬光吕公著為師保哲宗即位加銀青光祿大夫召兼侍讀提舉中太一宫宣仁后遣使迎問其所欲言公著奏曰先帝即位之初臣為學士命草詔以寬民力為先既而秉政者建議變舊法以侵民為意言不便者一切以沮壞新法斥去之故日久而弊愈深法行而人愈困陛下既深燭其弊誠得中正之士使講求天下利害上下協力而為之宜不難矣至則建言曰人君即位之初當正始以示天下修德以安百姓修德之要莫先於學學有緝熙於光明日日新又日新以至大治者學之力也臣昧死謹條上十事曰畏天曰愛民曰修身曰講學曰任賢曰納諫曰薄斂曰省刑曰去奢曰無逸公著所言十事皆據經直言其論薄斂云昔鹿臺之財巨橋之粟商紂聚之以喪國周武散之以得民由是觀之人主當務仁義而已何必曰利當時謂為君之道無出此十事者公著又言先帝定官制設諫貟之目甚備宜選忠鯁敢言士遍置諸左右使職諫諍拜尚書左丞自官制行三省並建而中書獨為取旨之地門下尚書奉行而已公著言三省官均輔臣也正如同舟共輿以濟江陸當一心並力以修政事諸事干三省者自今執政同進呈取旨而各行之遷門下侍郎拜右僕射兼中書侍郎司馬光薨公著獨揔揆務除吏皆一時之選時科舉專用王安石經義士無自得之學而朝廷文詞之官漸囏其選議者嘗欲以詩賦代經義公著請於經義科中益以詩賦而先經義以盡多士之能又戒有司毋以老莊書出題而學士不得以申韓釋老書為説經義參用古今諸儒之學毋專用王氏又復賢良方正科以致異能之士邊穀舊法儲三年而不足公著請增為五年大出糴本錢以助之邊用益給吐蕃大酋鬼章青宜結者董氊之别將也性凶悍為洮河之患者二十年朝廷罷兵減隴右戍又知夏人之怨失蘭州也遂合從寇邊議遣軍器監丞遊師雄諭旨諸將以便宜出師不逾月熙河將种諤生擒鬼章以獻夏人因遣使修朝貢之職元祐三年懇辭位拜司空同平章軍國事自宋興大臣以三公平章軍國者四人而二人則公著父子也四年以疾薨于位年七十二贈太師申國公諡曰正獻紹聖元年章惇為相以翟思張商英周秩當言路用其言削公著贈諡毁所賜神道碑再貶建武軍節度副使又貶昌化軍司户參軍徽宗皇子生復太子太保蔡京擅朝復降左光祿大夫指公著為姦黨首惡始置元祐黨籍刻石文德殿及尚書省又頒其書天下徽宗因災異感悟毁石刻除黨禁復公著銀青光祿大夫後復太師申國公諡正獻子希哲希績希純希哲字原明少好學王安石謂之曰士奉官而專科舉者為貧也有官矣而復事科舉是僥幸富貴利逹而已學者不由也希哲遂棄科舉一意古學父公著與安石以國事不合久在外希哲前後為管庫者幾十年元祐初公著登庸廣收天下之士而希哲以公著故不得用及公著薨既免喪除兵部貟外郎崇政殿説書希哲每勸導人主以修身為夲修身以正心誠意為主心正意誠天下自化若身不能修雖左右之人且不能諭況天下乎紹聖初出知懷州坐元祐黨分司南京和州居住徽宗即位起知單州召為祕書少監為曽布所不樂改光祿少卿以直祕閣知曹州尋奪職知相州徙邢州罷為宫祠卒年七十八希哲為人端重有至行晚年名益髙云子好問希績字紀常有賢操元祐中為兵部貟外郎除淮南路轉運副使知壽州尋坐黨分司南京光州居住除知濮州後以壽終希純字子進方父公著為相未嘗進用公著既薨朝廷以希純為太常丞舊制太廟薦享逐室設常食一牙盤元豐四年有司奏罷之希純奏請復如舊制仍易其名曰薦羞改祕書丞遷著作郎為國史院編修官除起居舍人拜中書舍人同修國史紹聖初以寶文閣待制知亳州已而諌官張商英言希純附會吕大防蘇轍而中書舍人林希亦言希純變禮奉祀禮文薦牙盤事坐落職而牙盤復罷如元豐故事始公著在相位時商英為開封府推官欲居言路嘗云老僧欲住烏寺呵佛罵祖希純以商英語白公著公著不悅出商英為河東提點刑獄商英憾之至是攻希純兄弟為甚力俱坐降黜希純得知沂州尋分司南京金州居住又責信州團練副使道州安置移居唐州提舉鴻慶宫以卒臣稱曰以夷簡為父而公著為子其謀謨事業有大過人者蓋夷簡善任智而公著則持正以成天下之務賢於父逺矣昔伊尹相湯咸有一德子陟相太戊巫咸乂王家子賢以相祖乙漢之韋平唐之蘇李吾宋之韓吕氏皆以相業世其家烏呼盛歟東都事略卷八十八
