body:
  text: 東都事略卷九十宋王稱撰列傳七十三王存字正仲潤州丹陽人也舉進士調嘉興簿為國子監直講遷館閣校勘久之以母喪去服除判登聞鼓院纍遷修起居注乞復唐貞觀左右史執筆隨宰相入殿神宗韙其言故事左右史雖日侍立而欲奏事必禀中書俟旨存因對及之即詔左右史許直前奏事自存始也明年以右正言知制誥同修國史論圜丘合祭天地為非古當親祠北郊如周禮除龍圖閣直學士知開封府拜兵部尚書遷户部復為兵部元祐初加樞密直學士明年拜尚書右丞又明年遷左丞自存在兵部時太僕寺請內外馬政得專達毋𨽻駕部存言如此官制壞矣先帝正省臺寺監之職使相統制不可徇有司自便而隳已成之法執政有議罷畿內教保甲者存曰今京師兵籍益削又廢保甲不教非國家根夲長久之計時四方奏讞大辟刑部援此請貸而都省屢以無可矜恕却之存言此祖宗制也且有司援此欲生之朝廷破例欲殺之可乎又言比廢進士專經一科參以詩賦失先帝黜詞律崇經術之意河決而北幾十年水官議還故道存爭之曰故道已髙水性趨下徒費財力恐無成功卒輟其役蔡確以詩怨訕存與范純仁欲薄其罪確再貶新州存亦罷以端明殿學士知蔡州歲餘遷資政殿學士改知揚州復召為吏部尚書時在廷朋黨之論寖熾存入對首言人臣朋黨誠不可長然不察則濫及善人矣除知大名府改杭州紹聖初請老提舉崇禧觀遷右正議大夫致仕執政致仕不為東宫官自存始既而又降通議大夫存嘗悼近世學士貴為公卿而祭祀其先但循庶人之制及歸老築居首營家廟遷右正議大夫卒年七十九存性寬厚儀狀偉然平居恂恂不為詭激之行其所守確不可奪司馬光謂存並馳萬馬中能駐足者時人以為知言趙瞻字大觀鳳翔盩厔人也父剛太子賔客瞻舉進士調孟州司户參軍移萬泉令又知永昌縣築六堰均灌溉以絶水訟民以比召杜英宗即位為侍御史上疏請攬威柄明功罪廣聰明更積弊英宗嘉納議追崇濮安懿王瞻論稱親非是願與建議之臣廷辨以決邪正又與吕誨等合疏論列既而對延和殿英宗問濮圜議瞻曰陛下為仁宗子而濮王稱皇考非典禮英宗曰卿嘗見朕豈欲以皇考事濮王乎瞻曰此大臣之議也誨等既罷瞻亦出通判汾州神宗時為開封府推官神宗問青苗法瞻曰青苗法唐行之於季世擾攘中掊民財誠便今陛下欲為長久計愛百姓誠不便出為陜西轉運副使哲宗即位自知滄州召為太常少卿遷户部侍郎元祐三年以樞密直學士僉書樞密院事明年拜同知樞密院事都水王令圖請復黃河故道朝廷數遣使按行論者不一瞻曰還河之策未有定論今役徒三十萬用稍木二十萬投於水以僥幸萬一豈計哉屢爭於上前因得罷瞻在西府乞廢渠陽軍紓荆湖之力又乞棄西鄙城寨以易永樂遺民卒於位贈右銀青光祿大夫諡曰懿簡瞻為人寬仁愛人色溫而氣和人以為長者紹聖中言者以傅㑹元祐追奪所贈官著黨籍云傅堯俞字欽之鄆州項城人也十歲能為文未冠舉進士為新息簿纍遷太常博士擢監察御史裏行兖國公主下嫁李瑋為內臣梁懷吉張承照所閒仁宗斥二人者於外居無何復還主家而出瑋知衛州堯俞言主恃愛薄其夫家而朝廷又為之逐瑋而還𨽻臣甚悖禮為四方笑且陛下何以誨諸女仁宗春秋髙皇嗣未立堯俞請建宗室之賢以慰天下望英宗即位進殿中侍御史遷起居舍人同知諫院初英宗疾慈聖后同聽政至是疾平堯俞上書慈聖請還政久之頗聞內侍任守忠有讒閒語堯俞上書慈聖曰今物議紛然疑有讒閒故兩宫之情似未通臣謂天下之可信者無大於以天下與人亦無大於受天下以公況皇帝以明睿之資貫通古今而受人之天下乎殿下今日誅竄讒人則慈孝之聲並隆於天下矣於是慈聖還政逐守忠等大臣建言以濮安懿王宜稱皇考堯俞與吕誨等極論其事謂濮王於先帝為兄稱皇伯為是出知和州神宗即位移知廬州徙陜西轉運使除直史館遷鹽鐵副使出知江寧府陛辭以仁廟一室與藝祖太宗並為百代不遷之主哲宗即位知明州召為祕書少監兼侍講擢給事中吏部侍郎御史中丞御史張舜民以言事罷詔堯俞更舉御史堯俞封還詔書請留舜民即以堯俞為吏部侍郎堯俞不可遂以龍圖閣待制知陳州入為吏部侍郎復除中丞前宰相蔡確坐詩誹謗貶自宰相執政侍從御史以論不合罷去堯俞曰確之黨其尤者固宜逐其餘可以一切置之水官李偉言大河可從孫村導之還故道堯俞言河事雖不可渝度然比遣使按之皆言非便而偉又繆悠不肯任責豈可以遂興大役朝廷遂置偉議遷吏部尚書兼侍讀元祐四年拜中書侍郎在位二年卒年六十八贈右銀青光祿大夫諡曰獻簡紹聖中以元祐黨人奪贈諡著名黨籍後黨錮解下詔褒贈録其後云王巖叟字彥霖大名清平人也舉明經調欒城簿韓琦留守北京辟巖叟為屬韓絳代琦復欲留巖叟巖叟謝曰巖叟魏公之客不敢出他門也士君子稱之後知安喜縣元豐末召為監察御史上疏兩宫極陳時事之弊以謂不絶害源百姓無由樂生不屏羣邪太平終是難致是時方下詔求疾苦巖叟謂役錢斂法太重民力不勝願復差法如嘉祐元祐初遷左司諫李定不持所生母仇氏服巖叟論其不孝定遂分司裕陵復土蔡確為山陵使還朝以定策自居巖叟言陛下之立以子繼父百王不易之道也太皇太后先定策於中而確敢貪天之功乎確遂罷又論章惇凶焰日熾惡德不悛近簾前爭役法詞氣不遜無事上之體虧喪臣道凌弱主威惇由是亦黜又言張誠一嘗盜發其父墓取其繫犀帶又剝其母之首飾而誠一坐貶遷侍御史時左右正言久闕巖叟上疏曰國朝仿近古之制諫官才至六人方之先王已為少今復缺而不補臣所未諭豈以謂治道已清而無事於言邪人材難稱不若虛其位邪二者皆非臣所望於今日也願詔補諫臣無令久虛其職張舜民言不當遣起居舍人劉奉世封冊西夏主乾順以為大臣優假奉世為是過舉朝廷以其言失實罷監察御史巖叟合臺諫傅堯俞韓川上官均梁燾朱光庭王覿等論列乞還舜民職任以直集賢院知齊州入為起居舍人權吏部侍郎中書舍人遷龍圖閣待制充樞密都承㫖知開封府巖叟常謂天下積缺多若催免不一公私費擾乞隨等第立多寡為催法朝廷是之乃立定五年十科之令六年拜樞密直學士僉書樞密院事宣仁后諭曰知卿材故不次進用巖叟遜謝而進曰陛下聽政以來納諫從善務合人心所以朝廷清明天下安靜願信之勿疑守之勿失則宗社千萬世之福也用人之際望更加審察邪正正人在朝則朝廷安人君無過舉天下平治邪人一進則朝廷便有不安之象非謂一人便能如此乃其類應之者衆上下䝉蔽人主無由得知不覺養成禍患爾臣又聞有以君子小人參用之說告陛下者果有之乎此誤陛下也自古君子小人無參用之理聖人唯說君子在內小人在外則成泰小人在內君子在外則成否小人既進則君子必引類而去若君子與小人競進則危亂之基也陛下不可以不察初夏人來爭蘭州地界巖叟謂質孤勝如兩堡自元祐講和畫界當在我地蓋形勢膏腴之利豈可輕議棄與哉持不可宰相劉摯右丞蘇轍以人言求避位巖叟曰元祐之初排斥姦邪緝熙聖治摯與轍之功居多願深察讒毁之意重惜腹心之人無輕其去就兩宫深然之詔立皇后宣仁后曰皇帝選得賢后有內助之功巖叟曰內助雖是后事其如正家須在皇帝聖人所謂正家而天下定矣既退乃取歷代后事迹可以為法者成書一編曰中宫懿範上之七年罷為端明殿學士知鄭州移河陽卒年五十一贈正議大夫紹聖中坐元祐黨追貶雷州别駕梁燾字況之鄆州人也父蒨兵部貟外郎燾以父任為太廟齊郎舉進士中第編校祕閣書籍遷集賢校理樞密院檢詳文字提舉京西刑獄召為工部郎中元祐初為太常少卿遷右諫議大夫有請宣仁后御文德殿服冠冕者受冊者燾率同列諫引薛奎諫章獻明肅皇后不當以王服見太廟事宣仁后欣納又論市易已廢乞蠲中下户逋負又乞缺青苗下户不得令保人備償御史張舜民以言事坐左遷臺諫官皆論以為非是燾以謂御史持紀綱之官得以犯顔正論況臣下過失安得畏忌不言哉今御史敢言大臣者天下之公議大臣不快御史者一夫之私心屈天下之公議快一夫之私心非治朝之盛事也燾又面責給事中張問不能駮還舜民制命以為失職坐詬同列出為集賢殿修撰知潞州復為左諫議大夫前宰相蔡確作詩怨謗燾與劉安世等交攻之燾又言方今忠於確者多於忠朝廷之士敢為姦言者多於敢正論之人以此見確之氣焰凶赫根株牽連賊化害政為患滋大確卒竄新州遷御史中丞鄧溫伯除吏部尚書燾論溫伯柔佞不立巧為進取不聽改權户部尚書不拜以龍圖閣待制知鄭州明年召為禮部尚書翰林學士元祐七年拜尚書左丞八年以疾罷為資政殿學士同醴泉觀使不拜出知潁昌府徙鄆州紹聖三年責少府監分司明年遂貶雷州别駕化州安置卒于貶所年六十四鄭雍字公肅襄邑人也舉進士甲科召試為祕閣校理知太常禮院坐議宗室昏姻不當出通判陜州元豐中為嘉王岐王宫記室參軍元祐初擢起居郎召試中書舍人使契丹還為左諫議大夫遷御史中丞奏劾宰相劉摯威福日恣及王巖叟等以為摯黨摯巖叟罷遂為尚書右丞改左丞紹聖二年以資政殿學士知陳州徙北京留守初章惇以白帖子貶謫元祐臣僚安燾等爭論不已哲宗疑之雍欲為自安計謂惇曰熙寧初王安石作相嘗用白帖子行事惇大喜取其案牘懷之以白哲宗惇遂安雍雖以此結惇然卒罷政坐無祐黨奪職知成都府提舉崇福宫卒年六十八後列名黨籍云臣稱曰人臣之罪莫大於欺君章惇以白帖子貶謫元祐之臣是欺君者也雍為執政不惟不力爭而乃匿情順非為固位計是亦為欺君者也語云鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣聖人之言可不信夫東都事略卷九十
