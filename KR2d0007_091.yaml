body:
  text: 東都事略卷九十一宋王稱撰列傳七十四滕元發初名甫字元發以避髙魯王諱改字為名而字逹道東陽人也范仲淹見而竒之中進士第三人授大理評事通判湖州時孫沔守杭州見之曰後當為賢將授以治劇守邊之要召試為集賢校理稍遷起居注知制誥知諫院御史中丞王陶論宰相不押班為跋扈神宗以問元發元發曰宰相固有罪然以為跋扈則臣以為欺天陷人矣除知開封府遷御史中丞种諤擅築綏州且與薛向發諸路兵環慶保安皆出剽掠西人復誘殺將官楊定元發上疏極言諒祚已納款不當失信邊隙一開兵連民疲必為內憂京師郡國地震元發上疏指陳致災之由者犬臣不恱出知秦州神宗曰秦州非朕意也留不遣河朔地大震命元發為安撫使知開封府除翰林學士夏國主秉常被篡元發言繼遷死時李氏幾不立矣當時大臣不能分遣諸豪乃以全地王之至今為患今秉常失位諸將爭權天以此遺陛下若再失此時悔將無及請擇立一賢將假以重權使經營分裂之可不勞而定百年之計也神宗竒其策然不果用元發性疏達自信不疑在上前論事如家人父子言無文飾洞見肝鬲神宗知其誠藎事無巨細人無親疏輒問元發元發隨事解答不自嫌外也王安石方立新法天下訩訩恐元發有言而上信之也因以事出之于外以翰林侍讀學士知定州入覲力言新法之害曰臣始以意度其不可耳今為郡守親見其害者具道所以然之狀天下大旱詔求直言元發上疏曰新法害民者陛下既知之矣但下一手詔應熙寧二年以來所行新法有不便者悉罷則民氣和而天意解矣留守南都徙齊鄧二州會妻黨犯法元發坐落職知池州未行改安州復以言者改筠州或以為且有後命元發談笑自若曰天知吾直上知吾忠吾何憂哉且上章自訟有曰樂羊無功謗書滿篋即墨何罪毁言日聞神宗覽之釋然即以為湖州哲宗即位徙蘇揚二州除龍圖閣直學士復知鄆州學生食不給民有爭公田二十年不決者元發曰學無食而以良田飽頑民乎乃請以為學田遂絶其訟徙真定又徙太原元發治邊凜然威行西北號稱名帥淮南京東饑召城中富民與約曰流民且至無以處之則疾疫起并禍汝矣吾得城外廢營地欲為席屋以待之民曰諾為屋二千五百閒一夕而成流民至以次授地井竈器用皆具蓋活五萬人云以老力求淮南乃以為龍圖閣學士知揚州未至而卒年七十一諡曰章敏李師中字誠之應天府楚丘人也其父緯為涇原路都監屯鎮戎軍夏人十餘萬犯鎮戎緯帥兵出戰而帥司所遣别將郭志髙逗留不進諸將以衆寡不敵不敢復出緯坐責降師中上書辨父無罪乞以軍法治主帥及志髙時吕夷簡為相詰問不屈夷簡怒以為非布衣所宜言對曰師中所言父事也士大夫稱之師中舉進士知洛川縣民有罪妨其農時者必遣歸令農隙自詣吏令當下者榜于門或召父老諭之租稅皆先期而集嘗出鄉亭見戎人代華人耕作詰之皆用兵時潛入中國人藉其力往往與為昏姻師中以華夷不可雜處遍索境內得數百言之于帥帥用其言大索旁郡得戎人內居者甚衆皆徙之極邊龎籍為樞密副使薦其才召對轉太子中允知敷政縣權經略司屬官宥州移牒保安軍以歲賜每至次年方畢欲歲終皆得之延州以聞朝廷降式許之師中改云依久例因論奏曰戎人所欲無厭今許之不足以示恩徒啓其貪心而示弱樞密院劾其擅改制書師中曰所改者保安軍回宥州牒爾非制書也提㸃廣南西路刑獄交趾入寇巡檢宋士堯領兵拒之遂陷沒師中劾奏蕭注治雍八年兵十餘萬不能撫而用之乃以溪洞貿易掊斂以失衆心卒致將卒敗覆按法當斬於是注責泰州安置師中遷轉運使交趾每瘴癘甚必聲言入寇師中先得其情既而攝帥事雍州果遣軍校乘驛來求救師中不省但詰其擅乘驛之罪而已既而卒無事遷直史館知鳳翔府种諤取綏州師中言西夏方入貢叛狀未明恐彼得以藉口徒啓其釁端也鄜延路覘知西夏駐軍綏銀州檄諸路當牽制師中上疏論牽制之害時諸將皆請行師中曰不出兵罪獨在帥非諸將憂也後朝廷知其害罷之拜天章閣待制河東都轉運使西人入寇以師中知秦州時王韶乞築渭源上下兩城屯兵以脅武勝軍撫納洮河諸部下師中議師中言今修築必廣發兵大張聲勢及今蕃部納土招弓箭手恐西蕃及洮河武勝軍部族生疑無由招撫今不若先招撫青唐武勝及洮河諸族則西蕃諸族必乞修城寨因其所欲量發兵築一城或三兩堡以示斷絶夏賊鈔略之意部族必歸心唐於西域每得地則建為州其後皆陷失以清水為界大抵根夲之計未實腹心之患未除而勤逺略貪土地者未有不如此者詔師中罷帥事韶又請置市易募人耕緣邊曠土師中奏韶指占極邊見招置弓箭手地置市易於古渭寨臣恐自此秦州益多事所得不補所失秦州漢蕃户賣買一旦盡奪歸官實恐細民失業商旅不行又言韶所奏渭源城至成紀田頃不實乃欲以招弓箭手地塞其數詔遣使案視謂師中稽留朝旨落天章閣待制知瀛州師中言時政闕失大自稱薦又乞召司馬光蘇軾等復置左右遂貶和州團練副使安置徙單州復分司南京提舉太極觀卒年六十六師中為人落落有氣節所至必設條教勸民務農官吏不煩而事舉然好為大言以故不容于時云劉庠字希道彭城人也父顔字子望舉進士知龍興縣坐殺已就執之盜免官遂居鄉里以著書自適學者常數十百人名聞東州乃採托兩漢至五代名臣奏對有補於時者為輔弼召對四十卷馮元錢易蔡齊為上之且言顔經行淳備乃以為任城簿李迪知兖青二州皆辟為從事顔所著有儒術通要經濟樞言石介見其文歎曰恨不得在弟子之列年五十二卒庠幼能詩蔡齊妻以子用齊遺奏補將作監主簿舉進士遷太常博士英宗以災異求直言庠上書論時事遂除監察御史裏行因日食乞罷後苑宴游以祇畏天戒會聖宫修仁宗神御殿宏麗過常庠言非所以昭先帝儉德乞損其制奉宸庫失盜庠劾奏近侍領皇城司職事者以嚴宫城之禁願陛下不以近習撓天下法初禁銷金李珣犯令庠言法行當自貴近始英宗曰朕豈私一李珣邪珣乃仁宗外家若行之天下謂朕何又言兩省封駮之任名存實亡御史貟闕不補非盛世事神宗即位遷殿中侍御史為右司諫庠陳中國禦戎之體守信為上昔元昊之叛五來五得志天下為之困弊今莫若示大信捨近功為國家長利除集賢殿修撰河東轉運使庠計一路之産唯鐵利為饒請復舊冶鼓鑄通隰州鹽礬博易以濟用又請募民入粟塞下豫為足食擢天章閣待制改河北都轉運使契丹侵霸州土場為已地又徙帳雲朔或以為河北不可不備詔庠對狀上五策料敵必不敢動大河東流議者欲徙北庠謂當以歲月徐觀其勢而順導之則役不勞而功可成居歲餘移知真定府又為河東都轉運使召知開封府是時王安石用事變更新法庠謂不可行奏願罷之神宗諭之曰卿奈何不與大臣協心濟治乎庠曰臣子於君父各伸其志臣知事陛下不知附安石數月以龍圖閣直學士知太原府明年遼人遣蕭禧議河東疆事先是虜主植牙雲中遣騎涉吾地邊吏執之敵檄取紛然或以為起釁造兵當大為備庠奏敵之重兵皆不在行雲朔嵗儉軍無見糧張形示强意在畫疆事爾以我方事河湟恐中國有輕彼心故造端首難然疆事分畫久矣今始造議曲在彼不在我願勿聽神宗以敵書示庠訖以黃嵬山分水嶺為界云知成都府請禁西山六州與漢人為昏姻者以防後患徙知秦州坐失舉降知虢州移江寧府又坐失舉知滁州未幾移永興軍哲宗即位加樞密直學士知渭州卒年六十四宣仁后曰帥臣極難得劉庠可惜也趙禼字公才邛州依政人也舉進士為汾州司法參軍夏人不廷郭逵宣撫陜西帥延安禼皆在幕府种諤擅納綏州降羌數萬朝廷病其生事議誅諤復故地歸降虜以解仇釋兵禼上疏曰諤無名興舉死有餘責若將改而還之彼能聽順而亡絶約之心乎不若諭諒祚以虜衆餓莩投死中國邊臣雖擅納實無所利特以質往年景詢輩爾可遣詢等來與降羌交歸各遵紀律而疆埸寧矣如其蔽匿則我留橫山之民未為失也又移書執政請存綏州以張兵勢先規度大理河川建堡寨畫稼穡之地三十里以處降羌若棄綏不守則無以安新附之衆援种世衡招蕃兵破賊屯青澗城故事朝廷從之活降羌數萬為東路捍蔽熙寧初夏人誘殺知保安軍楊定等既以賊李崇貴韓道喜來獻且請和朝廷欲官其任事之酋鐫歲賜以為奉給因使納塞門安逺二寨而還綏州禼言綏州實勢勝之地宜增廣邊障乃無窮之利若存綏州以觀其變計之得也神宗知其才召見問邊事對曰綏之存亡皆不免用兵神宗然之除集賢校理夏人犯環慶後復入賀正禼請邊吏離其心腹因以招橫山之衆此不戰而屈人兵也遷提㸃陜西刑獄韓絳宣撫陜西河東兵西討禼言大兵過山界皆砂磧乏善水草又亡險隘可以控扼臣竊危之若乘兵威招誘山界人户處之生地當先經畫山界控扼之地然後招降不爾勞師逺攻未見其利絳欲取橫山而种諤獻城囉兀之策以禼權宣撫判官禼說絳以大舉非計師出果無功除直龍圖閣知延州夏人屢欲款塞每虛聲搖邊詔問方略禼審計形勢為破賊之策以獻遣禆將曲珍吕真以兵千人分巡東西路賊方以四萬衆自閒道欲取綏州道遇曲珍皇駭亟戰吕真繼至賊衆敗走賊自失綏州意未能已禼揣知其情奏言賊使請和必欲畫綏州界願聽夲路經略司分畫歲賜則俟通和之日復焉明年遂用禼策以綏州為綏德城鄜延地皆荒瘠占田者不出租賦而倚為藩蔽寶元用兵後凋耗殆盡其曠土為諸酋所有禼因召問曰往時汝族户若干今皆安在對曰大兵之後死亡流散其存止此禼曰其地存乎酋無以對曰吾資汝歸聽汝自募丁家使占田充兵若何吾所得者人爾田則吾不問也諸酋皆感服歸募壯夫悉補亡籍又檢括境內公私閒田得七千五百餘頃募騎兵萬七千禼以異時蕃兵提空簿漫不可考因議涅其手屬歲饑禼令蕃兵願刺手者貸常平穀一斛於是人人願刺因訓練以時精鋭過於正兵神宗聞而嘉之擢天章閣待制交趾叛禼總九將軍討之以中官李憲為之二與憲不合請罷之神宗問可代憲者禼以郭逵老邊事而願為禆贊於是以逵為宣撫使而禼為之副逵至輒與禼異禼欲乘兵形未動先撫輯兩江峒丁擇壯勇啖以利使招徠携二隳其腹心然後以大兵繼之逵不聽禼又欲使人齎敕榜入賊中招納逹令燕逹先破廣源復還永平卨以為廣源閒道距交州十二驛趣利掩擊出其不意川塗並進三路致討勢必分潰固爭不能得賊遂據長江列戰艦數百艘官軍不濟禼分遣將吏伐木治攻具機石如雨艨艟被擊皆廢徐以罷卒致賊設伏擊之斬首數千級馘其渠酋賊遂降逵怍於玩寇乃移疾先還逵既坐貶禼亦以不即平賊降為直龍圖閣知桂州後復天章閣待制權三司使時西師大舉五路並進以禼領河東都轉運司事坐餽挽不給黜知相州既而鐫職知淮陽軍數月復職知慶州時夏賊欲襲取新壘大治攻械禼具上撓賊計虜寇蘭州禼遣曲珍將兵直抵鹽韋俘馘千驅孳畜五千虜酋拽厥嵬名宿兵於賀蘭原時出盜邊禼遣將李昭甫蕃官歸仁各領兵三千左右分擊耿端彥兵四千趨賀蘭原戒端彥曰賀蘭險要過嶺則砂磧也使賊入平夏無繇破之選三蕃官各與輕兵五百使閒道出賊寨後邀歸路與賊戰賀羅平賊敗果趨平夏千兵伏發賊駭潰斬賊千生擒嵬名斬首領六獲戰馬七百牛羊老幼三萬餘遷龍圖閣直學士復帥延安元祐初梁乙埋數擾邊禼知賊將入寇檄西路將劉安李儀曰賊即犯塞門汝徑以輕兵搗其腹心已而果然安等襲洪州俘斬甚衆夏人入貢既而以重兵壓境諸將亟請益戍兵為備禼徐諭之曰第謹斥堠整戈甲無為寇先戍兵不可益也因遣人詰虜虜遂潰去遷樞密直學士乙埋終不悛使閒以善意問乙埋何苦與漢為仇必欲寇第數來恐汝所得不能償所亡洪州是也能改之吾善遇汝遺之戰袍錦綵自是乙埋不復窺塞因復縱間國中遂疑而殺之除端明殿學士遷太中大夫夏人遣使以地界為請朝廷許還葭蘆米脂浮屠安疆四寨以禼領分畫之議夏人既得四寨猶未有恭順意居無何復犯涇原會禼卒年六十五贈右光祿大夫紹聖四年以禼與元祐棄地議名係黨籍云吕大忠字進伯大防兄也舉進士韓絳宣撫陜西以大忠提舉永興路義勇改祕書丞檢詳樞密院吏兵房文字令條義勇利害大忠言養兵猥衆國用日屈漢之屯田唐之府兵善法也弓箭手近於屯田義勇近於府兵擇用一焉兵屯可省矣為僉書定國軍判官熙寧七年遣太常少卿劉忱議河東地界大忠遭父喪起復知代州虜使蕭素梁頴設次於夲朝地而輒據主位大忠不從於是移次於長城北易西上閣門使知石州大忠數與素穎㑹屢以理折之稍屈契丹復使蕭禧來聘召執政及大忠議大忠進曰彼遣使來即與代北之地若有一使曰魏王英弼來盡索關南地亦與之乎神宗默然議卒不決大忠請終喪其後卒以分水嶺為界云元豐初除河北路轉運判官大忠言古之理財視天下猶一家朝廷者宗外計者兄弟之宫居雖異而財無不同未有餘而不歸資而不與者也如是則財利之勢周流不息今有司唯知出納之吝有餘不足不以實告于上上知其不實一切不信其言故有餘而莫之歸不足而莫之與致上下之情不交甚大患也乃上生財養民十二事移淮南西路提㸃刑獄哲宗即位為陜西轉運副使移知陜州除直龍圖閣知秦州遷寶文閣待制夏人自麟府環慶路犯邊之後遂絶歲賜復欲遣使謝罪將許之大忠言敵人性無常强則縱困則服連年入寇邊民皆謂必有以制之今無名遣使陽為恭順實懼討伐若許之恐為敵人所窺也大忠嘗獻言夏人兵不過三十萬戍守外戰士不過十萬三路之衆足以當之屢犯王略而朝廷一不與校臣竊羞之遷寶文閣直學士知渭州坐事降待制知同州俄致仕卒復寶文閣直學士游師雄字景升京兆武功人也舉進士為儀州司户參軍遷德順軍判官趙禼帥延安辟為屬久之除宗正寺主簿遷軍器監丞吐蕃寇邊其酋長鬼章青宜結乘閒脅屬羌結夏賊為亂謀分據熙河朝廷擇可使者與邊臣措置以師雄行聽以便宜從事既至諜知西夏聚兵于天都山前鋒已屯通逺境上吐蕃之兵欲攻河州鬼章又欲以别部出熙河師雄請於帥劉舜卿分兵為兩道姚兕將而左种誼將而右兕破六逋宗城斬首一千五百級攻講朱城斷莫河飛橋青唐十萬衆不得度誼遂破洮州擒鬼章及大首領九人斬首一千七百級以師雄為陜西轉運判官又為轉運副使召入為衛尉少卿出知邠州改河中府除直龍圖閣知秦州攝帥熙河自復洮州之後于闐大食佛林邈黎諸國皆懼悉遣使入貢朝廷令熙河限二歲一進師雄曰如此非所以來逺人也未幾還秦移陜州以卒年六十東都事略卷九十一
