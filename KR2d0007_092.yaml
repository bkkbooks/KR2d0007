body:
  text: 東都事略卷九十二宋王稱撰列傳七十五楊繪字元素漢州綿竹人也舉進士為大理評事通判荆南神宗時為修起居注知諫院建言宗室以服屬裁蔭子之數立出官之法神宗嘉納向傳範為京東帥繪請易其任以杜外戚僥求神宗曰得卿如此言甚善誠可以止異日妄求也宰相曽公亮用所善曽鞏為史官繪言前數月人已知鞏為實録檢討矣公亮以朝廷名器為已物乞正招權之罪鞏既罷史官繪亦罷諫職除兼侍讀御史中丞滕甫言繪何罪而罷神宗於是詔甫曰繪堅求外補蓋繪未究朕意繪迹踈逺立朝寡援不畏強禦知無不為朕一見即知其忠直可信故擢置言職知之亦篤矣今日之除蓋難與宰相兩立於輕重之間姑少避之卿其諭朕此意繪曰諫官不得其言則去經筵非姑息之地卒辭不受未閲月再知諫院擢翰林學士御史中丞時王安石執政繪上言當今舊人多以疾求退范鎮年六十三吕誨五十八歐陽修六十五而致仕富弼六十八被劾引疾司馬光王陶皆五十而求間散陛下可不思其然乎又言以經術取士獨不用春秋宜令學者以三傳解經又言安石不知人提舉常平使者暴橫繪論免役有十害請罷之曽布疏其説詔付繪分析繪執前議遂罷以翰林侍讀學士知亳州徙應天府又徙杭州再為翰林學士兼侍講議者欲加孔子帝號繪以為非是繪嘗薦屬吏王永年御史蔡承禧言其私通饋賂坐貶荆南節度副使數月分司南京改提舉太平觀起知興國軍哲宗即位徙徐州復天章閣待制知杭州卒年六十二繪為人放曠不羇然吏事敏給主於愛利為文立就有集八十卷李常字公擇南康軍建昌人也幼力學舉進士調江州判官宣州觀察推官方重自持人畏憚之發運使楊佐薦改秩常推其友劉琦佐曰不見此風久矣并薦之議者謂常能舉善而謂佐為知人除祕閣校理熙寧初自太常博士改右正言時方更法常言始建三司條例司已致天下之議至於均輸青苗斂散取息傅會經義人且大駭又言州縣有不散常平錢而但使民出息者詔常具姓名以聞常不以聞遂落校理通判滑州歲餘復職知鄂湖齊三州齊多盜論報無虛日常得黠盜刺為兵使在麾下它日詢其狀對曰此由富家為之囊槖爾常於是令藏盜之家並發屋破柱拔其根株自是姦無所匿徙淮南西路提點刑獄元豐六年召為太常少卿遷禮部侍郎哲宗立進吏部侍郎常上七事曰崇亷耻存鄉舉别守宰廢貪贓謹疑獄擇儒師修役法又論役法差免二科以為法無新陳便民為是今使民俱出資則貧者難辦俱出力則富者難堪盍各從其願庶幾可久矣赦恩蠲市易逋負不滿二百緡者常請纍息過其數亦勿取拜御史中丞兼侍讀加龍圖閣直學士論取士請分詩賦經義為兩科以盡所長吳處厚繳蔡確詩以為謗訕諫官劉安世因力攻之常以為以詩罪確非所以厚風俗改兵部尚書辭不拜出知鄧州徙成都府行次陜郊而卒年六十四有文集奏議六十卷詩傳十卷元祐會計録三十卷常少讀書於廬山五老峯白石菴之僧舍書幾萬卷當既貴思欲遺後之學者乃藏於山中時人目其居曰李氏藏書山房而蘇軾為記其事云孫覺字莘老髙郵人也中進士第治平中為館閣校勘神宗即位除直集賢院為昌王府記室王禮之問終身之戒覺為陳諸侯之孝作富貴針遷右正言神宗欲革積弊覺言弊不可不革革而當其悔乃亡神宗然其言邵亢在樞府無所建明滕甫為中丞覺論其頗僻不報即家居待罪朝廷以覺薦陳升之才可用非諫官職奪兩官覺曰諫官言事不當黜之可也無降秩充位者乞補外得通判越州復右正言徙知通州召還修起居注青苗法行覺論其非時言者亦以為畿內有追呼抑配之擾神宗令覺行視虛實覺退而上疏曰臣以言為職體量非臣事黜知廣德軍踰年徙湖州松江隄為民患覺易以石髙一尋有奇長百餘里隄下悉為良田徙廬州改右司諫以祖母亡解官下太常議議者謂不可詔知潤州而覺已持祖母喪矣服除知蘇州徙福州閩俗厚於昏喪覺裁為中法使富家不得過百緡令出一日嫁娶者數百家葬埋費減什之五徙徐州又徙南京召為太常少卿易祕書少監哲宗即位兼侍講遷右諫議大夫又遷給事中為吏部侍郎領右選右選萬五千貟而闕不滿六千有三年不得調者覺請自軍功保甲進者補指使袒免親從貟外置一日得闕數千改主左選請磨勘歲以百人為限擢拜御史中丞以疾請罷除龍圖閣直學士提舉醴泉觀留侍講力請外提舉靈仙觀卒年六十三紹聖中以覺為元祐黨奪職追兩官徽宗即位復故官職有文集奏議六十卷春秋傳十五卷弟覽覽字傅師舉進士調河南簿後知尉氏縣將官御下苛酷士卒謀就大閲殺將以叛覽聞之亟往諭之曰將官暴虐誠有罪也然汝曹衣食縣官縣官顧負汝邪何敢為族滅計衆皆感悟聽命遂帖服神宗嘉之以為司農寺主簿又遷丞出為提舉湖南常平京西轉運判官召為右司貟外郎除河北轉運副使以直龍圖閣為江淮荆浙發運副使又知桂州遷寶文閣待制知渭州又帥延安入為户部侍郎除龍圖閣直學士知太原府進樞密直學士覽治邊數有功而議事多與執政異坐軍期落職提舉崇禧觀俄復待制知光州徙知河南府復龍圖閣直學士知渭州徙永興軍成都府復請祠提舉崇禧觀卒年五十九覽精於吏事甚有能政所至善良得職云鮮于侁字子駿閬州人也性莊重力學舉進士第慶歷中天下旱詔中外言事侁上書論災異之興言甚剴切稍遷祕書丞知綿州英宗初為皇嗣侁上疏請選經術士以為羽翼神宗初詔求直言侁為蔡河撥發應詔言十六事皆人君謹始者神宗謂滕甫曰其文類王陶可嘉也遂用為利州路轉運判官初建助役法詔諸路監司各定所役緡錢轉運使李瑜定四十萬侁曰利路民貧二十萬足矣與瑜議不合各具利害以聞神宗是侁議因以為諸路率即罷瑜以侁為轉運使利州守周永懿貪虐不法前使者不敢問侁舉按其罪編管衡州又為京東轉運使所代吳居厚以掊斂虐下侁繼之務行寬大司馬光嘗謂蘇軾曰子駿福星也京東人困甚且令子駿救之然安得百子駿布之天下乎元祐初召為太常少卿拜左諫議大夫建言祖宗政本人情獄訟簡少先帝置大理獄其少卿二人同詳讞奏牘罷其餘治獄官吏請六曹寺監長吏各舉寮屬又請復制舉分詩賦經義兩科而先論策以疾請外除集賢殿修撰知陳州卒年六十九侁長於楚詞嘗作九誦蘇軾見之謂其近古屈原宋玉友其人於冥漠續微學之將墜者紹聖間以侁為元祐黨削左諫議大夫集賢殿修撰遂與黨籍云馬默字處厚單州武城人也舉進士調臨濮尉治平中為監察御史裏行時議尊崇濮安懿王臺諫力爭以為不可悉補外默請還所出臺諫官吕誨等不報歐陽修建濮議士論不與郭逵除僉書樞密院物議不厭默皆上疏論列會地震河東陜西郡默以為陰盛慮為邊患宜備之後數月西夏果入寇時朝廷欲於西京會聖宫置仁宗神御殿默以為漢以先帝所嘗行郡國立廟知禮者以為非是況仁宗未嘗幸西洛創建别廟使有司侍祠殊乖典禮以言事不效乞罷御史出通判懷州神宗即位默陳十事一曰攬威權二曰察姦幸三曰近正人四曰明功罪五曰息大費六曰備災歲七曰崇儉八曰久任九曰選提轉牧宰十曰禦戎狄攬威權則天子勢重而大臣安矣察姦佞則忠臣用而小人不能幸進矣近正人則諫諍日聞而聖性開明矣明功罪則朝廷無私而天下服矣息大費則公私富而軍旅積矣備災歲則大恩常施而禍亂不起矣崇儉則自上化下而民朴素矣久任則官不虛授而職事舉矣選提轉牧宰則庶績有成而民受賜矣禦戎狄則四夷畏服而中國強矣除知登州沙門島舊制有定額溢數則投之海中寨主李慶罷官入謁默遽問擅殺幾何人慶對一任殺七百餘人默詰之則曰島上地狹徒𨽻猥衆過數官糧不足以贍則取殺之默責其擅殺欲按其罪慶皇恐即日自殺默為奏請更定配島法凡二十條溢額者則選年深不作過人移徙登州自是多全活者其後蘇軾起知登州父老迎於路曰公為政愛民得如馬使君乎軾異之徙知曹州召為三司鹽鐵判官論新法不便出為京東提點刑獄又為廣南西路轉運副使會安化等州蠻歲飢略省地默上平蠻方略以為勝負不在兵而在將富良宵遁郭逵怯懦雍城陷沒蘇緘老繆歸仁鋪覆軍陳崇儀先走崑崙關喪師張守節不戰儂智高破亡因狄青之智勇歐希範之誅滅乃杜杞之方略此足以驗矣以疾知遂州改徐州元祐初召為司農少卿司馬光問默復鄉差牙前法如何默曰常平自漢為良法不可盡廢去其害民者可也其後役人立為一州一縣法而常平提舉官省歸提刑司頗自默發之除河東轉運使時議棄葭蘆吳堡二寨默奏控扼險阻敵不可攻棄之不便由是二寨得不棄移兖州召為衛尉卿擢工部侍郎遷户部侍郎告老除寶文閣待制知徐州移河北都轉運使再知兖州初元豐間河決小吳因不復塞縱之北流入海元祐議臣以為東流便水官亦以為然默與同時監司上議以北流為便而御史郭知章亦奏請從東流於是作東西馬頭約水復故道為長隄壅河之北流者勞費甚大明年復決默復告老提舉鴻慶宫坐附會司馬光落職致仕後復寶文閣待制卒年八十一東都事略卷九十二
