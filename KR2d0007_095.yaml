body:
  text: 東都事略卷九十五宋王稱撰列傳七十八章惇字子厚建州浦城人也始生族父得象竒其風骨以爲必貴舉進士甲科知商洛縣嘗與蘇軾同遊南山抵仙遊潭潭下臨絶壁萬仞岸甚狹惇推軾下潭書壁軾不敢惇履險而下以漆墨濡筆大書石壁上曰蘇軾章惇來軾拊惇背曰子厚必能殺人惇曰何也軾曰能自判命者能殺人也惇大笑熙寧初王安石秉政以惇編修三司條例除祕書丞集賢校理檢正中書户房公事察訪荆湖用兵於是溪洞拓境數百里入修起居注除右正言知制誥直學士院出知湖州除翰林學士未授命丁母憂服闋入知審官院遂拜右諫議大夫參知政事踰年出知陳州移定州元豐五年召爲門下侍郎哲宗即位遷知樞密院事宣仁后臨朝用司馬光吕公著更革弊事惇與宰相蔡確猶未去位光復差役舊法蔡京知開封府用五日行差役於諸邑惇言保甲保馬一日不罷有一日害若役法則熙寧初以遽改免役後有弊今改差役當議論盡善然後施行遽改恐後亦有弊乃於簾前與光爭論其言不遜諫官蘇轍論其姦惡惇與確皆逐去惇知汝州徙揚州提舉洞霄宫惇以父俞年髙乞侍養而諫官劉安世猶疏惇之罪復留汝州吕公著奏曰章惇父老居蘇州今惇復留汝上方以孝治天下豈可使大臣失晨昬之養遂聽歸俞卒惇免喪復領洞霄宫哲宗親政召拜左僕射兼門下侍郎惇既相引蔡卞爲右丞惇卞執政謀所以釋憾於元祐舊臣者凡元祐更張弊法悉皆追復用林希爲中書舎人張商英等爲諫官惇卞大肆羅織竄逐元祐臣僚于嶺海商英等力詆元祐希行元祐諸人責詞遂至毁罵甚者謂元祐之初老姦擅國蓋以詆宣仁后也惇又用邢恕爲御史中丞於是日夜論劉摯梁燾王巖叟等謀廢立恕造宣訓之語又誘髙遵裕之子士京論其父功又教蔡確之子渭上文及甫與邢恕私書事惇卞遂起同文館獄用蔡京安惇雜治宣訓事者恕爲惇說云司馬光亦疑宣仁后有廢立事光嘗語范祖禹曰方今主少國疑宣訓事猶可慮蓋宣訓者北齊婁太后宫名也婁太后廢其孫少主立其子常山王演恕妄謂司馬光亦有是言以實宣仁后有廢立之意使天下信之光遂追貶恕既誘髙士京上書論其父遵裕臨死時屏左右謂士京曰神宗彌留之際王珪遣髙士充來問我曰不知皇太后欲立誰我叱士充去之語惇卞欲誣罔宣仁后遂贈遵裕奉國軍留後王珪亦追貶初邢恕在元祐時責汝州文及甫與恕皆素怨摯等乃與恕書謂司馬昭之心路人所知又濟之以粉昆朋類錯立欲以眇躬爲甘心快意之地等語及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彦眇躬及甫自謂蓋俗謂駙馬都尉曰粉侯忠彦弟嘉彦尚主也故曰粉昆而朋類錯立者謂王巖叟梁燾也及甫與恕書肆爲詆毁之辭恕以此書與確之子渭使訴其事及置對及甫爲蔡京安惇所脅乃云以昭比摯眇躬乃以爲指哲宗而粉昆謂巖叟面如傅粉燾字況之以況爲兄故曰粉昆也後確母又言梁燾嘗與懷州致仕官李洵言朝廷若存蔡確則爲徐邸安乎以爲李洵等所謀乃追問洵洵依違以荅適因星變詔曰朕遵祖宗遺志未嘗誅殺大臣劉摯等可勿治然摯燾同時死于嶺南貶所人亦疑之惇與卞結中官郝隨爲助言於哲宗欲追廢宣仁后自皇太后太妃皆力爭之哲宗感悟焚其奏隨覘知之密語惇卞明日惇卞再有言哲宗怒曰卿等不欲朕入英宗廟乎惇卞乃已惇又以皇后孟氏元祐中宣仁后所立勸哲宗起掖庭祕獄託以左道廢居瑶華宫其後哲宗頗悔乃歎曰章惇壞我名節此皆惇得罪天下後世者初神宗用王安石之言開熙河謀靈夏師行十餘年不息迨聞永樂之敗神宗當宁慟哭循致不豫故元祐宰輔推夲上意專務懷柔夷狄西夏請故地以非要害城砦還之至惇作相以爲蹙國棄地罪其帥臣諸路皆進築新砦取復故地邊事復興關中之民大困矣惇性忮毒忍於爲惡於是百姓歌之曰大惇小惇入地無門小惇則安惇也其爲人所疾如此哲宗崩欽聖憲肅皇后議所立惇曰以禮律言之母弟簡王當立欽聖后曰老身無子諸王皆是神宗庶子惇復曰以長申王當立欽聖后曰申王病廢不可立惇尚欲有言知樞密院事曽布叱惇曰章惇聽皇太后處分簾卷徽宗已立矣遷特進封申國公充哲宗山陵使至成臯大昇轝陷于濘踰宿而行坐是出知越州未至責武昌軍節度副使潭州安置再貶雷州司户參軍惇至此方悔謝表乃云盡力以遏徐王覬覦之謗一心以明宣仁保佑之功惇復云覬覦之謗者是徐王無覬覦之事也初蘇轍謫雷州不許占官舎遂僦民屋惇又以爲强奪民居下州追民究治以僦劵甚明乃已至是惇責雷州亦問舎于民民曰前蘇公來爲章丞相幾破我家今不可也人以爲報復改舒州團練副使睦州居住徙越州改湖州卒年七十一復特進申國公政和三年贈太師臣稱曰元祐之盛一司馬光實成之紹聖之禍一章惇實致之蓋君子小人如冰炭如東西不可同器而易位況惇之姦足以鼓惑人主之心將何所不至誣宣仁廢哲后行紹述立鉤黨結邊釁興大獄窮凶極惡肆爲不道未有如惇之甚者也嗚呼光之相而天下驩欣如此惇之用而天下怨憤如彼乃知治亂安危不在乎他在乎君子小人而已後之人主可不鑒哉曾布字子宣南豐人也幼孤學於其兄鞏舉進士熙寧初王安石執政薦之因上書召見論事合意遂除崇政殿說書遷集賢校理檢正中書六房公事新法青苗助役皆布與吕惠卿建議安石嘗曰法之初行異論紛紛始終以爲可行者吕惠卿曾布也始終以爲不可行者司馬光也餘人則一出焉一入焉爾擢修起居注知制誥拜翰林學士兼三司使七年大旱詔求直言布論市易掊克之虐落職出知饒州徙潭州復集賢院學士知廣州元豐初以龍圖閣待制知桂州進龍圖閣直學士知秦州又知陳州移慶州復入翰林尋遷户部尚書元祐初除龍圖閣學士知太原府歴真定河陽青州瀛州哲宗親政復入翰林遷承旨兼侍讀擢拜同知樞密院事進知院事時章惇爲相斥逐元祐臣僚士心不附布詭情辟致名士如陳瓘張庭堅悉羅致之㑹哲宗升遐欽聖憲肅皇后召宰執問誰可當立惇有異議布奏惟太后令惇由是得罪一日中使召蔡京鏁院拜韓忠彦左僕射京欲刺探徽宗之意徐奏請曰麻詞未審合作專任一相或作分命兩相之意徽宗曰專任一相翌日京出宣言曰子宣不復相矣已而復召曾肇草制布拜右僕射制曰東西分臺左右建輔蓋有爲云忠彦既爲左相柔懦天下事多決於布議以元祐紹聖均爲有失欲以大公至正消釋朋黨明年改元建中靖國邪正雜用忠彦遂罷去布獨當國漸進紹述之說明年又改元崇寧蔡京於是召用爲左丞京與布異會布擬陳祐甫爲户部侍郎京奏曰爵禄者陛下之爵禄也奈何使宰相私其親布之婿陳廸祐甫之子也布忿然爭辨乆之聲色稍厲於是温益叱布曰曾布上前安得失禮徽宗不恱而罷翌日爲御史所攻布由是得罪罷爲觀文殿大學士知潤州尋落職提舉太清宫太平州居住又降司農卿分司南京又以嘗薦舉官趙諗而諗反責散官衡州安置復以棄湟州責授賀州别駕又責廉州司户參軍移舒州復大中大夫提舉崇福宫以卒贈觀文殿大學士諡曰文肅東都事略卷九十五
