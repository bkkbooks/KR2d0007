body:
  text: 東都事略卷九十六宋王稱撰列傳七十九安燾字厚卿開封人也舉進士調蔡州推官召試為祕閣校勘出為荆湖北路提點刑獄會行新法而奉行之吏或異趣為髙或迎合求進而燾平心以奉詔條號無所倚時司農以符檄風天下如免役增寬剩造簿供手實散青苗等事天下爭趣之燾數有陳論暨見神宗復極論之為立法禁纍擢修起居注元豐初使髙麗燾諭以朝廷恩意其國主感泣遇燾有加禮以為過契丹使逺甚且使其臣言之燾笑答曰尊中華與事大國禮固均也特以罕至故有加爾且朝廷與契丹講好歲久今遣使寵綏逺人豈校厚薄於其間哉時以其言為知體使還拜右諫議大夫史館修撰直學士院初都水監丞范子淵建請導洛通汴命燾行視燾以為勞費甚大且非經久之利以議不合出知陳州遷龍圖閣直學士為户部尚書六年拜同知樞密院事時夏人款塞燾請因而撫之且戒將吏毋生邊隙既又請疆埸非要害者還之以示恩然羌情無厭當使知吾宥過而罷兵不應示吾厭兵之意哲宗嗣位乃遂其前議於是歸其葭蘆等四寨元祐二年進知院事燾謂為國者不可好用兵又不可畏用兵好則疲弊生靈畏則取侮遺患今朝廷每戒邊臣非舉國入寇不得應之則固畏用兵矣然敵數犯塞亦未免疲弊之患雖僅保城寨適墮其計中願復講攻擾之策如左氏所謂用三師以疲楚之意此計之上也又乾順才數歲非秉常近親獨梁乙逋利於持權與梁氏立之其酋長善用兵者如嵬名阿吳輩皆秉常族黨多反側顧望不若有以離間之彼阿吳等既不自安一旦得領重兵焉知其不回戈以復讎梁氏此一竒也用其策夏人卒相猜二遂復修貢燾以虜使路或循河隄而大河方移徙非所以示險是時河方北流朝廷雖欲回復初不甚力燾言自小吳未決以前河入海之地雖屢徙而盡在中國故京師得以北限強敵今河每決而西則河尾益北如此不已將北扺境上則南岸遂屬敵界彼若為橋梁守以州郡窺兵河外可為寒心今水官之議不過論地形較功費而獻納之臣又為髙論殊不考利害量輕重徒欲便於治河而緩於設險非至計也以母喪免服除授觀文殿學士知鄆州改鄭州移潁昌府紹聖元年拜門下侍郎時章惇用事貶謫元祐舊臣燾陰為開釋惇不樂遂以觀文殿學士知河陽改知鄭州四年落職知大名府徽宗即位復職提舉中太一宫兼侍讀復拜知樞密院事先是邈川溪巴溫之子隴拶降以其地為湟州命將吏戍守之議者多以為不可守未幾溪巴溫又請舊地并丐隴拶等下樞府問狀遂以其地與隴拶并還之尋以觀文殿學士知河南其將請去也燾奏曰自紹聖元符以來用事之臣但持紹述之虛名以誑惑君父上則欲固寵位以快恩讎下欲希進用而肆朋附并為一談牢不可破彼自為謀則善矣然未嘗以豪髮為朝廷計者也坐棄湟州降端明殿學士再責寧國軍節度副使安置漢陽軍既而復湟州降祁州團練副使復鄯州移居建昌軍徙襄州提舉鴻慶宫復大中大夫卒年七十五燾資淡泊無聲色之奉事親孝為文長於議論燾卒後五年始盡復故官職云李清臣字邦直世為魏人也少孤事母兄孝友自力學問韓琦以其兄之子妻之皇祐中舉進士治平中舉制科考官韓維稱清臣文贍時京師霖雨議者多及濮邸將廷試或語清臣宜以五行傳簡宗廟水不潤下為證則必合矣清臣曰此漢儒説吾不能知民間豈無疾痛可言者乎因言天地之大譬之人腹心肺腑惟有所攻塞則五官不寧民人生聚天地腹心肺腑也日月辰宿天地五官也善止天地之異者不止其異而止民之疾痛而已又以為縣官百須皆出於農比者陳鄧許亳飢農民多死而他業者自如儻令雜征苛取出於他業之人則農勸矣且欲崇禮制黜無功策入次等授祕書郎僉判平江軍歐陽修以館職薦之召試擢集賢校理韓絳宣撫陜西奏清臣為屬遷太子中允檢正中書吏房公事絳貶清臣因還所遷官通判海州同知太常禮院為京東路提點刑獄召充國史院編修官修起居注知制誥遷翰林學士吏部尚書元豐六年擢尚書右丞哲宗立徙左丞元祐初罷為資政殿學士知河陽又知河南府永興軍真定府召為户部尚書未至拜正議大夫中書侍郎吕大防罷相清臣首變元祐之政欲以取相位以門下侍郎蘇轍在上未能遷一日對哲宗言蘇轍兄弟改變先帝法度轍奏曰陛下即位宣仁后垂簾之初兄軾方起自謫籍臣亦被召清臣時為左丞今日反謂臣兄弟變先帝之法是欺也清臣辭屈乃曰蘇轍嘗以漢武比先帝哲宗震怒而轍由此罷黜轍既去位外召章惇拜左僕射惇未至相位尚虛清臣益有覬覦之心獨當國亟復元豐法度除諸路常平使者已而惇至清臣既不得作相遂與惇為敵會哲宗幸楚王第有婦人遮道叫呼誣告清臣謀反既已屬吏繫治婦人夲瀘州倡常為清臣姑之子田嗣宗外婦詔捕嗣宗得之清臣猶未請去獄將具言者有疏論列嗣宗既伏法清臣遂以資政殿大學士知河南府尋奪職知真定府徽宗即位以禮部尚書召復大學士月餘拜門下侍郎章惇罷相清臣奏章惇為相朝廷屬以政事為之不置次補而惇不念體國其所以開導上聽者莫非忮忍殺伐之事以己之平日仇怨或託謗訕宗廟或稱謀危上躬竄逐南方投之死地故貶人并骨肉死者不得歸葬存者悉為囚徒又因編類章疏看詳訴理受禍者一千餘家自古姦臣少惇比者今既罷去尚以特進守藩天下人心鬱抑不快盍加誅殛以慰民望惇遂責散官安置徽宗欲息朋黨以大公示天下改元建中靖國清臣乃與同時輔政者叶謀以輔上意盡還遷徙舊臣稍復其恩數品秩久之與時議寖不合復以資政殿大學士知大名府卒年七十一贈金紫光祿大夫後以元符中章疏詆訾先朝追奪職名言者又以清臣與韓忠彥黃履執政日請復元祐皇后義非所安再貶雷州司户參軍臣稱曰人臣以公正為忠朝廷以安靜為福紹聖之初清臣復被任用不以公正事上而乃謀取宰相首以紹述激怒上意自是朋黨之論起而士夫蒙其患矯誣之説行而聖后負其謗朝廷不復安靜而清臣亦不得相矣詩曰誰生厲階至今為梗清臣之謂也可不戒哉許將字沖元福州閩縣人也舉進士第一調僉判昭慶軍神宗召對除集賢校理檢正中書禮房公事直舍人院遷知制誥北敵以兵二十萬壓代州境遣使請地歲聘使不敢行以命將將入對曰臣備位侍從朝廷大議不容不知萬一北人言及代州事不有以折之則傷國體遂命將閲文書至敵中館伴蕭禧果問以代州事將屢屈之乃不敢言使還除翰林學士權知開封府言者言將勘太學公事釋上舍生不實出知蘄州以龍圖閣待制知揚州又知鄆州入為兵部侍郎條奏八事以為兵之事有三曰禁兵曰廂兵曰民兵馬之事有三曰養馬曰市馬曰牧馬兵器之事有二曰繕作曰給用除龍圖閣直學士知成都府元祐三年再為翰林學士拜尚書右丞以資政殿學士知定州移揚州徙大名府會大河東北議未決將曰度今之利謂宜因梁村之口以行東因內黃之口以行北而盡閉諸口以絶大名諸州之患俟水大至觀故道足以受之則內黃之口可塞不足以受之則梁村之口可以止兩不能相奪則各因其自流以待紹聖元年召為吏部尚書將上疏乞依元豐詔定北郊夏至親祠遷尚書左丞中書侍郎時章惇為相與蔡卞同肆羅織貶謫元祐臣僚惇卞奏乞發司馬光墓將獨無言哲宗問曰卿不言何也將曰發人之墓非盛德事哲宗曰朕意與卿同乃不從嘗議正夏人罪以涇原近冦而地廣謀帥尤難乞用章楶楶果有功徽宗即位為門下侍郎撫定鄯廓州邊臣欲舉師過河朝議難之將獨以蕃夷不可爽信而兵機有不可失既已戒期願遂逐之未幾捷書至將在位御史中丞宋諤取將舊謝章表析文句以為謗且謂將左顧右視見利則回幡然改圖初無定論元祐間嘗為丞轄則盡更元豐之所守紹聖初復秉鈞軸則陰匿元祐之所為逮至建中尚此冒居則紹聖之所為已皆非矣強顔今日亦復偷安則建中之所為亦隨改焉遂以資政殿大學士知河南府言者不已降資政殿學士知潁昌府移大名拜觀文殿學士除奉國軍節度使在大名六年召為佑神觀使未幾而卒贈開府儀同三司諡曰文定鄧潤甫字溫伯建昌人也嘗避髙魯王諱以字為名而字聖求後復舊名舉進士為上饒尉王安石當國以潤甫為編修中書條例檢正中書户房事遷集賢校理知諫院知制誥御史中丞翰林學士因論奏相州獄為蔡確所陷落職知撫州移杭州以龍圖閣直學士知成都府尋復職如初兼掌皇子閣箋記凡一時大手筆獨倚潤甫焉除翰林學士承旨修撰神宗實録拜吏部尚書言者論潤甫草蔡確制謂其有定策功以龍圖閣直學士知亳州閲歲復以承旨召數月除端明殿學士禮部尚書請郡得知蔡州移永興軍以兵部尚書召紹聖元年潤甫首陳武王能廣文王之聲成王嗣述文武之道遂拜尚書左丞卒贈開府儀同三司諡曰安惠黃履字安中邵武軍人也少遊太學舉進士調南京法曹又為王宫教授召試為館閣校理遷太子中允監察御史裏行兼知諫院神宗詢天地合祭是非履對曰本朝冬至祭天南郊夏至祭地北郊每歲行之皆合於古猶以有司攝事為未足以盡志於是三年一郊而親行之蓋所謂因時制宜者也施之於今誠不可易惟合祭之禮在所當正於是北郊之制定郊廟禮文多履詳定焉同修起居注召試知制誥以母喪免服除以禮部尚書召還為御史中丞時大臣有罪罰金履奏賈誼有言遇之以禮則羣臣自喜嬰以廉耻則人矜節行群臣且然況大臣乎故罪有可惡黜之可也可恕釋之可也豈可以罰金示辱哉御史翟思言事有旨詰所自履諫曰御史以言為職非有所聞則無以言今乃究其自來則人將懲之而臺諫不復有聞矣恐失開言路之意事遂寢哲宗即位除翰林學士兼侍講請外以龍圖閣直學士知越州坐舉御史不當降天章閣待制紹聖初復龍圖閣直學士召還復為御史中丞上章乞黜責吕大防之黨以正典刑又謂司馬光變更先朝已行之法非是初神宗在位留意禮樂欲垂一代之制而歷古循習未得適從遂詔廷臣群議時修郊廟奉祀禮文即令主辨南北之説而議者棼糾訖不果行復還朝乃建言陽復隂生各因其時上圜下方各順其體是以聖人因天祀天因地祭地三代至漢其儀不易及王莽諂事元后遂躋地位同席共牢歷世襲行不能全革逮神宗臨御卓然考古揆今以正大典嘗有意於兹矣今承先志當在陛下及二三執政哲宗以詢大臣章惇以為北郊止可謂之社覆曰天子祭天地蓋郊者交於神明之義所以天地皆稱郊故詩序云郊祀天地若夫社者土之神而已豈有祭天示亦可謂社乎哲宗然之遂定郊議拜尚書右丞會右正言鄒浩以言事竄新州履奏乞徙善地出知亳州徽宗即位召為資政殿學士兼侍讀復拜尚書右丞求罷政以資政殿大學士提舉中太一宫卒履始以文學進初附蔡確謀定策事復附章惇排擊元祐之臣時議嫉之後以復后事追貶彬州團練副使東都事略卷九十六
