body:
  text: 東都事略卷九十九宋王稱撰列傳八十二邢恕字和叔鄭州原武人也少俊邁多學能文章喜功名富貴謀大而術踈論古今天下事多戰國縱横之說從程頥學中進士甲科調永安簿頥稱其才於吕公著薦崇文院校書王安石行新法恕謂其子雱曰更法人皆以為不然子盍言之安石怒出知崇徳縣恕於是謝病不仕者七年元豐初為館閣校勘改校書郎遷著作佐郎又遷職方貟外郎哲宗即位除右司員外郎起居舎人恕教髙公繪上書乞尊禮太妃為髙氏異日之福宣仁后呼公繪問誰為汝作此書公繪不敢隠乃曰起居舎人邢恕作也時恕已召試中書舎人為言者論列出知隨州改汝州尋復直龍圗閣知㐮州移河陽俄以集賢殿修撰知滄州初神宗升遐恕為蔡確畫謀妄作䇿立之功以謗宣仁后見蔡確傳至是諌官梁燾劉安世吳安詩皆言恕與蔡確章惇黄履交結人以四凶目之遂謫監永州酒紹聖初除直龍圗閣知徐州遷寳文閣待制知青州入為刑部侍郎權吏部尚書御史中丞恕言劉奉世當元祐閒與劉摯為謀主傾害䇿立大臣奉世坐貶又言張舜民歴御史宰屬不聞正論而舜民被黜恕毎上殿奏事移時不下章惇疑之出其元祐初謫隨州時上宣仁后自辨書稱宣仁后功徳有宗廟大計旬日之前固已先定之語遂出知應天府責知南安軍復龍圗閣待制知定州改荆南言者論恕昨自謂聞司馬光所說北齊宣訓事謂光等有凶悖之意遂以其語告於章惇而光及范祖禹等縁此貶竄又以文及甫私書達於蔡確妻明氏謂劉摰梁燾王巖叟皆有姦謀而摯等幾至覆族恕反覆詭詐之人也遂落職分司西京均州居住起知隨州復龍圗閣待制厯鄭定渭三州除龍圗閣學士徙太原坐知渭州日西人入㓂落職知虢州移汝州俄復顯謨閣待制知鄭州提舉崇福宫以中大夫致仕初蔡京為相以恕氣豪不可與時輩同立朝連用為邉帥欲使自外循至将相然亦不諧也恕病且死尚與章惇爭定䇿功云子居實字敦夫有文早夭倞亦恕子也為人寡學識而奸詭似之斡里雅布兵犯京師也欽宗與之割地以和申盟而去斡里雅布既還而尼堪尚留隆徳遣使來求賂時大臣有輕敵之意猥曰今勤王之師踵至當與敵抗且彼既領肅王過河吾盍留其使與之相當於是館其使逾月不遣倞時以司農少卿為館伴有都管趙倫者燕人懼不得歸乃詐以情告倞曰金國有依都金吾者貳於金人願歸大國可結之以圗二酋倞自以為出竒計遂以聞於朝大臣信之即以詔書授倫賜依都書納衣領中仍厚賜倫金帛倫至尼堪所首以其書獻之尼堪大怒以倫書表聞其主遂復提兵南下於時倞出知岳州朝廷以倞始禍除名勒停臣稱曰邢恕始以持論有守坐廢七年天下髙其風然其為人貪功名反覆不靖者也與蔡確章惇徼幸天功不為世所容及惇用事復與之膠固為一凶徳參㑹以濟其說故雖謗及君親而不䘏也烏虖所謂交亂四國者與利口覆邦家者與迹其所為則漢之江充息夫躬唐之李訓鄭注之流異世而同轍矣楊畏字子安其先遂寧人也徙居洛陽㓜孤自立好學問事母孝舉進士為成紀簿以文受知於吕惠卿除鄆州教授自是敬王安石之學以為得聖人之意除西京國子監教授為御史裏行初對陳治道論風俗時有御史中丞出為郡太守而監司薦之畏言侍從賢否上所素知而監司乃敢妄薦盖為異日地耳乞戒其觀望改宗正丞除提㸃夔州路刑獄請祠歸洛時元祐初也畏過計恐得罪於司馬光甞曰畏官夔峡雖深山夷獠之民聞用司馬公皆相賀其盛徳如此至光薨畏復曰司馬光若知道便是臯夔稷契以不知道故於政事未盡也吕大防劉摯為相俱與畏善用畏為工部貟外郎除監察御史遷殿中侍御史畏助大防攻摰論其立朋黨條奏十事摰罷蘇頌為相畏復攻頌出之畏連攻二相意欲門下侍郎蘇轍為相而宣仁后復自外召拜范純仁為右僕射畏又言純仁不可用不報知朝廷不相轍矣復上章言蘇轍不可大用其反覆如此遷侍御史畏言事之未治者有四夷狄河事役法内外官政時有㫖令兩省官舉臺官畏言御史與宰執最為相闗之地宰相既不自差而使其屬舉之可乎太常博士朱彦以議皇地示祭不同自列乞罷畏言彦據經論理若彦罷出恐自是人務觀望不敢以守官為義宣仁后崩吕大防欲用畏為諫議大夫范純仁以畏非端士不可大防乃遷畏禮部侍郎大防為山陵使畏首背大防稱述熙寧元豐政事與王安石學術哲宗信之大防罷章惇入相畏隂結之謂惇曰前日度勢力之輕重遂因吕大防蘇轍以逐劉摯梁燾輩方欲逐吕蘇二人覺罷畏言職迹雖元祐心在熈豐惇以畏為吏部侍郎畏見中書侍郎李清臣知樞密院安燾與惇不合勢相敵復隂附安李惇覺其情又曾布蔡卞言畏平日所為於惇遂以寳文閣待制出知真定府尋落職知虢州入元祐黨後知郢州復集賢殿修撰知襄州移荆南提舉洞霄宫居於洛未幾知鄧州再丐祠以言者論列落職主管崇禧觀蔡京為相畏遣子妷見京以元祐末論蘇轍不可大用等章自明河南尹薛昻京之黨也畏因昻深言於京遂出黨籍尋復寳文閣待制政和二年洛之士民詣闕請封禪中嶽畏上疏累千餘言極其䛕佞方治行亟得疾以卒年六十九畏頗為縱横學有才辯而多捭闔以元豐時進用元祐時從官紹聖時遷職人謂之三變與邢恕善恕術疎畏謀深皆以好進喪失名節云來之邵字祖徳開封咸平人也舉進士調潞州司理參軍元豐中為大理評事除監察御史黄履為中丞言之邵甞雇雜户女為婢左遷将作監丞哲宗即位遷太府丞為秦鳯路提舉常平利州成都府路轉運判官入為開封府推官復監察御史遷殿中侍御史之邵論蘇頌稽留賈易知蘇州之命又論梁燾縁劉摰親黨致位丞弼又論范純仁不可復相乞進用章惇安燾吕恵卿宣仁袝廟之邵請先逐吕大防而相章惇其他彈擊為多擢侍御史除刑部侍郎諫官張商英論之邵與潁昌民蓋漸訟財産事以直龍圗閣知蔡州卒年四十八之邵炎涼附勢論事出於觀望指忠直為姦回以黨章惇云蔡京為相特贈之邵大中大夫上官均字彦衡邵武軍人也由進士為北京留守推官國子監直講元豐中擢監察御史裏行相州富人子殺人讞獄疑於審刑大理京師流言法官竇莘等受賕知制誥蔡確引猜險吏法官數十人窮訴慘酷無敢明其寃均上疏乞以獄事詔臣等參治坐是謫知光澤縣莘等卒無受賕之實天下服其持平秩滿監進奏院哲宗即位擢開封府推官元祐初再除監察御史言青苗之法有恵民之名而無恵民之實有目前之利而為終嵗之患願復常平糴糶之法而罷青苗蔡確弟碩盜貸官錢以萬計獄既上均論確為宰相挟邪撓法當顯正其罪以厲百官又言李清臣備位輔佐俛首隨和碌碌固寵願賜罷免遂罷政監察御史張舜民論邉事因及宰相文彦博而舜民左遷均言風憲之任許風聞所以廣耳目也舜民之言是當行之其言非當容之願復舜民職任既而臺諫約再論均謂事小不當再論既而臺諌悉補外而均遷殿中侍御史西戎自永樂之戰怙勝氣驕欲復故地朝廷用趙卨計棄四砦至是又請蘭州砦地均上疏曰先王之御夷狄知威之不可獨立故假恵以濟威知恵之不可獨行故湏威以行惠然後夷狄且懐且畏無怨望輕侮之心今西夏所争蘭州砦地皆控扼要路若輕以予之恐戎人𢷬虚熈河數郡孤立難守若繼請熈河故地将何詞以拒之是傅虎以翼借㓂以兵不惟無益祇足為患不如治兵積榖畫地而守使戎人曉然知朝廷之意也當是時傅堯俞為中書侍郎許將為右丞韓忠彦為同知樞密院三人者論事多同異俱求罷均言大臣之任同國休戚廟堂之上當務協諧以治天下使中外之人泯然不知有同異之迹若悻悻然辨論不顧事體何以觀視百僚堯俞等雖有辨論之失然事皆縁公無顯惡大過望令就職務為協和歸於至當詔堯俞等就職御史中丞蘇轍等尚以為言均上疏曰進退大臣當則天下服陛下之明而大臣得以安其位進退不當則累陛下之哲而言者自此得以朋黨合謀并力以傾揺大臣天下之事以是非為主所論若當雖異不害其為善所論若非雖同未免為不善今堯俞等但不能協和實無大過而蘇轍以許将當時已定議既而背同列之議獨上論奏臣以為善則順之惡則正之豈在毎事唯命遂非不改然後為忠邪将舎同列之議上奉聖㫖是能将順其美不當反以為過惡也若使不忠雖與同列協和是乃姦臣耳非朝廷之利也将罷均又言吕大防堅彊自任毎有差除同列不敢異唯許将時有異同轍素與大防相善盡力排将期於必勝臣恐綱紀法令自此敗壊矣因論御史耳目之任中丞風憲之長轍當公是公非别白善惡而不當妄言也遂乞罷出知廣徳軍改提㸃河北東路刑獄紹聖初召還除右正言是時吕大防已罷政均論大防蘇轍等六罪大防轍等並再黜宰相章惇欲更政事專黜陟之柄隂去異已出吏部尚書彭汝礪知成都府而召朱服為中書舎人均言汝礪不可黜而服不可用惇怒出均為京東西路提㸃刑獄徙淮東遷梓州路轉運副使移淮南知越州徽宗即位以祕書少監召還遷起居郎拜中書舎人同修國史遷給事中時宰相欲盡循熈豐法度為紹述以風均均曰法度惟是之從無彼此之辨由是不協以龍圗閣待制知永興軍徙襄州與元祐黨籍奪職主管崇禧觀復集賢院修撰提舉洞霄宫久之復龍圗閣待制致仕卒年七十八董敦逸字夢授吉州永豐人也舉進士調連州司理參軍元祐中為廣南西路轉運判官除監察御史與同時御史黄慶基言蘇軾為中書舎人日於制誥中指斥先帝時事而弟轍與軾相為表裏以紊朝政於是吕大防蘇轍奏曰敦逸慶基言軾所撰制詞以為謗毁先帝臣竊觀先帝聖意本欲富國彊兵以鞭撻四夷而一時羣臣将順太過故事或失當及太皇太后與皇帝臨御因民所欲隨事捄改盖事理當然耳昔漢武帝好用兵重歛傷民昭帝嗣位博采衆議多行寝罷明帝尚察屢興慘獄章帝改之以寛厚天下恱服未有以為謗毁先帝者也至如本朝真宗即位弛放逋欠以厚民財仁宗即位罷修宫觀以息民力凡此皆因時施宜以補助先朝闕政亦未甞聞當時士大夫有以為謗毁先帝者也此惟元祐以來言事官用此以中傷士人兼欲動揺朝廷意極不善轍復奏曰臣昨日取兄軾所撰吕恵卿誥觀之其言及先帝者有曰始以帝堯之仁姑試伯鯀終然孔子之聖不信宰予兄軾亦豈是謗毁先帝者耶臣聞先帝末年亦自深悔已行之事但未暇改耳元祐改更盖追述先帝美意而已太皇太后曰先帝追悔往事至於泣下大防曰先帝一時過舉非其本意固多如此太皇太后曰皇帝宜深知於是敦逸慶基並罷敦逸為荆湖北路轉運判官慶基為福建路判官既而御史中丞李之純以二人誣陥忠良敦逸改知臨江軍慶基知南康軍紹聖初復除監察御史而慶基已亡矣改工部貟外郎遷殿中侍御史侍御史敦逸曰臣再擢言路第恐擠逐不能乆奉彈糾之責哲宗曰汝能言無患朕之不能聽汝言信無患朕之不能行俄出知興國軍徙江州徽宗即位以直龍圗閣知荆南府召入為諌議大夫敦逸極言蔡京蔡卞過惡遷户部侍郎卒年六十九東都事略卷九十九
