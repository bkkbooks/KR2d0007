body:
  text: 東都事略卷一百宋王稱撰列傳八十三鄒浩字志完常州晉陵人也舉進士為揚州教授除太學博士出為襄州教授召對除右正言時章惇用事既已廢孟后遂立劉氏為皇后浩上疏曰臣聞禮曰天子之與后猶日之與月隂之與陽相須而成者也天子理陽道后治隂德天子聽外治后聽內職然則立后以配天子安得不審今陛下為天下擇母而所立乃賢妃劉氏一時公議莫不疑惑誠以國家自有仁祖故事不可不遵用之爾蓋皇后郭氏與美人尚氏爭寵致罪仁祖既廢后不旋踵并斥美人所以示至公立后則不選於嬪妃而選於貴族而立慈聖光獻所以逺嫌也所以為天下萬世法也陛下廢孟氏與廢郭后實無以異然孟氏之罪未嘗付外雜治果與賢妃爭寵而致罪乎世固不得而知也果不與賢妃爭寵而致罪乎世亦不得而知也若與賢妃爭寵而致罪則并斥美人以示至公固有仁祖故事存焉二者必居一於此不可得而逃也況孟氏罪廢之初天下孰不疑賢妃所為及讀詔書有别選賢族之語於是天下釋然不疑陛下立后之意在賢妃也今果立之則天下之所期陛下皆莫之信矣載在史䇿傳示萬世不免上纍聖德可不惜哉乞賜開納不以一時改命為甚難而以萬世公議為足畏追停䇿禮别選賢族如初詔施行庶幾上答天意下慰人心為宗廟社稷無疆之計不勝幸甚哲宗怒除名新州羇管章留中不下時蔡京之徒惡其害己也相與協力擠之乃偽為浩奏有陛下廢孟氏之賢后立劉氏之賤妾又有取他人之子而殺其母等語流布中外使天下聞之真謂浩為有罪者徽宗即位添監袁州酒稅尋召還復為右正言遷司諌改起居舍人拜中書舍人歷吏部兵部侍郎以寶文閣待制知江寧府改杭越二州崇寧元年詔曰朕仰惟哲宗皇帝元符之末是生越王姦人造言謂非后出詆誣之臣其可逃罪鄒浩可重黜責以稱朕顯揚前人之意於是責浩衡州别駕永州安置後半年除名勒停昭州居住移漢陽軍大觀元年復直龍圗閣自草表還親側凡六年而卒年五十二自號道卿有文集三十卷浩初除諌官入白其母曰有言責者不可默恐或以是貽親憂母曰兒能報國我何憂及浩兩被竄責母不易初意人稱其賢方孟后廢而立劉后也時有曾誕者嘗作玉山主人對客問以譏浩其略曰客問鄒浩可謂有道之士乎哉主人告客曰浩安得為知道雖然余於此時而議浩是天下無全人也言之尚足為來世戒易曰知幾其神乎又曰知進退存亡而不失其正者其惟聖人乎方皇后之廢人莫不知劉氏之將立至四年之後而册命未行是天子知清議之足畏也余三移書於浩使之力請復后浩皆不答使其時浩力言復后能感悟天子則無劉氏之事貽朝廷於過舉再三言而不聽則義亦當矣使其時得罪必不至貽老母憂也烏呼若浩者雖不得為知幾之士然百世之下頑夫亷懦夫有立志尚不失為聖人之清也誕公亮之從孫因附於此又有田畫者志義之士也與浩善畫字丞君以世父況任為校書郎調磁州録事參軍知西河縣有訟者畫躬自剖決撫以慈惠西河民甚德之元符間監廣利門浩除言官畫見浩問曰平生與君相許者何如今君為何官浩愧謝既而朋黨之禍愈甚時事日變畫乃謝病歸陽翟一日報立皇后劉氏畫曰鄒君不言可以絶矣又一日浩以書約畫會潁昌中塗自云得罪畫亟往浩具言諌立皇后時我之言戇矣上於是凝然若有所思也明日遂得罪二人留連三日臨别浩出涕畫正色責之曰使君隱默官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君無以此舉自滿士所當為者未止此也浩茫然自失歎曰君之贈我厚矣乃别去建中靖國初召為大宗正丞宰相曾布數羅致之畫不肯見朝士爭屬目私自語曰彼尚不肯見丞相誰敢易之者尋除提舉江西常平改知淮陽軍卒於治所年四十五常安民字希古蜀人也幼穎悟力學舉進士為成都府教授代還上書論強國之本曰勸忠厚厲名節元祐中公卿薦其才召為太常博士遷太常宗正丞開封府推官紹聖初召對極論元祐言者以熙豐為非今日言者以元祐為非是皆一偏也願擇其中除監察御史章惇專權擅命安民力折其姦又論蔡京姦足以惑衆辨足以飾非巧足以移奪人主之視聽力足以顛倒天下之是非內結宦寺外連臺諌合黨締交以圗柄任陛下不早逐之他日悔將安及又言今大臣為紹述之説者其實皆借此名以報復私怨一時朋附之流從而和之遂至已甚張商英在元祐時上吕公著詩求進其言諛佞無耻及為諌官則上疏毁司馬光吕公著神道碑周秩在元祐間為太常博士親定司馬光諡為文正為言官則上疏論司馬光吕公著至欲乞剖棺鞭尸是豈士君子之所為哉大饗明堂哲宗欲以劉犯從祀齊宫安民言非所以示觀瞻也曾布在樞府與惇不協見安民數論惇意謂附已於上前屢稱之及安民論布與惇互用親故於是二人者合力排之一日哲宗謂安民曰卿嘗上吕公著書以東漢不道之君比朕可乎安民曰臣與公著書勸其博求賢才嘗引陳蕃竇武李膺事不謂惡臣指摘臣言推其世以文致臣雖辨之無益董敦逸再為御史復欲彈蘇軾兄弟安民止之敦逸乃言安民主元祐謫監滁州鹽酒務除永興路提點刑獄蔡京用事改通判鄆州入黨籍卒年七十子同陳瓘字瑩中南劔州人也舉進士甲科為湖州書記久之用蔡卞薦召為太學博士遷校書郎章惇蔡卞主紹述之論追貶司馬光上謗宣仁后人不敢輒議瓘因對以謂今日以前既往之迹便為古事道常然而不渝事有弊而必變故堯告舜舜告禹皆曰若稽古若者順而行之稽則考其當否或若或稽必使合於民情所以為帝王之治且論天子之孝與士大夫之孝不同哲宗感悟徽宗即位除右正言論卞修實録增加王安石實録紊神宗大典請改修徽宗欲開言路首還鄒浩而中丞安惇尚緣往事欲格成命瓘再上疏力言宜召還浩逐惇以明黜陟遷右司諫又極論蔡卞假託經義倡為繼述重誣神考輕欺先帝倡為國是以行其私卞之所是謂之國是卞之所非謂之流俗尊安石而薄神考不可為國是宜因其請祠許而遣之章惇懷異不忠宜因其辭山陵使罷之又言惇為山陵使無狀致大升輿陷於泥淖之中露宿野次宜罷其職又論修建景靈西宫不當且言建立之地非是又言邢恕反復宜定其罪御史龔夬言蔡京罪朝廷不以夬言為然夬將去位瓘上疏言紹聖以來七年間五逐言者皆與京異議今夬以言京又將罷去殆非祖宗奬厲言官之意皇太后已歸政瓘上疏謂外戚向宗良兄弟與侍從希寵之士交通使物議籍籍謂皇太后至今與政也罷監揚州糧料院改知無為軍瓘責之日方褎疏論蔡京而命下於門外繳四奏并明宣仁誣謗修實録建西京等事徽宗密遣人賜瓘黃金百兩由是京罷召還除著作郎遷右司員外郎又以書抵曾布論日録及國用事以為尊私史而壓宗廟緣邉費而壞先政布怒罷知秦州尋主管沖祐觀除名編管袁州移亷州又移彬州監中嶽廟坐其子正彚上書逮繫開封獄安置通州始瓘所辨日録事著尊堯集議者以為言多詆誣編置台州移楚州居住以卒年六十五靖康元年贈右諌議大夫瓘篤學有識志不茍合居喪孝初蔡卞知其才待之加禮瓘不肯附麗恬於進取雖諸公交薦逮居言職所疏姦惡雖所舉不避也嘗曰彼則舉爾所知此則為仁由己識者重其言瓘既力言京不可用用之必為腹心患悉如其言瓘有詞辨通易數言天下治忽多驗自號了翁云子正彚正同陳祐字純益陵井監人也舉進士元符三年擢為利州路常平尋除右正言遷右司諌祐言林希於紹聖初掌書命草吕大防劉摯蘇轍梁燾等制皆務求合章惇之意至有老姦擅國之語陛下頃用臣言褫其職自大名移揚州而希謝表具言所撰告皆出於先朝大抵姦人毁敗善類事成則攄己所憤事敗則歸過於君至如過失未形而訓辭先具安得為責人之名歷辨詆誣而上侵聖烈安得為死節之義不一二年致位樞近豈忠臣哉而希忿躁不平尚敢謝章慢上不敬此而可忍孰不可忍希再降知舒州祐又言元祐人才誠為可用今紹聖人才比肩於朝而元祐臣僚才十數人輒攻擊不已是朝廷之上公然立黨也既又上言曰臣聞惟辟作福惟辟作威威福之行權綱所在為人臣者蓋無與臣切聞陛下有所除擢而大臣往往執奏事寢不行至有留身沮格成命者豈所謂公事公言者哉臣願陛下力行裁抑無使權柄下移則朝廷之福也以論事切直出通判滁州蔡京用事編管歸州遇赦放還而卒龔夬字彥和瀛州人也舉進士為太僕寺主簿遷監察御史建言元豐中察官各兼言事乞令監察御史兼掌論議益廣言路丐外通判相州尋知洺州徽宗立召為殿中侍御史論章惇二蔡之罪章十上因言修五朝寶訓乞令不可增損變亂事實以濟姦説時議韙之黨事興削籍編管化州稍牽復而卒任伯雨字德翁眉州眉山人也父孜字遵聖以問學氣節雄鄉閭名聲與蘇洵相上下仕至光祿寺丞其弟伋字師中亦知名嘗通判黃州最後知瀘州當時所謂大任小任者也伯雨邃於經術文力雄健舉進士調清江簿知雍丘縣召為大宗正丞除左正言首上疏言章惇身為上宰久擅朝柄迷國罔上毒流搢紳自哲宗疾勢彌留中外忷懼惇當引天下大義以繫人心以安國勢乃乘倉卒輒逞異意逆天咈人輕亂名分睨睥萬乘不復有臣子之恭又言天下國家莫大名分法若不嚴禍起不測幸而太后聖明睿䇿先定折其姦謀向使惇計得行不知置陛下太后於何地陛下貸惇不誅則天下大義不明大法不立生覬覦之心長姦邪之志危疑之幾不可勝防矣章八上惇貶雷州又論蔡卞之惡有過於惇公然誣詆欲廢宣仁聖烈皇后又因哲宗之疑似非辜廢元祐皇后犯上不道又言使哲宗有欲黜太皇太后之謗廢皇后之惡編管諌官之失投殛忠良之譏皆卞倡之惇行之今若不正典刑殆無以明哲宗之德彰陛下友愛之仁卞亦尋竄建中靖國改元當國者欲以中為名調和元祐紹聖伯雨奏曰人材固不當分黨與然自古未有君子小人雜然並進可以致治者蓋君子易退而小人難退二者並用終於君子盡去小人獨留唐德宗坐至播遷之禍建中乃其即位改元號不可不為鑒戒時議欲西北專用武臣典郡伯雨謂李林甫在相位惡儒臣以邉功入相遂奏乞用武臣其後致祿山之亂此何以異也又論邉帥生事失與國心乞棄湟鄯之地以安邉息民會有赤氣之異時欲建火星觀以禳之伯雨不可曰聖人修德以弭災未有祈禳而消變洪範以五事配五行説者謂視之不明則有赤眚赤祥乞攬權綱專威福使皇明赫赫事至必斷則乖氣異象化為休祥矣蔡京為翰林學士承旨交結內侍伯雨極論其罪又論堂除猥衆侵吏部員闕內降稍多或恐詐傳敕命引漢唐季世鴻都置爵墨敕斜封以為戒王覿除御史中丞仍兼史官伯雨謂史院係宰相監修今中丞為屬恐非所以重風憲逺嫌疑已而覿除翰林伯雨復論曰學士爵秩位序皆在中丞上今覿為之是諌官論事非特朝廷不行適足以為人遷官也尋出知虢州崇寧初二蔡在東西府以黨論編管通州徙儋州以星赦移道州以八寶赦提點明道宫卒年七十三伯雨性剛鯁持論徑正為諌官僅半載所上一百八疏皆係天下治體號戇草云子象先申先張庭堅字才叔廣安軍人也舉進士為春秋博士樞密院編修官坐送諌官鄒浩免官徽宗即位召對除著作佐郎遷右正言庭堅入諌垣議論忠鯁嘗上疏曰近世之論孝者必曰法法者紹復神考然後為孝於其父有違戾不孝莫大焉夫前後異時法亦隨變而欲纎悉紹復於神考則法將弊於偏要之久必有不便於民而召怨者民怨則辱先烈如此而謂之孝可乎司馬光因時變革以便百姓不為無補於國陳瓘執義論諍以去小人不為無益於宫禁瓘實士論與之光則人心歸之請還陳瓘以慰士論盡復司馬光贈官以恱人心又奏竊聞士大夫多以繼志述事勸陛下者臣恐復有營私之人又欲正其名以自售曰紹復先烈非臣等不可引用私黨蔽隔賢俊假名曰繼述而實自肆焉又奏今逺略之耗於內者棄不以為守則兵可息特旨之重於法者刪不以為例則刑可省庭堅乞用蘇軾蘇轍徽宗問安所受遂忤旨除京東轉運判官改知汝州降通判陳州蔡京黨議其罪削籍編管虢州移鼎州又移象州內徙復州以星變赦還里卒年五十七江公望字民表睦州人也舉進士建中靖國元年由太常博士除右司諌時御史中丞趙挺之與户部尚書王古等同治放欠挺之劾古傾天下之財以為私惠者公望以謂上登極大赦欲與天下更始一切蠲免豈容古以私意能傾天下之財上疏曰人君所以知時政之利病人臣之忠邪無若諌官御史之為可信也患聞知之不博也故聽以風聞雖事有不實聞無不言至若挾情肆誣快私忿罔上聽陛下不可以不察也臣聞挺之與古論事每每不合屢見言氣懷不平之心有待而發俚語有之官事私讐此小人之所不為而挺之安為之豈忠臣乎公望諌諍有體朝野稱為得人已而上疏曰哲宗固孝於神考矣持紹述之論牢不可破輔政非其人以媚於已為同忠於君為異一語不合時學必目為流俗一談不侔時事必指為橫議借威柄以快私隙必以亂君臣父子之名分以感動人主故民力困竭國用匱迫天下為之騷然泰陵不得盡繼述之美元祐人材皆出於熙寧元豐培養之餘遭紹聖竄逐之後雕疏零落所餘無幾矣神考與元祐之臣其先非有射鈎斬袪隂私之隙也先帝信仇人而黜之陛下若立元祐為名必有元豐紹聖為之對也有對則諍興諍興則黨朋立矣陛下改元詔旨亦稱思建皇極嘉靖庶邦蓋嘗端好惡以示人本中和而立政皇天后土實聞此言陛下欲渝此言其如皇天后土何蔡王似府史語言指斥徽宗送大理寺驗治公望恐浸淫及於蔡王上疏極言其事語在蔡王世家疏奏出知淮陽軍未幾召入為左司員外郎除直龍圗閣知夀州以言者落職蔡京用事公望與任伯雨等俱坐貶編管南安軍遇赦得歸而卒臣稱曰諫有二諷與直而已諷則銷患於未然之前而直則進言於已行之後故忠臣碩士之遇明主也或千慮一失之間則必因事以諷而明主受其言故不勞而成功博不幸人君為讒邪所蔽而忠臣碩士覩行事之乖違與用人之失當則言必激切冀以動寤上意而讒邪之人乃誣以訕上忠臣碩士所以多不免於竄逐者以此觀浩等用直諫貶言雖屈於一時道則伸於後世名聲卓卓至今在人耳目彼讒之人豈不犬馬是愧哉東都事略卷一百
