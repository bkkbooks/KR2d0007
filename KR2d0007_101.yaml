body:
  text: 東都事略卷一百一宋王稱撰列傳八十四蔡京字元長興化軍仙遊人也舉進士為錢塘尉入為崇文院校書改太子中允館閣校勘俄拜考功貟外郎擢起居郎出使遼還拜中書舍人與弟卞對掌書命以龍圖閣待制知開封府元豐末命侍禁中議所立京附蔡確貪定策之功乃陰戒劊子執刀入欲斬宰相王珪㑹珪言上自有子乃止司馬光秉政改免役法復行差役法京於五日内差役殆徧詣政事堂白光光曰使人人奉法如君何患法之不行於是臺諫言其尹京挾邪壊法出知成德軍徙瀛州加寳文閣直學士知成都府諫官范祖禹論京不可用乃改江淮荆浙發運使又改知揚州歴鄆州永興軍遷龍圖閣直學士知成都府紹聖初召還權戸部尚書章惇復變役法置司講議久不決京謂惇曰取熙豐舊法施行之爾何以講為惇然之雇役遂定卞拜右丞以京為翰林學士兼侍讀修國史除戸部尚書時左正言孫諤論役法差雇之弊京言諤以為弊者蓋非今日乃前日之弊前日之弊謂熙寧元豐也則元祐變法是矣此臣所不忍聞也諤縁是罷諫職文及甫獄起京究治以及甫與邢恕書謂劉摯有大逆不道之謀京鍜練其事乃言司馬光劉摯吕大防交通中人陳衍之徒躐取髙位變先帝已成之法廢受遺顧命元臣以翦陛下腹心羽翼前日姦黨雖已竄逐而姦謀逆節蓋未白於天下也臣幸被詔㫖詢究本末得其情狀其無君之惡同司馬昭之心擅事之迹過趙髙指鹿之罪所有陳衍罪在不赦衍於是坐死衍蓋宣仁后殿内臣也惇卞遂欲追廢宣仁后皇太后皇太妃皆爭之哲宗乃已而劉摯梁燾同時死於貶所皆錮其子孫王巖叟范祖禹劉安世復逺竄京幾執政矣曾布知樞密院密言卞備位丞轄京不可以同升進翰林學士承㫖徽宗即位罷為端明殿學士兼龍圖閣學士知太原府皇太后詔令京畢史事留不行數日諫官陳瓘論其交通近習瓘坐逐京亦出知永興軍徙江寧府頗鞅鞅遷延不之鎮御史陳次升龔夬交論其惡奪職提舉洞霄宫明年復龍圖閣直學士知定州崇寧元年改大名府韓忠彦與曾布交惡謀引京自助復用為翰林學士承㫖兼侍讀修國史鄧洵武朋附京進愛莫助之之圖以獻徽宗遂決意用京忠彦罷擢拜尚書左丞遂代布為尚書右僕射兼中書侍郎進拜左僕射兼門下侍郎京起於逐臣一旦得志遂陰託紹述之柄箝制天下用熙寧條例司故事即都省置講議司自為提舉悉用其黨為僚屬取政事之大者如宗室宂官國用商旅鹽澤賦調監牧每一事輒以三人主之凡所設施皆於此乎出用馮澥錢遹之議復廢元祐皇后罷貢舉法令郡縣悉放三舍攷選置辟雍外學於城南以待四方之士又推方田於天下𣙜江淮七路茶官自為市盡更鹽鈔法凡舊鈔皆勿得用富商巨賈按所齎持或為緡錢數十萬至變為流丐有赴水及縊死者南開黔中築靖州西收青唐奪湟川鄯廓又取牂牁夜郎地以為平允從三州而内侍童貫始用事擢領節度使凡内侍寄資一切轉行祖宗之法蕩然無餘鑄當十大錢小民耆利亡命犯法者紛紛章楶子綖以私鑄置之法黥配海㠀侍御史沈畸坐治綖獄失意削官羇管者六人陳瓘子正彚亦以上書竄海上威福在手道路以目累遷司空封嘉國公于時元祐羣臣貶逐死徙略盡矣京第其罪狀兩等以司馬光為首指為元祐姦黨請於徽宗而刋諸石寘文德殿門又自書為豐碑攽之天下初徽宗以日食下詔書言者頗論熙寧紹聖之政於是又籍范柔中以下以為上書邪等凡名在兩籍者皆錮其子孫不得官京師及至近甸當是時四方承平帑庾盈溢京倡為豐亨豫大之説視官爵財物如糞土累朝所儲大抵掃地矣徽宗常出玉琖玉巵以視輔臣曰朕欲用此於大宴可乎京曰臣昔使虜見有玉盤琖皆石晉時物指以夸臣謂南朝無此今用之上壽於禮無嫌徽宗曰朕此器久已就深懼人言故未用爾京曰事茍當於理多言不足畏也陛下當享太平之奉區區玉器何足道哉京之不能納忠類如此五年彗出西方其長竟天徽宗震懼仆所立姦黨碑罷京為開府儀同三司安逺軍節度使中太一宫使封魏國公大觀元年復為左僕射兼門下侍郎以南丹州莫氏納土拜太尉徽宗受八寳拜太師三年復以中太一宫使罷遂致仕猶提舉修哲宗實録改封楚國公四年彗復出奎婁閒御史石公弼與張克公論京罪貶太子少保語在石公弼傳京遂出居杭州復太子少師政和二年復太師召還賜第京師京奏已蒙恩召還而前宰相張商英尚譴逺方臣與商英神宗朝同時遭遇舊人無幾乞放還便識者以京為不情未幾落致仕令三日一至都堂治事徙封魯國公初國朝之制凡詔令皆中書門下議而後命學士為之至熙寧間有内降手詔是不由中書門下共議蓋大臣有陰從中而為之者議者已非之矣至京則又作御筆手詔焉京益專政患言者議已故作御筆密進擬而丐徽宗親書以降出也違御筆則以違制坐之以壊封駁之制事無巨細皆託而行焉至有不類上札者而羣下皆莫敢言又更定三公三孤之官改左右僕射為太宰少宰廢尚書令自稱公相總治三省追贈王安石蔡確皆為王堂後吏不復立額有身兼十餘奉者侍御史黄葆光疏論之即貶昭州用故省吏魏伯芻提舉𣙜貨務令作泛料關子百萬緡進徽宗大喜持以示左右曰此太師所與我奉料也擢伯芻至徽猷閣待制京又言於徽宗以為内外泉貨所積為五千萬和足以廣樂富足以備禮於是立明堂鑄九鼎修方澤建道宫作大晟樂製定命寳任孟昌齡為都水使者鑿大伾三山回引河流作天成聖功二橋大興工役無慮數十萬兩河之人愁困不聊生矣石公弼張克公之論京惡也京憾之不置徽宗覺之用克公為吏部尚書凡七年京嘗令御史察吏部稽違事毛舉細故以為克公罪徽宗命削侍郎以下官勿問尚書公弼知襄州因論牙校轉般破産事户部侍郎陳彦文言其詆毁先烈京慮徽宗見公弼姓名必庇之但泛言乞責襄州官吏遂以散直安置台州又欲以宫室求媚召童貫軰五人諷以禁中偪側之狀貫軰聽命乃盡徙内酒坊諸司及兩軍營等於他所五人者各視其力所底爭以侈麗相誇尚於是崇大宫室苑囿改建延福宫浸淫及於艮嶽矣七年進封陳魯國公不拜京子攸鞗翛孫行皆至大學士視執政鞗尚帝女他至侍從者又十人厮役皆至大官妾媵封夫人尚方賚予無虚日輕舟小輦鳴鑾七幸命坐賜酒略用家人禮京表謝有主婦獻壽請釂而肯從稚子牽衣挽留而不却之語殊以為榮遇焉宣和二年京再致仕居四年又起領三省事五日一朝細務免僉書京至是四入相年老目昬不能事事悉決於子絛絛時為龍圖閣直學士兼侍讀威福自恣多引其賔客置要官建議剏式貢司於宣和庫括四方之幣空府藏所有以實之以為天子私財超拜其婦兄韓梠為户部侍郎白時中李邦彦為相皆不能堪先白罷絛侍讀以撼京京尚未有引去意徽宗召童貫使詣京諷之致仕貫既宣㫖京泣曰上何不容京數年必有相讒譖者貫曰不知也京不得已草奏請罪徽宗降制復令致仕在位僅數月而攸以太保領樞密院事欽宗即位諫臺論京誤國滔天之罪責授祕書監分司南京連貶慶逺軍節度副使衡州安置徙韶州又徙儋州其子孫皆褫職分徙逺郡惟鞗尚武德帝姬以駙馬都尉特免竄換深州防禦使京行至潭州而卒年八十京資險詐侈靡無度竭四海九州之力以自奉徽宗雖寵用之然亦屢起而屢仆京每聞其將退必見徽宗叩頭求哀無復有大臣廉耻事北事之萌也京首倡之燕山之役攸實在行而京送之以詩戒其起釁冀事之不成得以自釋也暮年即家為府諂佞干進者伺候其門輸貨僮㚢以得美官者不可勝數綱紀法度於是大壊卒為宗社之禍云弟卞子攸翛卞字元度與京同舉進士調江陰簿王安石以子妻之張璪薦其才召為國子監直講遷博士除集賢校理崇政殿説書尋同知諫院為起居舍人召試中書舍人遷給事中哲宗即位除禮部侍郎使契丹還請外以龍圖閣待制知宣州改江寧府歴揚廣越潤陳五州紹聖初召為中書舍人遷翰林學士兼侍講實録院修撰拜尚書右丞遷左丞卞有辭辨貌柔順而中險與章惇安惇締交起史禍以中范祖禹趙彦若黄庭堅興同文館獄以陷劉摯梁燾王巖叟劉安世等斥逐元祐之臣禁錮其子孫時號二蔡二惇云徽宗立御史龔夬諫官陳瓘任伯雨皆論卞過以資政殿學士知江寧府伯雨又言惇卞公然誣詆欲廢宣仁聖烈皇后又因疑似非辜廢元祐皇后犯上不道于時言者又論卞懐諼迷國醜正背公援近姦回竊據要利己所不喜指為邪朋撰造謗語傾陷正直擯斥流放禍及子孫慘刻之風寖以成俗遂落職提舉洞霄宫太平州居住未幾御史陳次升言哲宗皇帝責任執政卞造朝奏對不廸之以先王之典而廸之以殘忍殺害之事巧計既行凶燄益熾竊弄威福專報恩讎有譽安石之美者登之顯要有議安石之短者置之深罪其所進用若非妻黨之小人即是門下之姦吏更倡迭和相倚為重毒流天下卞實啟之又諫官張庭堅亦言惇卞盜權先朝為天下害卞以陰險謀之惇以凶悍行之遂責少府少監分司南京池州居住提舉崇禧觀尋知大名府揚州兄京為相復資政殿學士召為中太一宫使兼侍讀尋拜知樞密院事徽宗問鄯湟可復不卞對曰可復問誰可將對曰王厚可徽宗從之遂復鄯湟童貫除陜西制置使卞奏貫本無所長朝廷乏人何至遂用宦者他日誤邊計者必貫也以資政殿大學士出知河南府踰年知江寧過闕留為醴泉觀使兼侍讀大觀中除觀文殿學士知壽春府言者論其尊禮妖人張懐素降資政殿學士提舉太清宫俄起知鎮江府拜昭慶軍節度使知大名府繼知揚州召為中太一宫使兼侍讀遷開府儀同三司移鎮鎮東卒年六十贈太傅諡曰文正子脩仍當京用事時夤縁僥幸致身侍從靖康元年悉竄湖南攸字居安京長子也元符末監在京裁造院徽宗為端王每退朝攸適趨局遇諸塗必下馬拱立以俟王過王以問左右言其為蔡承㫖子心獨善之及即位寖有寵遷鴻臚寺丞崇寧三年除祕書郎俄以直祕閣提舉醴泉觀加集英殿修撰明年拜顯謨閣待制進直學士京罷相攸亦以龍圖閣學士兼侍讀初置宣和殿命攸為學士明堂成以攸與討論陞為大學士遂拜淮康軍節度使徽宗將斥去京用中書舍人王安中為御史中丞使劾京攸時直宣和殿通籍禁庭聞其事亟入宫請閒為父扣頭懇請徽宗乃已徙安中為翰林學士京復安職其後權勢日相軋輕薄者互煽搖以立門户由是父子遂為仇敵攸别賜第嘗詣京京方與客語使避之而呼攸入甫就席遂起握父手為切脉狀曰大人脉埶舒緩體中得無有疾乎京曰無之攸曰禁中適有公事不得留遂去客竊窺得其事以問京京曰君不解此此輩欲以吾疾罷我也居數日京果致仕又以季弟絛鍾愛於京數白徽宗請殺之徽宗曰太師老矣不許但削絛官攸歴開府儀同三司鎮海軍節度使拜少保進見無時益用事便辟走趨或塗抹青紅雜倡優侏儒多道市井淫媟謔浪之語妻宋氏亦出入禁省子行領殿中監方是時徽宗留意道學攸因倡為異聞謂有珠星璧月跨鳳乗龍天書雲篆之符爭與方士林靈素之徒證神變事於是神霄玉清之祠遍天下矣童貫伐燕以攸為河東河北宣撫副使攸謂功業可立致入辭之日指徽宗二寵嬪曰臣成功還乞以是見賜徽宗笑而弗責也比涿易二州降進少傅判燕山府王師入燕以功進少師歸領樞密院事封英國公王黼將罷相徽宗欲相之既而用白時中李邦彦而拜攸太保燕國公及將謀内禪親書傳位東宫字以授邦彦邦彦却立不敢承時中軰在側徽宗躊躇以付攸攸退屬其客給事中吳敏敏即約李綱共為之議遂定靖康元年攸從徽宗南下言者或云將遂復辟於鎮江敏為言乞令陪扈還京師以功贖過徽宗既還攸責大中大夫提舉明道宫繼貶節度副使永州安置徙潯雷二州又移萬安欽宗必欲誅之命御史陳述即所在斬之攸死年五十翛京次子也亦以恩倖至保和殿大學士欽宗受禪之初正有外患翛輒條上陜西募兵之策自請行又欲勸欽宗西幸欽宗將以為永興帥㑹報敵破濬州徽宗倉卒南出兄攸忌翛或成功即託徽宗㫖請以翛知鎮江府既而有復辟之謗與攸俱被誅臣稱曰蔡京之姦惡大類王莽莽之竊國命也制井田更錢幣造明堂起辟雍建靈臺班時令以誑耀其君卒移漢祚京為相大氐亦用此術馴致敵國交侵天下大亂卞造謗興獄誣害忠良以罔上欺下攸孽子佞臣誅死宜哉東都事略卷一百一
