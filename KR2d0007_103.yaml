body:
  text: 東都事略卷一百三宋王稱撰列傳八十六張康國字賔老維揚人也初入太學俊譽靄然舉進士為兖饒二州教授稍遷提舉兩浙常平福建路轉運判官召為左司貟外郎遷起居郎拜中書舍人遷翰林學士兼侍講進承㫖康國附蔡京以進遂除尚書左丞徽宗甚器重之拜知樞密院事先是西北邉帥辟官或任非其重康國歎曰並塞尤當擇人誠得人邉鄙無患奈何欲私所厚善乎終於位年五十四贈開府儀同三司諡曰文簡劉逵字公達隨州隨縣人也舉進士哲宗時為太常博士國子司業徽宗即位為衛尉少卿拜中書舍人遷給事中時建言者以元符末復元祐黨人太優朝廷再籍之而頗有闊略者御史中丞錢遹論黨人疑有姦下兩省議逵以遹言為非除户部侍郎遷兵部尚書崇寧四年拜同知樞密院事明年除中書侍郎時蔡京罷相國柄逵主之於是言者論逵謂其乘閒抵巇盡取陛下崇寧以來繼述緝熙美意良法不問大小輕重而盡廢之陛下立教養升貢之法而逵乃腹非竊議稽留旬浹不即奉行陛下息邪說以正人心而逵取為元祐學術者陛下疾朋黨以示好惡而逵進係黨人之子者陛下罪詆誣以尊宗廟而逵擢上書邪等者陛下勤繼述以昭先烈而逵用改更熙豐法令者陛下擢用之不二三年間致位輔弼於逵厚矣逵乃若此豈不負陛下哉遂罷知亳州京復相又責鎮江軍節度副使安州居住移襄州泰州起知杭州除資政殿學士醴泉觀使卒年五十朱諤字聖與秀州華亭人也舉進士高第調忠正軍推官稍遷太常丞擢殿中侍御史遷侍御史除給事中御史中丞上言天縱陛下將大有為手詔屢下比以十數其惻怛願治之意雖詩書所載堯舜三代之用心無以尚此然奉行之吏或安於茍簡或懷二三擅置不行則德意善政無由下達請分遣使者刺舉諸道有受令而不行及行令而不盡者如古留令虧令之罪重為譴罰則令行而朝廷尊矣欽聖憲肅皇后服除前此徽宗以禁樂未講朝㑹之禮至是諤言帝出乎震相見乎離離者帝與萬物交通之時古者以仲夏視朝其說載於月令令行於唐甚備本朝太祖建隆太宗興國皆行之宜敕有司以五月會朝時夀星數見諤言禮記月令八月中氣日在軫是月命有司享夀星於南郊願增崇其禮以致人主萬夀之意進侍讀除兵部尚書改禮部時議者以南郊熟牲以鑊非古禮欲易用鼎諤曰周公大祭祀則大宗伯省牲鑊非古禮乎大觀初為尚書右丞踰月卒贈光祿大夫諡曰忠靖諤始以科第有時名而附㑹蔡京以進初名紱以黨籍中有同姓名者遂改今名云林攄字彥福福州長樂人也以父任調無錫簿為敕令所刪定官通判濠州蔡京為相置講議司辟攄為財賦檢討除屯田貟外郎遷右司員外郎時議遣使察訪諸道以攄使河北陛辭言河北利害數事因留不遣擢起居舍人俄遷中書舍人翰林學士當是時朝廷用兵西方遼人遣使為請命攄報聘攄至北廷盛氣言曰夏羌數寇邉罪在不赦北朝屢遣使勸和當俟其服然後可副勸和之意北廷君臣皆不答及辭遼主欲為夏人求復進築城寨攄曰北朝往日夏人不庭亦嘗取唐隆鎮今還之乎敵不勝其忿既還館紿以宣㫖使降階跪受實以國書授之攄引故事不從因詆之以醜語遼主曰大宋兄弟之邦臣吾臣也今辱吾左右與辱我同欲致之死在廷恐兆釁皆泣諫止於是留攄在館三日絶供餉水泉汙不潔以饑渴困辱之既行無燕餞贈賄使還朝廷不以攄生事為罪乃除禮部尚書遼人以書言於朝遂以龍圗閣直學士出知潁州未幾召為開封尹除兵部尚書拜同知樞密院事改尚書左丞遷中書侍郎顯恭皇后崩徽宗成服舉哀衛士猶服色衣有司疑之攄遽判服紫繡袍明日對引故事宰臣宗室之喪皇帝持服殿中衛士服紫繡袍今於中宫何疑議者非之集英殿賜進士第攄當臚傳有姓甄而呼為堅名盎而呼為快者徽宗指曰卿誤邪攄不謝言者論其不學無術倨傲不恭失人臣禮謫知滁州言者不已提舉洞霄宫久之復資政殿學士知揚鄆二州進觀文殿學士拜慶逺軍節度使復以人言罷提舉明道宫卒年五十九贈特進攄為人很愎既退居買田湖州嵗荒租不時入責幹吏備償吏訴於朝為士論所耻靖康元年以攄蔡京死黨追貶為節度副使管師仁字元善處州龍泉人也舉進士為滄州教授又為廣親睦親宅教授通判澧州知建昌軍召對除右正言徽宗親政師仁言事詳緩不迫徽宗多聽納遷左司諌起居郎遂拜中書舍人遷給事中為工部侍郎進吏部久之遷刑部尚書以樞密直學士知揚州徙定州時承平日久邉備不修而敵使再至為羌請地朝廷以備邉委師仁師仁至則下令增繕城防僚吏駭然莫知所為師仁默計皆有程度一日舉衆十餘萬不日而成其他戰守之具無不飭備而人無知之者召為吏部尚書未幾拜同知樞密院事以疾罷為資政殿學士佑神觀使卒年六十五侯䝉字元功髙密人也舉進士為文簡古有西漢風崇寧初為監察御史進殿中侍御史䝉上疏陳十事去冗官容諌臣明嫡庶别賢否絶幸求戒濫恩寬疲民節妄費戚里毋與政閹寺無假之權徽宗嘉納之遷侍御史西夏寇邉髙永年死於敵徽宗怒親書五路帥臣劉仲武等十八人姓名命䝉制勘於秦州既行拜給事中䝉至仲武等囚服聽命䝉謂曰君等皆侯伯不敢以獄事辱第言其實案未上除御史中丞䝉因上言曰漢武之殺王恢不如秦穆之赦孟明子玉縊而晉侯喜孔明斃而蜀國䡖敵既殺吾一都護而將臣十八人由之而死是自戕其支體欲身之不病其可得乎徽宗即日赦仲武等蒙還遷刑部尚書進户部大觀中拜同知樞密院事遷尚書左丞政和二年除中書侍郎張商英為相御史中丞蔡薿力詆其私事商英丐罷且辨其誣有㫖與薿辨䝉曰商英雖有罪宰相也蔡薿雖言官從臣也今使之廷辨豈不有傷國體哉徽宗然之尋出知亳州旋除資政殿學士提舉崇福宫於時宋江寇京東䝉上書陳制賊計曰宋江以三十六人橫行河朔京東官軍數萬無敢抗者其材必過人不若赦過招降使討方臘以自贖或足以平東南之亂徽宗曰䝉居閒不忘君忠臣也起知東平府未赴而卒年六十八贈開府儀同三司馮熙載字彥為衢州西安人也舉進士為弋陽尉旋除祕書省正字遷著作佐郎起居郎中書舍人由大司成拜翰林學士遷承㫖不閲旬除尚書左丞踰年遷中書侍郎方是時王黼為相熙載與之共事多不協言者論其不省墳墓遂罷以資政殿學士知亳州尋提舉洞霄宫起知福州引疾再領宫祠卒年四十九臣稱曰自愛莫助之之說行而孽京由是用事小人之勢遂熾立乎人之本朝者莫非小人也其進悉以詆毁元祐紹述先烈為言如是者幾三十年而執政之中獨一劉逵用主元祐而黜彼豈誠然者哉烏呼小人之急售其才而耆利不已終以亂天下者自古蓋亦多矣而崇觀政宣之間為特甚焉於斯時也賢人君子擯廢不用甘鏟采以自珍者可勝道哉可勝道哉東都事略卷一百三
