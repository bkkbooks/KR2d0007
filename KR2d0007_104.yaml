body:
  text: 東都事略卷一百四宋王稱撰列傳八十七姚兕字武之隴干人也父寶為隴干巡檢戰沒以兕為右班殿直熙寧中西鄙進築兕為巡檢以功稍遷左藏庫副使夏人舉國入寇環慶保障皆被圍兕駐荔原堡引兵出據險要又張疑兵諸山上使賊不得散掠境內間出竒擊之賊稍却明日益兵來攻甚急兕乘高而射凡三百餘發皆應弦而斃指裂流血而射不已更遣其子雄率精騎出自執旗從城上麾之賊不敢當即引而西攻大順城兕復往援城又獲全慶卒叛兕以親兵守西門賊不得入且諭以大義賊感泣羅拜熙河用兵以兕策應攻破河州大酋木征聚兵于郎家山兕又破之鬼章陷景思立于踏白城諸兵皆欲以兵直前兕請先破撒宗城用其言一舉而克遂破踏白諸羌以報思立之役以功纍遷皇城使交趾冦邊師次富良江賊以輕艦度兵合戰兕與諸將帥精兵鏖擊之賊不得登者盡擁江中以功領雅州刺史瀘南乞弟叛兕以功領忠州團練使俄為環慶路馬步軍副總管改鄜延哲宗即位拜東上閣門使移熙河鬼章據洮州諜言青唐欲將兵由講珠梁㑹于洮合冦我疆兕自河州率兵破六逋宗城夜遣驍將縱火講珠梁明日青唐兵至不得遂洮州之援鬼章就擒遷四方館使再移環慶進通州團練使改涇原總管移鄜延路卒年六十七贈忠州防禦使兕幼孤事母孝學兵法戰未嘗敗輕財樂施老不廢書好顔真卿書曰吾慕其人耳弟麟子雄右俱仕節度使麟字君瑞以父寶死事補三班借職稍遷左侍禁王韶取熙河知麟材可用用為熙河管界巡檢復河州為諸軍先以功遷內殿承制韶大㑹諸將飲幕下而露骨山降羌叛報至韶目麟曰破敵者飲此麟欣然盡巵酒擐甲馳去食未竟斬數百級還報韶大喜舉軍盡驚從定岷山又為諸軍先木征塞河州路攻香子城急命麟往戰將先鋒田瓊殿次牛精谷瓊欲速進麟曰此險疑有伏吾固緩以圖之遽前必墮計中瓊不聽勉與俱入伏果發瓊遂戰沒麟獨格殺數十人身被數創督戰益急士益用命卒解香子城圍通河州路積遷左藏庫使從李憲討鬼章以功遷皇城使從復洮州擢涇原路兵馬鈐轄兼知德順軍以師援李憲兵為前軍賊兵十餘萬鋒鋭甚麟謂其副曰賊衆我寡將迎擊之且臨以大軍之聲必濟即馳騎中軍告急憲進兵麟繼使人聲言姚公已破賊衆聞歡趨麟度憲不逺鼓而出戰方酣大軍沓至大破之賊潰走拜西上閣門使英州刺史為秦鳳路馬步軍副總管改環慶路王師問罪西夏麟與劉昌祚皆為涇原行營總管聽高遵裕節制而以兵㑹于靈武賊十萬餘扼我師麟引兵以出大破之遂以師抵靈武為諸道先數日遵裕至方議攻城麟先登矢石下如雨氣益振城且拔㑹班師麟復以涇原兵為後軍賊追躡慷慨激厲士衆爭出死力卒全師而還是役也涇原軍入為前出為殿戰嘗為最而麟實將之諸將得罪例降皇城使永興軍路鈐轄初遵裕與昌祚有隙凡軍事輒沮止以故不濟後昌祚言靈武不克實受制非戰之罪朝廷問麟是非麟曰首至靈武昌祚之功城不能取皆臣之罪人以此多之復為涇原路鈐轄初復蘭州麟以功復故官為副總管時夏人請蘭㑹之地麟奏書以為夏人逐其君王師是征今秉常不廢即為順命可因以息兵矣獨蘭㑹不可與願召諸將帥飭邊備示進討之形以絶其望朝廷是其議兵出殺胡平而夏人兵壓境麟屯兵瓦亭賊逼靜邊麟將兵以待賊至邀擊之賊遁去召為龍神衛四廂都指揮使纍拜馬軍副都指揮使建武軍留後紹聖中出師涇原召拜殿前副都指揮使武康軍節度使殿前都指揮使改鎮建雄徙定武卒年六十八贈太尉麟風貌瑰特美鬚髯不妄笑語喜司馬兵法為將沈毅多奇策有功不自矜伐持軍紀律明下樂為之用事兄兕盡禮兄弟並立功聲蓋一時云折可適字遵正其先與魏道武俱起雲中號代北著姓郭逵帥鄜延見之曰真將種也薦之試藝廷中為鄜延路經略司淮備差使擢知寧岷環蘭四州再知鎮戎軍章楶帥太原築石門峽好水川檄可適守鎮戎時熙河秦鳳環慶三路兵㑹涇原之師無慮三十萬聽命於楶楶以總管王文振為統制以可適為前軍而副之前軍遇敵求援可適請文振益兵發熙河卒二千人失道盡赴坑谷死文振懼歸罪可適劾其擅興違節制奪十三官而罷楶請留之乃以可適權第十三將差統將嵬名阿理監軍昧勒都逋皆西夏用事首領朝廷密詔圖之㑹二酋以放牧為名窺伺境上可適因請出兵銜枚夜襲之俘其家屬部族三千餘人簿所得十餘萬計其地即天都山也可適請以秋葦川為寨南牟為州詔名寨曰臨羌州曰西安而以可適知州事纍遷明州觀察使涇原路副都總管帥請以兵直據靈州徽宗召問可適可適曰易取難守計當先稍侵其地以弱之俟吾籓籬已固委輸無阻而後可圖也進武安軍留後知渭州拜淮康軍節度使召為佑神觀使復帥涇原卒年六十一子彥質郭成德順軍中安堡人也初以應募為弓箭手纍級補都指揮使討河州踏白城部族有功換西頭供奉官從征交趾瀘南轉內殿承制元豐中大合五道兵趨靈武成將涇原選鋒賊守漫􅗹險以拒王師成出奇奮擊之至靈武有番酋乘馬馳突統制劉昌祚曰孰能為我取此敵乎成即躍馬斬其首以還昌祚大奇之為涇原第十副將以杖部將坐免熙河秦鳳環慶涇原之師進築平夏城置第十將以戍之章楶謂諸將曰新邊控扼誰可付者皆曰非郭成不可遂用之駐平夏敵既失地利乃縱兵圍成成隨機應變已而援兵大集升統制成乃與折可適議曰賊新敗衄若乘勢深入可以大獲帥以萬騎付之分道而進即帳中擒其大酋嵬名阿理昧勒都逋以功遷引進使雄州防禦使涇原路鈐轄轉客省使卒年五十六成姿貌豐偉襟度坦然撫養孤窮疏財好施名振西鄙云子浩劉仲武字子文秦州成紀人也姿雄偉以材武補官數從軍與吐蕃力戰有功積官至禮賔使為涇原路第一將夏人欲犯天聖寨主帥諜知舉事日檄仲武㑹諸將兵於天聖約曰過某日賊不來即分屯去仲武得賊的期乞緩分屯主帥不恱止留一將及仲武軍賊果至仲武力戰禦之賊遁去遷皇城使熙河路兵馬都監收復湟州除東上閣門使知河州李忠與骨延戰不利吐蕃為王趙懷德及狼阿章聚衆數萬勢張甚仲武禦之與賊相持二日潛遣二將各五百騎直抵賊營令之曰賊迎戰勿與戰亟還伏兵道左伺二將還賊追之伏發大敗其衆斬三千級遷四方館使惠州刺史收復西寧州轉客省使果州團練使移知湟州復還河州趙懷德狼阿章果來降遷榮州防禦使副高永年征西涼賊遽至仲武欲持重固壘永年易賊迎戰遂大敗仲武引咎自劾長流嶺表命未下㑹與夏人戰傷足朝廷閔之免赴貶所未幾為西寧都護童貫宣撫陜西議欲招誘僞王子臧征僕哥收積石軍積石與西寧接境仲武詣貫計事曰大兵入境賊窮走夏國路由西寧可掩捕若降可招納或深入巢穴可乘其便河橋功力卒未易辦可預具若禀命待報則失幾會奈何貫許以便宜臧征僕哥果欲降丐一子為質仲武即遣子錫往而河橋亦成仲武以兵度河挈僞降王以歸貫掩其功止録河橋之勞仲武終不自言徽宗遣使持金盞賜先得積石軍招納降王者使者訪其實以盞授仲武召對徽宗曰高永年失律以不用卿言招納降王撫定河南皆卿力也仲武謝問幾子曰九子徽宗悉命以官以錫為閣門祇候復知西寧州移渭州召為龍神衛四廂都指揮使帥涇原移帥秦鳳以功纍遷保靜軍承宣使步軍都指揮使熙河涇原都統制夏人冦震武仲武却之除瀘州軍節度使以老請祠提舉明道宫未幾再帥熙河以疾卒年七十三徽宗聞訃歎曰吾失長城矣諡曰威肅九子錫錡最知名趙隆秦州成紀人也以勇敢應募從王韶收復熙河四遷為三班借職姚麟嘗與虜戰被重創曰吾渴欲死得水可活有泉近虜營隆潛往納衣泉中賊覺隆急持濡衣且戰得歸裂取水以飲麟麟得活嘗從李憲討賊數有功討鬼章也河外諸羌皆以兵應鬼章隆率衆先至斧其橋鬼章失援擒之除涇原第九將與夏人戰平夏川功為多移熙河路兵馬鈐轄師出邈川隆將前軍擊賊賊走保三城逐北遂降之復鄯廓兩州夏人寇涇原詔熙河深入分其兵無令專得東向師至鐵山隆先登士皆殊死戰賊解召見徽宗曰鐵山之戰卿力也童貫與隆論燕雲事隆極言其不可貫曰君與此當有異拜隆曰武夫豈敢干爵祿以敗祖宗百餘年之盟好乎異時釁生雖萬死不足以謝天下貫知不可奪明日白徽宗除知西寧州時又有邊將劉延壽者過太原帥臣方經營燕雲以問延壽延壽以可伐不可守可守不可久矧祖宗盟誓一旦敗之恐有不測之變帥甚忌之隆與延壽雖武士甚有精識隆至西寧羌豪懾伏悉籍其户三萬六千願比內地從熙河帥劉法討賊隆以奇兵搗之虜大潰遂城鎮武遷溫州防禦使為馬步軍副總管捧日天武四廂都指揮使卒贈鎮潼軍節度使和詵字子美濮州鄄城人也以䕃補三班奉職為河北副將纍轉內殿崇班知岢嵐軍稍遷西上閣門使知雄州改右武大夫威州刺史詵因上制勝強逺弓式施行之弓能破堅於三百步外邊人號為鳳皇弓轉拱衛大夫榮州防禦使遷中侍大夫相州觀察使時女真數犯契丹童貫帥師巡邊至高陽關召詵問以計策乃言南北兄弟之國誓好百有餘年今師出無名宜按兵觀釁戒諸將無妄動貫諤然乃命詵兼統制副种師道詵還瓦橋貫亦至而前軍統制楊可世入敵境而敗詵勸師道斬可世以徇師道不從引軍宵遁詵亦徒行亂兵閒踰宿入雄州敵師至城下而還貫奏詵不從節制責豪州團練副使筠州安置徽宗亦詔貫班師㑹耶律淳死蕭太后立朝廷復詔貫毋歸及收復燕京肆赦以詵初議不戰獨不赦還後數月蕭幹出盧龍攻破景州又敗常勝軍於石門鎮陷薊州冦掠燕城人情忷忷有謀棄燕者徽宗於是思詵言召還復正奉大夫宣州觀察使卒年六十七贈安化軍承宣使東都事略卷一百四
