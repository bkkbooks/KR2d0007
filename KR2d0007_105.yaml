body:
  text: 東都事略卷一百五宋王稱撰列傳八十八徐績字元功宣州南陵人也舉進士調吳江尉桂州教授知建平縣為越王等宫大小學教授召對除王府記室徽宗即位除寶文閣待制提舉醴泉觀兼侍讀為中書舍人修神宗正史績言元祐史官范祖禹等多主司馬光記事至紹聖之際蔡京兄弟又用王安石目録各為之説正史所以久不成書者良由史官好惡異同也今史臣修正史謂宜悉取當時輔相之家記録以參較得失則一代大典可信矣時紹聖黨與尚在朝用事人懷異議以沮新政徽宗一日與績論擇相之難且曰朕欲相范純仁韓忠彥如何績曰陛下得人矣忠彥入相紹聖黨與以次斥去惟蔡京結宦寺為助徽宗未有逐京意命績與京校正五朝寶訓績耻與京同職力辭因奏曰京姦惡也唐德宗用盧杞致建中之亂陛下不可不察會諫官陳瓘任伯雨等論京罪京始去除給事中為翰林學士上疏言六事一曰時要二曰任賢三曰求諫四曰選用五曰破朋黨六曰明功罪以指陳當時之弊時議者謂熙豐法行之歲久當稍修補其弊以便民曽布初以為然已而乃言熙豐萬世之法不可改力陳紹述之説徽宗以問績績曰陛下之意得非欲兩存乎徽宗曰然績曰天下之事有是有非朝廷之人有忠有佞若不考其實姑務兩存臣未見其可也又問棄湟州何如績曰棄不毛之地以省歲用億萬計誠便也績因曰願陛下自今無惑小人之言妄興邊事無邊事則朝廷之福有邊事則臣下之利徽宗以為然以母喪免服除以蔡京不恱提舉靈仙觀入元祐黨籍久之知江寧府太平州召問徽宗問曰卿久于外下民疾苦宜以告朕績曰事固未易勝言惟茶鹽法為最苦茶鹽取息太深故私販者十百為羣被甲荷戈白晝公行若聚而為盜則可憂舊法官𣙜鹽州縣常有三年之積賈人沿邊入中糧草鈔法流行今許通京則州縣無積鈔法遂壞又綱運般米無欠折以搬鹽酬之今無般鹽則米綱亦壞徽宗曰為國用不足故也績曰生財有道理財有義用財有法今國用不足在陛下明詔有司推講而力行之徽宗稱善欲留績績不可遂以龍圖閣直學士留守南京以疾除顯謨閣學士致仕卒年七十九贈資政殿學士始績與何執中俱為王府記室績獨挺挺守正執中有愧焉不至大用天下惜之陳師錫字伯修建陽人也舉進士為昭慶軍節度掌書記知臨安縣召為監察御史會詔進士習律師錫言方今以經術造士不當以刑名之學亂之出知淮陽軍提點開封府界諸縣鎮事建言銓法用舉者遷升而監司刺史歲有定額今請託者類多益數而寒畯有不足之患請為限約均所不及以廣人才將領有苛慘失士心者因大閲羣卒歡譟將吏相視莫知所為師錫馳至軍按閲如初推為首者致之法劾其將削籍人皆歎服而密院以事不先啓罷知解州入為考功貟外郎知宣州移蘇州徽宗即位召為殿中侍御史與陳瓘論列蔡京之罪不見聽遂求罷出知滑州罷為提點靈仙觀以元祐黨籍謫監衡州酒稅遇赦監涇州南嶽廟會有妄言宫掖事得罪者語連及師錫削官貶郴州纍赦復官卒年六十九石公弼字國佐越州新昌人也舉進士調衛州司法參軍漣水丞知廣德縣為宗正寺主簿擢監察御史殿中侍御史公弼言敕今刪定官寺監丞簿皆執政近臣子弟未有資考不習政事願盡罷之以通寒俊之路大觀初除右正言遷左司諫太史局保章正朱汝楫冒請絹覺既論汝楫而有司失察者皆以中貴得不坐公弼謂矯稱詔旨恐前後詐冒非一汝楫而已由是經由僉書者並置其罪遷侍御史時大名有強寇吏不以聞公弼劾監司欺隱之罪又論蘇杭造作局上供之盛差船役夫騷擾之弊除太常少卿起居郎遷御史中丞蔡京以公弼不附已也忌之奏曰國朝未有由左史除中司者徽宗曰公弼豈不為御史乎於是京引公弼族弟娶其妻之姪欲以親嫌罷之徽宗曰外戚疏親何用避也公弼首論人臣黨同伐異捨大公之道執一偏之見此弊不除臣恐分曹列敵重相眄伺隱若仇讎非朝廷之福其務在交私不安分守輕朝廷罔公上者臣為執法當為陛下擊之與諌議大夫張克公交疏論蔡京罪惡以為京擅作威福權傾中外濫錫豫以蠧國用輕爵祿以市私恩謂財利為有餘皆出誕謾務夸大以興事肆為騷擾援引小人以為朋黨假借姻婭布滿要塗以至交通豪民興置産業役天子之將作營葺居第用縣官之人船漕運華石曾無尊主庇民之心惟事豐已營私之計名為祝聖壽而修塔以壯臨平之山勢託言灌民田而決水以符興化之讖語乃至法名退送門號朝京致姪俁之告變而繆為心疾受孟翊之訛言而與之官爵趙真欲輔之以妖術張子成竊議其姦惡駭動逺邇聞者寒心此皆足以鼓惑天下而為害之大者也今星文再見昭示其意非天警悟陛下則人力何能為哉臣願陛下順民心以奉天體天道以用刑暴白京罪以釋天下之疑以為人臣之戒京罷相以三師就第公弼論列不已京遂致仕公弼亦除兵部尚書兼侍讀以樞密直學士知揚州移襄州改述古殿直學士京再相户部侍郎陳彥文言公弼奏襄州牙校轉般損壞官物破蕩家業為詆毁先烈京恐徽宗知公弼姓名止云襄州官吏乞竄責遂為秀州團練副使台州安置未幾以皇太子赦提舉崇道觀卒年五十五公弼始名公輔後賜今名云張克公字介仲耆之曾孫也舉進士大觀初擢監察御史遷殿中侍御史起居舍人右諫議大夫因星變與石公弼交疏蔡京罪惡京遂致仕政和初為兵部侍郎遷御史中丞論張商英十罪商英罷相二年為吏部尚書兼侍講卒贈資政殿學士克公敢言事無所回避既論罷蔡京京復相克公屢求去而徽宗不許京忌之復不得進為尚書者凡七年黃葆光字元暉歙州黟縣人也少孤刻志於學崇寧初以朝廷遣使航海撫諭髙麗使副辟之以行補官調齊州司理參軍近臣薦其材召為太學博士遷校書郎又遷監察御史左司諫言事切直俄為符寶郎擢侍御史會歸遼人李良嗣撰北夷録平夷書規進用命以祕書丞葆光上疏論五不可大略謂良嗣以凶黠忿鷙之資犯遼人不原之罪亡命沙漠免死而已妄作平夷等書萬一語泄致生嫌疑為患不細祕書省圖書之府以良嗣為之有纍國體時三省密院史貟猥雜葆光言非元豐舊制今奉入則越從班品秩則幾執政輕蔑名器蠧耗國用無敢誰何吏強官弱禾有如此徽宗嘉納之於是非元豐法所載一切罷去省太農太府之費月計數萬又言承平日久人心易侈比年朝廷每有施設率以稱職加轉乞凡酬奬減年之類並依格令又言中外不知遵守成憲任情曲法一有奏請率引例破條或直行陳乞遂其所欲則恩歸私室否則怨歸公上玩習既久人無忌憚又言君尊如天臣卑如地剛健者君之德也而其道不可屈柔順者臣之常也而其分不可亢茍致屈以求合則是傷仁非所以馭下也茍矯亢以求伸則是犯分非所以尊君也徽宗命近臣讀其奏於殿中自崇寧後增置兼局廩給無度葆光屢論其弊徽宗命蔡京裁定京專恣乃陽請一切廢罷以激怒士大夫朝論果沸葆光言如禮制局詳議官至七貟檢討至十六貟製造局至三十餘貟豈無一二可以裁定上副明天子之意邪他日因入對徽宗以旱乾為念葆光退而上疏曰陛下德足以動天恩足以感人而憂勤祇栗檢身致治無所不至而不能感召和氣此臣之所以不能無疑也臣嘗仰觀天意俯察人言旁考古今君臣相與之際求其所以致隂陽之變者然後喟然歎曰人君有屈已逮下之心而人臣無歸美報上之意者能致隂陽之變人君有慈惠惻怛之心而人臣無柔順欽承之意者能致隂陽之變陛下恭儉敦朴以先天下師臣蔡京侈大過制非所以明君臣之分陛下以紹述為心京所行乃背元豐之法陛下隨宜損益追崇先烈京強悍自專不肯上承德意兼太宰鄭居中少宰余深依違畏避不能任天下之責此天氣下而地不應大臣不能尚德以應陛下之所求者如此疏入罷知立山縣未幾即昭州安置宣和中以職方貟外郎召未至主管太平觀知處州進直祕閣卒年五十八葆光天資剛正尚氣節善論事會文切理不為橫議所移方蔡京權勢震赫臺諫不敢言獨出力排之時議推重云崔鶠字德符潁州陽翟人也舉進士為鳳州司户參軍筠州推官徽宗以日食下詔求直言鶠上書以為陛下有忠不能明有邪不能去此陛下之闕失也臣竊怪陛下左右之臣有指元祐之臣以為姦黨者此必邪人也故宰相司馬光陛下左右以為姦而天下皆曰忠今宰相章惇陛下左右以為忠而天下皆曰姦此何理也光歷事四朝以忠信直諒聞於華夏危言正色奮不顧身雖古名臣無以逺過而謂之姦是欺天下也是欺後世也夫一人可欺也天下後世不可欺也至如惇者狙詐險賊臣不能盡知特怪天下士大夫呼曰惇賊貴極宰相人所具瞻天下以名呼之又指以為賊豈非以其孤負主恩玩竊國柄忠臣痛憤義士不服故賤而名之又指其實而號之以賊京師語曰大惇小惇殃及子孫謂惇與御史中丞安惇也夫日者陽也為君為君子食之者隂也為臣為小人日有食之臣侵君小人勝君子也弭災之道有三一曰擇人二曰因民三曰從時惟陛下畏天威聽明命獨運乾綱大明邪正毋違經義毋鬱民心則天意解矣徽宗覽而善之以為相州教授蔡京得政條列元符上書人分正分邪各有三等取同已者為正異己者為邪鶠入邪等停所居官久之調績溪令以病免歸始居汝州之郟城閉門屏處十餘年人無貴賤長少悉尊師之宣和末通判寧化軍朝廷悟其賢召為殿中侍御史既至而欽宗即位徙右正言即上章乞斬蔡京以謝天下為萬世亂臣賊子之戒諫議大夫馮澥上章言事鶠論其失曰澥言熙寧元豐之間士無異論太學之盛也此姦言也昔王安石用事除去異已之人當時名臣如富弼韓琦司馬光吕公著吕誨吕大防范純仁等咸以異論斥逐布衣之士誰敢為異乎士携策負笈不逺千里遊于學校其意不過求仕宦耳安石著三經之説用其説者入官不用其説者黜落於是天下靡然雷同不敢可否陵夷至于今大亂此無異論之效也又曰崇觀以來博士先生狃於黨與各自為説附王氏之學則詆毁元祐之文服元祐之學則詆誚王氏之説尤為欺罔自蔡京用事以軍伍之法馭士人大小相制內外相轄一容異論居其間則纍及上下學官以黜免廢錮之刑待之於斯時也博士先生其敢誚王氏之學乎澥之欺罔於是可見欺罔之言公行則實是隱矣纍章極論一時翕然推重會以疾求致仕乃以直龍圖閣提舉崇福宫未及拜而卒鶠有古學為文雄深作詩清峭學者稱之東都事略卷一百五
