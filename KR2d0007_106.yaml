body:
  text: 東都事略卷一百六宋王稱撰列傳八十九王黼字將明開封祥符人也為人有口辨才疏雋而寡學術極智巧便佞舉進士調相州司理參軍宰相何執中薦之除祕書郎進符寶郎遷左司諫張商英為相寖失徽宗意徽宗召蔡京於錢塘遣中使賜以玉環黼揣知徽宗之意數條奏京政事且劾商英去位京復相頗德其助已也擢為左諫議大夫給事中御史中丞自校書郎至是不兩歲俄兼侍讀入翰林為學士鄭居中與京不合而數薦其才京以黼為叛已甚怒徙為户部尚書將以財用不給為黼罪已而班直禁衛賚賜不如期詣左藏鼓譟黼聞之即詣庫揭榜期以某月某日皆相顧散去京計不行還為翰林學士黼本名甫徽宗更為黼進承㫖丁父憂閲五月起為宣和殿學士提舉上清寶籙宫賜第在昭德坊旁即許將宅黼倚中人強奪之子弟出怨言白晝逐之使去聞者為之不平復為翰林學士承㫖政和八年除尚書左丞遷中書侍郎宣和二年拜少宰由通議大夫超八官為特進自國朝以來命相未有也蔡京既致仕黼於是悉反其所為奏罷方田汰堂吏毁辟雍及醫算學減橫行遙郡奉入之半併㑹要六典等局諸路茶鹽鈔法不復比較上户科配一切蠲之當時聲稱翕然而黼既得位乘高勢而為邪多蓄子女玉帛以自奉徽猷閣待制鄧之綱妾有美色因過外舍黼使人誘而奪之反以為之綱罪竄諸嶺南朝士畏之側目黼遷居賜第凡供張什器徽宗命悉仰給縣官導以教坊樂又宴其家屬以落之遂以少保為太宰稍襲京故迹專以燕享為事御史中丞陳過庭初拜職事上言乞盡罷冗官以御前使喚為名者京西轉運使張汝霖乞罷進西京華果黼上章劾之兩人皆以散官徙逺郡睦州寇方臘起提㸃刑獄張苑言於朝黼方鋪張太平惡聞有外寇不以實告上而責苑張皇生事賊遂不可制至陷破六州朝廷遣師討之又數月乃定黼以功進位少傅又拜少師遼人李良嗣不得志於其國亡來歸我言遼可取若能遣使結女真與共圖之則石晉所割燕雲之地可復也徽宗以問大臣鄭居中鄧洵武皆以為不可獨黼是其計以身任之曰中國與遼雖為兄弟之邦然百餘年間彼之所以開釁慢我者多矣且兼弱攻昧武之善經也今如此置弗取則女真獨強吾不免事之中原地恐非復我有也黼鋭於成於三省置經撫房專治邊事不復以關密院括天下丁夫計口出算謂之免夫錢凡得錢六百二十萬億已而童貫伐燕無功厚賂女真得其空城并所得支郡即率百寮詣文德殿稱賀徽宗解玉帶賜之拜太傅封楚國公黼以為帝王盛德大業宜表出以示萬世固乞上尊號徽宗曰此神宗皇帝所不敢受也却不許初黼既得國秉念無以中上意牢其寵乃奏置應奉司遂自領之而以梁師成副焉近則外臺耳目之司逺則郡縣牧宰之屬皆責以供辦於是殊方異物四面而至鉛松怪石珍禽奇獸美鏐和寶明珠大貝通犀琴瑟絶域之異充於內囿異國之珍布於外宫凡入目之色適口之味難致之瑰違時之物畢萃於燕私極天下之費率歸於應奉奪漕挽之卒以為用而户部不敢詰四方珍異悉入於二人之家而入尚方者才什一每陪扈曲宴至為俳優鄙賤之伎以獻笑取容時欽宗在東宫鄆王楷有寵遂有奪適之意欽宗長子諶先已封崇國公黼言於欽宗以為皇孫不可以同皇子召宫臣耿南仲至第令代東宫奏辭諶官蓋黼欲以是撼東宫也徽宗待遇日隆恩數異於他相名其居閣為得賢治定為書載賡堂寵光亭以下凡七榜有玉芝産堂柱徽宗幸其第置宴觀之梁師成與黼連牆穿便門往來黼以父事之每折簡必稱為恩府先生徽宗過之始悟其交結狀由是黼眷稍息乃拔白時中李邦彥共政以分其權六年以太傅致仕而猶領應奉司欽宗即位貶為崇信軍節度副使永州安置籍其家開封尹聶山與黼有宿怨黼至雍丘之輔固村為盜所殺山取其首以獻黼美風姿面如傅粉鬚髮與目中精色盡金黃張口能自納其拳本以何執中汲引及居言責即疏執中罪以白徽宗請罷之欲使蔡京專當國政徽宗不可而止遭時得君承京之後其為姦惡又甚於京內連梁師成外徇童貫覆滅遼國招挑金人皆黼之罪也子閎孚雋孚職至待制修撰後亦削籍家徙于吳云朱勔平江人也父冲本閭閣賤微家貧落魄傭於人梗悍不馴氐罪至徒因亡之旁縣乞貸以求活遇異人以黑鐵數條方書一編授之曰毋久客此將歸大而家冲還里中視故鐵有光鬻之乃金也以其資按所授方設肆市藥未幾逺近翕然稱之買者輻輳家遂為富修蒔園區結游客譽者亦廣始蔡京居錢塘過吳欲建經藏於梵室聞冲有幹決呼諉之才兩月而成京隂器其能及召還冲謁道左丐以勔從行是時徽宗頗垂意華石於是薦之命以官令語其父密取浙中珍異以進其初才致黃楊三四本徽宗已嘉之後歲歲稍增加然不過二三貢貢不過五七品童貫握兵京以勔託使階邊功以升貫見之喜始廣供備以媚上舟艫相繼號曰華石綱凡延福宫艮嶽諸山皆仰之一時應奉天下皆不及也纍遷合州防禦使提舉惠民河公事專置應奉局於平江指內帑為囊中物每一發取輒數十百萬外計所蓄雖封椿禁錢無問名色悉取之監司徐鑄王安道王仲閎等濟其惡空竭縣官經常以為應奉類以億巨萬計而所貢之物豪奪漁取毛髮不償諸民搜巖剔藪幽隱不置一華一木曾經黃封護視不謹則加大不恭罪人有嘉木奇卉者指為不祥惟恐芟去之不速民一與此役中人之家悉破産至賣鬻妻子以供其須斸山輦石程督慘峭雖江湖不測之淵力不可致者百計出之至名曰神運遏截諸道運綱旁羅賈舟舟揭所貢暴其上連檣接櫓日夜不絶篙工柂師陵轢郡縣人以目相謂不敢誰何廣濟卒四指揮盡以充挽士猶不給蔡京始患苦之言於徽宗願抑其太甚徽宗亦病其擾乃禁用糧綱船戒伐冢藏毁室廬毋得加黃封帕蒙人園囿凡十餘事獨留勔與蔡攸聽入貢餘進奉悉罷自是勔小戢不兩歲愈甚於初吳民不聊生矣方臘起以誅勔為名諸郡響應童貫出師承上旨盡罷去華石進奉綱徽宗亦黜勔父子弟姪之在職者民大恱寇平勔仍得志怙權恃勢父子各立門户聲焰熏灼賄賂紛紜成市邪人穢夫爭候門下肆狎昵因以求劇職要官躐進至侍從者袂相屬也有不附已即旋踵罷去時謂東南為小朝廷徽宗末年隂約閹寺之姦稍誅數人以殺其勢勔因得入其訾力排梁師成寖為徽宗所親倚出入禁闥進見不避嬪御伐燕之役謂勔有功自慶逺軍承宣使進寧逺軍節度使醴泉觀使前後槃結固寵二十年鬻恩毁法昔所未有即私室建神霄殿奉御容其中監司郡邑吏每朔望皆拜庭下又託挽舟募兵數千擁以自衛第舍擬宫省名園别墅甲吳郡服膳器用逼玉食而華緻過之輿臺賤𨽻腰金纍使者充牣其門子汝賢汝功姪汝楫汝舟擢皆承宣觀察使汝翼直龍圖閣天下為之扼腕欽宗即位削其官放歸田里既而羈管循州籍其家尋賜死子孫徙湖南與勔同時有李彥者亦以恩幸積官至翊衛大夫安德軍承宣使宣和間嘗括民田按行河北京東西所至州郡倨坐黃堂而使監司郡守列侍其凶焰如此奪民常産重斂租課官吏無敢違忤當時謂勔結怨於東南彥結怨於西北云欽宗即位暴其罪賜死仍籍其家臣稱曰天下之禍未有不由小人而成者也觀王黼以奇技淫巧為身謀朱勔專以華石為享上小人誤國之罪擢其髮不足以數也然亦孰知其禍之至於此哉於呼華清盛而羯胡起華陽成而狄難興由古迄今致亂召寇若出一軌可不痛哉方京師之失守也蜀僧祖秀嘗親覩所謂華陽宫者記其事云政和初天子命作壽山艮嶽於禁城之東陬詔閹人董其役舟以載石輿以輦土驅散軍萬人築岡阜高十餘仞增以太湖靈壁之石雄拔峭峙功奪天造石皆激怒抵觸若踶若齧牙角口鼻首尾爪距千態萬狀殫奇盡怪輔以蟠木癭藤雜以黃楊對青䕃其上又隨其旋斡之勢斬石開徑憑險則設磴道飛空則架棧閣仍於􅓟頂增高榭以冠之搜逺方珍材盡天下蠧工􅓟技而經始焉山之上下致四方珍禽奇獸動以億計猶以為未也鑿地為溪澗壘石為隄捍任其石之性不加斧鑿因其餘土積而為山山骨暴露峰稜如削飄然有雲姿鶴態曰飛來峰高於雉堞翻若長鯨腰徑百尺植梅萬本曰梅嶺接其餘岡種丹杏鴨腳曰杏岫又增土疉石間留隙穴以栽黃楊曰黃楊巘築修岡以植丁香積石其間從而設險曰丁嶂又得赬石任其自然增而成山以椒蘭雜植於其上曰椒崖接衆山之末增土為大坡徙東南側柏枝幹柔密揉之不斷華華結結為幢蓋鸞鶴蛟龍之狀動以萬數曰龍柏坡循壽山之西移竹成林復開小徑至數百步竹有同本而異幹者不可紀極皆四方珍貢又雜以對青竹十居八九曰斑竹麓又得紫石滑淨如削面徑數仞因而為山貼山卓立山隂置木匱􅓟頂開深池車駕臨幸則驅水工登其頂開閘注水而為瀑布曰紫石壁又名瀑布幈從艮嶽之麓琢石為梯石皆溫潤淨滑曰朝真磴又於洲上植芳木以海棠冠之曰海棠川壽山之西别治園囿曰藥寮其宫室臺榭卓然著聞者曰瓊津殿綘霄樓蕚緑華堂築臺髙九仭周覽都城近若指顧造碧虛洞天萬山環之開三洞為品字門以通前後苑建八角亭於其中央榱椽窗楹皆以馬腦石間之其地琢為龍礎導景龍江東出安逺門以備龍舟幸東西擷景二園西則溯舟造景龍門以幸曲江池亭復自瀟湘江亭開閘通金波門北幸擷芳苑隄外築壘衛之瀕水蒔絳桃海棠芙蓉垂楊略亡隙地又於舊地作野店麓治農圃開東西二關夾懸巖磴道隘迫石多峰稜過者膽戰股栗凡自苑中登羣峰所出入者此二關而已又為勝遊六七曰躍龍澗漾春陂桃華閘鴈池迷真洞其餘勝迹不可殫紀工已落成上名之曰華陽宫然華陽大氐衆山環列於其中得平蕪數十頃以治園圃以闢宫門於西入徑廣於馳道左右大石皆林立僅百餘株以神運昭功敷慶萬壽峰而名之獨神運峰廣百圍高六仞錫爵盤固侯居道之中束石為小亭以庇之高五十尺御製記文親書建三丈碑附于石之東南陬其餘石若羣臣入侍幃幄正容凛若不可犯或戰栗若敬天威或奮然而趍又若僂取布危言以示庭諍之姿其怪狀餘態娛人者多矣上既恱之悉與賜號守吏以奎畫列於石之陽其它軒榭庭徑各有巨石棊列星布並與賜名唯神運峰前群石以金飾其字餘皆青黛而已此所以第其甲乙者也乃命羣峰其略曰朝日升龍望雲坐龍矯首玉龍萬壽老松棲霞捫參銜日吐月排雲衝斗靁門月窟蹲螭坐師堆青凝碧金鼉玉龜壘翠獨秀棲煙嚲雲風門靁穴玉秀玉竇鋭雲巢鳳雕琢渾成登封日觀蓬瀛須彌老人壽星卿雲瑞靄溜玉噴玉藴玉琢玉積玉疉玉叢秀而在于渚者曰翔鱗立津涘者曰舞仙獨踞洲中者曰玉麒麟冠于壽山者曰南幈小峰而附于池上者曰伏犀怒猊儀鳳烏龍立于沃泉上者曰留雲宿霧又為藏煙谷滴翠巖摶雲幈積雪嶺其間黃石仆于亭際者曰抱犢天門又有大石二枚配神運峯異其居以壓衆石作亭庇之置于寰春堂者曰玉京獨秀太平岩置于萼緑華堂者曰卿雲萬態奇峰括天下之美藏古今之勝於斯盡矣善致萬鈞之石徙百年之木者朱勔父子也善理百工之􅓟藝辨九州之珍産者閹人梁師成也奉人君之嗜好忽天下之安危者宰執王黼輩也靖康元年閏十一月大梁陷都人相與排牆避虜于壽山艮嶽之巔時大雪新霽丘壑林塘粲若畫本凡天下之美古今之勝在焉祖秀周覽纍日咨嗟驚歎信天下之傑觀而天造有所未盡也明年春復游華陽宫而民廢之矣元老大臣所為圖書詩頌名記人厭之悉斧其碑委諸溝中至於華木竹箭宫室臺榭尋為民所薪同宇宙而長存獨壽山艮嶽以耳目之眩蔽堯舜之明為王者一尤物耳昔三代以嬖色取禍秦隋以奢靡致失自書傳之作聖賢莫不以斯二者為先誡也自我藝祖以上聖之資定區宇既克孟昶閲宫中物有寶裝溺器遽命碎之平劉鋹廢媚川都速禁采珠蓋奢侈者禍之媒孽創業之君所諱也於呼富有天下美味珍服莫敢以資其身雖土階三尺茅茨不翦亦知其可也崇寧之際恭默求治是時非無賢能也而蔡氏先據要途祖宗之法去民久矣自是崇大苑囿結怨敵國皆出於此不然一夫不臣天下族之彼醜裔安得而內侮之邪噫天下之士聞壽山艮嶽者舊矣孰親觀其興廢復使後世憑何圖記以考之與因括其大略作華陽宫記云東都事略卷一百六
