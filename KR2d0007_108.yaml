body:
  text: 東都事略卷一百八宋王稱撰列傳九十一唐恪字欽叟錢塘人也四歲而孤舉進士調郴縣尉移零陵令知榆次縣有愛在民召對為提舉河東常平徙江東轉運判官會牂牁獻地命以屯田貟外郎往撫諭夷人始自疑衷甲以迎之恪盡撤兵衛獨將騶卒數十人往夷人望見歡呼投兵聽命恪示以大義咸感泣拜舞曰不圖今日得沾聖化以奉使稱職入為右司貟外郎遷起居舍人恪言國家與契丹講好百有餘年邊備益弛宜及今無事時以漸為之不然且有後悔徽宗曰卿勉為朕行即以為集賢殿修撰河北都轉運使會中貴人銜命稱詔有所示恪噤不答中貴人怒歸而中以他事降直龍圖閣知梓州移陜西轉運使未至以右文殿修撰知滄州滄當河下流一日河決水至城下不沒者三板恪率官吏乘城救護都水使者孟昌齡以河事至檄郡索船與兵恪曰滄極邊也兵非有旨不可得昌齡怒劾恪不能備水城且壞恪一不問治水事愈力城漏募善沒者窒之戲下卒善沒而不時赴募戮以徇有鹽場正當下流使決之或曰鹽法重水決而壞且得罪恪曰殺吾身而全一城吾之願也命趣決之踰宿而水去城以得全又上疏請止教保甲免呈保馬除常平逋負復諸縣租賦等第賑貸以寬被水之民報未下悉以便宜行之民大恱進龍圗閣待制徙揚州召拜户部侍郎京師大水汴且溢或請決汴水南岸以護宫城者恪曰水漲而決是無可奈何今決而浸之是棄民也乃止恪泛小舟歷覽水之源委而求所以利導之乃決金隄導而注之河踰旬而水平恪上疏曰水隂類也至犯城闕天其或者以隂盛之漸警告陛下乎願垂意於馭臣鄰逺女寵去小人備邊防以益謹天戒徽宗嘉納之遷户部尚書宰相王黼領應奉司上供綱卒盡為所奪漕運不至者殆數月恪見徽宗言曰國家定都於梁非有山河形勢以臨天下也直仰汴渠之運以養百萬之師耳而宰相領應奉勢動天下奪漕挽之卒以為用户部綱運自去秋絶不至將有匱乏之憂以天下之力奉一人臣子不敢憚今珍異之物充牣大臣之家而奉上者曾未什一是傾天下之財為國斂怨臣不知所以為國矣因極言黼惡且自請罷遂出知滁州盜起京東以恪知青州未行除吏部尚書又徙户部復請外除延康殿學士知潭州時方崇尚道家言恪入辭從容言曰孔子之所以為道者曰毋意毋必毋固毋我老氏之所以為道者曰去甚去奢去泰今方士之言汗漫亡稽宜無聽用且皆市井之庸流耳豈足與語聖人之至道哉將退而留者再大氐以節耆欲定心志收人材化風俗惜財賦愛民力去諛佞奬鯁直數事反覆言之徙杭州靖康初復以吏部尚書召道拜同知樞密院事既至為中書侍郎言事者爭論宣政間事恪言於欽宗曰革弊須以漸今京城始開四方聳聞新政宜擇今日之急者先行之而言者不惜大體至毛舉前事以快一時之憤豈不傷道君皇帝之心乎蔡京父子王黼童貫之徒已從廢逐姑可已矣他日邊事既定然後白道君皇帝請下一詔書與天下共棄之孰曰不可欽宗是之拜光祿大夫少宰兼中書侍郎恪為相無經濟大略于時敵騎復南下必欲邀我割三鎮乃罷兵恪集羣臣議以為當與者什九乃從與者之議使既行而悔之密啓欽宗請以親征為名西幸洛京還據秦雍以圖興復而留太子居守欽宗將從其議會何栗入見力詆其不然且曰周之失計未有如東遷之謬者也欽宗以足頓地曰今當以死守社稷拜栗門下侍郎而恪計不用言者謂恪之智慮但長於交結內侍而已今國勢日急如恪者誠不可以備位遂罷為觀文殿大學士中太一宫使而栗代為相京師失守欽宗幸敵營恪曰失計矣既而還宫及欽宗復幸敵營恪曰一之為甚其可再乎慟哭不食者纍日敵議立異姓令吳幵莫儔自軍前入城取推戴張邦昌狀唯孫傅張叔夜不肯僉書恪既書名已而呼其諸子謂曰吾為大臣而國家至此何以生為乃仰藥而死何栗字文縝仙井監人也舉進士第一除校書郎尋提舉京畿學事召為主客貟外郎起居舍人遷中書舍人兼侍講言事者論栗宗蘇氏謂軾為鄉黨曲學出之未幾除徽猷閣待制知遂寧府留為御史中丞論王黼姦邪及其黨胡松年盧益六人皆罷之黼既解政栗亦罷為提舉崇福宫起知泰州欽宗即位復為御史中丞閲日入翰林為學士擢拜尚書右丞遷中書侍郎時議割三鎮未決會王雲自真定表言敵以不即割地卻禮物曰若二十日使不至再犯闕矣於是集文武百寮議於延和殿梅執禮孫傅呂好問秦檜等三十六人言不可與自范宗尹以下七十人皆欲與之與之者曰朝廷當與三鎮今反不與是中國失信於外國不若姑且與之縱復猖獗則人怨神怒師出無名可不戰而屈也不與者曰國家更二聖始得河東河北陵寢在焉且河北天下之四支四支茍去吾不知其為人人民貢賦皆其末也況天下者太祖之天下非陛下之天下陛下豈可效石晉所為乎栗持之甚堅曰三鎮國家之根本奈何一旦棄之況敵情變詐百出安可保其必信割之亦來不割亦來且河北之民皆吾赤子棄地則并其民棄之為民父母而棄子可乎欽宗然其言猶豫不決時敵勢張甚栗請置四道都總管以大名河南應天襄陽為治所事得專決財得通用官得辟置兵得便宜為禦戎計緩急欲以羽檄召兵入衛京師欽宗從其言及种師道死唐恪耿南仲聶昌相與言曰今朝廷既已繼好息民而復調發不已使敵人知之大事去矣乃檄止陜西南道兵金人既薄城下獨張叔夜一軍至京師餘無至者方敵之再入境也栗以資政殿學士知杭州陛辭留提舉醴泉觀未幾遂領開封尹栗建請以康王為兵馬大元帥統諸路兵安集河北除門下侍郎翌日唐恪罷相改太宰少宰復為左右僕射拜栗右僕射兼中書侍郎京師失守朝廷徇敵意遣曹輔往河北召康王栗請欽宗於輔衣襟屑礬書詔以傳密旨未幾金人遣使致書欲欽宗再幸其軍議加金主徽號敵遣髙尚書者持書來高尚書奏陛下不必親出姑為書或遣親王大臣以行可也欽宗亦不欲出郊而栗獨以謂必須出欽宗信之栗白欽宗請以孫傅為太子少傅謝克家為太子賔客輔太子監國時栗自以折衝有術對敵使歌曰細雨共斜風作輕寒左右及敵使皆失笑明日欽宗幸敵營栗從以出遂留不遣已而議立異姓金人曰唯何栗李若水不得與議栗在敵中不食而死年三十九後有自敵營還者言栗死狀始贈觀文殿大學士臣稱曰君子所貴乎死者以其知死必勇也方敵之謀廢立也為恪者當以大義責敵使知中國之有人就使不幸與禍會亦為得其死矣不務出此乃拱手聽命非能勇也而卒不免於死蓋其死不足責也栗才疏而術浮無圖回天下之志使之遭時承平從容廟堂商古今談治亂可也而況艱難之際倚之而謀國豈不殆哉於呼陽九之厄固天數矣而人謀之不臧亦有以致然言之可為痛哭而流涕也陳過庭字賔王越州山隂人也舉進士為館陶簿澶州教授知中牟縣除宗子博士何執中侯蒙器其材薦之擢祠部吏部貟外郎遷右司使遼國還徽宗問敵主苦風痺手足不舉及箭損二目是否過庭對敵主無恙目不損恐傳之者妄也今日急務當安不忘危治不忘亂雖盟好是恃亦宜以邊備為念徽宗然之為右司凡四年是時大臣各立黨不協同列或隂為向背唯過庭無所附徽宗曰陳過庭中立不倚者也遷太常少卿起居舍人拜中書舍人禮部侍郎擢拜御史中丞方臘反睦州過庭言致寇者蔡京養寇者王黼竄二人則寇自平又論朱勔父子本刑餘之人交結權近竊取名器賄賂狼籍罪惡顯著宜正典刑以謝天下由是大忤權貴罷知蘄州未半道責海州團練副使黃州安置居久之得自便欽宗即位以兵部侍郎召復拜御史中丞徙禮部尚書擢尚書右丞遷中書侍郎時金人再犯京師議割兩河須大臣偕行聶昌耿南仲皆以事辭過庭曰主憂臣辱臣願效死欽宗揮涕歎息留不遣及城陷始行二駕北狩過庭已在河北因留不得歸死于燕山年六十贈開府儀同三司過庭本名揚庭徽宗賜以今名云聶昌撫州臨川人也舊名山字賁逺以太學上舍釋褐教授相州入館為校書郎擢右司貟外郎故事五房吏階官視卿監者遇錫宴坐都司上山極論之謂名分未正非所以禮士大夫也徽宗是之俄以直龍圖閣為湖南轉運副使蔡京為相召還由太府卿拜户部侍郎遂為開封尹復為户部侍郎山本與王黼善京惡黼山為謀所以傷之者反為黼所中以徽猷閣待制出知德安府未幾落職提舉太平觀又責崇信軍節度副使衡州安置復召還會欽宗即位以顯謨閣直學士知開德府未至除户部尚書兼領開封府事李綱之罷太學生陳東及士庶十餘萬人撾鼓伏闕下經日不退遇內侍輒殺之殺三十餘人擘裂無遺體府尹王時雍麾之不去山出諭旨相率聽命而退已而時雍乞置東等于獄山力言其不可遂止復尹開封時京師復戒嚴欽宗謂山有周昌抗節之義改賜名昌遂拜同知樞密院事入謝力陳防秋守禦之策曰三關四鎮國家籓籬也今犬戎在內狼子野心一朝寒盟何以制敵臣願召天下兵集畿內練禁旅之師以備出戰堅城隍之具以却奔衝拒黃流之水以斷歸路前有堅城後有大河四面有徑兵敵或南下墮吾網中矣欽宗命昌領都大提舉守禦司敵議畫河為界須大臣報聘詔以耿南仲及昌為和議使分割兩河昌言兩河之人勇徑忠義如太原城守經年隆德既破復守人人死戰者蓋不負祖宗二百年之澤今一旦割以豫敵萬一不從則臣必為金人所執死不瞑目矣和議不成臣乞以便宜遣屬官分道提勤王之師入衛欽宗許之昌即日就道行次永安軍與敵兵遇尼堪盛陳兵衛以見之尼堪隨行置閣門其舍人止昌徹傘用榜子贊名引見國相昌曰國相者金國何官也舍人曰宰相元帥昌曰既為宰相元帥乃金國之臣也昌亦南朝大臣止當以敵國臣子客禮相見豈有南朝大臣禮見大金臣子乎舍人曰樞密寧不畏死昌曰主憂臣辱主辱臣死死不足畏節不可屈爭之移時尼堪既不能奪乃以客禮見敵既南行命其太師楊天吉以千兵館昌往河東耿南仲往河北昌謂天吉曰國相待昌之還方肯歸師臣子之心已急欲分遣屬官往東路昌自行西路會於河中不二十日之間此事畢矣天吉許之明日昌與其屬劉岑滕牧分道而行凡八日昌至絳州絳人不奉詔遂見殺年四十九昌為人疏俊遇事敢為喜周人之急然恩怨太明睚眥必報以喜怒用刑云贈觀文殿大學士諡曰榮敏孫傅字伯野海州人也舉進士歷祕書省正字校書郎監察御史徙禮部貟外郎進祕書少監擢中書舍人髙麗入貢傅言使人所過郡調夫治舟騷擾生事勞費民力以妨農時而於中國無絲毫之益宰相以其所論略與蘇軾同奏貶蘄州安置給事中許翰謂傅論議偶同以職論事而責之深過矣翰亦坐黜靖康元年召拜給事中兼侍讀進兵部尚書傅嘗上章乞復祖宗法度欽宗問之傅曰祖宗法惠民熙豐法惠國崇觀以來法惠姦時謂名言拜尚書右丞俄同知樞密院事方敵急攻京城傅親當矢石日夜不少休欽宗再幸敵營以傅兼太子少傅行宫留守乘輿久不得歸傅屢貽書請之不報及廢立檄書至中外震駭傅大慟久之曰吾唯知吾君神聖可帝中國茍立異姓吾當死之又數請車駕還闕明日敵大闢南薰門陳兵索道君帝后諸王妃主傅獨留中宫太子不遣密謀欲以黃金五千兩匿太子於民間别以狀類太子者并宦者二人擊殺之并取當死囚數人以其首同死兒并宦者尸送敵營告以宦者竊太子欲投軍前都人爭而擊殺之誤傷太子因以兵討定斬其為亂者茍尚不已欲繼之以死越五日無肯當之者撫膺大慟曰吾太子傅義當同死生今主辱臣死之時敵人雖不索吾當從太子行求見二酋以義責之庶幾萬一然後就死時方在皇城司有子來省傅曰使若勿來而竟來邪吾已分死國矣叱使速去勿亂人意其子亦曰大人以身徇國尚何言哉願大人力保太子遂以留守事付王時雍有頃從皇后皇太子至南薰門求出守門胡人曰軍中唯欲得皇后皇太子留守何出邪傅曰主上既辱太子復出我宋之大臣且太子傅也上既不回當以死從太子敵以尼堪命召之而出不知其所終後賜諡曰忠定張叔夜字嵇仲耆之曾孫也以蔭調蘭州録事參軍叔夜喜論兵而蘭州本先零故地最為極寒惟恃河為阻每冰合則嚴飭守備卒介胄纍月不得息叔夜曰是當求其要害以守之於是博考山川講求利病上書力陳取天都之策以為天都介於五路之間乃西人嘯聚之區凡欲舉兵以冦諸路則必就彼點集然後議其所向以故每一聚兵則五路不得奠枕此當今之所宜先書再上樞庭行其策果得其地建為西安州用薦者知襄城陳留二縣通判潁州知舒海泰三州召對除庫部貟外郎開封少尹遷右司貟外郎從弟克公為御史中丞論蔡京罪京銜之至京復相乃捃托其細故貶監西安州倉草場久之召為祕書少監擢中書舍人給事中政和之間吏惰弗虔凡命令之出於門下者豫書銜於後使先置名而徐填事目以行謂之空黃叔夜極論其弊始立法禁遷禮部侍郎以徽猷閣待制出知海州會劇賊宋江剽掠至海趨海岸劫巨艦十數叔夜募死士千人距十數里大張旗幟誘之使戰密伏壯士匿海旁約候兵合即焚其舟舟既焚賊大恐無復鬪志伏兵乘之江乃降拜徽猷閣直學士知宣州又知濟南府山東羣盜競起叔夜發精卒擊之以功加龍圖閣直學士知青州於是羣盜帖息一方晏然靖康初虜騎過河叔夜以謂若許講解則胡羯必有邀求縱之使去後必復來有輕中國心乞遣精騎邀擊及豫令河北邊鎮出兵斷其歸路願假臣騎兵與諸將併力追襲不報徙知鄧州四道置帥以叔夜為南道都總管叔夜帥師入援或勸其緩行者叔夜曰國家危難如此忍顧身乎至尉氏遇賊遊騎轉鬪而前用十一月晦至京師叔夜入見具陳唐明皇避祿山之亂蓋嘗出幸今賊鋒鋭甚願駐蹕襄陽以圖幸雍欽宗然之進延康殿學士又進資政殿學士令提舉南道兵守禦城上擢拜僉書樞密院事連四日大戰斬其金環貴將二人城破叔夜被創猶父子力戰士皆殊死鬪殺傷相當然諸將無一人至者敵既議和命彈壓京城事欽宗再出郊叔夜於太學前起居叩馬諫止不能回即號慟再拜衆皆哭欽宗回首字之曰嵇仲努力會敵詔立異姓叔夜乞立皇太子為君以從民望二酋怒追赴軍中至則抗論如初不少屈遂扈從北去道中惟時飲湯又不食粟至白溝御者曰過河矣乃矍然起仰天大呼遂不復語明日卒年六十三訃聞贈開府儀同三司諡曰忠文東都事略卷一百八
