body:
  text: 東都事略卷一百九宋王稱撰列傳九十二王雲字子飛澤州人也舉進士嘗使髙麗撰雞林志以進擢知淮陽軍後為校書郎出知簡州為陜西轉運副使除兵部員外郎遷起居舍人不閲月遷中書舍人欽宗即位遷給事中斡里雅布犯京師朝廷議割三鎮以和敵騎既退遣雲使于軍前雲自燕山還傳道斡里雅布之意以為尼堪得朝廷所與余覩蠟書堅云中國不可信欲敗和約執政以為不然罷為徽猷閣待制知唐州金人陷太原始召雲再使遷刑部尚書許以三鎮稅賦之數雲遣使臣至自真定報金人已講和不復議割三鎮止須五輅及上尊號又遣從吏李裕回稱敵人索禮物須康王來乃可成欽宗以康王使斡里雅布軍尚書左丞王㝢副之㝢辭行欽宗怒貶新州而以知樞密院馮澥代㝢已而雲從吏二人馳至言曰中使押車輅至長垣今已却回前後奉使官皆回矣少頃雲等來見康王雲曰當日謂和議成大王方可行澥曰如此則李裕之言妄矣因奏雲誕妄誤國雲乃言事勢中變敵欲得三鎮而止不然進兵取汴都中外大駭康王復還澥亦罷政於是詔集百官議三鎮棄守言不可與者三十六人自范宗尹以下七十人皆欲與之何㮚謂唐恪曰三鎮之地割之則傷河內之情不割則太原真定已失矣不若任之但飭守備以待恪唯唯雲言康王英武舊與斡離不結歡敵人畏服割地求和宜命將以往事下外廷耿南仲言河北軍前獨有親王是偏重於斡里雅布與尼堪不相稱可止遣使告和以王雲使斡里雅布莫儔使尼堪欽宗曰卿更與少宰議南仲又言只遣王雲李若水亦可欽宗令南仲諭雲雲入對欽宗曰肅王已留今遣康王萬一又為所留奈何雲曰和議既成必無留之之理臣請以百口保之欽宗用雲計遂以康王使斡里雅布軍雲以資政殿學士副之耿延禧高世則為參議官康王自滑州過河至濬州守臣李仲洵者善相人謂延禧世則曰大王天人相也二參議從之皆保無他獨王尚書色殊不佳耳康王次磁州先是雲奉使歸過磁相勸二郡為清野計二郡從之撤近城民舍令運粟入城磁人以是怨雲宗澤為宗正少卿嘗論列宰相非其人宣撫使副提兵不進并劾雲使敵張皇賊勢迫脅人主雲至京師欽宗示以澤章雲憾之及澤守磁康王至澤出迎謁雲因責澤曰公前日見劾何也澤曰如公固不足劾大抵張皇敵勢者天下所共疾何獨我哉康王謁嘉應侯廟雲在後百姓遮道諫曰大王不可北去肅王已為人所誤矣厲聲指雲曰清野之人真姦回也康王祠神畢出廟門百姓已蟻聚鼓譟雲最後出馬不及跨遂見殺康王復南還相州未幾金人再犯京師建炎中興贈雲觀文殿學士雲兄霽為講議司編修嘗言蔡京過失坐黜海島後欽宗以霽從种師中解太原圍王師敗績霽死之弟雱靖康中為職方員外郎臣稱曰雲之死在雲為不幸而於中興為幸也使雲不死康王必至敵營既入虜營必為其所留矣康王若留則亦必扈從二聖以去也磁人既已殺雲康王乃復南還此非人謀實天意也故曰雲之死在雲為不幸而於中興為幸也陳遘字亨伯零陵人也名犯太上嫌名止稱字第進士調秦州司法參軍徽宗即位欲用為御史㑹居父喪服除為廣西轉運判官蔡京當國以開邊自任建平從允三州亨伯上疏言蠻人幸安靜不可輕擾以兆邊釁京惡之以他事罷歸旋知商州興元府入為郎張商英得政遷左司貟外郎擢給事中㑹商英免相命格不下亨伯懼請外以直祕閣為河北轉運使進直龍圖閣移陜西蔡京復相亨伯為淮南轉運使時江淮發運使以不稱職聞執政欲用亨伯京曰職卑不足用願更選徽宗曰可除集英殿修撰以往京乃不敢言朱勔載華石塞道邀求無藝官舟不得行亨伯捕繫勔人於獄且自劾於朝徽宗照其忠擢徽猷閣待制而黥勔人于逺方方臘起睦州二浙用兵以亨伯為龍圖閣直學士經制使方用度百出民無以為命亨伯創此軌務及以公家出納錢量取其贏為經制錢後翁彥國為總制使倣其法又取所謂總制錢者至今天下有經總制錢給縣官費自此始也賊平遷龍圖閣學士進延康殿學士為河北都轉運使改知中山府徙真定河閒宣和末金人南下盛兵犯河閒亨伯悉力城守欽宗即位與敵約和圍得解加資政殿學士積官至光祿大夫靖康元年復為真定又徙中山時京師再被兵中山當敵衝亨伯冒圍入城為堅守計欽宗命康王為天下兵馬大元師擢亨伯為兵馬元帥欽宗割兩河以賂敵命亨伯弟光祿卿適諭旨適臨城未言亨伯遙語曰主辱臣死吾兄弟平居以名節自期寧能賣國家為囚虜乎適感泣對曰兄但盡力勿以弟為念亨伯呼總管使盡括城中兵擊賊以衆寡不敵辭斬以徇復呼部將沙振者往振素有勇名亦固辭亨伯固遣之振懼罪濳刃入府殺亨伯于堂中振既出帳下卒譟而前曰大敵臨城汝安得殺吾人執而捽裂之身首無餘城中無主乃開門出降敵人見其尸曰南朝忠臣也殮而葬之贈特進亨伯性孝友為人寬厚長者任部刺史幾三十年每出行部必焚香祈天願不逢貪濁吏嘗薦王安中吕頥浩張慤謝克家何鑄後皆至公輔世以為知人適字至叔由開封少尹衛尉少卿遷光祿卿是役也敵執之以北後死于雲中梅執禮字和勝婺州浦江人也舉進士調常山尉為詳定九域圖志所删定官遷軍器鴻臚丞比部度支貟外郎時梁師成領後苑有使持劵來脅部吏支錢三百萬執禮執不與徙吏部遷國子司業為諸王宫翊善進左司員外郎擢拜中書舍人遷給事中時諸郡卒留役京師者幾百人諸局冗占蠧耗大農間以役事出入禁籞橫坊市挾惡少為姦詔皆遣歸而後苑獨留不遣前此都城凡有所營繕總領貴人多有所干請俄有違詔干請至請御筆行下者執禮皆論駮不行執禮與宰相王黼雅相善宴其第以詩規之黼怒執禮力求去㑹孟享原廟後至罷為顯謨閣待制知蘄州尋落職明年徙知滁州復集賢殿修撰徽猷閣待制欽宗即位移知鎮江召為翰林學士道除吏部尚書兼侍講未幾改户部執禮入對乞以御前錢付部應六宫廩給皆由度支內降許執奏一日小黃門持御批至部支錢甚急而御封不用寶已而悟其失復取之執禮不與即具奏明日內夫人降秩黃門杖配陵下金人犯京師四方兵未集執禮勸欽宗親征時宰相沮其議不果行京師失守敵人劫質天子責金幣無紀極府庫空單猶不厭其欲遣人來取提舉官以下八人受約束執禮與禮部侍郎陳知質刑部侍郎程振給事中安扶同見敵責以金銀不足曰胡不賦於民四人同辭對曰今天子蒙塵臣民皆願前死雖肝腦不計也於金繒何有哉顧誠亡以塞責敵大怒問官長安在振恐執禮坐之遽前曰皆官長也敵不勝其忿於是四人者皆見殺而其副侍御史胡舜陟殿中侍御史胡唐老監察御史姚舜民王俁各杖之百執禮死時年四十九贈資政殿學士程振字伯玉饒州樂平人也少有俊才未冠游太學張商英陳瓘張庭堅鄒浩皆器之徽宗幸太學振以諸生髙第得官除和州教授留為辟雍録遷博士拜太常博士提舉京東西路學事振奏立孟子祠以公孫丑萬章從祀改京西路常平入為膳部貟外郎監察御史歷辟雍國子司業左司貟外郎皆兼太子舍人初見太子言古者大祭祀登餕受爵必以上嗣既禮經所載元豐彞典具存昨上有事明堂而殿下不與非所以尊宗廟重社稷太子矍然曰初無人及此者由是驟加奬重方臘亂浙右聲搖京師振謂宰相王黼曰相公宜乘此時言天下弊事庶幾少革以當天意順人心黼不恱曰上且謂黼挾冦奈何振知黼忌其言不答趨而出然太子薦之拜給事中黼銜前忿乃曰振資淺且雅長詞令但除中書舍人已而馮熙載與黼不合罷中書侍郎黼因諷言者以振為朋黨責提舉冲佑觀明年復集英殿修撰欽宗受禪召拜吏部侍郎嘗上言大臣不協議論多駮詔令輕改失其事機如金人拿兵且半年而兵不解者以和戰之說未一故也裁抑冒濫如黑白易分而數月之間三變其說者蓋廟堂不能忘私而多與其黨為地故也今一人言之以為是而行一人言之以為非而止或出聖斷隃度而不暇疇咨或用大臣偏見而遂形播告所以動未必善處未必宜乃輒為之反汗焉其勢不得不爾也及聞敵冦河北力請合諸路兵掎角擊之以牽其勢且曰彼猖獗如此陛下猶欲守和議而不使之少有所懲創乎欽宗是其言而不能盡用也除開封尹時捕得亡命卒數千人振請充入步軍司而除其罪步軍司請論如法振曰方多事時一日而殺數千人可乎力爭之由是得不誅遂為刑部侍郎敵邀天子幸其營求金不已振被命督輸與梅執禮等四人同死之年五十七初振在西掖王黼以客沈積中帥河朔欲覘敵圖燕振語積中當思異時覆族之禍積中至部首以書謝振盛言其不可之狀振以告諸朝及左遷童貫蔡攸卒生邊釁振天姿和厚有醖藉至論事則挺然不可回奪方徽宗崇尚道家之說振至東宫從容及之曰周公作鴟梟之詩孔子以為知道其言不過逮天之未隂雨綢繆牖户而已老子著道經亦曰為之於未有治之於未亂蓋老氏與孔子合者如此今不固根本於無事之時而徒爭目前之功非二聖人意他日太子為徽宗道之徽宗以為然頗欲去健羡疏左右近習之人而宦寺楊戩方大興宫室懼不得肆因讒家令楊馮以為將輔太子幸非常徽宗震怒執馮誅之而太子之言亦廢及靖康中振尹京府言利者頗離閒兩宫振善於調護由是無纎介之疑既死人皆出涕後贈端明殿學士同時死者陳知質安扶失其傳司馬朴字文季丞相光兄里之孫也少喪母育于外祖范純仁紹聖初黨議起父宏坐上書論辨得罪純仁亦坐救黨人責永州目疾失明客至必令朴導以見時方七歲進揖應對如成人客皆驚歎以純仁遺恩補官宏死朴年十七徒跣護柩還人稱其孝調晉寧軍士曹參軍通判不法轉運使王似諷朴伺其過朴不可曰守二為長官使下吏得陷之不唯亂常人且不食吾餘矣死不敢奉教似賢而薦之靖康初黨禁解同判西京國子監召為虞部貟外郎遷右司金人再犯京師以朴使敵敵人斡里雅布問其家世朴曰大父丞相酋喜曰大賢之後也甚加禮乃吐腹心諭以亟割地講和以間尼堪朴兩往返以敵情語執政促其議而任事疑不決朴爭甚苦已而城陷欽宗思其言亟召對以為兵部侍郎朴請復使敵帳及兩宫北狩又貽書酋長請立趙氏敵憚之挾以北去其後敵欲用之朴不可竟握節而死朝廷知其忠特贈兵部尚書李熙靖字子安常州人也舉進士調海州司理參軍中詞學兼茂科為太學正遷辟雍博士以父老求便親除提舉淮東學事既命下乃得河東而為淮東者臧祐之也蓋省吏取祐之賂輒易之大臣疑焉吏以誤告客有得其情者訹熙靖使言熙靖曰事君不擇地吾豈敢發人之私求自便乎宰相聞而賢之白于徽宗留為兵部員外郎未幾以憂去還為右司員外郎王黼為相立應奉司又立經撫房於中書他執政皆勿得與熙靖數為言應奉之職非宰相事也今樞密院及諸省兵房皆足以治疆事經撫房何為者哉黼怒積四年不遷黼罷由太常少卿拜中書舍人以徽猷閣待制知洪州閲兩月復以故官召入對首言燕雲初定宜戒不虞願飭帥臣修武備徽宗曰詩所謂逮天之未隂雨徹彼桑土綢繆牖户者此也熙靖進曰孔子云為此詩者其知道乎能治其國家誰敢侮之陛下勳髙往古願為無疆之計徽宗甚嘉之俄兼侍講徽宗既已內禪行幸江浙欽宗以熙靖主管龍德宫改顯謨閣待制提舉醴泉觀宫僚如故徽宗待之甚厚數召與燕語嘗曰去年內禪之事外人以為吳敏功殊不知出我至誠不由人言建牧之意可見矣我無此意人言且滅族誰敢哉或謂吾傳位與唐睿宗上畏天戒乃為之吾有此意者數年矣熙靖因賀曰陛下不以天下纍其心過古帝王逺甚明年兩宫北狩張邦昌攝國熙靖即移病邦昌令權直學士院力拒之至以憂憤廢食疾且篤故人訪之熙靖泣數行則曰百官何日再朝天乎翌日遂卒後贈端明殿學士談世績字彥成長沙人也舉進士教授郴州又中詞學兼茂科為祕書省正字於時蔡京得政以其子攸提舉學館而宦者梁師成貴幸諂事者皆是也獨世績不附阿諛六年不得遷京罷他宰相有惜之者始遷司門貟外郎又三年遷吏部貟外郎蔡京復相逐不附已者提㸃上清太平宫復用為郎遷少府監擢中書舍人世績以重命令惜名器廣言路吝賜豫正上供省浮費六事以獻為當路者所疾罷為徽猷閣待制知婺州未行復留徽宗內䄠幸江浙欽宗遣執政奉迎以世績副之還提舉醴泉觀專掌龍德宫請辨正國史謗宣仁之語追述欽聖復瑶華之位大享神祖仍用富弼侑食釋奠先聖不當以王安石從祀是歲彗出東方大臣有謂此乃外國將衰非中國憂也世績面奏垂象可畏當修德應天不宜惑諛說遷給事中兼侍讀內侍有喧爭殿門者罪止贖金世績即疏駮劾以不恭因言童貫輩初亦甚微小惡不懲馴致大患疏入近習皆側目何㮚建言分天下為四道各置都總管世績曰裂天下付四人而王畿所自治者才十六縣爾獨無不掉之虞乎大拂其意改禮部侍郎時敵騎駸駸南牧為城守備甚急世績曰守邊為上策今邊不得守守河則畿甸自固中策也巡幸江淮㑹東南兵四面扞敵下策也既而河上無守兵敵乘虛得度盡斂士卒入城世績又言遣京畿大將秦元以所統保甲分四寨直國門使兵勢連屬首尾相援即虜不敢逼孫傅深然之又格於㮚議敵邀車駕世績凡再扈從出城遂留敵帳徐以十害說用事者大略言南北講解之利詞意忠激虜人聳聽及邦昌僭位令直學士院世績堅卧不起邦昌知不可奪乃已卒年五十四贈端明殿學士方王氏學盛行世績雅不喜或問之曰說多而屢變無不易之論也識者韙之東都事略卷一百九
