body:
  text: 東都事略卷一百十宋王稱撰忠義傳九十三語曰無求生以害仁有殺身以成仁而孟子亦謂所欲有甚於生者則捨生而取義信哉蓋死者人之所難而得其死者尤難也世治則忠義之士全其榮名世亂則忠義之士其節乃見主憂臣辱義在必死不以禍福動其心不以死生易其守此誠烈丈夫也哉烏呼祖宗以來忠義之士以身狥國者非無其人僅有之而已蓋逢治世也若夫靖康之難則守死仗節之士見矣此所謂板蕩識忠臣者歟劉平字士衡開封祥符人也父漢凝官至崇儀使平為人剛直任俠善弓馬讀書强記舉進士為無錫尉知鄢陵南充二縣以父喪解官道出興州有賊遮道劫之平引弓射殺三人餘遂遁去冦凖竒其材薦之起為殿中丞知瀘州平在南充時夷人入冦平攝州事率土豪擊走之及平復至夷人畏服代還通判頴州召為監察御史數上疏論事為丁謂所惡久之得三司鹽鐡判官除殿中侍御史陕西轉運使仁宗即位遷侍御史初真宗知其才將用之矣丁謂曰平將家子知兵若使將西北可以制戎狄章獻皇后思謂言換尚衣庫使知邠州稍遷慈州團練使平謂元昊居服僣竊且叛矣宜備之轉溫州防禦使遷雍州觀察使步軍都指揮使靜江軍留後元昊反平上疏曰五代以來中國多事唯制西戎似有䇿焉於此之時中國未嘗進一騎一兵逺屯塞上特任土豪付以州邑是以邉陲無事其後大臣不能逺慮徙朔方李彞興靈武馮繼業於內地自此靈夏漸敝中國十年之中兵民交困矣靈武既失守趙德明懼問罪願備藩臣朝廷即以靈夏兩鎮授之今元昊僣逆復與唃厮囉結此乃天亡之時也臣請招致山界洪宥等州土豪授以職名給以金帛使勇者貪於祿冨者貪於安不期月而人心自定或授唃厮囉以靈武使逼元昊河外族帳復出鄜延石州蕃漢步騎收河西部族招其酋帥其衆離二則以大軍進討以所得城邑而封之元昊不過竄身河外一窮冦爾若朝廷貸元昊之罪臣恐北狄謂朝廷養兵百萬不能制一小戎有輕中國之心然亦須議守禦之長計請召夏竦范雍與兩府大臣議攻取䇿令邉臣遵守疏奏不報而元昊盛兵攻保安軍自土門路入冦延帥范雍以書召平至保安與石元孫合平趣土門既又有告賊兵趣金明圍延州雍復召二將還軍救延州平督騎兵先發步卒繼進夜至三川口西十里營令騎兵先趣延州奪門詰朝步兵未至元孫與平還逆之行二十里遇兵與偕行至三川口遇賊與戰平左耳右脛皆中流矢戰少卻鄜延駐泊都監內臣黃德和引兵先走平轉鬪三日賊問主將所在何不降平使人應之曰狗賊不降我何降也以衆寡不敵與元孫俱被執平不復食數罵曰狗賊我頸長三尺何不速殺我縳我何之乎遂見殺年六十八德和既遁輒誣平降賊詔以兵圍其家命殿中侍御史文彥博即河中府置獄遣知同州龎籍往訊焉具得其實遂釋其家德和坐腰斬賜平家信陵坊第一區贈忠武軍節度使兼侍中平諸子唯季孫有聞季孫字景文少篤學能詩文蘇軾知杭州時季孫以左藏庫副使為兩浙兵馬都監軾薦其才除知隰州仕至文思副使以卒軾時為兵部尚書哀季孫之死奏言季孫篤志好學博通史傳工詩能文輕利重義練逹軍政至於忠義勇烈有平之風性好異書古文石刻所得祿賜盡於藏書之費季孫既死家無甔石妻子寒餓行路傷嗟臣實與季孫相知既哀其才氣如此又哀平以忠義死事聲迹相接四十年間而子孫淪替不䝉收録豈朝廷之意哉欲望優於賻贈以振其妻子朝夕饑寒之憂亦使人知忠義死事之子孫雖跨歷嵗月朝廷猶賜存恤於勸奬之道不為小補軾之言如此則季孫之賢可知矣任福字祐之開封人也初補衛士由殿前諸班六遷至遙郡刺史元昊反除莫州刺史知隴州又知慶州與諸將攻元昊白豹城以功拜龍神衛四廂都指揮使賀州防禦使計議涇原邉事適安撫使韓琦行邉趣涇州聞元昊閲兵折薑㑹謀入冦遂以兵萬八千人命福統諸將擊賊以耿傅參軍事桑懌為先鋒涇州駐泊都監王圭武英各以所部兵從福節制琦授福以方略俾諸將併兵合勢自懷逺城趣德勝寨至羊牧隆城出賊之後如未可戰則據險設伏待其歸然後邀擊之福等既就道琦又重戒之福引輕騎數千與賊戰於張家堡賊僞北桑懌引騎趣之福亦踵其後會暮合軍屯好水川福等追奔三日至籠竿城北遇賊距羊牧隆城五里諸將因前接戰桑懌先戰沒福繼之圭及武英而下皆陷焉福未死前有小校劉進者勸福自免福曰吾以死報國也因揮四刃鐵簡挺身決鬪遂死之年六十一贈武勝軍節度使兼侍中王圭者開封人也年十九應募為親從官遷殿前第一班擢禮賔副使涇州駐泊都監元昊冦鎮戎軍圭將以三千騎為先鋒自瓦亭至師子堡賊圍之數重圭奮擊多獲首級乘間叩鎮戎軍請益兵不許止縋糧與之士卒既飽圭語之曰兵法以寡擊衆必在暮我兵少乘其暮可得志也乃馳入賊一將以鎗直其胸傷右臂圭左手以杵碎其脛又一將復以鎗進圭挾其鎗運鞭擊死之虜驚遂引去是嵗改涇原都監明年從任福大入好水川連鬪三日諸將俱沒圭乃東望再拜曰非臣負國力不能也獨有死報爾乃復入戰擊殺百人目中飛矢而卒鎮戎之戰也圭以所得二鎗植山上圭既死邉人即其所為立廟焉圭通隂陽術數好水之戰自知不得還將行謂其家人曰可速去無為虜所仇也及虜攻瓦亭果求其家人如其言贈金州觀察使有子光祖以圭恩補供奉官淯井夷人入冦光祖為梓夔路鈐轄合都監王宣討之賊遂棄去茂州土蕃圍茂州據雞棕關以內侍王中正經畫命光祖䇿應光祖招納餘族全雞棕關會中正于茂州乃歸瀘州蠻乞弟圍安夷寨羅箇牟村王宣死之宣所將兵潰光祖至江安潰者悉歸于光祖尋從韓存寶取夷勞口時久雨士卒暴露賊保巢穴光祖說存寶進軍落共城又進軍梅嶺賊以數萬出駐落箇棧存寶亟止光祖但與對壘而按兵不動既而賊遁去存寶遽班師神宗以存寶逗留遣步軍都虞候林廣代之光祖曰不得乞弟患未艾也廣至因入其巢穴求乞弟不得焚掠蕩盡退營落共江門等寨光祖以功遷四方館使遂置瀘南㳂邉安撫使命知瀘州以領之遷客省使嘉州刺史為涇原路副總管改河東徙定州卒年六十七武英者太原人也父密為左侍禁與契丹戰死之以英為三班借職積功遷內殿承制環慶路都監破元昊之衆于白豹城以功遷禮賔副使從任福戰於好水川死之贈邢州觀察使桑懌者開封雍丘人也善用劍及鐡簡有智略謹畏常若不足少舉進士不中嘗遭大水有粟二廪將以舟載之見民走避溺者遂棄其粟而載之皆得不死後徙居汝頴間諸縣多盜自請補耆長獨提一劍以往殺獲殆盡旁縣因之無盜轉運奏其事授郟城尉徙澠池改右班殿直為永安巡檢羣盜聞桑殿直來皆遁去宜州蠻叛殺海上巡檢官軍不能制因命懌往盡殺之得閣門祇候推其功於已上者或譏其好名懌曰若欲避名皆不可為也益自信遷西頭供奉官為廣南駐泊都監遷內殿崇班鄜延路兵馬都監踰月徙涇原屯鎮戎軍好水之戰死之贈解州防禦使耿傅者字公弼祖昭化為蜀州司户參軍盜據城欲脅以官昭化罵賊不屈而死傅以䕃補官後以將作監丞知永寧縣通判儀州徙慶州為任福行營參軍山外之戰諸將嘗戒傅少避賊鋒而傅愈前指顧自若及賊騎大至武英又勸傅曰君非主兵者奈何欲與英俱死也傅作書遺福戒以持重未幾福戰沒傅亦死或謂福之敗由傅督諸將稍急韓琦得其書上之尹洙亦作閔忠辨誣二篇閔忠曰甚哉世人謀其身之周也山外之戰諸將以力死明白不可欺或者咎其失計且不與其死噫趍利以違節度其失計信然秉義不屈奈何不與其死也忠義世之所髙死人之所難以甚難之節負至髙之名茍與之則已當蹈之矣惡所以謀其身哉善謀其身者不然必非之曰喪兵沮威雖死吾弗與然後享其富保其生為無愧為身之謀豈不周乎冦讎在境師兵在行欲其以保功難乎哉烏呼喪兵沮威以取死豈諸將心邪亦不幸而已為國家者無使謀其身者終其幸死義者重不幸則節士勸矣辨誣曰山外之役參軍事耿傅在行戰合虜騎益至或以傅文吏無軍責勸其避去傅不顧被數創死於陳或誣之曰傅督諸將進與大憝卒遇敗傅致也後得傅與諸將書戒以持重慮為虜誘此豈督諸將進邪宋興八十載文吏死事者或以城守之責或不幸與禍㑹其死義一也至如臨大敵不懾與驍雄之士爭致其命如傅比者亦鮮悲夫謀既不用又從之死猶不免於誣為誣者豈喜於立異邪惡夫為忠邪洙文既出其謗遂止朝廷贈傅右諫議大夫馬遂開封人也初補散直為北京指使王則反於貝州遂聞之中夜叱咤晨興詣留守賈昌朝請與行陳命持榜招降則盛服見之與坐遂諭以禍福則不答時張得一侍賊側目之不應遂扼其喉擊之流血而左右無助者賊徒驍捷卒石慶斷其一臂遂詬之曰妖賊吾恨不斬女萬段即見殺事聞仁宗嗟歎久之贈遂宫苑使後獲石慶付其子使剖心以祭之孔宗旦魯人也為雍州司户參軍初儂智髙潛聚衆溪洞而雍州有白氣起郡庭傍江水暴溢宗旦以為兵象䇿智髙必反以書告郡守陳珙珙不聽後智髙反破橫州宗旦遣其家屬往依桂州曰吾有官守不得去無為俱死也既而破雍州宗旦被執賊有用之之意宗旦怒曰賊女今立死吾豈可汙邪慢罵不已遂見殺贈太子中允曹覲建州人也故贈諫議大夫修古之妷修古為諫官有直名無子以覲為嗣而奏以官纍遷太子中舍知封州儂智髙反覲以州無兵備募敢死五百人以守城而鄰城有為避賊計者遂紿以書曰賊止期得雍貴而已豈肯離巢穴逺來邪覲以為然乃縱所募去而賊至又勸使之走覲叱之曰吾家以忠義自持吾豈茍生者邪俾妻子逃匿民間自佩郡印與兵馬監押陳曄率州兵百餘人禦賊力不勝遂為賊所執以郡印授二卒使懷去覲不食三日賊諭欲用之覲叱曰犬彘敢爾邪遂見殺封州之人為覲立廟嵗時祀之朝廷贈覲太常少卿趙師旦字潛叔􅍬之侄也以􅍬䕃補官纍至右贊善大夫知康州儂智髙既破雍州師旦遣人覘賊還報曰諸州長吏皆棄城去矣師旦曰女亦欲吾去邪即斬以徇而賊將及城下因語妻子曰留此俱死無益也令避難山谷間明日賊大至州兵止三百人師旦與兵馬都監馬貴力戰矢盡還坐堂上智髙麾兵鼓譟而入師旦大罵曰朝廷負若何事乃敢反邪大兵且至戮爾無遺類矣智髙怒與貴俱見殺師旦死時年四十三賊既去州人為立祠師旦之妻生子數日而避賊棄之草中後三日猶不死取而育之朝廷贈師旦光祿卿蘇緘字宜父泉州晉江人也舉進士為南海簿廣州領市舶司每海商至選官閲實資貨其商酋皆州里右姓至則陵轢官府以客禮見主者緘以選往有大商樊氏入見遽升階就榻緘捕繫杖之樊氏訴於州州將召緘責以専决罰緘曰主簿雖卑邑官也舶商雖富部民也部民有罪而邑官杖之安得為専州將慰諭遣之為武陽尉有劇賊黑李二者官莫能捕緘獨馳馬追斬之府尹賈昌朝曰儒者乃爾勇邪纍遷祕書丞知英州儂智髙反圍廣州緘搜部兵募壯勇合數千人赴難委州事於提㸃刑獄鮑何緘以功換供備庫副使為廣南東路都監緘襲賊至雍州金城寨余靖督諸將進戰官軍失利主將陳曉先退坐斬緘貶房州司馬後以著作佐郎監越州稅知崇仁縣復供備庫使知亷州坐擅斬失火軍士降潭州都監從知鼎州交趾謀入冦以緘為皇城使知雍州緘伺得其實以書抵知桂州沈起起不以為意及劉彞代起交人果大舉衆號八萬氐海岸未旬日陷欽亷二州破雍之四寨緘聞賊且至嬰城以守州民震驚將竄逃者緘曰女輩逃將安之惟堅壁固守以待外援可坐勝乃出官帑及私財示之曰吾兵械已具蓄聚不乏今與女約有一人敢出吾當先并其孥斬之時大校翟績隂欲出奔緘斬以徇由是上下聽命賊圍城緘日夜勞苦士卒禦敵以神臂弓仆賊殪象不可勝計於是城中人心益固緘初求救於彞彞遣都監張守節往援守節逗留不即行緘又遣人持蠟書告急於提㸃刑獄宋球以便宜督守節兵行守節皇恐遽移屯大夾嶺回保崑崙關猝遇賊一軍皆覆賊百計攻城緘隨機以應之賊計已盡欲引去而知外援不至㑹有能土攻者教賊囊土數萬向城山積頃刻髙數丈賊衆登土囊以入城遂陷緘猶領傷卒馳騎戰愈厲而力不敵乃曰吾義不死賊手乃還州治闔門聚家屬三十有六人皆自殺藏尸於坎縱火自焚賊至求尸皆不能得乃殺吏卒土丁居民五萬餘人以百首為一積凡五百八十餘積并欽亷所殺無慮十萬餘人雍被圍凡四十二日而下無叛者緘憤沈起劉彝致冦又不救患欲上疏論之屬道梗不通乃榜其罪於市兾朝廷得聞知焉神宗哀緘死贈奉國軍節度使諡曰忠勇彭汝方字宜老汝礪之弟也以䕃補太廟齊郎後知衢州時方臘陷歙睦杭而衢介於三郡之間賊勢張甚兵力寡弱衆皆奔潰汝方與郡僚段處約守孤城城陷罵賊而死年七十一贈龍圖閣直學士詹良臣字唐公嚴州遂安人也晚以纍舉恩得官為縉雲尉方臘起青溪聲搖江淮賊犯處州良臣曰捕盜吾職也率弓兵數十人往禦之為賊所執賊欲降之良臣罵曰女輩何敢反往年李順反戮於蜀王倫反戮於淮南王則反戮於河北同惡無少長棄市尸為狗鼠食女輩何敢反賊怒割其肉使自啖之良臣且吐且罵至死不絶聲見者為隕涕死時年七十二賊平徽宗聞而愍之官其二子東都事略卷一百十
