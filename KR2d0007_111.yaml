body:
  text: 東都事畧卷一百十一宋王稱撰忠義傳九十四傅察字公晦孟州濟原人也從曾祖曰堯俞有傅察為人端重有特操舉進士蔡京欲妻以子察力拒之為青州司法參軍歴永平淄川丞乆之除太常博士遷吏部貟外郎宣和七年接伴金使時金人已渝盟察至燕山聞斡里雅布入侵或勸其毋遽行察曰銜命以出聞難而止若君命何遂行至境上遇斡里雅布領兵至金人曰見太子當拜察曰太子雖貴人臣也當以賓禮見何拜為斡里雅布怒曰汝主失信吾興師南向海上之盟不可恃也察曰皇帝與金國講好信使往來項背相望何謂失信太子干盟而動意何所為乎虜左右促使拜白刃如林察曰死則死耳豈有俱人臣而輒拜者或抑捽使伏地察植立衣冠顛頓終不屈斡里雅布怒曰爾乃不拜我耶麾令去察知不免謂其下曰敵脅我以拜我義不辱我死必矣我父母老素鍾念我聞之必大戚若等得脱幸記我言以告吾親知我死國少解其無窮之悲也左右盡泣既次燕山遂見殺年三十七聞者哀之贈徽猷閣待制蔣興祖之竒之孫也以䕃調饒州司録事方臘之起放兵四出興祖白郡守糾吏士輯戰具盗不敢謀後知陽武縣金人入侵犯京師道出陽武或勸興祖使避之興祖曰吾世受國恩義不圖全此吾死所也監兵有與賊通者斬以徇敵騎來攻興祖敗之而去明日敵益濟師不敵遂死之年四十二贈朝㪚大夫官其二子張確字子固邠州宜禄人也舉進士建中靖國初上書言十事乞誅大姦退小人進賢能放禁錮起老成擢忠鯁息邉事脩文徳廣言路容直諫言皆切至遂坐上書邪甚列黨籍宣和中召至京師屬方臘起青溪勢張甚確上言此皆王民也但庸人擾之耳陛下下哀痛之詔省不急之務敢有以華石淫巧供上者死務在撫綏則旬浹之閒必可殄滅矣宰相王黼怒出為通判杭州攝睦州確以方略授諸將賊由是遂販歴知坊汾解三州徙隆徳府金人入侵圍太原確累言河東天下根本安危繫焉無河東豈特秦不可守汴亦不可都矣臣所領隆徳城壁百年未嘗脩築將兵又皆戍邉無以待敵若得秦兵萬人足以抗賊不然無䇿矣惟以死報陛下也書數十上皆不報明年春敵兵至確方率屬士民乘城拒守勉以忠義有謀欲自東城潰圍出且探確意所嚮者確怒叱曰確守土臣當以死報國頭可斷腰不可屈也城陷猶率衆鏖戰遂死之欽宗贈確述古殿學士召見其子􅀢慰撫之曰汝父今之廵逺也歛容歎息者乆之朱昭字彦明府州府谷人也初浮沉班行人無知者後為震威城監押會城主闕攝其事金人陷忻代踰石嶺關圍太原凡戍邉士卒皆入援夏人乘虚入侵河外諸城悉望風褫氣遂至震威昭募蕃漢士得鋭卒千餘人夜縋兵分數隊身先士卒驅衆直薄賊賊軍驚亂城上鼓譟兵民悉銳乘之多所斬獲震威距府州三百里最為孤逺諸城既先下賊怒獨不得昭遂約金人併力來攻降將有與昭故人者語之曰天下事已矣忠安所施昭曰食人之禄死人之事女既背義偷生不異犬彘尚敢以言誘我乎今日我惟有死耳因大罵矢石亂下賊衆㪚走然賊晝夜攻城不止後二日城有攻摧處昭智思出入禦之皆得法衆莫不恫懼已而下城坐於聽事召諸軍議曰城且破妻子不可為賊汙女等幸先殺我家出城血戰勝則迤邐西圖大功不勝則暴骨吾境内大丈夫平生事畢矣因盡殺其家人納之井中部將賈宗望母過前昭呼曰媪我郷人也吾不欲手刃請自入井媪從之而軍士有家屬在城中者亦皆自殺之昭因謂其衆曰我與女軰俱無累矣儻我先死女有得脱者願馳至府谷言我今日事㑹部落子隂與賊通者告之曰朱昭與其衆各殺其妻子將出戰人雖少皆死士也賊大恐以利㗖守陴者果得登城昭知之勒軍士於通衢接戰自暮逹旦尸填街不能行遂於城所摧處躍馬出馬蹶墮城壕中賊兵四集雷譟曰得朱將軍矣賊始欲生致昭瞑目仗劍無一人敢向者既知不可得矢爭發昭罵賊而死年四十六昭在震威能與士卒同甘苦以是士心感奮凡被圍百日而城陷云張克戬字徳祥耆之曾孫也以䕃為三班借職復舉進士知河間縣又知吳縣治有聲擢衛尉寺丞初克戬從弟克公為御史中丞嘗論蔡京罪京由是罷政及再相脩怨於張氏克戬遂坐廢踰年起知祥符縣乆之知廣徳軍提舉京畿常平陛辭留為庫部員外郎出知汾州金人陷燕山長驅而南分兵侵太原太原距汾二百里敵人尼堪者遣其部將銀朱貝勒來攻縦兵四掠外援不至勢日孤危克戬畢力捍禦晝夕不少懈以守城功初加直秘閣進直龍圖閣除右文殿脩撰太原陷汾益危克戬召令軍民曰太原既陷吾固知亡矣然義不忍負朝廷辱父祖累子孫不與此城同終始無以明吾節衆皆泣對曰公父母也願盡死克戬募士閒道走京師上章曰自太原失守汾日受攻願陛下哀憐孤城勢不可久急遣軍馬倍程以來救䕶一城生靈之命不報自太原陷汾拒守盖踰月矣一日諸酋列城下指呼督取降書克戬臨陴大罵不絶口砲中一酋立死翌日金人攻城益急城從西北隅壊賊既入克戬朝服南向焚書拜舞乃自引决其家死于難者凡八人事聞贈延康殿學士諡曰忠確郭滸徳順軍人也虜犯涇原滸為涇原路第八副將時守將皆附賊獨滸義不屈謝病去守將惡之傅致其罪下之獄意脅之與俱從偽滸奮呼曰大丈夫今得死矣終不能受汙夷狄顧爾等負國叛逆大惡天地鬼神所不容吾雖死誓不爾貸當求治爾於地下耳衆愧其言即見殺朱友恭西安人也為涇原第一副將麾下兵扞虜華亭數敗虜會衆大集友恭赴敵力戰為所得渭州守將既從偽誘以甘言友恭不從更詆毁之守將不勝忿遂見殺霍安國失其爵里金人以我渝三鎮之約也再興師入冦黏罕破太原至懐州時安國以右文殿脩撰知懐州乃遣人說諭黏罕令與皇帝議將三關四鎮嵗增幣二百萬女説與皇帝我且留軍懐澤之閒以待安國以黏罕之語聞不報黏罕大怒曰女南國無信如此一任州主忠孝出戰亦得守城亦得虜日夕攻城不已城陷黏罕使蕃官𫝊令問不肯降者安國曰霍安國是宋朝守臣率衆不降又問通判林淵等同對曰某等與守臣一體皆不肯降尼堪抑令拜降安國曰安國是大宋之臣不敢負趙天子即見殺明年贈安國延康殿學士李涓字浩然崇矩之後也以䕃為右班殿直召試中書易文階為撫州司録事遂知崇陽縣金人犯京師欽宗以羽檄召天下兵入援卾所部縣七崇陽當發三千人涓所募纔六百銳然𣣔奮或謂涓盍徐之以須衆集涓曰事急矣當持一信報天子為東南倡而所部多市人不能軍涓出家錢買牛酒激犒召令之曰我知力不敵無奈受國恩唯直死耳若曹知法乎失將則死非人自為戰萬分無一生理鈞之一死死國揚名男子不朽事也衆皆泣即日引而東過蔡敵之遊騎犯蔡州涓與戰頗殺其騎涓亦被創猶大呼叱左右負己以戰遂死之士死者什之七朝廷録其忠贈以員外郎官其三子劉韐字仲偃建州崇安人也舉進士調豐城尉改隴城令治甚有聲王厚帥熈辟狄道令提舉陜西平貨司時西寧等州屯兵多竭六路轉輸不給韐至延致蕃酋以金帛易粟就以贍軍公私便之累擢中大夫集英殿修撰陜西轉運使六路大舉鄜延帥劉法戰没夏人乗勝攻圍震威韐攝帥事出奇兵敗之圍遂解夏人來言國主願納款謝罪人疑其詐韐謂兵興累年中國尚不能支况小邦乎此情實也何疑哉即受其使因密疏以聞朝廷許其自新而西邉以安進徽猷閣待制知越州方臘陷杭州杭越阻一水越大震官吏多遁去或具舟請行韐曰吾守臣也當與城存亡不為動韐乃令富者出財壯者出力葺壘練兵為戰守偹賊陷衢婺二州至越城下韐麾衆出戰賊大潰横尸滿路自是不敢犯境温台明亦賴越以全拜述古殿直學士童貫蔡攸為河北河東宣撫使韐參議軍事以接納山後九州之民師出兩月韐始至而种師道軍馬已為虜所潰韐意邉報不實見師道計事師道曰敵勢尚盛而燕人未有應者恐邉臣誕謾誤國計韐曰師出無名必難成功即馳白二帥請班師既不可則獨論列燕薊不可得狀設得之屯兵置吏費不訾必重困中國已而邉果不實遂班師次莫州㑹敵主死郭藥師以涿州來附朝廷促進兵韐執前議不可移知真定府金人以燕歸于我召韐歸京郭藥師入朝韐曰藥師叛敵也謂宜賜第厚廩留之不報以顯謨閣學士知建州改福州進延康殿學士始韐過闕或謂韐見御史中丞有所請遂落職提舉鴻慶宫未㡬知荆南府河北盗起命韐帥真定韐至境盗悉平郭藥師請馬益其軍韐曰空内郡馬付一降敵非計也時金人謀入冦韐密治城守以虞變敵長驅嚮京師朝廷議和令諸郡以公私金帛犒敵韐不可敵引兵圍城治梯衝示欲攻擊韐以强弩射之敵遂退拜資政殿學士韐積官至銀青光禄大夫初敵圍京師既而為城下之盟敵既退而援兵至用事者乘士民之憤奏遣數大將分道而北蓋將北攝燕薊西解太原之圍韐以亟戰怒敵為非既而种師中姚古悉出戰遇敵而潰欽宗急於解圍拜韐河北河東宣撫副使太原陷以韐為宣撫使俄召入覲時敵已度河游騎薄城韐以謂城大難守兵弱難戰不若遣援師以紓目前之急徐為後圖乃除京城四壁守禦使宰相以韐嘗言不可輕戰鐫五官落職宫祠已而京師陷欽宗出郊敵聞其名必欲得之宰相始遣韐往敵命其僕射韓正館之正謂韐曰國相知君名今欲用君矣韐曰偷生以事二姓死不為也正又謂韐曰車駕再出郊軍中議立異姓今已革命則兵連禍結不若北去取富貴無徒死韐仰天大呼曰有是乎歸召其親信謂曰國破主遷乃欲用我我當以死報國耳取筆書片紙曰金人不以予為有罪而以予為可用夫正女不事二夫忠臣不事兩君况主憂臣辱主辱臣死以順為正者妾婦之道此予所以必死也付其下持歸報諸子即沐浴更衣酌巵酒以衣絛自縊死燕人歎其忠相與菆于夀聖院之西岡上及金人北去始就殮凡八十日矣顔色如生觀者異焉朝廷褒其忠盡復舊官職仍贈資政殿大學士韐為人莊重寛厚在陜西雖為童貫所知與其軍事而能死國難議者不以前失所從掩其忠子子羽子翼李若水字清卿洺州曲周人也擢上舍第為元城尉調平陽府司録濟南府教授除太學博士蔡京復當國老而耄事一出于子絛少宰李邦彦欲謝病去若水曰大臣以道事君不可則止去就之義當决之于上前詎可奄奄以病退哉靖康初為太常博士金人犯京師欽宗割三鎮以和既而入賦以贖三鎮以若水為之使除著作佐郎若水見尼堪于太原尼堪遣王汭與偕來十一月還朝閒二日敵騎南牧遣馮澥使于敵若水副之至中牟會守河兵亂相驚以敵至左右駭顧謀取閒道去若水謂澥曰戍卒宵潰公不可效之若水死不避也遂由故道行日一奏京師言金人且至宜選將練兵褒有功勸戰士脩城郭飭守偹以待其來和議必不可諧也至懐州遇金人館伴劉思蕭慶言已遣使京師請以河為界因随其軍行至京之西境而聞耿南仲聶昌出使割地界矣尼堪至京城外獨遣澥同慶入城請與皇帝相見議盟誓不從又請與道君相見亦不從但許宰相親王出後數日遣兩執政兩宗室分使敵軍尼堪自冒矢石督攻甚急城陷敵召若水若水出見之二酋曰令何相公來計事不則縱兵城中矣遂入見欽宗時獨何㮚孫傅梅執禮秦檜并宦者數人在左右若水具𫝊敵人語乃遣㮚行明日又命濟王及陳過庭偕往㮚還言二帥請與道君相見欽宗曰朕當自往耳豈可使道君皇帝蒙塵哉明日欽宗幸敵營留三日而還擢禮部尚書若水力辭乃改吏部侍郎兼權開封尹二年敵遣使以書來言曰農務方興將歸矣徽號事當靣議請皇帝出郊遂以明日出若水扈從既而敵遣蕭太師者易御服若水忿怒持欽宗而泣曰陛下不可易服敵命數人曵以去復大呼曰吾君華夏真主爾軰敢無禮耶敵擊之㡬死遂掖至青城門廡下蕭太師者數來勸勉曰事已耳終無可奈何曷若順從國相之意乎若水歎曰天無二日若水寜有二主㢤其僕隸亦來慰解曰侍郎父母春秋髙兄弟衆奈何若水叱曰忠臣事君有死無二吾終不復顧家矣雖然吾親老女若歸勿遽言恐傷吾親意令兄弟輩徐徐言吾死國也又旬日尼堪召若水議立異姓若水曰道君皇帝為生靈計罪已内䄠主上仁孝恭儉未有過失豈可輕議廢立尼堪曰趙皇失信安得為無過若水曰若以失信為過則女乃失信之尤者乃歴數其過曰女伐人之國不務全安生民徒掠金帛子女以自豐肆為封豕長虵黷貨無厭女真一劇賊罵不已尼堪令曰擁之去反顧罵益甚至郊壇側謂其下謝寜曰我為國死職耳併累若等也監軍曰吾為公釋此人使歸公能從我乎若水復罵不已遂見殺年三十五建炎初詔褒其死節贈觀文殿學士諡曰忠愍若水臨死為歌詩一首其卒章曰矯首問天兮天卒不言忠臣效死兮死亦何愆人聞而悲之若水初名若冰欽宗賜以今名無子以兄之子為後云臣稱曰若水之忠節凜凜如此而或者以勸欽宗出郊為其疵病此與唐廵逺守睢陽而罪其分城而守者亦何以異臣於若水非敢必其無此也置而弗録者盖欲全其名而重其死爾然則欽宗之出郊是豈若水之心㢤春秋為賢者諱故於若水亦云吳革字乂夫廷祚七世孫也金人犯京師革自關中帥師勤王度河北去分兵圍遼州革以所部解圍太原陷革以閣門宣賛舍人使尼堪軍計議邉事革責其貪利敗約氣勁語直尼堪媿服使還欽宗問割地與不割利害革曰北人有吞箭之誓入境必矣乞起陕西兵馬為京城援遂令革使陕西召兵纔出城敵騎已逼㑹南道軍馬至遂同緫管張叔夜入城欽宗廵幸南壁革乞奪路赴陕西叔夜固留革為統制革屢乞出城下砦使敵騎不敢近且通東南道路又密奏乞選日諸門併出兵分布期㑹為正兵為牽制為衝突為尾襲為應援可一戰而勝欽宗不能用也敵騎登城革率兵䇿應手射殺執黒旗者十許人部曲皆散欽宗有詔出郊歎曰天文帝坐甚傾大駕其可出乎乃見何㮚曰大駕若出必墮敵計㮚不聽既而欽宗出郊又請於孫傅張叔夜欲因事到軍前計議革言三事一車駕還内二敵酋歸國三革死軍前不報及徽宗妃后王姬宮嬪盡出城革白孫傅曰道君業已出乞力留皇后皇太子明日引見皇太子革頓首言二帝出郊必未囘願殿下堅避以固國本傅曰何辭以拒之革為畫計乃於啟聖院置局名賑濟所募士就食一日之間至者萬計革隂以軍法部勒時康王為兵馬大元帥遣人以蠟彈由間道告急於濟州及約在外將相擁兵近城内外相應夾攻賊砦圖還二帝復遷居同文館附者益衆多兩河忠勇之士既而傅及叔夜皆赴軍前敵人立張邦昌之議益急革欲誅范瓊等數十人乃分兵約日期以三月八日内外合軍部勒既定須以發前二日有班直甲士數百人排闥至革寢曰邦昌以七日受册請起事革以衆不可奪披甲上馬時已黎明此行至咸豐門四靣皆瓊兵瓊遣人紿革入帳下詐若與同謀者革遂見殺革就死顔色不變極口詆罵凜然不屈革資忠勇天文地理人事兵機無所不通死之日知與不知皆為出涕東都事略卷一百十一
