body:
  text: 東都事略卷一百十二宋王稱撰循吏傳九十五自唐季以來王政不綱天下以戰爭為事五代之際民失耕桑之業天既厭之矣藝祖受命知民疾苦故自即位以來勸農之詔屢下由是斯民欣然有樂生之意而治民之吏率皆有循良之風太宗繼承守而勿失真宗仁宗德澤深厚于斯時也吏皆以平易近民為政招懷流亡導逹溝洫趙尚寬髙賦治有異效最先褒寵以風天下至熙寧中神宗留意民事興農田水利使者四出冠蓋相望而爭以功利進較其績效非若尚寬輩孜孜愛民勞來不倦之為愈也噫以功利為愛者其澤淺以道德為飬者其澤深國家治尚忠厚廉平之吏代不乏人今獨托其以循吏稱者著于篇程羽字仲逺深州陸澤人也少好學舉進士為陽榖簿歷虞鄉醴泉新都三縣令有善政開寶中擢著作郎出知興州改興元府太宗為開封尹以羽為判官太宗即位拜給事中知開封府未幾出知成都府為政寬簡蜀人便之以兵部侍郎致仕卒年七十三贈禮部尚書羽性淳厚涖事循謹太宗稱其長者曾孫珦珦字伯溫朝廷録羽後以為郊社齊郎嘗知龔鳯磁漢四州為政尚慈恕積遷至大中大夫卒年八十五子皓頥見儒學傳王明字如晦魏郡成安人也舉進士不中藥元福為原州刺史又為陳州防禦使明皆在幕下元福耆殺明勸之以寬多所全宥元福領建雄軍節度使移鎮陕州以明為掌書記歷清平鄢陵二縣令明在鄢陵公廉愛民是時天下新定法禁尚寬吏多受民賂遺嵗時皆有常數民亦習之莫或知其非也明為令以故事有所獻饋明曰令不用錢可人致數束薪芻水際令欲得之民不諭其意得數十萬明取以築隄道由是民無水患久之召為左拾遺遷右補闕出為荆湖轉運使王師征嶺南明為隨軍轉運以功擢祕書少監廣南轉運使王師征江南以明為黃州刺史江南平以明知洪州太宗即位召為右諫議大夫三司副使詔分三司各命使遂以明為鹽鐵使遷給事中改光州刺史知并州拜禮部侍郎知真定府召還卒年七十二陳靖字道卿興化軍莆田人也陳洪進納土遣靖至京師授陽翟簿稍遷直史館遷太常博士時太宗務興農事令有司議均田之法靖以為其法未可卒行且請以樞密副使三司使為租庸使或兼屯田制置之名仍擇三司判官或朝官知事者二人副之始于兩京東西千里檢責荒地及逃田而官籍之募人佃耕其室廬耕牛農具糧種請州郡斥賣贓罰無用之物使營辦之不足則給以庫錢其所耕也定為十分從制置所給印紙令州縣勸農分殿最三等凡縣管墾田一嵗得課三分二歲六分三嵗九分為下最一嵗四分二嵗七分三嵗十分為中最一嵗九分未及三嵗盈十分為上最其最者令佐與免選或超資殿者即增選折資每州通以諸縣田為十分視最而行功罪候數嵗盡罷官莊田屯田悉以賦民然後量人授田度地均稅約井田之制為定法以頒行四方太宗曰秦滅井田經界廢而兼并之民起至今使貧富不均而天下困朕欲復古而未能也前言此利害者衆矣惟靖所言與朕意合下其議三司以靖為京西勸農使而鹽鐵使陳恕與靖議不同罷之出知婺州真宗即位復列前所論勸農事上之又言國家禦戎西北而仰食東西食不足則誤大計請自京東西及河北諸州大行勸農之法以殿最州縣官吏嵗可省江淮漕百餘萬靖復請刺史行春縣令勸耕孝悌力田賜爵立伍保以檢察姦盜籍游逸之民而役作之議下三司卒不果行為江南轉運使自李氏橫賦於民者凡十七事號曰㳂納國朝因之而民困不能輸靖極論其弊詔為罷其尤甚者歷京西京東轉運使知蘇越建泉等州官至左諫議大夫以祕書監致仕卒年七十八靖好學頗通古今利害事在太宗真宗朝多建言於農事為尤詳然當時以為泥古難盡行也薛顔字彥回河中萬全人也舉三禮及第為嘉州司户參軍端拱初知雲安軍真宗即位知渝閬二州代丁謂為峽路轉運使始孟氏據蜀徙夔州于東山據險以抗王師而民不以為便顔為復其故城民用便之徙廣南河東陕西路浮橋嵗為河水所敗顔即北岸疏上流為支渠以順水怒又以溉其下舄鹵之田而民利之坊州募人鍊礬而其後課益重至有破産被繫而不能償者顔以為罷坊礬則晉礬當大售乃奏罷之已而果然徙河北歷知河陽揚杭徐三州又知江寧河南府纍遷至給事中徙應天府又徙耀州以光祿卿分司西京卒年七十三卲煜字日華其先京兆人也家于桂陽舉進士為卲陽簿連州録事參軍州將楊全誣部民十三人為劫盜欲置之死煜察其枉不肯書牘白全願劾其實再繫獄按驗得實民由是獲免全坐廢煜代還引對太宗謂曰爾能活吾平民深可嘉也賜錢五萬命使廣南採訪刑獄纍遷工部員外郎為淮南轉運使又使交趾煜上雍州至交州水陸為四圖以進坐所舉非其人免官大中祥符初起知兖州又為江浙荆湖發運使改右諫議大夫知廣州城瀕海每蕃船及岸常苦颶風煜鑿內壕通舟颶不為害及卒廣人懷其惠多灑泣者方煜之病也朝廷以陳世卿代之世卿南劍州人亦良吏也廣南計口買鹽人以為害世卿奏免之於是廣人歌曰卲父陳母除我二苦世卿官至祕書少監張綸字公信潁州汝隂人也嘗舉進士不中補三班奉職稍遷閣門祇候為益彭簡等州巡檢使擢荆湖提㸃刑獄辰州溪洞蠻冦邉以綸知辰州綸至築蓬山驛路賊不得通方遁去又修新興寨鑿井道泉以便民徙渭州又徙鎮戎軍蠻復冦邉為辰澧鼎州緣邉巡檢安撫使諭蠻酋以禍福使修貢仍令還所掠民綸遣官與之盟刻石于境上天禧中為江淮發運副使居二嵗增米八十萬復置鹽場于杭秀海三州增嵗課百五十萬疏五渠導太湖入于海復租米六十萬開長蘆西河以避覆舟之患又築髙郵北漕河隄二百里旁錮以巨石為十閘以泄橫流又修復泰州捍海堰因命兼權知泰州堰成復逋户三千六百民為立生祠纍遷東上閣門使歷知泰滄瀛州拜乾州刺史再知滄州徙潁州卒年七十五崔立字本仁許州長葛人也祖周度仕周為兖州節度判官方慕容彥超反周度責以大義為其所殺立舉進士為果州團練推官有軍卒三人雇舟載官物而斂衆州將重致之法立察其情以為罪止杖奏聞代還知臨清縣徙安豐境有期塘下溉民田數千頃間因大水塘壞立帥工徒全築之其後遂不復决嘗知江隂軍開黃河六十里以通舟楫人以為便又知兖州嵗大歉募人出榖數十萬石以賑救之故境內無有流民積官至給事中知濠州以工部侍郎致仕卒年七十五立淳謹喜論事方朝廷講禮文之事士大夫爭獻贊頌立獨言水發徐兖旱連江淮無為有烈風金陵有大火是天所以戒驕矜也而中外多士上雲露草木禽蟲諸物之常瑞此何足為治道言哉願詔史官勿復紀録立事真宗仁宗前後凡上四十餘事多見施用云趙尚寬字濟之安仁之子也初補祕書省正字嘗知忠州以考課第一知唐州時議者言唐土曠民稀賦不足以充役請廢為縣朝廷下其議尚寬非之乃按視圖記得召信臣故迹益發卒復三大陂一大渠皆溉田萬餘頃又教民自為支渠數十轉相浸灌而四方之民來者雲集尚寬復請以荒田計口授之及貸民官錢買耕牛比三年廢田盡為膏腴增户萬餘尚寬勤於農政治有異等之效仁宗聞而嘉之下詔褒焉仍進秩賜金再留尚寬在唐民畫像祠之始王安石作新田詩以美之其詞曰離離新田其下流水孰知其初灌莽千里其南背江其北逾淮父抱子扶十百其來其來僕僕鏝我新屋趙侯劬之作者不饑嵗仍大熟飽及雞鶩僦船與車四鄰出榖今游者處昔止者留維昔牧我不如今侯侯來適野不有觀者稅于水濵問我鰥寡侯其來矣三嵗于兹誰能止侯我往來之後蘇軾自蜀之京師道過唐亦為作新渠詩五章其詞曰新渠之水其來舒舒溢來其野至于通衢渠成如神民始不知問誰為之邦君趙侯新渠之田在渠左右渠來奕奕如赴如湊如雲斯積如屋斯溜嗟唐之人始就粳稌新渠之民自淮及潭挈其婦姑或走而顛王命趙侯宥我新民無與王事以訖七年侯謂新民爾既來止其歸爾邑告爾鄰里良田千萬爾擇爾取爾耕爾食遂為爾有築室于唐孔碩且堅生為唐民飽鬻與饘死葬于唐祭有雞豚天子有命我惟爾安尚寬既去髙賦繼為守亦被褒詔朝廷推原初功復進尚寬一官以直龍圖閣知梓州積官至司農卿以卒詔賜錢五十萬髙賦字正臣中山人也父尹右衛將軍賦以父任為右班殿直復舉進士改奉禮郎四遷太常博士纍至太常少卿遷光祿卿特拜祕書監加直龍圖閣進集賢院學士歷知真定縣通判劍州成德軍邢州石州知慶成軍衢唐滄潞蔡廬郢七州提㸃陜西河東路刑獄同判太常寺最後守郢丐閒提舉崇福宫請老以通議大夫致仕衢民好巫鬼毛氏柴氏二十餘家世蓄蠱毒與人忿爭輒毒之賦守衢命禽捕伏辜者數人蠱毒遂絶其守唐也賦以唐土曠民寡稅入至薄乃取圖籍考之自唐乾元時領縣七户四萬二千六百四十有四歷五代之亂及本朝承平今領縣四户六千一百五十有五乃相其川原曰是皆沃壤可闢而人力不至與棄之無異募兩河流移之民計口與田比賦罷增户萬一千三百八十給田三萬一千三百二十八頃而山林榛莽之地皆為良田嵗益稅二萬二千二百五十七作陂堰四十有四詔曰召杜南陽世稱循吏其亡久矣朕尚思之卿招懷饑流墾闢荒梗繕修陂堰績效具昭前人之良何以逺此賦再治唐凡五嵗與前守趙尚寬皆蒙褒詔賦自直龍圖閣至集賢院學士悉以墾闢之功也賦嘗言二府大臣或僦舍委巷散處京城閒有第宅亦公私非便宜倣前代丞相府於端門前列置大第俾執政居之又言國家置提㸃刑獄司蓋欲平反獄訟使民不冤今諸路多止一員兼河渠農政常平賊盜兵甲而刑書繁多省閲不給若委之吏則為大弊請逐路置檢法官以專平讞疏駮事多施行退居襄陽卒年八十四賦為人剛嚴內實平恕所居皆有善政吏民紀之衢唐二郡民為立生祠云許遵字仲塗泗州人也舉進士為錢塘尉又為䣜陽四㑹令悉意民事遵讀律知法擢大理寺詳斷官知長興縣㑹縣有水災民多流徙遵募民出米賑濟終以無患益興水利溉田甚博邑人載其便利刻于碑為審刑院詳議官選知宿州徙登州有婦人阿云謀殺夫而自承者遵按法因犯殺傷而自首者得免所因之罪仍科故殺傷法而敕有因疑被執招承減等之制即以按狀聞于朝其意以為謀殺之因所因得首合從原減今若塞其首原之路則有司一切按而殺之非是事下百官議而王安石力主遵說時論莫能奪尋判大理寺熙寧閒出知夀州未幾再判大理寺請知潤州又請提舉崇福宫尋致仕卒年八十一魯有開字元翰本青州夀光人也從父宗道仁宗朝參知政事始居亳後徙京師有開事親以孝聞好禮學通左氏春秋以從父宗道恩授祕書郎知韋城縣曹濮有劇賊入境聞有開為政相戒曰魯公去乃可來因遁去知霍山縣獨治一大姓能撼邑事者縣遂無事興廢陂溉民田數十頃飛蝗不入境富弼謂有開有古循吏風薦之守金州有蠱毒獄坐死幾十人有開曰欲毒人衷謀之可矣安得若是衆者訊之果誣時方旱獄决而雨知南康軍時熙寧行新法代還宰相王安石問江南新法如何而有開曰法新行未見其患其在它日也安石不恱除通判杭州後知兾州河決小吳水不至城下數里有開議增築護城隄人皆謂初無水患何以勞役為有開曰當備未然後水至而民不病計之上也卒成之明年河决水至以有備州以無患朝廷遣使安撫河北兾州民遮使者言有開治效擢拜膳部郎中以事免起知信陽軍復知兾州卒年七十五東都事略卷一百十二
