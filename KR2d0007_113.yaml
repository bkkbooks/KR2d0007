body:
  text: 東都事畧卷一百十三宋王稱撰儒學傳九十六太祖皇帝受天眷命而帝天下大業初基日不暇給即位之始首幸國學謁款先聖加飾祠宇親製文賛尊師重道如恐弗及儒學復振實自此始至于真宗幸曲阜奠孔林謂近臣曰唐明皇褒先聖為王朕欲加諡為帝可乎或言尼父周之陪臣周止稱王不當加以帝號遂增上至聖之名方是時儒學之臣講論經義學校之士挾䇿受業文治粲然雖漢唐之盛未之聞也慶歴中仁宗銳意於治乃下詔郡縣脩舉學政於是天下學士靡然鄉風良由上之所以勸善明是以化行而俗美比隆三代其庶㡬乎神宗尊六經以作人材崇三舍以興庠序自是以來文學之士咸精于勤煥乎其可述者也若大夫而卿相師傅以儒效見之行事者自如本傳次而專誦習以友教士大夫者則具之于此也聶崇義河南洛陽人也少舉三禮善禮學通經㫖漢乾祐中為國子禮記博士校定公羊春秋周顯徳中遷國子司業兼太常博士世宗將禘于太廟言者以宗廟無祧主不當行禘祫之禮崇義援引魏晉以來故事以為當行且言祭者是追飬之道以時移節變孝子感而思親故薦以首時祭以仲月閒以禘祫序以昭穆乃禮之經也非謂宗廟備與未備也世宗從其議又詔崇義參定郊廟器玉崇義因取三禮圖再加考正至國初上之未㡬崇義卒三禮圖遂行於世崇義為學官掌禮儀世推其該贍云郭忠恕字恕先洛陽人也善屬文及書史小學通九經七嵗舉童子漢湘隂公鎮徐州辟為從事與記室董裔爭事謝去周太祖召為周易博士國初與監察御史符昭文爭忿朝堂貶乾州司户遂不仕太宗聞其名召為國子監主簿令刋定歴代字書忠恕縱酒肆言時政頗有謗讟語聞配流登州至齊州臨清謂部送吏曰我逝矣因掊地為穴度可容靣俯窺焉而卒稾𦵏道左後數月故人欲改𦵏但衣衾而已忠恕所定古文尚書并釋文並行于世王昭素開封酸棗人也少篤學有志行鄉人有訟不之官府而詣昭素昭素為之辨析無不敬伏昭素博通九經及著易論三十三篇太祖召命講易因訪以民事昭素所言誠實無隠太祖益嘉之又問治世飬身之術昭素曰治世莫若愛民飬身莫若寡欲太祖重其言書於屏風問拜國子博士後卒于家年八十九參知政事李穆而下有聞於時皆其門人也子仁著亦有濳徳孔維字為則開封雍丘人也以九經及第為國子周易博士遷禮記博士使髙麗王治問禮維以君臣父子之道升降等威之序為對治大恱稱之曰吾今日復見中國之夫子也累擢國子司業上書請禁原蠶以利國馬樂史奏曰陛下降明詔有事于籍田而禁蠶之制又下豈不相戾哉維復上疏曰周禮夏官司馬職禁原蠶者為傷馬也月令仲春祭馬祖季春享先蠶為馬祈福謂之馬祖為蠶祈福謂之先蠶是蠶與馬同其類爾蠶重則馬損氣感之然也臣謂依周禮禁原蠶為當太宗是其言拜國子祭酒卒年六十四維儒者為人躁競寡㢘退之風嘗校定五經疏義臨終以未畢為恨云李覺字仲明青州益都人也舉九經起家為將作監丞通判建州遷知泗州轉祕書丞孔維薦覺學行遷禮記博士嘗使交州其酋長謂曰此土山川之險中州人乍歴之豈不倦乎覺曰國家提封萬里列郡四百地有平易亦有險固此一方何足云㢤使還遷國子博士太宗幸國子監顧見講坐左右言覺方聚徒講書太宗即令覺對御講覺曰陛下六飛在御臣何敢輒陞髙坐太宗令有司張帟幕設别坐詔覺講周易之泰卦覺因述天地感通君臣相應之㫖太宗甚恱加直史館命覺詳校群經及春秋正義改判國子監遷司門員外郎卒年四十六覺性彊毅而聰敏數上書言時事述飬馬漕運屯田三事甚詳備深為太宗所喜奬又嘗效韓愈毛穎𫝊作竹穎𫝊竹穎者謂矢也崔頥正開封雍丘人也與弟偓佺並舉進士明經頥正為髙密尉孔維薦其名以為國子直講判監李至言先校定諸經音疏尚多訛謬博士杜鎬直講崔頥正孫奭皆博貫九經請令刋正太宗從之咸平初真宗召頥正日赴御書院說尚書至十卷以老致仕仍充直講改國子博士三年卒年七十九偓佺自連江尉李至奏為直講太宗嘗問四皓中一先生或言姓用字加撇或云加㸃果何如偓佺曰昔秦時程邈纂𨽻書訓如僕𨽻之易使也今字與古或異臣聞刀下用為𣙜音兩㸃下用為鹿音用上一撇一㸃俱不成字太宗然之其後真宗幸國子監召偓佺說尚書真宗甚善之卒年七十九嘗纂帝王手鑑十卷孔宜字不疑兖州曲阜人也盖孔子四十四世孫孔子生鯉鯉生伋伋生白白生求求生箕箕生穿穿生謙謙生鮒以弟子襄為嗣值秦難藏其家書於屋壁襄生忠忠生武武生延年及安國延年生覇號褒成君覇生福福生房房生均封褒成侯王莽敗失國世祖復封均子志為褒成侯志生損襲爵徙封褒亭侯損卒子皠嗣皠卒子元嗣無子以弟之子羡襲爵魏時封宗聖侯羡生震晉時徙封奉聖亭侯震生嶷嶷生撫撫生榖榖生鮮宋時襲封奉聖侯鮮生乗後魏封為崇聖大夫乘生靈珍靈珍襲爵改封崇聖侯靈珍生文泰文泰生渠北齊改封恭聖侯後周追封孔子為鄒國公以渠襲封渠生長孫隋封長孫為鄒國公長孫生嗣哲改封紹聖侯嗣哲生徳倫唐封褒聖侯徳倫生崇基襲侯崇基生璲之明皇詔追諡孔子為文宣王改封褒聖侯璲之襲文宣公璲之生萱襲封萱生齊卿齊卿生惟防惟防生榮自璲之至榮五世並襲封文宣公榮生振振生昭儉自榮至昭儉三世嵗給封絹以供祀享昭儉生光嗣光嗣生仁玉後唐時襲文宣公至周時為曲阜令宜仁玉子也乾徳中詣闕上書述其家世詔以為曲阜簿襲封文宣公未㡬通判密州太宗北征受詔督軍糧涉巨馬河溺死年四十六子延世字茂先以父死為曲阜簿改曲阜令襲封文宣公詔轉運使兖州長吏待以賔禮卒年三十八延世子聖佑真宗東封泰山幸曲阜謁孔子廟行酌獻之禮又幸孔林觀其墓加諡孔子為至聖文宣王追封孔子父叔梁紇齊國公母顔氏魯國夫人妻亓官氏鄆國夫人擢聖佑為奉禮郎襲封文宣公知仙源縣後改名佑佑卒以宗愿襲封知仙源縣宗愿距孔子四十七世矣仁宗封孔子後為衍聖公哲宗時改為奉聖公徽宗時復以為衍聖公云臣稱曰司馬遷叙孔子世家止十餘世孔宜聖人之後也得其譜系參以舊史述歴代紹襲褒崇之典詳且備焉斯所謂能世其家者㢤穆修字伯長汶陽人也師事陳搏而𫝊其易學少豪放舉進士調海州理掾脩恃才嘗忤監郡者由是捃摭其罪坐削籍𨽻池州遇赦叙潁州文學參軍故當時呼之曰穆參軍初丁謂與脩有布衣舊脩毎輕之謂既顯官而脩尚未仕相遇于漢上一揖而去謂銜之真宗嘗問侍臣穆脩有文公卿何以不薦謂對曰脩行不逮文乃已脩老而益貧家有唐韓栁集鏤板鬻於京師有儒生數輩輒取閱脩謂曰先輩能讀得一篇當以一秩為贈自是經年無售者明道初脩卒年五十四識者哀憐之方是時學者從事聲律未知為古文脩首為之倡其後尹源與其弟洙始從之學古文又𫝊其春秋學李之才字挺之青州人也倜儻不羣師事穆脩舉進士為孟州司戸參軍共城令時卲雍築室蘇門山百丈源之上布衣疏食之才聞雍苦志好學自造其廬問雍曰子何所學雍曰為科舉進取之學之才曰科舉之外有義理之學子知之乎雍曰未也願受教之才曰義理之外有物理之學子知之乎雍曰未也願受教之才曰物理之外有性命之學子知之乎雍曰末也願受教於是雍𫝊其學之才後為殿中丞僉書澤州判官以卒澤人劉羲叟晚出其門受歴法亦為名士易學唯雍得之初華山陳摶讀易以數學授穆脩脩授之才之才授雍以象學授种放放授許堅堅授范諤昌云堅盧江人也周堯卿字子餘其先汝隂人也後徙居荆州之南堯卿警悟强記以學行知名舉進士歴連衡二州司里參軍桂州司録知江安寜化二縣提㸃刑獄楊紘入境有被刑而耘苖者紘就詢其故對曰貧以利故為人直其枉令不我欺而我欺之我又何怨紘至邑以所聞薦之後通判饒州積官至太常博士慶歴間范仲淹舉經行可為師表未及用而卒年五十一始堯卿年十二喪父憂戚如成人見母氏則抑情忍哀不欲傷其意母異之謂族人曰是兒愛我如此多知孝養矣卒能以孝養志如母之言其於昆弟尤篤友愛執母喪倚廬三年席薪枕塊雖疾病不飲酒食肉既𦵏慈烏百數銜土集壠上人以為孝感所致堯卿為人簡重不校有慢已者必厚為禮以愧之居官禄雖薄必以周宗族朋友罄而後已為學不惑𫝊注問辨思索以通為期其學詩以孔子所謂詩三百一言以蔽之曰思無邪孟子所謂說詩者以意逆志是為得之考經指歸而見毛鄭之得失曰毛之傳欲簡或寡於義理非一言以蔽之也箋欲詳或逺於情性非以意逆志者也是可以無去取乎其學春秋由左氏記之詳得經之所以書者至三𫝊之異同均有所不取曰聖人之意豈二致耶讀莊周孟軻氏之書曰周善言理未至於窮理窮理則好惡不謬於聖人孟軻是已孟善言性言性未至於盡已之性能盡已之性則能盡物之性而與天地參其唯聖人乎天何言哉性與天道子貢所以不可得而聞也昔宰我子貢善為說辭冉牛閔子顔淵善言徳行孔子曰我於辭命則不能也惟不言故曰不能而已盖言生於不足者也其講解議論皆若是堯卿長於毛鄭詩左氏春秋有文集二十卷詩春秋說各三十卷代淵字仲顔永康人也舉進士為清水簿不赴退居青城山以著書為樂積遷太常丞致仕田况自蜀還朝復以淵所著周易㫖要二十卷上之朝廷優轉祠部員外郎然終不樂仕胡瑗字翼之泰州如臯人也瑗為人師言行而身化之使誠明者逹昏愚者厲而頑傲者革故其為法嚴而信為道久而尊自景祐明道以來學者有師惟瑗與孫復石介三人瑗以布衣召見論樂拜校書郎嘗為湖州學官慶歴四年建太學于京師有司請下湖州取瑗教學之法以為則召為諸王宫教授以疾免已而以太子中允致仕皇祐中召至京師議樂嵗餘為光禄寺丞國子監直講遷大理寺丞嘉祐中遷太子中允充天章閣侍講已而又以病不能朝復以太常博士致仕東歸之日太學之諸生與賢士大夫送之東門執弟子禮路人嗟歎以為榮卒年六十七瑗所議樂多變古法其樂制以一黍之廣為分以制尺其律經三分四釐六毫四絲其圍十分三釐九毫三絲其聲比舊樂下半律又鐘磬大小一以黄鍾為率焉孫復字明復晉州平陽人也少舉進士不中居泰山之陽學春秋著尊王發微不惑𫝊注不為曲說以亂經其言簡易於諸侯大夫功罪以攷時之盛衰而推見王道之治亂得於經之本義為多魯多學者自石介而下皆以弟子事之復年四十家貧不娶丞相李廸將以弟之子妻之復疑焉介與羣弟子進曰公卿不下士久矣今丞相不以先生貧賤而欲託以子是髙先生之行義也先生宜因以成丞相之賢名於是乃許孔道輔為人剛直嚴重聞復之風就見之介執杖屨侍左右魯人由是始識師弟子之禮范仲淹富弼言其道徳經術宜在朝廷召拜校書郎國子監直講徐州人孔直温以狂謀捕治其家得詩有復姓名坐貶䖍州商稅徙監泗水稅又徙知長水縣僉書應天府判官通判陵州翰林學士趙槩等上言孫復行為世法經為人師不宜棄之逺方乃復以為直講居三嵗而卒年六十六仁宗命其門人祖無擇就其家録其書十有五篇藏於祕閣云石介字守道兖州奉符人也世為農家舉進士甲科為鄆州觀察推官南京留守推官御史臺辟主簿末至以上書論赦罷不召秩滿為鎮南軍掌書記嘉州軍事推官以内外艱去官垢靣跣足躬耕徂徠之下葬五世之未𦵏者七十喪服除召入國子監直講是時兵討元昊久無功海内重困仁宗奮然思欲振起威徳宰相吕夷簡以疾罷歸第夏竦罷樞密使章得象晏殊為相賈昌朝參知政事用杜衍為樞密使范仲淹韓琦富弼樞密副使王素歐陽脩余靖蔡襄同時為諫官所以求治之意甚銳介躍然喜曰此盛徳事也雅頌吾職其可已乎乃作慶厯聖徳詩其詞曰於維慶歴三年三月皇帝龍興徐出闈闥晨坐太極晝開閶闔躬攬英才手鋤姦蘖大聲渢渢震摇六合如乾之動如雷之發昆蟲蹢躅怪妖藏滅同明道初天地嘉吉初聞皇帝戚然言曰予祖予父付予大業予恐失墜實賴輔弼汝得象殊惇重微密君相予久予嘉乃績君仍相予笙鏞斯協昌朝儒者學問該洽與予論政傅以經術汝貳二相庶績咸秩惟汝仲淹汝誠予察太后垂簾湯沸火熱汝時小臣危言嶻嶪為予司諫正予門闑為予京兆堲于讒說賊叛于夏汝徃式遏六月酷日大冬積雪汝寒汝暑同于士卒予聞辛酸汝不告乏予晚得弼予心慰恱弼每見予無有私謁以道輔予弼言深切予不堯舜弼自笞罰諫官一年奏疏滿箧侍從周嵗忠力僅竭契丹忘義檮杌饕餮敢侮大國其辭慢悖弼將予命不畏不懾卒復舊好民得食褐沙磧萬里死生一節視弼之膚霜剝膚裂觀弼之心煉金鍜銕寵名大官以酬勞竭弼辭不受其志莫奪惟仲淹弼一夔一禼天實賴予予其敢忽並來弼予民無瘥札曰衍汝來予之黄髮事予二紀毛禿齒豁心如一兮率履不越遂長樞府兵政毋蹷予早識琦琦有竒骨其噐魁櫑豈視扂楔其人渾璞不施剞劂可屬大事敦厚如勃琦汝副衍知人予哲惟脩惟靖立朝讞讞言論磥砢忠誠特逹禄微身賤其志不怯嘗詆文臣亟遭卑黜萬里歸來剛氣不折屢進直言以補予闕素相之後含忠履潔昔為御史㡬叩予榻至今諫疏在予箱匣襄雖小官名聞予徹亦嘗獻言箴予之失剛守粹慤尚脩儔匹並為諫官正色在列予遏汝言汝無鉗舌皇帝明聖忠邪辨别舉擢俊良埽除妖魃衆賢之進如茅斯拔大姦之去如距斯脫上倚輔弼司予調爕下賴諌諍維予紀結左右正人無有邪孽予望太平日不踰浹皇帝在位二十二年神武不殺其默如淵聖神不測其動如天賞罰在手不失其權恭已南靣退姦進賢知賢弗易非明弗得去邪惟囏惟斷乃克明則不惑斷則不忒既明且斷惟帝之徳群下踧踖重足屏息交相語曰惟正惟直毋作側僻皇帝汝殛諸侯危栗墮玉失舃交相告語皇帝神明四時朝覲謹脩臣職四夷走馬墜鐙遺䇿交相告語皇帝神武解兵脩貢永為屬國皇帝一舉群臣懾焉諸侯畏焉四夷服焉臣願皇帝夀千萬年詩出孫復謂介曰子禍始於此矣夏竦見而銜之介在太學以師道自居弟子從之者甚衆太學之興自介始直講嵗餘用杜衍薦拜太子中允又用韓琦薦乃直集賢院通判濮州卒年四十一介既卒夏竦欲以竒旤中傷富弼指介以起事謂其詐死而北走契丹矣請發棺仁宗察其誣得不發介所著文章其斥佛老時文則有怪說中國論其戒姦臣宦女則有唐鑑行于世東都事略卷一百十三
