body:
  text: 東都事略卷一百十五宋王稱撰文藝傳九十八烏呼文章之難真難其人哉抑亦與時而盛衰乎三代逺矣漢之賈誼董仲舒司馬遷相如王褒劉向揚雄皆足以垂世立教后世為不可及已自漢以來文章沿六代餘習至唐王楊盧駱燕許之流亦可以名家矣而文終以不振獨一韓愈以六經之文為諸儒倡李翺皇甫湜和之而文章遂還西京之舊宋興聖聖相授禮樂法度視漢唐為過之而文章承五季之餘亦不過稱王禹稱之獨步與楊劉而已然絺章繪句豈足以臻斯文之極摯與暨歐陽修以髙明博大之學興起斯文大章短篇與詩書春秋相表裏自是臨川以王氏為宗南豐以曽氏為重眉山以蘇氏為師而文章之傳于今為盛信乎與時而盛衰也於呼由漢迄今振斯文於將墜者唐有韓愈之功宋得歐陽子之力夫豈偶然也哉趙鄰幾字亞之鄆州項城人也少好學能屬文作禹别九州賦凡萬餘言周顯德初舉進士為校書郎歷許宋從事太平興國初為直史館遷左補闕知制誥以卒鄰幾為文慕徐庾王楊盧駱之體屬對精切及掌誥命頗不逹體要常欲進唐武宗以來實録有會昌以來日歷二十六卷文集三十卷六帝年略一卷史氏懋官志五卷并他書五十餘卷韓溥長安人也唐宰相休之後少俊敏善屬文舉進士纍歷幕府召為監察御史三遷戶部員外郎知華州同判靈州轉司門郎中以卒溥博學善持論詳練臺閣故事多知唐朝氏族與人談娓娓可聽號為近世肉譜縉紳頗推之鄭文寶字仲賢始仕南唐為校書郎以文知名李煜歸朝後為廣文館坐舉進士為修武簿稍遷著作佐郎知潁州召拜殿中丞為陕西轉運使時朝廷討李繼遷文寶屢自環慶部糧越旱海靈武乃言羌戎以池鹽與邊民易榖麥會饋挽趨靈武為繼遷所掠議禁青白鹽許商人販安邑解池鹽於陕西以濟民食官獲其利而戎鹽益困則繼遷可不戰而屈矣用其䇿而商人販兩池鹽少利多取他徑出唐鄧襄汝間邀善價吏不能禁關隴民至無鹽以食太宗知之悉除其禁文寶嘗以金帛誘繼遷酋長嵬囉嵬悉俾圖繼遷而許以刺史嵬囉嵬悉以告繼遷繼遷上表請罪太宗雖怒之而不罪也既而文寶復請禁鹽邊民冒法扺罪者甚衆太宗怒貶藍田令繼遷陷清逺軍真宗召文寶問以計䇿文寶請棄靈州時方遣王超援靈武即以文寶為隨軍轉運使徙河東繼遷攻圍麟州文寶乘傳晨夜赴之遂解麟州之圍冦準謂其熟西事復以為陕西轉運使徙河東京西官至兵部員外郎卒年六十一文寶好談方略以功名自任而術頗疏然以詩名家多警句善篆工琴有文集二十卷談苑十卷江表志三卷吳俶字正儀潤州人也幼有俊才韓熙載潘佑皆以文章著名江左一見俶深加器重曰吳正儀中林之蘭蕙也因問以唐太宗杜淹論樂異同俶曰志氣未動則聲能致和哀樂既形則樂乃思變熙載佑歎曰足以探禮樂之情矣俶在江南舉進士擢髙第補丹陽尉久之直內史從李煜歸朝以近臣薦召對充史館編修太平御覽文苑英華太平廣記遷袐閣校理修起居注官至職方員外郎卒年五十六有文集二十卷子遵路遵路少頴異其舅陳彭年以遠器許之舉進士天聖三年以太常博士為祕閣校理同知禮院時章獻明肅皇后稱制人無敢議政事得失遵路條時事上之忤章獻意因出知崇州纍遷尚書司封員外郎開封府推官加直史館為淮南轉運使知洪州入修起居注元昊反遵路請復民兵乃受詔河東料簡民兵除天章閣待制知開封府馭吏嚴肅諸縣無追逮以不阿權附貴出知宣州上陕西御戎要略二十篇徙為陕西都轉運使遷龍圖閣直學士知永興軍卒年五十六遵路厚重寡言篤於風義居母喪廬墓側疏食終制嘗采古今治亂著皇典數百卷未訖而終家無餘資友人范仲淹分奉周之樂史字子正撫州宜春人也母夢異人令吞五色珠而生史史有文辭初仕江南為祕書郎歸朝舉進士得佐武成軍史上書言事擢著作佐郎知陵州獻金明池賦召為三館編修遷著作郎直史館轉太常博士知許黃二州又知商州史所至不修謹以賄聞遂分司西京積官至職方員外郎卒年七十八史嘗編寰宇記二百卷與其他雜編又四百九十餘卷自為文百卷子黃目黃目字公禮舉進士為伊闕尉知壽安縣上書言邊事真宗召對除直史館知浚儀縣數上書言事真宗頗嘉其好古歷度支鹽鐵判官遷太常博士京西轉運使父卒詔起復使契丹還為廣西轉運使改陜西陳堯咨知永興好以氣陵黃目黃目求解職不許堯咨多縱恣不法詔黃目察之堯咨求罷職徙知鄧州入判三司踰月拜兵部員外郎知制誥遷右諫議大夫知開封府仁宗為皇太子拜給事中兼左庶子坐事左遷左諫議大夫知荆南府復為給事中徙潭州代還知審官院以病改通進銀臺司兼門下封駮事求外任得知亳州卒年六十五黃目性深沉為吏以靜勝飾以文雅有文集五十卷雜編六十卷夏侯嘉正字會之江陵人也少有雋才舉進士歷官至著作佐郎嘗使巴陵作洞庭賦徐鉉見而竒之太宗知其名召為右正言直史館兼直祕閣卒年三十七羅處約蜀人也舉進士為臨溪簿再遷大理評事知吳縣王禹稱與為倡酬人多傳誦處約與禹稱召至京師太宗自定題以試之以禹稱為右拾遺處約為著作郎皆直史館處約有詞采而急於進用未幾而卒年三十三有集十卷王禹稱為之序李建中字得中其先京兆人也幼好學以文遊京師王祐延譽于石熙載熙載厚待之舉進士甲科為嶽州録事參軍遷潭州茶場歷通判道郢二州轉太常博士言事者多以權利進建中表陳時政利害序王霸之略太宗嘉之召對便殿會建中坐公纍降監在京權易院蘇易簡與太宗論文士因及建中太宗亦素知之命直昭文館改直集賢院出為兩浙轉運副使歷通判河南府知曹解潁蔡四州建中性簡靜風神雅秀恬於榮利乞西京留司御史臺愛洛巾風土遂居之官至工部郎中判太常寺卒年六十九建中善書札行筆尤工草𨽻篆籀八分俱妙好古勤學多藏古器名畫有集三十卷路振字子發永州祁陽人也唐相巖之四世孫巖以貶死嶺外子孫因避地湖湘間遂居焉振幼頴悟十嵗聽誦隂符經裁百言而止父使終業振曰百言演道足矣父異其對舉進士試巵言日出賦獨振知所出而文亦典贍太宗嘉之以為大理評事通判邠州徙徐州代還直史館遷太子中允知濵州一日敵騎至城下兵少民相恐衆謂振文士而戰禦方略非所長也環聚而泣振乃親撫之諭以敵盛不可與爭鋒吾當堅壁以守數日敵引去知河中府徙鄧州入為國史編修官大中祥符初遷左司諫知制誥文詞溫麗深慰物論卒年五十八振淳厚無臧否恂恂如也作詩有唐人風有文集二十卷又嘗采五代九國君臣事作世家列傳行於世崔遵度字堅白本江陵人也後徙淄州純介好學舉進士調和州簿擢著作佐郎遷殿中丞知忠州李順攻忠州遵度領兵背城而戰賊踰堞以入遵度不能城守貶崇陽令大中祥符初同修起居注真宗東封進博士祀汾隂為左司諫遵度掌右史十餘載立殿墀上常退匿楹間慮為上所見其恬於勢利如此善鼓琴深得琴中趣嘗著琴箋世以為知言仁宗為壽春郡王與張士遜並為王友仁宗封升王為咨議參軍仁宗為皇大子遷左諭德卒年六十七仁宗以其故宫僚也特贈工部侍郎石延年字曼卿宋城人也少以氣自豪讀書不治章句獨慕古人竒節偉行非常之功視世俗屑屑無足動其意者自顧不合於時乃一混以酒然好劇飲大醉頽然自放嘗舉進士不中真宗推恩三舉進士得奉職耻不就張知白素竒之謂曰母老乃擇祿耶乃就遷殿直改太常寺太祝知金鄉縣通判乾寧軍還為校理遷太子中允章獻明肅皇后臨朝延年上書請還政天子自契丹通中國德明盡有河西而臣屬遂務休兵養息天下然內外弛武三十年矣延年上書請為二邊之備不報已而四方用兵始思其言召見稍用其説籍河北河東陕西之民得鄉兵數十萬延年奉使籍兵河東既而聞邊欲以鄉兵扞賊者笑曰此得吾粗也夫不教之兵勇怯相雜若怯者見敵而動則勇者亦牽而潰矣今或不暇教不若募其敢行者則人人皆勝兵也又嘗請募人使唃厮囉回鶻舉兵攻西夏仁宗亦嘉納之延年視世事蔑若不足為及聽其施設之方雖精思深慮不能過也其為文章徑健稱其意氣卒于京師年四十八延年既知名當世而飲酒過人有劉濳者與延年為酒敵常於京師過王氏酒樓對飲終日不交一言王氏以為異人奉之甚謹二人飲噉自若傲然不顧至夕相揖而去明日喧傳王氏酒樓有二酒仙來飲久之乃知劉石也濳為平隂令母卒濳抱母一慟而絶其妻復撫濳大號而死時人傷之曰子死于孝妻死于義孝義之事集于一家蘇舜欽字子美易簡之孫而耆之子也以父任為太廟齋郎復舉進士稍遷大理寺丞為人倜儻不羈尤長於古文歌詩行草士大夫收之以為墨寶舜欽數上書言朝廷之事范仲淹薦其才得集賢校理監進奏院用故紙祀神會賔客為御史所糾坐除名時王質守陜聞之歎曰子美之才如此士大夫不為天子惜之可傷也舜欽既廢居蘇州買水石作滄浪亭以自適後二年得湖州長史以卒年四十初杜衍愛舜欽之才以女妻之衍為宰相以直道自任言者因舜欽以及衍故遂罷政事歐陽修與舜欽友善既哀其死又為序其文云兄舜元字才翁仕至轉運使亦知名梅堯臣字聖俞宣城人也世以詩名堯臣遂以詩聞天下始以蔭補齋郎王晦叔見其文歎曰二百年無此作矣嘉祐元年翰林學士趙槩等言于朝曰梅堯臣經行修明願得留與國子諸生講論道德作為雅頌以歌詠聖化乃得國子監直講官至都官員外郎嘗奏其所撰唐載二十六卷多補正舊史闕謬乃命編修唐書書成未奏而卒年五十九堯臣學長於詩為小傳二十卷有文集四十卷注孫子十三卷歐陽修論其詩曰世謂詩人少達而多窮蓋非詩能窮人殆窮者而後工也堯臣以為知言同時有張先子野刁約景純皆有文名而逸其事江休復字鄰幾開封陳留人也與尹洙蘇舜欽遊舉進士調藍田尉遷殿中丞召試充集賢校理當慶歷時小人不便大臣執政者欲以事去之舜欽宰相杜衍壻也以祠神會飲得罪一時知名士皆被逐休復坐落校理監蔡州商稅久之自通判廬州復集賢校理出知同州提點陕西路刑獄纍遷刑部郎中修起居注卒年五十六休復善著書嘗作神告一篇言皇嗣國大事也臣子以為嫌而難言或言而不見納故假神告冀感悟休復為人外若簡曠而內行修飾其為文章淳雅尤長于詩善隸書喜琴奕飲酒與人交久而益篤云章望之字表民浦城人也好學有文用從父得象蔭為校書郎監杭州茶庫踰年辭疾去舉賢良得象在相位以嫌扼之遂不復仕浮遊江湖犯艱苦以營衣食不自悔歐陽修韓絳吳奎劉敞范鎮同薦其才除僉書建康軍節度判官不赴又除知烏程縣趣令受命固辭遂以光祿寺丞致仕王令字逄原廣陵人也生五嵗而孤二十八而卒王安石志其墓曰烏呼道之不明邪豈特教之不至也士亦有罪焉烏呼道之不行邪豈特化之不至也士亦有罪焉蓋無常産而有常心者古人所謂士也士誠有常心以探聖人之説而力行之則道雖不明乎天下必明於已道不行於天下必行於妻子內有以明於已外有以行於妻子則其言行必不孤立於天下矣烏呼以豫之昏弱不肖固亦士之有罪者而得友焉始豫愛其文章而得其所以言中愛其節行而得其所以行卒豫得其所以言浩浩乎其將沿而不窮也得其所以行超超乎其將追而不至也烏呼今棄豫而死矣悲夫今有廣陵集十卷行於世文同字與可梓州梓潼人也舉進士稍遷太常博士集賢校理知陵州又知洋州最後知湖州同以文學名操韻髙潔畫筆尤妙常與崔公度同為館職元豐三年京師傳同一夕沐浴冠帶正坐而逝公度聞之遽起驚曰公度昨别與可州南殊無言將别意翛然云明日復來乎與公畫而公度意不在畫也明日再往與可復曰與公畫則左右顧恐有聽者公度方悟與可將有言而公度謬以話為畫也與可因曰吾聞人不妄語者舌可過鼻即吐其舌三疊之如餅狀引之至眉間公度大驚今傳其死不妄矣同既死蘇軾以文哭之曰孰能敦德秉義如與可之和而正乎孰能飬民厚俗如與可之寬而明乎孰能為詩與楚詞如與可之婉而清乎孰能齊寵辱得喪如與可之安而輕乎同號石室先生有丹淵集四十卷行於世楊傑字次公無為人也少有名于時舉進士元豐中官太常者連數任一時禮文之事傑與討論嘗奏請四后升祔以為孝惠賀后淑德尹后章懷潘后皆祖宗首納之后而孝章宋后嘗母儀天下升祔之禮久而未講謂宜因慈聖光獻崇配之日升四后神主祔于祖宗祏室斷天下之大疑正宗廟之大法由是四后始得升祔元祐中為禮部員外郎出知潤州除兩浙提點刑獄卒年七十傑自號無為子有文集十五卷行於世郭祥正字功父當塗人也其母夢李太白而生祥正少有詩名梅堯臣曰天才如此真太白後身也王安石亦歎美其詩熙寧中知武岡縣僉書保信軍節度判官時王安石用事祥正奏乞天下大計専聽王安石處畫有異議者雖大臣亦當屛黜神宗問安石曰卿識郭祥正乎其才似可用出其章以示安石安石耻為小臣所薦乃言祥正無行不可用祥正遂致仕居于姑孰不復于進所居有醉吟庵久之起為通判汀州後知端州復棄去遂家于當塗之青山以卒楊蟠字公濟章安人也舉進士為密和二州推官歐陽修稱其詩蘇軾知杭州蟠通判州事與軾倡酬平生為詩數千篇最後知壽州而卒東都事略卷一百十五
