body:
  text: 東都事略卷一百十六宋王稱撰文藝傳九十九黃庭堅字魯直洪州分寧人也幼警悟從舅李常見之以為一日千里舉進士為葉縣尉又為大名府國子監教授初蘇軾見庭堅詩於孫覺之坐上異之後過李常于濟南見其詩文以為超逸絶塵獨立萬物之表者由是名聲始震知太和縣又監德安鎮召為校書郎為神宗實録檢討官集賢校理逾年為著作郎母喪服除除祕書丞提點明道宫紹聖初議者以實録多誣失實責涪州别駕黔州安置以親嫌移戎州監鄂州稅僉判寧國軍知舒州召為吏部員外郎丐郡得知太平州提點玉隆觀初庭堅嘗作荆南承天院記部使者觀望宰相趙挺之意以庭堅有幸災之言坐除名編管宣州卒年六十一始庭堅與秦觀張耒朝補之皆遊蘇軾之門號四學士而庭堅於文章特長於詩獨江西君子以庭堅配蘇軾謂之蘇黃云秦觀字少遊揚州髙郵人也舉進士不中元祐初蘇軾以賢良方正薦于朝除太學博士校正祕書省書籍遷正字兼國史院編修官紹聖初坐黨籍通判杭州以御史劉拯論其增損實録責監處州酒稅又編置郴州移橫雷二州後放還至滕州而卒年五十三有文集四十卷觀長於議論文麗而思深蘇軾嘗以其詩薦之于王安石安石答軾書云公竒秦君口之而不置我得其詩手之而不釋餘卷正眊眩未暇細讀嘗鼎一臠旨可知也及觀死軾聞之歎曰少遊不幸死於道路哀哉哀哉世豈復有斯人乎弟覿字少章亦能文又有李豸者字方叔陽翟人也博學溢于詞章受知于蘇軾軾知貢舉有程文瑰異軾曰此必豸也既而乃非是悵然久之豸竟無成而卒然文益竒張耒字文濳楚州淮隂人也幼頴異能為文從蘇轍學轍見其文愛之舉進士為臨淮簿壽安尉咸平丞蘇軾亦深知之稱其文為汪洋淡泊有一倡三歎之聲云召為太學録元祐初為正字遷著作佐郎改著作郎兼史院檢討在館八年顧義自守泊如也擢起居舍人請郡以直龍圖閣知潤州徙宣州責監黃州酒稅徙復州起為通判黃州移知兖州召為太常少卿甫數月復以直龍圖閣知潁州又徙汝州復坐元祐黨落職主管明道宫初耒在潁聞蘇軾之訃以師弟子禮舉喪言者以為言遂貶房州别駕黃州安置五年得自便居陳州尋主管崇福宫卒年六十時又有李昭玘者字成季濟北人也有文名亦為蘇軾所知元祐中為起居舍人後陷黨籍廢黜終身云朝補之字無咎宗慤之曽孫也七嵗能屬文王安國一見而竒之蘇軾通判杭州延譽如不及舉進士為澶州司戶參軍召試為祕閣校理通判揚州召還為著作佐郎遷著作郎出知齊州紹聖初責監蘄信二州酒稅復為著作郎遷史部郎兼國史院編修官出知河中府嘗知湖密果三州最後知泗州卒年五十八有雞肋集一百卷詠之字之道補之從弟也少有異材以蔭入官為揚州司法參軍未上時蘇軾知揚州補之倅州事以詠之詩文獻軾軾曰有才如此獨不令一識面耶久之詠之具參軍禮入謁軾下堂挽而上之顧謂坐客曰此竒才也復舉進士乂舉宏詞一時傳誦其文為河中府教授元符末應詔上書罷官自是詠之蹇于仕矣久之為京兆府司録事秩滿除提舉崇福宮卒年五十二有文集五十卷其堂兄説之為之序陳師道字無已徐州彭城人也少刻苦問學以文謁曾鞏鞏竒之元祐中蘇軾傅堯俞孫覺薦于朝為徐州教授除太學博士初師道在官嘗私至南京謁蘇軾至是言者彈其冒法越境出為潁州教授紹聖初言者復論師道進非科第罷歸久之為棣州教授除祕書省正字以卒師道家素貧自罷歸彭城或纍日不炊妻子愠見不恤也諸經皆有訓傳於詩禮尤邃為文師曽鞏為詩宗黃庭堅然平淡雅奧自成一家云廖正一字明略安州人也元祐中蘇軾在翰苑試館職之士得正一對䇿竒之除祕書省正字軾門人黃秦張朝世謂之四學士每過軾軾必取密雲龍瀹以飲之正一詣軾謝軾亦取密雲龍以待正一由是正一之名亞于四人者紹聖初入黨籍貶監玉山稅以卒有文集十卷李之儀字端叔姑熟人也少力學舉進士元祐中為樞密院編修官能詩善屬文工於尺牘蘇軾嘗謂得發遣三昧軾帥定武辟置幕下及范純仁卒之儀為作遺表為世傳誦遂坐黨籍廢黜終身云李格非字文叔濟南人也舉進士以文章受知于蘇軾嘗為太學官著洛陽名園記因以論洛陽之盛衰其文曰洛陽處天地之中挾殽黽之阻當秦隴之襟喉面趙魏之走集蓋四方必爭之地天下常無事則已有事則洛陽先受兵余故曰洛陽之盛衰者天下治亂之候也方唐貞觀開元之間公卿貴戚開館列第於東都者號千有餘所及其亂離繼以五季之酷其池塘竹樹兵車蹂踐廢而為丘墟髙亭大榭煙火焚燎化而為灰燼與唐共滅而俱亡者無餘家矣余故曰園囿之興廢者洛陽盛衰之候也且天下之治亂候於洛陽之盛衰而知洛陽之盛衰候於園囿之興廢而得則名園記之作余豈徒然哉烏呼公卿大夫髙進于朝放乎以一己之私自為而忘天下之治忽欲退享此得乎唐之末路是也其後洛陽陷于虜人以為知言格非後為京東提點刑獄以卒李公麟字伯時舒城人也舉進士用陸佃薦為刪定官又用御史薦為檢法官公麟博學好古多識竒字紹聖五年朝廷得玉璽下禮官諸儒議言人人殊公麟以謂秦璽用藍田玉今玉色正青其書以龍蛇鳥魚為文著帝王受命之符真秦李斯所為也議由是定公麟能行草書善畫尤工人物人以比顧陸云元符三年病脾遂致仕既歸老肆意於泉石間作龍眠山莊圖為世所寶藏其為文清婉工於詩而一時多所稱譽焉米芾字元章吳人也幼頴悟稍長通書為文務為竒險不蹈襲前人軌轍善書畫好古鍾鼎器皿法書初宣仁聖烈皇后在藩時芾母出入邸中後以舊恩補校書郎嘗為太常博士出知無為軍踰年復召為書畫博士擢禮部員外郎大觀二年以言者罷知淮陽軍疽發卒年四十九子友仁賀鑄字方回開封人也孝惠皇后之族孫授右班殿直元祐中用武易文為通判泗州又倅太平州以卒鑄好學藏書萬卷工文詞尤長於樂府有慶湖遺老集二十卷劉涇字巨濟簡州陽安人也舉進士王安石薦其才召見除經義所檢討久之為太學博士罷知咸陽縣常州教授通判莫州成都府除國子監丞知處虢真坊四州元符末上書召對除職方郎中卒年五十八涇為文務為竒怪語好進取多為人排斥屢躓不伸云同時有鄭少微者與涇俱以文知名而仕不偶少微字明舉成都人也蔡肇字天啓丹陽人也始師事王安石長於歌詩中進士為明州户掾除太學正通判常州召為衛尉寺丞提舉永興路常平徽宗即位入為吏部員外郎兼編修國史言事者論其學術反覆出為兩浙路刑獄久之召為禮部貟外郎遷起居郎拜中書舍人書命不稱上意以顯謨閣待制知明州尋落職復待制致仕卒有文集三十卷周邦彥字美成錢塘人也性落魄不羈涉獵書史元豐中獻汴都賦神宗異之自諸生命為太學正紹聖中除祕書省正字徽宗即位為校書郎遷考功員外郎衛尉宗正少卿又遷衛尉卿出知隆德府徙明州召為祕書監擢徽猷閣待制提舉大晟府未幾知真定改順昌府提舉洞霄宫卒年六十六邦彥能文章世特傳其詞調云唐庚字子西睂州丹稜人也善屬文舉進士稍用為宗子博士張商英薦其才除提舉京畿常平商英罷相庚亦坐貶安置惠州會赦復官提舉上清太平宫歸蜀道病卒年五十一庚為文精密通於世務作名治察言閔俗存舊等篇學者稱之有文集二十卷子文若鮑由字欽止處州龍泉人也舉進士少從王安石學又嘗親炙蘇軾故其文汪洋閎肆而詩尤髙妙徽宗召對除工部貟外郎居無何不合去責監泗州轉般倉歷河東福建路常平廣西淮南轉運判官復召為郎以言者罷提點元封觀起知明州又知海州復奉祠而卒年五十六嘗注杜詩有文集五十卷倪濤字巨濟廣德軍人也博學能文有操履舉進士擢太常博士遷校書郎著作佐郎賜對除司勳員外郎遷左司員外郎朝廷議有事燕雲大臣爭先決䇿為固位計濤獨曰景德以來虜守約不敢犯邊盟誓固在不可渝也天下久平士不習戰軍儲又屈毋輕議以貽後患宰相怒曰左司敢沮軍事耶罷監朝城縣酒稅再謫茶陵造船場卒年三十九有詩文號雲陵集蘇元老字在廷軾從孫也幼孤力學善屬文軾謫居海上數以書往來軾善其為學有功其季叔祖轍頗愛奬之黃庭堅亦見而竒之曰此蘇氏之秀也舉進士調廣都簿徙漢州教授除西京國子博士通判彭州政和間宰相喜開邊西南帥臣多招誘近界諸夷納土分置郡縣以為功致茂州蠻叛帥司遽下令招降元老歎曰威不足以服則恩不足以懷乃移書成都帥周燾言今夔陜兵大集先以夔兵誘其前陜兵從其後不十日賊必破彼降而我受焉則威懷之道得今不討賊既招而還必復叛不免重用兵乃定燾不從以此得罪朝廷再命帥決䇿討賊勢蹙乃降邊事以寧如元老䇿除國子博士歷祕書省正字將作少監比部考功員外郎軍器監司農衛尉太常少卿言者謂元老蘇軾從孫且曰元祐邪説不宜位朝廷罷為提點明道宫元老歎曰昔顔子附驥尾而名顯元老以家世學術坐纍豈不榮哉未幾而卒年四十七元老外和柔中實徑厲中官梁師成欲見之先使人求其文元老弗與士君子稱之有詩文行於世東都事略卷一百十六
