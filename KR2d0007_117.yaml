body:
  text: 東都事略卷一百十七宋王稱撰卓行傳一百士之所貴於天下者以有君子之行焉陳烈以學業教其鄉朱壽昌以孝感致其母劉庭式以雍睦宜其妻鄭俠以敢言事其君巢谷以誠信行其義徐積以篤實蓄其德卓絶之行足以表儀一世烏呼斯可謂之士矣陳烈字季慈福州侯官人也性介特篤於孝友年十四繼失怙恃水漿不入口者五日自壯逮老享奉如事生禮寢興晦朔未嘗輟甫冠力學不羣平居端嚴終日不言雖御僮僕如對大賔里有冠昏喪祭請而後行從學者數百人父兄有善訓其子弟者必舉烈言行以規之嘗與鄉薦黜于禮部不復踐場屋或勉之仕則曰伊尹守道成湯三聘以幣吕望持誠文王載之俱歸今天子仁聖好賢有湯文之心豈無有先覺如伊吕者乎仁宗屢詔不起或問其故則曰吾學未成自公卿大臣至鄉老里民交章論薦志不少易嘉祐中以近臣薦授州學教授烈方辭避而福建提點刑獄王陶奏烈以妻林氏疾病瘦醜遣歸其家十年不視烈貪詐人也已行之命願賜削奪諫官司馬光言臣素不識烈不知其人果如何惟見國家常患士人不修名檢故舉烈以奬厲風俗若烈平生操守出於誠實雖有迃闊之行不合於中道猶為守節之士亦當保而全之願委公正官吏通儒術識大體者覆實若止於夫婦不相安諧則使之離絶而湔洗其過庶復伸眉於後若實敗亂名教則嚴賜刑誅并治舉者之罪以明至公雖不行然世頗以矯偽譏之明年歐陽修復薦其行除國子監直講久之致仕復起為郡教授烈不受廪祿敝衣糲食裕如也卒年七十六朱壽昌字康叔揚州天長人也父巽真宗時為工部侍郎壽昌以蔭為將作監簿嘗知招信縣通判劔陕二州又倅荆南知閬州廣德軍通判河中府壽昌生七嵗父守長安出其母劉氏嫁民間母子不相知者五十年壽昌既仕而念母之不見也行四方求之不已飲食罕御酒肉與人言輒流涕以浮屠法灼臂燒頂刺血寫佛書冀遂其志熙寧初棄官入秦與家人訣誓不見母不復還行次同州得焉劉氏時年七十餘矣由是天下皆知其孝壽昌始以母故通判河中府迎其同母弟妹以歸居數嵗母卒泣涕幾喪明有白烏集其墓上拊其弟妹益篤為買田居之其於宗族尤盡恩意嫁兄弟之孤女二人葬其不能葬者十餘喪蓋其天性如此後知鄂州代還以銓籍年七十得提舉崇福觀卒于家劉庭式字得之齊州人也舉進士蘇軾守密州庭式為通判始庭式未第時議娶其鄉人之女既約而未納幣也庭式及第其女以病喪明女家躬耕貧甚不敢復言或勸納其幼女庭式笑曰吾心已許之矣豈可負吾初心哉卒娶之女死於密州庭式喪之逾年而哀不衰不肯復娶軾問之曰哀生於愛愛生於色今君愛何從生哀何從出乎庭式曰吾知喪吾妻而已吾若緣色而生愛緣愛而生哀色衰愛弛吾哀亦忘則凡揚袂倚市目挑而心招者皆可以為妻也耶軾深感其言庭式後監太平觀老於廬山絶粒不食而面目奕奕有紫光步上下峻坂往復六十里如飛以壽終鄭俠字介夫福州福塘人也嘗從王安石學舉進士調光州司法參軍秩滿至京師會安石秉政俠見安石具言青苖免役用兵之害安石不答又數以書論之久之得監安上門安石將以俠為經義局檢討俠辭安石謂之曰凡仕宦須改得京秩然後可進用何介僻如此俠曰俠罷官而來本執經丞相門下耳官爵非俠所望也會大旱自十一月不雨至於三月俠上疏曰去年大蝗秋冬亢旱今春不雨麥苖乾枯黍粟麻豆皆不及種五榖踴貴民情憂惶什九懼死逃移南北困苦道路方春斬伐竭澤而漁大營官錢小營升米草木魚鱉亦莫生遂夷狄輕肆敢侮中國皆由大臣輔佐陛下不以道以至於此臣願陛下開倉廩以賑貧乏諸有司所行不道之政一切罷去庶幾早召和氣上應天心以延蒼生垂死之命陛下自即位以來一有便民利物之事靡不毅然主張行之亦欲人人富夀夫豈區區充滿府庫盈溢倉廪終以富盛強大勝天下哉而大臣略不推明陛下此心乃恣其叨懫劓割生民侵肌及骨使之困苦而不聊生夫陛下所存如此大臣所為如此豈不負陛下哉陛下以為時然耶以為有以使之然耶以為時然則堯舜在上便有臯夔湯文在上便有伊吕君作於內臣應於外主倡於上臣和於下以成康濟之業陛下仁聖當御撫養為心甚於前古而大臣所為如此其非時然抑陛下所以駕馭之未審爾陛下以爵祿駕馭天下忠賢而使之如此甚非宗廟社稷之福也臣又見南征北伐皆以其勝捷之勢山川之形為圗來上者多矣今天下憂苦質妻鬻女父子不保遷徙逃竄困頓藍縷拆屋伐桑爭貨於市輸官糴米皇皇不給之狀繪為一圖此臣安上門日所見百不及一已可咨嗟涕泣而况於千萬里之外哉陛下觀臣之圗行臣之言自今已往至於十日不雨即乞斬臣以正欺罔之罪神宗出圖以示宰執且責之王安石遂力求去出知江寧薦呂惠卿以代已命下之日京師大風雨土翳席逾寸俠又上書極陳時政得失民間疾苦幾五千言且曰安石為惠卿所誤至此今復相扳援以遂前非不復為宗社計昔唐天寶之亂國忠已誅貴妃未戮人以為賊本尚在今日之事何以異此又上疏諫用兵語甚切於是惠卿益惡之俠遂勒停汀州編管惠卿白神宗曰鄭俠所言事皆馮京令王安國導之使言耳惠卿與京異議故併中之已而神宗問京曰卿識鄭俠乎對曰臣素不之識神宗疑之御史知雜張琥遂以俠事劾京詔付御史獄俠赴詔獄對實不識京但每遣門人吳無至詣檢院投匭時集賢校理丁諷判檢院輒為無至道京稱歎之語及罷局時遇安國於途安國馬上舉鞭揖之曰君可謂獨立不懼者俠曰不意丞相一旦為小人所誤以至於此安國曰是何為小人所誤吾兄自以為人臣不當避四海九州之怨盡歸於己方是臣子盡忠國家俠曰未聞堯舜在上夔契在下而有四海九州之怨者御史臺知班楊忠信因謂俠曰御史不言而君敢言臺中可謂無人也獄成俠改送英州編管忠信無至皆編管湖外京罷政諷落職安國放歸田里及哲宗即位得放還用蘇軾薦除泉州教授章惇用事再貶英州徽宗即位復放還仍為泉州教授蔡京為相又勒停宣和初俠卒俠性清儉布衣糲食終其身平居進止必以禮法閨門帖然不肅而治喜賔客樂教訓嗇用廣施鄉里敬之暇日聞子姪誦詩考槃之義曰弗諼者弗忘君之惡弗過者弗過君之朝弗告者弗告君以善碩人之於君有卷卷之不忍也故永矢以絶之俠歎曰是何言與古之人在畎畝不忘其君况於賢者一不用而忿戾若是哉蓋弗諼者弗忘君也弗過者弗以君為過也弗告者弗以告他人也其存心如此俠雖流落頓挫之餘一話一言未嘗忘君云巢谷字元修眉州眉山人也嘗舉進士京師見舉武藝者心好之谷素多力遂棄其舊學蓄弓箭習騎射久之業成而不中第去遊秦鳯涇原間所至友其秀傑與韓存寶頗相善也熙寧中存寶為河州將有功號熙河名將會瀘州蠻乞弟擾邉命存寶出兵討之存寶不習蠻事邀谷至軍中問焉及存寶得罪將就逮自料必死謂谷曰我涇原武夫死非所惜顧妻子不免寒餓橐中有銀數百兩非君莫使遺之者谷許諾即變姓名懷銀步行往授其子人無知者存寶死谷逃避江淮間蘇軾責黃州與谷同鄉幼而識之因與之逰及軾與其弟轍在朝谷浮沉里中未嘗一見紹聖初軾轍謫嶺海平生親舊無復相聞者谷獨慨然自睂山誦言欲徒步訪兩蘇聞者皆笑其狂谷至梅州遺轍書曰我萬里步行見公不自意全今至循矣不旬日必見死無恨矣轍驚喜曰此非今世人古之人也既見握手相泣已而道平生逾月不厭時谷年七十三矣將復見軾於海南轍愍其老且病止之曰君意則善然自循至儋數千里當復度海非老人事也谷曰我自視未即死也公無止我留之不可則資之以行至新會有蠻𨽻竊其橐裝以逃獲於新州谷從之至新遂病死徐積字仲車楚州山陽人也少孤事母盡孝年四十不昏不仕不昏者恐異姓不能盡心於母也不仕者恐一日去其親也鄉人勉之就舉遂偕母之京師既登第未調官而母亡遂不復仕其後監司上其行以為郡最授楚州教授一時陳瓘鄒浩皆禮之久之致仕歸山陽於是始娶而操履彌篤矣積為文怪而放耳聵甚畫地為字乃始通語終日靣壁坐不與人接而四方事無不周知其詳雖新且密無不先知也積嘗語蘇軾曰自古皆有功獨稱大禹之功自古皆有才獨稱周公之才以其有德以將之故爾軾然其言始三嵗時喪父哭之甚哀及居母喪尤盡禮廬墓側十餘年晨昏奉几筵如事生每嵗甘露降於墳域必逾月木為連理郡守迎入學甘露又降其舍鄉閭化之州具以聞賜絹三十匹米三十石後以壽終政和三年部使者言積藴德丘園聲名顯著諡曰節孝處士官其一子東都事略卷一百十七
