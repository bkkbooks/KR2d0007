body:
  text: 東都事略卷一百十八宋王稱撰隱逸傳一百一所貴乎天下之賢者出與處而已朝廷之士以進爲榮山林之士以退爲髙易曰遯世無悶又曰不事王侯此山林之士所以爲髙者與若乃應蒲車之招被旌帛之賁則孔子所謂舉逸民天下之民歸心焉者亦其次也今裒取以隱逸著者列于傳云蘇澄隱字棲眞眞定人也爲道士五代之際屢聘之稱疾不出太祖征太原駐蹕鎭陽召見於行宫時年八十太祖問以養生澄隱對曰臣之養生不過精思鍊氣爾帝王養生則異於是老子曰我無爲而民自化我無欲而民自正無爲無欲凝神太和昔黄帝唐堯享國永年得此道也太祖說其言賜以襲衣器幣澄隱年百歳而卒陳摶字圖南亳州眞源人也始四五歳戲渦水岸側有青衣媪召置懷中乳之自是聰悟日益少時嘗舉進士不第遂不樂仕有大志隱武當山移居華山雲臺觀又止少華石室每寢處多百餘日不起周世宗聞其名召見因問黄白術對曰陛下爲四海之主當以致治爲念奈何留意黄白之事乎世宗命爲諫議大夫辭不受嘗乗白驢欲入汴中塗聞太祖登極大笑墜驢曰天下於是定矣太宗召以羽服見於延英殿甚禮重之宰相宋琪問曰先生修養之道可以敎人乎曰摶不知吐納修養之理假令白日冲天何益於治今天子博達古今深究治亂眞有道仁明之主正是君臣同德致理之時勤心修鍊無出於此琪等稱嘆太宗以其善相人也遣詣南牙見真宗及門亟還問其故曰王門厮役皆將相也王可知矣賜號希逸先生端拱初謂其弟子賈德昇曰汝可於張超谷鑿石爲室吾將憩焉二年秋七月石室成摶手書表數十言其略曰臣摶大數有終聖朝難戀已於今月二十二日化形於蓮花峯下張超谷中如期而卒經七日支體猶温有五色雲蔽塞洞口彌月不散摶好讀書常自號扶摇子真宗幸華隂謁其祠加禮焉种放字明逸河南洛陽人也少時徃來嵩華間慨然有山林之志父死與其母隱居終南山豹林谷自號雲溪醉叟又號退士聞陳摶之風徃見之放作樵夫拜庭下摶輓之而上曰君豈樵者耶二十年後當為顯官名聞天下放曰放為道義來官禄非放所願也摶笑曰人之貴賤莫不有命貴者不可為賤亦猶賤者之不可為貴也君骨相當爾雖晦迹山林恐竟不能安異日自知之太宗時召之不起母死水漿不入口者三日廬於墓側張齊賢言放隱居求志孝友之行可厲風俗召為左司諫真宗携其手登龍圖閣論天下事蓋眷遇如此及辭歸山遷右諫議大夫真宗東封泰山改給事中西祀汾隂轉工部侍郎真宗回蹕次河中時長安父老請臨幸且稱漢唐舊都關河雄固神祗人民無不望天光之下臨也真宗意未決召放謀之放曰陛下幸長安有不可者三陛下方以孝治天下翻事秦漢侈心封禪群嶽而更臨游别都乆棄宗廟於孝為闕其不可者一也百司供擬頓伏事煩晚春蠶麥已登深費農務其不可者二也精兵重臣扈從車蹕京國一空民心無依况七廟乎陛下冝深念之其不可者三也近臣但願扈清蹕行曠典文頌聲以邀已名而已陛下當自決於清衷也真宗乃止王嗣宗守京兆放嘗乘醉慢罵嗣宗於是嗣宗條上放不法事放遂徙居嵩山然猶徃來終南放數至闕下俄復還山嘗西宴真宗令群臣賦詩杜鎬以素不屬辭誦北山移文以譏之真宗因出放所上時議十三篇語近臣曰放為朕言事甚衆但人無知者耳放一日晨興忽取前後章疏藁焚之服道士服召諸生飲與訣酒數行而卒年六十贈工部尚書始陳摶謂放曰君不娶可得中夀放從之放既不娶遂無子姪世衡號名將自有傳郭震字希聲成都人也博學能詩才識過人淳化中嘗出東郊忽賦詩曰今日出東郊東郊好春色青青原上草莫放征馬食遂走京師上書言蜀將亂不報已而李順起於卭𤏡間自是括囊不言隱身漁釣病將死其友徃問之側卧欹枕而言其友曰子且正身震笑曰此行豈可復替名耶識者謂其臨死生而不亂云有漁舟前後集行於世李瀆洛陽人魏野蜀人也瀆字長源嘗徃來中條山中不復仕進好聚書畵名聞於時野字仲先居陜之東郊嘯咏終日為詩精絶有唐人風格皆有道之士也真宗祀汾隂以禮聘之悉不起瀆嗜酒人或勉之曰吾以樂吾餘年爾嘗語諸子曰山水足以娯情茍遇醉而卒吾之願也一日忽有人至其床下誦詩云行到水窮處未知天盡時言訖不見瀆曰吾當逝矣亟命家人置酒頃之而卒年六十三野聞其死哭之慟後六日亦卒年六十人皆異之天禧四年詔瀆野俱贈著作郎野之子閑字雲夫喜為詩不樂仕進有父之志仁宗嘉其節賜號清逸處士年八十四終于家邢惇字君雅雍丘人也嘗舉進士不中慨然有隱遁之意性介特不妄交游耽翫經史里人號為邢夫子真宗幸亳州以布衣召對問以治道惇不對真宗問其故對曰陛下東封西祀皆已畢矣臣復何言真宗大恱除試許州助敎惇不受卒年七十四林逋字君復杭州錢塘人也少孤刻志為學結廬西湖之孤山喜為詩孤峭澄淡居西湖二十年足未嘗履城市李及薛映為其州每造其居清談終日而去逋臨終有詩云湖上青山對結廬墳前脩竹亦蕭踈茂陵他日求遺草猶喜曾無封禪書卒年六十一初逋客臨江李諮始舉進士而未有知者逋謂人曰此公輔之器也逋卒諮適知杭州為制緦服與其門人哭而塟之刻臨終之詩納之壙中賜諡曰和靖先生徐復字復之建州人也嘗游京師舉進士不中退而學易通流衍卦氣之法自知無禄故不復進㳺淮浙間數年凡天文地理遁甲占射諸家之說讀之必得其冝因聽其鄉人林鴻範說詩之所以用於樂者忽若有得遂舉器求樂之夲而曉然知律吕㣲妙動作之制時胡瑗作鐘磬大變古法復笑曰聖人寓器以聲今不先求其聲而更其器是可用耶卒如其言慶厯初范仲淹過潤州問復以衍卦占之今夷狄無動乎復為占西邉用兵月日無少差其後與郭京同召對問以天時人事復舉京房易卦推今年所配年月日時當小過剛失位而不中宜在彊君德仁宗又問明年主何卦復對曰乾卦用事說至九五而止又問前年京師黒風其咎何在對曰其兆在内應豫王之喪乎明日特除復大理評事固辭乃賜號冲晦處士授其子發校書郎復履尚髙潔徙居杭州十餘年卒年八十京好言兵范仲淹數薦之故與復同召焉髙懌字文恱髙祖季興唐末徙荆南之地子孫因家焉懌少孤養於外氏年十三能屬文通經史聞种放隱終南山懌亦築室豹林谷放見而竒之與張嶤許勃號南山三友㓂準薦之不起景祐中朝廷録國初侯王後懌推其弟忻得一官范雍守京兆建學召懌授諸生經從之者數百人康定中杜衍請賜以處士號特除大理評事懌固辭仁宗嘉其守改賜安素處士文彦博又薦其經行先嘗賜良田五頃矣至是復賜第一區既又除光禄寺丞辭不受卒年七十一有少㣲渚宫集續東臯子兵源挂冠録烟霞志凡數十卷懌喜讀書為文有法而詩清淡有古風論唐以來至宋衣冠氏族人物皆見其夲末攷之載籍不謬嘗夣白衣持書自為白鹿洞主因作詩識之後二十年晝寢復夣之其卒塟白鹿鄉張俞字少愚益之郫人也少耆書好為詩嘗舉進士不中又舉茂才異等不中屬西戎犯邉乃上書陳攻取十策謂當無事之日人自矜賢及有事之秋主隨其辱宰相吕夷簡曰魏元忠所上書不及也詔以為校書郎而請授其父仍召俞赴闕俞不起乃上夷簡書曰今之機務之大冝有内外先治乎内後治乎外則天下可安矣所謂内者百官也外者敵國也今天下一家天子幸於安逸無所制作建官授職務於因循而不知百官用邪毒民亂政為國家之患也夫王者命官夲以安上也行政也牧民也和敵國也平暴亂也興禮樂也欲傳道而固後嗣也今小人叢處列位内外滋蔓壊先王之法蔽天子之德使澤不下流身任卿大夫之位而為蟊為賊俾民怨憤由是敵人反噬隂結凶醜傲然有争天下之志蓋治失於内則禍生於外自然之勢也噫㓂敵之患固大矣然未若守宰之患為大也今則正百官守宰之事使民恱天子之澤則疆外之患何難去哉夫四夷之為暴自古而然矣歴觀自古敵國之彊但有暴而無僭今敵人建位號威伏群夷且百年矣國家惟乆長之計休兵務農以尊社稷未遑誅伐含垢忍耻為隣好權時之策也若元昊者豈其比哉父子據河南朔方之地五十年先帝用覊縻之義授以節鉞位冠侯王義同宗室以至于今恩德至逺也而敵心怙亂假號欺天此寧可忍國家四聖傳授八十餘年兵革不用三十餘載財富於古兵倍於初武夫謀臣充庭溢列不能以此時議除天下之患而論者止欲休兵息民以柔服逺徒虗語爾是羣臣不能雪先帝之憤紓今日之憂除國家之讎明萬世之統將何以示四方傳後嗣乎謂冝運謀决策以安萬邦然而决策定亂在於大者則小者可拱而取今能詭制敵人散其隂謀使與叛醜疑貳有結國家之心間誘西涼羣夷勿與賊結則敵人可得而天下定矣范仲淹以諫諍而遭擯斥若外徇物望内惟邦夲冝委重柄而授之王德用雄毅寛政世濟其武大軍樂為之用冝起之放黜授以斧鉞用督三秦亦人望也茍能行此是謂失之東隅收之桑榆也夷簡甚重其言又下詔敦遣復不起其後大臣屢薦凡六詔起之卒不起遂隱居青城山之白雲溪文彦博守蜀髙其行田况繼彦博尤重之每見必倒屣嘗謂僚佐曰斯人用之便可作正言司諫不用則巖谷一病叟耳俞為人不妄憂喜性髙情淡有超然逺俗之志卒時年六十五有文集三十卷邵雍字堯夫衛州人也刻厲為學夜不枕席者數年有王豫者以師自居聞雍學易召而欲敎之雍徃見豫與語三日蹶然起拜雍嘗適呉楚過秦魯客梁晉而歸徙居於洛士人道洛者必過其廬與人言必依於孝悌忠信樂道人之善不及其惡故賢不肖無不親之其學自天地運化隂陽消長皆以數推之逆知其變世無能曉之者而雍内以自樂浩如也初舉遺逸試將作監主簿熈寧初以為潁州團練推官與常秩同召而雍卒不起居洛三十年而卒年六十七贈著作郎諡曰康節有書十二卷曰皇極經世詩二十篇曰擊壤集子伯温常秩字夷甫潁州汝隂人也嘗舉進士不中退而為自得之學尤長於春秋居於陋巷二十餘年澹如也歐陽脩王安石聞而稱之士論亦翕然歸重嘉祐中脩薦于朝以為潁州敎授又除國子監直講又以為大理評事知長葛縣皆不赴於是聲名愈髙神宗聞其名詔有司以禮敦遣秩入對神宗問曰先朝召卿何以不起秩曰先帝容臣不起陛下不容臣不起因問當今何以免民凍餒秩言法制不立當今之大患也因求歸神宗以為右正言直集賢院俄兼舍人院遷天章閣侍講同修起居注秩辭直舍人院修起居注未㡬又求去神宗驚曰方頼卿德義何遽求去也熈寧七年遷寳文閣待制兼侍讀明年又求去已而病不能朝乃以為西京留司御史臺歸潁而卒初秩隐居求志不肯出仕世以為必退者也及王安石更定法令士大夫沸騰以為不便秩在閭閻見所下詔獨以為是被召遂起然在朝亦無所發明聞望日損既卒贈右諫議大夫臣稱曰常秩以隱逸應聘而不能盡性知命乃務求茍合是豈知易所謂君子之道者哉故雖名列隱逸殆亦赧然矣東都事略卷一百十八
