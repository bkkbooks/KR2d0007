body:
  text: 東都事略卷一百十九宋王稱撰外戚傳一百二司馬遷謂受命帝王蓋亦有外戚之助然任之以政假之以權則未有不為患者也祖宗鍳前世之禍徒尊以髙爵寵以厚祿使之貴而無位髙而無民此禍亂之所以不作也於乎規摹逺矣杜審琦定州安喜人也昭憲皇后之兄父曰爽昭憲兄弟五人審琦其長也次審玉次審瓊次審肇次審進世居常山以積善聞鄉里初宣祖自北南來天大寒因避雪於爽之莊院爽見其狀貌甚愛之家人曰當以為四娘子舍居壻四娘子即昭憲也審琦仕後唐終義軍指揮使審玉早卒審瓊建龍初以元舅拜左領軍將軍改左龍武軍大將軍乾德初領富州刺史權判右金吾街仗兼領步軍司事卒年七十贈太保寧國軍節度使諡曰恭僖審瓊性淳質宿衛忠謹人皆稱之景德三年贈太師審肇起家為左武衛上將軍賜第于京師開寶中為右驍衛上將軍出知澶州河大决東匯于鄆濮民罹水害太祖乃免審肇官歸第俄復故官令致仕卒年七十二贈太保昭信軍節度使諡曰溫肅後又贈太傅審進起家為左神武大將軍改右羽林將軍乾德中領賀州刺史知陜州遷保義軍留後拜節度使太祖郊祀于西京審進來朝於是寵賚甚厚遣還任太平興國二年許昌裔者為虢州刺史審進捃其闕失事太宗以右拾遺李幹鞫之幹因請支郡不復𨽻藩鎮皆得專逹支郡不𨽻藩鎮自此始也太宗征太原審進老矣願率所部擊賊不許太宗幸大名勞軍留審進巡徼京師復歸陜拜右衛上將軍領靜江軍節度使太宗耕籍田加開府儀同三司卒年七十九贈中書令諡曰恭惠審進鎮陜二十餘年勸農敦夲民庶便之然居富貴略無驕矜之色人服其醇厚又贈尚書令追封京兆郡王諸子彥圭彥鈞彥彬皆為顯官王繼勳孝明皇后之同母弟也國初以后故為內殿供奉官纍遷龍捷右廂都指揮使領彰州防禦使太祖將伐蜀命繼勳戒期將大閲繼勳素與馬仁瑀不相善太祖為出仁瑀密州繼勳尋遷保寧軍留後權領侍衛步軍司事繼勳所為不法㑹新募兵千餘人𨽻雄武多無妻子繼勳縱令都下掠人子女太祖聞之大怒捕得百餘人斬于市時后已崩太祖念之故繼勳得免也其後復為部下所訟太祖罷其兵柄以為彰國軍留後繼勳自以失職常怏怏專以臠割㚢婢為樂太祖怒削其官爵流于登州未至以為右監門衛率府副率開寶中分司西京繼勳殘忍愈甚彊市民家子女以備給使小不如意即殺而食之太宗即位人有訴其事者詔鞫之遂棄市僧惠廣者嘗與繼勳同食人肉太宗先令折其脛而後斬之賀令圖父懷浦孝惠皇后兄也仕軍中為散員指揮使出為嶽州刺史領兵屯三交從楊業北征死之令圖少謹願太宗在藩邸得𨽻左右及即位以為供奉官改綾錦副使知莫州遷崇儀使知雄州領平州刺史為幽州行營壕寨使以所部克涿州㑹父死起為六宅使本州團練使護瀛州屯兵初令圖握兵在邉十餘年恃舊恩每入奏事輒言幽薊可取太宗信之遂有岐溝之敗令圖貪功而寡謀虜將耶律寧號于越者使人紿令圖曰我獲罪夲國願歸南朝無路可拔君侯幸留意焉令圖信之既而于越率衆入寇王師敗于君子館于越傳言軍中願得見雄州賀使君令圖謂其來降即引戲下數十騎逆之將至其帳于越據胡床罵曰汝常好經度邉事乃來送死耶麾左右縛令圖以去令圖時年三十九劉美字世濟益州華陽人也夲性龔章獻明肅皇后之父曰通少𨽻軍籍建隆初征嶺南有功為虎捷都指揮使領嘉州刺史從征太原道卒美以煆金為業真宗為襄王時后自蜀來因張耆以進耆得之美所真宗即位以后為美人乃更美姓以為后兄補三班奉職遷右侍郎石保吉之在陳州也大治廨舍修城壁不以聞㑹有言其擾民者遣美察其事美曰保吉受國恩列藩閫營繕過度誠有之自餘保無他患真宗意乃解還朝為閣門祗侯護兵屯於漢州徙嘉州召還提㸃在京倉場后正位中宫遷南作坊使天禧初遷洛苑使領勤州刺史授龍神衛四廂都指揮使改侍衛馬軍都虞候遷武勝軍留後以卒年六十贈太尉昭德軍節度使其後章獻臨朝父通纍贈太師封魏王李用和字審禮章懿皇后母弟也少窮困劉美得之於民間奏以三班奉職章懿薨除禮賓副使纍擢慶州觀察使遷永清軍留後為真定府定州路副都總管舊制公使錢正任以上許私用而用和悉以為軍費不留于家慶歷二年拜建武軍節度使殿前副都指揮使以老拜宣徽北院使改鎮彰信加同平章事進南院使兼侍中卒年六十二贈太師中書令追封隴西郡王諡曰恭僖用和起民間以帝舅位將相而小心避權勢闔門謝客此其所長也諸子璋瑋有聞璋字公明初補三班借職歷閣門祗候遷閣門使龍神衛四廂都指揮使象州防禦使拜天平軍留後知澶州改曹州河决澶淵坐降邢州觀察使復為留後拜武勝軍節度使為殿前副都指揮使仁宗宴近臣于羣玉殿酒酣命酌二大盞飲韓琦及璋如有所屬者仁宗崩執政欲京城增甲士璋曰素隊例也不可昜時禁衛相告故事內給食物中有金既而果賜食衆視之無有也紛紛以為言璋呼什長謂曰爾曹衣食縣官而敢喧乎喧者斬衆乃定徙鎮建雄為殿前都指揮使出知鄆州應天鳯翔府許鄧郢三州歷鎮武成鎮安振武卒年五十三贈太尉諡曰良惠瑋尚仁宗女兖國公主拜駙馬都尉為西京左藏庫副使纍遷濮州團練使安州觀察使瑋貌寢與主不協而瑋所生母又忤主意主夜叩禁門入訴於是諫官司馬光上疏曰臣聞太宗時姚坦為吳王宫翊善每諫王過失左右教王詐疾不朝太宗召王乳母問起居狀乳母曰王以姚坦檢束嚴故成疾耳太宗怒杖之數十太宗非不知愛其子也誠以愛之則莫若納之於善若縱其所欲不忍譴呵適所以害之也齊國獻穆大長公主太宗之女真宗之妹陛下之姑於天下可謂貴矣然獻穆公主仁孝謙恭備盡婦道愛重其夫無妬忌之行至今天下稱婦德者以獻穆公主為首臣謂陛下教子以義宜以太宗為法公主事夫以禮宜以獻穆為法今陛下曲徇公主之意使之無所畏憚陷入於惡將何以行四方之風垂來世之則乎已而公主不安於李氏詔瑋出知衛州公主入居禁中而瑋母楊歸其兄璋散遣其家人光言陛下追念章懿皇后故使瑋尚主今乃母子離㭊家事流落陛下獨無雨露之感悽惻之心乎瑋既責降公主亦不得無罪仁宗感悟詔公主降封沂國待李氏恩禮不衰未幾主徙封岐國瑋復拜駙馬都尉主薨瑋坐奉主無狀貶郴州團練副使陳州安置遇赦還京師纍拜節度使歷鎮建武平海元祐八年卒張堯佐字希元河南人也溫成皇后之從父舉進士歷憲州筠州推官嘗知管城縣稍遷三司户部判官又為副使擢天章閣待制知開封府加龍圖閣直學士除端明殿學士拜三司使是時諫官御史言堯佐主大計諸路困於誅求內帑疲於借助仁宗方祀明堂問以經費堯佐曰固已辦矣皇祐二年除淮康軍節度使群牧制置使宣徽南院使景靈宫使於是知諫院包拯上疏曰陛下即位僅三十年奉承祖宗謨訓未有失道敗德之事乃五六年來超擢張堯佐群口竊議于下然而迹其過不在陛下在女謁近習及執政大臣也蓋女謁近習動靜伺陛下之所為而執政大臣不思規陛下以大義乃從諛順㫖髙官要職唯恐堯佐不滿其意以陷陛下私昵後宫之過此豈有愛君之心哉以本朝故事言之昭憲皇后誕生祖宗有基命之烈其弟審進窮老才得一節度使雷有終以工部侍郎討平西川止得宣徽使李至於先朝有東宫之舊自工部尚書參知政事裁用為武勝軍節度使錢若水任樞密副使為三司使夏竦自三司使户部尚書止得散節度使後二年方加宣徽使鄭戬亦曾任樞密副使為資政殿大學士二年得宣徽使又一年乃除節度使今堯佐謂之親則孰若杜審進謂之賢而功孰若雷有終李至錢若水之流而宣徽節度使并以與之可乎既而御史中丞王舉正諫官吳奎等彈奏堯佐恩寵太過至留百官班廷議遂罷宣徽景靈二使三年復以宣徽南院使徙鎮天平卒年七十二贈太師堯佐慿戚里以進而家法不修為世所鄙云曹佾字伯容慈聖光獻皇后兄也初為右班殿直慈聖位中宫遷左侍禁閣門祗候纍拜鄆州觀察使遷安化軍留後除建武軍節度使宣徽北院使嘗知澶青許鄆州改鎮保靜又改保平加同平章事景靈宫使兼侍中拜護國軍節度使守司徒兼中書令中太一宫使封濟陽郡王國朝以來異姓未有兼中書令者贈官則有之生除中書令惟佾而已神宗一日敕中使召之見於便殿與同至慶壽宫慈聖愕然遽止之曰外戚自來未有輒入禁掖者安可以我開其端神宗曰聊以慰骨肉之情他人固不可也時左右已預辦宴具神宗親奉觴慈聖自酌酒以授佾佾跪飲之次則鈞天盛奏丙夜酩酊而罷以御前紅燭送歸佾愛姬慧夫人者迎門謂曰王何所之而遲留至此耶佾曰吾到天上來耳慈聖崩既免喪佾請郡神宗曰時見舅如面慶壽宫奈何欲逺朕得非待遇有不至乎神宗嘗謂大臣曰曹王雖以近親貴然端謹寡過善自保實純臣也哲宗即位加守太保薨年七十二贈太師追封沂王佾為人樂易儀觀頎秀通音律善奕射當英宗神宗哲宗之際以元舅之重其所以尊寵者為當時之冠云子評為平海軍節度使誘安德軍節度使誘子戬戬子湜湜尚徽宗女崇德帝姬髙士林字才卿宣仁聖烈皇后弟也母即慈聖光獻皇后之姊士林以慈聖恩補右班殿直纍遷西頭供奉官進內殿崇班士林將家子獨喜儒學閲經史能通其㫖英宗嘗以謹守法律四字誨之曰能此則為良吏矣士林官至德州刺史治平中卒神宗即位贈昭德軍節度使子公繪公紀由戚里至節度使皆有賢稱向宗回字子發欽聖憲肅皇后弟也自幼侍禁用后恩擢溫州刺史哲宗時遷至相州觀察使徽宗即位除彰德軍留後欽聖垂簾拜安國軍節度使徙鎮保信鎮南建中靖國初封永陽郡王改鎮寧海大觀初詔曰朕以欽聖憲肅皇后受哲廟之顧託黜相臣之異心援翊沖人付畀神器親屬未加褒顯其議所以崇報之遂除宗回開府儀同三司進封安康郡王移鎮保平徙王漢東二年有告宗回帷薄不修者令開封府鞫治御史中丞吳執中臨問召所使季吹笙引宗回女并張響鐡等驗問具得其實遂以太子少保致仕執中言陛下以宗回元舅之故不忍致之法奈天下何詔曰宗回於欽聖憲肅皇后為親弟朕以噬膚之恩不忍行法其削奪在身官爵郴州安置行一二日追還逾年盡復故職宗回性驕然以才稱卒年六十三諡曰榮縱宗良字景弼以后恩授右侍禁纍擢秀州刺史哲宗時遷至利州觀察使徽宗即位遷昭信軍留後欽聖垂簾拜奉國節度使與兄宗回同宣制徙鎮清海封永嘉郡王始蔡京交結宗良兄弟及內侍裴彥臣外議訩訩及欽聖還政宗良尚與政諫官陳瓘上疏曰宋有天下一百四十一年矣太平之久堯舜三代乃至漢唐皆不及也祖宗以聖繼聖古無有也母后繼有聖德亦古無有也宋德方隆內外無患然而以臣所聞宜與戒者有一事焉恐陛下未之知也皇太后未之知也向宗良兄弟交通賓客漏泄機密陛下與皇太后知之乎陛下受天眷命皇太后有定大策之功陛下永思所以圖報而已假借外家豈足以為報乎宗良等依倚國恩慿藉慈䕃夸目前之榮盛不念倚伏之可畏所與游者連及侍從希寵之士願出其門遂使物議籍籍或者以謂萬幾之事黜陟差除皇太后至今尚預政也自古戚里侵權便為衰世之象外家干政即是亡國之夲臣區區之言有益於朝廷有補於外家此國家治亂之機也徙鎮鎮東武寧大觀二年移寧海加開府儀同三司請老不許宗良既貴母董氏年九十尚無恙封燕國太夫人宣和元年董氏卒明年有詔起復制曰念先后之同氣惟仲舅之獨存宗良固辭喪未除而薨年六十六贈少保東都事略卷一百十九
