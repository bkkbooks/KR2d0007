body:
  text: 東都事略卷一百二十三宋王稱撰附録一甚矣中國之有夷狄也蠻夷猾夏見於堯舜之時昆夷玁狁見於文王之世夫堯舜文王帝王之盛也夷狄猶未盡率服則後世可知矣在漢則有丐奴之強而唐亦有突厥回紇吐蕃之暴漢唐尚然則非漢唐又可知矣太祖受命夷狄畏威不敢犯塞太宗既下太原乃移兵幽薊自是有契丹之師矣李繼捧以靈夏之地歸吾職方而繼遷因以叛亂至真宗之世契丹直抵澶魏真宗决䇿親征一戰而勝與之講好于時繼遷亦死德明請命於是兩邊晏然自三代漢唐以來蓋未有也寶元慶厯之間元昊謀僭契丹生釁北邊既已再和而西師旋亦解嚴且叛則討之服則綏之此仁宗甚德而度也神宗雄材大略有開拓四夷之志雖復地於熙河尋敗師於靈武逮至元祐力主和戎之議紹聖復建用兵之䇿蔡京既收湟鄯王黼謀取燕雲馴致金兵擾我甸服斫喪帝室屠害生靈而二聖俱北狩矣可不痛哉此其服叛去來為中國利害者也其它四夷在祖宗時率皆慕義向化且不為中國利害者則皆闕而不書遼國即契丹也蓋東方之國在潢水之南本鮮卑之舊地也自後魏以來名見中國初契丹之先有一男子乘白馬一女子駕灰牛相遇於遼水之上遂為夫婦生八男子一男子即逹呼哩氏也八子為八部一曰逹爾扎二曰伊斯琿三曰舍琿四曰諾爾威五曰頗摩六曰納古濟七曰濟勒勤八曰實衮部之長號大人常推一人為王得建旗鼓唐光啓中其王欽德侵略韃靼奚室韋而役屬之欽德衰諸部以邪律色勒迪少子安巴堅代為王安巴堅強併八部為一部乃僭稱皇帝自號天皇王稱年曰神冊龍德天贊云唐天成元年安巴堅死德光立二年改元天顯陷營平二州晋髙祖立求援於德光割幽薊十六州與之乃以德光所居為上京臨潢府幽州為燕京幽都府渤海國為東京遼陽府天福三年改元曰㑹同國號大遼開運四年德光南牧度河還至欒城死托雲之子烏雲立名璟改元曰天祿自稱天授皇帝立五年以弒死周廣順元年德光子齊王舒嚕立名明改元曰應厯自稱天順皇帝顯德六年世宗復三關舒嚕喜睡國人目曰睡王七年與河東連兵冦鎮定恭帝命我太祖北征俄聞太祖即位驚曰中國有英主矣於是遁去開寶三年庖人因舒嚕醉而殺之烏雲之子明記立更名賢改元曰保寧自稱天贊皇帝立時九嵗七年其涿州刺史耶律琮以書遺雄州孫全興乞修好其書有云臣無交於境外言則非宜事有利於國家専之亦可全興以聞太祖命以書答之遂遣其臣克實克舒蘇來聘太平興國二年復遣使來賀太宗即位四年改元曰乾亨太宗征河東遣使起居隨冦石嶺關以援太原為郭進所敗王師既平河東遂北征勒兵幽州而還明年冦雄州太宗復北征師次大名遂遁去明記立十五年而死諡明孝成皇帝有子三人隆緒隆裕隆慶梁王隆緒立年十二自稱天輔皇帝尊母燕燕為承天皇太后改大遼為大契丹國燕燕専國政以三萬騎來冦潘美擊敗之日利月利等十一族七萬餘帳內附降者又三千帳獲羊馬萬計八年改元曰統和諸將言契丹主幼國事皆決於母大將韓德讓寵幸用事國人嫉之請乘釁以取燕薊太宗以為然雍熙三年以天平節度使曹彬將幽州道行營前軍出涿州河陽節度使崔彥進副之馬軍都指揮使米信將幽州西北道行營之師出雲中代州觀察使杜彥圭副之步軍都指揮使田重進將定州路行營之師出飛狐口蘄州刺史談延美副之忠武軍節度使潘美將雲應寰朔州行營之師出鴈門雲中觀察使楊業副之曹彬克固安城又下新城重進戰飛狐南斬首五百級美攻寰州降其刺史趙彥文克涿州美進圍朔州其節度副使趙希贊以城降敵萬騎來援飛狐口重進大破之擒其大將大鵬翼康州刺史馬頵馬軍都指揮使何萬通又戰涿州南斬首千餘級殺宰相扎色茂遂圍應州其節度副使艾正以城降重進攻飛狐下之又下靈丘美克雲州吐渾節度副使党承德來降重進圍蔚州押牙李存璋等以城來降潘美已下寰朔雲應重進得山後要害之地曹彬之將聞美等屢勝自以領重兵而功少遂欲徼功彬不得已裹五十日糧再趨涿州且行且戰歷二十日始至城下屬盛暑士卒疲乏不能進還至岐溝契丹躡戰王師遂敗彬宵涉拒馬河營於易水之南彥進回軍亦為契丹所敗因詔美部遷雲應寰朔四州之民五萬戶及其吐渾突厥三部落安慶等族八百餘帳分處河南既而燕燕與其大臣耶律漢寧南北皮室及烏雅特哩衮衆十餘萬陷寰州楊業與戰於陳家谷死之是嵗侵易州又冦代州四年復侵三關瀛州帥劉延讓戰於君子館敗績先鋒賀令圖髙陽將楊重進死之遂陷易州又侵定逺軍端拱元年侵滿城大將郭守文李繼隆等與戰於唐河敗之斬首萬五千級獲馬萬匹繼隆部送糧草入威虜軍為敵將裕恱邀戰巡檢使尹繼倫襲破于唐徐二州之間殺其大將皮室裕恱遂遁去敵將韓德威率數萬騎誘党項勒浪嵬族不六大首領馬尾等自振武入侵府州折御卿大敗其衆於子河漢勒浪等族反攻其後敵衆大潰死者什六七於是勒浪等族悉款塞內附至道元年侵雄州何承矩敗之梟鐡林大將一人咸平二年大侵鎮定真宗親征次大名知府事折御昌等引兵入五合川破拔黃太尉寨三年冦瀛州髙陽帥康保裔戰于裴村死之大將范廷召追擊於莫州東斬首萬餘級奪其所掠老幼數萬真宗還京師復侵威虜軍何承矩自雄州界河率師攻平州以牽其勢鎮定行營帥王顯等亦以大軍至遂破敵二萬餘衆斬統軍鐡林等十五人六年復侵定州鎮定髙陽關三路帥王超敗之於望都南既而敵衆數萬至副帥王繼忠戰于康林陷焉景德元年舉國大入分冦威虜順安軍又侵北平總管田敏等破之又侵定州駐陽城淀假王繼忠為書抵莫州請和真宗謂宰相畢士安等曰和戎之利自古有之然夷狄變詐未可信也士安等曰比來降敵皆言國中恐陛下復有幽燕之舉又鋭氣屢挫而退歸無名其請和固不為疑於是遣右班殿直曹利用持書答之然敵益進攻圍瀛州利用至大名而知府事王欽若留不遣真宗北征繼忠又奏契丹兵不敢劫掠以待王人而王人不至乃詔欽若遣利用敵復進兵陷德清軍攻澶州伏弩發射殺其貴將順國王達蘭遂大潰利用乃與其飛龍使韓杞見行在議盟又遣右監門衛大將軍姚柬之獻御衣飲食真宗御行宫南燕從官召柬之與因遣使交馳誓書真宗謂輔臣曰初欲令石晋楊延朗邀其歸路而以精兵踵其後腹背擊之可無噍類矣然兵連禍結何時已哉故徇其請以休息天下之民若彼自渝盟以順伐逆覆亡之殆未晚也眀年令雄霸州安肅軍置𣙜場以通其貿易自是交遣使賀生日及正旦嵗以為常仍遺以銀絹三十萬又明年其國人上燕燕號曰睿德神略應運啓化法道洪仁聖武開統承天皇太后上隆緒曰洪文宣武至德廣道孝皇帝置中京於七金山下其地本奚王牙帳也大中祥符元年號安巴堅廟曰太祖德光曰太宗璟曰世宗眀曰穆宗賢曰景宗明年燕燕歸政於隆緒未踰月而卒燕燕姓蕭氏宰相思溫之女有機謀善馭左右大臣多得其死力先是蕃民歐漢人死者償以牛馬漢人則斬之仍以其親屬為奴婢燕燕一以漢法論每戎馬南入親被甲督戰及通和亦出其謀然天性殘忍多殺戮與耶律隆運通遣人縊殺其妻又幸醫工特哩衮有私議其醜者輒殺之隆緒畏莫敢言既卒諡曰宣獻年五十七隆運即韓德讓也事明記為樞密使兼行營都統明記疾亟諸子幼大臣握兵在朝隆運不俟召率其親屬赴行帳白燕燕分其兵權明記卒乃立隆緒奉燕燕為皇太后隆運既幸於燕燕又以䇿立功為司徒政事令封楚王賜姓耶律氏改今名又拜大丞相蕃漢樞密使南北面行營都統徙封齊王隆緒親書鐡劵以賜之遷尚書令徙晋王賜不拜乘車上殿置護位百人護位惟其國主得置之隆緒以父事隆運日遣其弟隆慶隆裕一問起居隆運既卒與燕燕同柩而葬無子以隆裕子周王宗業為後初燕燕死隆緒暗弱而隆慶桀黠國人多附之又繕甲兵遣親信以私書交結貴臣隆緒常召之辭以避暑不至其親信録其書抵雄州且言隆緒不能敦睦親族國人皆思歸漢真宗敕邊吏勿報五年改元曰開泰隆緒自遼陽伐髙麗為其所敗將士沒者過半天禧五年改元曰太平真宗崩仁宗遣使告哀隆緒即集蕃漢臣舉哀號慟謂其宰相吕德懋曰與南朝約為兄弟垂二十年今忽報登遐吾雖少兩嵗顧餘生幾何因復大慟又曰聞嗣皇帝尚少恐未知通好始末茍為臣下所間奈何又謂其妻曰汝可致書大宋皇太后使汝名𫝊中國遂令燕京憫忠寺置真宗靈御建道場百日又令國中有犯真宗諱悉令易之隆緒病召東平王蕭孝穆上京留守蕭孝先使輔立其子珠巴克而無失朝廷信誓死於大斧河年六十一立五十年廟號聖宗其妻曰齊天皇后妃曰順聖元妃齊天平州節度使蕭斡實之女耶律隆運之甥有容色隆緒寵愛之事其姑燕燕甚謹燕燕亦以隆運故深愛之燕燕既死乃與國事權勢日盛置宫闈司補官屬出教命號仁慈翊聖齊天彰德皇后齊天善彈琵琶與樂工燕文顯李有福通元妃以白隆緒隆緒不納又為蕃書投隆緒寢中隆緒得之曰此必元妃為之也命焚之隆緒死珠巴克立珠巴克隆緒第八子名宗真母即元妃也以遺令立齊天為皇太后元妃為皇太妃元妃匿之自為皇太后令人誣告齊天謀反坐死者百餘人以小車載后囚於上京未幾縊殺之太后總軍國事改元曰景福明年又改曰重熙加號法天皇太后多殺其功臣専用其兄弟分監南北蕃漢事至其家奴授團練觀察節度使四十餘人幽人無賴者往往願為蕭氏奴初宗真嘗以酒一器賜琵琶樂工蕭氏怒乃加朴箠宗真疑內品所告隂遣人殺之乃下吏雜治宗真語人曰我貴為天子與囚同答狀內不平景祐元年率兵逐其母以黃布車送至慶州使守隆緒冡殺永興軍都統髙常格及內侍數十族命內軍都提㸃王繼恩內侍都知趙安仁監南北面蕃漢臣寮明年加號文武仁聖昭孝皇帝後遊獵過祖州北山見齊天冢泣下初隆緒將死謂宗真曰皇后事我四十年以其無子故命汝為嗣我死汝母子母殺之也宗真追感其言命改葬於安巴堅墓之旁其國人有勸迎其母以覲朝廷嵗聘之物又一日內道場命僧講報恩經感悟遣使迎至中京門外館擇日相見遂為母子如初加號法天應運仁德章聖皇太后然出入舍止相距常十里以隂備之慶厯二年聞趙元昊反遣蕭英劉六符來請石晋所割瓦橋關南十縣以冨弼張茂實往報許嵗增銀絹二十萬語在弼傳明年加號聰文聖武英略睿哲仁孝皇帝上母儀天體道至仁廣德慈順章聖皇太后皇祐元年來告西征明年來告捷又遣使齎其畫像來且言兩國交歡而未嘗識面因請御容許之未及往而死宗真立凡二十五年年四十三諡曰文成皇帝廟號興宗宗真常與教坊使王稅輕十數人結為兄弟出入其家或拜其父母常夜晏與劉四端兄弟及王綱等數十人入樂隊命后妃易衣為女冠后父蕭穆濟言漢官皆在此后妃入戲非所冝也宗真擊碎后父首曰我尚為之若女何人也閒嘗變服入酒肆寺觀尤重浮圖法僧有拜三公三師兼政事令者二十人左右所親信多擢為將相宗真死洪基立嘉祐二年遣使求御容以為後世子孫之誇議者慮有厭勝之術仁宗曰朕待之厚豈有此理哉遣御史中丞張忭送之洪基具儀服迎謁及見御容驚肅再拜退而謂左右曰中國之主天日之表神異如此真聖人也我若生在中國不過與之執鞭捧蓋為一都虞候而已其畏服如此治平二年洪基改元曰咸寧二年改國號大遼至熙寧七年遣蕭禧來言代北對境有侵地請遣使同分畫神宗許之遣太常少卿劉忱為使祕書丞呂大忠為副已而大忠丁家難有詔起復忱對使殿奏曰臣受命以來在樞府考核文據未見本朝有尺寸侵敵地臣既辱使指當以死拒之忱出疆神宗手敕曰敵理屈則忿卿姑如所欲與之忱不奉詔洪基又遣蕭禧來神宗遣中使賜韓琦富弼文彥博曽公亮詔曰朝廷通好北敵幾八十年近嵗以來生事彌甚代北之地素無定封故造釁端妄來理辨比敕官吏同加案行雖圖籍甚明而詭辭不服今橫使復至意在必得敵情無厭勢恐未已萬一不測何以待之古之大政必咨故老卿其具奏琦言敵人見形生疑引先發制人之說又不可謂敵形勢已衰幽薊可復宜遣使報聘厚其禮幣如河北置三十七將此深有見疑之形者也謂宜罷之以釋敵疑弼言朝廷諸邊用兵敵所以先期求釁不若委邊臣詰而嚴備之來則禦去則備親征之謀未可輕舉且選人報聘敵藉吾嵗賜方能立國豈無欲安靜之理彥博言蕭禧之來欲以北亭為界緣慶厯西事未平之時來求黃嵬之地容易與之中國禦戎守信為上必以誓書為證若萌犯順之心當豫備邊使戰勝守固而已若襲幽燕恐將噬臍公亮言敵人畏強侮弱故要控制得術嘉祐間夏國妄認同家堡為界延州牒問遂圍大順冦邊不已絶其嵗賜方始懇求帖服今待敵人極包容矣不使知懼恐未易馴服控制之術毋使倒持夷狄知中國之不可窺則姦謀自息矣時劉忱呂大忠執不可與執政知不可奪乃罷忱許大忠終制於是王安石曰將欲取之必固與之以筆畫其地圖以天章閣待制韓縝奉使盡舉與之蓋東西棄地五百餘里紹聖三年改元曰昌夀洪基號聖文神武全功大略聰仁孝惠天祐皇帝在位四十七年而死建中靖國元年也洪基廟號道宗其孫延禧立東都事略卷一百二十三
