body:
  text: 東都事略卷一百二十四宋王稱撰附録二延禧號天祚皇帝改元曰乾統女真有俊禽曰海東青次曰玉爪駿俊異絶倫一飛千里非鷹鸇鵰鶚之比延禧縦弛失道荒於畋獵喜此二禽善捕天鵝命女真國人過海詣深山窮谷捜取以獻國人厭苦遂叛政和元年延禧改元曰天慶遣内侍童貫為國信使遼之君臣相聚指笑曰大宋乏人材如此遣一腐夫為奉使官何邪貫囬至盧溝河有燕人馬植者北朝大族也行汚而内亂燕人不齒乃夜見童貫侍者自陳有滅燕之䇿貫召見大竒之因擁以歸易姓名曰李良嗣薦之於朝浸加顯擢又賜姓趙氏是時遼人與女真交兵已四五年良嗣獻䇿曰女真恨遼人切齒又其主天祚滛荒失道本朝若遣使自登萊州渉海結好於女真不一月可到與之相約夾攻遼國則其國可圖也議者以謂自祖宗以來雖有此海道然以其地邊接諸蕃禁商旅舟舩不許通行㡬二百年矣恐夷人窺伺中國也貫不聽乃遣登州都廵檢馬政與良嗣往使女真約夾攻遼國馬政本熈河人其子擴應武舉有口辨令隨父使女真相約滅遼國之後中分其地㑹大臣有力爭者遂已宣和三年延禧改元曰保大四年延禧悉國中兵與女真大戰而大敗遂陷上京東京延禧徙燕京女真又以精兵攻之延禧裒殘衆與之接戰復大敗與其子趙王梁王遂奔於北界不毛之地由漢陽嶺入夾山初延禧留宰相張琳李處温與秦晉國王淳守燕延禧入夾山國人無主處温與其國人謀立淳淳延禧叔也宗真之孫洪基之妷初洪基囚其子濬欲立淳為儲貳不果已而立延禧淳守燕十二年人號燕王又謂之覃湘大王處温等帥薊京數萬人入燕王府勸進唯張琳有難色曰居攝可矣何必為真處温曰天意人心如此尚可易邪淳出遽以赭衣被之遂即位以處温守太尉左企弓守司徒曹義勇知樞宻院虞仲文參知政事張琳守太師十日一朝平章軍國大事雖外以元老尊之實處温不欲其在上也淳號天錫皇帝改保大四年為建福元年廢延禧為湘隂王遼國自此分矣童貫知延禧失國乃請兵北伐徽宗以貫為河北河東宣撫使引兵北向徽宗以三䇿付貫如燕人恱而從之因以復舊疆上也如耶律淳納土稱蕃中也如燕民未即恱服按民廵邊全師而還下也貫用劉韐宇文黄中為參謀程唐王序為轉運使而掌行文書者李宗振也宗振本曹州刀筆之吏姦滑而善舞文自陜西開邊貫倚為腹心貫雖有文士為幕屬而裁决機務一委宗振貫又起兵於陜西引种師道為都統制師道宿將也以此舉為非而貫不聽貫聚兵於雄州以五月中旬命种師道與知雄州和詵兵五萬屯於白溝淳遣蕭幹引精兵二萬及常勝軍迎敵幹本奚人蕃名古爾班常統遼國渤海奚人漢人四色軍馬號四軍大王幹引軍𢷬師道右軍右軍潰又犯左軍左軍驚擾師道遣楊可世率驍銳五千人過橋北擊遼之中軍遼軍乃囘而楊可世身被重創師道軍已沮遂引軍夜遁邌明蕭幹以騎兵五千尾擊之師道與詵度河而走徽宗以燕薊未可下乃詔班師淳以書責貫輒敗祖宗信誓於盛夏之日舉無名之師已為吾擊退今欲如何貫不能對㑹淳已病延禧自夾山𫝊檄天徳雲内等州㑹諸蕃五萬騎約以八月入燕李處温蕭幹等議曰莫若迎秦拒湘湘者延禧而秦者延禧次子也令百官從吾議者東立獨南面行營都統耶律寧趨西處温問其故對曰若天祚果能興復力足舉燕是天數何以拒之如其不然秦湘父子也今迎子而拒父豈理也哉處温奏曰寧搖衆請誅之淳撫几歎曰此忠臣也豈可殺之天祚果能來吾有死而已將何辭以相見延禧兵出漁陽嶺僅復豐應等州又為女真所敗其元妃諸王皆被虜再奔夾山淳疾亟乃授李處温蕃漢馬歩軍都元帥欲以後事託之蕭幹達實林牙等言處温恃翊戴之功輕侮僚屬若令授此職吾軰得以安乎乃矯詔召宰相左企弓曹勇義虞仲文康公弼等以侍病為名共議此事獨處温不至而處温隂聚武勇二千人從間道乞王師為援是夕淳卒祕不發喪蕭幹㑹百官於毬塲議宣言曰今上無嗣欲立皇后蕭氏權主軍國事奉迎天祚次子秦王為帝從吾議者書之羣臣無敢異者蕭后遂即位改建福元年為徳興元年蕭后者淳妻秦晋國妃也以幹有援立功封為越王乃召處温欲斬之處温來后以時方多艱不欲誅大臣但毁其元帥宣劄而已延禧聞淳死下詔奪其官封妻蕭氏降為庻人貫聞淳死耻兵敗思立功以報天子謂遼國既無主有間可乗復自莫州囘雄州奏乞益兵王黼為太宰力主再興師之議為貫大發陜西將兵及鄜延路副緫管劉延慶赴貫戱下期九月㑹於三關貫與蔡攸謀再舉㑹女真已破雲中府扣居庸關勢已盛改號大金國乃移文於貫詰問元約夾攻遼國何為背約不進兵貫恐懼遂定議大舉常勝軍首領郭藥師叛以涿州來降易州聞涿州降亦降蕭幹聞王師再壓境自燕來涿州藥師疑幹圖已使人諭之幹怒曰吾嘗薦爾於朝豈可背邪藥師乃不敢加害幹亦慮禍及身遽起啟鑰而去幹見蕭后俯伏待罪蕭后曰卿與諸將早為措置收復涿易多方招誘善之善也蕭后既失涿易州又聞貫攸益兵欲與金人夾攻燕薊知不能立國乃遣使韓昉齎表詣貫以降願稱臣稱貢貫攸不納昉謂貫攸曰女真人素性强悍樂于戰爭豈可與之為隣他日必悔大朝不要錯貫攸叱囘遂以十月進兵命劉延慶為都統制統兵十萬自白溝入界令郭藥師為選鋒延慶行至良鄉蕭幹率萬人迎擊延慶與戰不利遣大將髙世宣與藥師入燕山蕭幹留精兵三千人在城中與藥師巷戰藥師敗走世宣死之藥師徑走涿州延慶聞敗亦棄大將旗鼓而走是嵗金國主阿固達以銳兵入居庸關晡時至燕京蕭后聞居庸關失守夜率蕭幹等并老㓜出城聲言迎敵實出奔也蕭后欲歸我以求全未果而金國逰騎已至城下統軍蕭乞信開啟夏門納金人於是左企弓虞仲文曹勇義劉彦宗并蕭乞信等皆降蕭后奔松亭關與大臣共議所向達實林牙遼人也欲歸天祚蕭幹奚人也欲歸奚王府立國有蕭博迪者淳之婿也曰今日固合歸天祚然胡顔見之達實林牙怒曰爾敢異議邪即斬之令軍中曰此不欲歸天祚者於是遼人與奚人列陳而分遼軍從蕭后與逹實林牙趨夾山歸延禧延禧斬蕭后而赦逹實林牙奚人與渤海軍從蕭幹留奚王府遂僭號大奚國稱神聖皇帝改元曰天嗣阿固逹死童貫蔡攸帥師入燕撫定奚人嘉勒斡領衆出盧龍嶺攻陷薊州冦掠燕城王安中為燕山宣撫使命郭藥師領兵破之大戰於峯山獲耶律徳光尊號寳檢契丹塗金印幹既大敗奚渤海軍皆失其家歸怨於幹其部伯特赫殺之𫝊首京師時宣和六年也延禧得逹實林牙七千餘騎又隂結韃靼毛褐室韋三萬騎助之延禧謂中興有日欲搗山後之虚復燕雲地林牙諫曰不可自車駕奔夾山不能一戰今舉國為金人所有乃欲嬰其鋒非計也不如蓄銳待時無輕舉延禧不聽林牙稱疾不行延禧彊率諸軍出夾山越漁陽嶺取天徳軍東勝寧邊雲内等州南侵武州遇金人烏舎軍烏舎帥山西漢兒鄉兵為前驅以女真千餘騎伏山間乃出韃靼等顧之大駭而潰烏舎遣羅索貝勒領五百騎擊之延禧跳身投夏國未至伏發烏舎下馬跽於延禧前曰奴婢不佞乃以介胄犯皇帝天威死有餘罪因奉觴而進遂為烏舎所擒削封海瀕王送長白山東築城居之後踰年而卒遼國自安巴堅剙業徳光恢廓疆宇其後併吞諸蕃割據漢界南北五千里東西四千里子孫相繼二百餘年嘗與中國抗衡㑹無一日秋毫之警至延禧失道金人稱兵首尾攻戰十有六年卒以亡國云臣稱曰昔尹洙之叙燕曰戰國世燕最弱二漢叛臣恃燕挾敵蔑能自固以伯圭之強卒制於袁氏獨慕容乗石虎亂乃并趙雖勝敗異術大槩論其強弱燕不能加趙魏趙魏一則燕固不敵唐三盗連衡百餘年敵未嘗越燕侵趙魏是燕獨能支敵也自燕覆於敵敵日熾大顯徳世雖復三關尚未盡燕南地國初敵與并合勢益張然止命偏師備禦王師伐蜀伐夏泰然不以兩河為顧是趙魏足以制敵明矣并冦既平悉天下銳専力於敵不能擾尺寸地嘗以百萬衆駐趙魏訖敵退莫敢抗世多咎其不戰然我衆負城有内顧心戰不必勝則事亟矣故不戰未當咎也原其弊在兵不分設兵分為三壁於爭地掎角以疑其勢設覆以待其進邊壘素固驅民以守之俾其兵頓堅城之下乗間夾擊無不勝矣蓋兵不分有六弊使敵蓄勇以待戰無他榰梧一也我衆則士怠二也前世有善將兵者必問才智能將㡬何今以中材盡主之三也大衆儻北彼遂長驅無復顧忌四也重兵一屬根本虚弱纎人易以干說五也委大柄不無疑惑復命貴臣監督進退皆由中御失于應變六也兵分則盡易其弊是其六利也且勝敗兵家常勢悉内以擊外失則舉所有以棄之符堅肥水哥舒潼關是也則制在謀不在衆矣以趙魏燕南益以山西民足以守兵足以戰分而帥之將得専制就使偏師挫衂他衆尚奮詎能繫國家安危哉師覆於外而根本不搖者善敗也昔者六國有地千里師敗於秦散而復振㡬百戰猶未及其鄙守國之固也陳勝項梁舉關東之衆朝敗而夕滅新造之勢也以天下之廣謀其國不若千里之固而襲新造之勢徼幸於一戰庸非惑哉今兵乆弛士大夫誦聖言謂百世不復用非妄也然兵果廢則已設後世復用之鑒此少以悟世主故迹其勝敗焉李清臣亦有言臣使雲中道涿幽媯蔚愛其形勝毎私自歎息恨其為敵國有自石晋以十六州賂契丹凡漢唐所以御敵國者反為彼用非契丹實強中國亂也我失其地而累朝不能復以天下之大而栗焉嘗憂冦盗之至非特人謀弱亦地形然也烏虖真宗以禮幣結隆緒仁宗以信義懐宗真聖人一視同仁兼愛南北蓋如此至延禧立乃畋㳺無度虐用其衆喜海東青以搏天鵝好樂無厭遂以覆國書曰内作色荒外作禽荒其延禧之謂與東都事略卷一百二十四
