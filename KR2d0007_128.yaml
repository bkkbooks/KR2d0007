body:
  text: 東都事略卷一百二十八宋王稱撰附録六諒祚既立而幼弱國中大亂有欲勸仁宗舉兵以收復靈夏者仁宗曰朕為天下主豈可利人之喪舉兵快意乎遂冊諒祚為夏國主其後訛厖自以女妻諒祚有李守貴者嘗與遇乞掌出納寶保細吃多已者嘗侍曩霄及沒藏尼於佛舍故出入無所間沒藏尼既通守貴又通吃多已李守貴殺吃多已及沒藏尼訛厖乃族守貴獨護養諒祚訛厖子婦梁氏諒祚私焉訛厖患之梁氏密告訛厖將叛諒祚乃舉兵誅訛厖滅其族并殺其妻沒藏氏而以梁氏為妻命其弟乞埋為家相諒祚凶忍好為亂時過酋豪大家輒私其婦女故下多怨及變蕃禮從漢制嘉祐六年諒祚上書自言慕中國衣冠明年當以迎漢使者仁宗許之治平三年舉兵犯慶州又冦大順城諒祚乘駱馬張黃屋自出督戰為官兵與熟戶蕃官趙明合擊之諒祚中流矢兵折而去朝廷遣使詰責之諒祚上表謝罪明年种諤取綏州城之諒祚僞乞㑹盟誘殺知保安軍楊定而朝廷命韓琦知永興軍經略西方而諒祚乃送殺定者李崇貴韓道喜以獻納塞門安逺寨乞綏州洎遣使分畫乃曰地界非納而所納者寨也朝廷知其詐遂城綏州為綏德城崇貴等未至而諒祚死子秉常立神宗冊為夏國主熙寧三年來犯慶州又犯大順王師不利命韓絳宣撫陜西絳城囉兀築撫寧堡夏人乃陷撫寧急攻囉兀絳等命諸路牽制慶兵再出而亂乃棄囉兀撫寧元豐四年种諤言秉常被殺乞興師問罪又諜言母梁氏屢勸秉常不行漢禮秉常不從有李將軍者為秉常誘漢倡婦樂人梁氏置酒執李將軍殺之囚秉常國人乖亂事聞詔興師問罪遣种諤出鄜延劉昌祚出涇原髙遵裕出環慶李憲出熙河王中正出河東五路㑹於興靈夏人悉其精鋭度河保興靈昌祚之師先至靈州城下多所斬獲遂攻靈州城垂克而遵裕之師至先是詔先得靈州者除節度使而涇原之師入界聽遵裕節制遵裕忌昌祚將斬之命涇原師毋得擅攻而夏人得以為計城不可下遂班師中正入宥州憲追襲過天都山至囉逋山乃還取蘭州城之皆不至興靈种諤以鄜延之師城細腰吳堡義合塞門米脂五寨河東城葭蘆吳堡二寨种諤復建言盡城橫山遣徐禧計議禧請城永樂夏人來攻城陷徐禧李稷李舜舉死之乃築汝遮堡展定西城以衛蘭州六年來請和許之七年舉國圍蘭州詔邊吏用淺攻擾耕秉常遣使入貢乞還土疆不許神宗崩哲宗即位遣使謝罪來賀登寶位又以地界遣泛使至京師秉常卒子乾順立元祐二年遣劉奉世崔象先冊乾順夏人復以地界為詞不復入謝且犯涇原鎮戎軍又侵德靖寨又犯塞門寨四年乃復遣使謝封冊且議地界朝廷許還葭蘆米脂浮圖安疆四寨仍先以嵗賜豫之是嵗以永樂陷沒人口來歸却欲同日交領四寨詔鄜延帥趙禼與夏人分畫地界熙河帥范育請先畫疆界後歸四寨議未定而四寨棄禼又乞地界依綏州故例於城之外取二十里仍半以為生地夏人不從遂犯涇原會禼卒夏人由河東入冦攻圍麟府州朝廷乃議絶嵗賜禁和市使沼邊諸路為淺攻計命熙河進築定逺城夏人不能爭未幾復冦環慶使熙河進築汝遮城八年乾順遣使謝罪獻蘭州乞賜塞門寨詔答以夏人自元祐通貢受賜後來纍次犯邊仍候諸路地界了日可依例别進誓表然後常貢嵗賜並依舊宣仁后崩乾順進奉山陵馬一百匹紹聖二年詔熙河蘭岷鄜延河東路地界令諸路㳂邊當職官司更不商量分畫只以巡綽卓望處守把牒報夏國先是元祐初諫議大夫孫覺議棄蘭州其後司馬光謂此數寨者田非肥良不可以耕墾地非險要不可以守禦欲因天子繼統悉皆毁撤歸其侵地劉摯謂供給戍守窮竭財力其最大者莫如蘭州不若捐一空城與之至於鄜延河東等路近置堡寨深詔大臣早有定計趙禼欲留塞門安逺二寨其餘或存或廢乞密降畫一付臣遵守吕陶謂實於邊防無分毫之益范純粹謂收復故寨廢州略無所利乞令以虜陷官吏丁夫悉歸朝廷而所削之地並從給賜純仁之論亦然蘇轍謂增置州寨坐困中國願决計棄之王存謂夏國疆地終久難守王巖叟謂自有葭蘆吳堡兩寨守之無所得棄之不足惜文彥博謂邊臣欺罔為國生事第恐不能持久却須自棄不若推恩賜豫遂降詔除元係中國及西蕃舊地外候送到陷沒人口當就委邊臣分畫給賜及夏人送還永樂陷沒人口尋給賜米脂安疆浮圖葭蘆四寨仍約以委官畫定界至至是章惇為相欲開邊隙以謂十年之間含容備至而夏人犯邊如初遂罷分畫之議夏人遂犯義合寨及圍逼塞門寨又犯德靖順寧寨章楶以涇原及熙河環慶秦鳯四路之師出瓠蘆河築二城於石門硤夏人來乘我師大敗之既而環慶鄜延河東熙河皆築城夏人􅌓視不敢動楶又以折可適郭成之師大敗之於雞靶嶺吕惠卿以其將劉安苗履大破之於大沙堆既又乾順與其母自將數萬圍新築平夏城凡十四日晝夜攻城守益堅乃造髙車以臨城載數百人填壕而進俄大風震折之一夕遁去折可適執其統軍嵬名阿埋監軍妹勒都逋進築西安城於天都山建西安州諸路進築悉已畢工乾順上表歸順崇寧三年復冦涇原我師取其銀州五年乾順納款大觀閒環慶蕃將李遇昌及其父訛移叛歸其國漸用事引夏人入冦徽宗因遣童貫為陜西經略制置使貫出討溪哥臧征僕哥城復積石軍洮州政和中夏人又深入過定邊軍築城佛谷口名洪夏軍貫以种師道之師平之夏人來救又敗之遂破臧底河成德軍七年夏人圍丁星原築平陽瞎令古仁多泉及靖夏制戎伏羌等城重和元年貫出師收割牛城王師敗績大將劉法戰沒貫以种師道劉仲武劉延慶將兵至蕭關取永和寨割踏寨鳴沙㑹大敗夏人而還初夏國恃橫山諸族帳彊徑善戰故用以抗中國种諤謀取橫山故興靈州之師及王師失利李憲始獻進築之議神宗厭兵不克行童貫舊常從李憲得其倣佛故獻議進築遂領六路邊事將諸路兵六七年進築軍壘建立堡寨遂得橫山之地夏人失所恃遂納款夏國自是少衰矣宣和中夏人知中國有事北邊遂與遼國書約夾攻中國天祚不聽金人既滅遼夏人乃與尼堪約犯塞尼堪犯欣代踰石嶺關圍太原夏人犯豐麟二州靖康元年夏人知我戍邊士卒入援遂乘虛犯河外冦震威城朱昭死之又取西安州陷懷德軍劉銓杜翊世以城死臣稱曰自繼遷死德眀款塞西鄙息肩矣元昊强梁凶悍乃謀僭尊以天下之力而臨區區之一方然未嘗少挫其鋒及其敗於女色禍發其子且彼能叛君而子亦能弒父此天道也烏呼夏小國也自元昊以來服叛不常而每為中國之患雖有智者為之謀而亦莫能以得志何哉大氐國大則有所恃而不戒故其彊易弱國小則無所恃而常懼軍民之勢猶一家也相恤相救謀慮日深故其弱為難犯此其所以為中國之患與東都事略卷一百二十八
