body:
  text: 東都事略卷一百三十宋王稱撰附録八交趾本南粵之地漢武帝平南粵分其地為儋耳朱崖南海蒼梧鬱林合浦交趾九真日南凡九郡置交趾刺史以領之後漢置交州晋宋齊因之又為交趾郡梁陳亦因之隋平陳廢郡置州煬帝廢州為郡唐改交州總管又改安南都護五代之際有曲承美者以土豪専有其地劉龔遣將伐而執之并其地後有楊延藝受劉氏爵命延藝為其牙將皎公羡所殺延藝故將吳權攻交州殺公羡遂居其地權死子昌岌立昌岌死其弟昌濬立昌濬死牙將爭立境內大亂初楊延藝以牙將丁公著攝歡州刺史部領即其子也公著死部領繼之部領與其子璉率兵平境內部民推以為帥號曰大勝王以其子璉為節度使凡三年璉襲父任太祖既下嶺南璉遣使內附授靜海軍節度使安南都護開寶八年封部領為交趾郡王太平興國初部領及璉皆死弟璿尚幼大將黎完幽丁氏宗族代揔其衆太宗怒以蘭州團練使孫全興八作使張濬左監門衛將軍崔亮將兵伐之黎完為丁璿表求襲兄位不報是時王師大破交趾兵斬首萬級又破其兵於白藤江口轉運使侯仁寶帥前軍先進為交趾所殺遂班師孫全興亦坐誅丁璿遣使謝罪八年黎完廢丁璿自稱交州三使留後遣使請命太宗因而撫之喻以丁氏𫝊襲三世朕欲令璿為統帥以爾副之若璿將材無取猶有童心則宜遣其母子及親屬來歸俟其入朝却授爾以節旄凡兹二途爾宜審處其一是時黎完已専據其地不聽命雍熙中上表求正領節鎮太宗因授以靜海軍節度使南安都護遣其子明提入貢景德二年卒子龍鉞立其弟龍延殺之自立於是諸子爭立境內大亂羣臣多請伐之真宗曰未加弔恤而伐其喪豈王者所為命邉臣撫安之㳂海安撫使邵曄上雍州至交州水陸圖真宗曰祖宗開疆如此其大守之而已安用勞民以貪無用之土乎若封略之內有叛者則不得不除耳未幾龍延上表請命又遣其弟明昶來遂授以靜海軍節度使賜名至忠至忠苦虐其大校李公藴常隂贊之故特見親信因令冒姓黎氏大中祥符二年至忠卒弟明提明昶爭立公藴發兵皆擊殺之自稱留後請命於朝真宗曰初黎完劫丁璿自立公藴亦爾然蠻夷豈足以禮義責也遂授公藴靜海軍節度使安南都護封交趾郡王公藴因捕狄獠冦如洪寨詔追所掠生口因戒飭之天禧元年封南平王天聖中令其子弟率衆入冦詔發峒丁討捕未幾而卒年四十四子德政自稱留後來告哀除靜海軍節度使安南都護交趾郡王景祐三年冦雍州之恩陵等州及諸峒略牛馬焚室廬而去詔責問令捕酋領正其罪寶元元年進南平王儂智髙反率兵二萬助王師平智髙詔却其兵而厚賜之久之卒子日尊遣使來告哀即除靜海軍節度使安南都護交趾郡王嘉祐三年來貢異獸曰麟也樞密使田况曰非麟也止云異獸謝答之英宗即位加同平章事神宗即位進南平王加開府儀同三司襲位十八年而卒子乾德嗣朝廷命以靜海軍節度使安南都護交趾郡王沈起知桂州妄意朝廷有攻取之議不能懷輯乃以溪峒㸃集土丁又禁交趾與州縣貿易於是交趾二遂謀入冦熙寧八年乾德大舉兵連陷欽亷二州遂圍雍州知雍州蘇緘日夜勞苦士卒禦敵前後射殺萬五千餘人城中人心益固而救不至被圍四十二日而城陷緘死之三州死者無慮十餘萬人神宗以趙禼為招討使總九將軍進討既又以郭逵為宣州使而禼副之逵至長沙督諸道進兵復雍州逵遣將拔永安州於是溪峒悉降逵次思明州遣燕逹討廣源州降其觀察使劉紀師次富良江交趾承船迎戰逵破之獲賊將洪真太子賊勢蹙乾德乃奉表乞降是時王安石與吳充以交趾事爭上前安石以為可取充曰得之無益至是乾德歸順神宗許之哲宗即位加同平章事元祐中進南平王乾德厯哲宗徽宗兩朝未嘗犯順宣和元年加守司空至靖康初乾德尚無恙後二年乃死楊換立臣稱曰自公藴以來中國所以懷柔者恩意備至故得蛙藏井底蟻聚穴中焉然黎全劫丁璿再𫝊而遽亡公藴篡提昶數世而未殞豈非其幸與東都事略卷一百三十
