body:
  text: 東都事略目録别史類第一卷本紀一太祖皇帝一第二卷本紀二太祖皇帝二第三卷本紀三太宗皇帝第四卷本紀四眞宗皇帝第五卷本紀五仁宗皇帝一第六卷本紀六仁宗皇帝二第七卷本紀七英宗皇帝第八卷本紀八神宗皇帝第九卷本紀九哲宗皇帝第十卷本紀十徽宗皇帝一第十一卷本紀十一徽宗皇帝二第十二卷本紀十二欽宗皇帝第十三卷世家一宣祖昭憲皇后杜氏太祖孝惠皇后賀氏孝明皇后王氏孝章皇后宋氏太宗淑德皇后尹氏懿德皇后符氏明德皇后李氏元德皇后李氏眞宗章懷皇后潘氏章穆皇后郭氏章獻明肅皇后劉氏章懿皇后李氏章惠皇后楊氏仁宗廢后郭氏慈聖光獻皇后曹氏温成皇后張氏第十四卷世家二英宗宣仁聖烈皇后髙氏神宗欽聖憲肅皇后向氏欽成皇后朱氏欽慈皇后陳氏哲宗昭慈聖憲皇后孟氏昭懷皇后劉氏徽宗顯恭皇后王氏顯肅皇后鄭氏顯仁皇后韋氏明達皇后劉氏明節皇后劉氏欽宗皇后朱氏第十五卷世家三宣祖五子曹王光濟魏王廷美歧王光賛太祖四子滕王德秀吳王德昭舒王德林秦王德芳太宗九子漢王元佐昭成太子元僖商王元份越王元傑鎭王元偓楚王元偁周王元儼崇王元德第十六卷世家四眞宗六子温王禔周王祐昌王祇信王祉欽王祁仁宗三子揚王昉雍王昕荆王曦濮安懿王英宗四子吳王顥潤王顔益王頵第十七卷世家五神宗十四子成王佾惠王僅唐王俊褒王伸兾王僴豫王价徐王倜吳王佖儀王偉燕王俁楚王似越王偲哲宗一子獻􅉖太子茂徽宗三十一子兖王檉鄆王楷荆王楫肅王樞景王杞濟王栩益王棫邠王材祁王模莘王植儀王朴徐王棣沂王樗鄆王栱和王栻信王榛漢王椿安康郡王楃廣平郡王􅚃相國公梴陳國公機瀛國公樾建安郡王楧嘉國公椅温國公棟英國公橞儀國公桐昌國公柄潤國公樅欽宗一子皇太子諶第十八卷列傳一范質旻果王溥貽孫貽永魏仁浦咸信第十九卷列傳二韓令坤石守信保興元孫保吉王審琦丞衍符彦卿王景王晏王彦超武行德楊廷璋郭從義第二十卷列傳三慕容延釗李處耘繼隆昭亮繼和王全斌凱王仁贍崔彦進劉廷讓第二十一卷列傳四昝居潤張美向拱髙懷德韓重贇崇訓張永德郭崇宋偓郭守文第二十二卷列傳五李筠李重進第二十三卷列傳六孟昶劉鋹李煜劉繼元第二十四卷列傳七錢俶惟濬惟演髙繼沖周行逢陳洪進第二十五卷列傳八吳廷祚元扆李崇矩繼昌遵勗楚昭輔第二十六卷列傳九趙普丞宗丞煦第二十七卷列傳十曹彬璨瑋琮潘美第二十八卷列傳十一馮繼業折德扆党進曹翰崔翰李懷忠田重進米信第二十九卷列傳十二何繼筠丞矩李謙溥允則馬仁瑀李漢超郭進姚内斌董遵誨賀惟忠王彦昇第三十卷列傳十三張昭陶榖竇儀儼偁劉温叟煜几扈蒙王祜第三十一卷列傳十四薛居正吕餘慶端劉熈古沈倫盧多遜宋琪石熈載中立第三十二卷列傳十五李昉宗諤吕蒙正居簡張齊賢第三十三卷列傳十六張遜柴禹錫宗慶趙鎔楊守一弭德超第三十四卷列傳十七荆罕儒嗣曹光實克明楊業延昭康保裔繼英第三十五卷列傳十八李穆賈黄中蘇易簡錢若水第三十六卷列傳十九郭贄李至王沔辛仲甫張宏趙昌言陳恕温仲舒劉昌言第三十七卷列傳二十張洎李昌齡王化基舉正李惟清夏侯嶠楊礪宋湜第三十八卷列傳二十一宋白楊徽之徐鉉宋準梁周翰朱昂胡旦栁開第三十九卷列傳二十二田錫王禹偁第四十卷列傳二十三李沆維王旦素質第四十一卷列傳二十四向敏中畢士安㓂準第四十二卷列傳二十五髙瓊繼勲遵裕傅濳王超王繼忠葛霸懷敏馮守信石普第四十三卷列傳二十六王顯王繼英周瑩馬知節王嗣宗雷有終父德驤孫簡夫有鄰第四十四卷列傳二十七陳堯叟堯佐堯咨趙安仁良規君錫陳彭年任中正中師周起第四十五卷列傳二十八張詠馬亮薛映凌策李及第四十六卷列傳二十九邢昺杜鎬杞晁迥宗慤孫奭馮元第四十七卷列傳三十楊億劉筠戚綸父同文梁顥孫何僅第四十八卷列傳三十一曾致堯鞏肈梅詢錢昆易勰彦逺藻明逺第四十九卷列傳三十二王欽若丁謂馮拯第五十卷列傳三十三曹利用張耆楊崇勲第五十一卷列傳三十四李迪柬之王曾弟子融張知白第五十二卷列傳三十五張士遜吕夷簡公綽公孺公弼第五十三卷列傳三十六魯宗道薛奎王曙益柔蔡齊延慶第五十四卷列傳三十七夏竦范雍計用章附程琳姜遵趙稹第五十五卷列傳三十八李諮盛度王鬷王博文張觀鄭戩任布第五十六卷列傳三十九王隨章得象晏殊杜衍第五十七卷列傳四十宋綬敏求李若谷俶第五十八卷列傳四十一韓億綜絳維縝第五十九卷上下列傳四十二上下范仲淹純仁純禮純粹第六十卷列傳四十三陳從易楊大雅李垂燕肅胥偃司馬池孔道輔宗翰段少連蔣堂彭乗趙師民彦若第六十一卷列傳四十四張亢种世衡詁諤誼劉滬兄渙第六十二卷列傳四十五王德用夏守贇隨郭丞祐許懷德狄青張孜郭逵第六十三卷列傳四十六丁度吳育充明鎬髙若訥第六十四卷列傳四十七謝絳蘇紳葉清臣楊察尹洙兄源孫甫石楊休第六十五卷列傳四十八賈昌朝宋庠祁吕夏卿劉羲叟第六十六卷列傳四十九陳執中龐籍梁適孫子美劉沆第六十七卷列傳五十文彦博及甫第六十八卷列傳五十一富弼紹庭第六十九卷列傳五十二韓琦忠彦曾公亮孝寛第七十卷列傳五十三王堯臣叔洙孫沔田況程戡第七十一卷列傳五十四張昪孫抃趙槩胡宿宗愈第七十二卷列傳五十五歐陽脩棐第七十三卷列傳五十六包拯吳奎趙抃唐介第七十四卷列傳五十七張方平王拱辰第七十五卷列傳五十八余靖蔡襄何郯梅摯許元陳希亮吳中復第七十六卷列傳五十九劉敞攽奉世吕溱賈黯沈遘鄭獬祖無擇第七十七卷列傳六十范鎭百禄祖禹第七十八卷列傳六十吕誨劉述劉琦錢顗第七十九卷列傳六十二王安石安國安禮雱第八十卷列傳六十三陳升之王珪蔡確第八十一卷列傳六十四邵亢馮京元絳孫固第八十二卷列傳六十五蔡挺王韶厚薛向第八十三卷列傳六十六吕惠卿張璪蒲宗孟第八十四卷列傳六十七郝質賈逵楊遂盧政燕達苗授劉昌祚劉舜卿第八十五卷列傳六十八王廣淵王陶陳薦孫永陳襄孫洙第八十六卷列傳六十九熊本沈起劉彞沈括徐禧李稷李舜舉附第八十七卷上下列傳七十上下司馬光康劉恕第八十八卷列傳七十一吕公著希哲希績希純第八十九卷列傳七十二吕大防大臨劉摰蘇頌第九十卷列傳七十三王存趙瞻傅堯俞王巖叟梁燾鄭雍第九十一卷列傳七十四滕元發李師中劉庠趙卨吕大忠游師雄第九十二卷列傳七十五楊繪李常孫覺覽鮮于侁馬黙第九十三卷上下列傳七十六上下蘇軾蘇轍第九十四卷列傳七十七孔文仲武仲平仲朱光庭劉安世彭汝礪吕陶張舜民豐稷王覿第九十五卷列傳七十八章惇曾布第九十六卷列傳七十九安燾李清臣許將鄧潤甫黃履第九十七卷列傳八十林希蔣之奇章楶陸佃温益吳居厚安惇第九十八卷列傳八十一鄧綰洵武蹇周輔序辰李定舒亶第九十九卷列傳八十二邢恕倞楊畏來之邵上官均董敦逸第一百卷列傳八十三鄒浩田晝附常安民陳瓘陳祜龔夬任伯雨張庭堅江公望第一百一卷列傳八十四蔡京卞攸翛第一百二卷列傳八十五趙挺之張商英何執中鄭居中劉正夫第一百三卷列傳八十六張康國劉逵朱諤林攄管師仁侯蒙馮熈載第一百四卷列傳八十七姚兕麟折可適郭成劉仲武趙隆和詵第一百五卷列傳八十八徐勣陳師錫石公弼張克公黄葆光崔鶠第一百六卷列傳八十九王黼朱勔第一百七卷列傳九十种師道師中劉延慶何灌第一百八卷列傳九十一唐恪何㮚陳過庭聶昌孫傅張叔夜第一百九卷列傳九十二王雲陳遘梅執禮程振司馬朴李熈靖譚世勣第一百十卷忠義傳九十三劉平季孫任福王珪桑懌珪子光祖耿傅武英馬遂孔宗旦曹覲趙師旦蘇緘彭汝方詹良臣第一百十一卷忠義傳九十四傅察蔣興祖張確朱昭張克戩郭滸朱友恭霍安國李㳙劉韐李若冰吳革第一百十二卷循吏傳九十五程羽王明陳靖薛顔邵曄張綸崔立趙尚寛髙賦許遵魯有開第一百十三卷儒學傳九十六聶崇義郭忠恕王昭素孔維李覺崔頥正弟偓佺孔宜穆脩李之才周堯卿代淵胡瑗孫復石介第一百十四卷儒學傳九十七李覯蘇洵王囘周敦熈張載戩程顥附頤顔復龔原游酢王當陳暘兄祥道第一百十五卷文蓺傳九十八趙隣幾韓溥鄭文寶吳俶遵路樂史子黄月夏侯嘉正羅處約李建中路振崔遵度石延年劉濳附蘇舜欽梅堯臣江休復章望之王令文同楊傑郭祥正楊蟠第一百十六卷文蓺傳九十九黄庭堅秦觀覿李廌張耒李昭玘附晁補之詠之陳師道廖正一李之儀李格非李公麟米芾賀鑄劉涇鄭少微附蔡肈周邦彦唐庚鮑由倪濤蘇元老第一百十七卷卓行傳一百陳烈朱壽昌劉庭式鄭俠巢谷徐積第一百十八卷隱逸傳一百一蘇澄隱陳搏种放郭震李瀆魏野邢惇林逋徐復髙懌張俞邵雍常秩第一百十九卷外戚傳一百二杜審琦審瓊審進審肈王繼勲賀令圖劉美李用和璋瑋張堯佐曹佾髙士林向宗囘宗良第一百二十卷宦者傳一百三王繼恩劉承規秦翰張崇貴周懷政雷允恭閻文應士良任守忠李憲王中正宋用臣第一百二十一卷宦者傳一百四童貫梁師成第一百二十二卷僭僞傳一百五張邦昌第一百二十三卷附録一遼國上第一百二十四卷附録二遼國下第一百二十五卷附録三金國一第一百二十六卷附録四金國二第一百二十七卷附録五西夏一第一百二十八卷附録六西夏二第一百二十九卷附録七西蕃第一百三十卷附録八交趾臣等謹案東都事畧一百三十卷宋王稱撰稱字季平眉州人父賞紹興中為實録修撰稱承其家學旁捜九朝事蹟采輯成編洪邁修四朝國史奏進其書以承議郎知龍州授直秘閣其書為本紀十二世家五列傳一百五附録八敘事約而該議論亦皆持平如康保裔不列於忠義張方平王拱辰不諱其瑕疵皆具史識熙寧之啓釁元符之紹述尤三致意焉朱勔傳後附載僧祖秀艮岳記雖非史法亦足資考證而南宋諸人乃多不滿其書殆亦一時愛憎之見明人議修宋史始力為表章近時汪琬復謂元修宋史實據此書為稿本以今考之惟文藝傳為宋史所資取故所載北宋為多南宋文人寥寥無幾其餘事迹異同如符彦卿二女為周室后而宋史闕其一劉美本姓龔冒附於外戚事畧直書其事宋史采其家傳轉為之諱趙普先閲章奏田錫極論其非而宋史誤以為羣臣章奏必先白錫楊守一以涓人補右班殿直遷翰林副使而宋史誤作翰林學士新法初行坐倉糴米吳申等言其不便宋史誤以為司馬光之言至地名謚法宋史尤多舛謬是元人修史時絶未嘗考證此書琬之言未得其實也其中如張齊賢以雍熙三年忤㫖出外而誤作自請行邊以副使王履絶命辭誤屬之李若水又不載王履于忠義傳雖不免間有牴牾然宋人私史卓然可傳者唯稱與李燾李心傳之書鼎足而三固宜為考宋史者所寳貴矣乾隆四十年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
