body:
  text: 東都事略卷一宋王稱撰本紀一太祖啓運立極英武睿文神德聖功至明大孝皇帝其先出于帝髙陽氏之後造父爲周穆王御破徐偃封趙城因氏焉自漢京兆尹廣漢居涿郡遂爲涿郡人至唐而髙祖僖祖皇帝生焉僖祖仕至文安令曾祖順祖皇帝仕歴藩府從事兼御史中丞皇祖翼祖皇帝少有大志仕至涿州刺史贈左驍衞上將軍皇考宣祖皇帝少驍勇善騎射而雅好儒素起家事趙王王鎔時梁晉爭天下晉求援於鎔鎔命宣祖以五百騎赴之莊宗嘉其勇敢因留之命掌禁軍爲飛捷指揮使自同光至開運踰二十年不遷而宣祖亦未甞以介意漢乾祐中王景崇以鳳翔叛宣祖與征討禦之於寶雞敗之殺獲萬計是役也宣祖身先士卒面中流矢勇氣彌厲以功遷護聖都指揮使仕周累遷龍捷左廂都指揮使岳州團練使世宗征淮東宣祖爲前軍副都指揮使領兵先入維揚禁止侵暴民情大恱世宗嘉之未幾以疾歸與太祖㑹于壽春歸及中途而崩贈武清軍節度使太祖即第二子也以後唐天成二年二月十六日生于洛陽夾馬營母昭憲皇后甞夢日入懷而娠生之夕光照室中胞衣如菡萏體被金色三日不變幼受學于鄉先生辛文恱毎歸必令羣兒前導路人往往避之及長天姿雄偉性沉厚有大度甞游復州干王彦超不爲所禮去依隨州董宗本鬱鬱不得志又捨去乃從周太祖于鄴廣順初補東西班行首出爲滑州興順副指揮使未行會世宗自澶州入爲開封尹以太祖爲馬直軍使顯德元年世宗命太祖掌衞兵太原劉崇㓂澤潞世宗親征陳于髙平大將樊愛能何徽未戰而遁世宗躬自督戰太祖謂麾下曰主危如此是吾致命之秋也即大呼躍馬徑犯其鋒萬衆披靡崇大潰世宗以太祖爲殿前都虞候領嚴州刺史加永州防禦使世宗懲樊愛能何徽之敗欲以兵力威天下命太祖訓練武藝超絶者分隷殿前諸軍自是禁衞盛矣二年世宗命王景向訓攻秦鳳師久無功然以餽運不繼欲罷兵意未能决遣太祖視其形勢使囘具言秦鳳可攻之狀未幾悉平三年世宗征淮以太祖領親騎翼從敗淮人于渦口唐將皇甫暉姚鳳率衆十五萬塞清流關太祖擊走之暉退保滁州斷橋自守太祖追至城下暉曰人各爲其主願成列以决勝負太祖笑而許之暉整陣以出太祖擁馬項直入左右馳突大呼曰吾止取皇甫暉他人非吾敵也手劒擊暉生獲之并擒姚鳳遂下滁州後數日宣祖率兵夜半至城下傳呼開門太祖曰父子雖至親城門王事也須明乃敢奉命至明乃入又破江南兵于六合斬首五干級時韓令坤爲招討使平揚州唐主遣陸孟俊據蜀岡以逼其城令坤潛議退師太祖下令曰揚州兵敢有過六合者吾當折其足令坤懼始有固守之志太祖率兵擊之孟俊遁爲追兵所殺又破其齊王景達兵於六合斬首萬級是役也軍士有不用命者太祖奮劒斫其皮笠陽爲督戰以識之明日索得數十人斬以徇於是皆死戰宣祖崩起復拜定國軍節度使殿前都指揮使四年世宗復征淮至壽州命太祖率殿前諸兵擊紫金山連珠砦拔之遂下壽州世宗還京師以太祖領義成軍節度使是歳世宗征濠泗以太祖爲前鋒周師以敵人壁于十八里灘不能過淮世宗患之太祖躍馬以濟遂破其砦乗勝攻泗州焚郭門奪月城世宗親率精騎與太祖夾淮東下師及山陽東太祖擒其保大軍節度使陳承昭以獻遂拔楚州又破淮人于鑾江口太祖抵南岸焚其營柵破之于𤓰步淮南平唐主畏太祖威名用間於世宗遣使遺太祖書以白金三千兩爲餽太祖悉輸之内府由是間乃不行五年改忠武軍節度使六年世宗北征以太祖將水陸之師至瓦橋關降其守將姚内斌契丹將髙模翰率數萬騎來援陳于關城之北太祖將百餘騎禦之虜不敢動遂引去關南平世宗不豫還京師以太祖爲殿前都㸃檢世宗崩恭帝嗣位改鎭歸德七年春正月辛丑朔鎭定馳驛上言太原劉承鈞結契丹入㓂乃命太祖統大軍北伐癸卯出師遣宣徽使昝居潤餞于郊時京師多飛語云策㸃檢爲天子次陳橋驛軍中共議推戴戊夜軍士聚于驛門俄而列校畢集曰我輩出萬死冒白刃爲國家破敵天子幼不如先策㸃檢爲天子然後北伐于時太祖以飲餞宣勸至醉卧閣中不之省遲明軍士控弦露刃直扣寝門相與扶太祖出聽事被以黄袍諸校列拜曰諸軍無主願策㸃檢爲天子傳呼萬歳聲聞數十里太祖叱之不退即共擁太祖就馬南歸太祖乃勒騎謂將校曰吾受命北征爲汝輩推戴吾有號令汝能禀乎皆曰唯命太祖曰太后主上吾北面事之朝廷大臣吾之比肩也汝等不得驚犯宫闈侵陵朝貴近世帝王初舉兵入京城皆縱兵夯市汝等不得夯市及犯府庫從吾令當厚賚汝違吾令則連營孥戮諸校再拜禀令乃肅部伍自仁和門入諸校翼從太祖登明德門軍士釋甲歸營無敢動太祖亦歸公府宰相范質王溥魏仁浦謁見議遜位之禮於是太祖詣崇元殿受䄠召文武百官就列至晡班定恭帝制曰天生蒸民樹之司牧二帝推公而䄠位三王乗時以革命其極一也予末小子遭家不造人心已去國命有歸咨爾歸德軍節度使殿前都㸃檢趙某禀上聖之姿有神武之略佐我烈祖格于皇天逮事世宗功存納􅅢東征西怨厥績茂焉天地鬼神享于有德謳歌獄訟歸于至仁應天順民法堯禪舜如釋重負予其作賓嗚呼欽哉祇畏天命宣徽使引太祖就龍墀北面拜受宰相扶太祖升殿易服東序還即皇帝位羣臣拜賀詔曰周封杞宋唐命介酅所以重三恪之賓奉二王之後也其奉周帝爲鄭王以承周祀正朔服色一依舊制稱朕意焉又尊帝太后爲周太后遷于西宫東都事略卷一
