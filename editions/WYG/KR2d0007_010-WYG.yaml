body:
  text: 東都事略卷十宋王稱撰本紀十徽宗體神合道駿烈遜功聖文仁德憲慈顯孝皇帝神宗第十一子也母曰欽成皇后陳氏以元豐五年十月十日生后就館之月隂雨弥旬旣誕天氣澄霽六年授鎮寧軍節度使封寧國公八年封遂寧郡王紹聖三年拜平江鎮江軍節度使封端王元符三年春正月己卯哲宗崩皇太后坐福寧殿東垂簾謂宰臣章惇等曰皇帝已棄天下惇等哭皇太后曰皇帝無子天下事須早定惇獨厲聲曰當立同母弟皇太后曰神宗諸子申王長而有目疾次即端王當立惇曰以年則申王長當立以禮律同母弟簡王當立皇太后曰俱是神宗子豈容分别當立端王惇等唯唯承命王入即皇帝位于福寧殿奉遺制皇太后權同處分軍國事庚辰大赦天下癸未追册貴儀陳氏爲皇太妃丙戍皇兄佖封陳王戊子皇弟俁封衞王似蔡王偲定王二月丁未立皇后王氏庚申韓忠彦門下侍郎黄履尚書右丞三月太史言四月朔日當食庚寅詔曰太史前告天將動威日有食之期在正陽之月變異甚鉅殆不虚生夙夜以思未燭厥理將以彌綸初政消弭天菑自非藥石之規孰開朕聽況今周行之内人有所懐芻蕘之中言皆可采凡朕躬之闕失若左右之忠邪政令之否臧風俗之媺惡朝延之德澤有不下究閭閻之疾苦有不上聞咸聽直言毋有忌諱夏四月丁酉朔日有食之甲辰韓忠彦尚書右僕射兼中書侍郎李清臣門下侍郎蔣之竒同知樞密院事庚戌皇長子生辛亥大赦天下五月癸酉皇太后詔曰瑶華廢后累經大霈其位號禮數令三省樞密院詳議以聞丙子廢后孟氏復爲元祐皇后皇后劉氏爲元符皇后乙酉蔡卞罷秋七月丙寅朔皇太后歸政癸酉赦天下八月壬寅葬欽文睿武昭孝皇帝于永泰陵丁未詔曰朕恭惟仁宗皇帝躬天地之度以仁治天下授英宗以神器之重措宗社於泰山之安功隆德厚孰可擬議神宗皇帝以聖神不世出之資慨然大有爲於天下規模宏逺凜凜乎三代之風而廟祏之制未及尊崇之典闕孰甚焉其令禮官攷定仁祖神考廟制詳議以聞庚戌禮官言二宗之廟請如聖詔永祀不祧與天無極詔恭依建景靈西宫九月庚午皇長子封韓國公辛未章惇罷冬十月丁酉韓忠彦尚書左僕射兼門下侍郎壬寅曽布尚書右僕射兼中書侍郎己未詔曰神考以天縱之聖厲精治道内修法度外闢境土新一代之典則以遺我後人而往者任事之臣用心或過朕所不取朕於爲政取人無彼時此時之間斟酌可否舉措損益惟時之宜旌别忠邪用捨進退惟義所在使政事不失其當人材各得其所則能事畢矣無偏無黨正直是與常用中以與天下休息以成朕繼志述事之美咨尓中外服我訓誡十一月庚午詔改元戊寅安燾知樞密院事庚辰黄履罷辛卯范純禮尚書右丞十二月戊申赦天下是歳以湟廓鄯三州歸于青唐建中靖國元年春正月壬戌朔有赤氣起東北弥亘西方甲戌皇太后向氏崩于慈寧殿夏四月辛卯朔日有食之五月丙寅葬欽聖憲肅皇后于永裕陵欽慈皇后陳氏改祔裕陵六月庚寅朔皇長子封京兆郡王戊午范純禮罷秋七月丙戌安燾罷丁亥蔣之竒知樞密院事陸佃尚書右丞章楶同知樞密院事九月趙諗反于渝州冬十月乙未李清臣罷十一月庚申陸佃尚書左丞温益尚書右丞庚申祀昊天上帝于圜丘大赦天下詔改元崇寧元年春正月河東地震二月戊戌趙諗伏誅庚子皇子煥封魏國公辛丑皇太妃朱氏薨夏五月庚申韓忠彦罷戊辰欽成皇后祔葬裕陵己卯陸佃罷庚辰許將門下侍郎温益中書侍郎蔡京尚書左丞趙挺之尚書右丞閏六月壬戌曾布罷秋七月戊子蔡京尚書右僕射兼中書侍郎甲午都省置講議司庚子章楶罷八月辛未開封府置居養院甲戌蔡京請天下並置學養士倣太學三舍爲攷選升補之法己卯趙挺之尚書左丞張商英尚書右丞建辟雍外學冬十月癸亥蔣之竒罷蔡卞知樞密院事甲戍元祐皇后復居瑶華宫十一月乙酉溪洞徽州并誠州納土甲辰詔曰元符末下詔求直言蓋欲廣朕聞見裨益政治比以所上章疏付之有司攷其邪正令具名來上其間忠言讜議指陳闕失力陳父子兄弟繼述友恭之義者四十一人悉令旌擢以勸多士内有附會姦慝誣毁先帝政事緫五百四十一人然言有淺深罪有輕重取其詆譏謗斥尤甚者三十人可逐之逺方次等四十一人其言亦多詆訿各逐等第責降以戒爲臣之不忠者戊申皇子楷封髙密郡王二年春正月乙未辰沅溪洞納土壬寅温益薨丁未蔡京尚書左僕射兼門下侍郎二月甲寅以元符皇后劉氏爲太后居崇恩宫甲子蔡京以陜西鑄大銅錢當十夾錫錢當二夏四月己巳大赦天下戊寅趙挺之中書侍郎張商英尚書左丞吳居厚尚書右丞安惇同知樞密院事五月己亥皇子楫封楚國公秋七月戊寅朔青唐來納土八月戊申張商英罷九月庚寅詔曰本朝僖祖至仁宗始備七世當英宗祔廟上祧順祖暨神考祔廟又祧翼祖則哲宗祔廟父子相承當爲一世祧遷之序典禮可稽令禮官詳議聞奏其後禮官言當祧宣祖甲辰詔曰自京師至于郡縣春秋祈報徧于天下者唯社禝爲然今守令不深惟其故以是爲不急之祀壇壝不修民得畜牧種蓺於其間春秋行事取具臨時乃或器用弗備粢盛弗蠲齋祓弛懈祼獻失度甚不副朕稱秩祀典之意其令監司廵厯所至察不如儀者三年春正月戊子詔江池饒建州鑄當十大錢二月丁未州縣置漏澤園壬子皇子楫封南陽郡王三月丁亥倣周官司圜之法令諸州築圜土以居强盜貸死者晝則役作夜則拘之視罪之輕重以爲久近之限許出圜土充軍無過者縱釋之辛丑大内災夏四月辛酉皇子楫封樂安郡王乙丑罷講議司王厚復青唐五月癸酉樂安郡王楫薨丙申詔曰乃者有司以哲宗嗣承神考父子相繼自當爲世故上祧宣祖惟我祖考功隆德大萬世不祧者今已五宗則七廟當祧者二宗而已遷毁之禮近及祖考殆非先王尊祖奉先之意其議奏六月丙午詔諸路州軍未置學處並置學養士壬子置筭學丁巳籍元祐姦黨以司馬光爲首凡三百九人刻石于文德殿門之東壁秋七月上神宗哲宗尊諡八月丙午許將罷九月乙亥趙挺之門下侍郎吳居厚中書侍郎張康國尚書左丞鄧洵武尚書右丞皇子樞封吳國公癸巳建九廟冬十月夏人冦涇原己巳詔已祧翼祖宣祖廟並復十一月甲戌幸太學辟雍丙戌皇子杞封冀國公丁亥詔曰昔神考甞議以三舍取士而罷州郡科舉之令其法始於畿甸而未及行於郡國肆朕纂圖制詔有司講議其方成書來上悉推行之設辟雍於國郊以待士之升貢者其詔天下除將來科場如故事外並罷州郡發解及省試法其取士並繇學校升貢丙申祀昊天上帝于圜丘大赦天下十二月戊午安惇薨四年春正月丙戌詔於帝鼐宫立大角鼎星祠丙申蔡卞罷二月己酉置三衞府甲寅張康國知樞密院事劉逵同知院事何執中尚書左丞乙卯頒方田法于天下閏月趙懐德降三月甲辰趙挺之尚書右僕射兼中書侍郎戊午復銀州丁卯䍧牁夜郎納土夏五月乙丑詔曰民爲邦本本固邦寧天下承平日久民既庶矣而養生送死尚未能無憾朕甚憫焉今鰥寡孤獨既有居養之法若疾而無醫則爲之置安濟坊貧而不葬則爲之置漏澤園朕之志於民深矣監司守令奉行毋忽六月丙子興復解池鹽寶戊子趙挺之罷秋七月丁巳京畿四面置鋪屏衞京師八月九鼎成甲申奉安九鼎戊子詔即國丙巳之地建明堂辛卯詔曰道形而下先王體之協於度數播於聲詩其樂與天地同流雅頌不作久矣去聖逾逺遺聲弗存廼者得隱逸之士於草茅之賤獲英莖之器於受命之邦適時之宜以身爲度鑄鼎以起律因律以制器按協於庭八音克諧祖宗積累之休上帝克相豈朕之德哉昔堯有大章舜有大韶三代之王亦各異名今追千載而成一代之制宜賜名曰大晟朕將薦郊廟享鬼神和萬邦與天下共之豈不美與其舊樂勿用時蔡京用魏漢律鑄鼎作樂漢律取尚書身爲度之義以上年二十四當四六之數取上中指以爲黄鍾之寸而生度量權衡以作樂而京爲縁飾之詔陜西置蕃學九月己亥大赦天下詔元祐黨人徙移近地惟不得至四輔畿甸乙巳詔曰三時務農一時講武先王之政也應京畿三路保甲並於農隙時敎閱冬十月壬辰日有黑子十二月乙亥詔大司成攷德行道蓺歳貢之五年春正月庚子彗出西方甲辰吳居厚門下侍郎劉逵中書侍郎乙巳詔曰乃孟春之夕星文變見朕甚懼焉應中外臣僚並許直言朝政闕失朕虚心以改以銷乾象之變詔元祐元符係籍黨人朝堂及外處石刻並令除毁丁未大赦天下罷方田壬子罷圜土二月丙寅蔡京罷趙挺之尚書右僕射兼中書侍郎三月丙辰蔡王似薨夏五月辛亥皇子栩封魯國公秋七月壬寅詔改元冬十月壬戌詔曰有天下者尊事上帝敕命惟幾敢有弗䖍而釋氏之敎修營佛事妄以天帝次於鬼神之列瀆神踰分莫此之甚其能克享上帝之心乎有司其除削之以稱朕嚴恭寅畏之意十一月辛卯陳王佖薨十二月己未劉逵罷大觀元年春正月戊子朔大赦天下置議禮局于尚書省甲午蔡京尚書左僕射兼門下侍郎壬寅吳居厚罷壬子何執中中書侍郎鄧洵武尚書左丞梁子美尚書右丞丁巳詔曰古之學者三年通一經十有五年則五經皆通熈寧中進士以經術今已三十餘年士益習矣自今學生願兼他經者聽量立陞進之法使天下全材異能得以進焉三月丁酉趙挺之罷何執中門下侍郎鄧洵武中書侍郎梁子美尚書左丞朱諤尚書右丞甲寅詔以八行取士夏五月己丑皇子棫封楊國公張懐素以吳儲吳侔謀反伏誅庚寅鄧洵武罷甲午頒新樂六月己未梁子美中書侍郎乙亥朱諤薨秋八月丁巳皇弟似封魏王偲鄧王皇第九子封蜀國公己未上僖祖徽號曰僖祖立道肇基積德起功懿文憲武睿和至孝皇帝庚申徐處仁尚書右丞林攄同知樞密院事九月辛亥大享明堂大赦天下冬十月辛酉蘇州地震癸亥大雨雹徐處仁以母憂罷閏月丙戌林攄尚書左丞鄭居中同知樞密院事十一月壬戌詔曰朕承祖宗休烈萬邦作孚典章文物於斯爲盛永惟受命之符當有一代之制而尚循秦六璽之用度越百年之久或未大備自天申命地不愛寶獲金玉於異土得好工於編氓八寶既成夐無前比殆天所授非人能爲顧何德以承之哉夫制而用之存乎其人天人相因自然之理足以繼志烈考而傳之萬世可以來年正月朔旦御大慶殿恭受八寶二年春正月壬子朔皇帝受八寶大赦天下庚申皇弟俁封燕王偲越王皇長子封定王楷嘉王樞建安郡王杞文安郡王栩安康郡王棫濟陽郡王皇第九子封廣平郡王丙子以内侍童貫爲武康軍節度使三月甲子皇子材封魏國公乙亥皇子模封鎮國公黄河清夏五月庚戌朔日有食之乙丑洮州溪哥城王子臧征僕哥降六月乙酉涪州夷族納土秋八月丙申梁子美罷九月辛亥林攄中書侍郎余深尚書左丞壬申皇子植封吳國公癸酉皇后王氏崩冬十一月辛酉訪求古禮器壬戌詔討論臣庶祭禮癸亥詔曰禮當追述三代之意適今之宜開元禮不足爲法今親制冠禮㳂革付議禮局餘五禮令視此編次十二月壬辰葬靖和皇后于裕陵之次三年春正月丁卯夷州納土己巳胡耳西道蠻納土二月丙子朔播州納土三月壬申張康國薨夏四月戊寅林攄罷癸巳鄭居中知樞密院事管師仁同知院事癸卯余深中書侍郎薛昂尚書左丞劉正夫尚書右丞六月甲戌朔管師仁罷丁丑蔡京以太師罷辛巳何執中尚書左僕射兼門下侍郎秋八月乙酉皇子朴封雍國公九月皇子棣封徐國公江淮大旱自六月不雨至于冬十月十二月詔東南罷鑄夾錫錢四年春二月己丑余深門下侍郎張商英中書侍郎侯蒙同知樞密院事丁酉罷河東河北京東鑄夾錫錢夏五月丁未彗出奎婁戊午大赦天下余深罷六月乙亥張商英尚書右僕射兼中書侍郎丙申薛昂罷秋七月戊申皇子樗封冀國公八月乙亥劉正夫中書侍郎侯䝉尚書左丞鄧洵仁尚書右丞庚辰吳居厚門下侍郎閏月己酉詔太廟親祠不用犬牲九月丙寅朔日有食之冬十月丁酉立貴妃鄭氏爲皇后鄭居中罷庚申吳居厚知樞密院事十一月丁卯祀昊天上帝于圜丘大赦天下詔改元十二月罷内藏東北出剰鹽鈔及六路上供錢鈔東都事略巻十
