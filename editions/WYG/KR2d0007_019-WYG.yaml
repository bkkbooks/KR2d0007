body:
  text: 東都事略卷十九宋王稱撰列傳二韓令坤磁州武安人也令坤少𨽻周太祖帳下世宗即位爲殿前都虞候髙平之戰以功領容州團練使世宗征太原以令坤爲都校以功拜武定軍節度使世宗伐淮甸命令坤等十二將率兵以從襲揚州將吏聞周師至開門以迎之令坤整衆而入市不易肆人甚恱徙鎮鎭安又從世宗北征有功恭帝即位爲侍衛馬步軍都虞候國初移鎭天平加侍衛親軍都指揮使同平章事太祖親征李筠令坤率兵屯河陽澤潞平以功加兼侍中從討李重進改鎭成徳卒年四十六令坤有才略識治道與太祖同事周情好親密鎮常山凡七年北邊以寜太祖聞其卒甚悼惜之追封南陽郡王石守信開封浚儀人也始事周太祖得𨽻帳下累遷指揮使世宗征河東戰于髙平守信以功遷親衛左第一軍都指揮使從征淮南又從征闗南俱有戰功自江州防禦使拜義成軍節度使太祖受禪遷侍衛馬歩軍副指揮使改鎭歸徳李筠反守信與髙懐徳率前軍破筠衆于長平斬首三千級又與懐徳敗其衆三萬于澤州澤潞平以功加同平章事李重進反復命守信討重進兼知揚州行府事太祖親征守信馳奏城中危廹破在昕夕大駕親臨可一鼓而平太祖從之即日克其城移鎮天平兼侍衛馬歩軍都指揮使建隆三年請解軍職太祖許之守信每入朝宴賜甚渥加兼侍中太平興國初加中書令爲河南尹從征幽州坐失律責授崇信軍節度使兼中書令尋封衛國公徙鎮陳州卒年五十七贈尚書令追封武威郡王諡曰武烈子保興保吉保興字光裔本名保正太祖爲改之以䕃補供奉官稍遷至團練使雍熈初契丹入邊保興爲澶州前軍駐泊徙銀夏綏府都廵檢常廵案􅹂子砦並黑水河趣谷中戎人數千騎渡河邀戰保興伏兵于河滸俟其半度急擊之其後數與戎人戰有功積官至棣州防禦使卒年五十八子元孫保吉字祐之尚太祖女延慶公主拜左衛將軍駙馬都尉領愛州刺史以軍功擢至朔州觀察使守信卒起復爲威塞軍節度使知河陽大名府改横海安國二鎭眞宗即位徙鎭保平景徳初又徙武寜加同平章事契丹入邊眞宗將幸澶淵先遣保吉與李繼隆爲排陣使對壘以待而征騎數萬至城下保吉不介馬而馳當其前鋒敵引去既而敵請盟眞宗錫宴射於行營謂繼隆等曰北敵自古爲患今得其畏威服義息戰安民皆卿等力也保吉曰臣受命禦敵上禀成筭至於布列行陣指授方略皆出於繼隆繼隆亦曰宣力用心躬率將士臣不如保吉眞宗嘉其能謙寵賜甚厚改鎭鎭安卒贈中書令諡曰壯武保吉有武幹奕世將相家積不貲而治生射利所至侵擾其鎮大名也葉齊查道皆知名士保吉悉命械頸而督運物論非之先是守信鎭宛丘年五十七而卒保吉繼居是鎮及其卒也年復與之同人皆異之元孫字善長以守信恩補供奉官久之爲閤門祗候遷知京副使累擢至邕州觀察使鄜延路副總管㑹趙元昊反陷金明砦元孫與劉平戰于三川口爲賊所執仁宗以爲已死贈忠正軍節度使及元昊納欵乃得歸言者請治其辱國之罪仁宗貸之安置全州後還京師卒年七十二王審琦字仲寳河南人也漢乾祐初得𨽻周太祖帳下爲鐡騎指揮使世宗征劉崇以功領勤州刺史審琦沉毅善謀所至有政績世宗征淮舒州堅壁不下以郭令圖爲刺史命審琦司超將兵攻城一夕拔之令圖入復見逐於郡人審琦方進軍援黄州聞令圖被逐乃選輕騎銜枚襲城夜敗其衆而復納之遂以兵破紫金山世宗圍濠梁審琦先拔其水砦乃降及攻楚州審琦謂城陷淮人必遁因設伏以待之果如其言審琦仕周累遷至睦州防禦使宋興擢爲殿前都指揮使泰寜軍節度使從征李筠改鎮義成討李重進也副石守信將前軍出鎭忠正在鎭八年寛簡便民屬邑令有以罪黜縣胥者僚佐以爲令不先白是輕主帥也請詰其罪審琦曰五代以來諸鎭暴横令宰之職不振乆矣能斥黜吏是可嘉也聞者歎伏從征太原改鎭許州加同平章事卒年五十贈中書令追封琅琊郡王審琦素不善飲太祖宴之於後苑祝之曰審琦布衣之舊方共享富貴酒者天之美禄也何惜不令飲之祝已謂審琦曰天必賜卿酒量試爲吾飲之審琦受詔連十數釂無它苦自此侍宴必引滿及歸私家即不能飲或彊飲輙病也子承衍承衍字希甫尚太祖女昭慶公主是謂秦國賢肅公主拜左衛將軍駙馬都尉遷恩州刺史加防禦使太平興國初遷應州觀察使授彰國軍節度使契丹入邉出知天雄軍端拱初徙鎭永清再知天雄眞宗即位改鎭䕶國卒年五十二贈中書令諡曰恭肅承衍善騎射暁音律好吟詠以功臣子尚主貴顯擁富貲厚自奉養而性吝嗇爲世所鄙子世融終内園苑使世融之子克臣以進士第元豐中爲工部侍郎終龍圖閣直學士子師約尚燕國公主拜駙馬都尉英宗以前公主廢舅姑之禮主婿輙升行齒諸父英宗以爲廢人倫不可爲天下法思所以釐正之神宗即位推原英宗意下詔公主出降皆行見舅姑禮公主以禮見舅姑自此始師約官至保平軍留後諡曰恭惠子殖亦尚神宗女惠國公主符彦卿字冠侯陳州宛丘人也父存審後唐宣武軍節度使五代史有傳彦卿年十三能騎射事莊宗於太原以其謹厚令出入臥内莊宗滅梁以爲散員指揮使郭從謙之亂莊宗左右皆引去惟彦卿力戰殺十餘人莊宗崩彦卿慟哭而去天成中以吉州刺史討王都于定州改慶州刺史晉天福初拜同州節度使出帝時爲河陽三城節度使契丹入邊彦卿拒戰于澶淵敵騎數萬圍髙行周於鐵丘諸將相顧無敢當其鋒彦卿引數騎力戰敵解去行周頼以免移鎮許州封祁國公與杜重威李守貞經略北鄙遇契丹主圍之於陽城衆十餘萬諸將無闘志彦卿曰與其束手就擒曷若與之力戰諸將然之彦卿大敗其衆契丹主乗槖駝而遁車帳兵械悉爲彦卿所獲改鎮武寜加同平章事契丹滅晉彦卿遂歸于契丹契丹主以陽城之敗詰責彦卿對曰臣事晉不敢愛死今日惟命契丹主笑而釋之徐宋多盗契丹主遣彦卿歸鎮漢髙祖入汴彦卿來朝改鎭兖州加侍中兼中書令封魏國公拜太保移鎭青州周太祖封彦卿爲淮陽王鎮鄆州徙鎮天雄進封衛王世宗時拜太傅改封魏王恭帝即位加太尉宋興遷太師移鎮鳳翔被病肩輿赴鎮至西京上言疾亟假滿百日受奉如故爲御史所糾於是罷節度使彦卿退居于洛八年閒乗小車駟遍遊佛寺名園人伏其曠逹性不飲酒謙恭待士對賔客清談終日不及世務爲將有謀善戰所得奉賜皆分給士卒故人樂爲之用卒年七十八周世宗二后太宗懿徳皇后皆彦卿女也自周及太祖朝賜詔不名近代貴盛無與爲比子昭信賀州刺史昭厚天雄軍防禦使昭夀鳳州團練使爲益州鈐轄昭夀遊宴無度不能御軍神衛卒趙延順以衆怨昭夀信用親僕搒箠軍人謀害昭夀咸平三年正旦中使來昭夀戒馭吏具鞍馬將送之卒乃縱廐中馬陽逐而縶之喧擾之際延順率其衆殺昭夀及其僕都監王澤聞變召都虞候王均擒延順及其黨不能獲乃推均爲首知益州牛冕出奔漢州都廵撿使劉昭榮與均戰死之均遂僭號大蜀建元化順是歳王師討平之追斬均于富順監王景萊州人也少爲盜梁大將王檀鎭滑臺以景𨽻麾下莊宗入汴景挺身來降仕唐至奉國都虞候清泰末從張敬逹圍晉陽㑹契丹來援景以所部歸晉授相州刺史遷耀州團練使契丹入邉景與髙行周破之于戚城累遷至横海軍節度使契丹犯京師用其黨爲帥以代景景還至常山聞契丹主耶律徳光死即閒道歸漢乾祐初加同平章事周太祖與景有舊及即位加侍中爲䕶國軍節度使移鎮鳳翔顯徳初封褒國公加兼中書令世宗命景與向拱率兵討蜀大破蜀軍于上邽遂降秦州逾年徙鎮秦州恭帝即位封涼國公國初加太保封太原郡王復以爲鳳翔節度使卒年七十五贈太傅追封岐王諡曰元靖初景之奔晉也妻坐誅晉髙祖問所欲對曰臣昔爲卒過官妓侯小師家意慕之今妻被誅誠得小師爲妻足矣後封楚國夫人景性謙退折節下士每朝廷使至雖卑位皆送迎周旋盡禮左右曰王位崇不宜過自損抑景曰人臣重君命也初封王朝廷以吏部尚書張昭爲使景尤加禮重左右又以爲言景曰我在行伍閒已聞張尚書名今使于我是國家厚我也子廷義廷睿廷訓延義仕至横州團練使從征太原中流矢而卒廷義性驕傲好夸誕每言我當代王景之子聞者笑之時目爲王當代景所莅鎭廷睿爲牙内指揮使尤驕恣景以其母被戮心憐之廷睿或小不如意必號泣曰還我母安用富貴景不復問家財恣其所用過華隂墜馬而死廷訓仕至左驍衛將軍王晏徐州滕人也家世力田少爲盜應募𨽻禁軍累遷奉國小校晉末與都校趙暉侯章戍陜州遂歸于漢髙祖甚喜即授以節度使及入汴加同平章事漢亡事周改鎭武寜封滕國公因其鄉里以榮之也太祖受命進封趙國公徙鎮安逺改封韓國公請老以太子太師致仕卒年七十七贈中書令王彦超字徳昇大名臨清人也少事魏王繼岌繼岌死乃仕晉爲刺史仕漢爲復州防禦使契丹入邉爲行營馬歩左廂都排陣使從周太祖入汴湘隂公贇牙校鞏廷美以贇不得立據徐州以拒周太祖拜彦超武寜軍節度使以討之又與王峻拒劉崇于晉州改建雄河陽三城河中三鎭顯徳初加同平章事屢破劉崇之衆拜忠武軍節度使兼侍中宰相李榖征淮南以彦超將前軍敗淮人于夀州城下淮人水陸來援榖退保正陽淮人躡其後㑹李重進兵至合勢急擊大敗之逐北二十餘里師旋徙鎮永興移鳳翔國初加中書令太祖與彦超宴射于作坊酒酣謂彦超曰卿昔在復州朕徃依卿何不納我彦超頓首曰蹄涔之水豈足以安神龍陛下當日不留滯於小郡者天也太祖大笑未幾復鎮永興又爲鳳翔節度使入爲右金吾衛上將軍太平興國中封邠國公彦超語所親曰人臣七十致仕古之制也我今六十九矣自當知止足之分明年遂請老拜太子太師致仕卒年七十三贈尚書令彦超温和恭謹領九鎭所至民安之而能引年告老爲當世所重始彦超自鳳翔來朝與諸將俱侍宴太祖謂曰卿等皆國家宿舊乆臨劇鎭非朕所以優賢之意彦超曰臣無勲勞乆冐榮寵願乞骸骨以歸諸將競陳宿昔戰功及履歴艱苦太祖曰此異代事何足論翌日皆罷鎮時論以此許之武行徳太原榆次人也身長九尺餘氣貌洪偉少負薪道遇晉髙祖髙祖見其魁梧甚竒之因留之帳下仕晉爲寜國軍都虞候契丹犯京師行徳陷于契丹僞請自效因遣送將校數十百䕶所取尚方鎧甲還胡中至河隂行徳謂衆曰我與若等能爲異域鬼耶衆素伏其威名皆曰惟命遂攻孟州走其節度使崔延勲悉以府庫分諸校而權領州事遣其弟行友詣太原勸進漢髙祖喜因來河陽依行徳行徳以兵翼至京師授河陽三城節度使加同平章事移鎭成徳周廣順初加兼侍中改鎮忠武封譙國公兼中書令改封邢徙鎭武寜世宗征淮行徳坐失律左遷右衛大將軍尋授保大軍節度使封宋國公國初改封韓再鎮忠武移安逺召爲太子太傅卒年七十二贈太師楊廷璋字温玉真定人也父洪裕少漁貂裘陂有以二石鴈授之者其翼一揜左一揜右曰吾北嶽使也言訖不知所之是歳生女爲周太祖淑妃明年而廷璋生廷璋以淑妃故得賜官初爲右飛龍使稍遷皇城使世宗即位拜左驍衛大將軍宣徽北院使除建雄軍節度使隰州闕守乃請監軍李謙溥攝州事謙溥至隰并人來圍其城或請速救之廷璋曰賊遽至必未攻城乃募死士百餘人濳諭謙溥相應夜銜枚擊之并人大潰逐北數十里國初荆罕儒監晉州兵疑廷璋周之近親欲圖之見必懐刃而廷璋接以至誠卒不敢發初周太祖嘗諭廷璋圖涇帥史懿廷璋屏左右示以詔書懿受代入朝遂免禍時論以罕儒不能加害爲若有施報也未幾廷璋自鎮來朝授靜難軍節度使移鄜州代還爲左千牛衛上將軍卒年六十郭從義字徳基其先沙陁人也父古仕後唐賜姓李氏古卒從義尚幼明宗時從義官至内園使仕晉爲宿州團練副使復姓郭云契丹入邉漢髙祖將建國從義首賛其謀漢興爲鄭州防禦使拜鎮寜軍節度使趙思綰以永興叛命從義討之師次潼關河中李守貞來援從義大破之遂圍思綰拜永興軍節度使思綰困甚從義遣人誘之佯許以華州節鉞思綰信之遂開門送欵從義入城思綰謁見即遣武士執之并其黨斬于市以功加同平章事周初加侍中移鎭許州改鎮天平世宗北征以從義副符彦卿充排陣使世宗還京師加兼中書令又改鎮武寜乾徳初拜䕶國軍節度使來朝太祖召於便殿擊踘從義易衣跨馬精心呈技以卜太祖之知及罷命升殿賜坐太祖謂曰卿之技誠妙矣然非將相所爲也從義大慙爲右金吾衛大將軍請老以太子太師致仕從義爲將有謀略爲人持重博通技藝善飛白書卒年六十四贈中書令臣稱曰唐季以來至于五代藩鎮之禍烈矣宋興令坤從義彦卿握重兵在河北守信審琦彦超等以宿將處方鎮而數子者識歴數之攸在知天命之有歸故號令一出莫不稽首聽命或納節以備宿衛或請老而知止足使藩鎮之禍泯然而不作克保功名長守富貴雖太祖之善御豪傑而亦數子者能擇其禍福輕重而審處之斯可以言智矣東都事略卷十九
