body:
  text: 東都事略卷二十宋王稱撰列傳三慕容延釗字化龍太原人也父章開州刺史延釗少以勇敢聞漢髙祖之起也周太祖爲其佐命以延釗𨽻帳下世宗即位領溪州刺史髙平之戰以功遷團練使拜睦州防禦使從世宗征淮南爲殿前都虞候與宋延渥大破其軍淮南平遷殿前副都指揮使淮南節度使徙鎮鎮寜爲殿前副都㸃檢太祖受䄠延釗時握重兵屯眞定太祖諭旨聽以便宜從事延釗與韓令坤率所部兵廵邊一方以安太祖深徳之加殿前都㸃檢同中書門下二品以其父名章不曰平章事也李筠叛命延釗與王全斌討之俄知潞州行府事澤潞平加兼侍中請解軍政徙山南東道節度使王師南征延釗將行營前軍時延釗被疾詔令肩輿即戎事遂平定荆湘是歳卒年五十六延釗與太祖友善太祖任殿前都㸃撿延釗爲副常兄事延釗及即位猶呼爲兄洎寢疾御封藥以賜聞其卒軫悼尤甚贈中書令追封河南郡王李處耘字正元潞州上黨人也父肈仕後唐爲軍校討王都于定州㑹契丹來援力戰死晉末處耘尚幼隨兄處疇至京師遇張彦澤之暴處耘善射獨當里門殺數十人里中頼之漢初隨折從阮于府州後從阮歴鄧滑等節度悉委處耘以軍政李繼勲鎭河陽補處耘右職繼勲罷世宗以處耘𨽻太祖帳下爲都押牙㑹太祖北征至陳橋處耘見軍中謀欲推戴遂召馬仁瑀李漢超等入白太祖太祖拒之既而諸軍大譟入驛門處耘臨機決事謀無不中太祖竒之授客省使兼樞密承旨從平澤潞遷宣徽北院使討李重進爲行營兵馬都監賊平以處耘知揚州有善政拜宣徽南院使樞密副使周保權乞師討張文表太祖命處耘與慕容延釗赴之以處耘爲都監師次江陵髙繼沖請舉族歸朝即引兵趨湖湘大破賊于三江口又遇賊帥張從富于澧江南擊敗之逐北至敖山砦賊棄砦走俘獲甚衆既而延釗大軍至州人大懼縱火焚州城而潰保權幼爲大將汪端所劫藏于江之南岸僧寺中處耘遣麾下將田守竒帥師渡江獲之磔于市遂入潭州盡得荆湖之地坐與延釗不協責淄州刺史卒年四十七贈宣徳軍節度使處耘多機謀常以功名自任自以受太祖非常之遇思有以報故臨事勇於敢爲遂至於貶朝廷以延釗宿將乃獨罪處耘而處耘終不自辨太宗明徳皇后處耘女也累贈處耘韓王子繼隆繼恂繼和繼恂官至洛苑使順州刺史處耘兄處疇至作坊使有子繼凝終樞密直學士繼隆字霸圖以父任爲供奉官常從宦于蜀還渉危棧身與馬皆墜絶澗十餘丈而不傷又更戍邵州至長沙遇蠻冦手足中藥箭得良藥而愈曹彬平江南太祖謂曰昇州平可持捷書來時内侍十數輩皆伺城陷獻捷㑹有機事當入奏繼隆請行太祖以城未下怪其來繼隆奏曰途遇大風天地冥晦城破之兆也翌日捷奏聞太祖語之曰昇州城已破如汝所言矣江南將盧絳擁兵數萬繼隆以威信諭之乃降江南平遷莊宅副使改六宅使太宗征太原討幽州圍范陽繼隆皆與焉又從崔翰戰徐河從潘美出代北皆有功李繼遷叛命繼隆擊之屢破繼遷之衆改環州團練使從曹彬北伐繼隆獲虜貴臣一人彬欲上其功繼隆力止之俄諸將兵敗獨繼隆振旅成列虜不敢犯即以繼隆知定州有敗兵數萬集城下繼隆給劵俾各持詣所𨽻太宗嘉其有謀端拱初累加至侍衛馬軍都指揮使領保順軍節度使出帥定州三年送芻粟入威虜軍虜騎八萬邀繼隆繼隆以萬人敗之追奔過徐河十餘里初詔止令堅壁清野繼隆曰閫外之事將帥得裁也中黄門杜延夀止之不能故成功詔廢威虜軍繼隆謂梁門爲北面保鄣不可廢也遂復城守召還改鎮定難時夏州趙保忠與繼遷連謀朝廷患之命繼隆將河西行營之師以討之既而繼遷遁擒保忠以獻於是諸將請誅保忠及出兵追賊繼隆曰保忠机上肉耳當請於天子今繼遷遁去千里窮磧難於轉餉宜養威持重未易輕舉諸將皆伏其言至道二年白守榮馬繼忠等送糧靈州爲賊所邀敗於洛河太宗聞之怒亟以繼隆出環州取東關鎮由赤檉苦井路赴之繼隆以所出道逺乏水請由槖駞路徑趣賊之巢穴太宗遣周瑩齎詔切責瑩未至繼隆已出軍行十餘日不見賊而還諸將失期繼隆乃奏轉運使陳緯梁鼎之乏糧並坐免官繼隆嘗受詔由旱海䕶靈州軍糧繼隆固執由古原州蔚茹河爲便太宗從之乃帥師以進壁古原州是爲鎮戎軍眞宗即位改鎮安軍節度使召還加同平章事徙鎮山南東道判許州景徳初契丹入邉踰魏至河上眞宗親征命繼隆爲排陣使先赴澶州契丹數十萬逼州北城繼隆與石保吉大破之彊弩斃其貴將順國王達蘭追奔數十里及車駕至幸北門觀兵召見勞問見其部伍嚴整歎息乆之撻覽既死契丹懼遂請和加開府儀同三司卒年五十六贈中書令諡曰忠武乾興初配享眞宗廟延繼隆性沉厚御下甚嚴好讀左氏春秋賔禮儒士子昭亮繼和字周叔少以䕃補供奉官三遷洛苑使初繼隆請城鎮戎軍朝廷疑之繼和奏曰平涼山川險阻旁扼夷落爲中華襟帶城之便太宗許之後復不能守繼和又以爲言遂城之以繼和知軍事李繼遷擾邊繼和上言鎮戎軍爲涇原儀渭北面捍蔽又爲環慶原渭儀秦熟户所依今置此城以扼賊要路臣慮議者以調發芻糧擾民爲言且此軍所費止出四州地里匪遥輸送甚易又守邊之臣内憂家屬之窘匱外憂姦邪之憎毁欲其奮不顧身令出惟行不可得也臣聞李漢超守關南屬州錢七千萬貫悉以給予非次犒賚動及千萬漢超猶私販㩁場規免征税當時有以此事逹于太祖者即詔漢超私物所在悉免關征故漢超居則營生戰則誓死太祖之世一方爲之安靜方今如漢超之才固亦不少願以太祖爲法選擇英傑使守靈武髙官厚禄不吝與之乃可保必勝之功又朝廷禁青鹽甚爲允愜斯困賊之良䇿也咸平五年繼和領兵殺衛埋族於天麻自是隴山外諸族皆恐懼内附繼和因請移涇原帥臣于鎮戎以壯軍勢又請開道環延爲應援眞宗嘉之爲并代鈐轄契丹入邉繼和領兵赴趙州躡其後契丹請和復還并代遷西上閤門使未幾擢殿前都虞候領端州防禦使卒年四十六昭亮字晦之四歳補供奉官父繼隆北征昭亮尚幼遣持詔軍中問方略及營陣衆寡之勢還奏稱旨累擢西上閤門使仁宗即位進東上閤門使知代州又知定州徙瀛州踰年拜成州團練使遷寜州防禦使徙定州改延州觀察使拜感徳軍留後爲秦鳳路副都總管徙永興軍路又徙天雄軍道除殿前副都指揮使尋知代州徙眞定路都緫管保州兵據城反昭亮徃諭以禍福因稍稍縋城下官軍遂入城以功拜懐康軍留後知定州明年拜武寜軍節度使殿前都指揮使有卒博于都市而撤屋椽相擊者捕斬之其軍校隨州刺史宋緒來謝亦杖之庭下仁宗祠南郊有騎卒亡所挾弓明日當以赦釋罪昭亮謂宿衛不謹不可以赦原配𨽻下軍慶歴八年拜宣徽北院使判河陽徙延州加南院使判澶州徙并州成徳軍拜同平章事判大名府定州歴鎮天雄彰信泰寜以疾願還爲景靈宫使卒年七十一贈中書令諡曰良僖昭亮爲人和易於軍政特嚴然喜交權貴頗爲時所非云王全斌太原人也父爲岢嵐軍使私蓄武士唐莊宗疑而召之懼不敢行全斌時年十二謂其父曰上疑父有異志若以全斌爲質則釋矣父如其言全斌因得𨽻莊宗帳下歴晉漢周以軍功積官至相州留後宋興除安國軍節度使徙鎮忠武太祖伐蜀以全斌將西川行營前軍率禁兵出鳳州孟昶遣大將王昭逺焚桔柏江浮橋退守劒門全斌遂克利州全斌謂諸將曰劒門天險古稱一夫荷戈萬夫莫當宜各陳進取之䇿侍衛軍頭向韜曰來蘇有路可通劒門蜀人於江西置砦對岸有度自此出劒門二十里至青彊店與大路合可於此進兵即劒門之險不可恃也全斌然之命偏將史延徳分兵趨來蘇造浮梁於江上蜀人見梁成弃砦而遁全斌等擊破之昭逺彦韜敗走皆見擒遂克劒州殺蜀軍萬餘人王師次魏城蜀主孟昶遣使奉表請降全斌入成都後十餘日劉光毅始自峽路至昶饋光毅等及犒師並同全斌之至㑹詔書頒賚諸軍亦無差等由是兩路主帥遂不協俄詔發蜀兵赴闕全斌等不時宣行蜀軍憤怨思亂軍至緜州果叛有衆十萬自號興國軍全師雄嘗爲蜀將亂兵推爲帥攻綿州又攻彭州成都十縣皆起兵應師雄師雄自號興蜀大王開幕府置僚屬衆益盛自是卭蜀等十七州並隨師雄爲亂全斌等甚懼時城中降兵尚二萬餘人全斌慮其應賊殺之夾城中未幾劉光毅曹彬破師雄之衆于新繁擒萬人師雄退保郫縣全斌與王仁贍又攻破之師雄走虎㨗指揮使吕翰爲主將不禮與師雄黨劉澤合衆至五萬仁贍等討吕翰於嘉州翰敗入雅州師雄病死于金堂仁贍又敗吕翰于雅州翰走黎州爲下所殺賊衆始息初全斌之至蜀也適屬冬杪京師大雪太祖設氊帷於講武殿衣紫貂裘㡌以視事急謂左右曰我被服如此尚覺寒況征蜀將士乎即解裘㡌遣使賜全斌全斌受賜感泣於是蜀民訟其掊克太祖以其新立功不欲辱以獄吏令中書問狀全斌等具伏隱没金銀犀玉錢帛十六萬餘緡又受僞蜀臣僚賂遺九萬緡又擅開豐徳庫致失錢二十八萬一千餘緡太祖令御史臺於朝堂集百官議於是百官定議全斌等罪當大辟太祖貸其死乃責崇義軍留後太祖郊祀洛陽召全斌侍祠復武寜軍節度使謂之曰朕以江左未平慮征南諸將不遵紀律故抑卿數年爲朕立法今已克金陵還卿旄鉞仍賜以銀器萬兩帛萬匹錢千萬全斌至鎮數月卒年六十九贈中書令全斌貶黜凡十年怡然自得子審鈞至崇儀使以擊賊而死審鈞子惟志惟志子凱凱字勝之審鈞既死王事遂徙居京兆家富於財凱日散施結客與少年馳獵南山下或踰月不歸民有訟其踐田苗者收至府冦準守京兆見而竒之言於朝以全斌平蜀之功而審鈞復死於忠義當録其後遂除凱三班奉職累擢閤門祗候鎮定邢趙都廵撿使趙元昊反徙監麟州兵以功遷至武勝軍留後馬軍副指揮使卒年六十六贈彰武軍節度使諡曰壯恪子緘緘之子詵字晉卿尚英宗女蜀國公主拜駙馬都尉詵能詩善畫官至留後王仁贍字子豐唐州方城人也少倜儻不事生業劉詞爲永興軍節度使以爲牙校詞卒遺奏薦仁贍材可用太祖素知其名請於世宗𨽻帳下宋興授武徳使乾徳三年自内客省使拜樞密副使王師伐蜀仁贍爲行營前軍都監蜀平坐没入生口財貨殺降兵至蜀土擾亂責右衛大將軍初大將王全斌貪財貨不戢軍政冦盜充斥太祖知之及全斌歸闕太祖召仁贍詰之仁贍歴詆諸將過失以自解太祖曰納李廷珪女開豐徳庫取金寳此豈全斌等耶廷珪故蜀將也開寳末領三司使仁贍在三司僅十年頗縱吏爲姦利時副使陳恕任苛察互持三司短長仁贍不能勝責唐州防禦使仁贍既失權因怏怏而卒年六十六崔彦進大名人也少有膂力善騎射漢乾祐中𨽻周太祖帳下累遷至昭州刺史國初從征李筠爲先鋒以功遷常州防禦使遷侍衛歩軍都指揮使領武信軍節度使王師伐蜀以彦進副王全斌將行營前軍蜀平坐縱部下略玉帛子女及諸不法事左遷昭化軍留後太祖郊祀西洛彦進來朝授彰信軍節度使移鎮河陽太祖征太原詔彦進攻其東太原平從征幽州與曹彬米信出雄州王師敗績坐違彬節度貶右武衛上將軍乆之拜保靜軍節度使卒年六十七贈侍中劉廷讓其先涿州范陽人也曾祖仁恭唐盧龍節度使祖守文襲滄州昭宗授以節鉞其弟守光囚其父守文舉兵討之爲守光所殺父延進避難南奔廷讓少時以勇力聞周太祖鎭鄴以𨽻帳下仕至涪州團練使國初轉江州防禦使從征李筠爲先鋒改侍衛馬軍都指揮使領寜江軍節度使王師伐蜀命廷讓率禁旅由歸州路進討將行太祖以圖示之指夔鎻江處曰至此我之舟師當止三十里外以歩騎先進出其不意而擊之俟其稍却即以戰棹夾攻之取之必矣於是大敗蜀軍遂破夔州進克萬施開忠四州峽中郡縣悉下師進次遂州克之以府庫賚將士始王師之出也太祖謂曰所破郡縣當傾帑爲朕給戰士朕所取惟疆土爾故人皆效命所至有功如席卷之易及蜀平王全斌等皆坐貪縱左遷惟廷讓所至秋毫不犯及全師雄作亂又與曹彬破之以功改鎮安軍節度使徙鎮鎮寜廷讓本名光毅太宗即位賜今名入爲右驍衛上將軍雍熈三年曹彬敗於岐溝太宗以廷讓知雄州徙瀛州與契丹戰于君子館我師敗績契丹遂陷祁徳等州廷讓詣闕請罪太宗不之責也復命知雄州以病求歸京師不俟報離屯所太宗怒下御史問狀削奪官爵流商州行至華州而卒年五十九太宗念之贈太師臣稱曰自古用兵行師主帥共事及其成功未有無嫌隙者也延釗處耘兵不血刃而平荆湖功髙矣由是而生隙全斌光毅分路伐蜀朝廷賜予無差等亦因之而不協得非以位侔勢逼使之然耶獨澶淵之役石保吉與李繼隆不矜其功更相推遜于上前爲可嘉也保吉曰布列行陳指授方略皆出於繼隆繼隆曰宣力用心躬率將士臣不如保吉豈不賢哉東都事略卷二十
