body:
  text: 東都事略卷二十三宋王稱撰列傳六孟昶其先邢州龍岡人也本名仁賛父知祥尚唐莊宗妹瓊華公主莊宗遣魏王繼岌郭崇韜平王衍以知祥爲成都尹充節度副大使莊宗崩明宗爲送公主二子入蜀安重誨用事以李嚴爲西川監軍使圖之知祥遂殺嚴而結東川董璋婚姻謀據劒南既而明宗誅璋家族遣使諭知祥以伐蜀出於安重誨重誨既死知祥乃上書謝罪璋疑其貳遂以兵襲知祥璋敗明宗以兩川授知祥封爲蜀王許行墨制明宗崩遂僭位國號蜀改元曰明徳於是盡有王氏故地以昶爲崇聖宫使東川節度使同平章事知祥疾立爲皇太子監國知祥卒昶立尊母李氏爲皇太后四年改元廣政周世宗既取秦鳳昶懼致書世宗稱大蜀皇帝世宗怒其亢禮不荅昶不自安乃於劒門夔峽多積芻粟增置師旅禁鐵爲錢凡境内鐵爲器用者置場鬻之以專其利立其子元喆爲皇太子用王昭逺伊審徴韓保正趙崇韜等分掌機要其母謂昶曰吾見莊宗及爾父時非有功者不使主兵以故人皆畏伏樂爲之用昭逺出於微賤特爾初學時給事左右保正等皆世禄之子不知兵髙彦儔是爾父故人秉心忠實多所經練此可委任昶不用其言宋興昶懼潜結太原劉承鈞爲援以撓中國乾徳二年遣諜者孫遇閒道齎蠟彈書爲朝廷所獲太祖得之喜曰吾用師有名矣即命王全斌崔彦進王仁贍劉光毅曹彬等分路伐蜀所至皆克光毅之師至夔州或勸守將髙彦儔降彦儔曰老幼百口在成都若一身偷生舉族何負吾今日止有死爾即具衣冠西北望再拜登樓縱火自焚始昶母謂昶惟彦儔可委任及是果死之三年全斌之師次魏城昶上表請降太祖賜詔慰安之初王師將及境昶遣其子元喆爲元帥守劒門自成都携妓樂嬉戲而行聞劒門已破遂遁歸昶又命王昭逺趙崇韜揔兵拒戰昭逺曰是行也豈止克敵當定中原矣執鐵如意指揮軍事自比諸葛亮及崇韜敗昭逺遂竄匿東川民舍遽爲追兵所執其它悉爲降虜也出師凡六十六日而兩川平昶乃與其官屬由峽江而下昶至京師太祖御崇元殿備禮見之授開府儀同三司兼中書令秦國公七日而卒冊封楚王諡曰恭孝自知祥割據至昶失國凡三十二年初昶母李氏隨至京師太祖呼爲國母謂曰無戚戚懐鄉土異日當送母歸李氏曰使妾安往太祖曰歸蜀爾李氏曰妾家太原儻得歸老妾之願也太祖聞其言大喜曰俟吾平劉承鈞當如母願及昶卒李氏不哭以酒酹地曰汝不能死社禝貪生以至今日吾所以不死者以汝在也汝既死吾何以生爲因不食而卒太祖聞而哀之昶三弟仁贄在國時封雅王仁祐彭王仁操嘉王歸朝並爲環衛官仁贄終大同軍節度使仁祐右羽林軍統軍仁操左龍武統軍子元喆元珏元喆在蜀封秦王昶之廣政二十五年立爲皇太子王師伐蜀昶以爲元帥劒門䧟遂遁歸隨昶入朝拜泰寜軍節度使居鎮十餘年亦有治迹移鎮定州從平太原又從征幽州與諸將破契丹于徐河以功封滕國公知滑州又知滁州卒年五十五元珏初封襃王歸朝爲右千牛衛上將軍遷右神武統軍出知滑州以卒元喆有子隆訨隆詁隆說隆詮皆進士及第劉鋹其先蔡州上蔡人也五世祖安仁唐潮州刺史子孫因家嶺南宰相韋宙以其兄之子妻安仁之子生謙謙生隱謙仕至封州刺史昭宗時嗣薛王知柔鎮廣州以隱爲司馬知柔委以兵柄宰相徐彦若代知柔以隱爲節度副使彦若卒遺奏薦爲留後遂拜節度使梁開平初兼靜海軍節度使封南平王隱卒弟陟襲位時邕州葉廣略容州龎巨昭交州曲承美皆自擅兵賦而陟并之遂盡有嶺表之地僭稱帝國號大漢改元乾亨更名巖又更襲又更龑龑性酷暴行炮烙刳剔截舌灌鼻之刑爲玉堂珠殿飾以金碧翠羽見北人必自言世居咸秦耻爲南蠻主呼中朝天子爲洛州刺史龑卒子玢立爲其弟晟所殺而自立晟造鐵湯鐵床之獄聞湖南馬氏兄弟之隙遂遣兵取桂林栁賀之地晟卒子鋹立鋹初名保興封衛王既襲位改今名改元大寳委政閹官後宫亦令冠帶與政其臣下有小過或將大用則加以宫刑作燒煑剥剔刀山劒樹之刑或令罪人鬬虎抵象又賦斂煩重人不聊生民入城者輸一錢瓊州米斗稅五錢置媚川都定其課令入海五百尺採珠所居宫殿棟宇皆以珠及玳瑁飾之滛侈無度乾徳中王師南伐克郴州獲其内品十餘人有余延業者太祖見之問曰爾在嶺南何官對曰爲扈駕弓箭官令取弓矢授之延業極力控弦不開太祖因笑問鋹爲治之迹延業備言其奢酷太祖驚駭曰吾當救此一方之民遂詔江南李煜諭鋹使稱臣鋹不從煜又遣其臣龔正儀使于鋹遺鋹書曰頃者大朝南伐圖復楚疆交兵以來遂成釁隙詳觀事勢深切憂懐冀息大朝之兵永契親仁之願引領南望于今累年昨命使臣入貢大朝大朝皇帝果以此事宣示云且彼若以事大之禮而事我我則何苦而伐之若與興戎而爭我則以必取爲度矣見今大振師旅仍以上秋爲期深料大朝之心非有唯利之貪蓋怒人之不賔而足下非有不得已之事與不可易之謀殆一時之忿而已觀夫古之用武而必戰者有四父母宗廟之讎此必戰也彼此烏合民無定心存亡之機以戰爲命此必戰也敵人有進必不捨我求和不得退守無路戰亦亡不戰亦亡奮不顧命此必戰也彼有天亡之兆我懐進取之機此必戰也今足下與大朝非有父母宗廟之讎也非同烏合存亡之際也既殊進退不捨奮不顧命也又異乗機進取之時也既大朝許以通好又拒而不從有國家利社禝者當若是乎况大朝皇帝以命世之英光宅中夏方且遏天下之兵鋒俟貴國之嘉問則大國之義斯亦善矣足下之忿亦可息矣若介然不移有利於宗廟社禝可也有利於黎元可也有利於天下可也有利於身可也若無一利焉何用棄徳修怨自生仇敵使赫赫南國將成禍機炎炎奈何其可嚮邇煜近奉大朝諭㫖以爲足下無通好之心必舉上秋之役雖善隣之心期於永保而事大之節焉敢固違恐煜之不得事足下也鋹得書遂囚正儀驛書荅煜言甚不遜煜以其書聞命潘美伐之師次白霞鋹遣龔澄樞守賀州薛崇譽守桂州李托守韶州以備是嵗美平昭桂連賀等州又平韶州明年平英雄二州王師將至廣州鋹懼遣其臣蕭漼奉表乞降王師頓城外鋹復遣其弟保與來拒戰美進師鋹復遣保興詣美軍乞降不納銀盡焚兵府庫以爲空城謂王師不能久駐當北還也巳而克廣州遂擒銀并其臣劉保興潘崇徹龔澄樞李托薛崇譽等以獻有司以帛係鋹及其官屬獻太廟太社太祖御明徳門受俘宣詔責鋹鋹伏地待罪太祖命斬澄樞托崇譽于千秋門外釋鋹罪以爲右千牛衛大將軍封恩赦候保興爲右監門率府率太祖甞幸講武池鋹先至賜以巵酒鋹疑其酖泣曰臣承父祖基業違拒朝廷勞王師致討罪固當死陛下不殺臣今見太平得爲大梁布衣足矣願延旦夕之命以全陛下生成之恩臣未敢飲此酒太祖笑曰朕推赤心置人腹中安有此事取而自飲之别酌賜鋹鋹大慙頓首謝遷左監門衛大將軍封彭城郡公太平興國初封衛國公太宗將討太原召近臣宴飲鋹與焉自言朝廷威靈及逺四方僭竊之主今日盡在坐中旦夕平太原劉繼元又至臣率先歸朝願得執挺爲諸國降王之長太宗大笑其談諧皆此類也卒年三十九贈太師南越王初龑命日者筮國祚遇復之豐曰將五十五年乎其後果然李煜字重光徐州人也祖昪父景昪爲呉將徐温養子因冒姓徐名知誥唐天成二年温卒昪將出鎮欲以國事付景遂參政事昪鎮金陵遷景司徒平章事爲中外諸軍副都統昪受呉禪國號齊改元昇元僭帝號自以爲唐之後也復姓李國號唐景初名景通後改爲璟避周諱復名景初封呉王爲諸道元帥録尚書事改封齊王昪卒景嗣既襲位改元保大尊母宋氏爲皇太后立妻鍾氏爲皇后用宋齊丘周宗爲宰相周世宗既盡取江北十四州之地景懼禀周正朔上表稱國主世宗荅書云皇帝恭問江南國主勞之而已景由是頗躁憤遂殺齊丘等太祖受命景遣使朝貢徙都南昌景卒子煜嗣表請追尊帝號太祖許之諡景爲明道崇徳文宣孝皇帝廟號元宗陵曰順陵煜本名從嘉初封安定郡公累遷諸衛大將軍副元帥封鄭王又封呉王景遷南昌立爲太子監國襲位于建康改今名立母鍾氏爲聖尊后以父名泰章故也妻周氏爲國后遣使入貢奉表陳紹襲太祖詔荅焉自景内附周世宗貽書於景至是始賜煜詔而不名及嶺南平煜懼上表遂改唐國主爲江南國主改唐國印爲江南國印又請所賜詔呼名許之於是貶損節度下書稱教改中書門下省爲左右内史府尚書省爲司㑹府御史䑓爲司憲司翰林爲文館樞密院爲光政院降封諸王爲國公官號名多所更易嵗貢長春節錢三千萬遣其弟從善來朝以爲泰寜軍節度使賜第留京師煜雖外恭順而内實繕甲兵爲戰備太祖諭令入朝不從命開寳七年詔煜赴闕煜又稱疾不奉詔乃命曹彬潘美征之所至皆下初樊若水在江南舉進士不第嘗因釣魚采石江上以漁船載絲繩度江之廣狹上書言江南可伐之狀請造浮橋以濟師太祖用其計下荆湖造大橋聫巨艦而下煜語其臣張洎洎對曰載籍以来長江無浮梁之事煜曰吾亦以為兒戲爾及王師度江薄城果以浮梁而煜不知也若水初除舒州推官及計既行遂領池州後改名知古官至給事中當王師度江也煜以兵柄任皇甫繼勲以機事屬陳喬張洎傳詔内殿者徐元瑀徐元瑜刁術邊書告急元瑜等匿而不通及兵圍城煜驚且怒遂殺繼勲初彬之南征也太祖諭之曰卿至金陵戒暴略示兵威令其歸順不必急攻至是煜危甚遣其臣徐鉉周惟簡至京師煜上奏曰臣猥以幽孱曲承臨照僻在幽逺忠義自持唯將一心上結明主比蒙號召自取愆尤王師四臨無往不克途窮道迫天實爲之北望天門心懸魏闕嗟一城生聚吾君赤子也微臣薄軀吾君外臣也忍使一朝便忘覆育號咷鬱咽盍見捨乎臣性實愚昧才無異禀受皇朝奬與首冠萬方奈何一日自踵蜀漢不臣之子同羣合類而爲囚虜乎貽責天下取辱祖先臣所以不忍也豈獨臣不忍爲亦聖君不忍令臣之爲也況乎名辱身毁古人之所嫌畏者也人所嫌畏臣不敢不嫌畏也惟陛下寛之赦之臣又聞鳥獸微物也依人而猶哀之君臣大義也傾忠能無憐乎儻令臣進退之跡不至醜惡宗社之失不自臣身是臣死生之願畢矣實存没之幸也豈惟存没之幸也實舉國之受賜也豈惟舉國之受賜也實天下之鼓舞也皇天后土實鑒斯言鉉等至京師見太祖言曰李煜何罪而陛下伐之且煜事陛下如子事父其說累數百言太祖曰爾謂父子爲兩家可乎鉉不能對鉉等既還煜復遣入奏鉉言李煜事大之禮甚恭以病未任朝謁非敢拒詔乞緩兵以全一邦之命太祖怒按劒謂鉉曰不須多言江南亦有何罪但天下一家臥榻之側豈容他人鼾睡鉉皇恐而退初太祖詔諸將罷攻城令自歸闕煜爲左右所惑猶豫不決遂詔進兵八年城䧟煜就擒彬露布以聞先是陳喬張洎事煜同掌機務及朝廷舉兵乃相謂當死社禝及城䧟洎不能死喬徑入白煜曰今日國亡願加顯戮以謝國人煜曰此厯數卿死無益也喬曰縱不殺臣臣何面目以見士大夫乎遂死之又内史舍人潘佑甞上煜書曰臣聞三軍可奪帥也匹夫不可奪志也殿下黨蔽姦回曲容諂僞受賊臣之佞媚保賊臣之骨肉使國家愔愔如日將莫不顧兆人之患不憂宗社之覆以古觀之則知殿下爲君不道桀紂孫皓破國亡家自已而作爲千古笑今殿下取則姦回以敗亂國家是殿下爲君不及桀紂孫皓逺矣臣必退之心有死而已不能與姦臣比肩而事亡國之主使一旦爲天下笑煜大怒殺之後二歳國亡太祖御明徳門受俘太祖以其甞奉正朔也詔露布寢而不宣釋其罪以爲右千牛衛上將軍封違命侯自昪至煜三主共三十九年而失國太宗即位加特進封隴西郡公卒年四十二贈太師封呉王子仲㝢在國時封清源郡公歸朝爲千牛衛大將軍郢州刺史卒年三十七劉繼元并州太原人也其母劉崇之女適薛氏生繼元及其兄繼恩崇漢髙祖之母弟也漢初爲太原尹北京留守及隱帝遇害周太祖以兵入京師漢太后遣太師馮道迎崇之子贇於徐州欲使襲漢位少尹李驤語崇曰觀郭公用心當自取之不若以兵至孟津觀變俟徐州踐祚則無可疑矣崇怒以爲驤欲離閒父子并其妻殺之已而周太祖登位崇遣人乞贇歸藩始知贇死矣乃爲驤立廟遂僭帝號重幣結契丹如晉髙祖約爲父子改名是稱漢乾祐年號契丹冊爲大漢神武皇帝旻死子承鈞襲位改元天㑹承鈞結李景孟昶爲助仍求援於李筠筠叛承鈞舉兵助之筠敗其宰相衛融爲王師所擒太祖責之曰汝何敢助李筠反融曰犬吠非其主臣四十口受劉氏豐衣美食不忍負之臣終不爲陛下用得閒走河東爾太祖怒命以檛擊之融大呼曰大丈夫死或重於泰山或輕於鴻毛今之死正得其死所太祖曰此忠臣也遽命釋之以爲太府卿太祖嘗因界上諜者謂承鈞曰君家與周氏爲世讎宜其不屈今我與爾無所閒何爲困此一方之人也若有志中國宜下太行以決勝負承鈞遣諜者復命曰河東土地甲兵不足以當中國然承鈞家世非叛者區區守此蓋懼漢氏之不血食也太祖哀其言笑謂諜者曰爲我語承鈞開爾一路以爲生遂終其世不加兵承鈞死繼恩嗣繼恩爲其臣侯霸榮所殺宰相郭無爲遂援立繼元改元廣運復結契丹爲援太祖遂親征嘗遣詔諭繼元無爲許以平盧軍節度使繼元以疑無爲無爲復勸使效順又欲叱兵出戰太祖命引汾水浸其城繼元殺無爲以徇無爲棣州人博學有詞辨初隱武當山承鈞以諫議大夫起之遂爲相太常博士李光賛上言曰陛下應天順人戰無不勝四方恃險之邦僭竊稱帝王者悉與中國爲隣今與陛下爲臣矣今天時向暑兩河泛溢道路艱阻輦運稽留蕞爾太原豈煩親討㑹王師頓兵甘草地歳暑雨軍士多疾太祖欲班師禁軍校趙翰等叩頭願乗城急擊以盡死力太祖曰汝曹我所訓練無不一當百以備肘腋同休戚也我寜不取太原豈忍驅汝曹冒鋒鏑而蹈必死之地乎衛士皆感泣遂班師太平興國四年太宗親征於是宰相諫止之太宗曰朕計決矣王師圍太原太宗以詔諭之王師進攻甚急太宗恐諸將屠城城垂陷繼元上表乞降自崇僭號至繼元國滅凡四主二十八年繼元之未敗也太宗先命郭進斷契丹之援於石嶺關進至契丹果來援進擊走之繼元猶以蠟彈帛書求救於契丹進得之以徇城下及降太宗宥其罪授右衛上將軍封彭城郡公賜第京師初太宗行次澶淵有太僕寺丞宋㨗者迎謁道左太宗見其姓名喜曰吾其㨗矣太宗將至太原語侍臣曰我以端五日當置酒髙㑹於太原城中及繼元降果五月五日也太宗嘗謂近臣曰晉司馬昭以劉禪思蜀之對戲之云何乃似郤正之言此不仁之甚也亡國之君皆闇懦所致茍有逺識豈至滅亡此正可愍傷何反戲侮之乎劉繼元朕前日所虜者待之常以賔禮猶恐不慰其意爾太宗以房州爲保康軍授繼元節度使卒遺奏以六歳子三豬爲託贈中書令彭城郡王三豬名守節以爲西京作坊使後遷至諸衛將軍臣稱曰昔王朴陳用兵之略以淮南可最先取并必死之冦最後亡及宋興并最後服皆如朴言是不然昔太祖既平湖湘嘗謂太宗曰中國自五代已來兵連禍結帑藏空虚必先取巴蜀次及廣南江南即國用富饒矣河東與契丹接境若取之則契丹之患我當之也姑存之以爲我屏翰俟我富實則取之故即位之六年平蜀又三年征太原又二年平嶺南又三年平江表及太宗再北征乃克之此廟謨雄斷施設先後之序如此豈以并必死之冦而置之哉誠非朴之所及也東都事略卷二十三
