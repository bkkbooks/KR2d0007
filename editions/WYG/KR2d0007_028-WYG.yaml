body:
  text: 東都事略卷二十八宋王稱撰列傳十一馮繼業字嗣宗大名人也父暉朔方節度使封衞王五代史有傳繼業敏惠有度量以父任補朔方軍節院使牙内都虞候周廣順初暉疾繼業圖殺其兄繼勲暉卒遂代其父位為朔方軍留後遷節度使建隆初來朝開寳二年拜靖難軍節度使改鎭定國太平興國初封梁國公遂留京師卒年五十一贈侍中初太祖禦戎不勤逺略夏州李彞興河西折御勲與朔方之軍皆因其酋豪許以世襲由是邊圉無事朔方之族既徙其後夏州李繼捧亦以其地歸朝繼捧之弟繼遷遂為變而朝廷始旰食云折徳扆世居雲中父從阮自晉以來仕周至靜難軍節度使五代史有傳從阮鎭府州以徳扆為牙校漢初領勝州刺史世宗建府州為永安軍以徳扆為節度使國初破河東沙谷砦斬首五百級建隆二年來朝太祖待遇甚厚遣還鎭破太原軍數千扵城下擒其将楊磷卒于鎭年四十八贈侍中子御勲字世隆徳扆鎭府州奏為右職徳扆卒以御勲領汾州團練使權知府州稍遷至永安軍留後開寳元年來朝拜泰寧軍節度使卒年四十贈侍中御勲弟御卿幼補節院使御勲知州事以為馬歩軍都校御勲徙鎭召為閑廐副使知府州太宗征河東命御卿攻嵐州又破岢嵐軍擒其軍使折令圖以獻遂下嵐州又殺其憲州刺史霍翊又禽其将馬延忠遷崇儀使以功擢府州觀察使拜永安軍節度使契丹萬騎入邊御卿率兵大敗之于子河汊自是契丹不敢入邊一日契丹韓徳威為李繼遷所誘内侵方御卿被病力疾出戰徳威聞其來不敢進既而疾亟母令人召歸御卿曰世受國恩敵國未滅御卿之罪也今臨敵安可弃士卒死於軍中分也為白太夫人無念我忠孝豈兩全耶言訖泣下翌日卒年三十八贈侍中以其子惟正知留後惟正歸朝其弟惟昌繼之惟昌咸平中屢破趙保吉之衆以功領富州刺史改文思使拜興州刺史卒年三十七以其弟惟忠知府州官至簡州團練使惟忠卒子繼祖嗣領州事官至解州防禦使熈寧中卒繼祖子當襲而請授其兄之子克柔克柔卒而繼祖兄繼閔之子克行襲知府州繼閔官至宫苑使始克行居行間無所知名賊冦慶州种諤拒之令河東出師為援克行請行為先鋒戰葭蘆川以功遂知府州西夏久窺河外克行每出必勝賊畏之元符中太原帥欲城葭蘆以復故地召克行問策克行條具所見遂以師出界分遣諸将約束為深入窮討之状賊疑不敢動遂城葭蘆時河東進築八砦通道鄜延帥秦希甫至議築先後克行請以兩路兵同時深入先築逺者出賊不意帥用其策卒城之克行沈勇有力善撫士卒在邊三十年戰功最多敵畏其威名號折家父官至秦州觀察使卒贈武安軍節度使以其子四方館使廉州刺史可大為榮州團練使知府州党進朔州馬邑人也幼事杜重威于大名重威愛其淳謹雖長猶令與姫妾雜侍重威敗周太祖得之以為鐵騎都虞候稍遷睦州防禦使建隆二年改領閬州乾徳初領利州觀察留後除彰信軍節度使兼侍衞步軍都指揮使王師征太原以進将河東行營前軍開寳二年太祖征晉陽分置砦於四面命進主其東偏師未成列太原驍將楊業領突騎數百來犯王師進挺身逐業麾下數人隨之業走入城壕援兵至業縁縋入城免改侍衞馬軍都指揮使領鎭安軍節度使九年又命進帥師征太原進入其境敗太原軍于城北太祖崩召還出鎭忠武卒年五十一贈侍中進名進自稱曰暉人問之則曰吾欲從吾便耳進揔禁旅不識字不記兵籍一日太祖問之舉梃以軍司所書兵騎戎器數請太祖自視太祖喜其朴直廵徼京師見珍禽奇獸必放之曰不養父母反養此耶太宗為晉王時嘗命親吏臂鷹鶵進亟欲放之吏曰此晉王鷹也進乃戒之曰汝謹養視小民傳以為笑其變詐多類此杜重威之後貧窶進月分奉以給之士大夫或媿焉曹翰大名人也少為郡小吏周太祖鎭鄴奇之以𨽻世宗帳下世宗鎭澶淵以為牙校及尹開封翰猶在澶淵聞太祖寢疾不俟召見世宗密言曰王為冢嗣不侍醫藥何以副天下望世宗悟入侍禁中以府事命翰緫決世宗即位補供奉官稍遷樞密承旨世宗征淮南留鎧甲千數在正陽既而遣降卒八百來京師翰遇之於道懼其過正陽劫兵器叛盡殺之及見世宗具言其事世宗不恱亦不之罪也從征瓦橋㑹班師留翰知雄州改徳州刺史太祖征蜀以翰為均州刺史鑿山開道商旅以濟詔翰兼轉運使而糧餽不乏蜀平全師雄擁衆十萬叛翰與曹彬劉光毅討平之又軍校吕翰盜據嘉州翰及諸将奪其城諜知賊欲三鼓復攻城戒擊柝使緩向晨猶二鼓賊衆不集而潰師還遷蔡州團練使改潁州從征太原㑹河決翰董其役指日而訖事後復有決其績用亦然将征江南命翰率兵先赴荆南以翰為先鋒使克池州金陵平江州軍校胡徳據城拒命翰率兵討之凡五月而陷翰怒屠其城無噍類又殺兵八百所奪金帛以億萬計偽言欲致廬山羅漢鑄像於京師因調巨艦百艘載所得以歸以功遷桂州觀察使判潁州從太宗征太原又從征幽州所部攻城之東南隅卒掘土得蠏以獻翰謂諸将曰蠏水物而陸居失所也且多足慮救将至不可進㧞之象其班師乎已而果然除威塞軍節度使仍判潁州命攻幽州詔督役開河南自雄至莫以通漕運翰遣徒伐巨木於敵地授五騎以五色旗為斥候如遇冦舉白旗有林木舉青旗煙火舉赤旗陂澤舉黒旗丘陵舉黄旗以為應又起烽燧于境上敵疑而不敢近塞事遂濟乃歸鎭翰掊克苛酷在郡不法汝陰令孫崇望詣闕訴其事遣御史滕中正乗傳鞫之獄具當棄市太宗貸之削奪官爵流登州起為右千牛衞大将軍分司西京召入為左千牛衞上将軍卒年六十九贈太尉諡曰武毅翰隂險多智數貪冒貨賄喜誕妄飲酒至數斗不亂對上奏事雖數十條皆嘿記不少差崔翰字仲文京兆人也少有大志風姿偉秀太祖見而奇之以𨽻麾下及即位擢至刺史太宗嗣位進端州團練使太宗講武近郊命翰專金鼓軍容甚整太宗恱以藩邸時金帶賜之謂左右曰如崔翰必不能事晉朝言政出多門故也從征太原流矢中頰猶戰不已太宗親至其帳撫之北伐班師次金臺驛軍潰太宗令率衞士千餘止之翰請單騎以方略告諭衆遂定不戮一人以復命太宗喜因命翰知定州㳂邊諸軍並受翰節度軍市租儲聽其專用㑹李漢超崔彦進破契丹于徐河契丹投西山坑谷死者不可勝計俘馘數萬他物又十倍焉擢武泰軍節度使改鎮威徳至鎭方盜賊充斥翰誘其渠魁諭以禍福乃相率出境又徙鎭鎭安帥髙陽召還以疾留京師疾間見太宗言曰臣不願死於家願馬革裹尸死于邊太宗壯其言復令赴治所卒年六十三贈侍中翰沉毅有謀所至多成功輕財好施死之日家無餘貲晚年酷信釋氏云李懷忠涿州人也事太祖為牙校累遷富州刺史太祖征太原城未下㑹盛暑太祖深恤士卒欲班師懐忠言曰賊嬰城自守度其内無儲偫外無援兵豈足以久抗王師臣願執銳先登必取之不然死于賊太祖壯其言俾攻城中流矢幾死太祖嘉之遷富州團練使太祖幸西京有遷都意懷忠乗閒言曰汴都歲漕江淮米四五百萬斛贍軍數十萬計帑藏重兵在焉陛下遽欲都洛臣實未見其利會晉王亦以為言太祖曰遷洛未久又當遷雍晉王扣其指太祖曰吾将西遷者無它據山河之勝而去宂兵循周漢之故事以安天下晉王又言在徳不在險太祖不應晉王出太祖謂侍臣曰晉王之言若從之患不在今日自此去不出百年天下民力殫矣乃不果遷遂還京師太宗即位改防禦使拜大同軍節度使卒贈侍中田重進幽州人也周顯徳中應募為卒𨽻太祖麾下太祖受䄠遷御馬軍使累積戰功官至刺史太宗即位為靜難軍節度使雍熈中領兵從飛狐路破敵衆獲其驍将大鵬翼并契丹渤海三千餘人斬首數千級逐北四十里下飛狐靈丘等城以功改彰信軍節度使徙鎭成徳永興改知延州復還鎭卒年六十九贈侍中重進朴愿不知書太宗在藩邸愛其忠勇嘗遺以酒炙不受使者曰此晉王所賜也重進曰為我謝晉王我知有天子爾卒不受太宗嘉之既即位謂其無私交故始終委遇焉米信舊字海進本奚族也少以勇悍聞周太祖即位𨽻護聖軍太祖緫禁兵以信𨽻麾下宋興稍遷至林州刺史太宗即位以為髙州團練使領洮州觀察使太宗征太原以信為行營馬歩軍都指揮使太宗既平太原遂移兵伐契丹師還信以功擢保順軍節度使時信親族多在塞外㑹兄之子全自朔州挺身來歸太宗遣全乗傳詣代州伺閒迎致其親屬發勁卒護送之既而全宿留踰年敵境斥候嚴竟不能致信慷慨曰我聞忠孝不兩全方思以身徇國何以親族為北望號慟戒子姪勿復言遷侍衞馬軍都指揮使徙鎭彰化太宗征幽薊命信将幽州西北道行營馬步軍敗契丹于新城契丹率衆復戰王師稍却信獨以麾下龍衞卒三百禦敵敵圍之數重矢下如雨信射中數人麾下卒多死㑹暮信持大刀率從騎大呼殺數十人敵遂小却信以百餘騎突圍得免坐失律當死詔原之責授右屯衞大将軍明年授彰武軍節度使改鎭横海信不知書所為暴横太宗命何承矩為其副委以州事及承矩領護屯田信遂恣為不法太宗知之召為右武衞上将軍明年判左右金吾街仗事未踰月以無名被捶撻者甚衆彊市人物妻死買地營葬妄發居民家墓奴之父老病箠之致死為其家人所告下御史鞫之信具伏獄未上而卒年六十七贈横海軍節度使東都事略巻二十八
