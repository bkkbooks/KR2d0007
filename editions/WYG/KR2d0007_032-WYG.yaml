body:
  text: 東都事略卷三十二宋王稱撰列傳十五李昉字明逺深州饒陽人也父超仕晉為集賢院學士昉以蔭補太廟齋郎舉進士為祕書郎直洪文館改右拾遺周宰相李榖将兵征淮南以昉為記室參軍師還擢知制誥翰林學士國初遷中書舎人罷為給事中王師平湖湘以昉知衡州陶榖誣奏昉為親屬求東畿令太祖召問張昭昭老儒氣直免冠上前言曰榖罔上太祖疑之乃出昉為彰武行軍司馬召還復拜中書舎人直學士院與盧多遜同直立多遜下太祖即日拜昉為直學士立多遜上坐貢士所取失當左遷太常少卿明年復拜中書舎人翰林學士盧多遜攻趙普之短太祖以問昉昉曰臣書詔之外它無所知太祖黙然加工部侍郎從太宗征太原拜工部尚書遷承旨太平興國八年改文明殿學士遂除參知政事是歲拜同中書門下平章事監修國史加中書侍郎太宗嘗語輔臣曰朕何如唐太宗皆曰陛下堯舜之主也何太宗之足云昉獨無言徐誦白居易詩云怨女三千放出宫死囚四百來歸獄太宗拱手曰朕不及也昉請復時政記先進御然後付史館時政記進御自昉始也端拱初罷為右僕射時契丹犯邊詔羣臣各上禦戎之策昉引漢唐故事深以屈己修好弭兵息民為言時論韙之淳化二年復相四年罷上章引年拜司空致仕至道元年正月望太宗御乾元樓觀燈召昉賜坐於御榻之側太宗親酌御罇飲之顧謂侍臣曰李昉可謂善人君子矣卒年七十二贈司徒諡曰文正昉温和循謹為文慕白居易所居有園亭又葺郊外宴游之地多蓄聲妓娛樂親友與張洎盧多遜善而薄張佖太宗嘗問多遜所為昉頗為辨釋太宗曰多遜嘗毁卿不直一錢昉曰臣不敢誣張洎草昉罷相制深攻其短而張佖時時造其第或以問佖佖曰我為廷尉獨李公未嘗以私事見干今雖退可見也佖官至給事中子宗諤宗諤字昌武七歲能屬文耻以父任得官獨由鄉舉既第進士授校書郎明年獻文自薦遷祕書郎集賢校理同修起居注眞宗即位拜起居舎人從幸大名上疏曰國家馭邊之術制勝之謀将帥之短長兵衞之衆寡宸算廟謀盡在吾術中矣今之言事者不過請陛下益兵貯糧分道掩殺言之甚易行之則難始受命則無不以攻堅陷陣為壯圖及遇敵則惟以閉壘塞闗為上計孤君父之重委致生靈之垂困興言及此誠可歎息自古行軍出師無不首擇将帥夫将帥隨才任使守一郡控一城分領驍勇爭據要害又豈須直三路主帥之名然後能制六師生死之命乎今陛下選任非不至也權位非不重也告戒非不丁寧也處置非不專一也而匈奴犯塞車駕親征曽不聞出一人一騎為之救助不知深溝髙壘秣馬利兵欲安用哉臣以為臨軍易帥拔卒為将在此時也有功者拔於朝不用命者戮於市亦在此時也惟陛下圖之然後下哀痛之詔行蠲復之恩回鑾上都垂衣當宁豈不盛哉遷知制誥景徳二年為翰林學士官至右諫議大夫卒年四十九眞宗甚悼之謂宰相曰國朝将相能以聲名自立不墜門閥者惟昉與曹彬家爾宗諤方期大用不幸短命深可惜也有李濬者與宗諤齊年後一日生其卒亦後一日濬字徳明兾州人父超為禁卒從潘美掌刑刀美耆殺戮超常緩之怒釋多全活者人以為有陰徳濬官至右司郎中樞密直學士宗諤有文集六十卷内外制集四十卷又有家傳談録行於世子昭述官至翰林侍讀學士昭遘天章閣待制吕䝉正字聖功河南人也祖夢奇戸部侍郎父龜圖起居郎䝉正舉進士第一為将作監丞通判昇州授著作郎直史館加左拾遺拜左補闕知制誥初龜圖黜其妻劉氏并弃䝉正劉氏誓不改適及蒙正莅官迎二親同堂異室奉養並至時稱其孝龜圖卒有詔起復未幾遷翰林學士拜左諫議大夫參知政事䝉正入朝堂有朝士指之曰此子亦參政耶䝉正佯為不聞而過之其同列不平令詰其姓名䝉正遽止之罷朝同列猶不能堪悔不窮問䝉正曰若一知其姓名則終身不能忘固不如毋知也時皆服其量李昉罷相以䝉正為中書侍郎戸部尚書同中書門下平章事監修國史䝉正寛簡有重望以正道自持遇事敢言每論時政有未允者固稱不可太宗嘉其無隠趙普開國元老䝉正晚出歴官一紀與普同在相位普甚推許之先是盧多遜為相其子雍起家即授水部貟外郎後遂以為常及是䝉正奏曰臣忝甲科及第釋褐止授九品京官況天下才能老於巖穴不能沾寸禄者多矣今臣男始離襁褓膺此寵命恐罹譴責乞以臣釋褐時所授官補之自是止授九品京秩因以為定制有朝士家藏古鏡自言能照二百里欲因䝉正之弟來獻以求知其弟因閒從容言之蒙正笑曰吾之面不過鏡許安用照二百里其弟遂不復敢言聞者歎服淳化中罷為吏部尚書復相李昉四年昉罷䝉正復為相嘗因對論及征伐太宗曰朕比來征討蓋為民除暴茍好功黷武則天下之人消亡矣蒙正對曰隋唐數十年中四征遼碣人不堪命煬帝全軍䧟沒太宗自運土木攻城如此卒無所濟且治國之要在内修政事茍政事既修則治格安靜蠻夷來歸矣太宗韙之太宗因上元觀燈䝉正侍宴語䝉正曰五代之際生靈凋䘮周太祖自鄴南歸士庶皆罹剽掠下則火光上則彗孛觀者恐懼當時謂無復太平之日矣朕躬覽庶政萬事粗理每念上天之貺致此繁盛乃知理亂在人蒙正避席曰乗輿所在士庶走集故繁盛如此臣常見都城外不數里飢寒而死者甚衆不必盡然願陛下視近以及逺蒼生之幸也太宗變色不言蒙正侃然復位同列咸多其伉直太宗欲遣人使朔方論中書選才而可責以事者蒙正退以名上太宗不許它日凡三問終不易其人太宗曰卿何執耶䝉正曰臣非執蓋陛下未諒耳因固稱其人可使餘人不及臣不欲用媚道妄隨人主意以害國事同列皆惕息不敢動太宗退謂親信曰蒙正氣量我不如既而卒用蒙正所選者果稱職以右僕射出判河南府眞宗即位進左僕射拜同中書門下平章事昭文館大學士國朝以來三居相位唯趙普與蒙正拜司空兼門下侍郎咸平六年授太子太師封萊國公改封徐又封許洛中有園亭時會親舊環侍皆子孫閒舉壽觴釋然自得眞宗謁陵寢祠后土過洛兩幸其第當世榮之眞宗問蒙正曰卿諸子孰可用䝉正對曰諸子皆不足用有姪夷簡宰相才也蒙正客富言一日白䝉正曰言有子甚幼欲令入書院就讀蒙正許之䝉正見其子驚曰此兒他日名位與吾相似而勲業逺過吾言之子即弼也蒙正知人如此卒年六十八贈中書令諡曰文穆蒙正初為相時張紳知蔡州以􅂍敗有為紳營解於太宗曰紳家富不至此特蒙正貧時有求不獲今報之爾太宗即復紳官䝉正終不辨後得其實黜為絳州團練副使太宗復謂曰張紳果有􅂍蒙正亦不辨在西京眞宗數遣中貴人将命待之如在相位時不少減時人重焉龜圖弟龜祥龜祥子䝉亨䝉亨子即夷簡也仁宗朝位宰相自有傳蒙正有子居簡當慶厯中為提㸃京東刑獄時夏竦有憾于石介介已死竦言於仁宗曰介不死北走胡矣乃遣中使發介棺以驗居簡謂中使曰萬一介果死則朝廷為無故發人之墓奈何中使曰於君何如居簡曰介之死當時必有内外親族及門生㑹葬今檄問之可也中使從其言令結狀保證中使入奏仁宗察其誣乃得不發時人以居簡為長者居簡官至龍圖閣直學士張齊賢曹州宛句人也徙居洛陽自言慕唐李大亮之為人故字師亮太祖幸西都齊賢以布衣獻策于馬前召至行宫問以所言齊賢條陳十策一下并汾二富民三封建四敦孝五舉賢六太學七籍田八遣吏九懲姦十詳刑應對明辯略無懼色太祖賜束帛而遣之歸謂太宗曰吾幸西都得一張齊賢朕不欲爵之以官異時可使輔汝為相也太宗即位齊賢舉進士授大理評事通判衡州代還會太宗征太原齊賢上謁遷祕書丞命知忻州明年以為著作郎直史館改左拾遺太宗北征議者皆言宜速取幽薊齊賢上疏曰方今海内一家朝野無事闗聖慮者豈不以河東新平屯兵尚聚幽燕未下輦運為勞臣愚以為此不足慮也自河東初下臣知忻州捕得契丹納米典吏皆云自山後轉般以援河東以臣料契丹能自備軍食則於太原非不盡力然終以為我有者蓋力不足也河東初平人心未固嵐憲忻代未有軍砦入冦則田收頓失擾邊則守備可虞及國家守要害増壁壘左控右扼疆事甚嚴恩信已行民心已定乃於鴈門陽武谷來爭小利此則敵人之智力可料而知也聖人舉事動在萬全百戰百勝不若不戰而勝若重之戒之則敵人不足吞燕薊不足取自古疆場之難非盡由敵國亦多邊吏擾而致之若縁邊諸砦撫御得人但使峻壘深溝蓄力養銳以逸自處寧我致人此李牧所以用趙也所謂擇卒不如擇将任力不及任人如是則邊鄙寧邊鄙寧則輦運減輦運減則河北之民獲休息矣民獲休息則田業增而蠶織廣務農積榖以實邊用且敵人之心固亦擇利避害安有投諸死地而為冦哉臣聞家六合者以天下為心豈止乎爭尺寸之事角強弱之勢而已是故聖人先本而後末安内以養外人民本也邊徼末也中夏内也敵國外也是知五帝三王未有不先根本者也堯舜之道無他在乎安民而利之爾民既安利則敵人斂衽而至矣陛下愛民利天下之心眞堯舜也臣所慮羣臣所聞多以纎微之利尅下之術侵苦窮民以為功能至於生民疾苦見之如不見聞之如不聞斂怨速尤無大于此伏望精擇通儒分路采訪兩浙江南荆河西川嶺南河東有偽命日賦歛苛重者改而正之因而利之使賦稅課利通濟可經久而行為聖朝定法除去舊弊天下諸州有不便於民事委長吏聞奏如敢循常不以聞自當嚴加典憲使天下耳目皆知陛下之心戴陛下之惠以徳懷逺以惠利民則幽燕竊地之醜沙漠偷生之衆擒之與屈膝在吾術中爾為江南西路轉運使務行寛大察訴諜多得其情召還拜樞密直學士擢右諫議大夫僉書樞密院事雍熈三年大舉北伐代州楊業戰没太宗訪近臣以策齊賢請行即授給事中知代州與潘美同領縁邊兵馬是時敵騎自湖谷入侵薄城下神衞都校馬正以所部列南門外衆寡不敵齊賢選廂軍二千出正之右誓衆感慨一以當百敵遂却先是約潘美以并州來㑹戰無何閒使為敵所得齊賢以師期既漏且虞美之衆為敵所乘俄而美有使至云師出并州行四十里至柏井忽有密詔東路之師敗績于君子館并之全軍不得出戰已還州矣于時敵騎塞川齊賢曰敵知美之來而未知美之退乃閉其使密室中夜發兵二百人人持一幟負一束芻距州城西南三十里列幟燃芻敵遥見火光中有旗幟意謂并師至矣駭而北走齊賢先伏步兵二千於土磴砦掩擊大敗之擒其北大王之子一人帳前舎利一人斬數百級獲馬二千器甲甚衆拜工部侍郎敵又自大石路南侵齊賢豫簡廂軍千人為二部分屯繁畤崞縣下令曰代西有冦則崞縣之師應之代東有冦則繁畤之師應之比接戰則郡兵集矣至是果為繁畤兵所敗入拜刑部侍郎樞密副使淳化二年參知政事數月拜吏部侍郎同中書門下平章事齊賢母孫氏年八十餘封晉國太夫人太宗歎其母福壽多賜手詔存問搢紳榮之事有涉干請而辭連參知政事李沆者齊賢獨任其責由此罷相為尚書左丞物論美之俄丁内艱水漿不入口者七日其後日一飯粥既祥乃飯脫粟三年酒肉果菜不入門世稱其孝知河南府又知永興軍徙襄州移荆南又徙安州眞宗即位召拜兵部尚書同中書門下平章事嘗與眞宗推本皇王之道所以然且言臣受陛下非常恩故以非常報之眞宗曰朕以為皇王之道非有迹但庶事適治道則近之矣戚里有爭分財不均者更相訴訟又因入宫自訴齊賢曰是非臺府所能決也臣請自治之眞宗許之齊賢坐相府召訟者問曰汝非以彼所分財多汝所分少乎曰然命具欵乃召兩吏令甲家入乙舎乙家入甲舎貲財皆按堵如故分書則交易之訟者乃止明日奏狀眞宗大恱曰朕固知非君莫能定者以郊祀恩拜門下侍郎因朝會被酒坐失儀免相李繼遷陷清逺軍命為涇原等州安撫經略使遷右僕射判邠州改判永興軍薛居正之子惟吉之婦柴氏無子早寡盡蓄其產欲改適齊賢惟吉子安上訴其事有旨即訊柴氏與安上狀異眞宗下其事於御史乃齊賢子太子中舎宗誨敎柴氏為詞齊賢坐責太常卿分司西京宗誨貶海州别駕景徳初起為兵部尚書知青州改吏部尚書上疏言臣在先朝常憂靈夏終為繼遷吞併言事者以臣所慮為太過略舉既往之事以明本末當時臣下皆以繼遷只是懷戀父母舊地别無他心先帝與銀州廉察庶滿其意其後攻劫不已直至降麟府州界八部族蕃酋又脅制賀蘭山下帳族言事者猶謂封奨未厚洎陛下賜以銀夏土壤寵以旌節自此姦威愈滋逆志尤暴斷靈州糧路復撓縁邊城池數年之間靈州終為吞噬當靈州清逺軍垂欲䧟沒臣方受經略之命臣思繼遷須是得一兩處彊大蕃族方與為敵此乃以蠻夷攻蠻夷中國之上策也遂請六谷名目封潘羅支俾其展效其時近臣所見與臣不同多為沮擾及繼遷為潘羅支所殺臣慮繼遷之子徳明乗以大駕東幸之際去攻六谷向使潘羅支尚在則徳明未足為虞今潘羅支已亡厮鐸督恐非其敵望與大臣經制其事從東封還復拜右僕射時建玉清昭應宫齊賢屢請罷土木之役出判河陽從祀汾陰進左僕射請老除司空致仕歸洛得唐裴度午橋莊有池榭松竹之勝日與親舊觴詠其間卒年七十二贈司徒諡曰文定齊賢姿儀洪碩議論慷慨有致君大略治獄多全活少時家極貧父死無以葬有河南縣吏為辦其事齊賢深徳之事以兄禮雖貴不替也又嘗依太子少師李肅家肅死歲時祭之趙普嘗薦齊賢於太宗太宗未用普即具列前事以謂陛下若進擢齊賢則齊賢它日感恩更過於此太宗大恱遂用為相种放之起乃齊賢所薦也教子孫皆能有立四踐兩府九居八坐以三公就第康寧福壽時罕其比齊賢子宗誨字習之少喜兵家學至於陰陽象緯之書無不通究嘗為太子中舎貶海州别駕後易右職積官至興州防禦使改祕書監致仕嘗出謁其子言曰昔賀祕監以道士服東歸㑹稽明皇賜以鑑湖以為休老之地今洛下雖無鑑湖然嵩少伊瀍天下佳景雖非朝廷所賜皆閑逸之人所有爾大人盍衣羽服以優游何必更事請謁乎宗誨曰吾作白頭老監祕書而眠何必學賀老作流沙之服時以為名言宗誨之子子憲亦官至祕書監臣稱曰李昉為多遜所毁而不較䝉正為張紳所汙而不辨齊賢為同列所累而不言嗟乎君子哉非甚盛徳蔑以加此三人者俱名宰相又能引年謝事優游林泉以佚其老其處進退之際綽然有餘裕矣東都事略卷三十二
