body:
  text: 東都事略卷三十七宋王稱撰列傳二十張洎滁州全椒人也江南李景開貢舉登進士第爲上元尉擢監察御史景徙豫章留洎掌李煜記室李煜襲位擢知制誥遷中書舍人清輝殿學士參預機密洎舊字師黯煜令字偕仁王師圍金陵與樞密使陳喬引符命勸煜勿降又云茍有不利當先死社禝及城陷喬死之洎不能死語煜曰所以不死將有報也洎歸朝太祖責之曰汝敎李煜不降又草蠟彈詔召江上救兵洎對曰實臣所爲也犬各吠非其主此特其一爾詞色不動太祖釋之授太子中允以其有文選直舍人院出知相州簡慢不治爲轉運使田錫所劾太宗以其儒生不責以吏事也契丹入邊洎數上疏陳邊事㑹錢俶薨謚曰忠懿洎時判考功覆狀有居亢无悔之語虞部郎中張佖奏駮之以爲亢龍无悔非臣子所宜言者洎曰易乾之九三云君子乾乾夕惕若厲无咎王弼注云處下體之極居上體之下履重剛之險因時而惕不失其機可以无咎處下卦之極愈於上九之亢易例云初九爲元士九二爲大夫九三爲諸侯正義云易之本理以二體爲君臣九三居下體之極是人臣之體也其免亢龍之咎者是人臣之極可以恪守免禍故云免亢極之禍也今考功狀止云受寵若驚居亢无悔本無亢龍无悔之語太宗然之未幾爲太僕少卿同知京朝官考課拜右諫議大夫史館修撰擢中書舍人翰林學士益王元傑授揚潤大都督府長史洎言唐以揚益潞幽荆爲大都督府置長史司馬爲上佐其大都督非親王不授或親王遥領别命大臣領郡除長史副大使節度事今益王以大都督之任復爲長史乃是自爲上佐也吕䝉正以爲襄王越王皆領長史矣太宗曰此誠誤也俟别除授并正之洎與蘇易簡同在北扉易簡被殊遇且先大用洎惡之力排易簡遂代爲參知政事初太宗欲進用洎頗知其在江南讒毁善良潘佑之死與有力焉心疑之待詔尹熙古江東人也與洎相善因對以爲煜怒佑諫太直非洎譖也由是遂擢用至道二年曹璨自河西馳騎入奏邊事言繼遷㓂靈州太宗語宰相吕端知樞密院趙鎔等各以所見上其䇿端等言曰臣等各述所見則非詢謀僉同之義洎越次奏曰端備位輔弼乃緘黙不言深失謀謨之體端曰洎不過揣摩陛下意耳必無骨鯁之言太宗黙然翌日洎上疏引賈捐之棄朱厓事願棄靈武以省闗西餽運太宗嘗有此意既而悔之洎果迎合太宗意太宗不恱謂之曰卿所陳朕所不曉洎退太宗謂向敏中曰張洎誠揣摩之士也吕端之言不妄矣始洎諂事冦準準力推挽之遂參大政既與準同列知太宗眷準稍衰乃面奏準退有誹謗準色變不敢辨由是罷政未幾洎以疾罷爲刑部侍郎尋卒年六十四贈刑部尚書洎羙風儀有文采而性險詖好攻人之短舊事李煜及煜歸朝貧甚洎猶丐索之而怒其所與之薄煜子仲瑀死亦不弔太宗有所著述必爲文解釋其旨以取恱洎孫瓌有長者譽仁宗時知制誥甞草故相劉沆贈官制有詆毁之詞爲其子所訟貶黄州其後英宗謂瓌在先朝有定儲嗣之言遷翰林侍讀學士以卒李昌齡字天錫應天府楚丘人也舉進士爲大理評事通判合州拜右拾遺直史館改右補闕出知徐州爲淮南轉運使知廣州州有海舶之饒昌齡不能以亷自持召還擢樞密直學士遷右諫議大夫御史中丞至道二年拜參知政事眞宗即位加户部侍郎坐與王繼恩交結貶忠武行軍司馬起爲殿中少監知梓州改河陽又改光州以祕書監致仕卒年七十二王化基字永圖眞定人也舉進士爲大理評事通判常州知嵐州宰相趙普以爲驟用人非有益於治也改淮南節度判官入爲著作郎遷左拾遺抗疏自薦太宗曰化基自結人主慷慨之士也召試知制誥除右諫議大夫御史中丞太宗問以邊事對曰治天下猶植木也所患根本未固根本固則枝榦不足憂今朝廷治則邊鄙何患乎不安化基慕范滂之爲人乃獻澄清略言時事有五其一復尚書省其二謹公舉其三懲貪吏其四省宂貟其五擇逺官太宗嘉之知樞密院柴禹錫有奴受人金而禹錫實不知也參知政事陳恕欲以此中禹錫太宗怒引囚訊其事化基爲辨其誣太宗感悟以化基爲長者出知杭州遷禮部侍郎至道三年召拜參知政事咸平四年以工部尚書罷知揚州又知河南府進禮部尚書卒年六十七贈右僕射謚曰恵獻子舉正舉元舉元爲天章閣待制舉正字伯中幼耆學厚重寡言化基器愛之補校書郎復舉進士知伊闕任城二縣召爲館閣校勘累擢知制誥宰相陳堯佐舉正婦翁也遂換龍圗閣待制堯佐罷復知制誥遷翰林學士康定二年拜右諫議大夫參知政事吕夷簡以宰相判樞密院舉正以爲判名太重改兼樞密使㑹御史臺舉其友壻李徽之爲御史舉正以親嫌格不行徽之訟舉正内不能制其悍妻不可以謀國事慶厯三年罷爲資政殿學士禮部侍郎知許州徙知應天府拜御史中丞張堯佐授宣徽節度群牧景靈四使舉正言堯佐庸人縁妃家一日而領四使賢士大夫無所勸不報因退朝留百官班廷議仁宗遣中使諭止之尋罷堯佐宣徽景靈二使居半年堯佐復除宣徽使舉正二上疏論之狄青爲樞密使力爭不能得因請解言職遂除觀文殿學士禮部尚書知河南府入兼侍讀以太子少傅致仕卒年七十贈太子太保諡曰安簡李惟清字直臣齊州下邑人也開寳中以三史解褐爲涪陵尉太平興國七年爲荆湖北路轉運判官遷轉運使徙京西入爲度支判官未幾出爲京東轉運使歴度支副使户部鹽鐵使累官給事中爲吏以彊幹稱淮南𣙜貨務賣岳州茶斤爲錢百五十惟清擅減斤五十錢不以聞左遷衛尉少卿出知廣州召還復拜給事中至道三年拜同知樞密院事眞宗即位加刑部侍郎惟清俗吏在西府無人望遂罷爲御史中丞惟清怫鬱乃肆情彈擊卒年六十五贈户部尚書夏侯嶠字峻極濟州人也舉進士爲大理評事通判興州累遷左補闕直史館知洪州改起居郎眞宗在藩邸爲翊善尹開封爲推官東宫建爲太子中舍及即位以給事中拜樞密副使咸平元年罷爲户部侍郎除翰林侍讀學士兼祕書監講讀之職自唐有之五代以來時君右武不暇嚮學故此職亦廢太宗崇尚儒術甞命著作佐郎吕文仲侍讀寓直禁中然名秩未崇眞宗奉承先志首置此職班秩次翰林學士禄賜如之侍讀以命嶠及楊徽之侍講以命邢昺焉嶠慕道以飬生爲務喜誦老莊書淳謹無過在近列恩顧甚異卒年七十二贈兵部尚書畢士安爲相歎曰若夏侯君在者此位吾豈得而據也楊礪字汝礪京兆雩人也舉進士甲科眞宗爲襄王以礪爲記室始礪應舉時甞夜夢見一人衣冠甚古謂礪曰汝能從吾遊乎礪隨往頃之覩宫衛嚴邃俄陞大殿見一南面而坐者指示礪曰此來和天尊汝異日事之礪再拜而退及爲記室謁襄王還謂妻子曰今日見襄王正昔日夢中所見也眞宗爲開封尹以礪爲推官甞問礪何年及第礪唯唯不對後知其唱名第一自悔失問謂礪不以科名自伐甚重之東宫建兼右諭徳眞宗即位召入翰林爲學士咸平元年除工部侍郎樞密副使二年卒年六十九眞宗哀之謂宰相曰礪介直清苦方當任用遽此淪謝即臨其喪礪所居在隘巷中乗輿不能進眞宗因降輦歩至其第嗟閔乆之贈兵部尚書礪爲文無師法詔誥迂怪見者哂之宋湜字持正京兆人也父温故終右補闕季父温舒終起居郎皆有時名湜少孤以孝聞舉進士爲將作監丞通判梓州拜著作郎直史館以右補闕知制誥與王化基李沆並命以累左降均州團練副使移汝州召入爲禮部貟外郎直昭文館復知制誥遷翰林學士咸平元年拜給事中樞密副使從眞宗幸澶淵以疾卒于道年五十一贈吏部侍郎眞宗再幸河朔追悼之加贈刑部尚書諡曰忠定湜秀頴有器識好學善談論尤工筆札得者深藏之又善引重後進云東都事略卷三十七
