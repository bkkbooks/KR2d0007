body:
  text: 東都事略卷四十一宋王稱撰列傳二十四向敏中字常之開封人也父瑀惟一子敎督甚嚴甞謂其妻曰大吾門者此子也舉進士爲將作監丞通判吉州代還遷著作郎爲户部推官出爲淮南轉運使入爲户部判官知制誥以親累出知廣州就除廣南轉運使太宗飛白書敏中張詠二名付中書語宰相曰此二臣者名臣也朕將用之矣與詠並爲樞密直學士太宗欲大用之當路者有言皇甫侃監無爲軍㩁務以賄敗甞求敏中從末減下御史臺捕侃㚢詰之曰有書敏中不啟封還之書今瘞臨江軍傳舍遣人索之果得書緘封如故太宗驚異遂決意大用拜右諫議大夫同知樞密院事改副使咸平元年拜兵部侍郎參知政事從幸大名屬宋湜被疾命兼知樞密院事眞宗命重臣撫邊以敏中爲河北河西安撫大使四年拜同中書門下平章事集賢殿大學士故相薛居正子婦柴氏上書訟敏中典其第虧價且言敏中欲娶已眞宗以問敏中對曰臣自喪妻以來未嘗謀娶既而聞其欲娶王承衍女弟責其不實乃罷相知永興軍景徳元年李繼遷死其子徳明將議納欵就命敏中爲鄜延路安撫使徙京兆眞宗幸澶淵密詔敏中便宜從事敏中得詔不泄邊境以安於是眞宗有復用之意二年徙知延州知河南府東封西祀皆以敏中留守京師遷資政殿大學士刑部尚書大中祥符五年復拜同中書門下平章事集賢殿大學士加中書侍郎兵部尚書天禧元年加吏部尚書進右僕射兼門下侍郎監修國史遷左僕射昭文館大學士敏中沉毅開濟識大體深爲人主所知及除僕射眞宗使人密覘之云敏中方謝客門䦨悄然無一人眞宗笑曰向敏中大耐官職敏中諸子不使當事任雖處大事若已不與避逺賢勢謹於薦拔大任幾三十年時論目爲重徳薨于位年七十二贈太尉中書令諡曰文簡子傅正國子博士傅式龍圖閣直學士傅亮駕部貟外郎傅範密州觀察使諡曰惠節傅亮子經官至定國軍留後諡曰康懿經女即欽聖憲肅皇后也敏中累贈燕王傅亮周王經呉王畢士安字仁叟代州雲中人也後居鄭州舉進士爲濟州團練推官稍遷殿中丞監察御史遷左拾遺爲兾王府記室參軍擢知制誥召入翰林爲學士出知潁州眞宗爲開封尹以士安爲判官東宫建兼右庶子眞宗即位即令士安攝府事拜工部侍郎樞密直學士復爲翰林學士遷兵部侍郎出知潞州召還爲翰林侍讀學士兼祕書監景徳初李沆薨中書闕宰相乃拜士安吏部侍郎參知政事入謝眞宗曰未也行且相卿士安曰冦準資方正慷慨有大節朝臣罕出其右如準者陛下所宜用也眞宗亦欲相準藉士安宿徳以鎭之不閱月與準並相士安拜同中書門下平章事監修國史契丹入塞初王繼忠戰没敵中至是爲敵人奏請議和士安力賛眞宗當羇縻不絶漸許其成時已詔廵幸而大臣有請幸金陵成都者士安與冦準力陳其故堅定前計眞宗乃幸澶州及契丹請和遣曹利用使于兵閒議和事嵗遺敵銀絹三十萬是時朝論皆以爲過士安曰不如此敵所顧不重和事恐不能乆衆未爲然也然自景徳以來百有餘年自古和好所未嘗有議者以士安之言爲得焉二年薨于位贈太傅中書令諡曰文簡士安端重有識度善談論所至以公正稱子世長官至衛尉卿孫從古尚書駕部郎中曽孫四人仲偃字希言仕爲郡守仲衍字夷仲元豐中爲中書舍人仲游字公叔元祐中召天下文學之士十三人䇿試翰林學士蘇軾以仲游爲第一除集賢校理嘗爲部使者入元祐籍後任西京留司御史臺提舉鴻慶宫致仕有文集行于世仲愈字將叔歷國子監丞諸王府侍講知鳳翔府坐兄仲游陷黨籍例廢黜於是徽宗曰畢仲衍被遇先帝可除罪籍以仲愈爲都官郎中擢祕書少監以卒冦準字平仲華州下邽人也少力學有器識舉進士爲巴東令巴東有秋風亭準析韋應物一言爲二句云野水無人度孤舟盡日横識者知其必大用在巴東五年不得代又宰成安賦役期㑹書郷里姓名揭之民無違者遷殿中丞通判鄆州召試左正言直史館爲三司度支推官㑹詔百官言邊事準極陳利害太宗深器之擢樞密直學士淳化二年大旱太宗延近臣問時政得失準對曰洪範天人之際其應若影響大旱之徵蓋刑有所不平爾太宗怒起入禁中頃之召準問所以不平狀準曰願召二府至前臣即言之有詔召二府入準乃言曰有二臣者犯法一死一不問而不問者乃參知政事王沔之弟也非不平而何太宗於是切責沔而知準可用是嵗拜左諫議大夫樞密副使改同知樞密院事與張遜不協罷知青州太宗對左右數語及準有閒言至終不能移上意也五年召爲參知政事因奏對切直太宗怒起準輙挽上衣留以俟處決太宗歎曰眞宰相才也又嘗語左右曰朕得冦準猶唐太宗之得魏鄭公也加給事中始自青州召還也太宗謂之曰卿何來緩邪準曰臣非召不得至太宗曰朕子孰可付神器準曰陛下誠爲天下擇君謀及婦人不可也謀及中官不可也謀及近臣不可也惟擇所以副天下望者太宗屏左右謂曰襄王可乎準曰非臣所知也太宗遂以襄王爲開封尹改封壽王於是立爲皇太子人望翕然太宗曰天下心屬太子將置我何地準曰顧得所付天下之福也太宗祠南郊中外官皆進秩廣州左通判左正言馮拯轉虞部貟外郎右通判太常博士彭惟節乃轉屯田貟外郎惟節自以素居拯下章奏列銜皆如舊不易準怒特詔拯無得亂朝制拯因上疏陳準擅權又條嶺南官除拜不平數事準入對自辨太宗曰若廷辨是非失執政體力爭不已太宗因歎曰䑕雀尚知人意况人乎明日準又持中書簿論曲直于上前太宗滋不恱遂罷知鄧州咸平初徙河陽改同州又徙鳳翔府轉刑部侍郎知開封府遷兵部侍郎爲三司使景徳元年拜同中書門下平章事集賢殿大學士是嵗契丹入邊直抵澶魏眞宗召羣臣問禦戎䇿參知政事王欽若江南人也請幸金陵僉書樞密院事陳堯叟蜀人也請幸成都眞宗以問準時欽若堯叟在側準心知二人所爲陽若不知曰誰爲陛下畫此二䇿者罪可斬也今邊勢憑陵陛下當率厲衆心進前禦敵以衛社禝奈何欲委棄宗廟逺之楚蜀邪且以今日之勢鑾輿回軫一歩萬衆雲散楚蜀可得至邪準乃叱欽若等曰天子神武而將臣協和若車駕親征賊當遁去不然則出竒以撓其謀堅守以老其衆使勞逸之勢我得勝筭因請幸澶州並陳河北用兵之略甚備眞宗遂幸澶州至南城皆言敵兵方盛願駐蹕以觀兵勢準固請曰陛下不過河人心益危敵氣未懾非所以取威決勝之勢河北將士旦夕望陛下至士氣百倍何疑而不進哉眞宗即日度河軍威大震御城門觀視營壁撫勞部伍軍民懽呼聲聞數十里契丹相視怖駭不能成列俄而勁弩伏發射殺其貴將撻覽契丹懼因密奉書請盟河北遂罷兵準在位喜用寒進每御史缺嘗取敢言之士用之同列頗不恱它日又除官同列目吏持例簿以進準曰宰相所以器百官用例簿非所謂進賢退不肖因却而不視加中書侍郎兼工部尚書三年以刑部尚書罷知陜州遷户部尚書知天雄軍入判尚書都省眞宗幸亳州以準留守京師大中祥符七年拜同平章事充樞密使八年罷爲武勝軍節度使同平章事踰月判河南府徙判永興軍天禧元年爲山南東道節度使三年復拜中書侍郎兼吏部尚書同中書門下平章事集賢殿大學士進右僕射初劉后之立也準及王旦向敏中皆諫以爲出於側微不可后銜之及眞宗不豫后參與朝政準請閒曰太子睿徳天縱足以任天下之事陛下胡不協天人之係望講社禝之丕謀引登大明敷照重霄若丁謂恃才而挾姦曹利用恃權而使氣皆不可輔少主願擇方正大臣羽翼太子眞宗然之準乃屬翰林學士楊億草表請太子監國且欲進億以代謂億私語其妻弟張演曰數日之後事當一新語稍洩丁謂夜乗婦人車詣曹利用第謀其事遂密以聞明日罷準爲太子太傅封萊國公踰月楊崇勲等告内侍周懐政謀廢皇后奉眞宗爲太上皇而傳位太子復用準爲相懐政既事泄被誅又降準爲太常卿知相州徙安州貶道州司馬再貶雷州司户參軍丁謂遣中使齎敕往授之以錦囊貯劒掲於馬前既至準方與羣臣宴驛吏言狀羣臣皆竦懼出迎中使避不見問其所以來之故不荅上下益懼準神色自若使人謂之曰朝廷若賜準死願見敕書中使不得已乃以敕授準準拜于庭升階復宴人服其量準至雷州吏以圖經獻視其四至云東南至海十里準怳然曰吾少時有到海只十里過山應萬重之句人生得喪豈偶然邪初丁謂爲參知政事事準甚謹嘗㑹食中書羹汚準鬚謂起徐拂之準笑謂曰君國之大臣乃爲官長拂鬚邪謂甚愧恨及南遷天下莫不寃之初過零陵行囊爲溪冦所掠其酋長聞而趣還之準剛正篤於自信不能與世俯仰故人多惡之踰年徙衡州司馬丁謂亦以罪貶道出雷州欲見準準拒絶之太宗嘗得通犀命工爲二帶一以賜準及是準遣人取自洛中至數日具朝服被帶北面再拜呼左右趣設卧具就榻而卒年六十三詔許歸葬西京過公安民擁道設祭立竹焚幣月餘枯竹皆自生邑民嗟嘆即生竹地立祠嵗時享之謂其竹曰冦公竹嵗乆成林人不忍伐仁宗對輔臣哀準以忠死贈中書令萊國公諡曰忠愍無子以從子隨爲後隨終于殿中丞臣稱曰自古功名之機惟斷乃成者斯難哉方契丹舉國入宼準排羣議決親征之䇿一戰而勝遂與之和功名之機準誠得之矣及章聖寢疾政出帷幄而準忘身徇國爲社禝計乃以漏言貶死哀哉韓子有言夫事以密成而以泄敗未必其身泄之也而語及其所匿之事如是者身危其準之謂邪東都事略卷四十一
