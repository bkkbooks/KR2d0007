body:
  text: 東都事略卷四十三宋王稱撰列傳二十六王顯字徳明開封人也少給事太宗於濳邸太宗即位補殿直累遷東上閤門使拜宣徽南院使樞密副使太宗以其寡學問也取軍戒三篇賜之曰讀此可以免於面牆矣淳化二年罷爲崇信軍節度使知永興軍徙延州咸平初改鎮横海知鎮州二年召拜樞密使三年授山南東道節度使同平章事將定州行營及鎮定髙陽闗三路之師大破契丹于威敵軍斬首二萬級徙鎮河陽三城知永興軍以疾還京師卒年七十六贈中書令諡曰忠肅王繼英開封祥符人也少爲刀筆吏事趙普甚謹普復相以補中書直省官眞宗在藩邸爲前導及即位擢引進使未幾拜宣徽南院使知樞密院事景徳中拜樞密使卒年六十一贈太尉諡曰恭懿周瑩瀛州景城人也父景左領軍衛上將軍少給事晉王于濳邸晉王即位是謂太宗補殿直累擢客省使僉書樞密院宣徽院諸房公事與内臣劉承珪對掌其任咸平初拜宣徽北院使遷南院使知樞密院事與承規同罷諸房是後不復置云五年除永清軍節度使帥天雄從車駕北廵眞宗以瑩不事事徙知澶州改鎮天平明年知定州徙澶州以疾還京師卒年六十六贈侍中瑩在右府無他謀略及莅軍旅畏懦自全所歴藩鎮率無善狀諡曰忠穆議者以爲美改諡曰元惠馬知節字子元開封祥符人也父全乂江州防禦使全乂從太祖定天下有戰功知節幼孤太宗召見授供奉官賜今名年十八監彭州兵以嚴見憚如老將又監潭州兵何承矩爲守頗以文雅飾吏治知節慕之故折節讀書雍熈閒䕶博州兵契丹入邊王師敗于君子館知節全城繕甲儲積芻粟僚吏不恱其生事也既而契丹果至以有備引去衆始歎服知定逺軍時議調河南十三州之民輸餉河北轉運使樊知古適至軍道其事知節曰此軍戍少而積粟多簸其腐當得什之六七知古從之果獲粟五十萬斛分給諸屯遂省河南之役卒有盜婦人首飾者䕶軍止笞遣之知節曰民避外虜反罹内冦此而可恕何以肅下即斬之知深慶二州遷西京作坊使知梓州李順之亂與王繼恩同討賊繼恩惡知節抗直不附已遣守彭州付以羸兵三百蹂賊賊十萬衆攻城知節曰死賊手非壯士也力戰適有兵至者賊遂潰太宗聞而歎曰賊盛兵少知節不易當也爲益漢九州都廵檢使兼益州鈐轄遷内苑使帳下卒劉旰脅牙兵爲亂攻破州縣知節領兵三百追至蜀州與戰旴走卭州知節曰賊破卭州必乗勝劫掠度江薄我既息而戰我軍雖倍未易敵也不如迎其弊急擊之破之必矣遂行次方井與賊遇殺旰等無噍類咸平初領登州刺史知秦州州嘗質羌酋支屬二十餘人踰二紀矣知節曰羌亦人耳豈不懐歸悉釋之羌懐其徳訖終更不犯塞遷西上閤門使知益州兼本路轉運使自乾徳後嵗漕蜀物以富人爲送吏多坐漂失籍其家知節請以省校代郷户運舟而課其漕事自是蜀人免破産之患徙知延州戎冦至方上元遂張燈啟關宴樂累夕虜不測因引去知鎮州詔發澶魏六州糧輸定武時方内冦知節曰糧之來資冦也止令於舟車所至收之虜無所得而遁知節所至皆以威愛臨下而事無不濟徙知定州拜東上閤門使樞密都承旨擢拜僉書樞密院事當是時契丹已盟中國無爲大臣方言符瑞而知節每不然之嘗言天下雖安不可忘戰去兵之意以爲戒進宣徽北院使樞密副使時王欽若爲樞密使知節薄其爲人遇事敢言不少自屈每廷議得其不直輙面詆之欽若寵顧方深知節愈不爲之下大中祥符七年出爲頴州防禦使知潞州天禧初移知天雄軍召拜宣徽南院使知樞密院事以疾乞罷除彰徳軍留後知貝州既而眞宗閔其癯瘁止命歸鎮而上黨大名之民爭來迎之卒年六十三贈侍中諡曰正惠知節慨慷以武力智謀自喜又能好書賔友儒者所與善必一時豪傑遇事謇謇未嘗有所顧憚而天下至今稱其正直云王嗣宗字希阮汾州人也擢進士甲科是嵗初置司理參軍即以嗣宗爲泰州司理參軍路沖知州事嘗以公事忤沖意沖怒械繫之又敎郡民之無頼嘗被罪者訟嗣宗治獄枉濫朝廷遣使按劾具得訟者之妄嗣宗乃得釋太宗時通判睦州徙汀州太宗遣武徳軍卒察逺方事嗣宗執而杖之械送京師因奏曰陛下不委任天下賢俊而猥信此輩以爲耳目臣竊爲陛下不取太宗大怒以嗣宗下吏削秩㑹赦復官尋以秘書丞通判澶州入爲三司開拆推官以左正言充河北轉運副使改左司諫入爲度支判官出知興元府京西轉運使移河北至道初又移河東徙知耀州又知同州徙淮南轉運使江浙荆湖發運使揚楚間有窄家神廟民有疾不服藥而祀之嗣宗撤其廟自是民風稍變咸平中以右諫議大夫充鹽鐵使出知并州州境有卧龍廟自窮冬闔境致祭風雪中老幼踣於路嗣宗亟毁之召拜御史中丞嗣宗力詆大臣常厚結王旦之弟以求知於旦旦不荅故嗣宗數於上前毁旦眞宗亦優容之拜耀州觀察使知永興軍時种放得告歸山嗣宗屢造放不爲放所禮嗣宗怒語及其進取放曰不猶愈於角力而中第者乎嗣宗試藝講武殿嘗程力以取甲科故放及之嗣宗深憾其言及至京兆又閒乗醉慢罵嗣宗嗣宗因其弟妷強市田産興訟遣人詰責放條上其不法事詔問狀因賜放第於嵩山令避嗣宗焉改知邠州有靈應公廟傍有羣狐居之巫祝假之以惑民多歴年所民信重之前後長吏皆先謁廟乃敢視事嗣宗毁其廟熏其穴得數十狐盡殺之淫祀遂息徙知鎮州召拜樞密副使求罷除大同軍節度使知許州移河南改感徳静難二鎮再知許州平時忿宋白郭贄邢昺七十不請老屢以爲言及其晚年疾甚一上章求退而猶欲領郡冦準爲相惡之即以爲左屯衛上將軍致仕頗悒悒不自釋卒年七十八贈侍中諡曰景莊雷有終同州郃陽人徳驤子也徳驤太祖時爲殿中侍御史判大理寺傾陷趙普貶靈武者徳驤長子有隣撾鼓訟堂吏過普因是罷相徳驤遂復祕書丞判御史臺三院事以有隣爲祕書省正字有隣尋卒徳驤太平興國初爲御史知雜出爲陜西河北淮南轉運使積遷諫議大夫入知京朝官考課遷工部侍郎趙普再入相方立班宣制徳驤聞之手不覺墜笏上疏乞歸田里太宗慰勉之曰朕終保卿聽罷考課其後有隣子坐内亂得罪徳驤貶感徳軍司馬以卒有終以父任爲萊蕪尉發知監劉琪奸贓而代其任太宗雅聞其名召爲大理寺丞徳驤任陜西轉運使奏爲解州通判遂知州事徙密州爲淮南轉運副使王師北征命爲蔚州路隨軍轉運使入爲鹽鐵判官户部度支副使出知昇州又知廣州以女弟婿衛濯訟其家法不謹坐貶衡州團練副使起爲鹽鐵度支副使領江南兩浙荆湖福建廣南路茶鹽制置使使還知大名府徙江陵李順之亂爲荆湖夔峽路轉運使知兵馬事至廣安軍夜遇賊衆有終引竒兵從後擊之就拜右諫議大夫知益州次簡州寓佛舍度賊必至命左右重閉召土人嚴更備初夕間道而去賊果圍寺牆壊止得擊柝者賊平移知許州改并州加工部侍郎代還授户部使王均亂除廬州觀察使知益州兼川峽兩路招安捉賊事既至而均遁石普襲至富順監獲之賊平以有終爲保信軍留後代還知永興軍徙秦州契丹入邊眞宗幸澶淵有終赴援威聲甚震既而契丹修好命還屯所就判并州召拜宣徽北院使卒年五十九有終險側喜攻人過有吏幹善撫士卒既卒贈侍中簡夫字太簡有隣孫也隱居終南山用杜衍薦爲校書郎秦州觀察推官通判儀州歴知坊閬雅三州秩滿會五谿蠻彭仕羲擾邊詔遣簡夫乗馹以徃簡夫進築城堡以據其險間出兵擾之仕羲恐遂降入爲鹽鐵判官出知號州改同州累遷職方貟外郎卒年六十四簡夫在雅州眉山蘇洵往見之簡夫謂曰子王佐才也薦之于張方平韓琦歐陽脩三人者延譽如不及洵名振京師蓋自簡夫始云東都事略卷四十三
