  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0007_WYG_047-1a, image: WYG0382/WYG0382-0296c.png}
body:
  text: 東都事略卷四十七宋王稱撰列傳三十楊億字大年建州浦城人也生之夕其祖文逸夢一羽衣自稱懐玉山人覺而億生有毛被其體其長盈尺踰月始墮母口授以書隨即成誦六嵗學吟詩七嵗善屬文年十一以童子召對試詩賦五篇下筆立成太宗歎異以爲祕書省正字制曰汝方在髫齡不煩師訓精爽神助文字生知越景絶塵一日千里予有望於汝也從祖徽之知許州億徃依焉徽之間與語歎其學問該博曰興吾門在汝矣淳化中命讀書祕閣遷光禄寺丞太宗觀華後苑召命賦詩明年苑中曲宴億復以詩獻太宗詰有司不時召對曰非貼職不與即以億直集賢院眞宗即位拜右正言修太宗實録凡八十篇而億獨成五十六卷出知處州召還拜左司諫知制誥咸平中詔近臣議靈州棄守億上疏曰臣聞漢武帝北築朔方郡平津侯諫以爲罷敝中國以奉無用之地願罷之賈捐之建議棄朱厓當時公卿亦有異論元帝罷衆多之說下詔廢之人頌其徳夫靈武之地自繼遷叛命横行沙漠諸將出師累年未嘗出一兵馳一騎敢與敵角此靈武之存無益明甚平津所言罷敝中國以奉無用之地正今日謂也臣願陛下如元帝之棄朱厓而棄靈武以息民力以省餽運臣竊見太祖命姚内斌領慶州董遵誨領環州二人所統之兵裁五六千而已閫外之事一以付之軍市之租不從中覆用能士卒效命羌夷畏威朝廷無旰食之憂疆埸無羽書之警臣欲望陛下選用二三驍將付以精兵一二萬人以數縣租稅給其用度令分守邊郡則繼遷可計日成擒矣景徳初同王欽若修冊府元龜大中祥符初爲翰林學士嘗以疾在告眞宗遣使挾太醫療之億表謝眞宗批紙尾賜詩有副予前席待名賢之句其顧遇如此億於歴代典章制度尤爲該洽經傳子史百家之學罔不通貫爲文敏贍數千百言不加㸃竄對客談笑揮毫無滯論治道談世務必稽古驗今究切利病厚風義重名教誘進後學樂道人善賢士大夫翕然宗之然評品人物黒白太明亦以此取疾於人而人多讒毁之者億嘗草荅契丹書云鄰壤交歡眞宗自注其側云朽壤䑕壤糞壤億遽改爲鄰境明日引唐故事學士草制有所改爲不稱職亟求罷眞宗語宰相曰楊億不通商量眞有氣性及章獻后之立也眞宗欲得億草制使丁謂諭旨億難之謂曰大年勉爲此不憂不富貴億曰如此富貴亦非所願也乃命陳彭年草制億既頻忤旨而王欽若陳彭年深所讒毁億甞入直夜召見禁中命坐賜茶從容顧問久之出文藁數篋以示億曰卿識朕書蹟乎皆朕自起草未嘗令臣下代作也億皇恐不知所對頓首再拜而出乃知讒言得行矣億有别墅在陽翟億母往視之㑹母病億不俟報而行讒者以爲慢朝廷億素體羸至是以病聞乃授太常少卿分司西京進祕書監起知汝州會加玉皇聖號召爲寳冊參詳儀制副使天禧二年遷工部侍郎知貢舉坐譴降祕書監母喪詔起復爲翰林學士億嘗代冦準草奏請皇太子親政斥丁謂等姦邪事準既逐億亦憂畏而卒年四十七景祐元年樞密使王晦叔上其事仁宗嘉歎詔贈禮部尚書諡曰文有司舉故事非嘗任二府及事東宫四品無贈官仁宗曰億爲國竭忠有君子之大節可拘以常典乎億晚年頗留意釋典有文集一百九十四卷又别有西崑詶倡等集又手録時人所作爲儒苑時文録數十篇眞宗嘗謂王旦曰億辭學無比後學皆師慕之文章有貞元元和風格自億始也旦曰後學皆師慕億唯李宗諤久與之遊終不得其鱗甲謂其體弱不宗經典云劉筠字子儀大名人也舉進士爲館陶尉入爲祕閣校理契丹内侵眞宗北廵以筠爲大名府觀察判官與修冊府元龜書成轉左正言直史館修起居注召試中書遷左司諫知制誥史館修撰出知鄧州徙陳州入爲翰林學士初筠草丁謂李廸罷相制既而謂復留命筠草制筠不奉詔謂再相時眞宗久疾謂寖擅權筠請補外遂以右諫議大夫知廬州仁宗即位復召爲翰林學士拜御史中丞已而數以疾辭進樞密直學士知潁州召入復爲翰林學士承旨同修國史兼龍圖閣學士出知廬州卒年六十一筠自景徳以來居文翰之選與楊億齊名當時號爲楊劉三入禁林三典貢舉以策論升降天下士自筠始也性不茍合於時臨事明達而所治尚簡嚴云臣稱曰文章之難莫難於復古億與筠皆以文名于世然去古既逺時尚駢儷雖詞華之妙足以暢帝謨而議論之粹亦足以謀王體至於屬辭比事用各有當雖云工矣而簡嚴典重之體温厚深淳之氣終有愧於古焉夫欲維持斯文使一變而復古必得命世之大才而後可也戚綸字仲言應天府楚丘人也父同文字文約幼孤事祖母以孝聞從邑人楊慤受經慤隱居不仕而以女弟妻同文遇疾因託以家事同文爲𦵏其三世之未𦵏者遭世喪亂亦不復仕且思見混一遂以同文爲名慤勉之仕同文曰長者不仕同文亦不仕聚徒講學相繼登科者五十六人踐臺閣者亦至十數尚信義喜周人急所與交皆當世知名士楊徽之因使至郡多所詶倡及卒徽之與其門人諡曰堅素先生應天府民有曹誠者即同文舊居廣舍百五十楹聚書千餘卷以延學者眞宗嘉之賜名曰應天府書院云同文長子曰維仕至户部郎中綸其次子也篤於古學喜談名教舉進士爲沂州簿徙知太和縣同文卒詔令起復太和民險悍好興訟綸爲諭民詩五十篇言近而易曉老幼多傳之坐鞫獄失實免久之知永嘉縣有惠政眞宗即位楊徽之薦其文學純謹除祕閣校理眞宗初置龍圖閣待制首以任綸累遷兵部貟外郎掌吏部選事方是時祥文荐降歌誦日興綸恐流俗託朝廷嘉瑞事詐爲神靈木石之異幻惑愚衆如少君欒大者上疏極諫眞宗嘉納之遷户部郎中直昭文館擢樞密直學士出知杭州發運使胡則季浦惡其脩潔相與捃摭徙知揚州又徙徐州遷左諫議大夫代還復知青州改鄆州復爲勸農使王遵誨所誣奏謂其嘗訕朝廷左遷岳州團練副使改保靜軍節度副使又改太常少卿分司南京卒年六十八梁顥字太素鄆州項城人也從王禹偁爲學禹偁頗器之舉進士太宗召升殿擢冠甲科爲大名府觀察推官遷右拾遺直史館始趙昌言在大名顥在幕府昌言入爲樞密副使坐翟馬周事罷顥亦貶虢州司户參軍起知魚臺縣召還復直史館爲開封府推官累遷左司諫度支判官同修起居注眞宗幸大名訪羣臣邊事顥上疏曰陛下命將出師乗秋備塞大將傅濳奉明詔握重兵逗撓無謀遷延翫冦守陴閉壘巽懦以自全銳卒精兵局束而不用以至敵馬南牧蹂踐河朔此以賊遺陛下者也陛下赦而不誅則何以謝横死之民黜而不戮則何以恢用兵之略邪臣愚望陛下於邊將中擇有武勇謀略取十人人付騎兵五千器甲全備輕齎糧糗逐水草於邊上往復扞禦不得入郡邑亦不得一處相聚遇有敵人隨時掩殺仍令烽候相望交相救應縁邊州郡守城兵帥即堅壁以待之遇遊騎近城掩殺敵人即城内量出甲兵援救如此則乗城者不堅閉壘門免坐觀於勝負扞邊者不茍依郡郭可行備於冦攘雖非良籌且殊膠柱也時論韙之除知制誥遷右諫議大夫拜翰林學士知開封府卒年四十二顥風姿粹美強力少疾閨門雍睦與人交久而無改士大夫多之子固繼世擢第一爲直史館早卒固弟適相仁宗自有傳孫何字漢公蔡州汝陽人也幼耆學與丁謂齊名王禹偁尤所題奬以爲自唐韓栁後三百年有孫丁也時人謂之孫丁舉進士開封禮部殿試俱第一爲將作監丞通判陜州召入直史館遷祕書丞京西轉運副使歴右正言改右司諫唐制郊祀行慶止進勲階五代肆赦例遷官秩宋興因之未暇革也何與起居郎耿望言其非制眞宗嘉納遂定三年磨勘進秩之法郊禮止加散官勲爵眞宗數訪以邊事何請擇將帥於文武之内參用謀臣凡奏邊防則宜陛見廷問以防壅閼縁邊州縣有合救援處則督以軍令聽其便宜今敵騎充斥糧運則宜輕齎疾驅凡此皆當今之急務也時傅濳逗撓無功何又請斬濳以徇尋出爲京東兩浙轉運使何辨急頗事苛察日有捶楚州縣吏患之乃求古碑字磨滅者紙本掲之館中何至則讀其碑辨識文字以爪掻髮垢而嗅之遂往往至暮不復省録文案又官屬罹譴罰者其衆故從者依憑其威妄爲寒暑所至騷然加起居舍人景徳初知制誥卒年四十四有文集四十卷弟僅僅字鄰幾與何俱有名于時兄弟皆以進士冠天下士學者榮之初爲舒州推官復舉賢良方正科䇿入第四等授光禄寺丞直集賢院景徳初拜太子中允爲開封府判官擢右正言知制誥㑹永興擇守宰相以僅爲諳練民政乃命之然僅純厚長者治郡非所長也時眞宗作玉清昭應宫僅甞游驪山作詩引用陳勝禄山事以諷爲讒者所譖進其詩于眞宗眞宗讀其首篇有朱衣吏引上驪山之語眞宗曰僅小器也此何足夸遂棄不讀而陳勝禄山之語卒不得聞人以爲幸拜右諫議大夫集賢院學士知開封府出知河中遷給事中卒年四十九僅性端慤中立無競篤于儒學士大夫推其履尚云有文集五十卷東都事略卷四十七
