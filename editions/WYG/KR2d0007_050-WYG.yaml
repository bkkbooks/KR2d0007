body:
  text: 東都事略卷五十宋王稱撰列傳三十三曹利用字用之趙州人也其父諫明經及第至右補闕換崇儀使利用少有志節讀書略通大義以諫遺恩授殿前承㫖轉右班殿直鄜延路走馬承受公事景徳初契丹南牧真宗用宰相冦準計親御六軍度河兵始交而斃其貴將撻覽契丹有求和意朝廷知之是時利用適奏事行在以利用使于兵間真宗欲召問以觀其志於是樞密使王繼英曰利用言儻得奉君命雖死無所避即日授閣門祗候假崇儀副使奉書以行真宗曰契丹如貪嵗賂乃國家細事或求闗南之地當以理絶之利用對曰敵若妄有所求臣不敢生還真宗壮其言利用見敵果首及闗南地利用曰若嵗求金帛以助軍乏尚恐大臣議或不同割地之議死不敢聞其政事舍人髙正始曰舉國而來不得闗南止得金帛誠媿見國人利用曰若爾則兩國之兵未有休時矣敵度不可屈遂決通好之議而與報使韓杞同至復致書幣以往許其和好仍嵗遺銀絹三十萬使還真宗在帷宫方進食未之見使内侍問所遺利用曰此幾事當面奏真宗復使問之曰姑言其略利用終不肯言而以三指加頰内侍入曰三指加頰豈非三百萬乎真宗失聲曰太多既而曰姑了事亦可耳帷宫淺廹利用具聞其語既對真宗亟問之利用再三稱死罪曰臣許之銀絹過多真宗曰幾何曰三十萬真宗不覺喜甚利用之行也面請所以遺虜者真宗曰必不得已雖百萬可也冦準謂利用曰雖有㫖許百萬若過三十萬當斬汝至是果以三十萬成約而還擢東上閤門使忠州刺史四年宜州軍校陳進反命利用為廣南安撫使賊平遷引進使累遷嘉州防禦使鄜延路兵馬總管大中祥符七年拜樞宻副使久之加宣徽北院使改同知樞宻院遂知院事天禧中拜樞宻使加同平章事皇太子權聴軍國事議令輔臣兼東宫官真宗出制書榻前宰相李廸面斥丁謂姦邪利用馮拯皆有朋黨利用曰以片文遇主臣不如廸若捐軀入不測之虜廸不如臣卒以利用兼太子少保進右僕射封韓國公仁宗即位加左僕射兼侍中武寧軍節度使進封魯國公天聖三年加司空國朝故事叙班以宰相為首親王次之使相又次之初曹彬為樞宻使兼侍中位在宰相李沆下及王曾拜平章事利用為樞宻使兼侍中乃令利用班曾上然中外深以為失至是曾拜首相曾與利用告謝而利用争班閤門屢請班首姓名曾抗聲曰但言宰相王曾以下告謝班始定而利用寖不説時張知白為次相見其不平之意終推利用班其上仁宗令樞宻副使張士遜勉諭之五年改封鄆國公明年改鎮保平又明年其從子左侍禁汭為趙州監押趙人告其逆謀遂罷以本官兼侍中判鄧州及汭誅降左千牛衛上將軍知隨州又坐私貸景靈宫公用錢貶崇信軍節度副使房州安置至襄州内臣楊懐敏逼使自縊以疫暴卒聞年五十九利用既居大位遂肆驕縱章獻臨朝威震天下利用奏事簾前頗不祗肅或以指爪擊帯鞓左右指以示章獻曰利用在先帝時敢尔耶章獻雖銜怒然亦嚴憚之稱侍中而不名利用多裁抑貴戚宦官而親舊或乘閒獲進故不免禍既死人或以為寃贈太傅諡曰襄悼張耆開封人也年十一事真宗于潜邸及真宗即位授西頭供奉官擢供備庫副使帯御噐械咸平中契丹犯邉耆為天雄軍鎮州定州鈐轄契丹圍望都耆率諸將從間道往至則城已陷遂與敵戰身被數創擒其一將㑹王繼忠沒於陳耆言天道方利用兵先人有奪人之心宜悉師以破敵闢土彊國在此舉矣遷昭州團練使為并代路鈐轄召對承明殿真宗曰朕欲守澶州橋而難其人汝能為朕行乎乃以為駕前西面鈐轄又為東面鈐轄耆嘗受人金或言其事降供備庫使潞州兵馬都監久之遷團練使改英州防禦使從真宗東封除齊州防禦使殿前都虞候是時盛興宫室人皆争奉符瑞丁謂王欽若主其事無敢議者耆毅然謂土木之役不足以承天意遷相州觀察使馬軍都指揮使從祀汾隂授威塞軍節度使宣徽南院使樞宻副使天禧三年罷判河陽居久之除同平章事判陳州歴定國河陽三城武寧鎮安淮南五鎮判夀州徙河陽天聖三年拜樞宻使封岐國公耆初名旻至是改焉加右僕射兼侍中又進封鄧國公又歴泰寧山南東道昭徳三鎮章獻崩加左僕射改鎮䕶國出判許州遷襄鄧二州進封徐國公又徙河陽許陳夀等州以太子太師致仕其子得一知貝州妖卒王則反不能死又為之用既而坐誅而耆鬱鬱不得志卒年七十五贈太師兼侍中諡曰榮僖耆為人有智數真宗嘗使讀論語左氏春秋又賜以宸戒二十條及聖政紀冊府元龜故通知傳記至於星歴術數之學無不傳習其言邉事或象緯變見多中章獻在夀邸時嘗出寓其家故臨朝待耆尤所優寵賜第省西凡七百楹後言者以樓下瞰郊社乃毁之前後賜予不貲欲其財之不出故為曲欄積百貨與羣婢貿易其有疾者親診視收其藥直御諸子嚴一見之即出之外舍然供饋僚屬頗厚也耆之諸子得一既以背叛誅而誠一復以凶惡著誠一任樞密院副承㫖時嘗開耆之棺槨掠取財物解父所繫排方犀帯後任觀察使為諫官論列責官而卒曾孫叔夜克戬克公各别有傳楊崇勲其先蘇州人也父全美仕太宗為殿前指揮使崇勲少以父任為東西班承㫖給事東宫真宗即位授左侍禁累遷至四方館使冦準罷相真宗寢疾仁宗在東宫入内都知周懐政謀奉真宗為太上皇傳位於仁宗而復相準崇勲告其事遂誅懐政擢崇勲鄧州觀察使辭不拜以内客省使桂州觀察使兼羣牧使屬天下久罷兵有言鬻廐馬者崇勲曰馬者兵之用而戰之備也雖無事其可去耶議遂格仁宗立拜彰徳軍留後知陳州為殿前都虞候遷馬歩軍都指揮使振武軍節度使崇勲嘗詣中書白事屬雨崇勲穿泥鞹登政事堂宰相王曾劾其失詔送宣徽院問状翌日曾請傳詔釋其罪章獻后問其故曾曰崇勲武臣不知朝廷之儀舉奏者宰臣所以振紀綱寛釋者人君所以示恩徳如此則仁愛歸於上而威令肅於下矣徙鎮鎮南拜宣徽北院使樞密副使又徙定武山南東道二鎮拜樞密使明道二年加同平章事以河陽三城節度使判陳州崇勲既加使相而論者以為寵太過周懐政之弟懐信訟崇勲誣告其兄乃罷平章事知夀州慶歴三年契丹將渝盟以崇勲判冀州既而老不任事徙判成徳軍又徙鄭州以左衛將軍致仕改太子太保卒年七十贈太尉有司諡曰恭密詔更為恭毅崇勲口給狡桀喜中傷人而於御軍頗有法云臣稱曰曹利用奉使邊廷有勞國家驟膺柄用權震人主而不能以謙自牧卒罹不測之禍天道福善而禍淫可不信哉耆崇勲材質庸下致位將相葢出幸㑹云東都事略卷五十
