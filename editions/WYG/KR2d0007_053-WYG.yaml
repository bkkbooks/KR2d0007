body:
  text: 東都亊略卷五十三宋王稱撰列傳三十六魯宗道字貫之亳州人也少孤苦學以文謁戚綸綸噐異之舉進士為定逺尉又為海鹽令疏治東南舊港口導海水至邑下人以為利號魯公浦天禧元年詔两省置諫官六員不兼他職考所言以為殿最宗道與劉煜同選自通判河陽擢為右正言諫章由閣門始得進而罕賜對宗道請得面論事而上奏通進司自是為故事因言守宰與民至近而未有區别能否豈朝廷所以為民之意今除一知州補一縣令雖有庸暗有司無敢擯斥舉天下親民之官黷貨害政什常二三介然自守孜孜政事什無一二欲裕民美化可冀乎昔漢宣帝除刺史守相必親見而考察之今命知州通判知縣雖未暇親見宜令中書試以言而察其應對設以事而問其施為才與不才得以進退之縣令其命銓曹倣此施行庶幾得良守宰助宣聖化真宗嘉納之仁宗為皇太子除右諭徳時天書降乾祐山中宗道上疏曰天道福善禍淫不言示化仁君政得其理則作福以報之失其道則出異以戒之又何有書哉臣恐姦臣肆謀誕妄以惑聖聴也踰年遷左諭徳真宗一日遣中使召之至其家俟之久方從酒家還使者曰即上訝來遲其將何詞以對宗道曰第實言之中使曰然則當得罪宗道曰飲酒人之常情欺君臣子之大罪也中使嗟嘆而去真宗果問使者具如宗道之言真宗問宗道何故私至酒家宗道謝曰有故人自鄉里來臣家貧乏桮鎜故就酒家觴之也真宗善其無隠自是有大用之意以直龍圖閣奉使契丹仁宗即位章獻明肅皇后同聴政除宗道龍圖閣直學士判流内銓宗道在選調久頗患銓格繁密而曲為銓吏之姦弊至是多釐革之凡科條闕次悉揭示廡下人以為便雷允恭擅移山陵詔宗道與吕夷簡按視還拜右諫議大夫叅知政事遷禮部侍郎章獻問宗道唐武后何如主對曰武后幾危社稷唐之罪人也章獻黙然時有上書請立章獻七廟者章獻以問輔臣宗道力以為不可曰若立劉氏七廟如嗣君何章獻與仁宗將同幸慈孝寺欲以大安輦前行宗道曰婦人有三從之義在家從父既嫁從夫夫沒從子章獻乃從後行宗道在政府裁抑僥倖不肯以名器私人時樞密使曹利用有所憑恃肆為驕横宗道屢折之凡貴戚近習莫不斂迹天聖七年薨於位贈兵部尚書諡曰肅簡薛奎字伯蓺絳州正平人也父化光善命術奎生知其必致公輔舉進士為隰州推官徙儀州是時靈武用兵州郡皆發兵夫調軍食奎部至鹽州下虎砦㑹久雨粟多腐因謂轉運使盧之翰曰今粟不可食願令民還州償所食之翰欲劾奏之奎徐曰用兵連年人罷轉餉今幸軍食有餘安用此以徒困百姓哉之翰意解聴民還所在感悦既久悉奏除之知莆田縣又知長水縣徙知興州向敏中薦其才為殿中侍御史出為陜西轉運使坐失舉免起通判陜州天禧元年河北蝗命奎安撫改淮南轉運副使遷江淮發運使疏真揚漕河廢三堰舟楫便之嵗以八百萬而食京師擢三司副使坐與三司使争事改直昭文館知延州仁宗即位擢龍圖閣待制知開封府以嚴為治肅清京師拜御史中丞上疏論擇人求治崇節儉屏聲色凡數事仁宗深嘉納嘗館伴契丹使蕭從順從順言漢使至契丹皆見太后今請入見奎曰皇太后垂簾聴政雖本朝臣子亦未嘗見也乃不敢請或讒奎漏禁中語授集賢院學士知并州改秦州又改樞密直學士知益州上元節與僚吏夜㑹佛廟有戍卒殺人於市市人皆走奎密遣捕之而坐客莫有知者為政明决蜀人以張詠比之召為龍圖閣學士三司使未幾拜叅知政事遷給事中仁宗嘗謂輔臣曰臣之事君嘗見有始而無終者奎曰保終始者豈獨臣下如唐開元勵精為治而天下晏然及其既久放意荒侈以至大亂此不可不監也仁宗深納之時邉吏言契丹將大入邊輔臣俱言擇將備邉之䇿奎獨曰契丹畏誓而貪利且無隙以開其端其必不動不宜失持重之勢而使其可窺已而卒無事他日仁宗顧奎曰果如公言奎與王晦叔俱嘗守蜀而皆有名至是同為執政一日奏事已因語蜀事晦叔曰臣在蜀時有告戍卒反執而斬之於營門遂無事奎曰臣在蜀亦有告戍卒反者叱出之亦無事明道二年章獻謁太廟欲被天子黻冕臣下依違不决奎不可且曰太后必欲被黻冕見祖宗不知作男子拜邪女子拜邪乃止及章獻崩仁宗見羣臣泣曰太后疾不能言而猶數引其衣必有所屬何也奎遽曰其在黻冕也然服之何以見先帝乎仁宗大悟卒以后服斂因言内侍羅崇勲輩久用事於中不斥之恐偕以為亂崇勲等卒被逐是時大臣皆罷獨留奎且倚以為相而苦喘疾數辭位罷為户部侍郎資政殿學士判都省卒年六十八贈兵部尚書諡曰簡肅奎持身端重不茍合真宗時數宴大臣至有霑醉者奎諫曰陛下勤心萬務而簡乎燕幸今天下誠無事而飲樂無度又大臣數被酒無威儀非所以為朝廷重真宗善其言及輔仁宗謀議無所避尤善知人范仲淹龎籍明鎬在下位時奎皆以公輔許之卒如其言王曙字晦叔河南人也隋文中子弟績之後名同英宗御諱故以字稱舉進士為鞏縣簿又舉賢良方正入等授著作郎知定海縣通判陳州與脩冊府元龜以工部員外郎充龍圖閣待制改右諫議大夫河北轉運使部吏受賕失舉劾罷知夀州改淮南轉運使知開封府加樞密直學士知益州為政嚴平而不可犯人以比張詠為之謡曰蜀守之良前張後王惠我赤子而無流亡何以報之俾夀而昌召為給事中太子賔客冦準被罪晦叔即其壻也落職知汝州責郢州團練副使天聖四年復給事中知永興軍召入為御史中丞屬玉清昭應宫災守衛者皆繫御史獄章獻后臨政謂晦叔曰此人火非天災必戮守衛者晦叔上疏謂玉清之興不合經義先帝信方士邪巧之説蠧耗財用無紀今天災之乃戒其侈而不經也不當復建仁宗及章獻悟薄前守衛者罪於是脩宫議亦寢七年以工部侍郎参知政事明道二年以疾免除資政殿學士知陜州遷吏部侍郎徙河陽河南府召入為樞密使景祐元年加同中書門下平章事薨於位年七十二贈太保中書令諡曰文康晦叔方嚴簡重有大臣體以時尚奢侈躬自節儉食無兼味廐唯痩馬天下推其賢焉子益柔益柔字勝之少力學為光禄寺丞尹洙見其文曰贍而不流制而不窘未可量也為人伉直尚氣喜論天下事元昊叛上備邉選將之䇿杜衍使河東益柔寓書言河外兵饟無法非易帥臣與轉運使則邉鄙不寧因條其可任者與衍意合衍薦於朝除集賢校理蘇舜欽以祠神㑹客事除名㑹者悉逐而言者又謂益柔作傲歌坐奪職監復州酒稅久之為開封府推官改三司鹽鐵判官熙寧初因轉對言置相不可不審賢才必兼優乃可用如不得已寧先賢後文詔三司判官各陳所知益柔獻崇儉制田均稅三䇿歴知制誥兼直學士院遷龍圖閣直學士除祕書監出知蔡揚亳州江寧應天府卒年七十二蔡齊字子思其先洛陽人也曾祖綰為膠水令凡九年而卒子孫因家焉齊少孤好學李廸見其文謂有大志舉進士冠甲科真宗觀齊舉止端雅顧輔臣㓂準曰得人矣特詔金吾給騶從狀頭給騶從自齊始也除將作監丞通判兖州徙濰州除直集賢院遷右正言仁宗即位改右司諫同脩起居注兼侍御史知雜事河陽錢惟演請曲賜軍士特支齊言天子新即位維演連姻太后不宜私請一州以售已惠摇撼衆心遂不許改三司户部副使使契丹還知制誥翰林學士加侍讀學士章獻后出金繒脩景徳寺命齊為記内侍羅崇勲主營寺事使人隂謂齊曰趣為記當叅知政事矣齊曰此言何為至於我哉故遲之崇勲怒讒於章獻遂以龍圖閣直學士知河南府改密州章獻諭宰相取所撰記始上之徙知應天府除御史中丞章獻遺語以楊太妃為太后同議軍國事閤門趣班賀齊毅然曰天子明聖奉太后十餘年今始躬親萬事以慰天下之心豈宜女后相繼稱制且自古無有固止不可班太妃卒不與政止稱太后於宫中復為龍圖閣直學士擢三司使拜樞密副使交趾虐其部人有欵宜州自歸者八百餘人議者亦以為叛人不可納齊曰彼去暴而歸有徳宜納之給荆湖閒田使自營若遣去必不復還本部若散山谷當為後患不從後數年果為亂惟演諂附丁謂作樞密直學士題名記輒不列冦準於其間而碑刻云逆準不書齊言於仁宗曰冦準社稷之臣忠義聞於天下豈可令姦黨厚誣仁宗遂令磨去仁宗欲立陳氏女為皇后齊力爭罷之遷禮部侍郎叅知政事邉臣言契丹祭天於幽州以兵屯境上輔臣議備邉計齊以謂契丹必不敢渝約既而邉奏果無警與宰相吕夷簡論事不合罷為户部侍郎久之出知潁州卒年五十二諡曰忠肅改曰文忠齊精學博聞寛大沈黙善知人如龎籍叚少連等皆所薦也有子早卒以從子延慶為嗣其後有子曰延嗣延慶字仲逺初補太常寺丞祝復舉進士累遷京東陜西路提㸃刑獄神宗即位為同脩起居注擢天章閣待制秦鳯路都轉運使進龍圖閣直學士初王韶進兵河州賊徼其歸路延慶亟以兵赴救賊解韶全師而還韶既得河岷入奏延慶攝帥事㑹上元張燈西賊乘間伏兵北闗下遣使偽來請内屬謀舉火為内應延慶覘知斬首以徇北邉伏兵惶駭宵遁知成都府移帥涇原初茂州舊無城惟植鹿角利築城既而蠻酋訴稱城基我地乞罷築不許蠻遂叛延慶坐區處失宜降天章閣待制嘗得安南九軍法讀之謂諸將曰漢蕃兵馬未整幸今無事可依此團結以備調發乃以正兵弓箭手人馬團為九將合百隊分四部為左右前後而隊有駐戰拓戰之别歩騎器械每將皆同又以蕃兵人馬為别隊各隨所近分𨽻諸將諸將之數不及正兵之半所以制之也處老弱於城砦使漢蕃不相雜所以防其變也書成上之㑹鄜延亦分畫兵將延慶條上鄜延所奏未便者神宗是之召還知開封府旋除翰林學士以言者罷知滁州移洪州復龍圖閣待制帥髙陽閲嵗復龍圖閣直學士移定武哲宗即位除工部侍郎改吏部以卒延慶有學問平居簡黙遇事能别白是非所至有惠政初齊既得子延慶自陳歸宗籍所有付之無一毫私焉臣稱曰烏虖天祚明徳鎮撫其社稷則有剛毅不回之士立乎其朝且山有猛獸木無斧斤之害水有蛟龍魚無網罟之厄國家有剛毅之士則姦邪無睥睨之心威見於外也宗道沮立廟之請奎爭服冕之議晦叔寢脩宫之役齊却臨朝之議陳善閉邪有大臣節真可謂剛毅不回之士也哉東都事略卷五十三
