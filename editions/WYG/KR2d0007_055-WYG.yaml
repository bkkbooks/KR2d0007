body:
  text: 東都事略卷五十五宋王稱撰列傳三十八李諮字仲詢臨江軍新喻人也諮幼而父出其母日夕泣涕求母還乃至絶葷茹鄉里稱其孝舉進士為大理評事通判舒州遷直集賢院累擢知制誥翰林學士仁宗即位知開封府權三司使建言天下賦入有常而用度日益滋願一切裁抑之詔校一嵗經費減宂長者什之三又以商人入粟邉郡算茶與犀象為虚實三估坐耗官帑請以實錢参紐初商人有厚利而諮照其姦蠧一旦革之怨謗滋起而議者是非不一諮請郡遂除樞密直學士知洪州坐變茶法奪職徙知杭州復以舊職知永興軍衣冠子有恃䕃犯法者悉杖之境内肅然徙知江寧府久之復為三司使累官至禮部侍郎拜樞密副使又二年加户部侍郎為知樞密院事是時㩁茶之法浸壊乃詔諮與蔡齊更議之諮以前變法獲罪固辭不許於是復用諮所變法而官無濫費諮性明逹周知世務處劇若閑暇在樞府抑僥倖號為稱職三班使臣舊七年磨勘李廸為相奏減二年諮請自詔下經七年磨勘後方用新制事雖均頗為衆怨卒於位年五十五贈右僕射諡曰憲成盛度字公量杭州餘杭人也舉進士稍遷至直史館三司户部判官契丹犯邉數上疏論邉事奉使陜西参質漢唐故地繪為西域圖以獻為開封府推官坐决獄失實謫監洪州税起為三司鹽鐵判官遷知制誥嘗奏事便殿真宗問其所上西域圖内出絹命工别繪度因言前已圖漢所置酒泉張掖武威燉煌金城五郡比復究尋五郡之東南自秦築長城西起臨洮東至遼碣延袤萬里有郡有軍有守捉襟帶相屬􅇏火相望其形勢備禦亦至矣唐始置節度使後又以宰相兼領用非其人有河山之險而不能固有兵甲之利而不能禦豈不惜哉乃復繪其山川道路區聚壁壘為河西隴右圖以獻為翰林學士史館脩撰㑹冦準罷度以嘗交結周懐政出知光州丁謂用事復貶和州團練副使天聖初起知筠州徙䖍州又知徐蘇揚三州加集賢院學士初度嘗上言請復賢良方正科密詔撰策題馳驛以聞又請建四科以取士且言經術之士若典刑備舉則政敎流行請設博通墳典逹於敎化科堯試臣以事不直以言語筆札求之審官期於適用請設才識兼茂明於體用科今戎警未除調邉勞戍必資良帥以集事功請設軍謀宏逺堪任將帥科獄市之繁民命所繫若推按失實則枉情傷生請設曉法律能按章覆科後亦取其材識兼茂明於體用科與賢良方正能直言極諫科並行復為翰林學士史館脩撰兼龍圖閣學士明道中詔度與御史中丞王隨及三司詳定在京并外三十一州軍禁解鹽地分聴商旅入錢算鹽度言通商有五利遂施行之尋授承㫖兼端明殿學士翰林侍讀學士景祐二年拜叅知政事時王曾吕夷簡為相度與宋綬蔡齊並叅知政事曾與齊善而夷簡與綬善惟度不得志於二人至是曾夷簡求退一日仁宗問度曰王曾吕夷簡力求退何也度對曰二人腹心之事臣不得而知陛下詢二人以孰可代者則其情可察矣仁宗果以此問曾曾薦齊又問夷簡夷簡薦綬於是四人者俱罷政而度獨留遷知樞密院事即拜武寧軍節度使坐令開封府吏馮士元强取其隣所賃官舍為鄭戬所發罷為尚書右丞知揚州徙蔡州加資政殿學士知應天府以太子少傅致仕卒年七十四贈太子太保諡曰文肅度好學家居讀書未嘗釋手真宗嘗命與李宗諤楊億王曾李維舒雅任隨石中立同編通典文苑英華所著有愚谷集中書制集銀臺集翰林制集天禧三年郊恩赦文許舍人給事中諫議大夫母封郡太君而學士不與度時官兵部郎中因請進封其母自是學士官未至諫議者皆得封度多猜險僚吏皆畏其傾不敢妄語言肌體豐大艱於起拜有拜之者俯伏不能興或至詬罵其褊戾如此王鬷字揔之趙州臨城人也七嵗喪父哀毁過人及長狀貎竒偉館於王化基之門宋湜見而妻之以女宋氏親族或侮易之化基曰後三十年鬷富貴矣舉進士為婺州觀察推官代還真宗見而異之特轉著作佐郎稍遷至三司鹽鐵副使章獻臨朝龍圖閣待制馬季良建言京師賈人常以賤價售京師茶鹽交引請官置務收市季良挾章獻婣家有司莫敢忤其意者鬷曰與民競利非國體也執不可遂罷之後以樞密直學士知益州戍卒有夜焚營脇軍校為亂者鬷潜遣兵環其營下令曰不亂者斂手出門無所問於是衆皆出命軍校指亂者得十餘人戮之及明人皆不知也其為政有大體不為苛察蜀人愛之拜右諫議大夫同知樞密院事寳元元年除叅知政事明年遷工部侍郎知樞密院事又明年以西師不利議刺鄉兵久而不能决遂出知河南府始曹瑋在定武謂鬷曰公不十年必揔樞柄當是時西邉有警公宜善備之鬷曰若如君言何以教我瑋曰頃趙徳明嘗以馬博易於中國怒其人息㣲欲殺之徳明子元昊方十餘嵗諫曰以馬資隣國已失計矣今更以貨殺邉人則誰肯為我用乎瑋聞其言私念之曰此子欲用其人矣是必有異志異日徳明死此子為邉患必矣計其時正當公揔樞柄之日公宜勉之鬷殊未以為然也至是元昊叛鬷竟以處置失宜罷去鬷在河南每對僚吏歎瑋之明識鬷卒年六十四贈户部尚書諡曰忠穆王博文字仲明曹州濟隂人也年十六善屬文應舉開封府以回文詩百篇投試卷塲屋中謂之王回文召試舍人院除安豐簿遷殿中侍御史詔博文按朱能乾祐天書連逮者衆博文為治首惡脇從者皆得減死論為開封府判官丁母憂始博文幼喪父其母張氏再適韓氏及博文在朝謂母子無絶法遂請得以恩封之又謂古之為父後者不為出母服以廢宗廟祭也今喪者皆祭無害於行服乃請解官持服入為三司户部判官累遷龍圖閣待制權三司使與内侍羅崇勲鞫曹汭獄於真定府博文知章獻怒曹利用及汭誅議者或謂博文文致之知開封府進龍圖閣直學士知秦州徙鳯翔府又徙永興軍改樞密直學士復知秦州㳂邉軍民逃入蕃部擒至者予之錦袍銀帶茶綵間有自歸而為蕃部所得亦不能免坐法皆斬博文遣習事者持信紙密招之至則驗而貸其罪免死者衆景祐元年除龍圖閣學士再知開封府久之知真定府遷給事中嵗餘召為三司使拜同知樞密院事凡三十六日而卒年六十六子疇疇字秉彛以父任為將作監主簿復舉進士為太常博士翰林學士宋祁提舉諸司庫務舉疇為之屬時有宦官在職疇辭曰翰林先進疇恐不得事之然耻以朝士大夫而為閹人指使也遂不就賈昌朝舉疇編脩唐書慶歴中仁宗獵近郊疇言十事以諫召試直祕閣至和中為開封府推官又為判官宦者李允良疑人毒死其叔父訴請發棺驗視疇獨曰驗而無實是無故暴人尸此安知非允良有姦既而窮治果引伏與叔家有怨為三司度攴判官脩起居注知制誥以右諫議大夫為御史中丞遷給事中英宗疾既稍愈未出疇請以時御朝又請朝謁祠廟㑹大臣亦請英宗從之自是遂聴政遷翰林學士居數月拜禮部侍郎樞密副使於是知制誥錢公輔言疇資淺望輕在臺素餐不可以大用英宗既用疇而黜公輔疇在位五十五日而卒年五十九贈兵部尚書諡曰忠簡張觀字思正絳州人也中服勤詞學科擢為第一為將作監丞通判解州吏坐贓以失舉責監河中府税頃之通判果州改祕書郎擢右正言直史館三司度支判官同修起居注改右司諫知制誥出知杭州代還知開封府觀為人寛厚長者然於吏事非所長有犯夜者觀乃問有人見否犯夜者曰固無人見也人𫝊以為笑景祐初為翰林學士以給事中權御史中丞觀舉文彦博為御史時以為得人寳元元年拜同知樞密院事後二年罷知相州除資政殿學士徙澶州京東路舊止通安邑鹽而瀕海禁私煑觀知鄆州請弛其禁嵗免黥配者不可勝計久之復為御史中丞以父居業年髙請便郡進觀文殿學士知許州遷尚書左丞觀性至孝初為祕書郎而父方為幕職官觀以官回授其父朝廷從其請居業官至太府卿觀在許以憂去官哀毁過甚既練而卒年六十六贈吏部尚書諡曰文孝觀平生未嘗草書因自為詩曰保心如止水為行見真書仁宗嘗飛白清字賜之鄭戬字天休蘇州吳縣人也舉進士為奉禮郎僉書宣徳軍節度判官召試為集賢校理直史館同脩起居注知制誥訓詞深雅時謂常楊不逮也遷龍圖閣直學士知開封府府吏馮士元素奉權貴戬發其姦利事流之於海島於是叅知政事程琳知樞密院盛度皆坐黜康定元年權三司使拜右諫議大夫同知樞密院事改副使是時陜西用兵戬請廵邉以圖破羌之䇿大臣忌之明年以資政殿學士知杭州浚治西湖民賴其利徙鄆州又徙永興軍未幾為陜西經略安撫招討使廵邉至鎮戎軍趣蓮花堡天寒與將佐置酒髙㑹元昊方擁兵近塞㑹暮塵起有報賊騎至戬曰此必諸將按邉回尔非賊騎也已而果然元昊謂其下曰我已遣人使稱臣朝廷何為復用此公䕶諸將其欽畏如此及疆事少寧還知永興軍初劉滬建議築水洛城以通秦渭援兵戬因令滬與董士亷督其役㑹戬罷四路而宣撫使韓琦知渭州尹洙皆以為地在生羌間恐城未就而冦至因令罷役滬等不聴乃械送徳順軍制獄戬力爭於朝卒城之進資政殿大學士知并州時契丹與元昊交兵仁宗遣使問戬戬對夷狄相攻中國之利也乃益修邉備以防戎人侵軼遷吏部侍郎拜宣徽北院使奉國軍節度使卒年六十三贈太尉諡曰文肅戬初以文章有聲場屋間性强毅明峻意所欲必行之衣冠子有豪縱犯法者必法外黥配餘皆惕息云任布字應之河南人也後唐宰相圜四世孫舉進士為安肅軍判官因上言河北利害且謂敵必大入請飭邉備未幾果有澶淵之役真宗竒之擢提㸃荆湖南路刑獄權三司鹽鐵判官坐與徐奭試開封進士而奭潜發封卷視之責監鄂州税務徙知宿鄧建三州梓州路轉運使召還為户部判官遷江淮發運使入為三司鹽鐵副使出知真定府有議欲省兵河北者布言今西北二虜包藏禍心以窺伺中國未可以弛備改知天雄軍遷集賢院學士知許州進龍圖閣直學士徙澶州復知真定府慶歴元年召拜樞密副使明年罷知河陽以太子少保致仕再遷太子少師始布歸休洛中作五知堂以知恩知道知命知足知幸也卒年七十八贈太子太傅諡曰恭惠布性純約方輔政時其子遜嘗上書歴詆大臣亦以其父為不才御史魚周詢因疏布曰不才之迹其子具知然議者以遜詆父為不孝而周詢又引其語以逐布為不知體云東都事略卷五十五
