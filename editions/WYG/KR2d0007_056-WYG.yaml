body:
  text: 東都事略卷五十六宋王稱撰列傳三十九王隨字子正河陽人也舉進士為將作監丞通判同州代還直史館出為京西轉運使時隨父母在洛中京西乃其所部也真宗賜詩寵其行復以羊酒束帛使過家為夀時人榮之徙淮南召還為侍御史知雜事擢知制誥隨於詞命非所長也出知應天府徙揚州未幾除知開封府仁宗為皇太子拜右庶子周懐政得罪隨坐假與白金落知制誥改給事中知杭州復降為祕書少監知通州久之復給事中遷龍圖閣直學士知秦州秦人多畜逃卒或忤意則執以求恩奬故坐法衆隨至下令能自歸者免仍𨽻舊籍由是多所全活徙河南府入為御史中丞遷翰林學士明道二年除户部侍郎叅知政事景祐中進吏部侍郎知樞密院事遂拜門下侍郎同中書門下平章事昭文館大學士與陳堯佐同在中書議事輒不合無大臣體以災異援漢故事請罷除彰信軍節度使同平章事判河陽卒年六十七贈中書令諡曰章惠隨外若方嚴而所治常失於寛性善佛慕唐裴休之為人仍學其書然不逮也章得象字希言世家泉州髙祖仔事閩為建州刺史遂居浦城其夫人練氏有智識仔嘗出兵二將後期欲斬之夫人救之得免二將後仕南唐為將攻破建州時仔已死矣夫人居建州二將遣使厚以金帛遺夫人并以一白旗授之曰吾屠城夫人植旗於門吾以戒士卒勿犯也夫人反其金帛并旗弗受曰君幸思舊徳願全此城必欲屠之吾家與衆俱死耳不願獨生二將感其言遂不屠城君子知其後必大毋嘗夢登山遇神人授以玊象及生復夢庭積象笏因名得象舉進士為大理評事知歸化縣稍遷直史館三司度支判官知制誥為翰林學士進承㫖景祐三年拜同知樞密院事寳元元年以户部侍郎同中書門下平章事集賢殿大學士仁宗謂曰先太后臨朝羣臣邪正朕皆黙識之卿清忠無所附麗故大用也元昊反命兼樞密使明年拜工部尚書為昭文館大學士監脩國史慶歴五年拜鎮安軍節度使同平章事判陳州封郇國公徙河南府以疾引年守司空致仕卒年七十一贈太尉侍中諡曰文憲後知制誥王洙言得象諡同周公改諡曰文簡得象性簡重在翰林十二年怡然自得章獻后嘗遣内侍至院必正色嚴待之未嘗交一言居相位八年親戚子弟皆抑而不進然陜西用兵吕夷簡晏殊杜衍范仲淹富弼更秉政得象黙黙不能有所為夷簡既薨殊衍仲淹弼亦去位而得象為相如故卒以老辭位云晏殊字同叔撫州臨川人也七嵗善屬文號神童景徳初張知白安撫江西薦之得召試又試詩賦論殊自言臣嘗私習此賦不敢𨼆真宗異之因試以它題以為祕書省正字置之祕閣使得悉讀祕閣書明年復獻所為文召試中書為集賢校理連丁家艱真宗即其家起復仁宗封昇王以殊為記室叅軍仁宗為皇太子為舍人擢知制誥除翰林學士為左庶子真宗每所諮訪多以方寸小紙細書問之由是叅與機密凡所對必以其槀進示不洩真宗以謹密稱之章獻明肅皇后權聽軍國事宰相丁謂樞密使曹利用各欲獨見奏事無敢决其議者殊建言羣臣奏事太后者垂簾聴之皆無得見議遂定拜右諫議大夫兼侍讀學士天聖三年以禮部侍郎為樞密副使上疏論張耆不可為樞密使由是忤章獻㫖坐以笏擊耆折其齒罷留守南京興學校延范仲淹以敎授諸生天下興學自殊始召拜御史中丞改資政殿學士兼翰林侍讀學士為三司使復拜樞密副使未幾改叅知政事章獻謁太廟有請服衮冕者章獻以問殊殊以周官后服對初章懿后上仙殊撰志文謂后無子及仁宗親政以殊知江寧府未行改亳州徙陳州復召為御史中丞又為三司使知樞密院事拜樞密使加同中書門下平章事慶歴三年遂以刑部尚書居相位充集賢殿大學士仍兼樞密使自殊復召用而趙元昊反師出陜西天下弊於兵殊數建利害請罷監軍無以陣圖授諸將使得應敵為攻守及制財用為出入之要皆有法仁宗悉施行之又請出宫中無用之物以佐邉費而財賦之職悉歸有司及居相府時范仲淹韓琦富弼皆進用至於臺閣多一時之賢仁宗既厭西兵閔天下困弊奮然有意遂欲因羣材以更治數詔大臣條天下事方施行而小人權倖皆不便四年秋諫官孫甫蔡襄彈奏殊撰章懿皇后志文事因言殊役官兵治邸舍懐安茍且無向公之心遂罷以工部尚書知潁州殊既以事罷而仲淹等亦相次罷去徙知陳州又徙許州遷户部尚書拜觀文殿大學士知永興軍徙河南府以疾請歸京師訪毉留侍經筵提舉萬夀觀卒年六十三贈司空兼侍中諡曰元獻殊性剛峻遇人以誠雖處富貴奉養如寒士樽酒相對歡如也當世賢士大夫如范仲淹孔道輔歐陽脩等皆出其門其擇壻又得富弼楊察為文贍麗應用無窮尤工風雅才有餘思其篤學老而不倦有文集二百四十卷又集古今文章為集選二百卷杜衍字世昌越州㑹稽人也父遂良尚書度支員外郎衍幼孤及長舉進士為揚州觀察推官知平遥縣通判晉州知乾州安撫使以衍治行之優命攝守鳯翔二州之民争挽之遷河東京西路提㸃刑獄知揚州河東陜西轉運使入為户部副使進天章閣待制出知荆南府徙河北都轉運使遷樞密直學士知天雄軍召拜御史中丞㑹有詔與三司使副擇吏人能否而升降之有欲以事中衍者且揚語於外曰衍奏請盡黥諸吏吏僅千餘人詣衍第諠譁不可抑明日入對願窮治即推吏首惡抵於罪衍復以樞密直學士知永興軍遷龍圖閣學士知并州又徙永興時西鄙用兵勞於調發至破産不能給衍為之區處計較量物有無貴賤道里逺近寛其期㑹使得次第輸送而車牛芻秣宿食來往比它州省費什六七召知開封府康定元年以刑部侍郎同知樞密院事改副使陜西兵久不解詔夏竦議攻守計竦列二䇿以上衍用守䇿與宰相議不能得請免不許慶歴三年為吏部侍郎樞密使范仲淹嘗出衍門下時為叅知政事數争事上前衍無愠色而仲淹益敬服之㑹契丹駙馬劉三蝦避罪來歸邉臣欲以官縻之諫官亦有請衍以謂本朝與契丹結好久不可以生事還之四年拜同中書門下平章事兼樞密使集賢殿大學士衍為相與富弼韓琦范仲淹同革弊事以脩綱紀而衍尤抑絶僥倖凡内降恩澤者一切不與每積至十數必面納之仁宗嘗謂諫官歐陽脩曰外人知衍封還内降邪吾居禁中有求恩澤者毎以衍不可告之而止者多於所封還也由是僥倖寖不説衍多知本朝故實善决大事初邉將議欲大舉以擊夏人韓琦亦以為可舉衍争以為不可兵後果不得出契丹與夏人争銀甕族大戰黄河外而鴈門麟府皆警范仲淹使河東欲以兵從衍以為契丹必不來兵不可妄出後契丹卒不來其壻蘇舜欽監進奏院集妓樂以祠神為御史劾奏又集賢校理王益柔作傲歌語渉指斥欲下御史按罪衍謂羅織獄今起都下矣執不可又諫官孫甫言丁度面求進用請屬吏衍不為置對又范仲淹富弼偕出宣撫言者隨攻之仁宗欲罷二人而衍又執以為不可遂疑其朋黨以尚書左丞出知兖州衍為相凡百日而罷去明年上章願上印綬乃以太子少師致仕議者謂故相一上章而得請以東宫三少致仕非故事葢宰相賈昌朝疾之故尔衍謝事十餘年累遷太子太師封祁國公衍清介舊無居第既退方葺舍南都出入如平日無軒冕者好吟詩晚喜草書臨終戒後事皆有法作遺疏千餘言其略云勿以乆安而忽邉防之戒勿以既富而輕財用之原又請早建儲副以安天下心卒年八十贈司徒兼侍中諡曰正獻臣稱曰事有矯拂於人之情而吾獨不愧於中者公而已衍相仁宗抑僥倖脩紀綱而囿以至公一時怨府有所不䘏也昔姚宋罷斜封官而開元之盛實歸之衍亦多封還内降而仁宗賴以絶濫進之階慶歴之光明俊偉衍與有力焉烏虖衍之賢其知為治之體者與其得為相之道與東都事略卷五十六
