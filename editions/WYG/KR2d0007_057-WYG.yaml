body:
  text: 東都事略卷五十七宋王稱撰列傳四十宋綬字公垂隨州平棘人也父臯直集賢院綬幼聰警其外祖楊徽之器愛之以徽之遺恩授太常寺太祝年方十五召試中書真宗竒其文聴於祕閣讀書久之召試學士院為集賢校理與父臯同在館閣世以為榮真宗祠大清宫以綬僉書亳州判官事入為左正言建言比嵗下赦令釋逋負稽期未報者六十八州軍請諸路選人校之限半月以聞於是脱械繫三千二百人除逋負數百萬擢知制誥為翰林學士兼侍讀章獻皇后命綬擇前代文字可以賛孝養補政治者以上遂録唐謝偃惟皇戒徳武孝經論語節要唐太宗所撰帝範開元臣僚所獻政典君臣正理論上之同脩國史章獻稱制既久仁宗未嘗獨對羣臣綬請令中書樞密院非軍國大事及大除拜皆前殿取㫖臣僚亦只前殿對由是忤章獻意改龍圖閣學士出知應天府章獻崩仁宗記其忠且欲大用之為宰相張士遜所抑復入翰林為學士兼侍讀詔綬定章獻明肅章懿二后祔廟禮綬援春秋考仲子之宫唐儀坤故事請别立章懿廟建名奉慈以安神主仁宗從其議加端明殿學士端明殿後唐初置學士太平興國中為文明殿學士未幾殿災重建改曰文徳遂不復置學士至是又置焉綬言帝王之御下在乎握威柄明功罪二者必自天子出一紀以來政出簾箔之門今陛下方躬親萬務聴斷有祖宗英風天下延頸跂踵渴見聖政而刑政號令未見勝於垂簾之日豈非三事大臣未能盡輔佐之道耶頃者除授恩澤多所希望而因縁邪幸者遂取升擢者以為恩出太后而不由陛下自親政以來恩寵雖行議者又云悉出大臣葢大臣公為朋黨㒺冐天聴朋黨相結其害實甚或窺測上㫖密令陳奏或附㑹己意以進退人大臣市恩以招權小人趨利以售進此風浸長有蠧邦政太宗嘗云國家若無外憂必有内患外憂不過邉事皆可豫防唯姦邪無狀若為内患深可懼也真宗亦云唐朝朋黨猶盛漸不可制以至帝室衰弱願陛下思祖宗之訓念王業艱難整頓紀綱正在今日仁宗大感悟明道二年張士遜罷遂為参知政事章惠皇后營建道觀諫官御史皆言近詔罷脩寺觀而復有此興造是詔令數更也仁宗曰此太后自出奩中物尔綬因曰是豈知太后所為但見忽興土木違近詔尔太祖常謂唐太宗受人諫疏直詆其罪曾不為耻豈若自不為之而使人無言望陛下深監皇祖之言常防外廷之議初尚美人出宫而左右有以茶商陳氏女入宫者綬因間見曰陛下乃欲以卑賤者正位中宫乎㑹樞密使王曾宰相吕夷簡以為不可屢論列上前卒罷之時仁宗春秋方盛天下無事綬言曰自古守成之君必兢兢抑畏不忘顧省人心逸於久安患害生於所忽故立防於無事之際銷禍於未萌之前若事至而後應不亦殆與臣猶願飭勵羣司交脩庶職勿以治平自怠勿以纎㣲不戒則可以保至尊而享洪業矣臣又切惟御下之道有三臨事尚乎守當幾貴乎斷兆謀先乎密守則不可移斷則不可惑密則不可變是三者治亂安危之所繫願陛下欽之念之至若朝務清夷深居閑燕亦願陛下愛養聖躬節宣所欲夫四時聲味所以調適六氣乃克和平自然擁百靈之休享無疆之福豈不美哉景祐四年罷為尚書左丞資政殿學士留侍經筵明年加大學士知河南府俄召知樞密院事遷兵部尚書改叅知政事未幾而卒年五十贈司徒兼侍中諡曰宣獻綬資性孝謹清介寡言經史百家莫不通貫家藏書二萬卷楊億嘗稱其文淳麗尤善詞賦自以為不及也綬筆札精妙仁宗嘗取其所書藏禁中初仁宗郊祀綬嘗攝太僕卿陪玉輅顧問儀物典故占對辯洽撰鹵簿圖以進所著有文館記事外制禁林甲乙祕殿遺札七集子敏求敏求字次道由祕書省正字歴館閣校勘坐赴蘇舜欽進奏院㑹出為僉書集慶軍判官時脩唐書以敏求為編脩官復校勘累擢知制誥脩撰仁宗實録英宗在殯有言宗室可嫁娶者敏求以為不可既踰年又有言者敏求言宗室義服變服而練可以嫁娶矣以前後議異降秩一等出知絳州實録成遷右諫議大夫復知制誥在職六年王安石用事以御史中丞吕公著嘗奏論青苖之害罷中丞敏求當制而安石改制進呈敏求即請觧職未聽李定自秀州判官除御史裏行敏求又封還其詞頭曰御史之官舊制須两任通判方許奏舉後以資任相當者少始許舉通判未滿任者今定自幕職便處以糾䋲之地臣恐弗循官制之舊未厭羣議再請解職遂罷久之為史館修撰集賢院學士遷龍圖閣直學士修國史卒年六十一敏求敏於記問文章質重訓詞誥命皆有程範朝廷典故士大夫疑議多就取正而後决著書闈前後集西垣制辭文集凡四十八卷東京志河南志長安志三川官下録春明退朝録韻類次宗室譜又五十二卷補唐武宣懿僖昭哀六世實録百四十八卷敏求以力學被遇朝廷有文命亊未嘗不在選中父子繼世掌史時以為榮李若谷字子淵徐州豐人也少孤遊洛下因塟其考妣於緱氏而占籍焉舉進士調長社尉累遷兵部郎中三司户部判官奉使契丹章獻明肅皇后同聽政奉使者辭於庭下例升殿受㫖若谷辭已即趨出章獻怒遂不遣出知荆南府駐泊都監王䝉正章獻婣家也恃勢為姦利若谷以法繩之徙知潭州州有盗阻洞庭之險刦舟殺人投尸湖中前此捕獲多減死配𨽻他州久復逸歸為患滋甚若谷至潜使人擒之條其前後罪状磔於市盗遂息徙知滑州又知延州夏人遣使來前守多延之堂上若谷獨廡下飲食之知夀州安豐芍藥陂孫叔敖所創為南北渠溉田萬頃餘陂因旱嵗多侵耕其間雨集將盈則盗决之陂涸失灌溉之利者甚衆若谷因陂决獨調瀕陂之民使之全築自是無盗决者加集賢院學士知江陵府進龍圖閣直學士知河南府改樞密直學士知并州并州自昔未有學若谷始建學於文宣王廟州多降胡間常為盗若谷命集累犯者以三人為保有犯則并坐悛者則久而釋之以龍圖閣學士知開封府景祐五年拜叅知政事嘗言近嵗風俗澆薄駕朋黨之説以汙善良君子小人各有氣類今一槩以朋黨名之忠良恐懼臣亦無以立朝矣仁宗然之又言轉運使提㸃刑獄失按所部官受臧類降差遣且監司所部甚廣廵按不過留三二日葢未能遍察也茍州郡密發一臧吏先聞朝廷則監司不可勝黜自是轉運司提㸃刑獄再不覺察部内官受臧則降黜之康定元年以耳疾辭位罷為資政殿大學士提舉㑹靈觀宫觀置提舉自若谷始也明年以太子少傅致仕卒年八十贈太子太傅諡曰康靖若谷質厚長於治民所至郡邑人多見思一子淑淑字獻臣始年十三獻其所為文授試校書郎天禧三年除館閣校勘天聖中擢史館脩撰上時政十議一曰國體二曰災旱三曰言事四曰大臣五曰擇官六曰貢舉七曰科選八曰閲武九曰時令十曰入閤其議國體曰今災沴既頻賦入有限用度不足恩賜或濫吏員滋多甄别殊少近臣暫出外任若欲自留有固辭而罷者進不滿望或不即拜有中路而易者願陛下號令一授要在必當官職一授勿復再改至於國用未足濫官未澄宂兵疲馬横賜之類願命近臣知治體者凖三朝出入之數而撙節之議災旱曰頻嵗以來亢陽為孽民多艱阨嵗不順成洪範曰僭常暘若謂爵命僭差號令迭改今遣間使推存救之澤農服田􅅿無國家贍食之理臣願陛下脩人事以應天變不然徒匱國力未足以弭民災也議言事曰臣聞先朝有劉驥者輕為奏疏先帝語左右曰此人言多捭闔期在必行而近偽亂真詞㫖易辨驥嘗枉法受賂古人察言觀行正為此也願陛下於進退之際防邪僻之人議大臣曰今嵗兩府遷易頗頻其於政體似傷簡静太祖初定天下用周朝二相六年始以趙普代之凡十一年始代以薛居正沈倫太宗嗣位唯一盧多遜後六年復用趙普是後十八年中雖三四易相然所用者李昉宋琪吕䝉正張齊賢吕端而已當是時進則盡忠退則脩省葢進退皆出睿斷也真宗景徳以前命相惟張齊賢李沆向敏中吕䝉正畢士安冦準六人其後任王旦十二年向敏中再相亦十年此二人在位之日非有疑似之嫌誠信任無間而不重以權故也葢權太重則難以久居言易入則得以譛愬真宗嘗謂宰臣曰今四方無虞與卿等守祖宗經制最為急務此任相之大體也議擇官曰太平興國初文武朝官班簿纔二百人咸平初已四百人天聖元年遂踰千人去嵗覃恩以臣料之又軼天聖之數矣先朝嘗諭審官流内銓主判若灼有能績為衆所稱者密以召問當特㫖升擢願陛下引對之際一如先朝故事行之其老疾懦庸間以退黜庶有所懲勸矣議貢舉曰皇朝開寳以前嵗取士不過三十人經學不過五十人自克復偽國吏員益衆始有廷試廣收人之制願陛下約今嵗吏部闕官之數為來年入等之準議科選曰吏部故事選人格退未至能試判三節謂之㧞萃止用疑案古義觀其能否詞美者優以授職此有司銓品之式陛下親御軒陛審覈課試非其稱已願罷此科又禮部茂材異等求出類之俊頗聞鄉薦不獲始來應書望更為嚴制以革僥冐議閲武曰開寳通禮有四時講武儀國初疆堠未平多親閲試按礮角射太平興國間築臺楊村備大閲之禮咸平初闢場東武原發卒㑹射其後再幸飛山敎場躬親訓練今兵革不試三十年矣士不聞鉦鼓之聲人不識行伍之列願陛下按通禮厲兵講事而躬閲之議時令曰開元定禮有明堂及太極殿五時讀令之議冠服佩玉悉從方色月令不順則五沴應之近嵗氣序繆戾水旱不節天應以異固當變而脩正願陛下申命有司以氣至之日集百官讀時令於天安殿至尊升堂近臣伏聽上下交儆以凝庶績議入閤曰唐自寳歴之後至五代猶或講求施及聖朝太祖五行其禮多御崇元殿備殿中金吾諸仗設待制復轉對官崇元即今天安殿也乾徳之後改御大明殿即今集英殿也太宗三行其禮復别定新制就文徳殿廷增設黄麾仗真宗亦三行之其禮之廢向踰二紀願因盛時遵復其制景祐初知制誥自是五除翰林學士两以人言不拜而三授端明殿翰林侍讀龍圗閣學士亦皆再兼嘗知許滑二州又知開封府以吳育言其在府任用吏改知鄭州徙河陽淑初在鄭州作周陵詩有倒戈之句議者謂淑引喻失當乃復自翰林出知應天府淑請侍養許之丁父憂服除復入翰林諫官包拯吳奎言淑知應天府日親老及陳乞侍養無奉親之實有謀身之端嘗作周陵詩語渉怨憤昔轅固與黄生争論於景帝前及湯武革命之事而帝深惡之葢以其非所宜言也且陛下事章獻皇后於母子之際無纎豪之間而淑誌吕夷簡墓又有牝雞司晨之語實累上徳遂罷繼丁母憂服除又入翰林為御史中丞張昇論奏除知河中府累官户部侍郎卒年五十八贈尚書右丞淑聰悟過人博學强記詳練典故與脩國朝㑹要三朝訓鑒圗閣門儀制所著文集共百餘卷東都事略卷五十七
