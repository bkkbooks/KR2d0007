  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0007_WYG_060-1a, image: WYG0382/WYG0382-0379a.png}
body:
  text: 東都事略卷六十宋王稱撰列傳四十三陳從易字簡夫泉州晉江人也舉進士為嵐州團練推官再調彭州軍事判官王均反從易攝州事有謀殺監兵欲從亂者從易捕其首斬之及緜漢相繼陷而均移書至州從易即命焚之以安衆然亦戒其家僮聚薪堂後曰吾力不足以守則死於此矣改著作佐郎知邵武軍遷太常博士與脩歴代君臣事迹遷監察御史歴殿中侍御史改直史館出知虔州坐失舉送宰相冦準素惡之出知吉州後為湖南轉運使準貶道州或謂曰可志廬陵之命邪準至從易以故相禮敬之言者為慙徙知江陵府又知慶州入為左司郎中知制誥與楊大雅同在西掖時謂之楊陳遷左諫議大夫進龍圖閣直學士知杭州卒年六十六王欽若素善從易常謂人曰吾數日不見簡夫輒忽忽不懌及廢居睢陽親舊無敢見者從易赴湖南往見之欽若曰無乃為君累乎留數日而去所著有泉山集二十卷中書制藁五卷西清奏議三卷楊大雅字子政杭州錢塘人也初名􅋲後避真宗藩邸名而更之唐靖恭虞卿之後虞卿孫承休唐天祐初為吳越策禮副使因家錢塘大雅承休四世孫也舉進士真宗時召試學士院又上書自薦乃直集賢院久歴外官直集賢院者二十七年不遷有出其後者往往致榮顯或笑其違世自守大雅歎曰吾不學乎世而學乎聖人由是以至此吾之所有不敢以薦於人而嘗自獻乎天子矣天聖四年以久次遷集賢殿脩撰與陳從易並命知制誥居二嵗拜右諫議大夫集賢院學士出知亳州卒年六十九所著有大隠集五十卷職林二十卷两漢博聞十二卷李垂字舜工聊城人也由進士第上兵制將制書自湖州録事叅軍召為崇文校勘累遷脩起居注丁謂執政權傾天下埀未嘗往謁或問其故埀曰謂為宰相不以公道副天下望而持權怙勢觀其所為必遊朱崖吾不欲在其黨中謂聞而惡之罷知亳州遷晉絳二州還朝或謂曰舜工文學議論稱於天下諸公欲用為知制誥但宰相以舜工未曾相識盍一往見之垂曰趨炎附熱看人眉睫以冀推輓乎道之不行命也執政知而惡之出知均州卒年六十九子仲昌稍知名然銳於進取嘗獻計修六塔河無功自殿中丞責英州文學参軍卒燕肅字穆之青州人也少聰警舉進士為鳯翔觀察推官知臨卭縣又知考城通判河南府召為監察御史遷殿中侍御史提㸃廣西刑獄徙廣東知越明二州入為定王府記室叅軍擢龍圖閣待制知審刑院先是天下疑獄雖聴奏而州郡懼得罪不敢讞故寃獄常多肅建請諸路疑獄皆聴讞有不當者釋其罪自是全活者衆判太常寺建議考正雅樂自肅始改龍圖閣直學士知頴州徙鄧州以禮部侍郎致仕卒年八十肅多巧思以創物大智聞天下常造指南車記里鼓二車及欹噐以獻又作蓮花漏世服其精肅所至刻石以記其法子度官至右諫議大夫胥偃字安道潭州長沙人也少好學栁開見其所為文而噐之曰子異日必有名於天下舉進士授大理評事通判湖州稍遷太常丞脩起居注知制誥久之遷翰林學士知開封府忻州地震偃言至隂之盛所致也葢臣者君之隂婦者夫之隂夷狄者中國之隂今朝廷政令不専出上而後宫外戚恩澤日益蕃滋陽不勝隂之效也加以夷狄閒多内侮宜選將練師以防侵軼之患其後元昊朝貢不至復上疏以為即誅之太暴非聖人謹於用兵之意也謂宜遣一介之使問其不臣之狀待其辭屈而後加誅焉則王師出為有名矣西邉用兵士卒親屬留京師有犯法抵死者仁宗不忍使就刑言者或欲置毒飲食中令得自死偃以為不可力諫止之卒年五十七始偃未仕時其家初有田數十頃偃既貴遂以予族人初天下圭田無月日之限争者稍衆偃請限水田以四月終陸田三月終因著為令嘗與謝絳試中書吏大臣有私屬者偃不發視其牘而焚之曰發而言之不亦傷刻薄乎司馬池字和中陜州夏縣人也少好學推家財數十萬與其諸父嘗奏名禮部將入試殿廷一日心動不能寐曰吾母素多疾能無恙否及至内門徘徊不能入葢母亡為友人所匿也因語其友而友止告以聞有疾池遂號慟而歸後舉進士為永寧簿盛度守光州池為光山令大内火詔諸州市竹木州期以三日畢輸池以土不産轉市隣郡非三日可得度怒甚既而光山為諸邑先池於民有信而民不俟於催督也曹利用薦為羣牧判官辭不就朝廷固授之其後利用貶其黨畏罪多從而毁之獨池在朝明利用之枉除開封府推官為中貴人所沮乃出知耀州為利州路轉運使知鳯翔府召知諫院表懇免仁宗曰人皆耆進池獨耆退何也加直史館復知鳯翔有疑獄上讞大理輒復下椽屬皇恐池曰長吏者政事所係乃獨承其罪有詔勿劾岐陽鎮廵檢夜飲富民家所部卒執之而俾為文約不敢復督士卒而後釋其縛池捕首惡誅之廵檢亦坐廢為侍御史知雜事嘗言陜西用兵無宿將劉平好自用必誤大事卒如其言更三司副使遂以天章閣待制知河中府改同州徙杭州江鈞張從革為两浙轉運使惡池捃摭其事條奏之降知虢州池未謫聞吏有盗官銀稱為鈞償私費而從革之婣犯税隂遣人私請或謂可以此報池獨不較人以為長者徙晉州卒年五十三子光位宰相自有傳孔道輔字原魯初名延魯孔子四十五世孫舉進士為寧州推官道士治真武像有蛇穿其前郡將帥其屬往奠拜之道輔持笏碎蛇首而去一郡皆驚知曲阜縣天聖九年為右正言上書請太后歸政天子而廷奏樞密使曹利用御藥羅崇勲罪狀當是時崇勲操權利而利用悍强不遜内外憚之使契丹其主酌以大巵曰天寒飲此可以致和氣道輔曰不和固無害既還言者以為生事且開敵釁他日仁宗問之對曰契丹新為黒水所破勢甚蹙平時漢使至多以言相侮臣恐其益慢中國故荅以此言仁宗然之除龍圖閣待制糾察在京刑獄坐糾事失當出知鄆州徙青州入判流内銓出知許州徙應天府除右諫議大夫御史中丞皇后郭氏廢道輔率諫官御史伏閣請對仁宗令至中書宰相吕夷簡曰廢后有漢唐故事道輔曰大臣當導君以堯舜而漢唐失徳可為法邪夷簡色沮明日請對不得入遂出知泰州徙徐州兖州進給事中龍圖閣直學士復入為御史中丞開封府吏馮士元坐獄語連大臣故移其獄御史劾士元罪止於杖且多更赦而執政又以為道輔為大臣道地出知鄆州道輔性鯁直遇事無所避再入臺僦郭贄舊宅宅近太廟而言者為出入傳呼則神不寧詔令徙宅道輔歎曰險人之言入矣既以士元事罷憤惋而卒年五十四然天下莫不以直道許之也子宗翰宗翰字周翰始以父任為將作監主簿復舉進士宗翰氣貎渾厚奉親孝王珪在翰林舉御史司馬光知諫院敕薦士皆以宗翰應詔嘗為䕫峽路轉運判官京東路提㸃刑獄知蘄密陜揚洪兖六州元祐初除司農少卿遷鴻臚卿先聖之後襲公爵以奉祠事其後或領官他州至有以爵為尉而廷参郡守者宗翰以為言詔改衍聖公南奉聖公承襲者即除寄禄官不領他職給廟學田萬畆賜監書置學官以誨其子弟除刑部侍郎卒年六十叚少連字希逸開封人也其母夢鳯集於家庭而少連生舉服勤詞學科知崇陽縣崇陽劇邑自張詠後未有繼者少連治文仍出其右當章獻皇后臨朝為御史臺推直官上疏論戚里恩濫章獻怒責監漣水軍酒税起為通判天雄軍召入為殿中侍御史郭皇后廢少連與諫臺官伏閣不得對孔道輔范仲淹謫出少連等止各罰金少連上疏曰臣因義激心以職獲譴天容地載䝉幸何深然理有所未伸情有所未逹鬱悒之志不得不盡陳之道輔仲淹與臣等議皇后不宜廢是以羣詣殿閣上疏而執政進説使臣等不獲面對道輔仲淹出守外郡臣等䝉罰中外皆以為非陛下之意特宰執假天威以斷來者之説不報又上疏曰臣伏準戒諭自今不得羣詣殿門請對且伏閣上疏自有故事昔唐陽城王仲舒伏閣雪陸贄之枉崔元亮叩殿陛理宋申錫之寃今陛下未忍廢黜皇后而兩府列狀議降為妃諫官御史敢廢伏閣之事乎陛下深惟道輔仲淹等所言為阿黨乎為忠亮乎不報又上疏曰髙明粹清凝徳無累天之道也然氛祲蔽翳晦明偶差乃隂陽之沴爾象天徳者君之體也治隂陽者臣之職也陛下秉一徳臨萬方有生之類莫不浸其徳澤氛祲蔽翳偶差晦明以累聖徳葢大臣重禄而不諫小臣畏罪而不言臣獨何人敢貢狂瞽哉誠以秉愛君之心切痛陛下履仁聖之具美乏骨鯁之良輔因成不忍之忿以稽不逺之復臣是以瀝肝膽披情素為陛下廓清氛祲䝉翳之累易曰夫夫婦婦而家道正正家而天下定詩云刑于寡妻御于家邦若然則修化者莫不自内而刑外也去年十二月二府大臣晚出民間喧傳皇后被譴而入道矣又傳降為妃而離宫矣在外莫知其過失無不驚歎且皇后有罪黜則告宗廟廢則為庶人安有隂行臣下之議者乎且皇后有小過可降為妃則臣僚之婦有小過亦當廢為妾乎臣等赴中書時輔弼之臣備言皇后有妬忌之行始議入道終降為妃兼云有上封者恐皇后不利於聖躬故脩髙垣置在别館臣等備陳中外之議請復皇后位號以安民心翌日詔出乃云中宫有過掖廷具知特示含容俾自循省供給之間一切如故臣未審在别館為妃乎為后乎詔書不言安所取信皇后事陛下一紀而輔臣倉卒以降黜之議惑宸聴而臣下循黙無敢為陛下言者臣所謂氛祲蔽翳以累聖徳豈虛言哉葢臣職有曠尔夫皇后動摇有大不可者二執政之臣獨不念之内外臣僚以至戚里豈不萌覬覦之心欲進其女以希選納或事寵愛以結内援使陛下惑女色而亂紀綱紀綱一亂變故以生社稷可得安乎斯大不可者一也陛下凡舉事為萬世法茍有掖廷争寵遂行廢后則何以書史䇿而示子孫乎斯大不可者二也臣願詔皇后歸宫復其位號杜絶非間待之如初天地以正隂陽以和人神共懽豈不美哉陛下茍為邪臣所沮不行小臣之議臣恐髙宗王后之枉必見於他日宫闈不正之亂未測於將來惟陛下察之不報改開封府判官直集賢院出為兩浙淮南陜西轉運使駙馬都尉柴宗慶縱其下擾民少連即劾奏之入兼侍御史知雜事踰月為三司度支副使擢天章閣待制知廣州進龍圖閣直學士知涇州徙渭州卒年四十六少連質直自任遇事無大小决遣如流不為權勢所屈其卒也仁宗甚歎惜之蔣堂字希魯常州宜興人也舉進士為楚州團練推官嘗知臨川縣通判眉州久之知泗州召拜監察御史遷侍御史禁中火有司請究火所起多引宫人屬吏堂言陛下宜責躬脩徳以應天變豈可歸咎宫人邪殆非所以畏天譴也仁宗於是悉赦原之郭皇后廢與御史中丞孔道輔等極論不可又請對不許未幾出為江東轉運使徙河南兼發運使嵗薦部吏二百人或謂曰一有謬舉且得罪何以多為堂曰㧞十得四五亦足以報國矣坐失按舉降知越州州有鑑湖溉田八千頃前此為郡者聴民自占既而多為豪右所不便水利浸耗堂條上所不便奏復之徙蘇州入為鹽鐵副使安撫梓䕫路拜天章閣待制制置發運使知洪州應天府又知杭州遷樞密直學士知益州漢文翁石室在孔子廟中堂因廣其舎為學宫選屬官與鄉老之賢者以教諸生士人翕然稱之徙知河中府復知杭蘇二州以禮部侍郎致仕卒年七十五堂為人脩潔遇事不少屈好學工文詞延譽後進如不及尤耆作詩云彭乗字利建益州華陽人也舉進士授漢陽軍判官與同年生登相國寺閣顧望鄉闗皆有從官之樂乗獨悵然曰親老矣安敢捨晨昏之奉而圖一身之榮乎翌日奏乞侍飬以歸有薦其文行者召試除館閣校勘固辭還家用冦準薦復召試為校勘遷祕書丞集賢校理求便親得知普州舊制蜀人不許赴蜀官特恩自乗始父卒既塟甘露降墓柏上人以為孝感其後脩注闕中書擬人乗在選中仁宗曰彭乗恬退之士也遂用之及召見諭以見用之意乗對曰臣生孤逺䝉被近用已過分矣仁宗嘉之擢知制誥知開封府為翰林學士卒年六十五乗重厚寡言性純孝不喜事生産家聚書萬卷多乗手自校正然其為文少工也趙師民字周翰青州臨淄人也九嵗能為文舉進士第復還鄉里不仕孫奭薦為兖州敎授遷國子監直講崇政殿説書又遷宗正丞陜西用兵上治道十五事改天章閣待制同知宗正事除龍圖閣直學士知耀州民有盗鐵禁者師民曰鄣其利而罪之是㒺民也一切不問代還復判宗正卒年六十九師民經行淳懿然舉止疎野其為文章清麗繁縟而又詳練故事為士大夫所稱子彦若彦若字元考以父任為將作監主簿博覽善記事父孝年十八舉賢良方正召試中選射䇿不入等知千乗縣用大臣薦為祕閣校勘遷集賢校理通判淄州有縱火偽印者法當死彦若曰在律犯罪親年九十無兼養聴讞與太守解賔王議異遂獨剡奏得減死賔王慊之因訟彦若不詣郡坐謫監單州酒税踰年還館稍遷知宗正丞宗廟薦新中秋用菱萌不經易以蒲白彦若曰蒲春始生可食秋則過時不可以薦乃據引經傳改從春獻除國史院編修官修起居注元豐中召試中書舍人當草制而執政避家諱易其詞彦若奏曰臣迹雖孤而志不可奪改右諫議大夫坐侵越御史論事徙祕書監哲宗即位為龍圖閣待制知亳州移陳州召還提舉萬夀觀兼侍讀遷兵部侍郎兼實録院脩撰擢禮部尚書拜翰林學士以子累罷為寳文閣學士提舉萬夀觀紹聖初以彦若與脩神宗實録貶安逺軍節度副使澧州安置卒於貶所年六十三後與元祐黨有文集五十卷東都事略卷六十
