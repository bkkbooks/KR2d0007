body:
  text: 東都事略卷六十一宋王稱撰列傳四十四張亢字公夀濮州人也舉進士為廣安軍判官嘗通判鎮戎軍亢言元昊喜誅殺勢必難制宜為邊備又論西北攻守之計既而契丹聚兵幽涿間遂擢如京使知安肅軍亢因言敵主孱而歲歉方藉金帛之賜特懼中國見伐而為此爾決不敢動元昊反為涇原鄜延路兵馬鈐轄徙幷代都鈐轄是時夏人已破豐州圍府州方解去屯琉璃堡縱遊騎擾邊麟府閉壘不敢出亢至命開闗縱民出入時雖有禁卒數千皆畏怯無闘志乃募役卒取敢戰者得數百人使擊賊有以首級獻者亢以錦袍衣之禁卒慙始請效死亢度其可用命擊琉璃堡遂破之明年亢築建寧砦度夏人必至虎翼軍驍勇夏人所畏而萬勝軍疲怯夏人易之亢更其兩軍旗幟夏人果出争亟趨萬勝而先犯之遂大潰斬首二千餘級不踰月遂築清塞百勝中候建寧鎮川五砦而麟府之路始通亢復奏以所通特一徑請更増並邊諸柵以安河外議未下㑹契丹渝盟徙知瀛州遷果州團練使除引進使為幷州副緫管夏人與契丹戰河外范仲淹宣撫河東招討使亢知代州就緫前議増築事不閲時諸砦成蕃漢歸者數千户歲減戍卒萬人復知瀛州亢言城小而人衆請廣以東南闗為緩急備夏竦為帥惡其不附己沮止其役然卒城之如亢議時契丹遣汎使僥求諸事㳂邊皆警每遣諜者厚以金帛無吝惜亢閑處便坐有弟子行首入曰願屏人白事亢慢罵久之弟子行首曰所白幾事也亢為屏人問其事乃曰公用錢如糞土何故亢曰何與汝事曰公所與非其人如我乃可與耳公復慢罵久之弟子行首曰我非與公劇我之姊有女甚姝麗為敵騎掠去今幸於敵主日夜居帳中時相皆事之今遣人有所市公善結之敵中情偽如指掌也亢曰所市何物曰某大王納壻須紫竹鞭公所執可與也及餘所市物非一亢悉從之自是敵中動静必告時邊城多警每一挂搭所費不貲唯髙陽獨否徙知渭州領眉州防禦使轉運使奏亢擅減三郡郊賜物估直遂奪防禦使久之復防禦使遷客省使知懐州坐與鄰守㑹境上降曹州鈐轄改袐書監未幾復客省使眉州防禦使為徐州緫管卒年六十三亢輕財好施不拘小節宴犒過侈雖市易猶不能給然軍政嚴整所至有風力蕃漢多圖其像而祀之仁宗念其功特贈遂州觀察使种世衡字仲平放之兄子也以放䕃為將作監主簿嘗知武功澠池縣通判鳯州王蒙正為守蒙正章獻后婣家也所為不法嘗私於世衡世衡不從乃誘王知謙者使訟世衡而隂為之助世衡坐流竇州初知謙犯法當徒亡命㑹赦知謙乃出世衡曰汝欲倚赦我豈無赦邪即論如法知謙既為蒙正所誘世衡遂坐責久之徙汝州監徐州酒遷太子中舍簽判鄜州建築青澗城以謂其左可致河東粟其右可捍延安其北可圖銀夏換内殿崇班知城事開營田二千頃又募商賈貸以緡錢使通貨賄青澗初無水穿井百五十尺至石乃曰能屑石一畚者酬百錢居數日及泉民甚賴之為鄜延路兵馬都監遷洛苑使知環州蕃部有牛家族奴訛者崛彊未嘗出見郡官聞世衡至郡郊迎詰朝往勞其族晨興雪三尺左右曰地險不可行世衡曰吾方結諸羌以信可失期邪比至奴訛大驚曰前此未嘗有官至此公乃不我疑邪率其族拜馬前因請内屬凡邊民有過則校之射四發二中者釋其罪兩辭疑而不決者亦因射中否而與決之境内之民因多善射者臨邊數年積榖通貨撫飬士卒得其死力遷東染院使環慶路兵馬鈐轄環慶之間屬羌有明珠滅臧康奴三族最大撫之則驕不可制攻之則險不可入常為原州患其北有三川通西夏三川之間有古細腰城范仲淹宣撫陜西命世衡與知原州蔣偕共城之世衡以錢募戰士晝夜板築旬日而成乃召三酋諭之以官築此城為汝禦㓂三族既出其不意又援路以絶因而服從城既成而世衡卒年六十一世衡所至有恩信間出竒以濟幾事其在青澗也嘗遣王嵩入賊境召與之飲謂曰虜若得汝考掠求實汝不勝痛當以實告耶嵩曰誓死不言世衡曰先試之乃縛於庭而掠之數百嵩不屈世衡曰汝真可也王嵩者本青澗僧世衡察其可使誘令冠帯因出師以賊級與之白於帥府授以三班借職時元昊使其妻之兄弟寗令舅野利旺榮及剛浪凌分将左右廂兵最用事世衡使嵩齎書遺以棗及畫龜欲其早歸以離間之旺榮知見侮笑曰吾素竒种将軍今何兒女子見識度嵩别有書索之嵩佯目左右既而荅以無有旺榮乃封其信上元昊鎻嵩囚于地牢一日召入一官寺聽事廣楹皆垂斑竹箔緑衣小童立其左右嵩意元昊宫室也少頃箔中有人出詰責嵩嵩對如前乃命曳出誅之嵩大號且言曰始将軍遣嵩遺旺榮書戒不得妄泄今不幸空死不了将軍事箔中急使人追問之嵩具以對乃禠衲衣取書以入命嵩就館元昊於是始疑旺榮乃釋嵩囚而使旺榮遺邊将書送嵩還嵩既還而旺榮已報死矣世衡知謀将行因欲幷間剛浪凌又欲致祭境上作文書於版以弔多述旺榮與剛浪凌相結有意本朝悼其垂成而失其文雜紙幣伺有虜至急爇之以歸版字不可遽泯虜人得之以獻元昊剛浪凌無以自明亦得罪元昊既失二將始悟為世衡所賣遂稱臣世衡又嘗以非罪怒一蕃落將杖其背屬為之請莫能得其人杖己即奔元昊元昊甚親信之歲餘盡洞得其機事以歸衆乃知世衡用為間也羌酋有蘇息慕恩者部落最强世衡皆撫而用之嘗夜與慕恩飲出侍姬以佐之既而世衡起入内潛於隙中伺之慕恩竊與侍姬戲世衡遽出掩之慕恩慙懼請罪世衡笑曰君欲之耶即以遺之由是得其死力諸部有貳者使慕恩討之無不克及卒羌酋臨者數日青澗及環人圖其像而祀之世衡八子詁諤誼知名孫師道師中自有傳詁字大質少慕從祖放為人不事科舉父世衡欲乞䕃補官詁辤以推諸弟杜門讀書時稱小隐君世衡卒詁上其父反間羌酋之功朝廷贈世衡成州團練使以詁為天興尉神宗即位以太子中允簽書慶州判官以近臣薦易西京左藏庫副使涇原路都監知原州羌人犯塞詁禦之遂城熈寧砦於鎮戎之北又破羌人於折薑㑹以功遷左藏庫副使為兵馬鈐轄元豐中王師西伐詁知鎮戎軍熈河旋師兵十萬道境上須芻糧僚佐以他路為言詁曰王師也遽命餉之以西上閤門使知鄜州告老提舉上清太平宫卒年七十詁為人明逹樂善宗族稱孝弟諤取綏州以擅興兵繫獄詁乞納官贖罪世衡嘗以汝陽田二十頃遺其友人張問問既顯達復歸其田詁固辤不受士論美之問元祐中為給事中諤字子正以父世衡䕃補三班奉職易文資稍遷國子博士以名将子材智可任改左藏庫副使鄜延路都監知青澗城銀夏監軍司牙吏史屈子託言嵬名山來報内附諤即上聞不俟報募可使者間道通蠟書於嵬名山與屈子定計領所部期日㑹于銀州諤起所部蕃漢兵㑹于懐逺砦移折繼世赴銀夏應接長驅入綏州夜度大理水駐師離思曲厥明屈子及諸酋長脋嵬名山開門迎納折繼世亦領兵㑹于師招納酋長三百户萬五千口四萬五千勝兵萬孳畜十二萬五千遂築綏州城言者交論諤擅興生事下吏貶秩四等安置隨州命韓琦廢綏州琦請因而留之乃以為綏徳城韓絳宣撫陜西召諤與計事除鄜延路都監知青澗城遷皇城副使為鈐轄折繼世首議修囉兀城絳命諤節制麟府委以便宜招納築囉兀二十九日而成分兵守之諤還軍綏徳夏人急攻囉兀㑹慶州軍叛詔罷西師棄囉兀城諤責汝州團練副使安置潭州再貶賀州别駕移單州又移華州閲三嵗韓絳訟諤前功復禮賔副使知岷州董氊将鬼章聚兵于洮岷諤以輕兵襲擊于鐵城加引進副使李憲措置熈河邊事分兵為七軍諤将左軍自岷州出塞收洮州遷東上閣門使文州刺史移知涇州徙鄜延路副都緫管諤上言秉常為其母梁氏所囚兵事尚神可急因本路九将兵裹糧𢷬其巢穴諤入對大言曰夏國無人秉常孺子臣請持臂而來耳神宗壮之乃以諤為鄜延路經略安撫副使諸将悉聽諤節制軍次綏徳城遣諸将出塞朝廷罪諤輕出命還師延安令聽王中正節制夏人聚兵于夏州諤自綏徳城出塞至米脂城夏人堅守三日未下賊以八萬衆來援諤大敗之㨗書聞神宗大喜遣使撫諭曰昨以卿急於滅賊恐或妄進為一方憂欲俾王中正節制進止今乃能功先諸路朕甚嘉之自今可不受中正節制諤以千人守米脂進銀石夏州盡横山之地不見虜㑹詔班師乃還遷鳯州團練使龍神衛四廂都指揮使諤言賊巢雖未覆滅若據有横山則興靈将無所恃以為食河南之地可不戰自屈遣子朴上其䇿㑹朝廷復欲進城横山遣徐禧李舜舉至鄜延計議邊事諤入對言曰横山亘袤千里沃壤寳稼人物勁悍善戰多馬且有鹽鐵之利夏人恃以為生其城壘皆據險隘足以守禦興功當自銀州始其次遷宥州於烏延又其次修夏州三郡鼎峙則横山之地已囊括其中又其次修鹽州以據兩地之利如此則横山彊兵戰馬山澤之利盡歸中國其勢居髙俯視興靈可以直覆巢穴又其次修折薑㑹以盡横山之地㑹禧先至延州奏乞趣諤還諤在道禧己與沈括定議進城山界多與諤始謀異乃奏留諤居守延州言者論諤前者進兵出塞不由西路保安直趣興靈而迂路出綏徳老師費糧降文州刺史始諤本意身任統帥謂成功在己而為禧括所外既而賊圍永樂諤以守延為名據城觀望永樂遂陷神宗就除諤知延州卒年五十七諤殘忍好殺士卒有犯者立而劈之敵亦畏其敢戰故數有功自熈寧初諤首興邊事再討西夏皆諤始謀卒致永樂之敗云子朴為将亦有聲以功遷至皇城使知洮州蕃賊叛朴提援兵素隊以往賊出不意血戰良久賊益兵朴戰沒誼字夀翁倜儻有氣節少力學舉進士於六經百氏略通其意熈寧初兄詁召對因問其世家以誼為三班奉職從髙遵裕收復洮岷疊宕遷左班殿直山後羌叛誼率兵討平之遷内殿崇班久之為熈河路第七部将諸道進兵討靈武以誼副左軍師還遷西京左藏庫副使明年奉使青唐青唐遣鬼章候誼境上鬼章取道回逺欲以地廣夸使者誼習知山川因語之曰爾跳梁涔蹄間謂我不知爾國逺近耶命趣便道鬼章慙怒以兵脅之誼辭氣不動卒從便道與俱使還為熈河路兵馬都監元祐初知岷州鬼章青宜結久為熈河邊患遂合從為寇誼破之俘鬼章青宜結以獻遷西上閣門使徙知廓州夏人将犯延安帥趙卨以誼統制諸将賊聞誼至皆潰鄜延人謂得誼勝彊兵二十萬為熈河蘭岷路鈐轄知蘭州蘭與通逺皆絶塞中間堡鄣不相接質孤麻子川田美宜稼皆棄不耕誼請城納迷堡李諾大栁平結珠龍扼其要害募民耕植以省饋運於是城李諾平凡二十四日而成賜名定逺遷東上閤門使明年進保州團練使紹聖初再知蘭州卒年五十五誼蒞軍嚴肅令一下雖死不敢避遇敵度不可勝不出出輙取勝為政務先去惡雖戎馬間所至興學禮儒士所得任子恩先及其兄弟之子云臣稱曰用兵非戰勝克復之難而飬民勞來安集之難譬之疾病之人以藥石攻病人人能之至於節起居飲食愛護元氣使根本牢固精神强明則類多不能故用兵如用藥飬民如飬元氣世衡繼世為将號有智識所謂能以藥而攻病者至於愛護元氣以圖飬民之方豈能盡知之哉劉滬字子濬保州保塞人也父文質連州刺史文質十六子渙滬有聞渙字仲章以父任為将作監主簿監并州倉天聖中章獻明肅皇后同聽政渙謂天子年加長乃慨然上書請太后還政章獻震怒議黥面配白州吕夷簡薛奎力救之得免章獻崩擢渙為右正言郭后廢渙與孔道輔范仲淹等伏閣請對坐贖金以累出為通判磁州徙知遼州元昊入㓂渙誓以死捍邊加直史館元昊納欵以功遷陜西轉運使積官至工部郎中知滄州換吉州刺史知保州徙登州遷單州團練使知兾州為秦鳯路緫管擊羌有功遷憲州防禦使累加鎮寧軍留後知澶州以工部尚書致仕渙有才氣遇事敢為鋭於進取及致仕久頗恨悔卒年八十一滬頗知書傳深沉寡言有智略少以父任為三班奉職稍遷右侍禁韓琦范仲淹薦其材武擢閤門祇候嘗為瓦亭砦監押權靖邊砦破穆寧生氐西南去略陽二百里中有城曰水洛川地平土沃有水銀銀銅之利環城族帳多聚漢民之逋逃者自曹瑋在秦州時嘗經營久之不能得滬密使説其城主鐸厮那令内附㑹四路招討使鄭戩行邊滬遂召鐸厮那及戎落尊屬來獻結公水洛露羅甘地乞冠帶為屬户戩許之因令滬以兵往受地既而氐情中變滬深入無援獨以千人擊潰氐兵數萬其酋請服因盡驅𨽻麾下通秦渭路遷内殿崇班戩以牙兵遣著作佐郎董士廉助築涇原帥尹洙檄令罷役不從益増校趣役召之屢亦不至洙令狄青械滬及士廉付獄戩雖已罷四路而論奏不已朝廷遣使往視之乃復以滬訖役而任以城事既成猶坐違帥臣命降一官頃之又以為鎮戎軍西路廵檢復内殿崇班首發瘍卒水洛居人留葬而立廟城隅歲時祀之東都事略卷六十一
