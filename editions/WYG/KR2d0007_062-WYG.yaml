body:
  text: 東都事略卷六十二宋王稱撰列傳四十五王徳用字元輔超之子也超有傳始超為懐州防禦使補徳用為牙内都指揮使超率兵六萬伐李繼遷出綏夏徳用時年十七從為先鋒破賊于鐵門闗進師烏白池他将失道超不進徳用以精兵五千轉戰三日賊遂郤乃領衆要其歸路距夏州五十里下令曰敢亂行者斬一軍肅然超亦為之按轡繼遷引避之以功授内殿崇班徳用以将家子宿衛真宗為内殿直殿前左班都虞候捧日左廂指揮使累遷英州團練使仁宗即位改博州團練使知廣信軍徙兾州積官至步軍副都指揮使桂福二州觀察使是時章獻后猶臨朝有詔補一軍吏徳用曰補吏軍政也吏敢挾詔書以干吾軍執不與章獻固欲與之徳用固不與章獻崩有司請衛士坐甲者徳用以為故事無有為太后䘮坐甲又不奉詔明道二年拜簽書樞密院事遂為副使明年以奉國軍留後同知院事又明年領安徳軍節度使又明年加宣徽南院使寳元二年罷為武寧軍節度使初翰林學士蘇紳嘗疏徳用宅枕乾岡貌類藝祖者既而御史中丞孔道輔又以紳之言劾奏之降左千牛衛上将軍知隨州徳用疏言宅枕乾岡陛下所賜貌類藝祖父母所生既貶黜士皆為之懼徳用舉止言色如平時惟不接賓客而已久之徙知曹州而孔道輔卒客有謂徳用曰此害公者也徳用愀然曰孔公以職言事豈害我者可惜朝廷亡一直臣於是言者甚愧復保静軍留後知青州未行而契丹聚兵境上乃拜徳用保静軍節度使知澶州契丹使其臣劉六符來聘徳用迓之六符曰比歲大熟非仁政所及邪徳用曰明天子在上豐年乃其常爾時契丹來求闗南故地詔徳用㑹議二府徳用入奏言臣愚無状願陛下假臣二十萬兵得先士卒以當匈奴臣不勝大願仁宗不許徳用曰陛下即不忍勞民姑以金繒啗之以全舊好卒如其言復宣徽南院使判成徳軍徙判定州又徙陳孟二州召還復判相州拜同中書門下平章事判澶州徙鄭州封祁國公還為㑹靈觀使己而復判鄭州徙澶州改鎮集慶封兾國公以太子太師致仕復起為河陽三城節度使同平章事判鄭州皇祐六年拜樞密使徙封魯是時仁宗以富弼為宰相是歲契丹使者來徳用與之射使者曰天子以公典樞密而用富公為相得人矣仁宗聞之賜徳用弓一矢五十嘉祐元年復請老為景靈宫使徙鎮忠武卒年七十八贈太尉中書令諡曰武恭徳用善射軍政明而士心附所至有威名居家約易不事娱燕祿賜多周施諸族云夏守贇字子美并州榆次人也父遇以軍校死王事守贇幼孤真宗在襄邸憐之及即位授右侍禁遷供奉官真宗幸大名康保裔與賊戰没其部下畏誅誣其降賊令守贇往察之乃變服入軍中得其實盖保裔送客卒與敵遇援兵不至而死真宗因恤其家守贇事真宗官至保信軍留後仁宗即位歴步軍馬軍殿前都指揮使拜建武軍節度使歴鎮鎮東保大定國鎮海召拜同知樞密院事劉平石元孫敗内侍黄徳和誣告平等降賊守贇力辨其枉引康保裔事以為質既而徳和果以辨詐服罪未幾自請討賊遂換宣徽南院使陜西經略安撫招討使守贇性怯寡謀士卒不附乃駐軍河中又屯鄜州朝廷以其子隨為招討副使而以守贇知樞密院事隨道卒守贇丐罷除天平軍節度使判澶州以疾徙相州明年判瀛州卒年六十六贈太尉諡曰忠僖子隨隨字君正始以父任補殿直累遷邠州團練使進秦州防禦使元昊反為鄜延路緫管元昊為書及錦袍銀帶投境上以遺金明李士彬且約以叛候人得之諸将皆疑士彬隨獨曰此行間爾乃召與飲厚撫而遣之士彬感泣而去守贇位右府除耀州觀察使知亳州又知河中府為陜西㳂邊招討副使時隨已病或勸湏疾愈乃行隨曰邊事方急而可以疾辭乎次陜州而卒年四十三贈昭信軍節度使諡曰荘恪郭承祐開封人也娶華王元偁女授供奉官稍遷至衛州防禦使知澶州入為龍神衛四廂都指揮使真定府定州等路副都緫管諫官歐陽脩余靖言其非才改知相州明年為相州觀察使步軍都指揮使出為澶州都緫管拜建武軍節度使殿前都指揮使除宣徽南院使出判應天府徙亳州諫官御史劾奏承祐在應天擅留上供米及擬翰林所用器出入狂僭落宣徽使徙知許州轉運使蘇舜元薦其有将帥材其政如龔黄仁宗謂大臣曰承祐庸人而外臺薦之如此何所取信哉改知鄭州未行卒年五十九贈太尉諡曰密承祐性驕侈狡獪所至多興作為煩擾又好言事指切人過失時謂之武諫官云許懐徳開封祥符人也其父均仕至磁州團練使懐徳長六尺餘少以父任為東西班殿侍累遷殿前副指揮使寳元初陜西用兵懐徳為鄜延路副緫管賊以三萬騎圍永平砦懐徳止率勁兵千餘人突圍破之己而賊有出陳前據鞍慢罵者懐徳引弓射之應弦而斃未幾賊攻延州懐徳領兵間道出其不意左右奮擊賊遂解去遷鳯州團練使以賊破塞門砦不赴援降寧州刺史除龍神衛四廂都指揮使累遷武信軍留後殿前副都指揮使拜寧逺軍節度使坐冒認從妹别産出知亳州徙徐州復為殿前都指揮使歴鎮保寧建雄懐徳宿衛十四年數以老乞身復自言臣年至矣不爾為御史所彈不得善罷仁宗不許懐徳雖老習軍旅之事然戰功所可見者一二特以遭時承平故安坐以保寵祿故事節度使移鎮加恩皆再表辭懐徳既加恩又移鎮共為表謝翰林學士歐陽脩以為慢朝廷詔以脩章示懐徳懐徳雖悚息謝罪而終不復進表仁宗亦不加責也卒年八十四贈侍中諡曰榮毅狄青字漢臣汾州西河人也家世為農青年十六時其兄素與里人號鐵羅漢者闘於水濱至溺殺之保伍方縛素青適餉田見之曰殺羅漢者我也人皆釋素而縛青青曰我不逃死然待我救羅漢庶幾復活若決死者縛我未晚也衆從之青黙祝曰我若貴羅漢當蘇乃舉其尸出水數斗而活人咸異之初為騎馬小底後𨽻拱聖軍選為散直元昊叛擇衛士徙邊以青為延州指使青勇於臨敵嘗為先鋒前後二十五戰中流矢者八每戰飾以銅面具敵人望之如神嘗破金湯城略宥州屠􅀈咩嵗毛奴尚羅等族燔積聚數萬收族帳二千二百生口五千七百又城橋子谷築長安保砦以功遷至泰州刺史涇原路緫管仁宗聞其在陜西數戰勝欲召見問其方略㑹敵人平原仁宗命圖形以進及元昊稱臣西鄙休兵入為捧日天武四廂都指揮使惠州團練使歴步軍殿前都虞候宥州防禦使馬步軍副都指揮使拜彰徳軍節度使知延州皇祐四年擢樞密副使廣源州蠻儂智髙反智髙蠻商之子其母阿儂左江武勒之族轉至交趾適儻猶州知州儂全福無子全福為交趾所虜阿儂改適蠻商生智髙長遂殺其父阿儂又為特磨道儂夏卿之妻智髙聚兵入㓂初陷邕州遂僭稱南天國號仁惠皇帝稱其母阿儂為皇太后建元啓歴阿儂凶悍有謀耆小兒肉間以具庖食智髙用其計遂自邕攻横貴龔封藤梧端康州所至驅劫軍民衆至數萬乃進圍廣州朝廷以孫沔余靖為安撫使久未奏功仁宗以南方為憂青慨然請行且言臣起行伍非戰伐無以報國願得蕃落騎兵數百益以禁卒當羇賊首至闕下仁宗壮其言遂除宣徽南院使宣撫荆湖南北經制廣南盜賊事青至合沔靖之兵自桂林次賔州召廣西鈐轄陳曉按其遇賊不戰之罪幷殿直袁用等三十一人悉誅之軍士震恐遂下令止具十日糧明日絶崑崙闗出歸仁鋪先布陳成列而賊以覘者之誤來獨後遂失險乃悉衆逆戰前鋒孫節戰死山下而賊勢方鋭青躬執白旗麾騎兵出其不意賊衆大潰斬首二千二百級獲偽官五十七人智髙夜縱火焚城而遁詰朝青入按城中獲金帛鉅萬牛馬數千築京觀城之北隅招復俘脅者七千二百使還其家初所獲有衣繢金龍者衆謂為智髙青曰安知其非詐邪吾寧失智髙朝廷不可誣也智髙既遁奔大理國其母阿儂濳歸特磨道依其夫儂夏卿收殘衆得三千餘人復将入㓂有石鑑者世居邕州諜知其動息遣峒丁入特磨道掩襲擒阿儂及智髙一弟二子並檻送京師阿儂年六十朝廷始欲存之以俟智髙之降及智髙已為大理國所殺故悉刲戮都市青還朝復為樞密副使遂拜樞密使在樞府四年言者謂青家數有光怪以護國軍節度使同平章事知陳州未幾而卒年五十贈中書諡曰武襄青為人恭密寡言其計事必審中機㑹而後發行師正部伍明功罪雖敵在前士卒無敢後先者故所向有功韓琦范仲淹特器遇之又與尹洙善嘗從洙議兵洙以謂有古良将才後洙以貶死青懐知己常周恤其家熈寧元年神宗思青勲烈自為文遣使祭之臣稱曰為将之道有三曰智曰威曰權夫智與威係乎將之所能而權者出乎君之所任有所能之威智而無所任之權則智不足以使人而威不足以服衆又何足以任天下之事者哉盖有智矣必俟乎權可以施其智有威矣亦必俟乎權可以奮其威觀狄青之討智髙也可謂能施其智而奮其威以取勝於當世者矣然青之所以能若是者由仁宗専任而責成之也是得君之權者也使不得君之權以便其事則安可以有功烏虖為将而具三者則可以為名将矣張孜開封人也初名茂實字濟叔避英宗藩邸名改焉父景以宦者事真宗孜以父任為三班奉職仁宗為皇太子以孜給事春坊轉殿直仁宗即位為閤門祇候累遷供備庫副使領恩州團練使真定路鈐轄知莫貝瀛三州轉運使張昷之奏罷兾貝驍㨗軍士上闗銀鞵錢事下孜議孜言此乃界河䇿先鋒者緩急以為先登不可絶其常賜朝廷亦以為然昷之猶執不已遂奏罷保州雲翼銀鞵錢而軍人皆怨殺官吏據城以反慶歴中復知貝州契丹渝平朝廷以富弼使北而孜副之卒復舊好而還以勞遷西上閤門使知瀛州拜單州團練使龍神衛四廂都指揮使并代緫管自兵興河東用鐵錢盜鑄者其法弊壊乃更三當一軍中所用不足相率叩府閉門不納幾亂矣孜獨䇿馬從數卒往喻之皆散去遷濟州防禦使又遷桂州觀察使為侍衛步軍副都指揮使遷昭信軍留後馬軍副都指揮使召還或叩孜馬首為不順語執以聞事下有司叩馬者實病心事既明猶以言者故罷兵柄除寧逺軍節度使出知潞州移知陳州復為馬軍副都指揮使徙鎮集慶又坐販易公使而所使卒殺人罷知曹州卒年六十七贈太尉諡曰勤惠郭逵字仲通本邢州人也父斌徙家于雒逵少以父任為殿侍𨽻范仲淹麾下善騎射倜儻有氣節遷右侍禁為真定府監押保州雲翼軍亂擁兵馬都監韋貴據城叛兵馬監押侍其臻為賊所留李昭亮討之不能下因遣逵逵故與臻同侍仲淹徑至城下取紫佩囊示之臻曰是非昔事范公物邪臻與貴即再拜曰願君登城相見逵登城徑入開諭禍福既而臻貴悔欲害逵衆蔽之得免臻貴自剄衆遂降以功遷閤門祇候知鎮武軍秦鳯路通古渭州逵受詔赴援三戰三勝遂拔其城副吴奎使契丹㑹其主受尊號逵與奎入觀使還黜為汾州都監五谿蠻彭仕羲叛以逵知澧州大破仕羲于桃花州遷禮賓使知邵州武岡蠻反逵討平之知廣信軍遷六宅使累遷容州觀察使仁宗山陵以逵掌宿衛遷殿前都虞候出為涇原路副都緫管遂拜同僉書樞密院事未幾以僉書出為陜西宣撫使神宗即位遷静難軍留後除宣徽南院使判鄆州至鄆七日徙帥延州時种諤誘夏國首領嵬名山降遂取鄆州朝廷以諤擅興生事欲棄之逵謂棄綏州則示弱於夷狄矣諒祚死夏人來請綏州逵言不可許未幾夏人以重兵㓂邊逵使人諭之即遁去改雄武軍留後夏人襲慶州逵遣将破之于金湯韓絳宣撫陜西用种諤言将取横山逵曰諤狂生也朝廷以家世用之過矣他日敗國事必此人也於是與絳議不叶絳奏逵沮軍召還朝慶州兵亂闗中騷然乃命逵知永興軍至則徹守備而人情乃安徙知秦州王韶開熈河逵按其不法遂徙知渭州朝廷遣蔡確鞫之謂逵誣罔落宣徽使知潞州未幾知太原府復宣徽使交趾李乾徳䧟邕亷州詔逵討之神宗問所以平交趾者逵曰兵難隃度願馳至邕管上方略遂復邕州師進次富良江又破之獲賊将洪真太子者於是乾徳降而逵以重兵壓富良江與交人止一水之隔逵逗遛不進坐責左衛将軍西涼安置復左屯衛大将軍致仕起知潞州未幾復廣州觀察使知河中府請老拜左衛上将軍卒年六十七贈雄武軍節度使東都事略卷六十二
