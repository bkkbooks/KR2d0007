body:
  text: 東都事略卷六十六宋王稱撰列傳四十九陳執中字昭譽恕之子也恕有傳執中始以父任為祕書省正字屢進文真宗稱善真宗不豫大臣無敢及建儲執中上言太子天下本不可不早定擢右正言坐公累出監岳州酒税遷殿中丞復為右正言為樞密使曹利用所不喜出知漢陽軍除三司鹽鐵判官俄知諫院兼侍御史知雜事以天章閣待制知應天府除龍圖閣直學士知永興軍寳元元年拜右諫議大夫同知樞密院事康定元年罷知青州未幾以資政殿學士為陜西同經略安撫招討使與夏竦同知永興軍而議事多不合徙知涇州慶歴初以工部侍郎復知青州執中率民錢築諸城有詔止之執中格詔卒城之沂州卒王淪叛入青州境執中遣廵檢使傅永吉窮追歴楚泗真揚入蘄黄永吉直至采石磯擒殺之四年召拜參知政事諫官孫甫蔡襄言執中剛愎不才不可任以政仁宗不聼遣中使齎敕告即青州授之且諭意曰朕用卿舉朝以為不可朕不惑人言也明日甫襄又以為言仁宗曰朕已召之矣是時章得象杜衍為相賈昌朝與執中參知政事毎議事執中多與之異甫襄言既不用因求去事下中書甫本衍所舉用而二人者俱有名望於是中書奏乞留二人仁宗頷之衍退朝即召吏出劄子令甫襄供職執中曰向者上無明旨當復奏吏還白衍衍取劄子焚之執中遂言衍黨二人茍欲在諫職以擅權及臣覺其情乃取劄子焚之明日衍左遷出知兖州甫襄亦罷頃之得象免相昌朝與執中同相拜同中書門下平章事集賢殿大學士兼樞密使昌朝免相執中拜昭文館大學士監修國史皇祐初以疾求罷進兵部尚書觀文殿大學士知陳州久之為集慶軍節度使同中書門下平章事判大名府五年以吏部尚書復拜同中書門下平章事昭文館大學士執中當國人不敢干以私四方問遺無及門者㑹張貴妃薨治喪皇儀殿追冊皇后禮官以非禮迎上意仁宗嘗詢執中而不能考正典禮以對悉奉行之深為時論不與執中嬖妾張氏滛悍不可制嘗以過笞小婢出外舍死御史趙抃劾奏其事翰林學士歐陽脩亦論列于朝至和二年罷為鎮海軍節度使同平章事判亳州還上節鉞改右僕射觀文殿大學士封黄國公徙河南曹州過京師以疾賜告就第加司徒岐國公致仕卒年七十贈太師兼侍中有司諡曰榮靈又諡曰恭襄詔諡曰恭子世儒世儒母即張氏也執中卒張氏為尼世儒既長迎歸與妻李事之不謹世儒宰相子庸騃久居京師元豐閒為太湖縣不樂為外官與李諷諸婢謀殺張欲以憂去諸婢以藥毒之不死夜持釘陷其腦骨以喪歸為婢所告送大理寺推治而李辭屢變凡三易獄始得實世儒并妻等十人並處死龎籍字醇之單州武城人也父格國子博士籍舉進士為杭州司理參軍開封府兵法曹參軍改大理寺丞累擢殿中侍御史章獻皇后崩章惠皇后欲踵之臨朝籍下閣門取垂簾儀制盡燔之以沮其謀有欲造後苑珠玉竒巧物媚上者籍言螟蟲為災民憂轉徙復有西北擾攘之患茍非儉約何以濟用仁宗嘉納之為開封府判官尚美人遣内侍韓從禮稱教旨免工人市籍者籍又言祖宗以來未有美人敢稱教旨干撓政府者仁宗為杖從禮仍詔諸司自今宫中傳命無得施行范諷喜放曠不遵禮法籍屢奏其状㑹籍除廣南水路轉運使将行復言之諷既坐貶鄂州司馬籍亦降知臨江軍徙福建路轉運使召為侍御史知雜事擢天章閣待制元昊叛命籍安撫陜西出知汝州徙同州就改陜西都轉運使遷龍圖閣直學士知延州自五龍川之敗戎落民居焚毁幾盡戍兵十餘萬未有營壁籍按金明西北有渾州川土平沃川尾曰橋子谷即敵出入之隘道也命狄青将萬人築招安砦於谷旁募民耕墾得粟甚多凡故地為敵所據者悉逐之築土城久之元昊遣牙校李文貴齎其親信野利旺榮書求納欵籍意其詐不受後數日果㓂定川既而文貴復以旺榮書來元昊未肯削去僭號籍未敢荅乃請於朝仁宗曰朕非不能以天下力誅此小戎然朕為天下主豈與犬戎較曲直哉其務安吾民因使籍荅書稱旺榮為太尉籍復請曰太尉天子上公使旺榮稱之則元昊不可得臣矣其書自稱寧令或謨寧令皆敵中官於義無嫌詔從之又遣賀從勗來改名曰曩霄稱男不稱臣籍使謂之曰天子至尊荆王叔父也猶奉表稱臣今名體未正不敢以聞從勗曰子事父猶臣事君也若從勗得至京師而天子不許請更歸議之籍乃言敵辨理浸順願聴其使至仍遣使同往申諭之卒用其䇿而元昊復臣慶歴四年召拜樞密副使籍請併省官屬徙兵就食於是邊費什省七八八年為參知政事明年以工部侍郎為樞密使籍言近世飬兵務多而不精請與中書議簡汰之法仁宗疑焉籍曰儻有一夫之呼臣請以百口償之卒省兵八萬人皇祐三年拜同中書門下平章事昭文館大學士儂智髙叛命樞密副使狄青為宣撫使或言青不可專任仁宗以問籍籍曰青起行伍若以文臣副之則號令不專不如不遣也仁宗然之及㨗書至仁宗謂籍曰非卿執議豈能成功青還仁宗欲以為樞密使同平章事籍不可曰昔太祖時慕容延釗将兵兵不血刃一舉得荆湖之地不過遷官而已曹彬平江南太祖謂之曰朕欲以卿為使相然今外敵甚多卿為使相安肯為朕盡死力邪亦不過賜錢二億而已今青雖有功方之延釗與彬未可同日而語也若遂用青為樞密使同平章事則富貴極矣異日復有㓂盜青更立功将以何官與之争之累日仁宗乃許之既而内外訟青功卒以為樞密使㑹道士趙清貺與籍有連受人貺許為人求官籍聞之捕下開封府治其姦而流之清貺道死而諫官韓絳謂籍隂諷府殺清貺以滅口乃罷相以户部侍郎知鄆州尋加觀文殿大學士除昭徳軍節度使知并州嘉祐元年仁宗不豫籍上言比者陛下皇子繼夭宫坊虚位立嗣之義禮有明文願陛下深思祖宗統緒之重歴選宗室宜為嗣者速決聖志制命一出則羣心大安奉承宗廟之孝無大於此臣荷陛下寵靈致位将相年埀七十逼於休退固無他望惟陛下保萬世之業乃老臣之大願麟州自慶歴以來敵盜耕屈野河西地莫能禁籍因戒邊民無得與敵為市易㑹通判司馬光行邊還乃言知麟州鄭戡等欲築二堡於白草平以為州扞蔽籍許之既而敵移書至請分定疆界麟府将郭恩輕敵出至忽里堆遇伏發㤙死之命御史按其事籍坐不以築堡事聞復以為觀文殿大學士户部侍郎知青州徙鄭州請老以太子太保致仕卒年七十六贈司空兼侍中諡曰荘敏籍曉法令長於吏事治民有惠愛特於治軍甚嚴士卒聳畏之梁適字仲賢顥之子也顥有傳適少孤輯顥制誥并自為文以獻真宗曰梁顥有子矣授秘書省正字舉進士改太子中允知淮陽軍南郊赦書録梁後適論奏曰朱全忠唐之賊不可以為勸仁宗是其言召為審刑院詳議官梓州有妖人依鬼神以詛殺人獄具以不傷讞適曰殺人以刃或可拒而詛可拒乎是甚於刃也卒以死論有異鳥翔端門或以為瑞適奏曰野鳥來處宫庭不祥也非瑞也常上殿奏使臣何次公案仁宗曰次公似是漢時人字適對曰蓋寛饒黄霸皆字次公仁宗悦謂宰相曰梁適候諫官闕命之未幾遂除右正言供諫職以與執政親嫌改直史館修起居注復知諫院擢知制誥知開封府以請知兖州遷龍圖閣直學士知河陽又遷樞密直學士知定州入為翰林學士尋改侍讀學士知澶州移秦州召還為羣牧使皇祐初擢左諫議大夫樞密副使張堯佐一日除四使諫官御史力争不已適曰堯佐領四使誠過矣乃罷其宣徽景靈二使儂智髙圍廣州官軍數戰不利仁宗欲降之㑹得賊将偽牓言智髙欲得邕桂七州節度使者適曰若爾二廣非朝廷有矣乃命狄青為宣撫使及賊平仁宗喜曰向非適言南方安危未可知也拜給事中參知政事契丹遣使來言國書稱大契丹非兄弟之義欲自今易稱南北朝適曰宋之為宋受之於天不可改也契丹亦其國名自古豈有無名之國哉遂止進禮部侍郎同中書門下平章事集賢殿大學士張貴妃小斂皇儀殿適不可曰皇儀非所以治妃喪又将以適為園陵使適又不可曰嬪御無園陵之制由是與陳執中不合而御史馬遵彈適貪黷怙權不宜使久居重位乃罷知鄭州加觀文殿大學士知秦州適兩知秦州蕃户不敢為㓂秦人為立生祠徙立永興軍拜定國軍節度使知并州改鎮忠武知河陽英宗即位徙鎮昭徳歴曹兖二州復為觀文殿大學士禮部尚書以太子太保致仕神宗即位遷太子太傅卒年七十贈司空兼侍中諡曰荘肅適既卒慈聖光獻皇后有旨飯僧資薦神宗問曰豈以梁適為仁宗舊相耶慈聖曰微梁適吾安有今日神宗問其故慈聖曰仁宗一日對宰相言朕居宫中左右前後皆皇后之黨陳執中請付外施行適進曰閭巷之人今日出一妻明日又出一妻猶為不可况天子乎執中之言非是仁宗不語久之曰梁適忠言也適有風采為人主所器明于法令臨事果敢辭氣不變所下教條嚴而難犯云其孫子美子美字才甫由䕃入官紹聖初為梓州路常平徙湖南路遷提㸃刑獄徽宗立為河北轉運使子美傾漕計以奉上遂以三百萬緡市北珠以進北珠者自敵中來敵始欲禁罷之其羣下議曰中國傾府庫以市無用之物此為我利而中國可以困之崇寧閒諸路漕臣進羨餘自子美始除樞密直學士拜户部尚書兼開封尹子美於府事無大小皆親決胥吏不得騁乃共謀取未絶文書委於路而遁子美命焚之徽宗問其故子美對曰事之大者不患不訴小者不治而已徽宗然之拜尚書右丞進左丞遷中書侍郎以資政殿學士知定州移大名府進大學士坐累責居單州起知青州復守魏進觀文殿學士拜寧逺軍節度使以疾乞罷除開府儀同三司提舉崇福宫未幾致仕卒年七十八贈少師子美為郡縱侈殘虐然有幹才所至辦治云劉沆字沖之吉州永新人也曽祖景洪事楊行密為江西牙将有彭玗者稱太守脅景洪附湖南偽許之復以州歸行密遂不仕祖照父素以財雄鄉里初景洪曰我不從彭玗當活萬餘人後必有隆者因名所居山曰後隆山山有唐牛僧孺讀書堂故基即其上築臺曰聦明臺沆母夢牛相公來而生沆沆倜儻任氣以進士起家為大理評事通判舒州稍遷太常丞直集賢院出知衡州有大姓尹氏為偽劵以欺隣人之孤訟久不得直沆至其孤纔二十詰尹氏曰若劵曽取證他隣否其人當有存者尹氏詘服而歸其田同修起居注擢右正言知制誥陜西用兵沆見執政白事翌日請對極言得失仁宗送其議於中書執政不悦曰須舍人作相自行之沆曰宰相豈有常哉時來則為之奉使契丹其館伴杜防强之以酒沆不能飲因詆毁杜防坐是降知和州改知江寧府除龍圖閣直學士知潭州有草冦黄捉鬼鄧和尚誘溪洞傜人擾湖湘北軍至多病死沆募土兵使保地分賊稍困乃令提㸃刑獄楊畋等八路入討斬首萬餘級遂頓兵開一路榜曰賊由此路出降敢殺者與擅殺同於是降者三四萬人賊平召還而餘黨復叛殺禆将降知鄂州其後以龍圖閣學士知開封府有張彦方受富民金偽為張貴妃母越國太夫人奏補助教敕沆抵彦方死不問越國皇祐三年以工部侍郎擢參知政事諫官御史論沆縁貴妃進不可仁宗不聼至和初貴妃薨追冊為皇后沆為監護使改園陵使遂拜同中書門下平章事集賢殿大學士明年文彦博富弼入相沆加兵部侍郎監修國史沆在相位疾言者屢加裁抑又舉行御史遷次之格滿二嵗者與郡范師道趙抃嵗滿求去沆引敕出之御史中丞張昪等言沆挾私出御史遂以觀文殿大學士工部尚書知應天府遷刑部尚書徙陳州卒年六十六贈侍中沆始挾貴妃進至相方其主喪事時又務為侈大之制論者疾之元豐三年王堯臣之子同老上書言其父當仁宗不豫之際嘗與沆文彦博富弼定議乞立皇子神宗以訪彦博彦博具奏所以乃贈沆太師兖國公語在彦博傳子瑾神宗時為天章閣待制東都事略卷六十六
