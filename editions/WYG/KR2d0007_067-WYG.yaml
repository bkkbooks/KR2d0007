body:
  text: 東都事略卷六十七宋王稱撰列傳五十文彦博字寛夫汾州介休人也少舉進士為大理評事知翼城榆次二縣改太常博士通判兖州入為監察御史遷殿中侍御史西鄙用兵有臨陳先退望敵不進者置獄隣郡而推劾枝蔓久不即誅彦博上疏曰将權不可不專軍法不可不峻兵法曰畏我者不畏敵畏敵者不畏我使之畏我然非嚴刑何以濟之乎對敵而有伍不進者伍長殺之伍長不進什長殺之以什伍之長尚得專殺統帥之重乃不能誅一小校則軍中之令可謂隳矣議者以今冦非大敵師未深入将校有犯宜從中覆夫冦非大敵兵未深入尚臨戰先退儻遇大敵孰肯奮邪穰苴之戮荘賈非大敵也止於㑹軍而後期耳孫武之斬隊長非深入也止於習戰而非笑耳終於齊師勝晋吴人入郢委任專而法素行也國朝著令禁軍将校有過而從中覆當施之於平居無事之時今邊防用兵逾數十萬将不專權軍不峻法何以禦之哉仁宗然之明年以户部員外郎直史館為河東轉運使麟府二州皆在河外因山為城最險固始彦博父洎為轉運使以餉道囘逺軍食不足乃按唐張説嘗領并州兵萬人出合河闗掩撃党項於銀城北為河外直道自折徳扆世有府谷即大河通保徳以便府人故河闗路廢而弗治将奏復之未及而卒彦博領漕事遂通銀城而州有積粟可守元昊圍麟州知城中有備解圍而去未幾遷天章閣待制為都轉運使元昊復冦邊以彦博為龍圖閣直學士知秦州守邊二年有威名敵不敢犯改樞密直學士知益州彦博以本道兵馬久不習戰為立訓練之法又以益彭邛蜀漢五州非用馬地州屯二千餘騎悉易以步軍慶歴七年以右諫議大夫樞密副使召還改參知政事貝州宣毅十将王則挾妖術與州校張巒卜吉謀反改年號置官屬河北諸路遣兵傅城下命明鎬為安撫使師久未克彦博請行乃命為宣撫使以鎬副之至則督将攻城旬餘未下諜言賊欲潜兵出邀敵使輜重鎬先遣殿侍袁安設伏敗之軍士有請為穴地以入貝州官軍即城南為穴因自攻其北以牽制之彦博募死士二百銜枚由穴進既出登城殺守陴者則縱火牛軍稍却有以槍中牛鼻者牛還攻之遂大潰城破生擒則檻送京師拜禮部侍郎同中書門下平章事集賢殿大學士彦博因進對言嘗聞徳音以搢紳多務奔競非裁抑之無以厚風俗若恬退守道者稍加旌擢則奔競譟求者庶幾知恥乃薦王安石韓維張瓌悉被甄擢與樞密使龐籍同議省兵汰為民者六萬減廪給之半者二萬衆議紛然以為久衣食於官不願為農且習弓刃一旦散之閭閻必為盜賊仁宗亦疑之以問彦博對曰公私困竭正坐冗兵果有患臣願死之皇祐初除吏部侍郎昭文館大學士監修國史大饗明堂命彦博等修纂儀注起自降詔訖于禮成繋日為書為大饗明堂記書成仁宗為制序進禮部尚書三年御史唐介言彦博以閒金竒錦因小臣遺宫掖顯用張堯佐隂結貴妃為謀身之計仁宗怒召二府以疏示之介面論不已詔送臺劾介既下彦博獨留再拜曰御史言事職也願不加罪仁宗不許介遂貶英州别駕而彦博亦罷相以吏部尚書觀文殿大學士知許州徙青州又徙秦州尋拜忠武軍節度使知永興軍至和二年再入為吏部尚書同中書門下平章事昭文館大學士與富弼同拜宣麻之日仁宗遣小黄門覘於庭士大夫皆以得人相慶而天下謂之文富明年仁宗御殿疾暴作扶入禁中二府俟於殿閣召内侍史志聦等問起居状對曰禁中事嚴密不敢泄彦博怒叱之曰上暴疾繫國安危惟爾曹得出入禁闥不令宰相知天子起居欲何為耶自今疾勢少有増損必白顧直省官引至中書取軍令状志聦等大懼及夕詣宫門白下鎖志聦曰汝曹自白宰相我不任受其軍令二府議留宿未有以發彦博請用道家説祈禱大慶殿輔臣主祠事設次宿殿廡志聦等又白非故事彦博曰豈論故事時耶富弼亦切責之志聦等不敢違知開封府王素夜叩宫門求見執政彦博曰此時宫門何可夜開詰旦素入白禁卒告都虞候變者同列欲捕治彦博不可乃召都指揮使許懐徳問都虞候某者何如人懷徳稱其謹良可保彦博曰此卒有怨誣之爾宜亟誅以靖衆衆以為然乃請劉沆判状尾斬于軍門仁宗疾已沆譛彦博曰陛下違豫時彦博擅斬告變者彦博以沆判聞仁宗意乃已御史吴中復乞召還唐介彦博因言介頃為御史言臣事多中臣病其閒雖有風聞之誤然當時責之太深請如中復奏召用之時以彦博為厚徳嘉祐三年鹽鐵副使郭申錫與河北轉運使李參議河事不協訟參遣人私屬彦博為御史所弹申錫坐貶滁州彦博尋以河陽三城節度使同平章事判河南府封潞國公改鎮保平判大名府又改鎮成徳遷尚書左僕射判太原府俄復鎮保平判河南丁母憂英宗即位起復成徳軍節度使乞終喪許之初仁宗之不豫也彦博與富弼等乞立儲嗣仁宗許焉而後宫将有就館者故其事緩已而彦博去位其後弼亦以憂去彦博既服闋復以故官判河南有詔入覲英宗曰朕之立相公之力也彦博竦然對曰陛下入繼大統乃先帝聖意與皇太后叶賛之力人臣何力之有兼陛下登儲纂極之時臣方在外皆韓琦等承聖志受顧命臣無與焉英宗曰備聞始議相公於朕有恩彦博遜避不敢當英宗曰暫煩西行即召還矣尋除侍中徙鎮淮南判永興軍入為樞密使劒南西川節度使熈寧二年相陳升之詔曰彦博朝廷宗臣其令升之位彦博下以稱遇賢之意彦博曰國朝樞密使無位宰相上者獨曹利用嘗在王曽張知白上臣忝知禮義不敢效利用所為以紊亂朝著固辭乃從夏人犯大順城李復圭知慶州以陳圖方略授鈐轄李信都廵檢劉甫監押种詠趣使出戰信等失利復圭亟收所授方略執信等繋獄奏從軍法彦博力言其非宰相王安石以復圭為是信等伏誅人皆冤之明年慶州軍亂神宗召二府對資政殿深以用兵為憂彦博曰朝廷施為務合人心以靖重為先凡事當采衆論不宜有所偏聴陛下即位以來厲精求治而人情未安盖更張祖宗法之過也安石曰朝廷求去民害何不可若萬事隳頽如西晋風兹益亂也安石知為已發故力排之六年除司空河東節度使判河陽徙判大名府初選人李公義請為鐵龍爪以濬河宦者黄懐信更作濬川杷天下指笑以為兒戯王安石獨信之除范子淵都水監丞置濬川司行其法子淵奏功言疏道水勢悉歸故道退出民田數萬頃朝廷疑其妄事下大名彦博曰河水汗漫非杷可濬雖甚愚之人皆知無益去年退地止因霜降水落今年未嘗用杷而退地更多臣不敢雷同欺罔奏至神宗不悦命知制誥熊本與河北漕臣陳知儉按視如彦博言子淵乃求對言本等意安石罷彦博必相故傅㑹其説於是御史蔡確亦言本奉使不公有詔雜治子淵及本等皆重坐而彦博勿問七年北虜遣蕭禧議地界神宗遣中使賜彦博詔問所以待遇之要備禦之方彦博奏以為不可予語在遼國事中九年除太保力辭元豐三年除太尉開府儀同三司復判河南王堯臣子同老言仁宗不豫先臣與文彦博劉沆富弼等請立英宗皇帝為嗣仁宗感悟開納㑹彦博入覲神宗以問彦博對曰先帝天命所在神器有歸寔仁祖知子之明慈聖擁佑之力臣等何功神宗曰議論推輪於至和時發端為難仁祖意已定其後止申前詔爾正如丙吉霍光事前後不相揜也卿宜盡録本末将付史官彦博乃奏其事曰至和三年仁宗不豫兩月餘是時以根本未立中外人情不安及聖體康復顧念前此禁中侍藥憂慮百端堯臣與臣及劉沆富弼竊議曰方今朝廷根本不可不蚤定以定人心時亦不暇與密院同謀亦未敢顯言臣以堯臣久居禁近多知朝廷事因謂之曰必得賢嗣以厭人心堯臣曰豈不知素育於宫中者邪於是臣等具奏春中服藥時事中外人情非常憂恐蓋為儲嗣未立仍引西漢故事人主初即位建儲今當以時立嗣以固根本臣等既叨輔相之重位當任社稷之大計此大計也乞賜開納仁宗淵黙寡言乃欣然嘉歎曰知卿等盡忠然此大事也朕更熟思之臣等既退且請堯臣密作詔意欲進呈施行堯臣許歸第乃密草詔意然未及示臣等臣等既登對復申前請仁宗曰朕意已定矣卿等可無憂臣等既得此旨決謂無疑矣是年因樞府闕官議於上前乞召韓琦為樞密使盖以琦忠義必能當重事仁宗可之自後繼有議論未幾臣得請判河南堯臣尋卒臣所記當日之事大槩如此於是手詔中書曰文彦博蓄徳深厚善不自伐懐此大功絶口不言中外搢紳莫有知者乃知援立之功厥有攸在嘉祐之詔但宣之耳其議所以褒顯之又詔曰朕恭聞仁宗皇帝深惟天下大本意有所付而執政大臣文彦博劉沆富弼王堯臣實左右賛順以成聖志及英宗皇帝進位元儲纉承大統四方上下莫不安寧而彦博等勲績莫有聞者比覽故臣家奏攷驗不誣其謙厚忠實可謂至矣其議所以褒顯之庶幾上昭神祖知人之明文考報功之意焉遂加彦博河東永興節度使彦博力辭兩鎮宴餞瓊林輔臣皆與兩遣中謁者遺詩以寵其行有報在不言功之語當世榮之彦博至河南未交印先就第廟坐以見監司既交府事見監司府官如常式或以問彦博彦博曰吾未視府事三公見庶僚也既交印河南尹見監司矣六年請老拜太師致仕元祐初司馬光拜相起彦博為平章軍國重事六日一朝一月兩赴經筵邊事河防及朝廷大政令即與輔臣共議㤙遇甚渥期年乃求去詔曰昔西伯善飬老而太公自至魯穆公無人子思之側則長老去之公自為謀則善矣獨不為朝廷惜乎又曰唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以燕安之際不能用裴度於未病治亂之效於斯可見彦博讀詔聳然不敢言去蓋後留四年彦博請去不已復以太師河東節度使開府儀同三司致仕紹聖初言者觀望時政謂彦博朋附司馬光詆毁成烈降太子少保薨年九十二崇寧中與元祐黨後命出籍追復太師謐曰忠烈彦博凝簡荘重有大臣體位將相者五十餘年徧歴公孤兩以太師致仕雖位貌隆貴而平居接物謙抑尊徳樂善如恐不及邵雍程顥程頤以道學名世居洛陽而彦博與之遊元豐中與富弼及當時老成而有賢徳者十一人用白居易故事就弼第置酒相樂尚齒不尚官已而圖形妙覺僧舍謂之洛陽耆英㑹司馬光為文序其事王拱辰守北都以書來諗曰拱辰亦家洛位與年不居數客後顧以官守不得執巵酒在坐席願與名其閒幸無我遺其為時所嘉羡如此彦博八子皆歴要官第六子及甫及甫字周翰初為大理評事遷直史館與邢恕同為館職頗相善也遷吏部員外郎除直龍圖閣知同州父太師彦博起為平章軍國重事除及甫右司員外郎以嫌改衛尉光禄少卿初韓琦子忠彦與琦之門人劉摯王巖叟賈易等常不平彦博不言功事以謂掩琦之勲及章惇撰御賜彦博詩序具述上語云嘉祐之詔但宣之耳忠彦益不平彦博入為重事易簾前論列王同老所上文字彦博教為之乞改史宣仁后曰此事吾詳知之至和中仁宗不豫乞立皇嗣者文太師富相公王參政也在嘉祐末乞立英宗為皇嗣仁宗升遐䇿立英宗者韓相公也即不相掩不必改史其後彦博致仕及甫以集賢殿修撰知河陽召為太僕卿除權工部侍郎罷為集賢殿修撰提舉明道宫紹聖中蔡確之子渭奏及甫嘗與邢恕書具述姦臣大逆不道之謀詔以蔡京安惇即同文館究問語在章惇傳於是梁燾劉摯王巖叟劉安世范祖禹朱光廷皆坐重貶及甫懐一朝之忿妄發書與邢恕致起詔獄以陷害忠良及甫之罪也及甫坐元祐黨禠職居久之復直龍圖閣知陜州既又落職最後復集賢殿修撰以卒始及甫當宣仁后臨朝時避魯王諱止名及宣仁崩復名及甫云臣稱曰彦博以王佐之才克平妖難致位丞弼雖以人言去位而天下之望日隆及其再相也乃秉忠竭誠首議建儲遂絶口不言至神宗之世因事自顯人謂彦博不獨首建大䇿為難而有功不居之為尤難也烏虖彦博出入四世名倡九牧神明所相夀考康寕近世以來一人而已東都事略卷六十七
