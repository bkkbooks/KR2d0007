body:
  text: 東都事略卷七十二宋王稱撰列傳五十五歐陽脩字永叔吉州廬陵人也四嵗而孤母鄭氏守節自誓親教脩讀書家貧至以荻畫地學書比成人舉進士兩試國子監一試禮部皆第一遂中甲科補西京留守推官始從尹洙遊為古文議論當世事迭相師友與梅堯臣遊為歌詩相倡和遂以文章名冠天下景祐初召試為館閣校勘時范仲淹知開封府每進見輒論時政得失宰相吕夷簡惡之斥守饒州諫官髙若訥詆誚仲淹以為當黜脩以書深責若訥謂其不復知人間有羞耻事若訥以聞謫夷陵令徙乾徳復為武成軍節度判官范仲淹帥陜西辟脩掌書記脩曰吾論范公豈以為利哉同其退不同其進可也辤不就召還復校勘慶歴初遷集賢校理同知太常禮院求補外通判滑州仁宗登進杜衍范仲淹富弼韓琦分列二府増諫官員用天下名士召脩知諫院未幾修起居注修每勸上延見大臣訪以政事仁宗再出手詔使條天下事又開天章閣召對賜坐給以筆札使具疏于前皆皇恐退而上時所宜先者十數事於是有詔勸農桑興學校革磨勘任子等弊中外悚然而小人不便相與騰口謗之脩常為仁宗分别邪正勸行其言改右正言知制誥仍知諫院故事知制誥必試仁宗知脩之文有旨不試與近世楊億陳堯佐及脩三人而已嘗因奏事論及人物仁宗目脩曰如歐陽脩何處得來初范仲淹之貶饒州也脩與尹洙余靖皆以直仲淹見逐目之黨人自是朋黨之論起脩乃為朋黨論以進以為君子以同道為朋小人以同利為朋此自然之理也臣謂小人無朋惟君子則有之盖小人所好者利禄也所貪者財貨也當其同利之時暫相黨引以為朋者偽也及其見利而争先或利盡而反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所修者名節以之修身則同道而相益以之事國則同心而共濟終始如一故君子有朋也故為君者但當退小人之偽朋用君子之真朋則天下治矣四年大臣有言河東芻粮不足請廢麟州命脩往視利害脩以以為麟州天險不可廢又言忻州代州岢嵐火山軍並邊民田廢不得耕號為禁地吾雖不耕而敵常盜耕之若募民計口出丁為兵量入租粟以耕嵗可得數百萬斛不然他日且盡為敵有議下太原帥臣以為不便持之久之乃從凡河東賦斂過重民所不堪奏罷十數事自河東還㑹保州兵亂以脩為龍圖閣直學士河北都轉運使仁宗面諭曰無為久留計有所欲言言之脩曰諫官得風聞言事外官越職而言罪也仁宗曰苐以聞勿以中外為意方是時二府相繼以黨議罷去脩慨然上疏曰杜衍韓琦范仲淹富弼天下皆知其可用之賢而不聞其有可罷之罪自古小人讒害忠賢其説不逺欲廣陷良善不過指為朋黨欲摇動大臣必須誣以專權其故何也去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一一求瑕唯指以為朋黨則可以一時盡逐至如自古大臣已被主知而䝉信任則難以他事動摇唯有專權是上之所惡必須此説方可傾之正士在朝羣邪所忌謀臣不用敵國之福也今此四人一旦罷去而使羣邪相賀於内四夷相賀於外臣所以為陛下惜之也為朋黨論者惡脩異已又以善言其情状愈益忌之㑹脩之外甥女張嫁族人晟以失行繫獄言事者乘此欲并中脩遂起詔獄窮治張資産仁宗遣中官監劾之卒辨其誣脩坐左遷知制誥知滁州徙揚潁二州復龍圖閣直學士留守南京以母憂去既免喪入見鬚髮盡白仁宗怪之問勞惻然恩意甚厚命判流内銓小人畏脩復用偽為脩奏乞澄汰宦官宦官聞之果怒㑹選人胡宗堯當改官坐嘗以官舟假人經赦去官法當循資脩引對取旨仁宗特令改官宦官有密奏者曰宗堯翰林學士宿之子有司右之私也遂出知同州言者多謂脩無罪仁宗悟留刋修唐書為翰林學士加龍圖閣學士知開封府所代包拯以威嚴御下名震都邑脩簡易循理不求赫赫之譽或以為言脩曰凡人材性不一用其所長事無不舉彊其所短勢必不逮吾亦任吾所長耳遷給事中為羣牧使唐書成拜禮部侍郎兼翰林侍讀學士脩在翰林凡八年知無不言所言多聼河決商胡賈昌朝留守北京欲開横壠故道囘河使東有李仲昌者欲道商胡入六塔河詔兩省臺諫集議脩故奉使河北知河決根本以為河水重濁理無不淤淤從下起下流必決水性避髙決必趨下以近事驗之決河非不能力塞故道非不能力復但勢不能久必決於上流耳横壠功大難成雖成必有復決之患六塔狹小不能容受大河以全河注之濵棣徳博必被其害不若因水所趨増治隄防疏其下流浚之入海則河無決溢㪚漫之憂數十年之利也陳執中當國主横壠之議其後行之而敗河北被害者凡數千里臺諫謂執中過惡而執中遷延尚玷宰相府脩上疏曰陛下用相非其人以天下之事奈何委一不學無識諂邪很愎之執中而甘心焉然天下之人與後世之議者謂陛下拒忠言庇愚相以為聖徳之累未幾執中罷免狄青為樞密使奮自軍伍多戰功軍中服其威名仁宗不豫諸軍訛言藉藉脩言武臣掌機密而得軍情不惟於國不便鮮不為身害請出之外藩以保其終始遂罷青知陳州脩嘗因水災上疏曰陛下臨御三十餘年而儲宫未建此久闕之典也漢文帝即位羣臣請立太子羣臣不自疑而敢請文帝亦不疑其臣有二心後唐明宗尤惡人言太子事然漢文帝立太子之後享國長久為漢太宗明宗儲嗣不早定而秦王以窺覬陷于大禍後唐遂亂陛下何疑而久不定乎嘉祐五年為樞密副使明年拜參知政事修在兵府與曽公亮考天下兵數及三路屯戍多少地理逺近更為圖籍凡邊防久闕屯戍者必加蒐補其在政府與韓琦同心輔政凡兵民官吏財利之要中書所當知者集為緫目遇事不復求之有司時東宫猶未定與韓琦等協定大議語在琦傅英宗即位以疾未親政慈聖章獻皇后垂簾脩與二三大臣往來二宮彌縫其闕卒復明辟再遷吏部侍郎神宗即位遷尚書左丞脩性剛直平生與人盡言無所隐及在二府士大夫有所干請輒面諭可否雖臺諫論事亦必以是非詰之初朝廷議加濮王典禮也臺臣以脩主此議專以詆脩語在濮王事中脩著濮議引喪服記曰為人後者為其父母服服者齊衰期也謂之降服親不可降降者降其外物爾喪服是也其必降者示有所屈也以重承大宗之重尊祖而為之屈於此以伸於彼也夫生莫重於父母而為之屈者以承大宗者亦重也此以義制者也父子之道天性也臨之以大義有可以降其外物而本之於至仁則不可絶其天性絶人道而滅天理此不仁者之或不為也故聖人制服為降三年為朞而不没其父母之名以見服可降而名不可沒也此以仁存者也今議者欲以為人後之故使一旦反視父母若未嘗生我者其絶之也甚矣使其真絶之與是非人情也廹於義而偽絶之與是仁義者教之為偽也其議如此臺臣既出而來者持脩愈急先是蒋之竒盛稱濮議之是脩由是薦之得為御史既而反攻脩及其帷薄事事連其子婦脩杜門求辨其事詔詰問之竒語所從來之竒言得之彭思永思永言出於風聞暧昧無實嘗戒之竒勿言神宗為其詞窮逐去脩亦力求退除觀文殿學士刑部尚書知亳州遷兵部尚書知青州時諸路散青苗錢脩乞令民止納本錢以示不為利罷提舉官聼民以願請不報除宣徽南院使判太原府脩力辭丐易蔡州大略以久疾昬耗不任重寄復曰時多喜新竒而臣思守拙衆方興功利而臣欲循常以譏切王安石遂聼以舊官知蔡州脩在亳已六請致仕比至蔡逾年復請乃以觀文殿學士太子少師致仕脩昔守潁樂其風土因卜居焉及歸而居室未備處之怡然不以為意脩之在滁也自號醉翁作亭琅邪山以醉翁名之晚年又自號六一居士曰吾集古録一千卷藏書一萬卷有琴一張有碁一局而嘗置酒一壺吾老於其間是為六一自為傳刻石居潁一年而卒年六十六贈太子太師諡曰文忠脩於六經長於易詩春秋其所發明多古人所未見嘗奉詔撰唐本紀表志又自撰五代史記二書本紀法嚴而詞約多取春秋遺意其表傳志與遷固相上下有易童子問三卷詩本義十四卷居士集五十卷内外制奏議四六集又四十餘卷脩篤於朋友不以貴賤生死易意尹洙孫復石介梅堯臣既没皆經理其家或言之朝廷官其子弟蘇洵以布衣隐居於蜀脩得其書獻諸朝當時文士一有所長必極口稱道惟恐人不知也嘉祐間朝廷進人之路稍狹脩建言以館閣育材材既難得其人又難知則當博採而多蓄之兾一得其間則傑然出為名臣矣餘亦不失為佳士也遂詔韓琦曽公亮趙槩及脩各舉五人一時得士為多脩嘗稱故相王曽之言曰恩欲歸已怨使誰當且曰貧賤嘗思富貴富貴必履危機此古人之所歎也惟不思而得既得而不患失之者其庶幾乎脩以論政不合固求去位年未及即告老天下髙之四子發奕棐辨棐字叔弼以父脩䕃守秘書省正字年十二三脩著鳴蟬賦棐侍脩語之曰兒異日能為吾此賦否因書以遺之脩又嘗書以教棐曰藏精於晦則明飬神以静則安晦所以蓄用静所以應物善蓄者則不竭善應者則無窮雖學則可至然性近者得之易也及長舉進士脩在位及告老棐不肯言仕脩卒始仕為審官院主簿遷太常博士哲宗即位為著作郎入省為職方禮部員外郎詔議南北郊祭或曰分祭禮也或曰合祭禮也棐曰分祭合祭唐志有之矣吾先君子之所論也雖欲合議者而排分祭則非吾先君子之意也章惇入相棐以祕閣校理知襄州又知潞州坐元祐黨奪校理元符三年還朝為吏部郎中遷右司郎中請外以直祕閣知蔡州復係元祐黨鐫直祕閣罷居潁州卒年六十七初脩以道徳文章為三朝所知天下學士大夫皆師尊之而棐亦能以文學世其家有文集二十卷其他著述又五十餘卷臣稱曰斯文古今大事也天未嘗輕以畀人然自孔子以來千有餘載之間得其正傳者僅四五人而已孔子既沒而孟子生孟子之後有荀卿荀卿之後而揚雄出雄之後而韓愈繼愈之後而脩得其傳其所以明道祕而息邪説立化本而振儒風邃然以所學入發為朝廷之論議志得道行沛然有餘則功利之及於物者蓋天之所畀也故天下尊仰之如泰山大河日月所不能磨而竭矣東都事略卷七十二
