body:
  text: 東都事略卷七十八宋王稱撰列傳六十一吕誨字獻可端之孫也㓜孤力學性沉厚不妄交游舉進士稍遷著作佐郎知翼城縣僉書定國軍節度判官知大通監召入為殿中侍御史彈劾無所避兖國公主下嫁李瑋薄其夫家嘗因忿恚夜開禁門訴於仁宗誨奏宿衛不可不嚴公主夜叩禁門門者不當聽入并劾奏公主閤宦者竄逐之彈樞密使宋庠不稱具瞻之望庠罷而以陳升之為樞密副使誨與唐介趙抃論升之交結中人不可大用昔商鞅因景監見而趙良寒心况在盛明之朝姦邪進用衆所共惡此臣之所甚懼也章十八上卒與升之俱罷誨知江州上疏請早建儲嗣韓琦等以誨及司馬光疏上遂定議以英宗知宗正寺久之復召還臺英宗即位為起居舍人同知諫院時英宗不豫慈聖光獻皇后同聽政内侍任守忠久用事于中英宗之立非守忠意乗此與其徙閒諜兩宫造播惡言中外恟恟誨上英宗書曰仁宗皇帝擢陛下於公族授之以大器皇太后鞠育聖躬保䕶成徳功得為重矣恩得為厚矣陛下報之之道為何如哉陛下違豫以來所上湯劑未用服餌日度一日殊不知誤天下之大且百金之子猶有倚衡之誡而萬乗之貴豈無保邦之慮邪矧又聞流議騰沸謂陛下視朝之後燕適宫中言動無節執喪之禮未至奉親之道未盡果如此乃陛下不以繼承為念忽先帝顧託之命忘聖母鞠養之恩何以上奉宗廟率教于天下也又上慈聖書曰皇帝自潛徳之初殿中鞠育保䕶者三十年先帝厭代殿下掌握機柄佐佑聖嗣克安天歩中外賴焉比聞皇帝疾未閒言或荒忽而小人乗勢隂為閒諜臣願殿下廣乎容納之度㤀其惰慢之禮親閱湯劑力為調治彊之以嚴威示之以恩愛如此人神和恱不然三十年保育之功一朝而棄臣竊為殿下惜之英宗疾久未平誨乞早建東宫以安人心既而英宗小瘳謙黙未可否事誨屢乞親萬機攬威福延近臣通下情又請太后閒數日一御東殿漸逺庻務自謀安佚㑹小旱因請英宗親出禱雨使外釋疑然后既歸政誨復言於英宗曰太后輔佐先帝久閱天下事多矣事之大者猶宜關白咨訪然後行示不敢專以報盛徳韓琦等再用定䇿功遷官誨上疏論之曰陛下以琦等有定策之功褒嘉稠疊其如先帝何其如太后何數大臣者向來雖有建議之請果為宗社計邪徼今日福邪貪天功以為已力古人羞之又曰臣觀韓琦等制以謂功逾周霍則亦近乎虚美矣周公大聖固不當擬倫敢以霍光之事明之霍光擁昭立宣宣帝益光國封詔云宿衛忠正宣徳明恩守節秉誼以安宗廟其褒嘉之語止是而已今之草制以建儲定䇿始終之議皆自琦等是大寳之位係人臣之力於義可乎任守忠謀不售而懼乃更巧為謟諛求自入誨曰是不可久處左右亟言守忠前後罪惡竄逐之因言大姦已去其餘嚮日憑恃無禮者宜一切縱捨勿念以安反側頃之兼侍御史知雜事執政建議推尊濮安懿王誨率僚屬極陳其不可遂彈歐陽脩首建邪議上負先帝累濮王以不正之號陷陛下於過舉之譏并劾奏韓琦曾公亮趙槩附㑹之罪積十餘章不聽乃求自貶又十餘章仍率其屬以御史敕告納上前曰臣言不效不敢居其位英宗重違大臣意章留中不下以敕告還之屢詔令就職誨稱濮王典禮未正不敢奉詔具錄所上奏草納中書因即請罪乃出知蘄州徙晉州加集賢殿修撰知河中府召為鹽鐵副使神宗素聞其強直除天章閣待制復知諫院始朝廷用种諤收復綏州議者欲留綏以固横山之地及别與西人商略以綏易安逺塞門等處誨請罪种諤不納二砦并還綏州勿幸小戎之災務全中國之體以紓邊患遷右諫議大夫御史中丞王安石參知政事多變更祖宗法專務歛民財誨屢諍不能得乃上疏悉陳其過失曰臣謹按安石外示樸野中藏巧詐驕蹇慢上隂賊害物臣略舉十事安石向在嘉祐中舉駮公事不當御史臺累移文催促入謝倨傲不從迄英廟朝不修臣節慢上無禮一也安石任小官每一遷遜避不已自為翰林學士不聞固辭先帝臨朝則有山林獨徃之思陛下即位乃有金鑾侍從之樂何慢於前而恭於後好名欲進二也安石侍邇英乃欲坐而講說欲屈萬乗之重自取師氏之尊不識上下之分要君取名三也安石自居政府事無大小與同列異議或因奏對留身進說多乞御批用情㒺公四也昨許遵誤斷謀殺公事安石為主張妻謀殺夫用按問欲舉減等科罪挟情壊法五也安石入翰林未聞薦一士首稱弟安國之才朝廷比第一人推恩猶謂之薄主試者定文卷不優遂罹中傷秉政未半年賣弄威福無所不至背公死黨六也丞相不視事旬日差除自專逐近臣于外皆安石報怨之人丞相不書敇本朝故事未之或聞專威害政七也安石與唐介爭論謀殺刑名衆非安石而是介介忠直自守大體不能以口舌勝憤懣而死自是畏憚者衆雖丞相亦退縮不敢較其是非陵轢同位八也小臣章辟光獻言俾岐王遷居外邸離閒之罪固不容誅而安石數進危言以惑聖聽朋姦附下九也今邦國經費之要㑹在於三司安石與樞密大臣同制置三司條例諸路雖名商𣙜財利其實動揺天下有害無利十也臣誠恐陛下恱其才辨久而倚毗情偽不得知邪正無復辨大姦得路羣隂彚進則賢者漸去亂由是生臣竊憂之誤天下蒼生必斯人矣如久居廟堂必無安靜之理臣所以瀝懇而言不虞濱禍期感動於聦明庻判别於真偽神宗遣使諭解誨執之愈堅且曰天下本無事但庸人擾之安石進說願少加澄省乃罷中丞出知鄧州誨雖在外遇朝廷事猶言之不置時方行青苖助役謂之新法誨兩上章條陳其不便又上書曰臣聞治天下審所上上之所好下必甚焉今大臣不能遵守法度以尊崇王室小臣得以智計謀身遂合時務比來新進之用朝奏暮召小言一入遂要大利皆自謂不同世俗乃曰賢人舉必立異是非相反談兵者以起事攘奪為御戎之䇿言利者以牟歛朘削為惠民之術因上之論類如此一有攻其利害隨而黜逐之是持峻法以固新令将杜天下之口虧損盛徳莫大於此㑹有疾乞閒官提舉崇福宫誨因上章乞致仕曰臣本無宿疾偶值毉者用術乖方殊不知脈候有虚實隂陽有順逆􅐷察有標本治療有先後妄投湯劑率任情意差之指下禍延四肢寖成風痺遂艱行歩非祇憚􅏓盭之苦又将虞心腹之變勢已及此為之奈何雖然一身之㣲固不足恤其如九族之託良以為憂是思納禄以偷生不俟引年而退政蓋以身疾而喻朝政之疾也誨既致仕久之而卒年五十八誨家貧自奉薄甚常分奉之半以給宗族之孤嫠者為言職前後皆以彈奏大臣不去不已天下推其鯁直王安石初執政神宗虚心敬信士大夫素重其名以為可致太平誨獨言安石不可用極力劾奏将對於崇政殿而司馬光侍講邇英閣亦将趨資善堂與誨相逢光密問曰今日請對欲言何事誨曰袖中彈文乃新參也光勸止其疏誨正色曰安石雖有時名上意所向然好執邪見不通物情輕信難囘喜人佞已聽其言則美施於用則疎若在侍從猶或可容置之宰輔天下必受其禍光曰今日之論未見不善之迹更加籌慮可乎誨曰上新即位富於春秋所與朝夕謀議二三大臣而已茍非其人将敗國事此乃腹心之疾治之惟恐不及顧可緩邪章卒上誨由此罷其後言者相繼斥逐百姓患苦安石變法於是司馬光乃服誨之先見元祐初吕大防范純仁奏誨忠於先朝有不撓不囘之節欲望優加贈典錄用諸子之才者以旌名臣之後詔贈通議大夫以其子由庚為太常寺太祝自誨罷去御史劉述劉琦錢顗繼以言安石被黜劉述字孝叔吳興人也舉進士累擢至刑部郎中為京西轉運使召為侍御史知雜事兼判刑部王安石始參知政事述上疏論當今所宜先者其疏曰臣聞帝王之接物也貴以至誠為先權數不足任也夫惟至誠為能終始萬物為能事神接人行之至者雖金石無情猶可以動之况其有知者乎是故人君以至誠接於下則臣下以至誠事其上若夫權數以臨人而不由至誠則人亦将以不誠事之非所以感人心之道也非徒不足以感人心則又将有輕朝廷之心也故夫任權數者醇徳之病中人用之已為非宜况人主之尊乎臣恐輔導之臣有以此術開陛下者陛下信而行之適足為累耳其於盛徳未見其補也臣又聞聖人不以獨見為明而以羣言為用而陋儒之論以為必操獨斷之權使威福必出於已臣下不得而與之然後人君之道尊烏虖其亦不思甚矣夫萬幾之叢脞臣庻之夥繁而欲一一聦明斷之非所前聞也夫所謂獨斷者謀之於衆而斷之以已爾非謂勿詢於下而獨出於上之謂也弗詢於下而獨出於上是為自用耳人君自用使事事能中其理猶得罪於古人又况未能盡然乎臣恐輔導之臣有持此說誤陛下者陛下信而行之適足為累耳其於盛徳未見其補也臣又聞人禀一元之氣而生所禀有厚薄故其質有美惡之别焉若辨與訥出於自然非美惡之所繋也是故其質美矣而其辭訥焉不害為君子其質惡矣而其辭辨焉不害為小人知人之術當視其質性何如不當較其辨與訥此漢文帝所以不拜嗇夫也臣願陛下以文帝為鑒不貴嘵嘵巧辨之人使中外聞之不敢飾虚言以來應天下幸甚臣又聞王言惟作命命一出則天下風行而景從之不可不審也今夫令之出也下未及行而已追改之矣一有使令也其人未及徃而已易之矣此季布所以窺文帝淺深也臣願陛下以文帝為戒務持重毋易由言研慮於内諮謀於外計其可久而必行之天下幸甚陛下躬攬萬機動踰宵旰而未嘗休息彼之所謂輔弼之臣其閒才力必有不堪其任者不然何致陛下勤勞之至也臣願陛下察其不堪任者而絀之舉賢才而屬之毋使天下日入於不治竊譬之於人有疾病也初在腠理不治已而傳至血脈藥石之功猶可以及之於斯時也又忽而不治浸淫至于膏肓雖有俞扁亦無如之何也已恭惟陛下首推至誠以御下而不繇權數博詢衆智而不任獨斷不旌口給之人不審再三之令精求蹈道富才忠力者而委任之然後血脉之疾可除而藥石之功加于天下矣既而安石定謀殺聽首之律述率同僚丁諷王師元封敕還中書至於再於是御史中丞吕誨請如刑部議卒莫能奪故謀殺而聽首天下非之既而述與同時御史劉琦錢顗極論安石又獨論中執法舉屬不拘秩任非祖宗法安石怒琦顗貶監當而劾述與諷等不奉法之罪翰林學士司馬光上疏曰臣聞孔子曰守道不如守官孟子曰有言責者不得其言則去此古今之通義人臣之大節也彼謀殺已傷自首刑名天下皆知其非今朝廷既違衆議而行之又罪守官之臣恐重失天下之心也夫紲食鷹鸇求其鷙也鷙而烹之将安用哉今琦顗所坐不過踈直比以迕犯大臣遂黜為監當臣竊恐來者側目箝口以言為諱威福移於臣下聰明有所壅蔽非國家之福也臣願陛下赦劉述等勿治其劉琦等别與除一本資序庻幾稍息羣議不報諷等咸誣伏述獨謂朝廷不當劾言事官卒不承貶知江州後數年而卒劉琦字公玉宣州宣城人也錢顗字安道常州無錫人也俱以進士第熙寧初琦自通判歙州召為侍御史顗自知烏程縣召為侍御史裏行王安石初得政專肆􅇩臆輕易憲度侵奪三司利柄而曾公亮依違固寵畏避不言琦顗與劉述上疏以為安石自應舉歴官以来莫不知尊尚堯舜之道以倡率學者故天下士人心無不歸向謂之為賢陛下亦聞而知之遂致位公府今遭時得君如此之專當以平時所學仁義之道啟沃上心以廣聖徳今乃首以財利之議務為容恱言行乖戾一至於此剛很自任則又甚焉不知安石之心待陛下為如何主也陛下天資英悟不世而出堯舜至治指日可復今反以霸國諸侯之術唐室衰世之事誘惑上聽何不恭之甚也臣等願陛下奮乾剛之斷罷安石重任以慰安天下元元之心曾公亮位居丞弼被遇三朝自當悉慮竭忠以身許國反有畏避安石之意隂自結援更相稱譽以固寵榮致安石奏對之際唯肆強辨多生横議豈執政大臣之體乎况公亮久妨賢路無補時政亦宜罷免安石怒貶琦為監處州鹽稅顗監衢州鹽稅顗将出臺於衆坐罵同時御史孫昌齡曰平日士大夫未嘗知君名特以王安石昔居憂金陵君為幕府官奴事安石以故得為御史今日亦當少念報國奈何專欲附安石求美官顗今得罪分當逺竄君在後為美官自謂得䇿即我視君犬彘之不如也遂拂衣上馬貶官後數年琦起為通判鄧州顗徙秀州而卒卒時琦年六十一顗五十三臣稱曰吕誨正色立朝有蹇蹇匪躬之節論大政爭大事知無不言言無不盡蓋誨有言責不得其言則去於職業俯仰無愧矣栁下惠有言直道而事人焉往而不三黜誨亦然哉東都事略卷七十八
