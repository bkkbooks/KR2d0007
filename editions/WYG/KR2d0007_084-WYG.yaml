body:
  text: 東都事略卷八十四宋王稱撰列傳六十七郝質邠州介休人也少從軍挽強為軍中第一以邊功稍遷至内殿承制王則反于貝州文彦博以質為城西面鈐轄河上舊有亭甚壮麗彦博慮為賊所焚遣使臣藺千守之質使千徃鄰砦度戰具千去而亭焚彦博將斬千質曰亭焚罪在質願斬質而貸千彦博壮而釋之質由是知名以功遷六宅使韓琦鎮河東以質為并代路鈐轄遷副總管入為殿前都虞候累遷眉州防禦使宿州觀察使馬軍副都指揮使除武昌軍留後遷殿前副都指揮使安徳軍節度使神宗即位遷殿前都指揮使徙鎮安武卒年六十七贈侍中謚曰武荘質篤於信義厚於故舊自為小官不磨勘始質與朝士董熙善熙男質女方娠約為昬婣後數年熙死家貧無依質已為節度使以女歸董氏時人稱之賈逵真定稾城人也少為軍卒𨽻拱聖軍選殿前副都知環州駐泊都監儂智髙反狄青薦為全州駐泊都監師戰于歸仁鋪既陳青誓曰不待令而舉者斬時左將孫節死逵為先鋒受命撃賊大敗之青拊逵背曰君之功也賊既棄城青使逵入括公私遺物逵固辭是時將校以搜城故多摭取重貨獨逵無所犯遷西染院使嘉州刺史主管麟府路軍馬逵善射射必中的屢破賊擢涇原路總管為歩軍馬軍都虞候鄜延路副都總管轉利州觀察使領歩軍都指揮使復為鄜延路副都總管神宗即位拜昭信軍留後兼鄜延帥种諤取綏州逵謂諤止是僥倖功績不念蕃後肝腦塗地謂宜安邊息民不可專信匪人妄興邊事左授利州觀察使尋復故官後拜建武軍節度使殿前副都指揮使逵嘗請三代贈官神宗曰逵武人也能有念親之志雖不逮郊禮可特許之卒年六十九贈侍中謚曰武恪楊遂開封人也少善騎射應募軍中王則反于貝州遂穴城以入賊平功第一授神衛指揮使從狄青為先鋒至歸仁鋪與儂智髙遇遂數挑戰身被數創手殺數十人士卒乗之賊衆奔潰遷萬勝軍都指揮使累遷登州防禦使歩軍都虞候神宗時拜寧逺軍節度使殿前副都指揮使卒年六十五贈侍中謚曰壮敏遂頗尚氣節初在貝州穴城時為賊所傷有同入軍卒劉順者救之遂得免及遂貴而順已死乃訪其家視撫其妻孥甚有恩意至故人妻子貧不能自存者遂亦收養之為世所稱焉盧政太原文水人也以神衛都頭數與夏人戰有功授供奉官稍遷内殿承制為洺州都監儂智髙反為廣南西路鈐轄亦有功累擢歩軍都虞候昌州防禦使黔州觀察使入為馬軍殿前都虞候改真定路總管熙寜中初建将官以政兼領第十一将又徙太原定州路遷歩軍馬軍副都指揮使殿前副都指揮使武㤗軍節度使政起軍伍數有功進領軍政㑹郝質賈逵楊遂相繼卒故驟典禁衛年七十餘矣而氣皃不衰侍立殿下更數時無惰容扈從輦前猶能上馬踴躍前導觀者壮之卒年七十五贈開府儀同三司燕達字逄辰開封人也善騎射以材武選𨽻親衛自内殿崇班為延州廵檢戍懐寧砦羌人以三萬騎薄城達以所部五百人破之擢鄜延路兵馬都監數率師深入以撓敵謀凡九戰以功遷秦鳳路副總管河州景思立陷於踏白城達討山後諸羌斬首四千級還至訶諾城木征遂降累遷龍神衛四廂都指揮使郭逵之討交趾也以達為行軍總管入廣源州降其將劉應紀以其地為順州應紀初欲降猶豫未決達移檄諸洞聲言應紀數以状自言已決計歸我矣約三日出降應紀聞知即如期而来師次富良江交趾戰艦四百餘於南岸欲戰不得逹黙計曰兵法致人而不致於人吾示之以虚彼必来戰已而果來撃之大敗遂請降以功遷滎州防禦使為馬軍副都指揮使神宗閱武騎患未精逹請躬自廵教悉精銳既又采諸葛亮李靖意成五陳法授之以教戰士進殿前副都指揮使拜武康軍節度使哲宗即位遷殿前都指揮使徙鎮武信卒年五十九贈開府儀同三司謚曰毅敏達起行伍喜讀書平時手不釋卷神宗嘗問逹用兵當何先逹曰莫如愛神宗曰愛克厥威可乎逹曰威非不用也要以愛為先神宗稱之苖授字受之上黨人也以父任為三班奉職稍遷供備庫副使王韶之復鎮洮也授以兵從韶為先鋒破香子城拔河州賊退圍香子以迎歸師乃以五百騎屬授夜馳徃力戰數十斬首四千級居數月又破賊牛精谷遂取珂器城城之賜號定羌又城香子號寜居砦始盡得河湟故地賊復圍河州授徃救之以功遷滎州刺史知河州從燕逹復取銀川踏白城木征降俘于京師以功遷引進使為涇原路鈐轄知鎮戎軍歴秦鳳涇原熙河路總管又副李憲中軍總管擊生羌露骨山斬首萬級於是吐蕃來附者十萬八千餘帳威震諸羌乃諭董氊使修貢董氊皇恐聽命徙知雄州又徙熙州王師討西夏授與李憲出古渭路取定西城遂城蘭州次女遮谷遇賊數萬授前澗後山而陳逆戰賊退伏對壘交射中夜賊遁踰天都山焚南牟賊巢屯没煙㑹師行凡百日轉戰千里累遷容州觀察使侍衛親軍副都指揮使進威武軍留後元祐初拜武㤗軍節度使殿前副都指揮使徙鎮保康知潞州再除殿前副都指揮使卒贈開府儀同三司謚曰壮敏授平居侃侃若儒者至遇事則持議不茍合云子履劉昌祚字子京真定人也父賀内殿承制戰没于定川朝廷以昌祚為右班殿直主威逺砦青唐聚兵鹽井帥遣昌祚詰之酋曰聞漢欲得我鹽井昌祚曰中國之大乃與爾爭鹽井乎遂與其酋俱來見稍遷通事舍人夏人以百餘騎冦劉溝堡昌祚出援夏人伏萬騎黒山外偽遁昌祚卒遇之戰不解夏人銳甚大酋突而前昌祚抽矢一發殪之賊遁去自西事以来寡以抗衆未有如昌祚者遷六宅使從王中正撃茂州羌又從李憲討後山常陽等族以功遷西上閤門使知河州王師討西夏昌祚率涇原蕃漢兵五萬出塞詔涇原聽髙遵裕節制仍令環慶與涇原合兵擇利而進夏人悉力抗涇原而環慶師不至昌祚兵獨出瓠盧河川次磨唎隘賊扼險不可進昌祚先登陷陳賊小却官軍乗之遂取其積粟乗勝趍靈州師次城下時環慶軍猶未至昌祚先鋒奪門幾入矣遵裕忌其成功使人持檄至曰已遣將招降可勿攻昌祚遂按甲翌日環慶軍次南州平距城三十里遇賊接戰昌祚以數十騎赴之未至而賊已退遂見遵裕昌祚曰比欲攻城以幕府在後前日磨唎之戰餘衆退保東關若乗我師之銳先撃外援破之城必下遵裕怒甚曰吾夜以萬人負土囊積壘下遲明城可得遵裕圍城十八日不能下夏人決七級渠以灌我師軍遂潰昌祚降皇城使尋知鎮戎軍以昌州刺史為鄜延經略安撫使鄜延自義合至徳靖砦綿亘七百里堡砦五十餘疎密不齊烽燧不相應昌祚立為定式凡耕墾訓練戰守屯戍度強弱分地望圖山川形勢上之夏人冦蘭州昌祚遣姚兕趨宥州王愍趨納乞㑹拒之夏人又冦塞門安安逺砦復遣米斌拒之除雄州團練使元祐初移師涇原遷兾州觀察使侍衛歩軍都指揮使時朝廷議以四砦歸夏人昌祚力陳不可以謂夷狄之情棄前恩而欲無饜夏人素與西蕃不叶今解仇結好徃来不已其志豈淺也哉異日請蘭州亦将許之乎拜武康軍節度使殿前都指揮使卒年六十贈開府儀同三司諡曰毅肅昌祚氣質雄深外嚴内寛射箭出百歩之外敵以為神畏之劉舜卿字希元開封人也父鈞監鎮戎三司兵馬好水之役死於敵朝廷以舜卿為供奉官累至左藏庫副使神宗慨然有經略夷狄之志近臣有以舜卿名聞者且曰此將帥才也神宗命總京東九郡将兵訓之嘗以所部一軍閱於内殿神宗曰坐作有度其可用也爾無忘爾父之讎惟忠與孝勉之哉舜卿再拜泣謝以為閤門通事舍人㑹環慶有警詔率永興奉天之師赴之舜卿至關中奏曰師方戍還未及弛負又督以上道人情囂然且霖潦道阻未必及事虞有他變不可請獨以身徃從之馳至慶而賊去累日矣徙知原州以功遷皇城副使知代州徙雄州始至有告以廵馬大至請甲以俟舜卿不為變卒無事敵妄捕繫州民檄取不聽㑹有使者至因捕其徒從一人取償待釋乃遣敵遣諜盗西城門鏁舜卿密令移去舊鏁而代之數日敵以鏁來歸舜卿曰吾未嘗亡鏁也引視納之不能受敵慙去諜者遂得罪在雄六年恩信稍洽遷東上閤門使英州刺史再遷四方館使元祐初擢龍神衛四廂都指揮使知熙州夏人聚兵天都盡召十二監軍馬結連西羌欲大舉以冦邊羌酋鬼章青宜結逐巴氊角駐常家山大城洮州收聚老弱輜重厲兵秣馬以待師期諜者以告諸將請乗其未集討之舜卿召將佐講議出兵方略大將姚兕种誼請分兵兩路急装輕齎並洮水而進兕部洮西領武勝正兵合河州熟户擣講珠城脅取六道逋宗部族遣人走間道焚河橋以絕西援誼部洮東以岷州蕃將包順為前鋒由哥龍谷㑹通逺蕃兵宵濟邦金川邌明至洮州城下版築未收一鼓破之擒鬼章以獻并獲首領五人斬馘數千牛羊器械以萬計遷馬歩軍都指揮使徐州觀察使知渭州召還宿衛未上道以疾卒年六十一贈秦國軍節度使諡曰毅敏舜卿知書通曉吏事謹守文法善料敵為時名將云東都事略卷八十四
