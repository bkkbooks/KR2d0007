body:
  text: 東都事略卷九十二宋王稱撰列傳七十五楊繪字元素漢州綿竹人也舉進士爲大理評事通判荆南神宗時爲修起居注知諫院建言宗室以服屬裁蔭子之數立出官之法神宗嘉納向傳範爲京東帥繪請易其任以杜外戚僥求神宗曰得卿如此言甚善誠可以止異日妄求也宰相曽公亮用所善曽鞏爲史官繪言前數月人已知鞏爲實録檢討矣公亮以朝廷名器爲已物乞正招權之罪鞏既罷史官繪亦罷諫職除兼侍讀御史中丞滕甫言繪何罪而罷神宗於是詔甫曰繪堅求外補蓋繪未究朕意繪迹踈逺立朝寡援不畏强禦知無不爲朕一見即知其忠直可信故擢置言職知之亦篤矣今日之除蓋難與宰相兩立於輕重之閒姑少避之卿其諭朕此意繪曰諫官不得其言則去經筵非姑息之地卒辭不受未閱月再知諫院擢翰林學士御史中丞時王安石執政繪上言當今舊人多以疾求退范鎮年六十三吕誨五十八歐陽脩六十五而致仕富弼六十八被劾引疾司馬光王陶皆五十而求閒散陛下可不思其然乎又言以經術取士獨不用春秋宜令學者以三傳解經又言安石不知人提舉常平使者暴横繪論免役有十害請罷之曽布疏其說詔付繪分析繪執前議遂罷以翰林侍讀學士知亳州徙應天府又徙杭州再爲翰林學士兼侍講議者欲加孔子帝號繪以爲非是繪嘗薦屬吏王永年御史蔡承禧言其私通饋賂坐貶荆南節度副使數月分司南京改提舉太平觀起知興國軍哲宗即位徙徐州復天章閣待制知杭州卒年六十二繪爲人放曠不羇然吏事敏給主於愛利爲文立就有集八十卷李常字公擇南康軍建昌人也幼力學舉進士調江州判官宣州觀察推官方重自持人畏憚之發運使楊佐薦改秩常推其友劉琦佐曰不見此風久矣并薦之議者謂常能舉善而謂佐爲知人除祕閣校理熙寧初自太常博士改右正言時方更法常言始建三司條例司已致天下之議至於均輸青苗斂散取息傅㑹經義人且大駭又言州縣有不散常平錢而但使民出息者詔常具姓名以聞常不以聞遂落校理通判滑州歳餘復職知鄂湖齊三州齊多盜論報無虚日常得黠盜刺爲兵使在麾下它日詢其狀對曰此由富家爲之囊槖爾常於是令藏盜之家並發屋破柱拔其根株自是姦無所匿徙淮南西路提㸃刑獄元豐六年召爲太常少卿遷禮部侍郎哲宗立進吏部侍郎常上七事曰崇亷耻存鄉舉别守宰廢貪賍謹疑獄擇儒師修役法又論役法差免二科以爲法無新陳便民爲是今使民俱出資則貧者難辦俱出力則富者難堪盍各從其願庶幾可久矣赦恩蠲市易逋負不滿二百緡者常請累息過其數亦勿取拜御史中丞兼侍讀加龍圖閣直學士論取士請分詩賦經義爲兩科以盡所長吳處厚繳蔡確詩以爲謗訕諫官劉安世因力攻之常以爲以詩罪確非所以厚風俗改兵部尚書辭不拜出知鄧州徙成都府行次陜郊而卒年六十四有文集奏議六十卷詩傳十卷元祐㑹計録三十卷常少讀書於廬山五老峯白石菴之僧舎書幾萬卷當既貴思欲遺後之學者乃藏於山中時人目其居曰李氏藏書山房而蘇軾爲記其事云孫覺字莘老髙郵人也中進士第治平中爲館閣校勘神宗即位除直集賢院爲昌王府記室王禮之問終身之戒覺爲陳諸侯之孝作富貴箴遷右正言神宗欲革積弊覺言弊不可不革革而當其悔乃亡神宗然其言邵亢在樞府無所建明滕甫爲中丞覺論其頗僻不報即家居待罪朝廷以覺薦陳升之才可用非諫官職奪兩官覺曰諫官言事不當黜之可也無降秩充位者乞補外得通判越州復右正言徙知通州召還修起居注青苗法行覺論其非時言者亦以爲畿内有追呼抑配之擾神宗令覺行視虚實覺退而上疏曰臣以言爲職體量非臣事黜知廣德軍踰年徙湖州松江隄爲民患覺易以石髙一尋有奇長百餘里隄下悉爲良田徙廬州改右司諫以祖母亡解官下太常議議者謂不可詔知潤州而覺已持祖母喪矣服除知蘇州徙福州閩俗厚於昬喪覺裁爲中法使富家不得過百緡令出一日嫁娶者數百家葬埋費減什之五徙徐州又徙南京召爲太常少卿易祕書少監哲宗即位兼侍講遷右諫議大夫又遷給事中爲吏部侍郎領右選右選萬五千貟而闕不滿六千有三年不得調者覺請自軍功保甲進者補指使袒免親從貟外置一日得闕數千改主左選請磨勘歳以百人爲限擢拜御史中丞以疾請罷除龍圖閣直學士提舉醴泉觀留侍講力請外提舉靈仙觀卒年六十三紹聖中以覺爲元祐黨奪職追兩官徽宗即位復故官職有文集奏議六十卷春秋傳十五卷弟覽覽字傅師舉進士調河南簿後知尉氏縣將官御下苛酷士卒謀就大閱殺將以叛覽聞之亟往諭之曰將官暴虐誠有罪也然汝曹衣食縣官縣官顧負汝邪何敢爲族滅計衆皆感悟聽命遂帖服神宗嘉之以爲司農寺主簿又遷丞出爲提舉湖南常平京西轉運判官召爲右司貟外郎除河北轉運副使以直龍圖閣爲江淮荆浙發運副使又知桂州遷寳文閣待制知渭州又帥延安入爲户部侍郎除龍圖閣直學士知太原府進樞密直學士覽治邊數有功而議事多與執政異坐軍期落職提舉崇禧觀俄復待制知光州徙知河南府復龍圖閣直學士知渭州徙永興軍成都府復請祠提舉崇禧觀卒年五十九覽精於吏事甚有能政所至善良得職云鮮于侁字子駿閬州人也性莊重力學舉進士第慶歴中天下旱詔中外言事侁上書論災異之興言甚剴切稍遷祕書丞知綿州英宗初爲皇嗣侁上疏請選經術士以爲羽翼神宗初詔求直言侁爲蔡河撥發應詔言十六事皆人君謹始者神宗謂滕甫曰其文類王陶可嘉也遂用爲利州路轉運判官初建助役法詔諸路監司各定所役緡錢轉運使李瑜定四十萬侁曰利路民貧二十萬足矣與瑜議不合各具利害以聞神宗是侁議因以爲諸路率即罷瑜以侁爲轉運使利州守周永懿貪虐不法前使者不敢問侁舉按其罪編管衡州又爲京東轉運使所代吳居厚以掊斂虐下侁繼之務行寛大司馬光嘗謂蘇軾曰子駿福星也京東人困甚且令子駿救之然安得百子駿布之天下乎元祐初召爲太常少卿拜左諫議大夫建言祖宗政本人情獄訟簡少先帝置大理獄其少卿二人同詳讞奏牘罷其餘治獄官吏請六曹寺監長吏各舉寮屬又請復制舉分詩賦經義兩科而先論策以疾請外除集賢殿修撰知陳州卒年六十九侁長於楚詞嘗作九誦蘇軾見之謂其近古屈原宋玉友其人於冥漠續微學之將墜者紹聖閒以侁爲元祐黨削左諫議大夫集賢殿修撰遂與黨籍云馬黙字處厚單州武城人也舉進士調臨濮尉治平中爲監察御史裏行時議尊崇濮安懿王臺諫力爭以爲不可悉補外黙請還所出臺諫官吕誨等不報歐陽脩建濮議士論不與郭逵除僉書樞密院物議不厭黙皆上疏論列㑹地震河東陜西郡黙以爲陰盛慮爲邊患宜備之後數月西夏果入㓂時朝廷欲於西京㑹聖宫置仁宗神御殿黙以爲漢以先帝所嘗行郡國立廟知禮者以爲非是況仁宗未嘗幸西洛剏建别廟使有司侍祠殊乖典禮以言事不效乞罷御史出通判懷州神宗即位黙陳十事一曰攬威權二曰察姦倖三曰近正人四曰明功罪五曰息大費六曰備災歳七曰崇儉八曰乆任九曰選提轉牧宰十曰禦戎狄攬威權則天子勢重而大臣安矣察姦佞則忠臣用而小人不能幸進矣近正人則諫諍日聞而聖性開明矣明功罪則朝廷無私而天下服矣息大費則公私富而軍旅積矣備災歳則大恩常施而旤亂不起矣崇儉則自上化下而民樸素矣乆任則官不虚授而職事舉矣選提轉牧宰則庶績有成而民受賜矣禦戎狄則四夷畏服而中國强矣除知登州沙門島舊制有定額溢數則投之海中砦主李慶罷官入謁黙遽問擅殺幾何人慶對一任殺七百餘人黙詰之則曰島上地狹徒𨽻猥衆過數官糧不足以贍則取殺之黙責其擅殺欲按其罪慶皇恐即日自殺黙爲奏請更定配島法凡二十條溢額者則選年深不作過人移徙登州自是多全活者其後蘇軾起知登州父老迎於路曰公爲政愛民得如馬使君乎軾異之徙知曹州召爲三司鹽鐵判官論新法不便出爲京東提㸃刑獄又爲廣南西路轉運副使會安化等州蠻歳饑略省地黙上平蠻方略以爲勝負不在兵而在將富良宵遁郭逵怯懦邕城陷没蘇緘老繆歸仁鋪覆軍陳崇儀先走崑崙關喪師張守節不戰儂智高破亡因狄青之智勇歐希範之誅滅乃杜杞之方略此足以驗矣以疾知遂州改徐州元祐初召爲司農少卿司馬光問黙復鄉差牙前法如何黙曰常平自漢爲良法不可盡廢去其害民者可也其後役人立爲一州一縣法而常平提舉官省歸提刑司頗自黙發之除河東轉運使時議棄葭蘆吳堡二砦黙奏控扼險阻敵不可攻棄之不便由是二砦得不棄移兖州召爲衞尉卿擢工部侍郎遷户部侍郎告老除寳文閣待制知徐州移河北都轉運使再知兖州初元豐閒河決小吳因不復塞縱之北流入海元祐議臣以爲東流便水官亦以爲然黙與同時監司上議以北流爲便而御史郭知章亦奏請從東流於是作東西馬頭約水復故道爲長隄壅河之北流者勞費甚大明年復決黙復告老提舉鴻慶宫坐附會司馬光落職致仕後復寳文閣待制卒年八十一東都事略卷九十二
