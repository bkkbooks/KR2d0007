body:
  text: 東都事略卷九十三上宋王稱撰列傳七十六上蘇軾字子瞻眉州眉山人也父洵見儒學傳軾生十年而洵宦學四方母程氏親授以書比冠學通經史屬文日數千言歐陽脩試禮部進士得軾論欲以冠多士疑曾鞏所爲鞏脩門下士也乃置第二遂中乙科授福昌簿脩復以直言薦之制策入三等除大理評事僉書鳳翔判官國朝以來制策入三等惟吳育與軾軾還朝判登聞鼓院英宗在藩聞軾名欲以唐故事召入翰林宰相韓琦曰蘇軾之才逺大之器也天下之士莫不畏慕降伏皆欲其進用然不若朝廷培養之而後用也今欲召試祕閣英宗曰未知其能否故試如蘇軾有不能耶及試二論復入三等得直史館尋以父憂去官服除判官告院王安石爲政每賛人主以獨斷神宗專信任之軾考試開封進士發策謂晉武平吳以獨斷而克苻堅伐晉以獨斷而亡齊小白專任管仲而霸燕噲專任子之而敗事同而功異何也安石不恱安石欲更科舉法詔兩制三館議軾議上神宗曰朕固疑此得軾議意釋然矣即日召見問何以助朕軾曰陛下求治太急聽言太廣進人太銳願陛下安靜以應之神宗悚然嘉納會上元有旨市浙燈軾密疏諌止安石創行新法軾上書論其不便曰臣之所欲言者三言而已願陛下結人心厚風俗存紀綱今陛下不以財用付三司無故又創制置三司條例一司使六七少年日夜講求於内使者四十餘輩分行營幹於外夫制置三司條例司求利之名也六七少年與使者四十餘輩求利之器也至於所行之事行路皆知其難汴水濁流自生民以來不以種稲今欲陂而漬之萬頃之稻必用千頃之陂一歳一淤三歳而滿矣陛下遂信其說即使相視地形萬一官吏茍且順從真謂陛下有意興作上糜帑廩下奪農時隄防一開水失故道雖食議者之肉何補於民自古役人必用鄉户今者徒聞江浙之閒數郡雇役而欲措之天下單丁女户蓋天民之窮者也而陛下首欲役之富有四海忍不加卹青苗放錢自昔有禁今陛下始立成法每歳常行雖云不許抑配而數世之後暴君汙吏陛下能保之與異日天下恨之國史記之曰青苗錢自陛下始豈不惜哉且常平之爲法也可謂至矣今若變爲青苗壞彼成此所喪愈多虧官害民雖悔何及昔漢武帝以財力匱竭用賈人桑羊之説買賤賣貴謂之均輸于時商賈不行盜賊滋熾幾至於亂孝昭既立霍光順民所欲而予之天下歸心遂以無事不意今日此論復興陛下壞常平而言青苗之功虧商稅而取均輸之利臣竊以爲過矣臣之所願陛下結人心者此也國家之所以存亡者在道德之淺深不在乎彊與弱歴數之所以長短者在風俗之薄厚而不在乎富與貧人主知此則知所輕重矣故臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富彊以簡易爲法以清淨爲心而民德歸厚此臣之所願陛下厚風俗者此也古者建國使内外相制輕重相權而無内重外輕之弊我國家租賦籍於計省重兵聚於京師以古揆今則似内重恭惟祖宗所以委任臺諌則是聖人過防之至計臺諌固未必皆賢所言亦未必皆是然須養其銳氣而借之重權者豈徒然哉將以折姦臣之萌而救内重之弊也臣聞長老之談皆謂臺諫所言常隨天下公議公議所與臺諫亦與之公議所撃臺諌亦擊之今者物論沸騰怨讟交至公議所在亦可知矣臣恐自兹以往習慣成風盡爲執政私人以致人主孤立紀綱一廢何事不生臣之所願陛下存紀綱者此也臣所獻三言陛下安可不察初殿試用策舉子希合爭言祖宗法制非是軾爲考官退擬荅以進至謂安石不知人不可大用安石怒御史誣奏軾過失窮治無所得軾遂請外通判杭州髙麗入貢使者發幣於官止書甲子軾却之曰髙麗於本朝稱臣今不禀正朔吾安敢受使者亟易書稱熙寜然後受之徙知密州時方行手實法使民自疏財産以定户等司農寺下諸路不時施行者以違制論軾謂常平官曰違制之坐若自朝廷誰敢不從今出於司農是擅造律也若何使者驚曰姑徐之未幾朝廷亦知其害罷之徙徐州是歳河決澶淵東泛鉅野北溢于濟南溢于泗浸淫至城下民爭出避水軾履屨杖策躬率兵夫築長隄起戯馬臺屬於城水至隄下不能爲害雨日夜不止河勢益暴城不没者三板軾廬於城上使官吏分堵而守卒全城以聞詔襃之徙湖州言者指軾謝表語以爲怨謗因盡摭軾所爲詩諷時事者交章條列謂之訕上遂逮赴御史臺鞫治坐貶黃州團練副使安置徙汝州未至上書自言有田在常願得居之神宗許焉哲宗即位起知登州召爲禮部郎中除起居舎人遷中書舎人時方議改免役爲差役軾謂司馬光曰差役免役各有利害免役之害掊斂民財十室九空錢聚於上而下有錢荒之患差役之害民常在官不得專力於農而貪吏猾胥得縁爲姦此二害輕重蓋略等矣光曰於君何如軾曰法相因則事易成事有漸則民不驚者三代之法兵農爲一至秦始分爲二及唐中葉盡變府兵爲長征之卒自爾以來民不知兵兵不知農農出穀帛以養兵兵出性命以衞農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵蓋未易也光不以爲然軾曰昔韓魏公刺陜西義勇公爲諌官爭之甚力魏公不樂公亦不顧今公作相不許軾盡言耶光笑而止尋遷翰林學士兼侍讀軾嘗鏁宿禁中中使宣召入對便殿宣仁后問曰卿前年爲何官曰臣前年爲汝州團練副使今爲何官曰臣今待罪翰林學士曰何以遽至此軾曰遭遇太皇太后皇帝陛下宣仁曰非也軾曰豈大臣論薦乎宣仁曰亦非也軾驚曰臣雖無狀不敢自他途以進宣仁曰此乃先帝之意也先帝每誦卿文章必歎曰竒才竒才但未及進用卿上位耳軾不覺哭失聲宣仁與哲宗亦泣左右皆感涕已而命坐賜茶撤御前金蓮燭送歸院軾嘗讀祖宗寶訓因及時事歷言今功罪不明善惡無所勸沮又黄河勢方北流而彊之使東夏人㓂鎮戎殺掠幾萬人帥臣掩蔽不以聞朝廷亦不問事每如此恐寖成衰亂之漸軾請外以龍圖閣學士知杭州時諌官言蔡確在安州日作詩借郝處俊事以譏刺時事大臣議逐之嶺南軾密疏言朝廷若薄確之罪則於皇帝孝治爲不足若深罪確則於太皇太后仁政爲小損謂宜皇帝降敕推治而太皇太后特加寛貸如此則仁孝兩得矣宣仁后以爲然而不能用也杭瀕海水泉鹹苦唐刺史李泌始導西湖作六井民以足用及白居易復浚西湖引水入運河復引溉田至千頃湖水多葑自唐及錢氏後廢而不理至是葑積二十五萬餘丈而水無幾矣運河失湖水之利而取給於江潮潮水淤河泛溢闤闠三年一浚爲市井大患故六井亦幾廢軾始至濬茆山鹽橋二河分受江潮湖水造堰閘以時啟閉且以餘力復治六井民獲其利杭僧有淨源者居海濵交通舶客沽譽於髙麗元豐末其王子義天來朝因往拜焉至是源死其徒竊持其像往告義天亦使其屬來朝因言國母使以金塔二祝皇帝太皇太后壽軾不納而奏之曰髙麗乆不入貢失賜予厚利意欲來朝矣未測朝廷所以待之厚薄故因祭亡僧而行祝壽之禮若受而不荅則逺夷或以生怨因而厚賜之正墮其計臣謂朝廷宜勿與知而使州郡以理却之然庸僧猾商敢擅招誘外夷爲國生事漸不可長宜痛加懲創軾治杭有德於民民爲立祠召爲翰林學士承旨兼侍讀軾之自汝移常也受命於宋會神宗晏駕哭於宋而南至揚州常人爲軾買田書至軾喜作詩有聞好語之句言者妄謂軾聞諱而喜按驗無實軾復請外乃以龍圖閣學士知潁州徙揚州俄以兵部尚書召還兼侍讀親祀南郊爲鹵簿使導引駕入太廟有赭傘犢車并青蓋犢車爭道不避仗衞軾諭儀仗使李之純曰中丞職當肅政不可不以聞之純不敢言軾於車中劾奏之明日中使傳命申敕有司嚴整仗衞尋遷端明翰林侍讀二學士守禮部尚書髙麗遣使請書於朝許之軾曰漢東平王請諸子及太史公書猶不肯與今髙麗所請有甚於此其可與乎初許將建言三歳冬至天子親祀遍享宗廟祀天圜丘而其歳夏至方澤之祭乃止是遣上公則是皇地祗遂不在親祀之典乞下侍從臺諫及禮官議顧臨等議宜如祖宗故事范純禮等議昨罷合祭已合禮而又紛更恐失尊事神祇之意杜純等議請於苑中設望祀位置爟火於壇所俟躬祀南郊之歳則夏至北郊上公攝事每獻舉爟火以詔拜孔武仲等議請南郊專祀上帝議既不一軾奏曰古者祀上帝則并祀地祇矣詩曰昊天有成命郊祀天地也此乃合祭天地經之明文今議者欲冬至祀天夏至祀地蓋以爲用周禮也臣以謂今所行非周禮者不一而獨於地祇則曰周禮不當祭於圜丘此何義也議者必曰今之寒暑與古無異而宣王薄伐玁狁六月出師則夏至之日何爲不可祭乎臣將應之曰舜一歳而廵四嶽五月方暑而南至衡山十一月方寒而北至常山亦今之寒暑也後世人主能行之乎周所以十二歳一廵者唯不能如舜也夫周已不能行舜之禮而謂今可以行周之禮乎宣王以六月出師驅逐獫狁蓋非得已且吉父爲將王不親行也今欲定一代之禮爲三歳常行之法豈可以六月出師爲比乎議者必又曰夏至不能行禮則遣官攝祭此非臣之所知也周禮大宗伯若王不與則攝位鄭氏注王有故則代行其祭事賈公彦疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮也是無故而用有故之禮也議者必又曰省去繁文末節則一歳可再郊臣將應之曰古者以親郊爲常禮故無繁文今世以親郊爲大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟出郊冠通天乗大輅日中而舎百官衞兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏也事天則備事地則簡是於父母有隆殺也豈得以爲繁文末節而一切欲省去乎議者必又曰三年一祀天又三年一祭地此非臣之所知也三年一郊已爲疏闊獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壞欲復古而背古益逺神祇必不顧饗非所以爲禮也議者必又曰當郊之歳以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶抑變禮之權耶若變禮從權而可則合祭圜丘何獨不可十月親祭地十一月親祭天先地後天古無是禮而一嵗再郊軍國勞費之患尚未免也議者必又曰當郊之歲以夏至祀地祇於方澤上不親郊而通爟火天子於禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在境内而不在四郊者故逺望而祭也今所在之處俛則見地而云望祭是爲京師不見地乎此六議者合祭可否之決也詔令集禮官議未幾朝廷以合祭爲是罷議宣仁后崩哲宗親政軾乞補外以二學士知定州軾朝辭上書曰古之聖人將以有爲也必先處晦而觀明處靜而觀動則萬物之情畢陳于前陛下聖智絶人春秋鼎盛臣願虚心循理一切未有所爲黙觀庶事之利害與羣臣之邪正以三年爲期俟得利害之真邪正之實然後應物而作使既作之後天下無恨陛下亦無悔上下同享太平之利則雖盡南山之竹不足以紀聖功兼三宗之壽不足以報聖德由此觀之陛下之有爲惟憂太蚤不患稍遲亦已明矣臣恐急進好利之臣輙勸陛下輕有改變故進此說敢望陛下留神實社稷宗廟之福天下幸甚軾治定嚴軍政繕修營房禁止飲博軍中衣食稍足乃部勒以戰法衆皆畏服紹聖初御史論軾掌内外制日所作詞命以爲譏斥先朝落職知英州又以寧逺軍節度副使惠州安置貶瓊州别駕昌化軍安置徽宗即位移亷州改舒州團練副使徙永州未幾提舉玉局觀尋致仕卒於常州年六十六軾與弟轍皆師洵爲文洵晚讀易作易傳未究疾革命軾述其志卒以成書復作論語說最後居海南作書傳三書既成撫而歎曰後有君子當知我矣幼而好書老而不倦爲人篤於孝友輕財好施奬善詆惡蓋其天性其貶黄州也築室于東坡因自號東坡居士有東坡集六十卷奏議十五卷内外制十三卷和陶詩四卷子邁迨過俱善爲文邁仕不顯迨靖康初爲駕部貟外郎過終於通判定州有颶風賦思子臺賦行於世東都事略卷九十三上欽定四庫全書東都事略卷九十三下宋王稱撰列傳七十六下轍字子由與兄軾同舉進士又同舉直言轍因所問極言得失曰陛下即位三十餘年矣平居靜慮亦嘗有憂於此乎無憂於此乎臣伏讀制策陛下既有憂懼之言矣然臣愚不敏竊意陛下有其言耳未有其實也往者寳元慶歴之閒西羌作難陛下晝不安坐夜不安席天下皆謂陛下憂懼小心如周文王然自西方解兵陛下棄置憂懼之心二十年矣古之聖人無事則深憂有事則不懼夫無事而深憂者所以爲有事之不懼也今陛下無事則不憂有事則大懼臣以爲憂樂之節易矣臣疎逺小臣聞之道路不知信否近歳以來宫中貴姬至以千數歌舞飲酒優笑無度坐朝不聞諮謀便殿無所顧問三代之衰漢唐之季女寵之害陛下亦知之矣久而不止百蠧將由之而出内則蠱惑之所汙以傷和伐性外則私謁之所亂以敗政害事陛下無謂好色於内不害外事也今海内窮困生民愁苦而宫中好賜不爲限極所欲則給不問有無司㑹不敢爭大臣不敢諫執契持敕迅若兵火國家内有養兵之費外有北狄西戎之奉陛下又自爲一阱以耗其遺餘臣恐陛下以此得謗而民心不歸也考官胡宿請黜之仁宗曰以直言召入而以直言棄之天下謂我何得不黜歷商州大名府推官父喪服除時神宗立二年矣轍以書言事屬王安石初用以執政領三司神宗以轍爲屬安石欲行青苗法轍曰以錢貸民出納之際吏緣爲姦錢入民手雖良民不免妄用及其納錢雖富民不免違限恐鞭箠必用州縣不勝煩矣安石曰君言有理自此不復言青苗會河北轉運王廣廉言與安石合青苗法遂行安石召用謝卿材侯叔獻等八人欲遣之四方訪遺利中外知其必迎合生事然莫敢言轍以書抵安石力陳其不可安石怒奏除河南推官改著作佐郎僉書南京判官坐兄軾累謫監筠州酒稅起知績溪縣哲宗立以校書郎召未至除右司諫宣仁后臨朝用司馬光吕公著等欲革弊事而蔡確韓縝章惇皆在位窺伺中外憂之轍極言確等罪三人皆逐吕惠卿始諂事王安石倡行虐政及勢鈞力敵則傾陷安石甚於仇讎世尤惡之轍疏其姦惠卿安置建州初神宗於熙河路増置蘭州及米脂等五砦至是夏國屢遣使而未修貢二年使入境朝廷知其有請地之意而棄守議未決轍議許還五砦夏人遂服除起居郎中書舎人遷户部侍郎拜翰林學士權吏部尚書使契丹還爲御史中丞自元祐革新庶政至是五年矣一時人心已定惟元豐舊黨猶在近臣患之欲引用以平宿怨謂之調停轍奏疏曰親君子逺小人則主尊國安疏君子任小人則主憂國殆此理之必然未聞以小人在外憂其不悦而引之於内以自遺患也故臣謂小人雖不可任以腹心至於牧守四方奔走庶務無所偏廢可也若遂引之於内是猶患盜賊之欲得財而導之於寢室知虎豹之欲食肉而開之以坰牧無是理也且君子小人勢同冰炭同處必爭一爭之後小人必勝君子必敗何者小人貪利忍耻撃之則難去君子潔身重義沮之則引退古語曰一薰一蕕十年尚猶有臭蓋謂此矣先帝以聖智之資將以紀綱四方追跡三代而臣下不能將順造作諸法彼自知上逆天意下失民心今朝廷雖不加斥逐其勢亦不能復留矣尚賴二聖慈仁宥之於外蓋已厚矣而議者惑於說乃欲招而納之謂之調停此人若返豈肯但已哉必將戕害正人漸復舊事以快私忿人臣被禍蓋不足言臣所惜者祖宗朝廷也惟陛下斷自聖心不爲流言所惑毋使小人一進後有噬臍之悔則天下幸甚宣仁后覽奏謂宰執曰蘇轍疑吾君臣遂用邪正其言極中理又言牙前差役宜用雇法凡四事除尚書右丞遷門下侍郎時吕大防爲左相劉摯爲右相轍議西邊黄河事與劉吕不合初夏人來賀登極相繼求和且議地界議乆不決明年以兵襲涇原朝廷不問遣使往賜策命夏人以地界爲詞不復入謝且再犯涇原四年使復來議地界朝廷急於招納疆議未定先以歳賜予之而熙河將佐又背約侵築質孤勝如二堡夏人隨即平盪西邊騷然轍力言其非乞擇老將守熙河六年熙河奏夏人十萬騎壓境乞因其退軍擊之不須復守誠信轍謂大防曰今雖議此當先定議欲用兵耶不用兵耶大防曰如合用兵亦不得不用轍曰凡欲用兵先論理之曲直摯曰須用兵者亦不可固執轍曰今吾不直如此而可用兵乎明日轍奏曰熙河帥臣輒敢生事奏乞不守誠信乞加詰責宣仁后以爲然乃加戒敕七年夏人竟大入河東乃議絶歳賜禁和市使㳂邊諸路爲淺攻計分熙河進築定逺城夏人不能爭未幾復大入環慶復議使熙河進築汝遮中書侍郎范百禄不可會西人乞和議遂寢初元豐中河決大吳既而導之北流水性已順而文彦博等力主囘河之計轍爭之不能奪至是又論黄河東流之害凡三事八年都水吳安持乞於北流作軟堰定河流以免淤塡轍以爲不可及哲宗親政遣中書舎人吕希純殿中侍御史井亮采往視之二人歸極以北流爲便方施行而僉書樞密院劉奉世乞與河議奉世夲文彦博門下士也其言紛然吕井之議遂格而轍亦以罷政於是河流遂東凡七年而後北流遂通哲宗起李清臣爲中書侍郎鄧潤甫爲尚書右丞二人久在外不得志稍復言熙豐事以激怒上意會廷試進士清臣撰策題亦以爲言轍奏曰先帝以天縱之才行大有爲之志其所施設度越前古蓋有百世而不可改者至於其它事有失當何世無之父作之於前而子救之於後前後相濟此則聖人之孝也漢武帝外事四夷内興宫室財用匱竭於是修鹽鐵𣙜酤均輸之政民不堪命昭帝委任霍光罷去煩苛漢室乃定光武顯宗以察爲明以䜟決事上下恐懼人懷不安章帝即位深鑒其失貸之以寛夲朝眞宗右文偃革號稱太平而羣臣因其極盛爲天書之說章獻臨御攬大臣之議藏書梓宫以泯其迹及仁宗聽政絶口不言英宗自藩邸入繼大臣創濮廟之議及先帝嗣位或請復舉其事寢而不荅遂以安靜夫以漢昭帝之賢與吾仁宗神宗之聖豈其薄於孝敬而輕事變易也哉陛下若輕變九年已行之事擢任累歳不用之人人懷私忿而以先帝爲詞則天下殆矣哲宗曰卿安得以漢武比先帝轍奏曰漢武帝英主也哲宗曰卿所奏武帝外事四夷内興宫室財用匱竭豈得謂之英主轍遂乞罷出知汝州再責知袁州未至降朝議大夫分司南京筠州居住又責授化州别駕雷州安置移循州徽宗即位徙永州岳州已而復大中大夫提舉上清太平宫蔡京用事復降朝請大夫罷祠再復大中大夫致仕築室于許號潁濵遺老居許十餘年而卒年七十四追復端明殿學士轍所著詩春秋傳老子解古史欒城文集並傳于世子遲适遜臣稱曰受之於天超出乎萬物之表而充塞乎天地之閒者氣也施之於事業足以消沮金石形之於文章足以羽翼元化惟軾爲不可及矣故置之朝廷之上而不爲之喜斥之嶺海之外而不爲之愠邁徃之氣折而不屈此人中龍也轍之名迹與軾相上下而心閑神王學道有得是以年益加而道益邃道益邃則於世事愈泊如也不有所守而然哉東都事略卷九十三下
