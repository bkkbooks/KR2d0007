body:
  text: 東都事略卷九十七宋王稱撰列傳八十林希字子中福州人也舉進士調涇縣簿神宗朝知太常禮院皇后父喪太常議當服淺素希奏禮后為父降服朞今服淺素不經命使髙麗希辭行責監杭州樓房務嵗餘通判秀州復知太常禮院除著作佐郎遷禮部員外郎元祐初為祕書少監歴左右史召試中書舍人為言者論列而止改集賢殿修撰知蘇州久之以天章閣待制知杭州為禮部侍郎道除知亳州紹聖初以寳文閣直學士知成都府哲宗親政留為中書舍人修神宗國史兼侍讀哲宗嘗訪希神宗殿曰宣光前代有此名乎對曰此石勒殿名也乃更為顯承時方推明紹述盡黜元祐羣臣自呂大防劉摯蘇軾蘇轍等書命皆希為之初章惇用事嘗曰元祐初司馬光作相用蘇軾掌制所以能鼓動四方安得斯人而用之或曰希可遂下遷中書舍人惇仍許以為同省執政一日希草制罷擲筆於地曰壞了名節矣遷禮部尚書移吏部翰林學士拜同知樞密院事希怨惇不引為同省執政遂背惇於是出知亳州移杭州以端明殿學士知太原府遷資政殿學士徙大名上河東邊計三䇿尋奪職知揚州徙舒州卒年六十七追贈資政殿大學士諡曰文節蒋之奇字穎叔常州宜興人也舉進士又舉賢良方正科試六論祕閣及射䇿報聞除監察御史英宗立為殿中侍御史獻謹始五事一曰進忠賢二曰退姦邪三曰納諫諍四曰逺近習五曰閉女謁凡數百言初之奇游歐陽脩之門脩主濮議之奇盛稱之及是以浮語彈脩攷驗無實出監道州稅改宣州而之奇遂為清議所非新法行為福建路轉運判官遷淮東路轉運副使嵗饑募民興水利以食流民溉田九十餘頃如揚之天長三十六陂與宿之臨渙横斜三溝此其大者也又為江西河北陕西轉運副使之奇在陕西經賦入以給用度公私用足比其去庫緍八十餘萬邊粟皆支二年移淮南擢江淮荆浙等路發運副使元豐六年漕六百二十萬石至京師始建鑿泗州股渠以避長淮之險自是無覆溺者哲宗立除直龍圗閣陞發運使拜天章閣待制知潭州以御史有言降集賢殿修撰知廣州賊岑探攻陷新州之奇遣鈐轄楊從先討平之除寳文閣待制再為發運使改河北都轉運使知瀛州拜户部侍郎出知熈州之奇在邊務脩守備謹斥堠嘗若㓂至終之奇去羌不敢犯紹聖中知開封府擢龍圗閣直學士拜翰林學士兼侍讀諌官鄒浩以言事得罪之奇折簡别之責守汝州未幾知慶州徽宗即位復為翰林學士拜同知樞密院事進知院事沅州蠻擾邊之奇請遣将討之收其地為徽靖二州崇寜元年除觀文殿學士知杭州俄奪職以疾告歸提舉靈仙觀卒年六十四復觀文殿學士之奇為部使者十二任六典㑹府所至以治辦稱有文集雜著共百餘卷章楶字質夫建州浦城人也始以世父得象䕃為将作監主簿復舉進士甲科知陳㽞縣以最擢提舉荆湖北路刑獄稍遷直龍圗閣知慶州方是時朝廷戒邊吏毋得外侵乃更斥葭蘆安疆等四砦予夏人使歸我永樂之人楶以謂古者諸侯有罪貶爵削地甚則六師移之今既憚用兵宜稍取其土疆如古削地之制彼雖猖獗壤地褊小不過一再舉而勢蹙力窘矣夏人将㓂環慶楶命驍将将精兵授以方略又使人置毒於牛圈瀦水中既而虜入圍環州其所遣将折可適濳師洪徳城虜過識其母梁氏旗幟鼓譟而出斬千餘級虜經牛圈飲其水人馬多死明年除知同州紹聖初徙南京改集賢殿修撰知廣州又知渭州至即上言城瓠蘆河川據形勝以窺夏國乃以三月及熙河秦鳯環慶四路之師出瓠蘆河川築二城於石門峡江口好水河之隂二旬有二日而畢賜名平夏城靈平砦方興役虜以其衆乗我師大敗之擢樞密直學士既而環慶鄜延河東熈河皆築城夏人􅌓視不敢動實自涇原始無何夏國主與其母自将數十萬圍平夏不能克一夕遁去戎母慙􅋇面而還除龍圗閣學士夏國統軍嵬名阿理西夀監軍昧勒都逋皆勇悍善戰楶遣折可適郭成間以䡖騎夜直入其帳執之盡俘其家虜馘三千餘獲牛羊十萬種羌震駭進端明殿學士楶在涇原四年凡置州一城砦九夏人自平夏之敗不復能軍屢請命乞朝貢天子赦而聽之乃為寢兵徽宗即位徙知河南入見留提舉中太一宫遂拜同知樞密院事以老授資政殿學士中太一宫使未幾而卒諡曰莊簡陸佃字農師越州山隂人也舉進士稍遷集賢校理崇政殿說書同修起居注拜中書舎人給事中遷吏部侍郎哲宗即位修撰神宗實錄太常請復太廟牙盤食博士呂希純少卿趙令鑠皆以為當復佃言太廟用先王之禮於用俎豆為稱景靈宫原廟用時王之禮於用牙盤為稱不可易也卒從佃議請外以龍圗閣待制知潁州改鄧州未幾知江寜府紹聖初治實錄事坐落職知泰州改海州加集賢殿修撰知蔡州徽宗即位召為吏部侍郎修哲宗實錄遷尚書拜尚書右丞徽宗欲親祠北郊大臣以為盛暑不可徽宗意甚確既退皆曰上不以為勞當遂行之李清臣不以為然佃曰元豐非合祭而是北郊公之議也今反以為不可何邪清臣乃已御史中丞趙挺之以論事不當罰金佃曰中丞不可罰罰則不可為中丞其後諌官陳瓘上書曾布言其尊私史而壓宗廟布怒佃曰瓘書雖無取不必深怒若不能容是成其名也遷尚書左丞佃執政薦㧞人材多恬退者時臺章多論元祐時人佃曰姑以薄責一施之然後詔更不窮治如何布與章楶是其言後數日詔下以中大夫知亳州卒年六十一佃著書二百四十二卷多禮家名數之說如埤雅春秋後傳禮象等皆傳於世温益字禹弼泉州人也舉進士稍遷大宗正丞為工部員外郎諸王府記室參軍出知福州移潭州入為太常少卿除給事中兼侍讀於是左正言陳瓘論益守潭日鄒浩貶新州道其郡投宿僧寺益差兵卒逼浩登舟使冒風濤夜度范純仁劉奉世韓川吕希純吕陶皆貶湖南並為益所侵困當時大臣以為是而天下以為非陛下以此察之則益之為人可知矣今豈當為給事中哉遂以龍圗閣待制知開封府仍兼侍讀時執政建言上當為哲宗期從兄弟之服曾肇進讀史記至堯崩三年之喪畢因言堯舜嘗同出黄帝然世數已逺舜且為堯喪三年者舜甞臣堯故也益意附執政乃進曰史記世次不足信肇以史記世次禮記祭法大傳之說與益質於上前益語塞是嵗遷吏部尚書俄拜尚書右丞崇寧初遷中書侍郎卒年六十六益資詭譎始以濳邸舊僚進而阿附二蔡持論不正深為物議所貶吳居厚字敦老豫章人也舉進士第元豐初為提舉河北常平又為京東路轉運副使即萊蕪利國兩監官自鼓鑄贍足一路一日手詔謂今内外財計之臣政績著驗未有過居厚者即拜天章閣待制陞都轉運使又請鑄大錢以一當二嵗出二十萬緡佐闗陜兵食神宗曰居厚於分職之外䘏及它路非材智有餘不能爾居厚任職以辦治聞數被襃詔然民不勝其怨也元祐初朝廷稍更新法以寛大為政於是御史言居厚苛刻責散官黄州安置尋知廬州紹聖初知蘇州居數月以集賢殿修撰為江淮荆浙等路發運使旋復舊職疏支家河通漕楚海之間咸頼其利召入為户部侍郎權尚書滿二嵗為真加龍圗閣學士知開封府修奉永泰陵居厚為橋道頓遞使坐積雨滯留出知和州創将理院致毉藥使病者有歸多所全活後朝廷設坊安濟大槩如居厚所建云復龍圗閣待制為陜西都轉運使再尹開封除户部尚書拜尚書右丞遷中書門下侍郎大觀初請老以為資政殿學士東太一宫使坐謬舉左遷端明殿學士知亳州提舉鴻慶宫退居豫章築室東湖之上久之起守本郡徙帥河東過闕留為佑神觀使復拜門下侍郎知樞宻院事每從容與徽宗言遹追先烈在堅聖志又乞改重幣為當三以息貪夫盜鑄之患時遼使至居厚言於徽宗曰盟好不可違也願益敦信誓以安敵情徽宗嘉納焉上書納政以武康軍節度使知洪州踰年卒年七十九贈開府儀同三司安惇字處厚廣安軍人也以上舎釋褐為雅州司户參軍成都府教授除監察御史出為利州路轉運判官移夔州路又為荆湖北路轉運使徙江東路紹聖初召為國子司業改右司員外郎權吏部侍郎遷右諌議大夫惇黨附章惇而與蔡京比遂同奏元豐末司馬光劉摰吕大防交通中人陳衍於輔立之際隂懐異志衍坐誅元符初為御史中丞惇與蹇序辰看詳元祐訴理所公案惇奏凡得罪於元豐之間乞持出睿斷以勸沮天下由是復施行者千餘人又以文及甫與邢恕書授蔡渭使訟司馬光吕公著劉摰吕大防梁燾王巖叟劉安世等害其父確謀危宗社奪其子孫恩澤存者正反坐之法投之嶺外又奏元祐初置訴理所将熈豐以來斷過刑名輒行奏雪訕謗先朝歸怨君父其元看詳官劉摰孫覺胡宗愈傅堯俞等乞加罪悉皆坐謫徽宗召還鄒浩惇乃言浩先朝所棄不可復用國是所係不可䡖改於是左正言陳瓘論其罪惡以寳文閣待制知潭州尋褫職瓘復論訴理事與序辰並除名放歸田里以郊赦復官提舉太平觀知滁州召為工部侍郎既至遷兵部尚書崇寧二年拜同知樞密院事卒年六十三贈特進惇有子郊邦郊甞指斥乗輿為其族人所告坐棄市邦勒停涪州編管惇追貶單州團練副使政和間大臣建議恢復燕雲故地惇有妷堯臣上書論宦寺專命交結權臣共倡北伐之議以謂燕雲之役興則邊釁遂開宦寺之權重則皇綱不振昔秦始皇之築長城漢武帝之通西域隋煬帝遼左之師唐明皇幽薊之㓂其失如彼周宣王之北伐玁狁漢文帝之備守匈奴元帝納賈捐之之議光武斥臧宫馬武之謀其得如此我太祖皇帝撥亂反正躬擐甲胄當時将相大臣皆所與取天下豈勇略智力不能下幽燕兩州之殘㓂哉盖以兩州之地犬戎所必爭不忍吾赤子重困鋒鏑而已章聖皇帝澶淵之役以契丹來㓂不得已而與之戰戰而勝乃聽其求和遂與之盟逡廵引兵而退盖亦欲固邦本而不忍困民力也今者中外之人咸謂童貫深結蔡京同納燕人李良嗣以為謀主故建平燕之議臣恐異時脣亡齒寒邊境有可乗之釁狼子蓄銳伺隙以逞其所大欲此臣所以日夜為陛下寒心也伏望思祖宗積累之囏難鑒歴代君臣之得失杜塞邊隙矜守景徳舊好無使夷狄乗閒窺我中國上以安宗廟下以慰生靈徽宗然之命堯臣以官而惇於是亦追復正奉大夫東都事略卷九十七
