body:
  text: 東都事略卷一百十四宋王稱撰儒學傳九十七李覯字泰伯旴江人也以文章知名通經術四方從學者常數百人素不喜孟子以為孔子尊王孟子教諸侯為王嘗試制科六論不得其一曰吾書未嘗不讀必孟子注疏也擲筆而出人為檢視之果然終不中第泰伯有富國彊兵之學著禮論易論明堂書行於世以海門簿召赴太學說書以卒其所為文十七卷號退居類藁嘗自述曰天將壽我與所為固未足也不然斯亦足以藉手見古人矣時以其言為然蘇洵字明允睂州睂山人也數舉進士賢良不中當至和嘉祐間與其二子軾轍至京師歐陽脩得洵書二十篇大愛其文辭以為賈誼劉向不過也以其書獻諸朝公卿士大夫爭𫝊之其二子同舉進士又同登制科一日父子𨼆然名動京師而蘇氏文章遂擅天下一時學者皆尊其賢學其文以為師法以其父子俱知名號為老蘇脩既上其書得召試而洵不就除試挍書郎是時王安石名始盛歐陽脩勸洵與之游而安石亦願交於洵洵曰吾知其人矣是不近人情者鮮不為天下患乃作辨姦一篇其文曰事有必至理有固然惟天下之静者乃能見微而知著月暈而風礎潤而雨人人知之人事之推移理勢之相因其疎闊而難知變化而不可測者孰與天地隂陽之事而賢者有不知其故何也好惡亂其中而利害奪其外也昔者山巨源見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今而言之其理固有可見者以吾觀之王衍之為人容貎言語固有欺世而盜名者然不忮不求與物浮沉使晉無惠帝僅得中主雖衍千百何從而亂天下乎盧杞之姦固足以敗國而不學無文容貌不足以動人言語不足以眩世非徳宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人口誦孔老之言身履夷齊之行収召好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而隂賊險很與人異趣是王衍盧杞合而為一人也其禍豈可勝言哉夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣臣虜之衣食犬彘之食囚首喪面而譚詩書此豈其情哉凡事不近人情者鮮不為大姦慝豎刁易牙開方是也以盖世之名而濟其未形之患雖有願治之主好賢之相猶舉而用之則其為天下患必然而無疑者非特二子之比也孫子曰善用兵者無赫赫之功使斯人而不用也則吾言為過而斯人有不遇之歎孰知禍之至于此哉不然天下將被其禍而吾獲知言之名悲夫後十年而安石用事其言乃信洵既命以官會太常脩纂建隆以來禮書乃以為文安簿與項城令姚闢同脩太常因革禮仁宗山陵事從其厚公私騷然洵言於韓琦曰昔華元厚𦵏其君君子以為不臣與其取厚𦵏之名曷若建薄𦵏之議上以遂先帝恭儉之徳下以紓百姓目前之患内以解華元不臣之議琦謝之為省其過甚者禮書既成未報而洵卒年五十八英宗聞而哀之特贈光禄寺丞有文集二十卷諡法三卷洵晚而好易曰易之道深矣汨而不明者諸儒以附會之說亂之也去之則聖人之㫖見矣作易傳書未成而卒王囘字深父福州侯官人也惇行孝友質直平恕造次必稽孔孟所為而不為小㢘曲謹以求名譽於世嘗舉進士中第為衛真簿於事有所不合稱病自免乆之不肯仕在廷多薦之者命知南頓縣會卒年四十二有文集二十卷回經術粹深王安石曾鞏與為深交而當時時之士亦以為雖漢之儒林不能過也周敦頤字茂叔舂陵人也初名惇實始以䕃為將作監主簿調南安軍司理參軍南安囚法不當死轉運使欲深治之敦頤爭不勝投其告身以去曰如此尚可仕乎殺人以媚人吾不為也轉運使感悟囚卒不死後為通判永州用吕公著薦擢廣南東路轉運判官移提㸃刑獄以病求知南康軍病且劇上南康印分司南京敦頥酷愛廬阜買田其旁築室以居號曰濂溪卒年五十七敦頥倡明道學程珦嘗與為友珦之二子顥頥聞敦頥論道遂厭科舉之業慨然有求道之志敦頥嘗著通書行于世子燾為寳文閣待制張載字子厚長安人也學古力行篤志好禮為關中士人所宗世所謂横渠先生者也少時喜談兵年十八以書謁范仲淹仲淹責之曰儒者自有名教可學何事於兵因勸學中庸載感其言益竆六經至釋老書無不讀與程顥程頥講學舉進士為祁州司法參軍雲巖令呂公著言載與弟戩有古學神宗召見問以治道對曰為政不以三代為法者終茍道也除崇文檢書它日見王安石問以新政所安荅曰公與人為善則人將以善歸公如教玉人琢玉則有不受命者矣以疾求去遂築室南山下敝衣疏食専精治學其大意以為知人而不知天為賢人而不為聖人自秦漢以降學者之大敝也故其學尊禮貴徳安命樂天時有以為難者載持其論不變也從其學者皆備弟子之禮其家昬喪葬祭率用先王之意略以今禮行之召還同知太常禮院議禮於有司又不合復以疾請歸道病卒其門人欲諡為明誠中子以諡議質諸程顥顥以問司馬光光以書復顥曰子厚平生用心欲率今世之人復三代之禮者也郊特牲曰古者生無爵死無諡爵謂大夫以上也檀弓記禮所由失以謂士之有誄自縣賁父始子厚官比諸侯之大夫則宜諡矣然曾子問曰賤不誄貴㓜不誄長禮也唯天子稱天以誄之諸侯相誄猶為非禮况弟子而誄其師乎孔子之沒哀公誄之不聞弟子復為之諡也今諸君欲諡子厚而不合於古禮非子厚之志與其以陳文範陶靖節王文中子孟貞曜為比其尊之也曷若以孔子為比乎惟伯淳折衷之載著正蒙一書行于世弟戩戩字天祺少孤質性莊重舉進士為閿郷簿知金堂縣誠心愛人既去而人思之熈寜初以太常博士召為監察御史裏行毎進對必陳古道務引大體不舉苛細上疏論王安石變法非是乞罷條例司及追還提舉常平使者不報并劾曾公亮陳升之趙抃依違不能捄正及韓絳代升之領條例司戩上言絳左右徇從安石與為死黨遂參政柄李定邪諂自幕官擢臺職陛下惟安石是信今輔以絳之詭隨臺臣又得李定之比繼續其來芽蘖漸盛臣豈敢愛死而不言哉又言吕惠卿刻薄辯給假經術以文飾姦言附會安石惑誤聖聽不宜勸講君側章數十上最後言今大惡未去横斂未除不正之司尚存無名之使方擾臣自今更不敢赴臺供職又詣巾書爭之聲色甚厲曾公亮俛首不荅王安石以扇掩靣而笑戩曰戩之狂直宜為參政所笑然天下之人笑參政者亦不少矣遂稱疾家居待罪出知公安縣監鳯翔府司竹監卒年四十七程顥字伯淳西洛人也父珦大中大夫顥舉進士為鄠縣簿又調上元簿晉城令吕公著為御史中丞薦為監察御史裏行前後進説甚多大要以正心窒欲求賢育才為先神宗嘗使推擇人材顥所薦十數人而以張載與其弟頥為首嘗言人主當防未萌之欲神宗拱手曰當為卿戒之時王安石日益信用顥毎進見必陳君道以至誠仁愛為本未嘗及功利安石寖行其説顥意多不合事出必論列數月之間章數十上尤極論者輔臣不同心小臣與大計公論不行青苗取息諸路提舉官多非其人京東轉運司剥民希寵興利之臣日進尚徳之風寖衰凡十餘事以言不行求去除京西提㸃刑獄復上章請罷改僉判鎮寜軍監西京路河竹木務知扶溝縣坐囹圄囚逸鄰邑者罷監汝州酒稅哲宗立召為大宗正丞未行而卒年五十二始顥從周敦頥論學故其言曰道之不明異端害之也古之害近而易知今之害深而難辨昔之惑人也承其迷暗今之入人也因其高明自謂之窮神知化而不足以開物成務名為無不周徧而其實乖於倫理雖於窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此自道之不明也邪誕怪異之說競起塗生民之耳目溺天下於汚濁雖髙才明智膠於見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道神宗嘗問顥曰王安石何如人也顥曰安石博學多聞則有之守約則未也又問是聖人否顥曰詩稱周公公孫碩膚赤舄几几聖人蓋如此安石剛褊自任聖人豈然哉顥有經濟之術不幸早死太師文彦博表其墓曰明道先生云弟頤頥字正叔以經術為諸儒倡四方從之游者甚衆哲宗即位司馬光吕公著上其行義于朝授汝州團練推官西京國子監教授頥力辭又以為校書郎召至京師除崇政殿説書頥上疏曰帝王之學大略謂習與智長化與心成今士大夫善教其子弟者亦必延名徳端方之士與之處使薫陶成性以陛下春秋之富雖睿聖得於天稟而輔飬之道不可不至大率一日之中接賢士大夫之時多親寺人宫女之時少則自然徳器成就乞擇賢士入侍勸講凡左右扶持嬪御内臣並選四十以上厚重小心者侈麗之物不接於目淺俗之言不入於耳嵗月積乆必能飬成聖徳又謂經筵臣僚侍者皆坐講者獨立於禮未安乞令坐講見主上重道之心頥在經筵以師道自居毎侍講色甚莊繼以諷諫頥聞哲宗在宫中盥而避蟻因講罷請曰有是乎哲宗曰然誠恐傷之耳頥曰推此心以及四海帝王之要道也神宗未除喪冬至百官表賀頥上疏以謂節序變遷時思方切恐失居喪之禮無以風化天下乞改賀為慰故事盛暑罷講至中秋復講頥奏朝廷置勸講之官輔導人主豈可闊疎如此今講讀官五員皆兼要職獨臣不領他官近復差脩國子監太學條例是乃無一人專職輔導者一日頥赴講會哲宗瘡疹不坐已累日頥退詣宰臣問曰上不御殿知否曰不知頥曰上疾而宰相不知可為寒心翌日宰相以頥言奏遂詣問疾於是左諫議大夫孔文仲言頥以為騰口間亂遂罷職監西京國子監父喪服除尋以直祕閣判西京國子監主管崇福宫紹聖中黨論興頥坐追官涪州安置元符末放還崇寜初復判西京國子監屛居伊闕山數年卒年七十五學者尊之稱為伊川先生其門人游酢謝良佐吕大臨楊時皆著名于世有易傳六卷文集二十卷諸經解説未成編者附于集臣稱曰中庸之書孔氏之心學也自孟軻死不得其𫝊焉宋興洪儒間出以經術名世者蓋多矣至二程氏乃始推原正心誠意之㫖以續千古之絶學其有功於聖人之道者耶使學者能探賾索隱以窺其奥斯盡善矣而迺不求其本而循其末言性理則蕩而為浮虗慕誠敬則流而為矯偽聖人心學之妙豈有是哉今之學者欲探程氏之秘而求所謂正心誠意者當以是而思之顔復字長道先師兖公四十八世孫也父太初字醇之為東魯名儒嘗為國子監直講出為臨晉簿最後掌南京學以卒年四十餘嘉祐中訪有道之士京東部使者以復應詔命為校書郎知永康縣召拜國子監直講乆之擢太常博士言士民禮樂不立請降彞制又乞詔禮官攷正祀典遷吏部員外郎孔宗翰乞尊奉孔子祠復因上五議一曰專其祠饗二曰優其田禄三曰復其廟幹四曰司其法則五曰訓其子孫朝廷多從之元祐中為起居郎兼侍講請擇經行之儒補諸縣教官處士于學攷其志業不由教官保任不得與貢舉升太學召試中書舍人兼權國子祭酒言太學諸生有誘進之法獨教官未嘗旌别似非嚴師勸士之道以天章閣待制充國子祭酒卒年五十七子岐龔原字深父處州遂昌人也舉進士調潁州司法參軍神宗朝為國子監直講哲宗即位為國子監丞遷太常博士會議秦悼王之後應襲封者原曰禮立嫡長而襲以嫡尊正統也今秦王嫡絶立庶自合禮令議夏至親祀北郊原曰合祭非禮也願罷合祭改徐王府記室加祕閣校理出為兩浙轉運判官紹聖初召為國子司業遷祕書少監改起居舍人權中書舍人以集賢殿脩撰知潤州徽宗即位入為祕書監兼侍講遷給事中初哲宗崩大臣引開寳故事謂上當服齊衰朞原上疏言三年之喪自天子至於庶人一也出知南康軍改壽州掦州召為工部侍郎移兵部除寳文閣待制知廬州陳瓘彈蔡京原坐與瓘友善落職和州居住起知亳州命下而卒年六十七始原力學以經術尊敬王安石始終不易也有文集七十卷易傳春秋解論語孟子解各十卷游酢字定夫建州建陽人也兄醇與酢俱以文行知名酢初受業于程顥顥知扶溝縣以道學為已任酢為掌其事由是問學益進又事程頥頥器之舉進士為蕭山尉除博士僉判泉州召為監察御史尋知河州又知濮陽軍歴舒濠二州卒年七十一有中庸義易説二南義語孟新解各一卷文集一卷王當字子思眉州眉山人也㓜好學不治章句博覽古今所取惟王佐大略常謂三公論道經邦燮理隂陽鎮撫四夷親附百姓皆出於一道其言之雖大其行之甚易嘗舉進士不中退居田野間歎曰士之居世茍不見其用必見其言遂著春秋列國名臣傳五十卷人競傳之元祐中蘇轍以賢良方正薦之廷對慷慨不避權貴䇿入四等調龍遊尉蔡京知成都府舉為學官當不就其後京相而當不復仕矣卒年七十二當於經學尤䆳易與春秋皆為之𫝊得聖人之㫖居多又有經㫖兩卷史論十二卷兵書十二篇陳暘字晉之福州人也兄祥道字用之元祐中為太常博士祕書省正字其學深於禮著禮書一百五十卷又有詩書解傳於學者暘紹聖中中制舉徽宗即位除太學博士遷正字祥道既著禮書𤾉亦著樂書貫穿詳備遷太常丞禮部員外郎時有用京房二變四清論樂者賜曰五聲十二律樂之正也二變四清樂之蠧也二變以變宫為君四清以黄鍾為君事以時作因可變也而君不可變太簇大吕夾鍾或可分也而黄鍾不可分豈古人所謂尊無二上之㫖哉遷鴻臚太常少卿擢禮部侍郎以顯謨閣待制罷提舉洞霄宫卒年六十八有樂書二十卷禮記解義十卷孟子解義十四卷北郊祀典三十卷東都事略卷一百十四
