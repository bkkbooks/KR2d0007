body:
  text: 東都事略卷一百二十一宋王稱撰宦者傳一百四童貫開封人也始出李憲之門性巧媚自給事宫掖善測人主意元符末徽宗置局於錢塘且訪求古法書圖畫之屬貫以内供奉主之蔡京方謫居與之游京有能書名自書屏障扇帯階貫以進逾年入為尚書左丞京徳其輔已既相始開邊議收復青唐起王厚為經略使合諸道兵十萬用李憲故事命貫為監軍師行及敵會禁中火徽宗以手書驛止貫貫視之遽納靴中厚訪其故貫曰上促成功耳竟出師遂復湟中及鄯廓等州由内客省使除景福殿使澧州觀察使内臣寄資轉行至兩使自此始也俄為熈河蘭湟秦鳯等路經略安撫制置使累遷武康軍節度使中太一宮使出討溪哥臧征僕哥復積石軍洮州以功徙鎮奉寧時大觀二年也貫恃功稍自専軍政選置將吏官屬皆取中旨不復干朝廷寖忤京意徽宗欲除貫開府儀同三司京曰貫以宦者建節鉞過矣使相豈所當得邪乃止自是兩人始交惡政和初奉使契丹移鎮武信時京已罷相使人言於徽宗曰遣使以宦者為之是中國為無人矣無乃為敵所窺乎徽宗報曰敵人以貫破青唐名聞四夷欲見之耳彼要我因覘之不亦可乎敵方肆縱故貫所齎皆殊異珍腆雖二浙髹蕂之具悉遺之務以瓌侈相誇使還益用事廟謨兵柄皆屬焉初夏國恃横山諸族強勁善戰與中國抗自种諤靈州戰不利李憲始圖進築不克行貫欲成憲謀遂領六路邊事以太尉為陜西河東河北宣撫使遷開府儀同三司權僉書樞宻院河西河北兩房事於是徽宗曰元豐官制樞宻院官置知院同知院事其僉書院事未嘗除授趙瞻王巖叟劉奉世並係元祐差除今童貫宣撫陜西等路帯行僉書與官制有礙貫見係儀同即宰相之任也可改為權領樞宻院事改鎮威武寧江拜太保河中節度使遷太傅厯山南東道劔南東川二鎮封益國公貫將諸道兵六七年窮討深入立軍壘建堡砦平陽瞎令古仁多泉臧底河及築靖夏制戎伏羌等城以至蕭關故骨龍砦斥池置烽燧扼據要害謂可制西賊死命逼大將劉法使北取朔方法不可貫曰君在京師時親受命於上前自言必成功今乃以難告何也法不得已引軍出塞夏人伏兵擊殺之貫隠其敗而以捷聞使百官入賀議者切齒而莫敢言關右為之擾然夏人亦大困乃因遼人納欵請和且以誓表進許之前所未有也已而夏使來賀生辰授以誓詔辭不取貫莫能屈但嚴廹舘伴使強之而去還及境遂棄之以歸延安帥賈炎得而表上之貫始大沮祖宗法屬羌不授漢官有功則於蕃官轉遷至是則引拔之或至節度使弓箭手有分地得以保其鄉里墳墓至是則皆使居新邊禁軍逃亡者罪至死不貸至是則許改刺别軍邊備軍政自貫壊矣貫之使遼也燕人有馬植者得罪於其國閒道邀貫為言取燕之䇿貫信之約其來歸至則藏之家奏賜姓名為趙良嗣即條上平燕之䇿大氐謂雲中根本也燕薊枝葉也當分兵撓燕薊而後以重兵取雲中選使由登州聘金國於海上議夾攻遼取燕雲十四州地使者徃返項背相望貫因選西師宿將㑹京師又令環慶鄜延軍與河北禁軍更戍儲兵糧備戰具植旗伐鼔剋日以發會方臘叛命貫南討以為江浙淮南等路宣撫使傾所聚兵以徃徽宗以賊熾為慮親握貫手送之曰東南事盡以付汝不得已者徑以御筆行之貫至浙部知華石綱為民害命其屬董耘草詔罷去之民大恱臘亦就擒以功進太師封楚國公復宣撫陜西河東河北路貫方被命討賊滯留東南而金人使至徽宗頗悔結約貫黨待之湏其歸請益卒徽宗意遂決宣和四年女真報遼主延禧敗走邀我師夾攻於是貫統諸將兵十五萬屯近邊至雄州遣張寳趙忠諭耶律淳舉國内附淳執二人斬之又令人諭易州土豪史成獻其地成執以送燕亦斬之復募馬擴齎軍書入燕遼將大石林牙者謂王介儒曰過河語童貫欲和即還作善鄰不欲和請以軍相見毋令諸軍徒苦也遂遣种師道及髙陽帥和詵全兵駐白溝楊可世輕兵趨蘭溝甸淳益兵二萬度溝挑我軍詵堅壁自守貫廹令退師師道力陳兵可進不可退敵壁相銜退必遭襲貫再三趨之不得已軍卻大風雪及之敵以敗盟責我追我軍至古城南而還以遼人尚強未易圖乃以探報不實歸罪於詵奏黜之遣劉韐即驛與介儒議再脩好徽宗聞之亦詔班師命諸將分屯貫自瓦橋關還時蔡攸以副使至河間聞淳死郭藥師以涿州降軍勢稍振貫復趨雄州宰相王黼力主再興師之議悉諸路兵二十萬㑹三關詔貫攸毋歸異議者斬遼后蕭氏遣使奉表稱蕃乞損嵗幣以復舊好貫怒其不納土麾而去之督劉延慶入新城劉光世入易州郭藥師精騎由間道襲燕已而敗績諸將殺楊可世以降延慶氣奪不能軍退師敵益張追奔至涿州舒左右翼包之我師復大敗自熈寧以來累世所積軍實埽地盡矣貫再舉取燕不能下懼無功狀以歸又宻遣趙良嗣等使金人圖之金人已取燕志益驕使四五徃返邀索不已卒以遼人舊嵗幣為數四十萬又益以六州代稅緡錢百萬奉誓書以徃方命交地五年貫與攸以兵入之先曰交割後曰撫定僅令諸將脩隍塹列蹊隧定疆畛問疾收胔止舎少休燕之金帛子女職官民戸悉為金人席卷而去蓋殫國力以數百萬計所得者空城而已貫上表告功落節鉞為真太師加封徐豫國公遂乞上尊號徽宗不許越兩月命貫致仕金人再取蔚州入飛狐靈丘兩邑且絶交山後之議眀年復起貫領樞宻院事河北燕山府路宣撫使如太原又眀年封廣陽郡王未㡬邊遽至尼堪將南侵貫遣馬擴辛興宗徃聘窺之敵以納張覺責我且馳使太原告相國已興兵貫厚禮之且曰如此大事何不素告我使者令貫速割河東北以河為界貫聞之氣褫摶手無他䇿亟謀還太原帥張孝純譙之曰金敵渝盟大王當會天下兵極力榰梧今大王去人心搖矣是舉河東與賊也河東為賊有河北亦豈能保邪貫怒叱之曰貫受命宣撫非守土臣欲留貫置帥臣何為孝純撫掌歎曰平時重太師作幾許威望及臨事乃畏懾如此身為大臣不能以死排難止欲奉頭䑕竄何面目見天下之人乎貫甫至京師而敵騎已長驅向闕欽宗即位徽宗居於龍徳宫貫賛徽宗南廵倉皇扈從載其帑銜舳擁兵自衛㳂汴而下徽宗方過浮橋隨駕衛士攀望號慟貫擁徽宗以行惟恐不速令親兵引弓射之衛士中矢而踣者百餘人聞者莫不扼腕而流涕於是諫官御史至於國人交章論其罪請誅之先貶為左衛上將軍池州居住連謫昭化軍節度副使吉陽軍安置行未至下詔數其十罪命監察御史張澂迹其所至誅焉追至雄州涖斬之家屬皆徙吉陽貫握兵二十年權傾四方奔走期㑹過於詔敕道路目語莫敢誰何以鐡錢夾錫錢行之關陜恐物價不平錢有輕重乃下脇制削其直民告病知永興軍徐處仁以為言至有餓殺長安一城之歎監司迎貫指聞之朝處仁反以罪去其後論者疏貫六事選方劭以察訪亷之貫宻伺劭動静先得以白於徽宗及劭入奏每一事徽宗隨折之曰卿不知是事乃朕處分也劭因盡暴貫惡貫益銜之以它事中劭劭竟得罪終身不復起貫狀魁梧偉瞻視頷下有十數莖湏皮骨悉如鐡略不類閹臣然頗疎財後庭自妃嬪而下及内侍無大小致餉無虛月凡上左右交口稱譽一詞寵煽赫然乃至隂謀搖東宫聲燄震天下服食逼乗輿金寳充私室又招伉健少年萬人號勝捷軍以為親兵環列第舎持兵呵衛僣擬宫省一時蹈利樂禍之人趨附成市侯王柄臣多出其門厮䑓賤役自承宣使而下凡數百人庖夫廐兵亦官至防團刺史惡稔釁盈卒以起戎貽禍毒流四海初貫自太原還京師也勝捷軍統制官張師正在河北與金人相遇潰而南至大名帥李彌大斬以徇勝捷軍懐不自安又聞貫已誅死有大校李福者率以為亂遂犯濮州趍長清肆掠淄青閒脅從影附者至四萬人所過無噍類至章丘縣臨城問曰童大王有何罪而朝廷殺之章丘吏民乗城言曰此自朝廷䖏分非小邑罪也遺以牛酒乃捨去自濟南而東彌大遣裨將韓世忠以所部五百襲擊之至臨淄河世忠令其衆曰前則有功退則有死有怯敵而退者後騎得殺之以為功士皆殊死戰遂斬福首餘棄甲而遁世忠追之群賊猶萬餘世忠逐北殺其為首者六人單騎入其軍倡言曰我軰皆西人平生唯殺畨賊㡬曽作賊邪官家使我招汝若能降悉赦汝罪皆拜服請命曰願赦我遂掃營來降臣稱曰宦者之職本以服役掃洒主通内外之禁而時君世主必狎而親之故雖寵任之篤則亦無有命以旄鉞者自一童貫領節制而踵之者數人位三師而為公孤者亦相繼焉蓋自古未有也矧貫隳藝祖之軍制敗章聖之盟誓其為罪也雖百世不磨矣於虖貫以腐夫庸人而任以大臣之事疏以王爵之封志得意驕自貽顛覆尚何逃鈇鉞之誅哉梁師成開封人也以小璫進慧黠習文法稍知書得𨽻書藝局為睿思殿文字外庫専主出外𫝊上㫖政和間遂得君貴幸至竄名進士籍中積遷晋州觀察使興徳軍留後直宣和殿眀堂建以為都監俄拜節度使加中太一宫使歴鎮䕶國河東以太尉提舉眀堂宣和四年進開府儀同三司淮南節度使又進少保時中外大寧徽宗留意禮樂符瑞事師成特以頴悟善逢迎㤙寵徽宗凡有御筆號令皆命主焉於是入處殿中多擇善吏習倣奎畫雜詔㫖以出外廷莫能辨隂竊用人之柄權勢熏灼一時耆進之徒爭趍之宰相王黼事之如父執政侍從出其門者不可勝紀王安中為翰林每草師成制必為好辭褒頌功徳時人謂之王内相上師成啓事云始童貫自謂韓琦遺腹而師成亦以為蘇軾出子至訴於徽宗曰先臣何罪先是天下禁誦軾文章其尺牘在人間者皆藏去至是始復出黼建伐燕山議廷臣多以為不可唯師成力為之助能决上意晚年益通賔客招賕賂士人納錢數千緡即令赴廷試以獻頌上書為名而官者至百餘人及倡第之日侍於上前奏請升降皆出其口其小史曹組儲宏者亦登第而宏執厮養之役如初李彦括民田於河北京東西所至倨坐黄堂監司郡守皆列侍有言之於徽宗者師成適在側抗聲曰王人雖㣲序於諸侯之上此春秋法也豈足為過哉言者懼而止師成貌若不能言然隂賊險佷伺間即發後徽宗幸黼第見其側有複門通師成家因就詣之盡悟其交結狀遂罷黼相師成由此益絀初欽宗在東宫鄆王楷頗有奪嫡意或言師成獨保䕶太子欽宗受内禪靖康初徽宗東廵舊人多從行獨師成以舊恩留京師言者論其惡欽宗廹於公議黜為彰化軍節度副使行一日追殺之後籍其家臣稱曰設科以待士有國者之盛典也昔之人蓋有致位宰相而不由進士以為終身之憾者矣亦有自科第奮而為宰相猶稱前進士者矣以是觀之擢進士者豈不貴且重哉一梁師成竄名進士籍中是朝廷之上恬然以宦寺而齒士大夫也而儲宏軰又因師成以得第是又以皁𨽻而加諸士大夫之列也於此之時士之無恥者與之叙同年而不以為恥何哉豈非名噐之濫而至於是與抑亷恥道消而以為當然者與何昔以為重而今輕之若此與不然何為而舉世不以為非也烏虖斯人進則士之被褐懐玉皆嫉世而逺去矣可勝歎哉東都事略卷一百二十一
