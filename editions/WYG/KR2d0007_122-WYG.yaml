body:
  text: 東都事略卷一百二十二宋王稱撰僭偽傳一百五張邦昌字子能永静軍東光人也舉進士為瀛州教授召為校書省正字累擢太常少卿改起居舎人拜中書舎人給事中遷大司成會生徒犯灋邦昌坐訓導無素罷提舉崇福宫知光汝二州乆之以右文殿脩撰知洪州入為禮部侍郎翰林學士宣和元年除尚書右丞改左丞遷中書侍郎當王黼用事與童貫共起邊釁以致金人分道入侵斡里雅布以兵嚮京師邦昌不持可否於其間時論罪之徽宗既禪位於欽宗靖康元年拜少宰兼中書侍郎金人犯京師遣李梲鄭望之使斡里雅布金人欲割三鎮之地又欲親王宰相為質時肅王及康王居京師欽宗退朝康王入毅然請行即以為軍前計議使以邦昌副之遂詣敵營會姚平仲議夜叩敵砦欲生擒斡里雅布奉康王以歸而其謀泄未發金人知之先事設備及平仲率歩騎萬人夜劫砦以敗還斡里雅布以責邦昌邦昌曰非朝廷意恐四方勤王之師各奮忠義自結集為此舉耳斡里雅布曰謂為賊邪焉得如許之衆相公但可諉謂朝廷不知耳良乆罷遣歸金人不欲留康王更請肅王同邦昌以去尋以邦昌為太宰兼門下侍郎未㡬除觀文殿大學士光禄大夫中太一宫使是嵗金人再犯京師二年欽宗出郊而吴幵莫儔自敵營持文書至令依金主詔推薦異姓堪為人主者從軍前備禮䇿命孫傅張叔夜讀詔號慟即以懇請乞立趙氏金人以非其主意却之幵儔督脅道君皇帝皇后皇太子出郊且督舉異姓於是召百官會議時都城先閧𫝊中已定立張邦昌抑令城中百官父老僧道僉狀推舉不即屠城左司員外郎宋齊愈適自外至或問以敵意所主齊愈冩張邦昌三字示之既與所𫝊符合議遂定議狀云自古受命之主必上膺圖籙下有勲徳在民或權強近臣或英豪特起有大材略因而伯有天下方為人所樂推今來大國臣僚如孫傅等召自外方被用日淺率皆駑下詿誤趙氏以至亡國人皆懐怨方且俯伏謹俟大誅若付之土地俾備藩屏必為百姓忿疾立至變亂上負選用之意今在内官僚委無其人乞選用張邦昌以治國事如別有道徳隆茂為天命之所歸者乞賜選擇金人取孫傅張叔夜赴軍前獨御史中丞秦檜以狀論列云檜身為禁從職當䑓諫荷國重㤙甚愧無報今大金擁重兵臨已㧞之城操生殺之柄必欲易姓檜盡死以報非特忠其主也且得言兩國之利害耳趙氏自祖宗以至嗣君百七十餘載頃緣姦臣敗盟結怨鄰國謀臣失計誤主䘮師遂致生靈被禍京都失守皇帝至出郊求和於軍前兩元帥既允其議已布聞於中外矣且空竭帑藏居民之所積追取鑾輿服御之所用割兩河之地以通和好今乃變易前議人臣安忍畏死而不論哉且宋之於中國號令一統緜地數萬里徳澤加於百姓前古未有也興亡之命雖在天有數豈以一城而决廢立哉竊觀今日計議之士多前日大遼亡國之臣畫䇿定計所以必滅宋者非忠於大金也特假威以報怨耳頃道君誤聽姦人因李良嗣父兄之怨滅契丹盟好之國乃有今日之難然則因人之怨以滅人之國其禍可勝言哉議者又必曰滅宋之䇿在絶兩河懐舊之思除鄰國復仇之志而已又曰大金兵威無敵天下中國之民可指麾而定大金果能滅宋兩河懐舊之思亦不能忘如其不能忘徒使宗屬賢徳之士倡議天下竭國力以北向則兩河之民將去金國而歸宋矣且天生南北之國方域至異也晋為契丹所滅周世宗復定三關是為晋報恨然則今日豈必趙氏然後復仇哉中國英雄亦將復中國之恨矣大金自去嵗用師中國入境征戰已踰嵗矣然所攻必克者無他以大金乆習兵革中國承平百年士卒罕經戰陳將帥未得其人也使異日士卒精練將帥得人大金能必其勝負哉且世之興亡必以有徳而代無徳以有道而易無道然後皇天祐之四海歸之若張邦昌者在道君時附會權幸之臣共為蠧國之政今日社稷傾危生民塗炭雖非一夫所致亦邦昌為之之力也天下之人方疾若仇讐若付以土地使主人民四方英豪必共起而誅之終不足以為大金屏翰矣如必立邦昌則京師之民可服而天下之民不可服京師之宗子可滅而天下之宗子不可滅也檜不顧斧鉞之誅戮族之患為元帥言兩朝之利害望稽考古今深鑑忠言復嗣君之位以安四方之民非特大宋䝉福亦大金萬世之利也金人怒取檜以去吴幵莫儔至報邦昌將入城於是治尚書令聽事及西府以待之敵使來趨班邦昌欲自裁或曰相公城外不死今欲以死塗炭一城耶衆又泣勸再三乃止金人奉冊寳以三月丁酉立邦昌邦昌北望拜舞跪受冊曰咨爾張邦昌冝即皇帝位國號大楚都金陵邦昌受冊訖遣閣門傳令勿拜王時雍帥百官遽拜邦昌立囬身面東拱手而立以吏部尚書王時雍權知樞宻院事兼領尚書省翰林學士承㫖吴幵權同知樞宻院事兵部尚書吕好問權領門下省開封尹徐秉哲權領中書省延康殿學士李囘權尚書右丞尚書左丞馮澥仍舊職初邦昌之入也吕好問謂邦昌曰公知今日人情所向乎今日人情向公者畏金人爾金人既去復保人情如今日乎邦昌變色曰然好問曰今日康王在外普天之下同心共戴為公計者曷以大物歸之乎好問所以首建此議者以三世輔相當以扶趙氏為己任也邦昌唯唯好問因移書康王曰今二聖已去願大王自立為宗廟社稷計以雪二聖之恥大王若不自立恐有不應立而立者及邦昌僭號以好問攝門下省好問但書銜仍莅舊職王時雍等誚之好問曰受命於上不可改也邦昌下令曰比縁朝廷多事百官有司皆失其職守自今出入局各遵常度御史䑓覺察以聞又曰向廹大國之威俾救斯民於兵火而諸公横見推逼不容自裁忍死以理國事豈其心哉出令之初有司乃至以聖㫖行下載循昧陋殊震危衷夫聖孔子不居則予豈敢自今與三省宻院官議定處分及内外官司面陳得㫖内降及批出文字稱中㫖遣官傳諭所司稱宣㫖王時雍每言事邦昌前則曰臣啓陛下邦昌屢斥之時雍等勸邦昌坐紫宸垂拱殿吕好問曰不可邦昌矍然而止金人索金銀日以峻急邦昌知民情不安移書敵人以免遂徃青城見敵人致謝因而議乞存趙氏陵廟及免取金帛俟江寧府脩繕畢三年内遷都并借金銀犒賞敵許之又請歸馮澥曹輔路允迪等亦許之丁未邦昌下令赦天下丁卯邦昌率百官詣南薫門望軍前遥辭二帝邦昌慟哭百官軍民皆哭邦昌復致書敵人云孫傅張叔夜秦檜請存趙氏留寘軍中既知徇義於前朝必能盡忠於今日宜䝉寛宥使獲旋歸不報邦昌如敵營所過起居並如常儀從行者王時雍徐秉哲吴幵莫儔二酋見邦昌所致書乞還孫傅等大怒謂聖人仁者豈欲請講前日事邪且云今若縱兵非無名然亦駐兵不逺當觀釁而動邦昌懼不能荅四月二帝北狩敵騎亦退辛酉邦昌手書赦天下吕好問又謂邦昌曰赦書日行五百里今四城之外便是蕃人欲赦他誰况公權攝當俟復辟又謂邦昌曰今日所冝先者當迎元祐皇后使人知天下已還趙氏且速遣使請大元帥早正大位以絶狂虜之謀邦昌從之好問因請孟忠厚勸后以從羣臣之請則天下定矣癸亥冊元祐皇后則曰宋太后好問曰吾言不可矣即不出孟忠厚出邦昌所上書有推戴大元帥之語於是復出邦昌遣蔣師愈齎咨目至大元帥府其詞曰邦昌伏自拜違北去所遭禍難不可備詳昨自臘月二十日還闕正月十五日到城外方知國家禍變之酷主上䝉塵于郊二月七日又聞金酋之令遷二帝太子后妃帝姫宗室近屬劫質敵營既而又欲焚燒宗社蕩滅生靈俾推戴異姓方免屠毒尋奉御筆付孫傅等令依元帥指麾方為長計無拘舊分以速咎累于時公卿大夫慟號軍前以救君父邦昌哀號擗踴以身投地絶而復蘇敵執酋命終莫肯囘度非口舌可爭則以首觸柱求死不能又緣甲士防虞晝夜監守雖欲引繩揮刄赴井蹈河皆不可得豈謂城中之人相與逃死乃嫁大禍臨於一身變出不圖死安足惜忽劉彦宗等齎城中文字與吴幵莫儔俱至邦昌呵責彦宗又罵城中百官為自免計逼人以首惡之名使邦昌有兵定與大金相抗不共戴天彦宗等語塞邦昌因不復食六七日垂死而百官陳述禍福謂事已至此雖臣民俱死莫能囘二帝之遷惟有從權庻㡬全保宗社可為後圖若堅持一節以就死地恐上累二帝豈得為忠臣乎邦昌身為宰輔世荷大㤙主辱而不能死復何面目以見士民然念興復之計權以濟事故忍死於此幸兹敵騎已還道路可通故遣齎此以眀本心今則社稷不隳廟主如故祖宗神御皆幸存全伏惟殿下盛徳在躬四海系望願寛悲痛以幸臣民續次别差謝克家等閒道齎玉寳一紐詣行府當别貢陳康王遣使報邦昌書曰太宰相公閣下天降大禍不使某前期殞滅而使聞君親之流離見宗族之蕩覆肝心摧裂涕淚不禁窮天下之楚痛不足為喻便欲引繩伏刃而二聖之鑾輿未復四方之兵馬方集將士忠憤責以大義故飲泣忍死力圖奉迎今河北河東忠義之兵數百萬諭使邀迎率皆響應蚤夜以覬聞人音而矍然然念與相公去嵗同處賊營從容浹月自謂知心故比來之事聞流言而不信士大夫將相亦皆云爾今奉來教備陳始終有伊尹之志逹周公之權然後知所期之不繆天或悔禍可覬二聖之復也所喻遣謝克家之意讀之愕然失措其何敢承願皆緘藏内府責在守者俟鑾輿歸而上之九廟之不毁生靈之獲全相公之功已不愧於伊尹周公矣某方身率士卒圖援父兄願相公恊忠盡力奉迎二聖復還中都克終伊周之志某身膏賊手受賜而死矣方寸潰亂脩謝不能多及邦昌又遣其甥吴何及王舅韋淵同齎咨自稱臣其大略言封府庫以待大王顔子曰子在回何敢死臣邦昌所以不死者以君王在外也王召何飲以酒謝克家以邦昌之命齎玉璽至大元帥府其篆文曰大宋受命之寳王謙拒慟哭不受命汪伯彦司之始吕好問謂邦昌曰盍奉欽聖故事乎邦昌曰敵去未逺請俟翌日好問曰何可緩也至是邦昌請元祐皇后垂簾聽政以太宰退處資善堂自僭位號至是凡三十三日邦昌言謝克家囘恭聞車駕徑至南京臣承乏宰司欲起離前去庻伸翊戴之誠以請權宜之罪又遣王時雍徐秉哲奉乗輿服御至南京邦昌繼至伏地慟哭請死王慰撫之五月朔旦康王即皇帝位於南京以邦昌為太保奉國軍節度使封同安郡王五日一赴都堂參决大事遷太傅既而貶昭化軍節度副使潭州安置尋賜自盡王時雍莫儔吴幵徐秉哲亦皆誅竄而死臣稱曰邦昌之僭良由脅迫及金騎已退乃納政孟后歸璽康王其心亦可見矣然聖人之大寳曰位邦昌乃起而代之可乎春秋之法於君君臣臣父父子子之道特嚴焉茍於大位而不問而曰彼脅迫也是豈春秋之志哉然則邦昌之死其亦合於春秋之法也何矜宥之有云東都事略卷一百二十二
