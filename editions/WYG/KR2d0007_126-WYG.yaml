body:
  text: 東都事略卷一百二十六宋王稱撰附録四欽宗既即位金人欲退師郭藥師曰南朝未必有偹不如姑行斡里雅布至信徳府視城陋甚援枹攻之未㡬守陴者立幟城上城中皆降逸而出城者斬之驅守臣楊信功以出金人至邯鄲遣藥師為前驅付以千騎藥師求益復以千騎與之藥師疾馳三百里質明遂至濬州内侍梁方平與大將何灌屯兵控扼黄河北岸敵騎奄至倉卒奔潰時南岸守橋者望見敵中旗幟燒斷橋纜陷沒凡數千人敵因得不濟方平既遁何灌軍亦望風潰散我師在河南者無一人乃絞木栰度河靖康元年金人犯京師攻雲澤門次攻通天安泰門李綱分兵擊退朝廷因議請和遣駕部貟外郎鄭望之充軍前計議使康州防禦使髙世則副之金人亦遣吳孝民與望之相見孝民曰皇子郎君到趙州得皇帝登極赦書以手加額既是皇帝已即位無可爭者却與他講和休皇子郎君斡里雅布也因言欲割大河為界副以犒軍金帛望之與辨論之孝民不荅遂與望之由開逺門入至都亭驛有詔趍問使囘所得語意望之等入奏使事欽宗御崇政殿引見金使吳孝民跪奏曰前日南朝與大金結約海上復違盟誓皆已徃事今日少帝陛下與大金别立誓書結萬世驩好可也皇子斡里雅布遣使人代朝見之禮願遣親王宰相到軍前報禮大金喜禮意之重前日割地之議徃徃可罷少帝之稱自此始也欽宗命同知樞宻院事李銳奉使望之世則副之金人需金五百萬兩銀五千萬兩牛馬萬匹采緞百萬割太原中山河間三路之地以大河為界并欲宰相親王一人為質乃遣少宰張邦昌及康王出質於敵營金人索金帛犒軍欽宗下詔勸忠義之家令助金帛又權借士庻家應副見在今帛猶未足遂權行根括民庻金銀赴官統制姚平仲引兵出城與金人戰敗績尋遣宇文虚中等奉地圖割三鎮以和金人退師質肅王以行先是金人不愛康王也復令入城至是遂以肅王行斡里雅布雖已退師而尼堪之師陷隆徳府欽宗與金人講和許割三鎮二十州及遺金帛若退師之日不許劫掠攻取州縣而金人所過無不剽取又攻陷我隆徳欽宗怒罷黜元主和議臣僚令种師道姚古种師中徃援三鎮復取隆徳又取威勝軍姚古與尼堪戰於南關我師敗績退保隆徳欽宗决策北征种師中兵至夀陽與金人戰死於陳姚古种師道既敗欽宗遣王雲使金人金人陷太原欽宗令中書議三鎮等稅租復遣馮澥徃使趨雲徃燕山見斡里雅布再議三鎮二十州事如此理可折即與稅租不獲已則依城下之盟羅索陷汾州尼堪陷威勝軍又陷隆徳府斡里雅布陷真定府平陽居民以城降尼堪兵至澤州城下攻取之斡里雅布遣王雲囘京師云如十四日㑹於磁相間我軍方不度河馮澥亦來自河北具言斡里雅布索冕輅等朝廷從之欽宗以康王使斡里雅布軍前議和止師以王雲為副尼堪陷懐州斡里雅布自大名府由魏縣李固度過大河再遣馮澥行至途中遇王雲雲言斡里雅布堅要三鎮二十州澥與雲同歸於朝廷具言金人之意大臣議論紛紜不决也再遣雲同康王行金人既度河復以兵犯京師京師戒嚴康王至磁州雲遇害康王參議言耿延禧等請康王囘相州金人攻東津宣化二門殿帥王宗濋領牙兵下城與戰敗績金人攻通津善利門甚急復於䕶龍河疊橋作道時大雪不止欽宗見金人攻諸門愈急御瑤津亭命使臣秦仔等八人徃河北以康王為兵馬大元帥雪日夜不止金人乗雪攻城益急郭京領兵開宣化門出迎敵金兵分布兩翼而進衝京前軍一掃㡬盡守禦官吏相繼奔走由是金人登城者踵至揚旗城上衆皆潰散四壁數十萬之衆為之一空徽宗自龍徳宫入禁中金人縱火燒南薫宣化通津善利四門燒劫民居火光亘天連夕不滅開封府率衆父老百姓請命於二酋持金帛牛酒以犒三軍而二酋堅欲道君出郊既而欽宗曰大金和議已定朕以宗廟生靈之故躬徃致謝遂擁素騎出南薫門何㮚孫傅陳過庭等從行曹輔張叔夜留守彈壓越三日欽宗還宫金人移文開封府索馬一萬疋於是都城之馬空矣金人索軍器又索金帛犒軍取河東河北守臣監司親屬質於軍中以待分割地界了日歸還又取蔡京童貫王黼等二十餘家親屬是時朝廷先拘收戚里權貴豪富之家金帛以犒金人士庻納金帛者紛然金人須絹一千萬疋朝廷盡撥内藏元豐左藏庫所有如數與之河北積嵗貢賦悉令般運及浙絹南絹亦以充數又索監書如蘇軾黄庭堅文集資治通鑑之類皆指名取索斡里雅布遣使持書入城督金帛犒軍合用金一千萬鋌銀二千萬鋌縑帛如銀之數不限官私早晚依數應副詔以書揭示士庻云除内藏元豐左藏及龍徳寧徳兩宫御前皇后閤皇太子宫并臣僚之家已根括外今曉諭權貴之家凡有金銀衣段疋兩以上並行輸納二年遣何㮚使軍中懇告而根括愈急既而有詔曰朕出郊見兩元帥議加徽號遂出南薫門金人遣兵百人衛司馬光墳初欽宗幸金營約五日必還至是民以為金銀未足各竭其家所有獻之太學生徐揆以書逹二酋請車駕還闕其書曰昔春秋時楚子伐陳欲以為縣申叔時諫曰諸侯之從者曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也乃復封陳後之君子莫不多叔時之善諫今元帥興師見伐大兵俯臨都城失守社稷㡬亡而復存生靈㡬死而幸免此元帥仁徳也雖楚子入陳未能逺過我皇帝兩造轅門議犒軍之資加徽號之請越在草莽信宿逾邁國中喁喁跂望屬車之塵者屢矣夫生民無主境内騷然忠義之士食不下咽又聞道路之言以金銀未足天子未還揆竊惑之蓋金銀之産不在中國而在於深山窮谷之間四方職貢嵗有常數重以去嵗之役増請和之幣獻犒軍之資官吏征求及於編戸都城之内雖有妾婦之飾一器用之㣲無不輸之於上以酬退師之㤙又兵興已來邦國未寧道路不通富商大賈絶迹而不造境京師豪民蓄積素厚者悉散而之四方矣間有從官王畿仰給奉禄者饘粥之外睹無長貲豈復有金銀之多乎今雖天子䝉塵臣庻效力根括私藏徧及貧戸恐不足以償抛降之目雖以天子為質猶無益於事也夫有存社稷活生靈之仁徳而乃以金帛之故質君父是猶愛人之子弟而辱其父祖與不愛奚擇元帥必不為也昔楚子圍鄭三月克之鄭伯肉袒牽羊以迎左右曰不可許王曰其君能下人必能信用其民矣退三十里而許之平春秋書之後世以為美談願元帥推惻隱之心存終始之惠反其君父班師振旅緩以時月使求之四方然後遣使入獻則國中之人徳元帥之仁豈敢弭忘𫝊曰主憂臣辱主辱臣死揆雖卑賤敢昧死以紓君父之難惟元帥矜之二酋取揆赴軍中詰難揆厲聲抗論為所殺時隂雪不止金人索郊天儀仗法駕鹵簿冠冕乗輿等物及臺省寺監官吏通事舎人各有差又索犀象寳玉之屬人擔車載徑徃供納者急如星火於時欽宗幸金營十五日矣金人遽廢趙氏議立異姓及要道君親王等於是道君皇帝寧徳皇后諸王悉入金營同知樞宻院事孫傅等累狀言本朝祖宗徳澤在民未冺及國主新立為大臣所誤以致違盟失信伏望察傅事狀許其自新降號稱藩復主社稷許於國主子弟中擇一賢者立之或不欲立道君之子乞於神宗皇帝二子選擇建立非惟不滅趙氏一族亦使一國生民䝉被㤙澤又狀言本國前日將相是宣和用事誤國之人自嗣君即位以來所任宰相亦繼以罪罷將相率皆敗亡之餘其他臣僚碌碌無聞者舉於草澤之間亦非聞望素著人心不歸誰肯推戴又狀請車駕還闕不然即乞立監國太子且言若立異姓天下之人必不服從四方英雄必致雲擾生靈塗炭卒未得安傅自知此言罪在不赦然念有宋自祖宗以來徳澤在人於今九世天下之人雖匹夫匹婦未忍忘之况傅等世食君禄方主辱臣死之時上為宗廟下為生靈茍有可言不敢避死金人怒取傅與張叔夜赴軍前二帝遂北狩皇后太子親王帝姬宗室宫嬪及駙馬等節次出京師金人又遣莫儔吳幵移文城中令百官僧道耆老軍民共議立張邦昌治國事並不得引惹趙氏百官㑹議於秘書省獨秦檜論列謂邦昌不足以代趙氏語在邦昌𫝊金人怒亦取赴軍前金人再索金銀復行根括極為峻切殺四壁提舉官梅執禮陳振程知質安扶四人者皆侍從也張邦昌入城僭皇帝位國號大楚金人責金銀愈峻而民間取之盡矣邦昌致書懇免金人退師邦昌遣使請康王早正大位於是康王即位於南京臣稱曰女真以䝉古部落崛起海陬乗天祚暴昬謀殞厥祀是時中國承平日乆大臣喜開邊事首納良嗣之叛以圖燕壤之復又聽張覺之歸以啟敵人之釁自是中國弱而敵國彊矣然背棄盟好侵我畿甸邀索金幣濟其貪婪於斯時也國何以支而民何以堪乎以此言之中國武備蓋不可一日而忘也東都事略卷一百二十六
